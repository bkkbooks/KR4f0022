body:
  text: 午亭文編巻二十五大學士陳廷敬撰經解一易乾下乾上解經以孔子為歸易三百八十四爻時焉而巳耳豈特乾六爻哉孔子於乾獨曰大明終始六位時成時乘六龍以御天者言乾六爻非聖人不能用也葢時之用備乎易易之理統乎乾乾之道全乎聖人是以於此首發明之故曰天行健君子以自彊不息又曰君子行此四徳者故曰乾元亨利貞孔子之得於易如此所以為聖之時者也初九子曰龍徳而隠者也九二曰龍徳而正中者也九三九四曰君子進徳修業九五曰乃位乎天徳上九獨不言徳知進退存亡而不失其正非徳歟徳者何也曰誠也閑邪存其誠修辭立其誠乾六爻未有不貴誠者偶於二三爻發之而已説者謂乾五爻皆以龍言三以人道獨不稱龍然四亦人道也曰躍曰在淵猶之稱龍之辭何也曰聖人不直指之曰龍也曰躍曰在淵而已其所以不直指之曰龍者以其嫌於近五也人道也亦臣道也夫大人者與天地合其徳天地之大徳曰生仁是也聖人作而萬物覩説者以為聖人有生養之徳萬物有生養之情是以相感應也惟仁故能生養故曰元者善之長君子體仁足以長人又曰仁以行之晉太史蔡墨曰在乾之姤曰潛龍勿用在乾之同人曰見龍在田嘗引伸其義初變坤為㢲㢲徳為入故曰潛龍故曰陽在下故曰陽氣潛藏又變㢲為姤姤勿用娶女故初九潛龍勿用也二變坤為離離徳為麗為文明其象為日為火故曰見龍故曰徳施普故曰天下文明又變離為同人同人于野亨故九二利見大人也三變坤為兑兑為巫為口舌尚口乃窮君子慎言而敏行故曰終日乾乾夕惕若又曰反覆道也又曰行事也又曰忠信所以進徳也修辭立其誠所以居業也又變兑為履履虎尾是以乾乾惕若不咥人亨故厲无咎也九四變㢲為小畜宻雲不雨躍而或止之象也九五變離為大有火在天上無所不照飛龍在天之象也上九變兑為夬夬有厲不利即戎亢龍有悔之象也坤下坤上乾為良馬為老馬為瘠馬為駁馬故坤利牝馬之貞也先非牝也故曰迷後則牝也故曰得主曰利陽為隂主得主故利也西南得朋東北喪朋惟朋喪而後主得也然臣以喪朋得君亦須有邪正之辨善乎横渠之言東北喪朋雖得主有慶而不可懷也故曰安貞吉若專以喪朋為務而邪正之辨不復致審於其間則亦未得為正矣初六履霜堅氷至伏震為足履象也言隂進履也履絶句霜堅氷連讀葢一隂始生姤五月之卦也安得有霜觀其所覆而知霜堅冰之至也坤二直内方外即乾二閑邪存誠所謂厚徳者此也所謂不息者亦此也乾坤之徳豈有異哉四臣位而曰賢人隠言隠者以别乎仕之稱也明此爻不得以位言也懼為食禄在位緘默苟容者藉口故言隠以别之也乾之初九十一月之復也由陽初生而言者喜之也上九隂將生而言進退存亡陽之所以善其終者易為君子謀至矣坤之初六宜以姤為言而曰履霜堅冰至使人知隂之可畏也上六曰龍戰于野言震之將生也震陽也亦喜之也消息盈虛隂陽之數也喜陽而惡隂喜君子而惡小人喜治而惡亂聖人情見乎辭矣震為龍為元黄戰猶栗也弱而胚胎也坤為野是以龍戰于野其血元黄為震始生之象文言曰隂疑于陽必戰疑讀如儗儗將也隂儗于陽隂將生陽也必戰者陽弱而戰也是時非无陽而嫌於无陽故稱龍焉嫌近也元黄者天地之雜天元而地黄陽生隂中之象也或曰隂陽皆傷也夫立言以明教也隂可傷也陽可傷乎震下坎上天下大埶決於民而已矣初九能大得民天下焉徃以此為成卦之主宜也凡言得者以有失之者也九五是也九五有膏而自屯民既散矣膏豈能常享哉是昧於大小之分者也出内之吝謂之有司是小以屯為正則吉也隋有洛口之倉唐有瓊林大盈之庫隋唐之君不能施於民而徒為冦資是大以屯為貞則凶也夫五失其民而初得之四初之應也初求四徃此不必論若夫二者五之正應義不忘五然亦何所濟哉當屯之時英雄乘時而起者多矣所謂秦失其鹿天下逐之者也三即鹿无虞陷於林中見幾而舍猶可善後上六與三非應近於五而附五而不知五之不足恃也故曰泣血漣如何可長也合而論之屯之濟與不濟在民之得與不得民之得與不得在於膏之屯與不屯自古以來屯難之世國之興亡未有不如此者也坎下艮上六五下求於二故童䝉吉六四逺於二而不知求故困䝉吝象曰剛柔接也獨逺實也然則隂之於陽果宜何如哉初近於二故為發䝉利用刑人用説桎梏所謂禁於未發之謂豫也伊川為講官一日講罷未退上忽起馮檻戲折栁枝伊川進曰方春發生不可无故摧折上不悦或謂此伊川之以徃吝也然伊川豈可輕議哉六三取女者也非女也取不有躬之女六三之不慎也故上九擊之擊之者為三禦冦也此上之慎也葢女而不有躬為冦也大不可不禦也善學聖人者必先逺害善教人者必先禦冦吕希哲嘗言人生内無賢父兄外無賢師友而能有成者鮮矣乾下坎上需者聖人將以盡化天下之險而使歸於和也剛健而不䧟者乾也雖不陷猶有險也有孚光亨貞吉坎之徳也至此則无險可言矣乾與坎不可以賓主論而五於三陽獨以飲食客之三陽亦飲之食之以五為主而不疑所謂有孚光亨貞吉也不獨五也四亦能需於血出自穴矣血者其始而出穴者失其險之象也順聽者順以聽陽不復肯為難也上六居坎之終故為入於穴然亦能於不速之客來而敬之雖不當位未大失也當是時也需于郊于沙于泥之象何有乎世路蕩平彼此一家飲食宴樂何其盛也夫五何以能若此坎之一陽坤得於乾者也是故五於乾同體而不相害也雖然亦危矣初之利用恒二之衍在中三之敬慎未可一日忘也是卦也聖人致望於无險也切矣愛乾憂乾之心亦云至矣坎下乾上訟之九五天下之訟皆歸焉然人君不言聽訟聽訟而當是人君不過一大有司耳繫爻者但言元吉而不言訟是无訟也元訟而後為元吉以是為吉之至也孔子釋其故曰以中正中正者人心本乎天之正理中正失則心險險則訟聖人以其中正化天下之不中正以其无險化天下之險聽訟吾猶人也必也使无訟乎此之謂也此卦諸爻皆以无訟勸人者也初之不永所事二之不克訟三之食舊徳四之不克訟是也三之貞四之復即命渝安貞皆以天命人心之正理言是知中正之心人皆有之聖人使民无訟亦以其皆有此心故也上九或錫之鞶帶終朝三褫之此訟雖勝而心不安之象猶所謂其心媿恥若撻於市者是也充是心也未嘗不可復即命渝安貞也九二曰不克訟歸而逋其邑人三百戸无眚象以為自下訟上自是解者謂二訟五為以臣訟君竊以謂臣無訟君之理象言自下訟上亦未便以為自下訟君也矧辭曰不克訟假令克訟君顧可訟乎既曰不克訟則是有訟之心矣人臣无將罪孰甚焉乃更以无眚許之聖人假易象以明人道非所以為萬世防也然則所訟之上果孰指乎曰二五正應上謂九五无疑然自二言之謂為在上之人則可謂為君則不可易不可為典要惟變所適安在五之必為君位乎朱子曰九二正應在五五亦陽故為窒塞之象易有象數此何以不言二百戸而言三百戸以其有定數也王弼謂得意忘象伊川又謂假象今象數不可考只得從理上説故勉强解作小邑漢上朱氏曰乾䇿三十有六坤䇿二十有四九二變則二三坤䇿四五乾䇿合而言之三百也坤為戸二在大夫位戸為邑自三至五歴三爻也又曰古者諸侯建國大夫受邑諸侯之下士視上農夫食九人中士倍下士上士倍中士大夫倍上士卿四大夫君十卿禄天子之大夫視子男大國之卿當小國之君然則諸侯之卿當天子之大夫也食二百八十有八人三百戸舉全數也葢漢上之説其象數可考者如此坎下坤上師以一陽在下為將帥之象故重九二然九二爻辭曰王三錫命象以承天寵懐萬邦釋之是尤重六五也九二自衆尊之則曰丈人自君稱之則曰長子長子帥師五所使也弟子輿尸亦五所使也唐九節度鄴城之潰非肅宗之咎而何使之當不當闗民命之生死國家之安危豈可忽哉不止用師之時宜慎所使至論功行賞尤嚴小人勿用之戒大君有命開國承家君之事也非上六之事也但以上居師之終故發此義耳師出以律人所知也左次之義何居見可而進知難而退師之常也上貪功下懼罪宜退而不敢退以覆其軍者多矣可不戒哉田有禽利執言儒者常謂秦皇漢武黷武好兵謂之田有禽不可自是以來人主賢而善用兵者莫過唐之太宗其征髙麗以不能成功深悔之歎曰魏徵若在不使我有是行也命馳驛祀徵以太牢復立所製碑葢太宗征髙麗以莫離支弑逆為言夫髙麗豈唐之禽哉太宗之悔而思徴此其所以為賢也故凡為无名之師者不可不深玩此爻之義坤下坎上此卦九五一陽在上為成卦之主初六有孚比之吉比五也六二比之自内貞吉比五也六四外比之貞吉比五也惟六三比之匪人上六比之无首是不比五者也比五則吉不比五則凶君子可不慎所比哉夫九五以位正中盡比之道顯明其比有舍逆取順邑人不誡之象六三上六自取其凶何損於五哉乾下㢲上以㢲之小畜乾之大㢲者順也小人之順君子將以漸制君子而使之不得有為君子不悟也從而與之至小人勢成而君子坐困矣六四㢲之主也有孚者非孚於君子而孚於小人也故曰上合志也血去惕出者以其㢲順故兩不見傷目前无咎也然其釀禍為最深也夫九五陽也何為與四合志乎又何為富以其鄰乎葢五有陽之形而其志實隂與上同居㢲體故富以其鄰無足怪也四與五上三爻有孚合力畜乾欲不成既雨既處之象也得乎小人之巧也君子之疏也小人之佞也君子之直也茍非君子尚隂徳而使之滿當不若此咎小人而責君子君子亦无所辭其責也易為君子謀使如初九之復自道上也如九二與初九牽連而復亦次也至於九三其於㢲也近交益深而不可復矣脱輻而與之處矣隂陽不相能也而夫妻反目事巳晩矣下也陽自下上行為隂所得相持而雨澤下焉六四隂畜陽宜雨矣故為宻雲之象然三陽上行四雖畜之而五上二陽在其上四方得位上下應之㢲性善入兑體善説以善入之性務以説陽又居位得時不盡畜不止故四所欲畜尤在於五五君位也既志在畜君隂性佞邪説之不以其道専務得君凡膏澤天下之事利於民而恐拂於君者則不欲以為故又為宻雲不雨自我西郊之象宻雲不雨尚徃也言意在畜君也兑正西也故為西郊之象成卦之義在四故曰我也小畜之初九曰復自道九二曰牽復吉諸家解復字不過謂陽本在上進而上行為復獨漢上朱氏以為聖人欲明陽不受畜於隂之義故以履小畜二卦反覆明之小畜履之反初本在上二本在五三本在四故初二皆以復言之三則受畜而不得其復也漢上以對卦解初二之復則復字便有根據兑下乾上履之九五惟位正當故夬履惟夬履故雖貞亦厲貞且厲况不貞乎若能自視所履考其將來之祥兆周旋盡善不敢夬決則不止於吉且大善而吉矣孔子釋之曰元吉在上大有慶也此豈人臣所敢當乎是九五上九合為一人也二爻而為一人有之乎曰有之大有之九五上九是其例也君一也失則為夬履得則為視履乾之為虎也乾之履帝位而不疚也无異也君子之於履无所茍而己矣六三為兑之主兑者説也所謂説而應乎乾是以履虎尾不咥人亨者也何以又曰履虎尾咥人凶也言之不足又曰武人為于大君以剛武之人有所為於大君之側不得大譴者幾希矣悦極則為巫為羊為毁折此亦兑之象也此亦一爻而具兩義者也儒者曰履文王之卦也文王居羑里而演易所云履虎尾不咥人亨履則真履矣驪戎之文馬有熊氏之九駟未得入焉咥人不咥人未可知也當是時也欲為初九素履之徃欲為九二幽人之坦坦皆不可得也武人之辭又周公所繫也豈以文王為武人也哉非也葢居東之時周公亦有戒心也夫於三言履虎尾咥人凶於四言履虎尾愬愬終吉言終吉則不咥可知也以愬愬易説者何也説有正不正非人臣之正也履之九五彖傳所謂剛中正履帝位而不疚光明者也而爻之辭曰夬履貞厲垂戒之意深焉善乎雲峰胡氏之言曰其下者不患其不憂患其不能樂在上者不患其不樂患其不能憂故于履坦繫之貞吉喜之也于夬履繫之貞厲戒之也傳曰具曰予聖誰知烏之雌雄夬履之謂與乾下坤上人知泰為可樂而不知其艱人知艱在九三六四隂陽徃來之間而不知初九九二未嘗无艱也物各有類此進彼退將使退者終退則進者敢不正其類邪包容荒薉而果㫁剛決不遺遐逺而不昵朋比二之中行合衆類而治之得其道者也是初九九二亦有艱也特未明言之耳九三曰勿恤其孚葢三之所勿恤者即六四之所不戒者也節齋蔡氏曰孚者信然之謂勿恤其孚謂不可以隂之必復而動其心也自古小人用事非其始遂有敢與君子為難之心為君子者利害之念怵於中隠忍遷就以養成其勢於是小人无所忌憚之心觸事發露而亦不復可以自止君子於此思所以制之亦已晩矣故曰勿恤見徒憂之不可以有為也曰于食有福見有以為之未必其果可憂也其為君子計慮以防制小人者至矣翩翩不富以其鄰翩翩二字冩出小人情態葢君子不可徒憂小人之復小人實深幸君子之憂三陽初徃三隂翩翩然下之且懼且喜回翔而後集漢上朱氏曰譬如葉墜井中翩翩而下以井氣扶之也君子初去位小人猶有顧忌君子盡去然後飛揚矣是則君子之憂小人之幸君子亦何貴徒憂乎哉三巳有平陂徃復之説外卦六五之辭與四上二爻殊不類者何也此繫易聖人之微意也保泰之道雖在君子主之者君也由泰而否常在承平之世故以帝乙為言帝乙殷之賢君尚書所謂自成湯至于帝乙罔不明徳恤祀是也歸妹為人君順從君子之象君子道長小人道消非君而誰望哉初曰吉二曰光大三曰有福五獨曰以祉元吉世之常治而不亂君子之常進而不退福與吉未有過於此者也坤下乾上聖人喜治而惡亂其繫否也合君子小人而謀之使皆受泰之福而不見否之禍此聖人之意也初曰貞曰吉曰亨曰志在君二曰小人吉三言位不當不言凶咎於小人猶有望焉使小人不至於一發而无所忌豈非世道之幸乎泰曰翩翩曰復隍於否反不盡其辭非獨可以互見亦良有以也六二包承吉即以大人否亨告之九五休否大人吉即以其亡其亡告之亦猶泰之言艱貞也夫泰六五之祉祉由于君否九四之祉祉由于命夫受天之命者君也四之有命由其有君也畏命造命皆君之事也是以泰否二卦其致望于五尤重焉否不利君子貞者之匪人也同人利君子貞者于野也亍野者无私比也之匪人者比於匪人也此之字即大學之其所親愛之之彖傳所謂内小人而外君子小人道長君子道消也之匪人无一而可聖人特于否卦發之言此實所以為否也否之初否之機已兆否之勢未成聖人惟幸其有變而之泰之理否之初貞則為君子不貞則為小人聖人惟許其有可為君子之道故其辭曰拔茅茹以其彚貞吉亨葢略不異於泰初之辭但勉以貞而已且許以亨焉固未嘗明言其為君子亦未嘗斥言之為小人其意以為果能貞焉不但不為小人之羞亦可以為君子之亨矣故象之辭曰拔茅貞吉志在君也勉其不以巳私害國家也若居否之初其勢尚可有為而或者専以便安為事一付之天運之所適然其如君何哉志在君者葢許其有可為君子之道幸其有變而之泰之理也離下乾上同人之五君位也二與五相應何以同人于宗而吝也其不能與五遽遇辟如女子有家未能于歸而尚在本宗此吝道也二之吝則以三四故也夫三四雖剛暴豈能奪君之配哉但以其剛暴之性馮勢為惡既敢上陵於二何有此所以先號咷也象曰同人之先以中直也中非五所不足然是時中非所用君道貴剛當以大師克之五之剛既奮三之伏戎終不敢發四之乘墉亦困而反則大師設而不用可也三四至剛暴也且化而為同二五之後笑不亦宜乎剛亦乾所本有不能用則號咷能用則笑也此卦大而難者无若二五三四之間初之于門上之于郊皆小者也乾下離上六五一爻為大有之主虛中在上以一人之信而發天下臣民之志故曰厥孚交如其曰威如吉何也象曰威如之吉易而无備也非嫌其易而進以威也蘇氏曰以其无備知其有餘也夫備生于不足不足之形見於外則威削可謂善言易者也同人一柔在下故五貴用剛大有一柔在五故五貴用孚君道用剛用孚各有其宜也孚則交交則威至于威如而柔不足以盡之矣是兼剛而有者也故聖人於上九又繫之曰自天祐之吉无不利象曰大有上吉自天祐也爻辭與象但言其自天祐吉无不利不言其所以然其義盖在六五一爻也自天祐之人臣不敢當也非六五而何是故六五上九為一人也大有一卦此為最吉以下四爻皆其所有而各有戒辭亦大有之時所宜也六五厥孚交如初何得言无交交之害在於處有而不思其艱故戒之曰但无交害有匪咎也艱則无咎此亦諸爻通例於初發之耳九二大車以載有攸徃无咎象曰積中不敗反言之非大車則必敗矣九三公用享于天子小人弗克是小人不能无交害也九四匪其彭无咎象曰明辨晳也言有其彭則大不智也其戒深矣坤為大輿九二體乾而曰大車者何也乾變坤也故易之取象多以變言艮下坤上天道虧盈而益謙地道變盈而流謙鬼神禍盈而福謙人道惡盈而好謙君為天地神人之主謙而得福尤必然之理也六五不富以其鄰利用侵伐无不利此謙之效也凡言以者能左右之謂也五於其鄰能左右之於不服者能征伐之既不驕縱又不姑息可謂盡君道之宜者矣九三為成卦之主上為君所任下為衆所從有功而能謙故曰勞謙既能勞謙又須君子行之有終則吉既美之且戒之也五不驕縱三能有終三亦可謂人臣之善居功者矣剝四變而成謙謙彖皆以剥四變者明之上九下三謙也六三上上亨也故彖傳者下濟上來下也卑而上行三上徃也變而為全吉之卦謙之時義大矣哉坤下震上豫卦六爻初三四上皆言豫二與五不言豫言貞言中五豫時之令主也二豫時之賢臣也九四一爻為豫之所由亦有功之臣也功成意滿羣小附和皆溺于豫見有不溺于豫者或反以為異巳而疑之疑朋可言也疑君不可言也故四有勿疑朋盍簪之戒也四與二相反而相成者也四不疑二自不疑五五可安枕而卧矣四未必能也此五之所以乘四之上常若不豫而為疾也生於憂患死於安樂者理也五不死於安樂故為恒不死也六二介于石不終日固无可議然彼見幾而作不俟終日未必能周旋患難使五恃以无恐此五之所以終未免於疾也一時初之鳴豫三之盱豫上之㝠豫皆无足道四雖大有得實未嘗得一朋也志大行者似快之之辭也亦危之之辭也乾九四曰或躍或之者疑之也豫九四曰勿疑一則許之以疑之一則戒之以勿疑何也葢九四伏㢲為不果不果者疑也乾九四疑其所當疑故許之豫九四不當疑而疑故戒之也震下兑上九五剛陽中正而下應六二中正真嘉耦也故曰孚于嘉吉然二之辭曰係小子失丈夫二果係初何以得為中正何以得為五之佳耦哉此葢二以弗兼與權之故與五而不與初也君臣之間其未合也兩相擇也其既合也兩相信也君與臣其兩无失乎四下不應初而上承于五與五同徳隨而有獲不可謂之不貞貞之中有凶義焉非有孚在道以明之君子不能免也近君之地盛滿得志之場求善其後亦難矣哉大有九四象曰明辨晳也隨九四象曰明功也大有之四離體隨之三四易位成離離為明故孔子皆以明稱之四迫五多懼其彭其獲懼孰甚焉惟匪彭故无咎惟有獲故貞凶自非明以處之其能免於凶咎乎㢲下艮上下卑㢲而上茍止蠱所由來也幹蠱者必有事焉所以反其卑㢲茍止之習也然君與臣不同君則繼世之君值法度弛亂之後者也六五居君之位幹父之蠱當用一時令譽之臣此天下交口賢之者也用之彼必能以徳承上有徳者興蠱可以立治矣臣而謂父母之蠱者君臣猶父子也初與二三皆以幹蠱稱或厲或不可貞或小有悔事不避雖各盡其道期於終之吉无咎而已皆蠱時必不可少之臣也惟六四不能幹而裕裕則蠱將日深何足取哉若夫不事王侯髙尚其事此功成身退者所為蠱時人臣不忍言也按王制云甲者創制之令疏云甲為十日之首創造之令為在後諸令之首故謂之甲宣令前後三日殷勤語之使暁知新令也又謂諸儒並同鄭義以甲為日不為令云先三日辛也後三日丁也此是妄作異端盖以甲為令舊矣易傳謂甲者事之首庚者變更之首制作政教之類則云甲舉其首也發號施令之事則云庚庚猶更也漢上易傳本程子之意而明終始之説曰蠱東方卦也㢲西方卦也甲者事之始庚者事之終以日言之春分旦出於甲秋分暮入於庚以月言之三日成震震納庚十五成乾乾納甲三十日成坤滅藏於癸復為震甲庚者天地之終始也又曰蠱一變大畜乾納甲再變賁離為日乾三爻在先先甲三日也三變頤四變噬㗐離為日五變无妄乾納甲乾三爻在後後甲三日也葢先甲後甲之説不一如此而漢上之説可以發明程子之意故悉舉之兑下坤上當臨之時陽雖漸長消亦不久進君子退小人使邪正分明羣賢布滿以塞小人登進之路此要務也上則望於君下則責於一時諸賢皆不可忽也六五曰知臨曰大君之宜曰行中知者能辨邪正也大君之宜者君以知人為急也行中猶行正也非調停君子小人之説也初九九二皆曰咸臨非咸於小人也亦非初與二左提右挈遂可云足也廣搜人材協力並進如此而後可以咸也正初與二之事也初有貞吉之戒戒其誤引小人也二有未順命之戒言小人猶未順命不可不防也嗚呼君能知臨臣能咸臨時守貞吉未順命之戒八月有凶豈遂定而不可移哉坤下㢲上九五居人君之位而欲自觀我生惟有觀民一法葢天下之大億兆之多其俗之美惡由乎我者也民之俗果美邪是我之能為君子也民之俗果未美邪是我之未能為君子也九五之意期于我為君子未有不能為君子者也君子之徳風小人之徳草化行俗美比屋可封其斯以為國之光乎觀國之光賢人尚賓既以民而致賢復用賢而治民大觀在上五不媿之矣九五曰觀我生六三亦曰觀我生者何也君子之道本身徴民我生者天下理亂安危之所繫烏可不務觀乎哉至於仕者之出處比於人君之自治葢其重有如此也故亦曰觀我生進退云上九不在位退而不進者故但曰其生朱子所謂小有主賓之異也午亭文編巻二十五
