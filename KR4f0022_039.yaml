body:
  text: 午亭文編巻三十九大學士陳廷敬撰書與畢亮四書自某少時聞百里内有賢人畢先生力耕養親及仕則以亷能聞於天下所著書悉古文竒字私心願一識其人而足下既從仕四方某亦羇旅於京師無因縁相見自以忝竊文字之職感足下之行義居常私念不得以事業功名自表見然猶不敢不以亷隅節行自砥飭曰恐畢先生不比數之也在京師時守官奉職退輒閉門不願妄從流俗交㳺朝士中多不識其面其有賢於人行能學藝絶異者則未嘗不求與之友與足下生同鄉至以一相見為難其為歎慕何如耶前年冬足下應博學宏儒科至京師其時某直禁中晨入而夜歸也又不獲一相見今年夏始識足下於山中乃以慰吾殷勤之願焉伏見足下親耕於野蠶於堂手足胼胝面目黎黒有辛苦顦顇不自聊之色吾又以悲足下之為也昔樊遲請學稼圃孔子曰吾不如老農老圃及觀古之人伊尹之於有莘諸葛亮之在南陽皆以躬耕顯名於天下為後世稱述夫豈不以聖賢所遭出處進退豐約之勢有不同而惟其道之所適然與孔子稱顔淵在陋巷簞食瓢飲不改其樂又自言疏食飲水樂在其中然則足下之所為有可樂而無可悲者也向所願求與之交者舍足下其誰與承恵教所選制科之文因便示及某再拜與劉提學書某昔者備員國學嘗獲同事辱執事相推重之雅謬自砥礪以求副執事之所稱許自是諸生頗知有論道講學之事而終始不渝者不敢忘執事切劘之勤其後執事在列曹自非朝㑹公見無因相接僕性寡諧而執事復嶽嶽自重其自待以待不肖者出尋常交際之外以此愈益思仰客嵗跣奔子舍聞執事拜督學之命苫凷餘生竊幸國家為多士得人而輓近學校之頽風可以釐正而革除也澤州晉之南鄙地僻逺而某居陽城山中學使措施不易得聞見頃知已莅河東将有敝邑之役敢布所懐於下執事幸留意焉當澤州盛時州試童子可二千人上之學使者千有餘人州所𨽻縣如陽城試童子可千餘人州再試之上之學使者亦六七百人其三縣髙平陵川沁水悉號為最盛今澤州應童子試者不過二百人陽城四十五人陽城如此三縣可知矣一州如此天下可知矣學校者人材之藪淵人材者國家之楨榦而一旦衰落如此是可歎也且今天下之士盡聰明才智之人也既已離去詩書又無恒産弱者不免為饑寒流離之人其强者不敢保其不為頑梗難化之輩國家留意教化屢下詔㫖而人不知書自絶其教化之原是又其相謬違者也凡若此者其患始於進額之太少其弊成於請託貨賂之公行今進學額數人耳而貴富有力之家輙攘之以去單寒之子淹抑坐歎白首無聊或至改業身為工賈苟且自活罔顧禮義所闗民風豈其細故則亦豈非吾士大夫之自有以致是哉尤可悲者天下在學生徒寥寥焉減昔十之七八矣司文者既不以教養為心又從而摧辱之剥削之其謂之保等者取其貲保其不出三等者也又最甚者其始故置劣等揚言於外不肖州縣學官為之通闗說賄而後置之三等謂之㧞等前此諸公多有行之者執事清嚴公正萬萬無此事誠慮有意外請託或指名招摇者若不慎其端而絶其流終恐為清名盛徳之累而於官方學校兩失之也其於昔者砥行立名之意豈不大相徑庭也哉伏望駐節之次嚴飭官屬凡有前項舊弊痛加埽除至於矢公矢慎務㧞真才則執事自有鑒别無俟溷凟清聴顧自念行能無似自襄先淑人葬事廬居壠阡即家事亦皆屏絶不問恒懼獲罪名教不敢以一字通州府犯禮經不語之戒而獨念此一事在朝廷不啻三令五申而建言者亦嘗連章累牘舉世所嫉而貪昧之風究未衰止每見覆轍相尋奚忍不一為告語於下執事是以茫茫然忘其言之愚狂以至於此也伏惟執事大破情面力革陋規不勝祝願至於盡言招尤自取悔辱實不敢苟避惟兾照察不宣與守令學官紳士書廷敬頓首言考試一事請託公行其來已久思輓積習人㣲言輕不足取重當事今兹不揣為學使者特致一函伏計大賢君子必有同心今以書藁附呈清覽以白區區鄙懐惟願郡邑賢侯及我紳士或以書逹或以面言共致此情主持公道不勝顒望又聞投遞書扎過付財賄大半出於學官學官者朝廷教養士子之官非為學道作牙儈而設也今之君子必不為此倘有流聞公憤難犯為此冒昧謹白與里中鄉紳書廷敬謬惟學使者試士一事朝廷洞悉弊源著為法禁布之令甲士大夫人人能言之不惟言之亦皆心知其非而或身自蹈之知其非而遂為之貨賄顯行請託無忌學校之地公然為貿易之塲此乃國典所不宥而有志之士忿悁含怒之日久矣此窮則變之時也廷敬自知力薄言易然輒不避怨侮為學使者専具一函已使使致之矣竊念郡邑鄉逹髙賢同心者衆擬以傳帖白其事以為吾儕先自立於無過之地而後可以責人亦欲請鄉先生人人共逹其情於當事夫而後可以取信决其從違俾知非廷敬一人之臆説而逺處荒山恐不及遍致謹以原書並傳帖呈到倘令人分致焉幸甚望甚荅徐宫贊書足下聞太夫人之憂也某親承賢昆季容色毁瘠每一瞻對感動銜泣及奔赴出國門觀者哀歎自别以來輙徃徃欲失聲而哭也居㡬何時頓罹先淑人大故自惟天降割罰孽自己作悔徃追憾莫由自解跣歸抵舍疾至大困經云不勝喪不孝辠可勝言哉憶與足下昆季同抱終天之恨其為荼苦當悉此情重勞使者逺渉情文備極北望稽顙以謝伏審還闕以來台候康豫徳廣聖天子方倚毗文學之臣草土視息之餘不能無厚望於大賢也某自去嵗冬獨處荒原依栖丘壠實不忍一旦捨去而歸去冡墓十許武居人兩三家在山峰遼阻之間雖牧兒耘叟罕見踪跡澗下有虎穴虎孶息其中某為飼虎文具特牲告之謂母墓在此虎宜避去其後虎果不來未知其後果能逺去否也險逺可悲如此又年凶人饑盗者習為椎埋之事叠訴所在官司不勝捕誅每夜深宿冡旁操挺刃與盗為敵其可怖畏又如此亦何忍一旦捨而歸也幸所在盗猶能有人心竊聞其語曰陳子母墓也戒勿犯得恃以無恐荷教愛之深恐欲聞知臨書不勝哽塞與汪鈍菴書去嵗居荒隴之側得健菴徐君書已知足下予假歸吴中後得手書甚悉是時雖居隴側已釋服故得為歌詩作五截句奉懐且以自道其有終焉之志也今年八月奉父命再出故嘗善病於路轉劇十月抵都下補舊官事數倍曩時益不任其勞率嘗杜門斷客不知者曰孤介或云傲物其實皆非也自歸而居三年數承足下手書相問存輒不即奉答葢不得以草土姓名時逹京國後足下既里居僕僻處晉鄙非通逵無由寄候皆有辭以自解今居京師郵書易致而多疏闕此直以嬾故耳姚生公車來辱翰教意懇懇有加又不即答書嬾益甚不足復責兹託健菴寄候祥後學為古文近百篇今録呈者求指教截句并録奉覽思仰不宣答立齋總憲論明史書何真雖非羣雄起事之人特以據有嶺表又非佗将歸附者比可槩入之功臣傳中是以不得已列之羣雄之後今即欲改入他傳無其類者惟有康茂才似可相次然康茂才初起事蹟差小又與真不類不若仍舊巻似為得也今以二傳呈鑒定或别有見祈示之不􅊖又荅立齋總憲書昨偶不克赴局殊辜良約顧辱枉存又不獲奉教且感且悚悤悤過日不能以時㑹晤深用惘然承諭何真入康茂才後亦可為類即望移置並改刪論賛李思齊入明玉珍諸人後也擬得一藁或恐未盡又其未歸命時事已載元史竟畧之則無原委書之則不免複見専望裁正也又事略中據俞本紀事録以斷臂事為宜得實而太祖御製祭文謂其善終似不應隠覆若此故不取尊意以為何如徐夀輝别立一傳於義當爾即望命筆並奉去陳友諒傳一卷其論賛又須改易也謹復不具答友人書古之立言者多矣其可傳者必其知道者也若其道之弗知言不足以傳審矣雖世降學衰㒺知決擇傳於今有純有疵幸而有知道者不絶於世其不至為所擯抑棄置者盖寡矣某於此處茫然實無所見安敢語於著述之事哉而先生盖知道者乃亦為是言亦豈教學相長之意哉然其所以掖引扶誘以冀至夫知道之境者則大賢與人為善之心不能不感且用自勉也與徐少宗伯論一統志書一統志保定一府盖全志之權輿百六十府之律度繩矩創始者難為功㣲吾健菴莫任此事也廷敬才力薄少弗學且今衰鈍曽何足以語著述之事而左右於萬一自以與健菴同被命為此書既恧心汗顔不以讓於能左右吾健菴者今被命且乆而以荒陋無所能自解則尸素之愆知不免矣然以健菴壹心力勤考據發凡起例規模大定之書而必欲逞其私意以求自解免於咎責妄加吹索則天下庸有是理也哉語雖云泰山溟渤不辭丘垤細流而成其髙深愚者之慮千有一得然而白頭之豕野人之芹皆吾健菴之所先得乎心者顧詡詡然謂吾能左右於萬一亦何異蚍蜉之撼大樹而腐草之螢求争光於星日也其為愚僣謬戾詎不甚哉惟吾健菴有以容之而已謹按今志之作合天下輿地人物而備載一書不患事少但慮文多顧文既多矣而猶未免乎挂漏之虞是知事貴博而文取約也葢不博不足以備事不約則不足以載博如所編建置沿革博以全史而約之行墨之間此昔之所無而今之獨擅者也山川則録其雄峻闗梁則有繫於要害此昔之所無者而一切詠歌之辭風人之㫖可以備採聴而資興觀者槩置弗録則昔之所有而失之濫今之所無而病其太畧者也户口田賦昔之所畧今詳焉而或竟仍前代或斷自國初似應以新編賦役全書為準也名宦人物則三不朽之業卓卓可考者以某事得稱亷能以某事某書而得名孝弟文學若都無事實而但曰政聲卓然曰讀書樂道非所以褒前勸後也名宦既有美政可紀雖其人為賢者或以他故不得有所施設亦不必載盖既録之曰名宦而事蹟不著則名與實戾矣且賢者何患不傳而予之以無實之名耶又志與史畧相似而與史有異者史所重在人事而地理郡國其附見者也推此而論志與史各有詳略之可言矣宗工鉅卿史所詳者志不必更詳片長軼事史不及載者志不可不載其法與史相經緯又不與史相雷同乃為得耳事取博矣文取約矣而所貴者書法則宜古而不宜今宜雅而不宜俗如志遷擢則曰陞士子首選則曰解元曰㑹元曰狀元曰及第宜悉改易南昌人物不書字保定書或書或不書宜酌也舊志人物一府合載故於人名下分注曰某邑人今志則逐縣分記不待詳志而始知可以不仍前例也南昌志得之分繋之例名宦㝡難盖古之郡國非今之郡國如豫章一郡㡬盡江西之地漢時豫章太守自當繋於江西布政司之後不當専入南昌府然此猶易定者也他如一郡而跨兩省如㑹稽郡今分江南浙江一省而雜數郡如山東江南一郡而包絡㡬府如豫章郡㡬郡而并成一郡如江南淮安郡則兩漢牧守不知将何編置始得允愜此當熟論者也今之督撫藩臬鹽鹺學政驛傳糧儲提督總鎮自當列於各布政司之後一省而有兩廵撫兩布按雖分地而治亦當與統轄全省者同例雖駐劄别府如江蘇廵撫布政駐蘇州湖南廵撫布按駐長沙而不得即繫於所駐之府重體統也惟分廵守道及總鎮轄一二府者則隨其所駐之地而繋之北直廵撫不繋於順天而繋於保定者所以讓尊也他省初不得以為例至北直督學亦當繫於保定也又志前朝事與志當代事自别志當代則其辭嚴重故眀人書諸帝曰某陵某廟書上書報可曰特䝉施行書奄人曰逆瑾逆璫其體法宜爾今志中或一二仍其文而諸藁尤所宜悉易者此其大較也諸所欲商𣙜者已識浮簽於上而江西省未經論定者亦并開具如左以俟財擇焉謹啓不宣保定府在京師正南擬在京師西南今云在正南再詳按唐志析木津初尾七度中箕五度當今保定府之南境據此則凡保定府東北之境清苑滿城安肅定興新城容城雄縣易水淶水皆古燕地當析木之次為箕尾分野其保定府西南之境唐博野慶都完蠡祁州深澤安州髙陽新安皆古趙地當大梁之次為昴畢分野既據唐志則南境應屬尾箕而此又云東北屬尾箕西南屬昴畢再酌之隋名宦張允濟青州北海人為髙陽郡丞按髙陽自隋文開皇初已廢後並未甞置安得有此官允濟在唐循吏傳中其為郡丞必在唐初舊一統志入唐名宦中宜從之又按清苑縣唐武徳初入髙陽郡必唐初復建髙陽郡而史失記也允濟之為郡丞在唐初無疑矣宋名宦何承矩何承矩只載官爵而無事實按承矩開渠屯田捍邉卻敵甚著功績可補入也北齊陳竒河北人常非鄭康成馬融解經失㫖因作註釋與河間邢祐同赴召補祕書太尉祕書太尉疑古無此官滿城縣漢北平縣地屬中山國後漢屬中山郡孝昌中改屬北平郡東魏興和中置永樂縣於其地髙齊省北平郡移北平縣之名於故郡地後周以故北平為永樂縣隋仍之屬易州上谷郡唐天寳元年改為滿城縣屬涿州按唐書滿城屬易州上谷郡非涿郡也遂城廢縣晉屬髙陽郡按晉不稱郡郡應改國瑾賊劉瑾書名似妥瑾賊可易魏璫魏璫書中人魏忠賢亦得隋開皇十六年復置唐縣屬北陵郡唐初屬髙陽郡天寳元年更名定州博陵郡更名定州博陵郡應云更髙陽為定州博陵郡縣仍屬博野縣漢蠡吾縣地屬涿郡桓帝設博陵縣為髙陽郡治晉改縣曰博陸仍為髙陽國治後魏改為博野縣屬髙陽郡隋屬瀛州唐武徳五年置蠡吾州於此按唐書武徳五年以博野清苑定州之義豐置蠡州八年州廢縣還故屬九年復以博野清苑置貞觀元年州廢以博野清苑𨽻瀛州永泰中以博野来屬元和十年復𨽻瀛州後又来屬則改置應改復置葢武徳五年已置蠡州至八年而廢九年又置是當云復置不得云改置也博野縣宋雍熈四年置寧邊軍景徳初改永定軍天聖七年又改永寧軍按宋史景徳元年即改永寧軍而不言天聖復改更考明張貫厯遷貴州按察使以忤劉瑾謫官叅議以按察而為叅議未是謫官但可云左遷南臺御史南臺御史不如改南京御史葢恐疑謂眀時實有此官號耳祁州漢安國縣地隋改置義豐縣唐中宗神功元年契丹攻之不下改名立節按狥忠即完縣立節二録以拒契丹同時賜名前狥忠曰萬嵗通天二年今立節曰神功元年不無互異以唐史考之或當在元年而契丹攻之則在通天二年從唐志俱屬之萬嵗通天二年何如景徳二年景徳二年據宋志乃元年深澤縣元祐元年復置今仍屬祁州蒲隂郡按蒲隂郡入金已廢應止云祁州安州按如意元年析河間地置武興縣後改唐興見唐地理志此安州建置之始似不可畧隋名宦李衍以功拜安州總管按金始為安州隋無此名今云拜安州總管恐誤眀人物邵錫凡書厯代官爵悉用其時官號為雅如明無中丞今云既拜中丞之類或一易之髙陽縣後魏為髙陽郡治隋開皇元年廢郡以縣屬河間郡十六年於縣置滿州大業中廢唐武徳四年復置滿州貞觀初又廢縣仍屬瀛州天寳元年屬河間郡按唐史瀛州郡河間郡盖一郡而二名耳今既云仍屬瀛州不必更言屬河間郡矣且考唐志止云貞觀初屬瀛州無天寳年更屬河間之文楊忠愍忠愍刑於市非死獄中江西省宋書云領郡八按宋書領郡十非八也遺建安晉安二郡開元二十一年分為江南西道採訪使按江南西道初屬採訪使至乾元二年設洪吉觀蔡使領洪吉五州後添領信江二州建中間陞節度府旋廢咸通中復為鎮南軍亦廢置不常是江西一道設觀察之時乆而設採訪節度使之時少宜於採訪使下補舊觀察之廢置元和郡縣志云領郡八按此正江西觀察所領若採訪使所領則有十八郡非止八也唐藩鎮志江西觀察領七州而無饒州然郡縣志所載如此而韓昌黎滕王閣記亦云江西觀察領八州豈唐史未及詳記耶饒南九江道贑南道此分守廵道也不如保定志列於駐劄之府為妥桓冲樵國龍亢人江州刺史後監江荆諸軍事在江州凡十三年樵國樵應作譙冲下不書事考晉史張駿殺督䕶趙毗北叛冲遣将討獲之不敢専决生殺請上疏須報皆為江州事也可補入又按晉史桓冲始為江州刺史後監江荆軍事至桓温卒遂以冲都督揚江豫三州今但書刺史監軍而不書都督似挂漏且晉史所謂在江州十三年者以桓温未卒時而言若以溫死後冲為都督通計之則不止十三年矣蘇孝慈洪州都督按隋時諸州有總管而無都督又史孝慈傳亦言為洪州總管而不云為都督也魏少㳺魏少㳺為觀察使畧不載其政蹟則似不必載諸無事可紀者倣此例元眀善江西左丞按平劉貴時明善為江西行省掾董士選為左丞非明善也且明善終其官未甞為江西左丞應改正解敏一無事蹟但云政聲著聞則此類似可去鄭岳逆濠應改宸濠南昌府武帝太康元年置江州按晉史江州之置在恵帝元康元年此應改正𨽻江南西道注云領縣六増武寧豫寧也按唐史武寧即豫寧盖本名武寧景雲間改名豫寧後復原名未甞析為二縣也考唐志洪州屬縣尚有新吴則所増二縣乃新吴豫寧非武寧豫寧也乾元二年置南昌軍六年廢按南昌軍廢於元和六年六年上添元和字太平興國八年割建昌縣割建昌據史乃太平興國七年又太平興國六年置新建縣宜補入豫章太守兩漢之豫章太守猶六朝之江州刺史唐之江西觀蔡也似宜與江州觀察同編布政司之後至改洪州後則凡為守者皆可入此殷羡羡若不屑為人致書宜却而不受既受之矣而投之於水輕薄不已甚乎此事正足為戒安可入名宦宜削之據前志如張育英趙鼎皆有宦蹟宜補入名宦按前志所載明之名宦如張子明胡夲恵張夲張翥祝翰汪頴吴嘉聰譙孟龍陳紹儒汪佐王天性丁應璧十餘人皆有政績可書而張子明之忠烈胡夲恵之亷仁前志以為明之賢守第一何都不載耶且自萬厯而後前志所未及記俱應酌取補入大業二年改豫章為南昌縣按隋史止有豫章縣而無南昌縣唐書武徳五年始析置南昌若隋時已改南昌唐初又何必析置乎此處宜再考羅從彦仲素以春秋中庸論語孟子之說授李愿中愿中傳其學於朱子此其大者不可不書宋太平興國元年置新建縣於洪州太平興國元年宋史作六年元嬰都督洪州時建閣成命至封為滕王因以名閣按史貞觀十三年封弟元嬰為滕王至元嬰為洪州都督則在髙宗時受封已久且以理言亦不應以已之國號名樓此乃仍一統志所記非事實也應云唐髙祖子滕王元嬰都督洪州時建人因以名閣又謂明時以其舊址重搆額曰西江第一樓按一統志滕王閣外自有西江第一樓今合而一之未審是否謝一䕫一䕫乃廷對第一似不應僅云及第且及第字亦未雅又按前志人物如宋之潘興嗣趙康明趙汝暨元之湯霖明之盧淵陳安魏黙丁錬魏棨郭昇丁以忠似尚可採入鄧以讃㑹元及第似未雅按宋史㑹試第一人曰禮部試第一殿試前列者曰廷對第㡬似可從隋文帝開皇九年廢巴山郡併豐城入廣豐屬撫州後屬洪州仁夀二年改廣豐曰豐城按隋史豐城縣以開皇九年廢至十二年復置曰廣豐今云併豐城入廣豐則豐城雖省而廣豐固在十二年安得復置廣豐也豈廣豐在十二年之前亦經省廢乎再當考定朱全忠以父名城改豐城曰吴臯按五代史全忠父名誠王季友按季友事見於朱長孺注杜子美贈詩後頗詳據殷璠評則謂其白首裋褐據潘淳詩話則季友為江西觀察李勉幕僚是時勉兼御史中丞季友則兼監蔡御史據于邵送季友序則季友以幕僚兼司議俱無第進士及為中丞語也且子美之詩作於大厯三四年間已呼為貧窮老叟若至貞元則又厯二三十年安得復為進士乎為進士且不能安得復官中丞乎此前志之誤也豐城人物前志所載如宋之范士衡王衡仲元之熊復明之范衷李裕范兆祥劉華甫熊卓陸時通朱概尤表表者今皆略去似宜酌増揭奚斯奚當作徯按徯斯累官翰林侍講學士不應僅書編修初授之官又徯斯以詩文名世及修宋遼金三史似應載入舒芬廷對第一不應僅書及第按嘉靖初芬為修撰諌昭聖太后誕日停止命婦朝賀逮訊而無哭廟事又楊慎王允正等以爭大禮不聼撼奉天門大哭是時芬已即訊恐不與此且哭於門非哭於廟也宋書有豫章侯相屬豫章太守無豫章南史宋追封王曇首為豫章縣侯子僧綽襲封豫章縣侯又謂晉為豫章宋為豫寧按武寧縣在晉齊隋皆稱豫章惟宋書稱豫寧而王曇首傳亦云封豫寧侯然自王僧綽襲封時已稱豫章豈縣在宋初蹔改豫寧而後仍名豫章耶再考與汪鈍翁書與足下别乆矣昔别壯也今髪蒼蒼齒摇摇矣以吾念足下知足下之念吾而不謂其非舊吾也日月逝邁道徳不進修名不立竊禄於朝欲如足下托跡丘園不受當時之責烏可得哉易傳有云徳薄而位尊力小而任重每誦斯言頭靣頳熱汗流浹體誠不自禁其愧且懼之動於心也御史大夫古之三公之職也位可謂卑而任可謂輕耶位不卑則受位難任不輕則稱任不易知其難與不易而尸位曠任焉顧念名義其可冺然黙居而但已耶此其所以既愧且懼之動乎心也傳云陳力就列不能者止念國家厚恩尚欲因事納忠報酬於萬一未敢便决然為自私之計也漢唐人拜官輙數舉賢以自代朝廷視舉多者往往進用語云不知其人視其所舉葢亦因是可以察其舉者之賢否而知其所舉者之才葢甞蓄此念矣今世卿大夫士鮮自重至使世疑其沽名聲少實用是以遲廻於中而不果也足下讀書樂道如天雲卷舒其視㒒為何如耶古之聖賢莫如孔子孟子孔子孟子所遇之時最難而終不肯少貶其道變其所説而易其所守今朝廷清明聖天子在上而直以卿大夫士之不能自重取疑於世為解者吾誠不知其何心足下其謂之何耶足下所樂者孔子孟子之道孔子孟子所遇之時如彼栖栖皇皇㳺於列國諸侯卿大夫之間未甞一日不欲行其道不敢於山林泉石偃然俯仰與世遂絶也今足下所為乃異於孔子孟子矣且主上親㧞足下於儕流疊有恩禮視衆人為獨厚或未宜如此而遂已也足下竟何以自解耶乆不通書問因風畧及惟裁擇而教之幸甚荅魏無偽書李君来得足下書意甚勤厚以愧以慰足下名賢子胚胎休光耳目濡染得於心被服於身者將遂致其用於世以大其施僕樸􅈪固陋學無師法少日好為辭章無用之虚言又以才質所限不究於成遂復廢罷雖縈繫簪組自度材力無經世之用常有山林之思欲得一意静坐纔補小學一段工夫乃今問於僕所以立身行已者豈非執盲者而問之途在僕詎不可愧也耶顧所以為慰者以足下名賢子耳目所見聞得之心行於身以致用於世者非僕所敢望而猶歉然不自滿假雖以僕無所知識無所成就猶勤勤懇懇下問如此此其進益寧可意量至使不肖如僕者亦得䝉被光采以自託於一日㳺處之雅使忘其謭劣或亦奮竭其不肖之才以得稍進於道此其所以為慰也雖然承足下之問而僕無一言以荅之則㡬非愛助之意亦望足下養益深學益進益廣大受之地至於擇善之精固執之一足下所親承於父師者非僕所能窺見也在足下勉之而已矣僕近來殊無意於為詩雖偶為之亦不能工足下年正少詩已工如此後之日益工者寧詎止於此耶以工於詩者求進於道又豈僕之所可望者耶詩巻蹔留小遲附内尊翁老先生未敢専啓望致區區之誠惟以時保攝以慰思念不宣與王薛澱書嵗之除夜讀足下見僕二錢説𣙜闗監督劄所為詩二章且吟且思至於終夜喜不能寐嵗之元日朝退暫憩署中意益感奮因自强於善念錢之用為亷為恵介在取與又為一錢説一篇以廣其意夫以足下之才雄於述作詩則清越秀美中於法度而其意指之所存主於勸導規誡與人為善僕之所為誠不足以當歌詠之萬一而竊自喜者謂為知僕之心也僕麄疎頑鈍無以自立於世雖欲竭其愚不肖之力自度無有可合於時惟是冰兢自持所不敢變壊者區區之心而已耳孔子曰不患人不已知老子亦言知希我貴而僕謂足下知僕之心為可喜者豈有所私見哉以足下與人為善勤勤然動僕感奮之意而堅其為善之心也使僕不聞足下之言不有以動其感奮之意堅其從事於善之心則是僕之可憂者莫大乎此今幸而知感奮矣堅其心矣謂之可喜亦豈不然乎昔穆公問於子思曰縣子言子之為善不欲人譽已信乎子思曰非臣之情也臣之修善人知之而譽臣是為善有助也此臣之所願而不可得者也修善而人莫知則必毁臣是為善受毁也此臣之所不願而不可避者也僕之意亦猶子思之意也雖然子路人告之有過則喜孔子謂不見是而無悶亦望足下有以勤攻吾之闕而已自足下而外不知吾者多矣不知則必毁吾亦豈能避之哉能勿悶焉盖不敢不以聖人之道自勉也與韓佚園書分袂以來七易年所時有人至便問興居極知佳勝前接手書記存情文備至筆札之工有加於昔伏讀數過千里外遂如覿面可勝歡慰生平知交落落如吾兄者能復有㡬異時林山泉石投老餘閒闗門學道性命之友舍吾兄其又誰與此往日之素心倦逰思歸繫念彌切仕宦之味今已飽甞迂怪成僻比昔更復可笑雖身嬰塵網此心如坐深山堅白自守誓不取公家一錢已習慣自然人亦不以為異不以為同如世間無此人也盖自昔家世所遺薄有治生之業節身儉用足供朝夕以此都無求於世而二十年來蕭然皆盡矣然守其困約不敢變者亦實不能也盖其平生性質不能以其所不能者强之使能此與吾兄三十年寒牕燈火時所深知而篤信者也亦何足道哉然每念吾兄家居澹泊亦竟愛莫能助故人知我但區區鄙懐不無自愧亦惟故人愛我是以具道其所以然者不覺𤨏𤨏耳長安路回首使人索然又恐吾兄徒有跋渉之勞斷可勿萌此意非相知之深不敢輕率及此附寄薄物唯哂存之不具與楊都諌書頃承見過語次及玉堦玩易篤事親孝二事僕所撰玉堦墓碑盖専以講學櫽括其生平故於玩易之篤略見之矣竊以自昔伏羲神農黄帝堯舜數大聖人皆孝子也伏羲神農黄帝堯不以孝名而舜曰大孝者以其處人倫之變也葢瞽瞍傲象之事聖人直以安常處順為心天下萬世見其所遭人倫之變如彼而所處之善如此故以大孝名之然而非舜之志也孔子孟子特以此教天下萬世之為人子者曰不幸而有父母兄弟之變則當如舜之所為大孝者耳非謂伏羲神農黄帝堯之孝皆不如舜而舜之孝獨出於數聖人之上是以數聖人之孝有不必皆稱者也甞見朱子解周禮師氏之官以三徳教國子一曰至徳以為道夲二曰敏徳以為行本三曰孝徳以知逆惡以謂至徳云者誠意正心端夲清源之事道則天人性命之理事物當然之則修身齊家治國平天下之術也敏徳云者彊志力行畜徳廣業之事行則理之所當為日可見之跡也孝徳云者尊祖愛親不忘其所由生之事知逆惡則以得於已者篤實深固有以真知彼之逆惡而自不忍為者也又自注云至徳以為道夲眀道先生以之敏徳以為行夲司馬溫公以之孝徳以知逆惡則趙無愧徐仲車之徒是已由是言之有明道之學術不難為溫公之事功至如趙無愧徐仲車之所為則固已恢乎裕如矣玉堦之學将以求進乎至徳以為道夲而所謂敏徳孝徳以為行夲以知逆惡者盖將真知而力行焉故撮其生平而以講學為説有無俟乎兼陳而備舉者焉而玉堦之得乎已而傳於後世者已具於吾説之中盖亦自以為此或者古人立言之體當如是也僕誠愚陋無所知識與玉堦同學久重以其孤之請而亦有所不能自已於中者故不辭而為之銘未知有當焉否也幸髙明有以教之拳拳切望不宣午亭文編巻三十九
