body:
  text: 午亭文編巻三十八大學士陳廷敬撰記體仁書院記澤州書院始宋宗丞伯淳程先生先生以治平四年由上元簿為晉城令晉城今州治也先生道大徳尊光被天壤至其所以為晉城者當五季迭亂金革創殘之餘禮樂詩書絃誦之習久而未興先生多設鄉校擇秀異之民羣萃類居教之以學親至其處為正句讀晰文義使知入徳之方孝弟忠信禮義廉耻之道熙豐中士之儁者連收科目而人俗以厚魁傑忠廉守節善道敦行而文者徃徃介出其間迄於今風行澤流聞而興起徳化之盛猶有存焉先生鄉校之設最近治者故在北城之外此書院之所自昉也今則平壠遺墟舊跡冺然盡矣前明州守王君建文昌書院於張公祠左其後鹺使楊君更其名體仁書院檄州守徐君祠先生於中以伊川張邵朱吕諸先生左右列而配焉謂祠為先生設也未及百年墻屋圮傾蔓草寒烟蕪廢不治康熈壬申之冬灤水倫君來守是邦閱明年治和人安景先賢之遺烈修祀事祠下愾然興歎作而新之不勞民功而役者子來旬月之間聿新鼎構俎豆絃歌講肄之地有如曩昔既訖工命余記之余惟昔者先王之教有學有祀禮凡始立學者必釋奠於先聖先師又凡學春官釋奠於其先師秋冬亦如之鄭氏謂先聖周公若孔子先師如漢禮髙堂生樂制氏詩毛公書伏生古者建立學校未嘗不以祀為重事蓋有學有祀先王之教也然當其時自國學至校序庠之鄉學莫不有定制而祀無適主意古者堯舜禹湯諸聖人或以為聖或以為師皆其必祀於學者今不可考則亦不敢臆論矣故康成謂周公若孔子者非斷詞也而先師則因其時之所尊者而祀之故鄭氏謂如髙堂生制氏毛公伏生之流也大司樂凡有道有徳者使教焉死則以為樂祖祭於瞽宗是以記又曰天子視學命有司行事祭先聖先師焉夫天子視學於成均則祀先賢於西學者所謂祭於瞽宗也春秋戰國亂世猶有聖賢為之師秦漢時猶有専門為之師皆祀於學漢髙帝過魯祠孔子明帝行鄉飲於學校祀聖師周公孔子猶未知所以獨尊孔子之義也魏祀孔子於辟雍以顔淵配歴晉宋齊梁陳隋皆以孔子為先聖顔子為先師唐武徳中釋奠於太學以周公為先聖孔子配焉房𤣥齡建議升孔子為先聖以顔子配焉髙宗永徽中復改周公為先聖孔子為先師顔回左丘明從祀太尉長孫無忌駮正云漢魏以來顔回夫子互作先師宣父周公迭為先聖貞觀之末正夫子為先聖以衆儒為先師由是以來州縣之學廟祀孔子以顔子曾子子思孟子列於廟堂之上庻㡬得古者祀先聖先師之意矣余間嘗竊有議焉稱孔子曰至聖先師則是先聖先師並為一人揆之禮經未盡其義也雖以顔曽思孟四子者猶不得謂之師則是如髙堂生制氏毛公伏生之流反得謂之師矣今以顔曾思孟不得謂之師而謂之先賢而欲進濂洛闗閩諸子者而謂為師勢必有所不能然則禮經之義鄭氏之説將遂不明於天下矣乎濂洛闗閩數子者繼四子之後以明孔子之道者也孔子之或為先聖或為先師歴千百年而始有定論然則後或十百年或千百年安知諸子之賢不得與四子者並而列於廟堂之上也哉茍使數子者並四子而列於廟堂之上將無近於古者釋奠於其先師之意與亦庶㡬其祭於瞽宗之禮也今夫儒學猶古之學也文廟猶古之祀也體仁書院為先生而立祠先生其中並有合於先王之教有學有祀之義可不謂盛事與而余謂先生之祀當列於廟堂之上援據孔子或為聖或為師歴千百年而始定之說以見聖賢之道久而益尊如先生者既以其特祠為有合於禮而又致望於後之知尊先生之道者為是説以諗之若夫邦君之徳政吾不敢以諛諸生之學業吾不敢以規有先生言語行事在焉勉其不逮而無失其已能者是邦君之徳政也夫是諸生之學業也夫也紅亭記康熙十七年閏三月二十一日子與侍讀王君貽上被召入直乾清宫之南殿宫中所謂南書房者侍讀學士張君敦復晨夕侍上之直房也予與貽上入直二十有八日而與敦復覩宸章之巍煥仰天藻之昭回見聖天子萬㡬燕閒從容於文章翰墨之娛而侍從之臣䝉恩寵而被清光有歌頌所不能形容而言語所不能紀載者遭逄如此嗚呼盛已至於宴賚之便蕃尚方珍食日賜者三而湯茗果餌特出上命者日一至焉方是時含桃始熟大官初進御命徹御前盤以賜之自是則日以為常風露醲郁色味兼美諸臣日得饜飫焉蓋自予與貽上入以及出含桃之賜相終始云出之前二日敦復語予曰他日歸江南置隙地為園搆亭其中名其園為學圃之園名其亭為也紅之亭子為我記此亭也杜子美之詩云西蜀櫻桃也自紅亭名之取義以此也夫以子美之不遇時俯仰今昨感愴興懐以自寫其意於咏歌嗟嘆之間今敦復之意何取於斯耶吾見敦復起史官天子特㧞擢位之論思之列去年冬思得經術文學之臣以朝夕左右而敦復長直内庭眷遇至隆一日之中恒在上前暫退輒復宣召或當食吐哺疾趨宫門漏下十許刻廼歸日夜無暇是敦復立朝之日多家食之日少即有亭又烏能居也然吾嘗觀古之君子功成名立而身不居如子房之慕赤松李泌之歸衡山流風遺韻輝映史冊焉敦復出其㓜學壯行之志見諸事業功成身退優㳺江湖之上而繋思廊廟至於一物之微一食之頃不忘君父如子羙之詩之所云其亦將有取焉者與且吾聞江南多名山水江山之樂風物之美余夙願逰焉而且有卜居之志也異日買田鍾阜之傍築室青溪之上扁舟徃來泛大江渉南湖以時得從敦復逰敦復館我乎亭中相與流連吟嘯而天子念敦復舊勞時遣使存賜其家余於其傍復得沾大官珍味與敦復唱予和汝以歌詠聖澤於無窮則又非子美之詩所可同日而語者已老姥掌㳺記上黨南三百里有山曰方山又南十五里曰洞陽山又南十五里曰樊山上黨地形髙天下此三山髙出地上皆直下萬仞由樊山則枝分條披狀形竒詭嶕嶢而為峰窈窕而為壑﨑嶇而為𡼏崚嶒而為㠋嶻嶭而為巘岪㠨而為巒岭巆而為岫􅩩􅛒而為巗其又南則砥柱析城岩壁重複峭竦如樓堞嵯峨如墉隍如玦如環繚絡數百里其中長川夾岸若斷若連如海波斂而島嶼出如江潮平而洲渚生村居静深闗扄奥閟蓋陟樊山之巔皆見焉余家樊溪東涘在山之南開門見山測以圭景南北相峙不失杪忽則仰觀夫樊山之為狀也如仙卿冠帯而立其上又如鯨張鱗如鳳舒翼委蛇而下而其東則如巨靈奮臂隐然信其指爪上捫太清下揮空曲有曰老姥掌者向所謂峰焉而嶕嶢壑焉而窈窕𡼏焉而﨑嶇崿焉而崚嶒巘焉而嶻嶭巒焉而岪㠨岫焉而岭巆巗焉而􅩩廓數十里之内聨嵐亘暉俯可摶擷如置諸掌昔以掌名肖其形矣信異境矣哉其下則古松流水渺然非復人間余時㳺而樂之蓋嘗數宿而不能去也夫去山數十里而近而峰壑巗巒之羙已如此况所云數百里者吾雖未能盡㳺焉而已坐挹河山之勝他日雖得盡逰其處亦何以加於此樂也與陟屺樓記嘗讀詩至陟屺而愴然以泣也余弱冠通籍官京師五年謁告歸省覲吾母間謂余曰吾念汝當風雨晦䝉茫茫逺路兀然尤欲斷腸鳴呼母之言何其悲也陟屺之詩云嗟予季行役夙夜無寐上慎旃哉猶來無棄詩人之意不過憐其去而望其來歸也余毎讀之而泣者以詩人之㫖不悲於吾母之言而母言尤為可悲也方其時母年尚盛余去母㳺五年耳而言之尤可悲已如此其後三年廹父命復出出踰十年不歸逡廵至於大故遂抱終天之恨思此十餘年已來母年漸就衰矣計其年月首尾三四千日其間天時之晏温而無風雨者㡬何日晦䝉而茫茫者不知其㡬千百朝昏也以就衰之年加之以風雨茫茫兀然膓斷積朝昏如此之乆則其心之悲而不得一言言之而尤有可悲於曩時者當又何如耶由陟屺之詩是古之孝子仁人雖善言其母思子之情不若母之自言其情為可悲由吾母之言則是雖古之慈母自言其情終不若吾母之言之為尤可悲也吾居母墓左去數武有三楹之樓夜則栖於此每當隴風蕭瑟山雨凄迷追念吾毋曩時之言而歎詩人之所不及所以愴然而泣者寧有終窮耶然而名其樓曰陟屺者聊以志吾之悲焉耳百鶴阡記廷敬為先太夫人卜兆於樊山上開阡北嚮廻接洞陽岳神二山圭景適中符節如契蓋自洞陽至阡三山皆㧞地千仞迥出萬峰之上昔人謂之洞天其佳處者也阡去山巔不能百步然自洞陽逶迤而至岡嶺聯緜豐原壇曼紆徐開舒若鳳翔鸞舉行㳺長空而悠然偃息於此也陟阡之南而下視之百里之内厎柱析城王屋皆在焉卓立挺聳羣望北山若拱若向若鶱若騰其靈境矣哉己未秋中聿來井椁初吉之午有鶴來萃不可殫數翔於雲際自西而東盤旋容裔翯羽繽紛若雪若雲鳴唳寥亮如奏笙琴乆乃後去於時見者聞者莫不跂跂睢睢驚喜詫異或謂山故靈境鶴斯集焉然異時不聞有鶴至止者也且余生長於晋亦不見晋之有鶴北之燕南之宋衛之墟亦不見鶴於今忽有之且如此其多而盤旋鳴唳於新阡之上久而後去則誠非偶然者矣夫鶴仙禽也道家謂之仙人之騏驥是鶴之來有乗之而來者耶史稱陶侃居母憂於墓下二客來弔化䨇鶴飛去說者謂陶母與侃皆非塵世中人故母截髪剉薦翼其子以顯而士行卒為晉名臣今廷敬浮沉仕宦進不能樹勲伐以自顯又不獲乞身以退避賢者之路其於士行無能為役且吾母𦵏後廷敬廬於冡下者且二年亦不見鶴之來唁則昔者之鶴其非為吾來明甚夫荒忽遼邈之中誠不可究詰矣而百鶴之盤旋鳴唳於新阡之上又乆而後去則衆所見聞其為吾毋而來不可誣也夫陶母既𦵏致二鶴之弔吾毋之兆方啓而致鶴如此之多吾毋之賢於陶母此斷斷信而有徴者矣若廷敬者既於士行尚無能為役况敢望夫大賢君子之門墻者此余之所以自恨而深悲也名阡曰百鶴蓋所以志吾之自恨而思吾毋之賢因以寫其深悲焉爾陽城白巷里免城役記前明太子太保吏部尚書疎菴王公國光為户部尚書時朝廷命有司即其所居之里為治第以寵之公謝不敢當既而曰君命也不敢辭顧竟以其治第之金甓陽城縣城城故不甓陽城之城至今甓自公始也當公之時天下承平無事後數十年流賊起秦滋蔓天下冦晉晉郡縣㒺不破壊者攻陽城城卒賴甓以完賊無所得引去其後天下數更變故城不被兵甓之功為多焉去年秋霖雨城之復于隍者且甚縣令延津都君更築之一縣皆受役白巷者公所居里也里人援公前事言於縣曰公甓縣城城數得不被兵公功誠多宜恵及其子孫請免役都君咨於縣之人縣之人曰吾儕安朝夕而脱兵燹繄誰之使然乎公甓兹城厥惟公功宜恵及其子孫惟免役於是白巷之免城役志公之功於不忘也嘗竊觀明之盛時徃徃為其臣出官帑治居第髙檐巨桷彤髹雕煥者今或為公廨馬廐矣居髙位享厚禄或多營良田美宅連阡陌而溢衢巷者今或數易主或化為頽垣敗壁荒榛蔓草矣而公嘗所甓之城巋然獨存於世所賜之宅子孫䝉業而安焉較其得失為何如耶余聞當萬歴間江陵秉政公於是時同而能異特立而不阿其事蹟載冊書而功名被天壤者豈獨其一鄉一邑之故云乎哉而其及於鄉邑者鄉邑愛慕之子孫享保之則其及於天下者可知矣彼夫全軀命而隳人之封疆保妻子而悮人之家國不旋踵而身家破滅邑里羞以為鄉人子孫羞以為祖父者深可悲也嗚呼百世而下觀乎此者其亦可以感興也哉存誠堂記學士張公敦復以上賜御書存誠名其堂命廷敬為記記曰經言誠始於伊尹其告太甲曰鬼神無常享享于克誠而言存誠則昉於孔子其釋乾九二曰閑邪存其誠乾六位五與二其所釋義尤合焉於二始則曰龍徳而正中者也既則曰君徳也而其大要根柢於存誠所謂善世而不伐者誠然後善所謂徳博而化者誠然後謂之徳也存誠之義大矣哉五之辭曰飛龍而二亦曰龍徳五之位君也二之位臣也而二亦曰君徳譽之至也孔子豈不知君徳之不可輒儗諸其臣哉若以為古之人蓋亦嘗有是言也云爾始言誠者伊尹也伊尹他日又言惟尹躬暨湯咸有一徳克享天心一徳即嚮所謂誠也克享即嚮所言享于克誠也伊尹既自言與其君咸有一徳矣則孰謂君之徳不可以輒儗諸其臣而臣不當以君之徳為徳也哉且其見於書者豈惟湯與伊尹為然乎堯舜之臣臯䕫稷契也文武之臣周公召公也髙宗之臣傅説也使臯䕫稷契周召傅説有不與其君同徳者則不可以為堯舜文武髙宗之臣也明矣今聖皇好古㳺藝窮極至道掲存誠之訓灑宸翰以賜近臣而朂之以誠蓋所以期待之者大矣順親信友獲上治民非誠無由也而其至也可以享鬼神而格天心臣之事君君之事天胥於是乎在公遂以名其堂朝夕觀省庸自底厲以庶㡬於古君臣一徳之義將見天下頌之海内傳之簡冊書之曰惟吾君暨臣張公咸有一徳則阿衡不専美於昔而喜起復見於今矣此豈獨公一身之寵榮哉吾故以望之公者而為之記三晉㑹館記尚書賈公治第京師崇文門外第之東偏作客舍以迓以勞恵於往來以館曲沃之人一日牓其居第之門曰喬山書院喬山者古曲沃地也予過入而異焉問之公公曰喬山吾父母之邦也吾欲使鄉之子弟挾書冊考徳問業㳺藝於斯焉以是割宅以北為書院也一日又過公公從容語予曰吾欲使鄉之大夫士從宦於京師者嵗時伏臘以時㑹聚敦枌榆之義飲酒獻酬雍容揖遜宴處㳺息之有所也割宅以南以舘三晉之人子以為何如予髙公之義作而言曰天下之物茍為我所自有未有不思詒其子孫者也然金谷之池臺平泉之水石旦暮而失之矣京師天子之都貴人富家侈土木之費楹桷雕煥飛甍蔽虧行路指目一再過焉而不勝盛衰興壊之感彼之念其子孫者何如耶而公舉所以遺子孫者共之鄉人如脱敝屣然蓋其所見者逺矣夫天下之物有什伯於宫室者矣苟處之得其道與宫室亦無以異也而此又何足為公疑哉或曰公之於三晉之人也於都市有燕勞之館於慈仁寺有餞别之亭皆出已財以經畫之今又有兹舉不亦易於與而傷於恵乎且公兩以節鉞鎮撫四方功徳在當時宜子孫世世守其業者也今以予鄉人将傳舍視之安必鄉人之能善守之者予曰不然公朝廷重臣雖天下大器尚能不動聲色而置諸安處况一居第乎公之為此蓋必有其道矣公之所以遺子孫亦必有其道矣盍相與成公之羙乎公曰子之言善請書之石賜㳺西苑記康熈二十五年秋七月九日上在西苑召左都御史臣廷敬侍郎臣乾學學士臣英侍讀學士臣士竒編修臣杜訥賜饌於苑中近侍導臣廷敬臣乾學入自勤政殿左門殿門皆北嚮闢以順時宣令上親題額自警御以聴政事非猶夫避暑之宫追涼之殿也蓋雖駐蹕所在未嘗一日不與羣臣相接見炎景仄而方食曙星在而求衣惟勤惟専由輔弼暨百司承令之屬承寵問被清光亦無一日不得至於斯殿也自殿角趨南陟横廊徑小軒以西上講藝論思㳺息深嚴之地稀有得至者軒裁廣一楹顔曰知稼出知稼軒疎籬草花被徑周阿蕭然有閭井林野之思迤西數武秋禾方畝望之如雲前有亭曰秋雲英士竒杜訥三臣者先在焉階而升鵠立以眺維北之院曰豐澤維西之軒曰嘉穎自知稼至嘉穎蓋皆取諸農事為義或采椽斥題不斲不枅或白屋版扉不施黝丹無綺寮重廡文鎞鏤檻之飾盛矣哉堯之土階文王之栝柱大禹之菲薄衛文之節儉也后稷公劉之所樹藝而無逸豳風之所書載也臣顧諸臣而言曰於戲上聖徳至矣吾屬慶遭逢辱恩禮其何力之能報諸臣皆相與讃歎皇恐稽首即亭中秩坐時乆雨新晴澂波映空動植遂暢魚鳥欣恱頃之芳筵載列而臣等凌兢震越就匕箸如不勝滋懼素餐食已中使就賜御書及内製法瑯塗金香鑪缾合各一玉軸寳題雲章爛然鑪烟尚温合有香實顧惟恩出非常心魂慙悸中使既復命臣等九叩首以謝既退竊自念曰古者人主推食加籩或寵以翰製或錫以御飾器物所以勸勞能待賢彦也臣田野窮賤才質璅微擢歴臺司日侍禁闥飫賜便蕃嵗時霑被未有寸尺禆補而上意疉至如此此臣所捐糜難報之恩也已又念賢聖之君必恭儉勤民恭儉故親賢禮士勤民故重本興化而飬賢及民維古志之臣嘗誦詩而通其義焉解詩者言由庚人君調隂陽育品彚萬物得由其道也南有嘉魚樂與賢也崇丘萬物得極其高大也南山有臺樂得賢者由儀萬物之所生各得其冝也詩之更相互見明得賢所以養物也既天下無事澤及四海故次以蓼蕭湛露而燕賜之盛興焉以見夫得賢之效至此為極而為天下之所歌樂矣故又終以菁菁者莪也此非賢聖之君其曷能之兹者上恭儉勤民聖徳之至巍巍無極不以臣等之非賢而過禮遇之如此則夫巖穴道徳之士孰不思接迹於王廷效忠竭智以䇿功名而顯當世哉此又臣之所深慶者也故竊附詩人之義既為詩五章以咏歌盛事又謹記之如此云鶴湖垸記江陵湖水在其東曰長湖以其東又名東湖東更三十里又滙而為湖曰三湖湖有三也又名之曰鶴湖鶴湖之義不知所緣起或者曰謂其有鶴夫鶴之有無誠不可知然更數十百年亦未見有以鶴之故顯然著稱於時者故其因義以立名莫能知焉自長湖至於鶴湖堤樹渚花繁藂長薄交踈蔽虧於煙波浩淼之間水開林起土壤蒼然則少司馬張公箸漢之所居也曰鶴湖垸楚人謂園圃樊落之屬為垸讀為苑若苑圃然箸漢之所居有園亭垣籬之觀焉故因其俗名之曰垸而湖之以鶴名者蓋至於箸漢而始大著其義焉先是箸漢官京師而歸也䨇鶴集其洲沚之上自銜草蘆為巢巢髙五尺圍大倍之嵗孕兩雛其中積雛以十數客至則擊柝為符信召鶴鶴輙率其所孕雛翔舞庭中客去然後已自是以為常鶴不去湖者十年餘箸漢亦家居十年餘此鶴湖之名所由以大著也及後箸漢來京師鶴遂去不復來今年箸漢請急歸上章曰臣先壠在長湖傍湖波浸壠不治且壊臣不可以不歸省於是天子使使問長湖在所箸漢指畫以對天子嘉其誠孝予假遣還箸漢即日駕載道過予取别且為予言鶴湖垸之故予曰異哉昔孔稚圭之作北山移文也曰蕙帳空兮夜鶴怨托借為辭非真有鶴怨主人之不歸也而鶴湖之鶴以箸漢之出處為去來何其依戀之深與夫鶴之為物孤㓗閒逺其髙標清韻㢠出於毛羽之羣張公之行意其有近於斯者乎故公出而鶴去歸而鶴亦將歸也方今聖天子坐攬皇輿之勝江山萬里如在黼扆玉几之前嘗圖畫其山河湖江朝夕省覽欲備知原隰川澤險易之所宜以扶育民物與為張弛而化調之江陵長湖之間寓目者熟矣而因公之言復拳拳長湖之為問則上之眷念公者何如公雖欲優㳺久處於鶴湖之上其可得乎雖然公之行類於鶴者也詩曰鶴鳴于九臯聲聞于天言君子徳譽之升聞也易曰鳴鶴在隂其子和之言明良一徳之相恱也公以九臯之鳴起而為在隂之和其髙標清韻不以出處而有異也巖廊粉署獨不可為公歌招鶴之詩乎射虎記樊山上有虎自吾居山中避去數月已又復來有跡可視獵夫且伏弩射之或曰虎有知能避伏弩或曰虎非有知也阡東五里外農家有牛晨出暮歸歸則喘汗且卧農察其狀有異晨尾牛之野見虎來與之鬭虎不勝而逸明日農縛刃牛角而縱之虎中牛角刃立死農剸虎張虎皮於石明日牛視之以為虎也復與鬭角觸石牛亦死虎夜騎人屋明日人穴其所騎處虎夜復來則下其一蹄穴中人以鐡鈎引虎蹄而縋以巨石乘屋擊虎虎斃人燃火炙虎蹄蹄收縮知其佯斃也遂復乗屋大擊之虎乃死老婦人攜其二子遇虎於道婦人被虎嚙大兒摶虎不勝小兒以馬箠中虎睛虎痛摩其眼婦人與兩兒得脫去虎痛定追上山山上人轉石壓虎虎死余在山中所見聞如此虎卒不勝人蓋徒以其氣力爪牙異於百獸耳非果有知也今有貎人而虎行者豈得謂為無知也哉然鮮有虎行而能自觧免於人禍者則亦終歸於無知而已矣其可哀也後數日果伏弩射殺二虎郭先生逸事記郭先生文雄字鳴上文水人居太原為諸生以髙選貢於國學竒才多逸氣不事家人生業耻與俗伍喜交㳺四方賢儁名流時以其意寄之於酒東鄰有王生好髙論嗜酒俗人見輒避去郭先生獨喜與之㳺王生擁貲數千金種秫嵗釀酒數百石兩人閉門髙飲間醒則吟誦書詩以自娯樂與世人絶不復通順治中余年十七省試於太原是嵗試人多至滿棘屋别編葦蓬以居余適居蓬中與郭先生交膝坐心異其人既散明日郭先生携王生載酒過余又三年余再試於鄉至則獨見王生主其家郭先生為選人於京師蓋至是王生貲且盡初郭先生意多所忤蕭然寄食於王生王生傾囊倒廪以奉郭先生歡郭先生安之余嘗見世人居室雖親兄弟以㡬微有無見於顔色或操戈搆釁甚塗人者不可計數今兩人友耳王生盡貲無吝郭先生受而安之是皆有不可及者余由是益異之其後郭先生為令於崑山王生適過之郭先生為令清念王生義不得忘以千金為王生母夀王生揮其金不顧曰君為廉吏而以千金贈我是凂我也義當與君絶王生拂衣去逰太行山谷間時時過余家郭先生為吏自苦無何死於官無妻子崑山人憐之𦵏之縣中山原之上送𦵏者數萬人號呼闐咽街衢至𦵏所不絶起冡立祠其傍吏民歌思之至今不衰王生後為小吏於南方過余言曰吾不能折腰牛馬間竟棄去不顧郭先生生而無室家獨以其生平所自得施於吏民朱仲卿所謂桐鄉民愛我詎不信與郭先生無妻子即使返𦵏視朱公言後世子孫奉嘗我不如桐鄉民其意尤堪悲天既生才矣而困苦折辱之使之無以為家而託命於友生非王生之髙義郭先生將遂偃蹇以死不得至於為吏既為吏矣且死無以為𦵏而崑山人𦵏而祠祭之久而歌思之若是則造物者之果無意於斯人耶抑亦郭先生之懐才奮義有以自致之而然耶王生有子余覘其皆能有所成立王生雖貧以老而不靳其後天之果非無意於斯人也故世之人有如郭先生之所遇者觀其為吏可以彊為善也已吏部侍郎徐公果亭崑山人也語及郭先生使余記其軼事以王生之賢故牽連書之王生清源人名鼎若郭先生之善政遺愛在崑山者崑山人述之今不備書也記女奴景事女奴景贅夫柴乙皆從予京師乙病景輿以歸及家而乙死既瘞景時節哭瘞所虎銜豕來熟睨景景哭極哀不見虎樵人遥見呼景景近虎尺許虎卒不傷也其家諸柴數逼景嫁不從朝夕虐酷之居二年人或益不堪謂當以告吾家景曰吾居主家久主嘗不預外人事吾柴氏人豈以吾事累主耶諸柴愈匈匈環伺将奪之景乗夜奔訴之縣道遇虎當路景趨過虎傍虎卧如故景抵邑門坐守至天明門開趨縣庭號訴縣令哀其情召諸柴數而箠之後令行案境中景遮道訴又數而箠之愈箠虐愈慘景非死無所之矣乃念乙死時言主家遇我厚我死終不能報主人恩甚恨之景於是提攜其九嵗女六嵗男泣涕匍匐乞食野宿走京師行五閲月而逹計程二千里中多峻山大水水潦秋方盛深及要腹以上景凡渉水則先負一兒抵岸再返負其一兒日數渉渉㡬死者數矣蓋其艱如此至之日家人以告予詢之言歴歴感其事不禁泫然泣下左右觀者無不皆泣女奴微者耳名義所不責而能卓然自立使人感動如此此豈非出於其至性者耶夫士大夫之行其大於此不可為量數而能如景之出萬死一生而不變者誰哉或曰景習於主家蓋道誼所薫染也夫士大夫豈無載籍師友耶而忠孝節烈之行往往存於椎魯僕婢至義足以馴猛獸誠足以濟生死百世之下將有聞而興起者豈以其微顯異哉故傳其事庸以告天下之為士君子者午亭文編巻三十八
