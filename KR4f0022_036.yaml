body:
  text: 午亭文編卷三十六大學士陳廷敬撰序贈靜明子序余行天下見磊落權竒之士其人皆超然髙舉不能與世近顧余獨慕好其人其人亦翛然翩然引而余近也比居里中與時俗相偃仰有客過豫而笑問之向者夫子接塵而遊不肯耽偷懦習軟熟見蠅營蟻羶者思掉頭脫去故所求與遊大半皆權竒髙舉之士今則為纎人頑夫之行雉媒之翳以求龍友宜歷落俊邁非常之人去夫子而不顧也余嗒然無以應久之訪舊遊於里中靜明子居環堵之室鍵戶觀物蓋與世絶不通者壯而且老矣今年已八十道日以髙守日以固益落落不與世通余欲越阡度陌契濶相存追憶向者班荆畫灰之語為雞豚田社之遊而邈然不可遂得回念客之言是也甚矣哉余之傎也夫居無何靜明之子從余遊致其父之言曰老人非好為固也辱夫子之知今老矣不可以俯仰於時以辱夫子夫子有意於老人其贈之以言乎雖然余何以贈之嘗記靜明子少時英姿䓪儻經竒男子也影塵鈎瑣身事蹙迫斂其輪囷陸離之才潛摉載籍儒墨道德隂陽名法六家之書抉摘鈎稽得於心而適於用也若數甲乙而傾庋篋也而尤精於律歷之學立術數揆儀度觀璇璣之運審三光之行推前校往協律正紀授民時而成嵗功與新法悉合而考晰歷元綜校分度其說尤為精密蓋其籠挫七曜探索三垣重黎羲和者流而甘石二家所取衷也豈猶夫兔園村夫子咿唔一卷書以自號為儒哉靜明子自閉關以來掃除所習故學而獨好黃老之書箋注道德經其大指如太史公所云六家之弊曰神太用則竭形太勞則敝故剸務先定其神而獨以道家為宗嵇叔夜曰非淵靜者不能間止老子曰知止不殆經言能慮能得而本之定靜靜明子其有道丈人也與哉夫道則吾不知余知靜明子深於律歷者也歷家測圭景察經宿睇視弦望晦朔光魄虧盈以定其符驗皆可得而見者孟子以為千嵗之日至可坐而知也夫何以斗二十一度去極至遼矣日在焉而冬至而羣物於是乎生焉此其可見而不可見者存夫黃鍾萬事之根而律首焉冬至萬物之初而歷始焉此其不可見而天下之可見者莫大乎是推之至於月先建子時平夜半天地貞觀日月貞明天下之動貞夫一者靜明子於天地人之道必有以窺其微矣他日余將毁關撤垣造膝而問焉毋徒使客謂余不能得天下竒士漠然相視而笑也送關同年序同年生江陵關君以華漢忠義苗裔也按忠義傳先主收江南諸郡以忠義為襄陽太守及西定益州拜忠義董督荆州事迹其生平在荆襄時為多後因攻曹仁於樊曹撡勸孫權躡其後引軍還權已據江陵盡得忠義家遂以此終是其家在江陵者當孫曹姦譎搶攘亂離之際僅有存者雖其譜系不可深考而自漢以來宗老相傳則君為忠義苖裔無疑也由漢至今江陵之關蕪顯者君以國朝順治丁酉舉於鄉戊戌成進士仕為寶坻今有廉能名居三年坐失察逃人奪其官寶坻民叩天子閽白君愛民狀主上閔然為民許留君再為寶坻令又三年㑹薊州缺知州君權其州事又以失察逃人奪其官歸江陵君於是不復求仕矣今年秋籯糧杖䇿走千里謁余於荒阡墟莽之中謬謂余士不用於世則亦已矣而終不忍不白其所志貽家世羞聞子以古人之道自任所為文章以定是非别同異曉當時而傳後世也若以華之賢不肖其出處進退將求折衷於夫子焉余語君子神明之胄而王國之光也漢至今數千百年而江陵之族姓無有聞於世者及子之身而實當國家之盛乃三仕而三已焉夫以忠義之靈不能庇其孫子使數千百年之間淹厄而無聞忠義之不私其親固如是耶抑子之命定於天而忠義以忠順直方之性不肯逆天而行其胸臆耶抑又人世之榮辱得喪與鬼神之見各殊巳者之得未必不如仕者之失耶三者之說子必有以自信焉知其若此而何愧乎為忠義之苖裔也與君留信宿而去書其語為贈别之序送汪悔齊使流求序國家受命宅中統一方夏威燀旁逹覃及無垠至於海外罔不震懾悉享悉庭其有阻疆自雄悖暴淫逞則不憚取亂侮亡奮雷霆百萬之師臨其區域立就殞滅於是天子曰嗚呼豫一人受天顯命盡天所覆以界豫有家惟天眷在德務廣地者荒務廣德者强乃顓任仁義禮樂教化以保惠黔首懷柔逺人流求自先朝奉職貢為外臣不懈罔愆康熙二十年冬中山世子尚某遣陪臣某表奏其先王喪乞嗣封爵禮臣議流求越在海外道逺宜以冊命頒給陪臣不遣使便於是陪臣某具狀陳乞欲得天使為小邦榮寵其時天子御門覽狀臣廷敬實侍起居上曰海邦嚮化宜遣使宣布朝廷德意如陪臣請且宜得通經術善辭命可使逺方絶域者下公卿臺諌推舉臣廷敬退而謹書其事於冊公卿臺諌廷推翰林檢討臣汪楫為正使中書舍人臣林麟焻為副使上曰可二臣銜命行有日矣輦下大夫士能為詩歌者競賦詩以壯其行汪君不以余不能文也而屬豫為餞别之序余舉一觴謂汪君曰嚮者廷敬侍起居親見上之鄭重遣使臣也夫余與君歷玉堂升清禁從容侍從之班見主上聖文以開太平神武以遏亂略載之左右史者多矣而大要於仁義禮樂教化之大以保惠懷柔夫天下者尤孳孳焉汲汲焉宵衣而待旦日中不暇食逺人之來其亦聞風慕義而至乎傳曰於逺人則修文德以來之既來之則安之傳又有之招携以禮懷逺以德上之鄭重遣使臣之意其必有所甚念於此與且吾聞古稱流求驍健喜擊鬬攻刺其俗多與中國殊乃今或者又謂好禮義恱詩書安知今之俗不異於昔耶然則宣達國家以仁義禮樂教化懷柔之至意使之服教畏神廪廪聖化暨環洲島而處者永為冠帶之邦不専屬於君之此行與使成而旋必有以此稱塞上㫖者廷敬又將執簡而書其後送翁寶林尚書豫假遷葬序士當窮厄離密親逺丘封提書遊四方不憚道途之勤羇旅之艱者凡以求顯名美仕也及循覽昔人行事見其獵聲名耽祿利有危如顛跌倀倀焉而不思止者則心鄙之或有有才無遇遇而輒困苦若不容其身者又未嘗不太息想慕歎惜其為賢故士之仕也守難進易退之節或長往而暫歸者亦凡為仕所宜焉耳矣豈必有道之士能乎哉而卑俗時士之論有異焉曰士大夫引退乞身當於寵盛志得之時斯可以為榮矣若寵渝志失欲退而不能或能退而祗以為辱也余之說不然士君子進退於時度可不可耳豈計榮辱哉是說也惟有道之士能之古之人有欲退而退者晦菴之立朝是也立朝四十日而退而晦菴不以為辱有欲退而不免於辱者伊川涪州之行是也而伊川不以為辱有欲退而不得退者司馬君實之居洛是也居洛下十五年而當時且以為榮是何也三子者古所稱有道之士無得而加焉者也故或退或不得退或退而辱在天下未嘗以為辱而後世之榮亦莫有得而加焉者此吾之所以異乎流俗之論也寶林為大司空數閲月乞遷葬以去於是卑俗時士歡然同辭曰寵盛志得之時也而引退如此此乃可以為榮矣而余謂不然者寶林有道之士也有道之士志意不出三子下三子者之進退榮辱渾然不以加諸其心寶林豈以一退為榮者哉士守難進易退之節或長往而暫歸凡仕宜然也不必有道之士後能之寶林以三子為師法其所見宜有超然於流俗之外者也此亦豈足以榮吾寶林哉雖然士之振華纓曵朱轂趦趄驅馳而不能休回念嚮之離密親逺丘封勤道途而艱羇旅者凡以為有今日耳今幾何時而忽焉以去故有視危如顛跌倀倀焉而不思者以為吾之所甚榮在此誠不能一旦捨而歸也則凡為仕者欲其守難進易退之節將誰能之今寶林之歸世以為榮亦可以為勸也巳寶林之有道吾所取正焉者其以余言為然與否與送張公箸漢侍郎歸展先壠序今天子神明獨運於上萬幾旁午環顧三公九卿疇咨太息曰惟得人大僚乏位主爵啓事上請必審詳諦觀其人若既可者或經嵗月不輒下欲得端碩魁異傑特之賢以興事赴功蓋其難如此而士大夫之官中朝者恐栗惟謹求稱上意之所存奔走率職不敢自寧箸漢張公管二中樞望實隆茂發言建䇿動中機宜朝寧倚以為重所謂端碩魁異傑特之賢也一旦請歸展其先壠上憫公意豫假以往且度其道里往來程日之早暮計時以還闕於是縉紳之士相與言於朝曰公吾屬之所倚以為重也奈何其去其鷹揚虎賁建牙開閫之長豭冠魚服撫劍控弦投石超距之士咸瞻視嗟咨曰公不當去而屏居息影處士者流曰公之去誠有以哉嘗見聖朝之取人用賢也惟其大不惟其細惟其全不惟其偏今夫恐栗惟謹奔走營營不少休之士聖明所燭也然以為奉令一官效能一職猶戞戞乎其難之况將置之玉衡大斗之間論道經邦之地以興起事功可不於其大者全者取而用之乎夫公既抱其大且全者而天子又知之所謂其人之可者也且用公而公求去然則公之所為大且全者又豈尋常意量之所能窺哉夫惇在三之義篤臣子之恩所以顯至教廣隆理也公以先壠之故歸誠君父朝廷不惜其去以勸天下之孝於其先而公之孝於其先者實可以風示天下之人此其所為大且全者何如哉余屏居息影之人也於公之歸既不同乎朝士之意而又與冠豭服魚撫劍控弦之倫異其趨姑有是說焉以導公之行崑山徐相國賀序自風后力牧巳來唐虞三代迄於後祀相道之隆替視乎君君道之盛衰視乎相堯之相舜舜之相禹禹之相臯陶伯益湯之相伊尹此夫人而知之也堯嘗咨相於放齊諸人既聞其言而吁之使當其時一或不慎舉而用之以為相而舜亦不相禹禹湯亦不相臯陶伯益伊尹而其所任以相或皆如堯之所為吁者而堯舜禹湯獨孑然以一聖人而立於其上若是則欲以名唐虞三代之盛使天下後世之人羣然而稱堯舜禹湯曰此為君之至者而其相則泯然無聞焉此豈理之所有者哉故曰相道之隆替視乎君君道之盛衰視乎相自時厥後不知其世視其君不知其君視其相視其君而其世可知也視其相而其君益可知也蓋相之繫乎君其重巨如此康熙二十八年夏五月崑山立齊徐公以戶部尚書入參大政於是朝之卿大夫百司藝事在官之賢者閭巷之耆叟童兒走卒皆曰吾君堯舜之君也必如公然後可以為吾君相蓋天下望公之相久矣公天質雋異蜚聲藝林世廟在御對制䇿親擢公第一人時巳有公輔之目今天子當陽益器重公纍遷禁近密勿論思之職地處清要公嚴潔以持身虛公以宰物朝夕以所學獻可替否啓心沃心蓋勸學佐治之績茂焉及其居臺憲也謇謇諤諤不狃於貴成謀薄廷諍之說一時諸為奸利不便於身者皆側目裂眦矣其後公既罷而閒居益緝學礪行讀書纘言以昌明正學為已任居數年而天子思其言復拜公御史大夫公不以前罷故少自抑損由是天子益重公而思大用之矣余又嘗論人臣進言之有難易也言之而用身安而道行者此其言之易者也言之而不即用身退而道尊者此其言之難者也既言之而身退矣至於久而思其言重其人者吾道之所由以益尊而不易副其難者也然公既以其言結主上之知今且以昔所言者起而見諸行事惟聖主有以答天下之望吾知其無有難焉者矣昔舜之歌曰股肱喜哉元首起哉臯陶𢋫載歌曰元首明哉股肱良哉元首股肱一體之詞也而伊尹亦曰惟尹躬暨湯咸有一德一德云者即舜臯陶所歌之義也他日又言吾豈若使是君為堯舜之君哉則伊尹之實有是德可知矣今者堯舜之君在上公適為相由舜臯陶所歌之義以徴伊尹之言則三代以下後祀之君臣不足為公道也公其思所以為堯舜之相乎哉余弗能為侫以賀公之相而終望公以堯舜之相之道相吾君是乃可以為賀也公之同嵗生官中朝者將有賀於公聞吾之言曰微子言公其念之矣雖然公之樂聞有是言也請書之以為公賀祀學録序禮凡始立學者釋奠於先聖先師又凡釋奠者必有合有國故則否鄭康成謂先聖周公若孔子也禮又曰凡學春官釋奠於其先師秋冬亦如之康成引周禮謂凡有道有德者使教焉死則以為樂祖祭於瞽宗此之謂先師之類也若漢禮有髙堂生樂有制氏詩有毛公書有伏生可以為之也今天下學祀孔子稱至聖先師則是直以先聖先師為一人矣考之禮意多未合孔子之下有先賢有先儒若髙堂生毛公之徒並稱先儒此皆古之所師者也禮所云釋奠於其先師者専謂此也今則不然蓋以孔子為先師則不得不以髙堂生毛公之徒為先儒又以别於鄒魯之賢亦其勢使然也又其下曰鄉賢蓋鄉先生之祀於學者康成解國故謂即其國之先聖先師言國故有此人也今鄉之賢者猶國之故有此人耳夫髙堂生毛公之徒不得稱先師而謂國故反可稱先聖先師者其誰敢與先聖先師之名必不敢居則當旁通其義於禮而不失先王制作之意而已矣又禮釋奠於先聖先師先老終之古者天子視學飬老同重並舉而始立學必先釋奠於先世之老故吾謂今之鄉賢可比於古者釋奠其先老之義雖不盡合於禮意而以世變推之猶為可受庶幾行之久而不至廢絶也蓋古者釋奠先老之禮亦已重矣凡飬老適饌省醴具珍天子親袒割牲執醬執爵飬老之禮其重如此則其於先世之老曰釋奠云者視先聖先師文既同而禮之重可知也飬老之禮親袒割執醬執爵則其釋奠於先世之老其禮之重於飬老又可知也郡縣之學使其長吏行事雖其節文儀則有異而其於天子敬學飬老之意貴於無失其義則一也故吾遂謂今之鄉賢猶古者釋奠其先老之意云爾或曰先老祀世之曽為三老五更者今鄉賢之祀惟取其德行不能必其皆老而沒也韓子不云乎聞道無先後今使顔淵子竒雖得夀當不僅在先老之列孔光桓榮之流雖為老更終有愧焉故其祀於鄉者亦惟其賢焉而已耳惟其賢則未有不賢而可祀以先老者且古者釋奠先老又不惟以謂養老而已學者所習之業既以取法於先聖先師而先民之可則效者亦往往而有焉故釋奠先老同於視學使學者有所興感也後世聖師之名既不可居而先賢先儒之得通祀於天下學者必請於朝久之議定而後行焉蓋亦難矣吾恐責名起議而使先民之可以則效者不得亟列於祀且久之而廢是禮也故原先王視學飬老之義而為之說焉蓋有感於我鄉真翁蔣公之為賢也禮所謂法施於民則祀之公其人也公殁而宰木已拱矣其流風遺徽之傳於後者故老稱之後進思之搢紳先生交頌如一遂聞之郡邑聞之大吏僉曰允宜檄學官從祀如常儀後生小子有所興感則效由是鄉賢因公而益重然後益知先王釋奠之意其示學者所習之業有所取法其義至深逺也輒推本禮經遺意而旁通其說為祀學録序從祀録序郡縣學廟之廡皆有所謂鄉賢者其果有益於教術治理乎哉先王設學教士重師儒之職其有道德之所歸而民之興行可視以為法者歿而祭於瞽宗以為樂祖蓋自舜之命䕫也有胄子之教其法在乎絃歌蹈舞講誦辨說以節文乎君臣父子夫婦兄弟朋友之間而泳陶乎親義别序信之實故周之盛既以大司徒掌鄉三物之教而又以大司樂掌成均之法蓋不獨以教其國子而邦國之教凖是法焉士生其間其有為道德之所歸而民視以為法者是以有瞽宗之祀記曰釋奠必有合凡以助合成成均之法所以使民觀感奮興以為吾之所取法者且得列於豆籩几筵秩祀之中上之不忘乎以賢得民以道得民者如此其至也故相勉於學而為凡民之倡則凡淫陂邪譎殄行驚師之習不接於民之耳目心思而流風善俗足以詠歌興起於無窮夫是以教術之美治理隆也今之所謂鄉賢古之所謂瞽宗之祀也豈果無其益哉自俗之偷也舉先王立教造士鼓舞振興之方皆以為榮身競名之階傭奴市販之子暴起里閭茍可以騁其力不難使先聖之廊廡同於士寢牢醴勺冪之品物等於麥飯紙錢於是乎鄉賢之設果不足以為教術治理之益矣而華州之風獨猶有先王之遺焉蓋后稷公劉太王文武之所開基也故其君子有禮樂文物之習其小人有稼穡憂勤之業竒邪之行不齒於其鄉而孝友忠信廉正碩大之士乃得從祀於孔子之廟庭其民之欲之也則然非其家之所能强而致也中允陳先生官兵馬指揮以子貴封文林郎林縣知縣先生以理學為關中正傳民之所稱孝友忠信廉正碩大之士也自四方之賢人君子過必式其廬士上其事民誦其行僉曰聲宗之祀惟先生允宜其家不得辭從士民之望也夫師儒之於古重矣關中之人獨能原本先王之意以求益於教術治理之隆豈非有志於斯世者所樂道而稱述之者哉余因序其所謂從祀之録者如此以華州之風可以風世不獨為陳氏一家之榮已也祀鄉賢名宦序古者君親見鄉長而問焉曰子之鄉有賢則以告有而不以告厥罪蔽賢其於公卿大夫進賢者賞蔽賢則戮鄉長公卿大夫勢邈然絶矣責之皆重如此而周官王制興賢能論秀士則尤専責於其鄉然則鄉者重於公卿大夫與蓋先王飬士教士之法惟鄉備焉故士之賢不賢其進其蔽責尤重於公卿大夫也後世教飬之法廢於鄉鄉既不可以進賢而公卿大夫亦未聞有蔽賢之誅於是公卿大夫亦不數數以進賢為事則其比於鄉所爭輕重之數幾何也然鄉雖不足以與於進賢蔽賢之事而至於今有二事焉隱然以其義關乎士之賢不賢之故而重於公卿大夫之所為者一曰鄉賢一曰名宦斯二者鄉以告其令守令守以告其有司有司又以告封域之大吏而後得祀於郡縣之學者也祀者賢則士吏有所勸祀者不賢則士吏無所戒勸戒者先王所以教士飬士之大法也而於斯二者備之余故曰隱然以其義關乎士之賢不賢之故者此也今鄉祀以賢仕之鄉祀以名宦二鄉之人其祀之也果為賢也果可以為勸也吾信之矣夫以公卿大夫不能薦之於朝而鄉之人猶能祀於學而使天下之凡為士吏者有所勸而不至於無所戒是公卿大夫之所不能為而鄉獨為之鄉之重不猶有古者之遺義與昔黃霸材長於治民號稱良吏其始坐為豪桀行役使其鄉人徙之雲陵而朱邑亦云桐鄉民愛我必葬我桐鄉邑之在鄉里誠未可知然觀其言若有不自得者今為鄉人與仕而為吏皆能使之不相謀而鄉之人皆祀之則其為人所愛慕賢於古之人逺矣吾於某公嘉其賢而又重以侍御楊君之請也故為兹言以序之侍御為吏於臨湘今且為公卿大夫將能為其所不能者吾是以樂得斯事而書之且又因以致望於楊君焉朱太僕畫像序豫觀朱太僕畫像蓋賢哉有道之容也太僕曰得子之言以為重夫豫非能立言者太僕奚取於豫言也哉使徒以其容之可稱者而已則世之有目與有口者之所共覩而能言者也奚必豫言之為重也無已即與之論畫可乎畫者之欲貌人之容也使之久居而熟視焉聆其聲音察其笑言洞然有得於其人之心矣然後求之於其形焉故不善畫者畫形善畫者畫心畫心而心各肖其人之心夫然後形各肖其人之形也今吾與太僕論畫也而可以論心矣故目欲其無不明也而必有所勿視耳欲其無不聰也而必有所勿聽口欲其無擇言也而必有所勿言身欲其無擇行也而必有所勿動然則心欲其無不通也而必有所勿思蓋耳目口體必有所不視聽言動而後視聽言動之各當其則心必有所不思而後思之不出其位今夫畫目瞭然其無視也耳凝然其無聽也口默然其無言也身寂然其無動也心淵然其無思也自有此畫今幾時矣今欲使太僕終日視而瞭然無視也終日聽而凝然無聽也終日言而默然無言也終日動而寂然無動也終日思而淵然無思也有如此畫焉能乎不能乎夫瞭然者其無不明者也凝然者其無不聰者也默然者其無擇言也寂然者其無擇行也淵然者其無不通也惟聖人然後可以踐形吾故知太僕有所能有所不能也今之進諛於人者非周公孔子則不可以為恱而吾以為非聖人不能者蓋不敢以是進諛於太僕而不敢不以是厚望於太僕也太僕知豫非習諛者也故示吾以其像也而吾與之論心八刺史圖序八刺史圖者江君在均州時采掇漢晉唐為刺史者人各一二事書之㕔壁已令善畫者圖於簡冊備其形與事余在京師得觀焉江君曰為我題其緣起庶以傳於後使是重也㑹余遭憂還圖歸君所君是時補官適得河中壤境相接居一年君復以圖來於是余乃喟然歎曰嗟乎刺史之賢可傳於後至可畫以為圖使後之攬者流連愛慕慨然於心而反覆不能自已者上下千年能有幾人哉由漢以來可記為圖者才得八人人不能數事若是乎刺史之賢可傳者盡於八人八人之賢可傳者盡於一二事為刺史者蓋其難矣雖然以事繫人事可傳者尚衆以人徴事則八人者吾歎其難能焉士有德才而不遇遇而適不為刺史與為刺史而不皆有事之必可畫為圖則八人者不可謂之少也由唐以來至於今蓋千餘年又得江君始余知君好古通經為文章能致諷述於衆及為吏以經術緣其政及去而人傳道之思之不忘余由是以得其為人蓋與古之八人者侔焉八人者或以文章或以經術或以風節或以政事要之不違於道皆所以成其為人也夫古之人不可以見今見吾江君如見古之人焉後數千百年或不必千百年安知不又有如江君者畫繪為圖並八人者而為九刺史也與哉八人者或不終為刺史矣而世之稱之必以其刺史則刺史之重可知已君尚思其重勉其難以盡得夫八人者之所以為人觸於目警於心奮發於行事是為此圖之意也夫八刺史者張豫州敞賈交州琮陶江州士行元道州次山韓袁州退之顔饒州清臣韋房州景駿段處州成式繼八人者則吾江解州辰六也椿萱圖序蜀中劉君可南為選人京師日夜念其父母令善畫者徐生畫椿樹萱花君則負琴書其傍將趨而進瞪乎有逺思者而京師之能為詩者則皆詠歌嘉歎其所志其後為沁水丞挈其畫以來以示余曰請公為我序之余時未能有以應也於是圖留余所且幾年矣當徐生畫時劍門阻險隴雲棧樹在煙塵烽戍間羇旅遊子思其親而不得見不得已託興於草木琴書以自寫其意亦可悲矣及王師定蜀道始通君之父太公間關萬里走京師就養官舍父子始相見嗚呼兵戈關塞回首驚魂撫曩時之畫以追數其聚散離合之端其悲喜當何如哉余竊觀自凶逆稽誅士大夫知忠孝名節之大者往往而有而至於悖君親甘屈辱以茍旦夕之命皆身名滅裂而無存者亦不乏焉豫以君父子之所遇有可感而志者故卒為之序而歸之李晉陽詩畫冊序敬嘗過魏少司農環溪先生家見公子無僞姢靜秀好時尚未任戴冠然已通詩書儼然鴻生巨儒真名卿之胄也次見其館甥李東陽溫雅醖藉浮英華湛道德才器比公子益驚異之他日司農公謂余曰吾子壻之兄李君晉陽洪川西城名家子惇行孝弟父萬桞居士既殁提抱其弱弟友于善教雅好詩古文作桞林記以悲號思慕其先人天下大夫士多感其言皆咏歌嗟歎之又好藏弆古今人書畫畫册有名公卿題其上者屬子一言志之始吾見東陽心異其非常人乃今後知晉陽君之家學有本哉孔子惡夫沒世而名不稱者又曰宗族稱孝鄉黨稱弟可以謂士以君之賢知名天下公卿大夫士往往詠歌歎息想慕其為人其亦可風也已然吾聞昔韓昌黎為唐儒宗得子壻李漢然後其文益振其道益大吾於東陽之於司農公不能無厚望焉矣大司寇魏環溪先生七十夀序蔚州先生致政歸之再明年春秋七十矣客有過余曰先生以道學自任廉清於物無所嗜好顧猶獨喜文章請吾子為文以夀先生又曰先生謂子近道而有文夀先生非子文不可子不得辭余謂曰諾已而念生辰為夀之辭余既不習以為而先生喜文章其非以世俗之辭明甚則吾所以稱先生亦以先生之所以自任者庶幾可乎粵自詩書所紀唐虞三代其時君相皆聖人無道學之名夫聖者道學之標凖也堯舜禹湯文武以道學而為君臯陶伊尹周公以道學而為相上下二千年入乎此則君明臣忠而天下以治出乎此則君暗臣邪而亂亡隨之陵夷至於春秋道學之統不在君相而在師是以孔子為道學之大宗也孔子不得位無所繫於天下之治亂而萬世之治亂恆視孔子道學之興廢以為歸火於秦而秦以二世亡黃老於漢矣而漢之儒者抱遺經守師說蒞官服政往往依据經義苴決補漏救什一於千百而漢治猶為近古佛於魏晋六朝而學士大夫藻繢文字為無用之空言孔子之道幾於滅息自是以來兵革相尋篡爭接踵道學之不明不行其禍至於如此之烈也唐之太宗號為賢主曰魏徴勸我行仁義徴之學本於王通通雖不能盡聖人之精微而其流風墜緒猶足以有為於一時而世莫能用况其有能行聖人之道者哉五季紛紛無足言者有宋興而道學之名遂以大著濂洛推闡於前考亭集成於後亦皆不得行道之位甚至有厲禁於其時然宋之文治視漢唐加逺焉元許魯齊明薛敬軒皆亦嘗為相矣皆以不能久於其位而不得行其道於天下然而接宋儒之傳者二子也接二子之傳者吾求之往代驗之方今舍先生吾誰與歸與由孔子以來斯道之傳寖微或無其人而時君世主方嚮用儒者或有其人而不獲見用見用矣或詘於時不能盡其道此後世之治所以不能幾於唐虞三代之隆也今天子以聖人而為君行堯舜禹湯文武之道將必有如臯陶伊尹周公其人者以為之相舍先生其誰與安見夫唐虞三代之隆不再見於後世之治也與客曰子之言可以夀先生矣孫止瀾學士夀序以吾所知及與遊江淮間賢人君子若抱道德而隱居不出以仕者於鹽城則宋射陵先生若出而仕矣猶隱居然則吾友孫止瀾先生蓋吾之知射陵以與吾止瀾逰也易曰同聲相應同氣相求又曰同心之言其臭如蘭射陵髙節偉行宜其著聞於天下而吾必待止瀾而後知之者蓋非止瀾之與遊無以知射陵之深而兩人者非相與遊之深而吾亦無以知其言之可信也若是則同心之言烏可少乎哉今年射陵年七十而止瀾亦六十矣射陵之賢子稚恭以試髙等貢在京師將歸而拜其父而淮上之賢士大夫謀所以為射陵止瀾夀者稚恭之言曰吾父之執以得陳先生文為快吾父更不可以煩先生余聞而賢其言也今夫文以為夀古有是乎哉吾欲一文以為兩先生夀今有是乎哉夫古無而今有安知古之無者不始有於今也哉或者謂兩先生之行出處進退不侔矣射陵以耆舊之遺委形抗志荷衣草履自放於山陵川澤之間而止瀾當少壯時掇巍科踐華塗翺翔承明著作之庭及其倦而暫休也海內望之冀其旦夕枋用今年甫周乎甲子知化進乎古人使其駕亨衢而康民物吾道之與行方自兹未艾也而子比而同之過矣雖然止瀾年未命爵蓋屢進而屢退焉今又十年所蕭然環堵糒飯藜羮不異後門寒素而道進德修詩書絃誦咏歌先王之遺風將樂而終身焉回視十年以來人世之升沉顯晦得失利害順逆之故或朝而華榮暮而戮辱者亦復何限而止瀾神明淡定歷寒暑晦冥而不渝也此其與隱居之君子何以殊焉故吾欲以夀射陵者夀止瀾蓋兩先生之道同而其所以自處者亦無不同也且吾有味乎止瀾之欲得吾文也方今稱夀之言必貴烜赫巨力之人謂可以張其名而耀其事不然則取世之自以其能文呌呶呼號於衆與人爭一旦之名者豈此文之足以附不朽哉彼亦聊以自託於知文者之流姑以陵夸恣矜而已耳余雖挂名朝籍而憔悴枯槁閉關固鐍無以别於偶木石而友麋鹿者去烜赫巨力之人遼矣濶矣又自以其不能文故不呼號求名於世是二者凡所謂今之稱夀之言無可為役者也而止瀾之有取於吾文者得非將以逺夫烜赫巨力之人而與憔悴枯槁者以引類而寄情而文不文固不暇深論耶茍如是則以吾之憔悴枯槁之言於荷衣草履自放於山林川澤者祈黃耉而頌無疆正其宜也奚不可以夀止瀾者夀射陵乎然吾雖已逺夫烜赫巨力之人猶且挂名朝籍是抱道德而隱居者之所望而猶欲逺焉者也吾之文終不可以夀射陵而姑書之以為止瀾夀宋射陵先生夀序聖天子御極恩德洋溢四海下至深山窮谷靡幽不燭有詔舉山林隱逸之士郡縣為勸駕時有以病辭徴者淮南則宋射陵先生後復詔舉博學鴻儒大臣又以先生應詔而先生堅謝益力當是時識與不識皆仰先生之髙風希一望見丰采而不可得余之嚮往於先生先生不以余之不肖而嘗有願見之思也何其幸哉余曩與學士孫公止瀾遊孫公淮南人也為余道先生平生出處甚悉乃知先生固非隱者也上世自明𢎞治己酉發解甲第屢世迄今不絶先生以世家子束髮讀書下筆數萬言不休抗論天下事及古今成敗鑿鑿可驗之設施當時聞先生之名者有祥麟威鳳之目顧乃深自韜抑放志於衡泌桑者之間無與於天下事人無不為先生怪者而先生益發四庫之藏疏鄒魯之微言衍濂洛之奧㫖茹蔬飲水充然有餘陶然自樂或質以出處仕止之經則隱几不應或坐對長嘯而已世未有識其所以然者而先生亦以為世之知者寡也顧嘗曰止瀾曾為我言陳公則陳公其知我者乎乃令其長公孝廉從余遊嵗之庚午止瀾年六十先生登七十余郵文為兩家夀今又十年所矣孝廉介書來乞言余復之曰十者盈數也天道變於上人事易於下向止瀾與先生共鉛槧晨夕論文者已為異物如余握管為兩家獻純嘏詞者亦復頽然髮黃齒豁又况八十年來故家舊族興廢亦幾更矣而先生里舍巍然猶數百年故址夫人井臼躬撡苦志偕隱詩書之澤詒於後昆諸郎培風展翮指顧為廊廟瑚璉而先生視履精明孫曽繞膝含飴摘果極人世之樂事則天之報施先生為不爽而先生之堅卧不起復何歉於人世哉揚子曰梁齊楚趙非不富貴也惡乎成其名谷口鄭子真不詘其志耕於岩石之下名震京師豈其卿豈其卿余謂君子而足以成德名雖岩穴終老可也即使履天衢立朝廟終無損乎其髙也何必不卿則夫先生之出處豈有膠固之見於其胸中哉固未可為流俗人道也書此為一觴之侑田司農夀序國朝有名諫臣陽城田公兼三當世祖龍興重制科羅致天下豪英公用首科中進士為太康令有賢能聲擢曺郎久之朝寧益知其賢拔置西臺御史今上即阼重諌官察知公賢內升京卿是時京朝官途壅不得補詔以京卿品秩參補科道於是公更歷省臺簮筆荷槖回翔諌諍奏彈言事之地積有年嵗前後條奏關國家沿革利病用人行政兵食禮樂措置廢興諸大計無所不言言無不愷切詳明今宫府典制釐然載方冊及令下郡國所奉行大扺皆公為給事中御史時所建言者也公既精誠通敏感孚人主而言論丰采嶽峙風行士大夫倚以為重由是踐清卿陟憲府晉秩為少司農皆用不次登顯天下之人聞其風聲無論識與不識僉謂天子方嚮用經術政事之臣旦夕攬魁枋而宰化機者必曰田公田公云然公之意不自以為得雖在朝廷其神明寄託常在山林栖遁之間於交遊親串時喻其意聞者益歎慕其賢嵗辛酉年甫及耆得返初服脂車之日都人士卧轍遮道留公車馬不得行公間道疾驅去昔人謂二疏去時觀者歎息知其為賢今以視公為何如也昔漢李固疏言朝廷聘楊厚賀純等待以大夫之位以病免歸一旦朝㑹見諸侍中無一宿儒大人誠可歎息是日有詔徴用厚等宋張忠定公謂寇萊公用太早仕太速甚以為蒼生無福夫以寇萊公之賢忠定猶有是語而李固一歎厚等乃復徴用然則老成魁碩誠國家所宜愛重而䝉任使近寵光尤當致慎於少雋喜事之人矣今俊乂盈庭百寮師濟上追唐虞喜起之風豈漢以來叔季之事所得比擬而稱數之者行將召公起之田間畀以機政舉公為諫官時所欲言而未盡者起而悉見諸行事公雖欲長有山林之樂豈可得哉公歸之時值公初度之辰邑之諸生謀為公祝嘏之辭以屬余余惟巫史紛若之說不可以為頌而稱述聖朝所以養賢立政之大者以頌公然不僅為公頌焉而已也徐健菴尚書夀序孟子論王者興必有名世賢哲之生與興王配豈非重與又言豪傑之士雖無文王猶興以明王道雖闕而儒者之為功不得泯泯而無也豈非尤重者與蓋自三代盛時政事禮樂出於一治同道世同風而士同學也及其既衰政事禮樂出於二歐陽子所謂治出於一而禮樂逹於天下治出於二而禮樂為虛名者是也若夫治出於二而道德風俗之不同士生其時欲其耳目之専心思之一踐行之篤以從事於先王之學蓋已難矣是以百家之說紛然雜出於其間而莫之能同至於士不同學而害愈及於治天於其時篤生賢哲所以承王道之闕而補救其弊也不謂之豪傑之士其何以謂之哉然王道之闕其弊亦以時而殊故孟子生於周衰戰國之時王道之弊在楊墨辭而闢之廓如也自孟子後二百餘嵗其弊在非聖之書廣川董子興焉六藝之道孔子之文燦然大著於世又數百年而至李唐之代其弊在佛老韓子起而闢之歷五季之亂至於趙宋而理學諸君子後先奮興於其際斯文之盛於斯至矣然亦時承其闕而補救之蓋皆所謂豪傑之士也由宋至於今其弊常患在異學異學之弊同於非聖之書而甚於楊墨佛老其論性無善無惡其論學親師取友為學力行謂為好事論聖人之書六經皆糟粕夫為佛老者必有師又其書皆具其黠者亦嘗從事焉而為異學者既襲其說以論性乃欲棄師友離書冊母力行其所學果何學耶其弊不甚於佛老耶夫世之聰明才智之士豈謂無人其卑者溺於辭章末技之習而髙者又惑於是焉壞人材亂民俗浸淫於政事蓋其為弊流於宋而泛濫於明自百餘年來未有已也如今日者所謂王者之興文王之世也而名世豪傑之士實生乎其時如吾徐先生者此吾之所尤厚望焉者也先生以道德文章負海內大名及其列侍從歷公卿事之可傳道於世者衆矣而吾皆不以為先生之所難而先生之大者在以其大同之學發之於至一之治而已嵗之十一月先生初度之辰其及門受業之士問言於余余故稱引孟子以來儒者之為功不得泯泯而無者而引以致美於先生焉然彼皆所謂豪傑之士不得有為於時而獨幸以其言救萬世之弊今聖人在御辨學術之是非審人才之邪正王道之興無由闕也而先生以名世之業適與㑹其時將使儒者之效大白於當世此吾所以又致私幸於先生也藎臣王翁七十夀序昔人有言名者實之賓也吾將為賓乎夫實之不至烏乎賓吾將為實乎無能為矣私竊自喜以為無其實而不有其名可免過情之耻矣襄陵王翁曰否否君子病沒世而名不稱王翁者嘗逰於蔚州魏先生之門者也學而有名豫聞其言而愧之㑹翁年七十侍御王君思顯委豫以稱觴之文因得仍舉名實之說質之侍御君雖無當於長筵介夀之詞而舉觴引滿庶幾聽然相視而一笑也豫家既中落居恆自念士君子立身行志既不能卓然自見於世甘貧守約其定分耳固亦無足言者乃或者曰此其家不貧故為此硜硜也翁則為豫白於人人或知吾貧又曰其素所誓志然矣若是者名之可受者也豫略涉書史為文以自娛浸淫三十餘年不足供人之指斥一日跋栁州先生集翁讀而歎曰公之論議不忍薄待今人而篤厚於古人如此此豈僅關於一國一世之人而已哉公有其實而逃其名後之君子其未可誣也豫因謂翁慎言之將使豫有能文名有不好名名若此者非豫之所敢受者也退而念之凡翁之勉豫以其名者豈徒然哉將使立身行志因名以責實義厚而情殷者如斯也夫語云無言不報述翁之行而實其名亦其宜也翁以聰明特逹之才少為諸生以孝聞撫弱弟尺布斗粟無所私施於一家及於族黨朋友信之比閭化之名實茂焉初衛文清公嘗語魏果敏公曰吾鄉有佳士王子藎臣寧識之乎魏先生由是雅重翁翁既學於魏先生代北之賢豪競延翁以為上客故今侍郎李君東生宫諭魏君無僞稱世講焉翁貢入國學新城王公阮亭為延譽於公卿翁之名由是益著許君壯其初與翁同入學為諸生孤介刻厲及為吏部以殁翁為經紀而襄其葬老母孤兒朝夕皆倚翁以辦士論益賢之翁精於易以人之生年配八卦為東西宅以居人人居之輒利善察地形牛眠龍耳不爽尺度福眚響應較若神明而逺逰海邦山國得神仙之術夫神仙之術儒者詘焉翁之言曰不聞子程子之言乎吾惡夫狥欲而忘身者豫嘗讀朱子參同契說思之弗得也朱子言大要在坎離二字於此得其綱領則功夫之節度魏君所不言者自可以意為之翁其得魏君之所不言者乎吾見其肌理瑩潔神采朗發控馭奔馬凌觸炎熇犯冒霜露日馳數十百里不倦談宴噉物什倍少年翁故儒者而人見之則以為神仙中人也雖翁亦自負間嘗語豫金房玉堂之間非公莫與居此中嵗月方長不僅如人世之所謂百嵗千年公得無意乎蓋將引豫為采真之遊而適遂吾逃名之願者也豫雖不能竟學然壯其言而樂之即翁言以為夀侍御君曰善夫可以為翁夀矣塗母王太淑人八十夀序吾讀詩至四牡之章而有感矣四牡之詩曰王事靡盬不遑將母又曰將母來諗然後歎昔周之盛時其君閔勞臣之公義而順人子之私恩也觀察塗君比在京師以太夫人春秋髙亟求歸省當是時天下號無事海隅向風天子日開明堂惇典協樂有燕勞羣臣之風而勞臣羇士亦得因以恤其內顧之憂於是觀察君得從容省其母於相州今年康熙乙卯觀察君使使走千里貽余書曰吾母年八十矣將丏中朝名公卿之能詩歌者一言以侑觴子好古文微子言不足以介眉夀而祝純嘏也豫考太夫人行事束修厲行明大義似儒者臨事察機如偉丈夫蓋嘗以是相太公矣太公少時交遊多賢豪太夫人脫簮珥供具勸之讀書久之太公怏怏不得志因棄去從戎太夫人壯其行解嫁時奩為治裝㑹兵亂不知太公在所後二十年皇清定鼎太公從龍入關為潤州守始聚合遷相州分巡道卒以身殉於難太夫人生三子太公從戎時觀察君才十許嵗參戎君南海君皆尚幼太夫人督教諸子捋荼况瘁以俟太公之歸觀察君由州守歷今官所至赫赫著聲蹟則太夫人於太公為賢妻於觀察君為慈母而觀察君於太夫人為孝子也經有之事親孝故忠可移於君今太夫人正健匕箸國家方以武功戡亂時詔求外服敡歷舊臣愚以為觀察君宜出而仕矣且夫風詩之義何如哉方其勞使臣之來也雍頌燕遊以告從事則許其將母至戎車飭矣常服載矣而不遑軫其室家今委贄為臣不以身赴公家之急而曰吾有母在以自解太夫人明大義能臨事察機者也以忠孝教其家者也其烏能安此吾故曰宜出而仕也使觀察君起而趨嚴程奉簡書增修其職旦夕建牙擁麾經營四方以佐天保采薇之治太夫人必且大喜志適神王永引於夀祺天子將錫之寵命被之詠歌嘉四牡之勞臣不佞又為君賦詩繼美吉甫以自託於六月詩人之義使書之彤管傳之國史誇耀於無窮如是以為太夫人夀不亦善與使還觀察君稱觴上夀以不佞之言進太夫人必怡然色喜趨命觴觴觀察君曰陳子之言善子其行矣午亭文編卷三十六
