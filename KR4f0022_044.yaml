body:
  text: 午亭文編卷四十四大學士陳廷敬撰志銘一資政大夫刑部尚書致仕諡敏果魏公墓志銘國朝以理學名儒為時用有清節直聲謀議勞烈聞天下則刑部尚書致仕魏公自公卿大夫以至窮閻委巷有識之士莫不樂道其行事而慨然歎慕其為人蓋公之學用於時而天下信之久矣若夫朝廷之知公與公之受知於朝廷君臣遭遇之隆俾得以行其所學世之人容有不得盡知者焉今欲志公而傳之無已亦第舉其世之所能知者而於其所不能知者則俟之百世以後之知公者而已此亦公之意也公起家先朝為名諫議其始彈擊封疆大吏中外憚之由刑科給事中轉工科右給事中刑科左給事中時世廟初親萬幾公言慎起居盡啓沃責備時宰人為公危上曰給事言是因災異言天變為人事所致語多忤權貴者詔廷臣集議左給事故事不與議公則抗疏請與議議時面折諸貴人無所阿避由是衆皆側目矣遷吏科都給事中掌大計戒僚友絶賕賂日夜宿省中邸寓則令兵馬司傳檄關防於是言四事其一事上尤嘉允謂言官糾拾例當復雖失實不當反坐得㫖比年糾拾反坐言官壞吏治塞言路其已之所糾拾與麗八法同科編之令敕又言言官得罪宜治以考功法不可置重典在諫垣前後疏凡三十餘上其大要崇治本别人才修實政通民隱皆關時大政於是忌者思有以中之而未得其牙蘖也㑹故相溧陽得罪遂藉是以傾公上察其誣釋勿坐然方其時倚重言官比事未發不糾舉謂何於是則空垣皆鐫級而黜之公坐是黜為詹事府主簿稍遷光祿寺寺丞尋乞養母太夫人以去講學讀書修身教家以化其鄉人居十年太夫人殁喪葬悉準古禮當是時今天子鋭意堯舜三代之治政具畢張進賢退不肖思得學問經術有名跡可用佐國家興理平者於是相國益都馮公首薦公上召公以病辭再召趨朝授貴州道御史公初進見退而喜曰聖主在上以𢎞太平無疆之業實惟其時矣一切小功近利姑且補苴之論非所以告君也乃言教化為王道所先滿漢臣僚宜敦家教以廣盛化言督撫有不容不盡之職分有不容不去之因循宜責成互糾並請慎重督撫之選言科臣余司仁欺罔不法言湖南布政使劉顯貴侵公帑不當內升言制祿所以養亷今罰俸例太嚴密請紀過以示罰增秩以示恩言朝儀祀事貴肅言戒淫巧以正人心言輯禮書以勵天下前後所言上多褒納比一年升京卿留管御史事未幾遷左僉都御史是時方急滇事用兵公所言戰守機宜有密奏輒削其藁纍遷順天府尹大理寺卿户部左右侍郎措兵食察帑藏公經營擘畫為多蓋公十九在言官言官有章疏故其議論風采在人耳目間恆易有所豎立六曺卿二以循分盡職為賢而巳其可傳於世者嘗少公則不然至是又上三疏言事曰確估值以杜浮冒曰核關課以防侵漁曰簡藩司以清賦稅皆命確議以聞公在户部稍久聲績益著左都御史闕上特簡任公公則首請申明憲綱其言曰國家根本在百姓百姓安危在督撫督撫忍肥家誤國以屬官之竒貪為一已之竒貨耶臣願諸臣為國家培元氣為朝廷正紀綱為臣子勵名節列十事以上俞㫖嘉焉次言吏治漸壞公道宜彰今貪官亷官參處同例盡職溺職保薦無分豈稱賞罰至意舉清亷知縣陸隴其劾知州曹廷俞最貪宜斥既又舉督學道公明者二人貪墨者二人亷者或復其官或不次用貪者悉置諸法其時為吏者肅然知警動矣為左都御史九月遷刑部尚書上言主上宵旰憂勤臣不敢計身家恤嫌怨奉陛下之法與海內臣工共相遵守臣忝風紀之司職多末盡敢援漢臣汲黯自請為郎故事得拾遺補闕辭新命而就見所領職上鑒其無欺從之仍加刑部尚書銜一日拜三疏言撫臣溺職司官不法等事疏甫入而地震公言地臣道臣失職則地反常臣總風憲咎實在臣是日獨被召對近御座前語移時或至泣下其言祕不傳公既於言無所不盡尤留意人才所薦引皆䝉擢用至是又列薦侍郎以下十人尋復申刑部之命始去言路然公始終以言表著者如此其為司寇持法不撓嘗曰法自天子寬之則為施仁刑官市恩則為骩法至遇上所矜宥則又未嘗不對僚屬感頌德意宛轉以求其法之可生也康熙甲子春以病乞歸上溫㫖慰留八月再乞歸降㫖稱其實心任事令以原官致仕馳驛回籍恩禮有加焉蓋公之進退不違乎禮而其所建白施設彰彰如是可謂能行其所學者矣夫公之所以能致此者本主上知公公受知之深故也不然公抱其學修於身施於家而已矣化其鄉人而已矣其所建白施設豈能彰彰如此之盛哉又豈能進退不違乎禮如此哉是以記公之事而推本於君臣遭遇之隆以見君之得臣臣之得行其所學非偶然也戊午鄉試特命公磨勘順天試卷與公偕命者兵部侍郎孫公光祀及余余時為翰林學士從公後公則相率宿禮闈如鎖㕔校士竭日夜力繼晷焚膏覃思品騭蓋是科黜者三人其臨事精審有力皆此類也大臣巡察畿輔則特簡命公與公偕行者吏部侍郎科爾坤公兩人同心咨訪誅剪奸慝稱使命焉奏事殿廷命侍臣傳諭居官勤慎每當敷奏剴切詳明不負職任賜御書唐詩一卷清慎勤格物大字各一幅廷臣間賜貂朝衣於公則諭以今年暫著來年别製更賜公卧疾數日朝上見之命近侍問公飲食如何他日賜參膏一器人參二斤自餘恩意與羣臣同者不書書公之特被者如此則上之於公為何如也公之歸也陛辭上曰比行當三入朝入則賜大內珍饌命內侍視公所食幾何再入則賜茶三入則賜御筆題寒松堂額古北口詩一卷以榮其行去國之日朝士大夫祖餞國門之外道㫄觀者相與感歎以為君臣相遇近古未有所謂進退以禮者不其然與公歸而張額於堂藏書於閣更有書數百卷無長物顧瞻而樂之笑曰尚書門第秀才家風貽子孫足矣公歸三年而卒康熙丁卯七月二十九日也得年七十有一上聞悼惜敕所司給祭葬如禮諡曰敏果蓋此皆公事之可記世之所知其所不能知雖余亦不得記焉公諱象樞字環溪别號庸齊以賜額故晚而稱寒松老人蔚州人也其先江南鳳陽人明永樂初從軍北渡河以武功顯世授明威將軍隨侍代王之國大同襲指揮有遷蔚州者數傳至儒官公諱宦有德行隱居不仕王考諱九經考諱卿孝義聞鄉國為新城主簿兩世皆以公贈資政大夫刑部尚書祖妣劉氏妣蔣氏李氏皆贈夫人李夫人生二子公其仲也公生而聰穎英異稍長孝弟忠信出天性壬午以春秋舉於鄉癸未上公車比入試矣聞王父病急馳歸時流賊披猖所至以官職凂人士公奉母居山洞中賊慕公名大索不得我朝丙戌首設科舉進士選庶吉士歷今官公娶李氏太學生名經權女封夫人男三人學誠壬戌進士內閣試辦事中書舍人學謙學謐俱庠生幼某嗣公兄某為後女三人一適天城參將劉君三汲子鄒平縣丞天賜一適大同府中路通判李君濬子候補內閣中書舍人恆烑一適陜西平涼府通判姚君永康子之稷孫一人吉祥公將葬學誠以狀來乞銘以余公之鄉人也謂稔知公嗚呼余何以銘公公自少至老未嘗一日輟書不讀讀有所得未嘗不見之行事而尤邃於宋儒之書故所得於理學者為尤深所著有儒宗録知言録若干卷公嘗謂余曰昔孔子殁羣弟子各以其學傳四方自子夏教授於西河之上彬彬乎文學之風晉有人哉薛公文清以來曹公真豫而後斯道將猶未絶也子得無意於斯乎余愧公言而莫之能學也余又烏乎銘公既不得辭則排纂公事而繫以銘銘曰斯文未墜誰與作者四祀孔明河東磊砢參井之墟有爛其書於代有光豈適鄉閭惟蔚州公翼翼崇崇敬我桑梓惠我顓䝉開來繼往為天下宗相彼洛閩誦言滿家干祿則已吐棄如遐公喟然云豈謂是耶其辭金雘其道瓦礫或飾其貌或騰其說公探密微老而彌樂公有令問流於海邦公有偉行勒之鐘鏞銘公宜此永藏幽宮翰林編修汪鈍翁墓志銘康熙二十九年十二月十日翰林編修汪先生琬卒明年其學者為狀以其孤書幣走京師乞銘於其友人陳廷敬曰先生治命也公毋辭豫是以不辭而銘先生字苕文又字鈍菴晚而天下學者皆稱曰鈍翁云順治中廷敬在翰林大宗伯端毅龔公以能詩接後進先生與今宰相合肥李公天馥今户部侍郎新城王公士正吏部郎中潁州劉公體仁監察御史長洲董公文驥及海內名能詩之士後先來㑹顧豫亦以詩受知龔公日與諸子相見於詞場先生初見豫詩大驚語新城曰此公異人也蓋是時豫年踰弱冠矣先生雖以詩與諸公游實已巋然攬古文魁柄自立標望抗前行而排後徑嘬鋒踣堅騰踔萬夫之上豫既感先生知已之言又方年少志鋭雅不樂以詩人自命至是始學為文先生又語人曰我固以為異人也龔公既殁諸子或散去或留其後先生以户部主事病免歸長洲廷敬嘗侍上禁中問今能為古文者誰與輒舉先生以對先生方卧堯峯不肯起學者又皆稱堯峯先生王公以戶部郎中召見懋勤殿曰廷敬與俱來各以所為詩來既進見退留臣問士正學行明日改翰林侍讀自是上鋭意嚮用文學之士矣詔舉博學鴻儒廷敬遂奏疏薦先生兵部尚書宋公德宜亦别為疏同日以薦而余以母夫人憂去京師有司敦迫先生以來實康熙十七年也明年詔試上親拔其文授翰林編修與修明史先生既以道德文章為己任由是有側目之者益思歸故山在史館六十日撰史藁百七十五篇杜門稱疾者一年以病免而歸歸十年而卒年六十有七始先生以孤童自奮讀書一目能五行俱下盡三遍不忘順治十一年經魁其鄉明年舉進士時進士觀政於諸曹先生以二甲得通政未幾假而歸研古纂辭一掃絶今文陋跡嘗慨然念前明隆萬以後古文道喪沿溯宋元以上唐韓栁宋歐蘇迄明之唐應德王道思歸熙甫諸家蓋追宗正派而廓清其夾雜不醇者卓然思起百數十年文運之衰此先生之志也自户部福建司主事分司大通橋嵗滿進雲南司員外尋改刑部河南司遷山東司郎中以例降北城兵馬司指揮轉户部山西司主事選𣙜江寧西新倉還而歸卧堯峯也凡職事之餘觴詠之次無時不以古文自娛而四方賢士大夫茍知文之可貴求為金石鏤刻傳敘之作以示後裔附不朽者惟先生是歸先生由文見道務為經世有用之學故向所歷京朝官及一再分司皆有名蹟可稱紀為刑部郎時河南巡按御史覆奏部民張潮兒手格殺其族兄生員三春罪當死詔法司核議先生以潮兒母先為三春所殺宜下御史復訊為復讐論引律文祖父母父母被殺而子孫擅殺行凶人者杖六十又引罪人本犯應死而擅殺者杖一百為據他疑獄必援經附律務毋枉縱降而為兵馬指揮也不變易剛直閣學某公欲并其鄰人居㑹鄰人之母自經死閣學欲因以重其罪巡城御史故閣學所取士也以之屬先生先生卒辨其枉誣閣學怒必欲置鄰人於理先生毅然爭於同官同官欲上聞事乃得解旗人與民爭縛民至司其黨數十人皆偃仰臥踞㕔事中官出視事岸然屹不動先生舉手讓衆人厲聲言曲在民當盡法若曲在旗敢厲民乎卒直民而懲旗人關忠義廟道士弟子為人所殺無主名禱於神神告以夢鞫一瞽者得其情其人匿西山中雜逮徒黨與督索之遂正厥辜道路死暴尸者親為收瘞笞治奸民之以假命噬人者懲豪家奴以勢凌脅人者當任滿且去空北城民炷香於道提酒漿送者填溢衢巷當道大官呼殿至者擠塞不得行問之曰民送兵馬司也兵馬司秩卑而職冗士大夫左官於此往往偃蹇不屑其事故前此無得民心至去時請留遺愛如先生者也及再入户部部設左右餉司先生在左司尚書王公𢎞祚以郎拜侍郎晉秩正卿故嘗物色諸郎雅重先生曰君異日當繼此席也先生亦感王公言盡心郎事勾校遞年存貯錢糧得移文十四司及右司㑹户科都給事中姚君文然疏言夏稅以五六月秋糧以九十月請下部察糧項果足充一季兵餉則緩徵實便於是先生大集諸司窮日夜㑹計得存貯銀二百四十萬兩有竒以復於王公曰兵餉可以無虞而緩徵可行矣退而緝其遺意撰為兵餉一覽書成朝議格不行書置篋衍中先生曰異日有為緩徵之政者吾書可取而視也議民輸糧加漕贈外五米十銀為官收官兌法而旗辨之橫息議裁吳三桂兵餉以充國用而强藩之勢沮其端皆自先生發之分司於北則條議三閘及車户利弊數事分司於南則上其羡餘金如干一皆洗手蒞事有潔清名世徒目先生為文章之士豈知其施於用者卓卓自持守樹立有如此哉先生性狷介雖交游天下賢人文士而庸衆人往往不悅其所為而深中者尤忌畏之以故自登仕籍前後退而閒居者二十餘年雖其不合於流俗亦先生泊然有以自樂於中也自史職歸也日猶手一編書窮年矻矻若為諸生攻苦者客問之曰吾老猶兾有所得也四方賢士從游請業者日益衆為設科以誨之使學者悠然以得快然以解如春風時雨也世有知先生所張設於時者如彼豈知其歸而老也以其所自得使人各得其所得有如此哉以先生之才所施於隱見之際者於世賢豪之士不無􅔵望而先生之所自得者固亦已厚矣惟上重念文學砥行之儒嘗論本朝人物首稱數先生則先生之所以自得者亦不可謂徒然已矣豫自踰弱冠與先生游既數年而别别而復合又别十年而先生殁始終之際先生惓惓於豫者是豈可漠然忘於心也哉先生先世徽州人明初葉遷蘇州隸衛官籍曽大父禧萬厯丙子舉人贈中大夫江西右參政大父起鶴贈參政公第三子有文名父膺天啓丁卯舉人贈奉政大夫刑部郎中妣徐贈宜人先生喪父方十有一齡家貧自立為世大儒賢矣哉子男五人長筠諸生次蘅殤次是穮監生次穀詒廩膳生次景蘇殤女四人皆嫁士人其學者顧君希哲實為狀賢而有文者也銘曰生不夔皋顯且顛仕以樂行否己焉退斯進學文乃傳惟汪夫子僉謂然五湖欽心嶽嶽賢斗杓所建四氣旋漢津海梁回狂瀾霧雺披抉光晶穿末流俗學相夤緣取青嫓白子所憐遺經獨抱老愈専迥如一手障百川生徒婉孌相後先宗鱗集翼風氣還天長地極元㑹殘斯文不沒星芒寒鄙夫斯寬薄者敦光我銘石永不鐫汾州府推官竇公雲明墓志銘順治中天子思以亷隅風厲天下一時朝著歙然從欲於是始有君子小人之目皆知較邪正而别黑白矣顧外則督撫大吏其人雖多賢者而其不肖者亦盤互錯厠於其間貪婪之風猶未衰止也嗚呼士君子讀書服官未始不欲以功名自見而或見詘於上官進不得行其所志退而泯焉以終老者可勝道哉况又有耆儒長德奮立崛起守合則留不合則去之義而不肯詭隨以就功名者也公釋褐為汾州推官大吏疾其剛直以事中公罷官去始公之在汾州也搜剪大奸劈解重獄侃侃自持有不可犯之色雖賁育不能過其勇而誠信樂易推赤心待吏民所至厨傳蕭然不知有官汾州人稱曰竇佛行部沁州沁州守懷金十鎰夜視寢潛置牀下公察知夜深召守來檢還守守大慙謝公亦不使人知曰畏人知我清也汾寖以大治而上官愈益不悅汾有富賈人監司某隂以事欲致其賂否則坐以法公曰此人無罪符牒往復至十六七卒格不行巡按御史某性素剛好嫚罵人藩臬以下動遭詬斥獨知重公最後公屬官有升秩者大吏謂其美遷也挾其隂事諷以貨賄公執不可遂以此投劾去脂車之日拼擋篋笥無長物典敝衣褁糗糧以歸汾州人念公貧競獻錢帛公悉慰而卻之自汾晉至銅鞮山南數百里執香華夾道兩㫄呼號之聲殷地公去後汾人勒碑石道上父老至今過其下時時墮淚云當世廟時主威不測贓吏觸法縲絏繫闕下天子親臨問伏辜立置重典不少貸亦稍稍知屏斂矣壬人猶罔上行私而使正人君子鬱抑困蹇不獲自盡其才如此余是以覩公之軼事流連感歎而不能己也公歸後築一室於溪流篁竹之間飲水食蔬率諸子稚戲娛母太夫人側先人敝廬薄田盡以畀其弟母太夫人益歡蓋自公歸養親垂二十餘年回視一時與公為難者或身為僇人為世所指目或聲塵絶滅而無聞焉果孰為得失哉公為諸生時與同郡兩蕭君某某婁君某講學論文結嶽社丹林之曲至是婁君已殁兩蕭君亦宦遊不得志而歸三人者晨夕相過從酒酣道故公曰世與我違吾寧樂而忘憂焉嵩居天下之中於五嶽為尊士生其間多忠信魁竒之人取義於嶽殆謂是與或曰今日服竒嗜古異時當官臨事嶽嶽懷方勿隨時俗為波靡云爾然則公所自命蓋可知已公先世為沁水人上世祖始遷於懷歷十世生春榮春榮生三經公考也公諱可權字雲明兒時遇羣兒戲則竦肩袖手危坐㫄觀稍長衣冠偉岸擬而後言翔而後趨磊砢自異蓋性生也丙戌秋再舉鄉試薦賢書己丑登進士第公樂道好修務為經術實學以天下之重自任一仕輒不利卒擯棄以老則豈獨公之不幸也哉公以康熙十七年閏三月初五日卒年六十有九娶尚孺人繼賀孺人又繼趙孺人男子子三人賀孺人生旭晼趙孺人生焜女子子二人一適福建福清知縣申錫子念慈賀孺人出一許聘常德府知府高明子璜趙孺人出將以某年某月某日葬公於某原晼來請銘念受知於公不敢辭乃受狀而詮次公生平節概如此銘曰世祖英明剛斷知人善任使尤加意節鉞大僚而公詘於上官如此此豈非其命哉然假令公不詘或既詘復用將盡瘁王事以終其身欲優游講誦丹林嶽社間得乎此亦可謂公之幸也嗚呼遇聖主而不見用沉於下吏詘於上官攬公之軼事可為太息矣故奉政大夫户部浙江清吏司郎中蘇山衛君墓志銘君故為盧龍吏吾昔之盧龍見其俗滿漢雜處多逋逃盜賊難治自君為令以亷能聞於四方境內大治㑹詔下郡國察吏之賢當行取為給事中御史者君在選中既上竟除曹屬官及余承乏户部郎署中老吏每稱君猶憚懾其無私不為利誘威怵吾又以是益知君賢當君之為曹屬官數年曹上下胥賴之君每謂其同儕吾殆將老矣不樂與少年治吏事㑹遷秩福建福州府知府引見朝廷憫其年至以原官致仕君喜曰吾初志也兹獲遂焉君故為宿儒緝學學使者每臨試則取以冠諸生録其文以示學者使為楷模君故為邑中師至是歸益以倡道論學為事邑中學者尊禮之居數年卒卒時囑其子咸萃曰吾生平慕陳先生為人先生之文能傳道當世名跡以永於後汝曹必往求銘吾君既殁咸奉命徒跣走京師蒲伏階下泣以請時余出入禁中戒作文字固辭咸請益亟越明年乃克為之公之在盧龍也當兩京孔道驛使者冠蓋相望不絶差役㫄午送往迎來晝夜不遑息諸所供張糗芻什器之需丐貸於人錙黍不以纍民稍以其間履田畝勸農桑勞來董誡之盧龍額徵米二干八百石草萬六千束先是勺杪以下無器可指率用升合量至相倍蓰草徵銀而仍易草於民官輒減其直民用重困君令户合納其米統歸之斛斗吏以是不得輕重上下其手草徵本色輸而無所困民皆大喜悅盧龍士不務學君興行教化奬拔文士丕變其俗士由是取科名者甚衆君亷清無欲故精彊敏幹事無巨細迎刃擘解裕如也于清端公撫畿輔謂之曰亷吏固多能也後駕幸霸州于公來謁白循良吏數人君與陸君隴其並舉焉上遣刑部尚書魏公象樞偕吏部侍郎科爾坤公巡察畿內至盧龍治具不為食啜茶一甌曰令飲盧龍一杯水耳吾亦飲令一杯水諸大獄悉以咨公公為引經準律魏公益大稱善君因言民無知宜哀矜勿喜魏公嘉納之格文清公為直隸巡撫以事迂道至其縣中迎謂君曰令之苦無異秀才時然做秀才自苦耳今令苦而百姓樂不猶愈乎居無何格公疏薦盧龍令第一靈夀陸君次之疏上而格公殁人有言格公于公天下所稱清忠鯁亮真能薦引人才者非如託名忠直而隂以排擯善類者比也向使格公不死于公不遷公所被薦達而獲知遇者當不僅於此然夫人患不自立耳誠能自立如居官之大小何論焉不然則世之狷巧工媚邀譽於時以欺買而得大官者何限是亦足重耶假令君肯如世人之所為而得大官今日凂豫文以為銘子能靦顔執筆而為之以自欺其心而愧於其辭耶此可以知其輕重長短之所在巳按狀君生三年而孤鞠育於王父王父為學官於晉陽夜則令抱其足以臥口授經才一過能背誦王父大竒之咸之言曰自咸記事以來見先府君每嵗時家祭未嘗不涕泣也君諱立鼎字慎之蘇山其别字也澤州陽城縣道濟里三甲人其先遷自平陽代有甲乙科始祖仲賢仲賢生元凱元至正辛酉科進士元亡不仕元凱生敏中敏中生旭皆讀書有名節旭生戊以明經試第一戊生弸弸生然然生永安永安生堯孔皆世世有隱德或為鄉飲賓堯孔生吾良君王父也十應鄉舉弟子執經侍者嘗數十餘輩以嵗貢生為太原府訓導稍遷通渭王府教授學者稱完真先生吾良生明弼君父也為諸生以君贈文林郎直隸永平府盧龍縣知縣再贈承德郎户部江西清吏司主事母王氏前贈奉政大夫山東萊州府教授王公某女兩家皆尚儒術故深曉女誡大指有桓孟之風贈孺人再贈安人娶田氏庠生田公允成女贈孺人再贈安人繼以田氏庠生田公衍祚女生男一曰泰早卒女一再繼以田氏宜城司訓贈奉直大夫忠節公女生男一曰咸乙卯科副㮄候選學正教諭又再繼以田氏處士田公見祥女又再繼以吳氏處士吳公臨泉女生男二曰萃嵗貢生候選訓導曰履少殤女一適名家吳夫人卒之明年而君殁康熙三十七年九月六日也距生之年前明天啓三年十一月三日蓋年七十有六云以某年月日葬於某山之原君所著有約齊詩文集輦下偶吟漫堂和詩如干卷始余知君以盧龍故敘盧龍之事為特詳蓋為吏於外專制百里之命操舍由己故得以自表見於時及入而為曹郎官則否人衆而事權不一也故其表見為難夫人能自潔其身不隳其素守則亦可謂賢矣嗟乎人衆而事權不一難以自表見於時者豈獨曹郎官為然哉使君得一郡卧而理之其治蹟當不減於盧龍時也而君顧老矣君之老也雖於君為得乎而豈非福州一郡之不幸也哉君雖不大用於時而生平學行政事可以坊表士林針砭俗吏有禆於世道人心非渺鮮也其所行皆應銘法余是以不辭而銘銘曰我昔奉使之關東長亭短堠經盧龍江湖遠涉無我蹤海日照眼波蕩胸蕭蕭回馬嘶春風灤河三日留征蓬寒流斷岸夷齊宮李廣射石埋荒叢棠花舊雨村樹濃豈知宰木栽新封公具衆美書不窮我獨記此情所鍾亷吏身往風益崇公乎精爽慿此中銘以歌詩情未終魂兮歸來悲哉公監察御史陸君墓志銘余聞靈夀令陸君亷且賢清苑令邵君亷而剛將皆薦於朝或謂余剛者易折且多怨恐及公余應之曰果賢與雖折且怨庸何傷於是具疏草袖中將上㑹上御宮門急召九卿舉廉吏既進升階未盡一級上獨目廷敬班定又數目若詔使言者蓋是時余待罪掌都察院左都御史事以進言為職又嘗數薦人以故數目廷敬使言自念班下六卿既未承明詔欲以次對六卿有言他守令亷語未竟上乃問臣廷敬亷者果為誰臣奏言陸隴其邵嗣堯皆天下清官雖治狀不同其廉則一己而兩人皆擢為御史未幾陸君以言事去職卒於家其門人張子雲章排纘君行實問銘於余按君以理學聞於世其於學術是非邪正之辨有宜識其大者顧余薦君以亷吏而君以學術為政事今以余所聞在官之事質之張子所為狀而學術邪正之辨亦由是以著明焉君筮仕為蘇之嘉定令嘉定大邑賦多俗侈掣格於上下素稱難理君夙潔清自勵守約持儉至是苦節堅操屹不可動上官嚴憚之境內肅然寧輯往時令饋遺上官動以千百君嵗時一起居通書問而己吏之宿猾𨽻卒之叫嚻擾里閈者皆絶迹屏息桀黠民無敢復鬭訟不逾嵗而化理清平户有樂生之風民戴君如父母焉君不事刑威專用德化而民畏愛之邑有某甲橫行里中里中人患苦之先是數數以利啖令長恃以無敗至是知君不可動則求君故人為之游說君遇故人氣夷語和談宴極歡察其言涉甲事則變容易色客竟不得申其說㑹甲僕奪鬻薪者婦被訴而僕匿甲家君發吏捕之且趣駕將自往甲皇遽出僕置之法甲以是膽落遂折節改悔卒為善人民有訟子者君曰我無德化民以至斯也對之泣下民父子亦泣子號咷請罪掖其父歸而善事焉有弟以盜訟兄者君亷知其弟婦翁所導也杖數之曰為子壻計乃忍斷其手足耶兄弟皆感泣好如初蓋君以德化民而民化之如此俗多惡少聚黨毆擊君責其尤者杖於衢出入誡視察其色悔而釋之其黨悉解散去邑之輿臺以千數君諭之曰若輩事我無所賴盍易業自謀生乎衆皆感泣去而歸農有依戀不忍去者終公之任鄉閭不見吏胥民有宗族爭者則以其族長逮之鄉里爭者則以其里耆逮之又有自追牌則兩造要而來不煩吏也徵糧用掛比法多者書其名以俟比而及數者自歸又立甘限法令民以今限之不足而倍輸於後民甘心焉一士人經月無所輸君視其蒨籍曰是非故逋賦者詢之以新遭憂也卒不呼而糧辦舊有行杖錢日數千緡自君不事敲撲而正供外民不費一錢矣嘉定産米少嵗額白糧常糴之鄰境價髙下由人緣為奸利君為平糴定價民以不病自餘雜派悉除之民得休養益輸將惟恐後為令之明年軍興徵餉十萬君自度必以不辦免乃出令謂不戀一官顧無益於爾民而有害於急公於是户給一縣官名刺勸以大義民爭先輸不匝月而十萬之數具足君生日逺近民扶老攜稚填塞縣道取諸神祠中燭架列堂上燃燭焚香羅拜堂下烟焰徹天父老有百嵗者詣前願一識令君曰自我為民不知幾甲子矣未見有如令君者也而為仕者或不悅㑹徵市肆錢奉行者濫及村舍君報徵止於市肆於是上官劾君謂清絶一塵材非肆應部議降調嘉定民罷市日相率號巡撫門巡撫不自安為請復君官章未下又以盜案落職盜案者甲與乙訟甲遇盜傷而歸語其弟曰乙殺我言訖而絶甲弟訴於君君視乙非殺人者以實報上官謂仇盜未可遽定無何捕得真盜七人獄上部議以初不直指為盜坐諱盜例革職君曰邑有盜長吏固宜有罪民聞之空邑詣督撫為辨莫之省民既知不可留則架枅結綵户設香案人持瓣香號泣以送或負粟豆及他物來獻君不受有委之而去者即嘗所懲艾者咸謂有再造恩亦不自知涕泗之何從也民刻木為位旌幢鼓吹迎歸以祠旃檀之氣溢於道路經月不散君自蒞嘉定實不滿二年而德化入人之深如此故吾於君之不事刑威而民畏愛者不憚鄭重而叙述之誠有感於凡為吏者之皆宜然而無貴以擊斷為能也其在嘉定也蔚州魏公象樞為詩盛稱之及魏公為都御史抗章言隴其不宜罷又疏舉亷吏十人以君為首得還職為真定靈夀縣靈夀土瘠民貧役繁而俗薄君勸課耕耨以盡地力請於上官與鄰縣更役以蘇民困省除公費以養民財貽書邑縉紳變陋俗以端風尚反覆曉譬化鬭狠輕生之習其為民厚生正德若謀其子弟也尤申明鄉約鄉長保甲地方之制謂此周禮比閭族黨之遺意所以美風俗而遏奸宄盜賊之源也請之上官重其任俾各專其職功罪有歸無牽連推諉之弊其舉鄉約必擇知文義行端慤者親為講解孝弟睦姻之訓使之教於鄉規條備具巡撫于公成龍下其法行之他郡縣且訪民利病於君君條六事上之曰請緩征曰勸墾荒曰興水利曰廣積穀曰存留宜酌曰審丁不宜溢額謂自古稅斂必俟稼穡登場今正月開徵民間尚未播種也且四方寧謐司農不至告匱可通融總計以上年撥剩之銀暫抵今年春夏之餉俟秋成催解以補庫額無損國賦而民力以舒先之畿輔推及天下興唐虞三代之政此其首務也其五條皆具有法則得其人皆可實見諸行事在靈夀七年徵入京師去之日民號泣攀轅一如去嘉定時君吏治之績如此此廷敬之所為以君對也授四川道監察御史湖廣巡撫于養志有父喪督臣請在任守制下廷議未決君上疏謂治天下不可不以孝在任守制非所以教孝也天下當承平之時湖廣非用兵之地其人非賢耶固不當使之在任誠賢耶則必不肯在任守制使之解任全孝正所以深愛惜之若使因督臣題請而留皆將援此為例其不思僥幸奪情者鮮矣名教自此而弛綱常自此而壞疏入養志解任又疏言捐納縣令賢愚錯雜特立保舉法以防之近并保舉亦得捐納則賢否全無可憑夫保舉莫重於清亷若保舉可以捐納則清亷二字亦可捐納而得也不待辨而知其不可矣臣竊怪近日督撫於捐納之員有遲至數年既不保舉又不參劾不知此等果清亷乎非清亷乎即或在清濁之間然既以捐納出身又不能發憤自勵則其志趣卑陋可知使之久踞人上不僅貽患小民亦且上干天和竊以為不但保舉之捐納急當停止而保舉之限期更當酌定乞敕部察捐納之員到任三年而無保舉者即行開缺令其休致庶吏治可清選途可疏時陳御史請停保舉而開先用之例君再疏請速停保舉之捐永閉先用之例謂捐納先用之人皆奔競躁進故多一先用即多一害民之人又申言三年開缺之請詞加激切奉㫖同往㑹議又議言捐納一途惟恃保舉以防其弊今併此而捐之且待次年三月停止此輩有不捐納者乎澄叙官方之大典蕩然掃地矣此臣請停保舉之捐不得謂無容議者也議者或以三年無保舉即令休致為太刻夫此輩原係白丁捐納得官踞於民上者三年亦已甚矣况休致在家儼然縉紳為榮多矣即云設立限期反生營求此在督撫不賢則誠有之臣不敢謂天下必無賢明督撫也此臣請定保舉限期一議不得謂無容議者也時有謂捐納所以給軍需欲坐以遲誤之律擬革職奉天安插聖恩寬厚且察知無他俾仍舊職以是年秋改調歸君自以身在言路指陳無隱有所獻納宿齊豫戒上每韙其言以為與朕意合及纍陳捐納事聖明洞鑒其誠悃而嫉之者衆矣及罷言路歸後二年因簡賢臣視學政江南上又獨念君欲起用之而君已不能待矣觀上之所以知君與君之所以獲上之知者不可謂非天下之厚幸也雖不究其用而一時端人正士感發奮興爭思有所樹立以答主知而禆國事其於世道人心所關者豈非以君之故而有所激厲也哉君既屏居泖水之上布衣蔬食益以明道覺世為己任而天不憖遺竟以康熙三十一年十二月十七日啓手足矣距生之時前明崇禎五年十月十一日得年六十有三娶朱氏子二人長定徵早世次震徵女二人夫學以致用余件繫君治行不厭其煩細者將使後之學者任民社國家之責有所取法焉君充養完粹夷然氣清溫然色和居常必肅衣冠端坐止靜正而不拘安詳而不放事無巨細處之必以誠人無親疏接之不見其惰酬酢紛紜未嘗不整以暇踐履篤實不以論說為先而發之於言書之於册者無非仁義中正之㫖所著三魚堂文集問學録增刪四書大全松陽講義諸書其得於心身而措之事物者可考鏡其源流本末矣君諱隴其字稼書原名龍有所引避改今名唐宰相宣公之後居嘉興府平湖縣華亭鄉陸氏自宣公以來世以文獻為吳越間族望宋季有諱正者世稱靖獻先生入元再徵不起靖獻之曽孫宗季明永樂末以賢良辟至京奏對仁宗稱㫖屬疾辭職賜鈔幣還正統中傾其家以活饑者有詔旌門曰尚義子圭出粟沽人尤多景泰中賜爵迪功郎迪功之孫溥任豐城尉嘗督運夜過采石舟漏仰天跪而祝曰此舟中粒米非法願葬江魚之腹漏旋止及旦視其罅有三魚裹水荇塞之人咸以為神豐城之豫東築堂泖口顔曰三魚君著書仍三魚堂之名者志世德也泖口即今所居華亭鄉自東之遷五傳而至君大父諱瀗父諱元皆諸生以文學行義名於邑中祖妣李氏妣鍾氏曹氏君既仕封其父文林郎妣皆贈孺人生君者曹孺人也君生而粹清端居寡言笑經史上口輒成誦既長慨然以古聖賢人為必可師法不為科舉奪志講學授徒非義不取嶄然自立年二十七始補邑弟子員食餼又十年舉於鄉又四年而成進士其令嘉定則康熙十四年也在靈夀七年為言官一年計君前後仕不過十年而其所建立如此此余之所謂亷而賢者也銘曰天地之大敦化川流清任與和或剛或柔雖聖難兼往路徂修茍正其趨而亡險陂若適康莊我馬不騺周行載馳循途乃至偉哉英賢軒後輊前跂豫望之如山不騫如江如河赴彼九淵天下善士士皆知之我銘君藏敢為我私曽吐薦口忍緘厥詞午亭文編卷四十四
