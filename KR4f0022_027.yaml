body:
  text: 午亭文編卷二十七大學士陳廷敬撰經解三易乾下兌上此卦五陽一隂隂至寡也以九五之尊決去上六一隂如以利器芟除小草何至夬而又夬乎夬夬者不能一夬而遂夬也雖云中行無咎中實未光矣若九三無九五之勢又在諸陽之中獨與上應使避相應之嫌壯徵於色以一擊為快反足致凶故夬夬未妨也雖其始獨行遇雨若濡有愠而其後終得無咎故猶有取焉初九壯于前趾往不勝為咎此決而輕發者也九四則不能決者也誠能隨衆君子之後如牽羊之在後則藉力遂進次且之悔可亡矣牽羊與次且有辨次且而不能牽羊自古無才之小人反多剛愎自用不能隨順君子爻所以又有聞言不信之戒也惟九二剛而能中雖屬乾體然健而説決而和實備全卦之德惕號者彖之孚號有厲也暮夜有戎勿恤彖之告自邑不利即戎也雖不即戎然循是道也終至舉朝君子而小人絶迹所謂利有攸往剛長乃終也九二惕號上六自然無號君子剛長乃終小人終不可長定理定勢未可謂必無之事也大略夬以得中為貴九五終未光則以上六昵在君側五居尊位當以毅然一決為中而非諸爻可比也夫天下之勢日變者也朝多君子不易得之時也使九五不能斷雖君子揚小人之惡于王庭必無濟矣中而光聖人所深望者其尤在五哉巽下乾上姤之小人初六一隂也為女壯為羸豕為魚為民為瓜皆初六之象也初六一隂敢與五陽遇故為女壯在下故為羸豕雖為羸豕而可豫信其蹢躅隂柔則易牽故欲其繫繫則貞吉有攸往則見凶有九二之金柅初自然無攸往之凶矣初欲往而二柅之初為魚而二包之皆以其近也二之能包魚能制魚者也其為主固矣然魚為嘉味何以不利賓蓋味之美者其毒亦多小人之柔而可喜似之故二包有魚以義揆之不肯及於賓也姤五月之卦五月瓜生初象也杞髙木二象也能左右之曰以五能以二之杞包初之瓜杞包瓜而瓜不得蔓引是品物咸章之時二能使初之含章也二之為杞猶之其為金柅也然孰非五以之之力與陽者國家之命隂長而命隨去今以杞包瓜隂不得長是命自天而降不復去矣故曰有隕自天志不舍命也九三臀無膚其行次且者以行未牽於初也不遇未免有寡助之厲私遇則有牽於小人之大咎與其為大咎寧為厲矣上九與初最遠角又善觸無與初相遇之理吝而無咎雖吝不足罪也諸陽惟九四與初為正應然初隂性善牽與二相近與四相遠初繫二而不他往即得貞吉不必定歸四也二包有魚四自然包無魚夫陽之於隂猶君之於民四之包無魚是君遠其民而君無民也豈非起凶乎此卦一隂始生由是而遁而否而觀而剝而坤是姤卦為謹微之卦不可不講也五居尊位而應之者二二五兩爻之義尤不可不講也坤下兌上萃于一之謂萃有二非萃矣彖所言利見大人是也是故五為萃主他不敢當也五萃有位位者天人共與歷數攸存未有運世無本功德不紀而能崛起在此位者也以是當天下臣民之聚無不孚矣無不光矣何咎何悔哉以九五之志則常若匪孚故反躬自省元永貞之德惟恐不能盡焉志若匪孚所以無不孚志若有悔所以悔亡志若未光位乃光大彖所謂利見大人亨聚以正也非九五元永貞之謂乎此卦四五兩陽各得其應疑於不一然九四位不當居多凶之地有不正之嫌必大吉始可無咎大吉者近五之側以身萃五自不敢當天下之萃故大吉也初六本與四應改而萃五是為有孚不終乃亂乃萃也前為二引若二號之也與二相得附二萃五一握為笑也勿恤往往於五也初之萃四似正而非正改而附二萃五似亂而非亂其亂也乃其所以正也夫何咎若二者居中應五又引衆萃五中德不二但知引而不知他一孚之外無餘事也彖言大牲爻言用禴者萃之時天子之享親宜豐臣子之享上宜誠各有攸當也六三欲萃上六既萃如又嗟如者蓋上六方齎咨涕洟不敢自安於上苦欲萃五而三又萃上六必無利矣惟往萃於五庶無咎耳小吝者戒其往五而不果也互巽為進退上萃五欲其果於退三萃五欲其果於進也總之上下五爻不論有應無應皆萃於五是謂萃於一是謂萃之正萃豈非天下最盛之事哉雖然萃可喜也亦可憂也蘇氏曰五能萃二四能萃初近四而無應則四能萃三近五而無應則五能萃上此豈非交爭之地哉大象澤上於地萃君子以除戎器戒不虞聖人之慮深矣巽下坤上地至實者也亦至虛者也使地不至虛木之生將壓遏而不得長豈能拔出地上干霄抉雲哉惟君亦然使君不能下士則君門如天草茅賤士無由上達矣升卦六五居坤之中以順為德順故能虛此五之貞也五以貞為階天下皆由階而升用見大人勿恤者用此也六五所以為大人也五位西南巽之至坤必歷南而後至故曰南征吉志行也天下之志行五之志乃大得所謂有慶者不獨二之有喜若初之上合志三之無所疑四之順事上之冥升皆有慶也彖傳雖舉九二剛中而應為釋其實非九二一爻可專有也初六允升初為巽主巽與坤順合志其升自可信也九二孚乃利用禴二有中實之德孚信于五雖外飾之靡丈去而不用可也木至九三漸入坤體虛而無礙故謂之升虛邑六四上由之以下達下由之以上通是為五汲引在下之賢人登於天子之廷者也賢人進而治功成王用此享于岐山矣故曰順事也上六居卦之上木之升至此而極凡木之升在春夏人易見之至於冬則不見其升而實升而不息故謂之冥升謂之不息之貞消不富者以冬而言也使賢人之升至於不見而升升而不息豈非天下國家之大慶哉坎下兌上困卦彖曰困剛掩也剛指二五剛中之剛九四不預焉二五之剛為初與三上所掩又為九四所掩故曰剛掩而不曰柔掩剛使二五止為初三上所掩九四不預焉何以不曰柔掩剛而但曰剛掩哉能辨九四亦為掩剛之人而困卦之義明矣九四來徐徐凡自外而內者謂之來四之來以就初也徐徐者隔於九二而不得速也故曰困于金車然四之志豈須臾忘初者哉初掩二者也今四之志在下不止欲助初掩二且欲引初掩五矣而謂四非掩剛之人哉然四與二皆陽二又承五故又曰雖不當位有與也然則吝有終者此望四自新之辭也四互五三有巽木象初與四隔故有臀困于株木象四至二互離初在下有入于幽谷象自初至四隔三爻有三歲不覿象此卦獨初與四應凡卦以有應為吉今四反纍於初小人之不可作緣如此三與上不相應據位本相應兩柔又相應今隔於五五剛如石三不能轉下又承二據二之蒺藜三為其宫上為其妻入於其宫不見其妻凶何如之三之不見妻雖以隔於五故亦以上之悔故上為三所牽附困于葛藟也在卦之上勢窮而危于臲卼也處勢如此一動足輒危故曰動悔動悔者不可征也若能悔悟則可以征而吉矣此又望上自新之辭也此四爻者二五之剛所由掩也豈知二五本剛中非此四爻所能掩乎不能困剛徒以自困小人何樂而為小人哉若夫二與五真可謂之大人真可謂之君子故能在險而説困而不失其所所者何貞也貞也者剛中之中也此二五之安身立命處也可以感人可以格鬼神可以無入而不自得又何不亨之有乎是故人以九二為困不知酒食之慶在中朱紱方來之慶在中利用享祀之慶在中雖征行非其時故凶而以九二處之自無咎矣九五者居尊位者也其時掩五者非敵國外患不過左右小人耳天子於小人怒則去之小人既去羣才效用此劓刖之象也困于赤紱之象也朝廷之上以刑法為驅除志之未得在此然事平而朝廷宴然亦在此矣乃徐有説也利用享祀意與九二同皆以剛中之誠心孚於鬼神故也夫二與五在險能説困而不失其所是説其所自有何至以口舌求説來尚口乃窮之誚乎聖人愛君子故用丁寧於不必丁寧之地也此卦兼為小人謀為小人亦所以為君子也所以為天下也聖人之為天下慮也蓋詳彖傳困而不失其所為句或連下亨字讀非大象曰澤無水困君子以致命遂志夫致命遂志之人何人哉平日非志不在溫飽非犯顔敢諫非以忠孝節義自期待臨大節而不可奪者能致命遂志未之有也無致命遂志之臣則亦必無實心為國之臣必無有事為國守土之臣國家何利於此故培養節義是為急務也巽下坎上井以養人猶君子之德能養人也初六之井泥九二之井谷二者皆無足取其惟九三乎三之井泄即九五之井洌寒泉蓋九五能使寒泉之見食于人非九五自為寒泉也當其不食則行人徒惻一遇王明則並受其福九五之中正非明王乎甚矣九五之重也六四之井甃此作人薦賢之臣也上六之井收勿幕此用賢之臣不蔽賢之臣也四止無咎上且元吉者蓋至上而寒泉之食無人不被井道於是大成矣是六四不可無上六尤不可無也雖然薦賢者賞蔽賢者戮有王明之九五何患無六四上六之臣哉王明並受其福者天下並受其福也生於其時者何其幸耶離下兌上國家一切改革無不有天人在焉非獨革命大事也天運日變于上人事日變于下而天理人情必不可變能以天理人情為念此革而當其悔乃亡之本也是故革者不得已而為之革也不可革則不革初九之鞏用黃牛也既革不可再革上六之征凶居貞吉也不可不革不可妄革其難其慎則九五主革之君二三四奉行之臣也人知君子豹變小人革面革之利也抑知順以從君由於未占有孚為九五虎變之大人者實未易與合二三四爻象觀之其辭兼勸與戒無一非體未占有孚之義而為辭者也即無一敢出於順天應人之外者也世之因循規避而不敢革與輕躁執拗而妄革皆得罪革卦之君臣者也巽下離上鼎卦六爻初六與九四相應初在下為鼎趾即四之所謂足也當未烹之時鼎顚其趾出其否惡未為悖理蓋以小人畜小人亦小人所以無咎也九四不察誤授之以重任遂至鼎折足覆公餗九四之形容亦沾渥難浣矣至此人不責初之不勝任也而直責九四之不勝任平時過信初六今所信果如何哉九二與六五相應九二鼎有實宜六五之趨就恐後也反使二咨嗟於下曰我仇有疾不我能即何故豈非柔靡因循之過與四亦非太柔不可輔者故有鼎黃耳之象但為上九玉鉉之臣為相而二五相應之常可以不失矣此五所以利貞而二所以得吉也九三與上九本宜相應以兩皆剛故不相應三之有實與九二不殊以上不汲引不得升於五前故有鼎耳革其行塞雉膏不食之象使上九變其金鉉為玉鉉則剛柔相節而三庶乎鼎耳不革其行不塞雉膏見食矣此又三之所以方雨虧悔終吉也夫鼎之烹也以享上帝以養聖賢二與三是也人欲勿用天其舍諸今二三之實皆由上九見食於六五是上九以薦賢上當天心也大吉無不利何疑之有此卦之義在於大臣遠闒茸而舉賢人繹六五金鉉之義則用大臣以用天下之賢人尤不可不加意也九二雖有終無尤之喜猶未免有慎所之之戒何也賢人君子不見用於時或為權門牢籠因而失節故丁寧戒之宋楊時為蔡京所薦前朝吳與弼為石亨所薦至今猶有遺憾况其他乎震下震上洊雷亦不必指非時之雷如冬雷及無雲而雷之類自二月發聲之後八月收聲之前凡雷皆雷也人亦無聞雷霆而不懼者當雷之時妄念盡空天良陡發惜乎雷過之後妄念又滋耳若能時時恐懼時時修省所謂回天格天孰加於此乎震來虩虩笑言啞啞文王用之繫卦周公用之繫爻恐致福也後有則也孔子用之釋彖既又用之釋象此四語蔽震卦可也蔽全易亦可也艮下艮上彖辭艮其背孔子釋之作艮其止艮其背即艮其止之象艮其止即艮其背之實義止其所又艮其止之的訓也背也止也所也切實言之一理而已艮其止者止於理也凡人不過一身其與身接者皆人也不見理但見人與身則所以處身與人者失矣不見身與人但見理則所以處身與人者得矣故彖曰艮其背不獲其身行其庭不見其人艮止也此止非專屬止非專屬靜行亦有止止亦有止行即是動止即是靜行止動靜無不有理止其所而時出之故曰時止則止時行則行動靜不失其時其道光明然則凝心無為息緣住靜虛寂之學必非艮止之學明矣艮下巽上彖傳進得位往有功也進以正可以正邦也其位剛得中也數語明指九五或曰天子不可以漸進言夫由儲君而為天子非漸而何天子尚進以正進以漸天下何得幸進躁進哉使天下不幸進不躁進天子正邦之功莫大於此矣卦辭取象于女歸六爻皆取象于鴻又取象于夫婦鴻不再配婦不二醮君臣之義也始進不正其後未有能正者也九五六二相應君臣之正也五鴻漸于陵婦三歲不孕二鴻漸于磐飲食衎衎五言其始也二言其終也雖終莫能勝而其始亦難矣則以九三六四故也三無應離初二而耽四之邪配是謂夫征不復以私而孕不敢舉焉是謂婦孕不育私而得位盜思奪之故結四相保是謂利用禦冦四亦無應故三漸陸四漸木皆非鴻之本性也四雖漸木或得其桷猶可苟安四之順巽異於三之剛躁故三不免凶四猶無咎與惟三四橫據于朝故五漸于髙陵未能遽遂下接六二之願然五剛中得位去此何難此五所以終得其願而二不素飽之臣終得見用也初六鴻漸于干新進小臣未遽獲上履危蒙譏誠所不免故曰小子厲有言無咎上九爵位不能繫之如鴻之髙飛雲路清風峻節足以勵一時而師萬世故曰鴻漸于逵其羽可用為儀此二爻亦無應者也比之三四則賢不賢相去遠矣去幸進以清仕塗拔孤寒以開賢路奬山林以養廉恥孰非九五之事哉兌下震上歸妹一卦自卦辭論無復吉理自六爻論人有貴賤有賢否其遇亦有幸不幸妾媵之事略具矣六五妾媵之主也帝乙歸妹是其貴也其君之袂不如其娣之袂良是其能逮下也又能不尚飾也月幾望是其德之盛也又謙沖不敢盈也然則六五以其中德之貴而行不專恃其位矣娣得此以為女君何其幸哉初九之為娣固也九二何以云眇則以跛眇相似也跛故不敢正履眇故不敢正視初征吉二利幽人之貞質性固有小異而以下承上之常兩皆不失矣惜古今女君不皆六五而娣不皆初九九二也六三為成卦之主始亦欲待年而嫁獲其良配後則反歸以娣豈非女德不正人皆賤之故與九四歸妹愆期遲歸有時亦女子有志者也聞古之盛世男女以正婚姻以時然則女之愆期必有任其責者矣上六女承筐無實士刲羊無血無攸利此非約婚而不終者也愆期之女鰥曠之士不能具禮簡略相從者也或曰此卦自六爻而外通于公卿士庶且妾媵小事耳聖人何為娓娓不置是未讀歸妹之彖者也歸妹天地之大義也天地不交而萬物不興歸妹人之終始也而可以為小乎離下震上天下之事倚伏無常者也豐本以明以動故豐既豐乂以雷掩日之故於是豐之名雖是也而豐之實改為豐其蔀豐其沛豐其屋矣豐至是疑無亨理然本以明以動故豐苟循其本仍以明以動救其弊何難於亨哉王假之勿憂宜日中所以救豐之後也豐大也日中之日遍照天下此之謂大也天下無常中之日而君心有常中之日日之象雖屬於五而五之明實取於離日不至於昃君不厭其臣天下所以常豐也日中則昃月盈則食天地盈虛與時消息况於人與鬼神乎此言豐之不可恃也或恃豐為可常或謂一豐之後不可再振者皆非也五來章二有孚發若則二之豐其蔀日中見斗往得疑疾自可免矣四在五下故豐其蔀日中見斗與二不殊而其遇主不同一心以佐五而五之來章已得二又得初與四雷不蔽日豐蔀盡撤下明上動頓還舊觀豈非快事哉惟上六隂柔在上此重五之暗者也三不幸與之應所謂豐其沛日中見沫暗不在五而在上矣有臣如此而望與之竭力悟主行莫大之事哉惟以權自廢折其右肱而已上位窮而富溢豐大其屋翔于天際然窺其户閴其無人蓋九三既折肱則上門雖如市謂之無人可也豐其屋適所以自蔽古來為臣如上誰能幸免也艮下離上旅者外往而違其家者也士庶賈賤之常而尊貴者之變也如晉重耳僃四爻之義焉吕卻之難豈非射雉一夫亡乎明年襄王入於王城王饗醴命之宥又二年獻楚俘于王王饗醴命晉侯宥王命尹氏及王子虎內史叔興父䇿命晉侯為侯伯豈非終以譽命乎處狄十二年及齊齊桓公妻之有馬二十乘有狐趙諸臣從之豈非旅即次懷其資得童僕貞乎處齊公子安之薑氏曰行也懷與安實敗名薑與子犯謀醉而遣之醒以戈逐子犯然公子遂行矣豈非旅于處得其資斧我心不快乎其過衛也衛文公不禮之乞食于壄人壄人與之塊似乎旅瑣瑣夫瑣兮尾兮流離之子黎臣所以歎也而不可論晉公子子犯曰天賜也稽首受而載之旅雖窮而其君若臣之志不窮志不窮旅之窮何足為災乎此卦最惡者上九而九三次之三過剛故有焚次喪僕之事大約旅之時瑣瑣固難過剛則人不附人去則瑣瑣益甚矣至于上九焚巢之害視焚次又甚矣旅非笑時也而先笑號咷在其後矣牛既喪矣終莫之聞矣是為最凶者也可不戒哉巽下巽上風者天之號令巽為風故為命令兩巽相隨故為申命法教百端令行為上故曰行事此九五大人之事也五居巽中以中行命命無不正所謂剛巽乎中正而志行者也命既正矣則吉由之悔亡由之上下無不利由之矣無初有終初未得不令而從終則無令而不從也庚者十甲過中事之當更者也更事故申命也或曰甲主仁庚主義甲寬令也庚嚴令也然巽者入也重巽所以入人非可以嚴厲言也小者初與四兩柔也柔皆順乎剛剛則單指九五九五居尊位故柔皆利有攸往利見大人雖九二之剛亦不過下引初六使上順九五耳不敢當大人也初以順五為貞進退多疑則失貞故利武人之貞武人者果決無疑者也四決志順五無進退之悔可以稱武夫矣倡初順五故曰田獲三品初巽下為品與四隔三爻為三品也田而獲亦武夫之事也四不止有功於初豈非五之功臣哉二與四皆互兌口五之申命行事必藉二四四稱武夫二稱史巫亦互辭也蓋所以使初無疑而事五者亦辭命之力也巽在牀下所以事五也用史巫紛若所以申五之命也然則二之有功同于四也九三居下巽之終頻巽猶初之進退也始而志疑終而志窮吝何能免哉上九居上巽之終過于巽而不能斷是為喪斧不得以武夫之貞自解矣又曰喪資何居此老而患失足恭無耻者也意保富貴富貴未必能保故曰巽在牀下上窮也喪其資斧正乎凶也正乎凶也或作兩句讀是也言爾以為正乎吾但見其凶而不見其正也巽在牀下與九二同亦所謂吉凶不嫌同辭兌下兌上兌説也順天應人使民忘勞忘死皆由於説説豈有不亨者哉然亦有不可亨者説之失正也故又利於貞焉何以為貞剛中而柔外是也剛中則不昵柔外則不暴不昵不暴説之正也亨之道也九五以剛居中所謂當位之大君也例應云孚於兌嫌同於二變文曰孚于剝此聖人特筆也蓋説我者剝我者也既剝矣何以又孚蓋知我之志本無他也然孚于剝則自應有厲惟能有厲而厲自然無矣此五之貞五之所以説也初之和兌者我無爾虐爾無我疑也二之孚兌者我無爾詐爾無我虞也四下乘六三與上六同體若商略所以説乎兩柔者則徒傍徨不寧無為也惟介然疾之使兩柔皆不能涉入則可以有喜矣此三爻者其道不同亦皆説之能利貞者也至於六三上六一來一引正兌之小人以妄説為性而君子不可妄説之者也六三言凶上六不言凶者上之凶可例三而知也大約説卦以利貞為主説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死苟不能説民而小人是説一旦有事誰為我勞誰為我死小人且掉臂逝矣戒之哉坎下巽上此卦五為主渙之君二四為治渙之臣剛來而不窮二也柔得位乎外而上同四也王假有廟王乃在中五爻所謂王居也利涉大川乘木有功五乘四木以濟坎水也利貞者王以居為貞也所謂正位也有五之君有二四之臣而初六六三上九無不附于二四協志佐五一時君臣如此渙之所以亨也夫渙非幸事也普天之下誰非臣子初六之柔藉二互震之壯馬以拯王室之難豈非順哉四為木為機初用二馬二奔四機得四而二亨渙之願得矣六三渙其躬者以有渙在不敢不散其私也志在外者志在四也夫初二三皆歸於四四不敢有以歸於五可謂渙其羣矣大臣而無朋黨之私可謂光大矣人惡渙故喜羣四渙其羣功乃在五所謂渙有丘也此非常人心思所及也蓋渙之時丘為衆之所止五當互艮之山故象丘也九五渙汗其大號巽之申命行事也渙王居者王居而不動所以守宗廟社稷也渙汗其大號渙王居皆渙字一讀言渙時宜汗其大號渙時王宜居守也故象曰王居無咎或以王居為王之居積連渙字為句以散財釋之誤矣此卦以汗大號渙王居為渙之實事與餘象不同若夫上九之渙其血者上與三應三渙其躬上安得不渙其血故上亦渙之功臣也去而遠出者何蓋功成身退知幾之士也故爻以無咎許之象以遠害明之史言唐德宗時奉天所下詔書雖狂將悍卒聞之莫不感激又言山東宣布赦書士卒皆感泣又李晟上行在露布曰臣已肅清宫禁祗謁寢園鐘簴不移廟貌如故渙汗其大號渙王居二者為渙之實事此可以見矣兌下坎上節卦斷以節財言天地節而四時成節以制度不傷財不害民反而言之不節以制度則傷財害民矣節豈小事哉此卦分坤之一柔居下卦之上為兌六三也分乾之一剛居上卦之中為坎九五也兌為説坎為險説以行險者六三也當位以節中正以通者九五也苦節不可貞則上六也以六爻細言之初九在下知通財之權在五塞財之權在二不敢前侵二事為不出户庭户竒九二之象也二坐視三之不節而不能塞為不出門庭門偶六三之象也夫節財者當於有財之時失其時何嗟及矣二之凶宜也若六三不節若則嗟若又三之自取也咎將歸誰多費以快意而不知窮在其中説以行險非六三而何九五當位以節中正以通節而通故不窮不窮故往有尚甘節之吉所以在五也六四享安節之亨亦以承五之道故也六三不節蔓延於上然凶而猶謂之貞猶得悔亡者罪不在上也嗚呼財者天下大事也九二大臣也不知錢穀託言非其職過矣至于制度數議德行國家之大政所係於財者至重也明職掌禁侈用制度數以革僭分議德行以勸儉約天下未有不家給人足者也有中正以通之德其行此固易易也兌下巽上卦名中孚中者二五剛得中也若三四則柔在內何得以內冒中哉舊有中虛中實之説中實是也中虛非也二五成卦之主凡卦之義皆可取用五君二臣二臣臣説君巽故曰説而巽孚乃化邦也信可以感天地動鬼神凡有血氣無不可感故曰豚魚吉信及豚魚也巽為木為風互震之動風行木動舟象也三四兩隂舟虛象也君臣交孚何事不可行風順舟駛無以逾也故曰利涉大川乘木舟虛也三索得女而成兌一索得女而成巽遡其本則乾也乾為天剛健中正莫過乎天二五有焉孚之所以為孚者此也故曰中孚以利貞乃應乎天也至六爻之義亦惟二五為中孚與卦義同其餘不中則不孚矣九五為君之孚臣其辭易知九二取象于鶴者鶴水鳥又秋禽九二兌體故象之又君主日陽也臣主夜隂也鶴在隂亦二之象也又夜半陽生鶴知夜半隂應陽之象也鳴和兌口之象也曰我曰爾即其鳴和之辭也爵祿曰爵鳥爵曰爵鳯皇亦曰爵鳯鳴節節足足故飲器象之亦曰爵然則爵之稱亦多矣我有好爵其指鳯乎鳳生東方君子之國羽蟲三百六十鳳為之長九五居巽乘震象之宜也曰我有曰吾與爾靡皆據二言之此臣樂得君彼此告語之辭也或以子和指五非也以子目五失尊卑大小之序於理為悖且鶴屬兌體子又屬巽體一物而兩取象其義紊矣又以繫辭傳參之君子居其室出其言善則千里之外應之况其邇者乎出其言不善則千里之外違之况其邇者乎遠邇相關如此邇可忽與母子室中之至邇者也鶴鳴子和邇先應也此又欲獲君先信友之説也初九虞吉者虞度六四之有它其心不敢安也虞於志未變之先故吉志既變而後悔之晚矣六四捨初附五絶類而上附五不失臣道月幾望之象絶類不繫私交馬匹亡之象此捨私徇公善補過者也然反覆賣友之譏亦難免矣其酈寄之流與三與上應而不應故辭曰得敵或鼓或罷先信而後疑也或泣或歌既疑而又信也總之疑而不定者也上九翰音登於天音無翼而飛故曰翰音登于天者在卦之上居巽之極言猶飄風不可捉執然上既不信矣其誰信之故曰何可長也獲君信友於九五九二見之友之不相信於初四三上見之古今未有上下相疑而可有為者中孚一卦於君臣朋友之際言之備矣艮下震上大為陽小為隂卦有四隂二五又居中得位小者既過大者何以亨哉小者過而大者亨亦必有道矣則貞是也處小過之時行小過之事所謂過以利貞與時行也可小事不可大事是也此又為君子小人之互辭柔得中是以小事吉則大事必不吉剛失位而不中既不可大事則但可小事矣此卦本教君子之行小事辟如飛鳥遺之音不宜上宜下上逆而下順上則大事也下則小事也君子知此則自然無違時而行之禍故曰大吉大吉者君子之大者吉也繫辭之聖人意為君子然所以示小人者亦在其中矣九三弗過防之弗過一句防之一句時既不能過小人而外示防小人之形從或戕之之凶其能免乎此憂九三過剛危之之辭也九四弗過遇之弗過一句遇之一句時既不能過小人而能善遇小人此九四之利貞也故即豫其無咎然遇小人譬如養虎故戒之以往厲必戒遇亦一時之權常以是為貞反至失身而不貞故又教之以勿用永貞此三四兩爻之下而不上可小事不可大事所以亨所以大吉也六二隂過於陽故為過其祖過其君以隂居隂故為遇其妣遇其臣此又六二之能下也然二本過其君聖人曰不及其君何哉臣不可過象釋之明矣天王狩于河陽公孫干邾其書法同孰謂易中無春秋哉六五密雲不雨自我西郊乂曰公弋取彼在穴皆有隂不敢行陽事之象此六五之下也然其德則六其位則五與二少殊雖不雨雲已上升故象曰已上也五君位也不曰王曰公亦書法也初六飛鳥以凶此初之不下而上也惟其為飛鳥所以致凶也不可如何自作孽不可活之謂為初歎息而言之也上六弗遇過之亦作兩句讀言上六不肯以禮遇陽而務欲以力勝之也此上六之上而不下也飛鳥離之上與初為飛鳥同故罹禍亦與初同也曰凶曰是謂災眚辭繁而不殺聖人為上歎息亦同於初矣離下坎上既濟之世侈大之志易生能收斂而不至侈大則既濟可以常保故卦辭曰既濟亨小而釋之曰既濟亨小者亨也剛柔正而位當似槩指六爻而意在九五九五為既濟之主其禴祭也非薄於鬼神也此九五之能小也後世有數十年不親郊祀者反之則東封西祀以明得意以祈福祐馴至民窮財匱何如以時禴祭者實受其福哉舉祭祀一端他可推矣先天離東坎西九五位居坎中故為西鄰所云東鄰西鄰殺牛禴祭者一奢一儉相形之辭而非以六二為東鄰也六二柔得中卦辭所謂初吉者喪其茀而不行俟其得而不逐真與民休息安靜無事太平之良臣也初九曳其輪濡其尾畏輕舉而致禍也六四濡有衣袽終日戒能預僃而戒懼也若初與四亦皆能小之賢臣也天下已安小人生事多開邊釁以徼功名故聖人繫九三曰髙宗伐鬼方三年克之又丁寧之曰小人勿用其意深矣夫以高宗之賢當全盛之世其伐鬼方猶以三年師老民困其憊可知可不戒哉上六與九三相應小人彼此附和喜於生事者也冒險而進卒止于險而不得出濡首之厲實自取之亦小人所當戒也雖然既濟有九五之君有六二之臣自然無九三上六之小人矣坎下離上既濟之世不可用兵未濟之世兵不得不用然亦不得輕用必上有聖主下有賢將相而後可今觀六五以文明居上以有孚應下九二能持重於內九四能臨事而懼震用伐鬼方於外五非嗜殺之主二非貪功之相四非輕敵之將宜其皆得貞吉也是知未濟之兵出於不得已者也未濟之亨不以是哉不獨此三爻也聖人於初與三上皆有戒辭焉初六濡其尾吝象曰亦不知極也與彖傳所云未出中者其意相合未濟之時特嫌其濟而不知極非謂其不宜濟也六三曰未濟征凶又曰利涉大川意亦同初六一戒之一勸之亦以未濟之時不可不求濟也上九有孚于飲酒剛而能和以和孚衆所以無咎然雖居卦終猶在未濟和而不節過親小人恐禍有出於意外者濡其首有孚失是聖人所以又申戒於上也總之不論既濟未濟聖人皆以用兵為不得已之事皆以小心敬慎為訓天運固有循環亦人事得失所致也合二卦為一卦讀之常存思患豫防之心焉天下其常濟乎午亭文編卷二十七
