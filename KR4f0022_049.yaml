body:
  text: 午亭文編卷四十九大學士陳廷敬撰杜律詩話上兒子豫朋四五嵗時誦杜詩為説其義輒能了了予嘗見世所傳諸家解杜詩意多不合故其所説多用已意又嘗妄謂杜詩説之誠難而律詩尤難葢古詩如哀江頭洗兵馬等篇文義事實有可推考律詩則託興幽㣲寓辭單約説之故尤為難予既為兒子説杜七言律詩間録其别於諸家者以備遺忘題曰詩話鄭康成説三百篇以箋為名箋者標也識也示不敢言注但表識其不明者耳後世於杜曰注曰箋曰箋注類以解釋為義今曰詩話别諸家也且不敢言箋註也諸家説左者概畧姓氏但云或示非好辯也康熈戊辰七月望日説翁自記題張氏隠居天寳間遊魯及歸長安作或謂舊唐書李白傳云少與魯中諸生張叔明等隠於徂徠山號為竹谿六逸又子美雜述云魯有張叔卿意叔明叔卿止是一人是詩題張氏隠居豈其人與愚謂讀子美雜述張叔卿未能如詩所云也此自當時一髙士題止云張氏遂使無考亦憾事鄭駙馬宅宴洞中主家隂洞細烟霧留客夏簟青琅玕自是秦樓壓鄭谷時聞雜珮聲珊珊鄭潛曜見唐書孝友傳公作臨晉公主母皇甫淑妃碑亦述公主孝思其賢而好客於末句見之秦樓指駙馬所居鄭谷指山林貧賤之宅葢茅堂風磴山林所有駙馬已兼故逺勝鄭谷或以秦樓指公主鄭谷指駙馬非贈獻納使一無使字起居田舍人澂晴窻點檢白雲篇點檢白雲篇點檢二字説者引唐史起居郎因制勅稍筆削又起居舍人本記言之職惟編詔書是也至白雲篇求其説不得遂以漢武秋風詞白雲飛當之愚按漢書郊祀志天子封泰山封廣丈二尺髙九尺其下則有玉牒書書祕又云其夜若有光晝有白雲出封中唐書開元十三年封泰山蔵玉冊於封祀壇之䃭所謂白雲篇疑即玉冊之類也時公既獻三賦乂欲奏封西岳賦如此解白雲二字較明上下文義亦復聨貰城西陂泛舟青蛾一作娥非皓齒在樓船横笛短簫悲逺天春風自信牙檣動遲日徐看錦纜牽魚吹細浪搖歌扇燕蹴飛花落舞筵不有小舟能盪槳百壺那送酒如泉觀題是公與人泛舟或謂指所見或謂譏明皇皆非贈田九判官梁丘崆峒使節上青霄河隴降王欵聖朝宛馬總肥春一作秦苜蓿將軍只一作不數漢一作霍嫖姚陳留阮瑀誰爭長京兆田郎蚤見招麾下賴君才並美一作入獨能無意向漁樵此詩三四句或謂天寳沿邊置十節度使各鎮兵四十九萬馬八萬餘匹然盛名無踰哥舒翰天寳十三載春安禄山求兼領閑廏羣牧又求總監宻遣親信選健馬數千匹時李郭名位尚卑王忠嗣以䜛廢與禄山頡頏哥舒而已曰總肥曰只數因贈梁丘隠語託諷使翰思所以制禄山也愚按新唐書百官志駕部郎中員外郎各一人掌輿輦車乗傳驛廏牧馬牛雜畜之事凡驛馬給地四頃蒔以苜蓿降王欵朝驛傳騷然宛馬總肥春苜蓿不過指此此句與第二句應下句與第一句應吐谷渾蘇毗王欵塞明皇詔翰應接見王思禮傳或以此當降王欵朝是也謂翰報命必入朝意料之辭無據首句上青霄自指崆峒地髙而言明皇紀及翰傳天寳十三年無翰入朝事是年翰遘風疾因入京廢疾於家田非隨翰入朝或以使事入奏必在翰未遘風疾前公投贈翰詩首云今代麒麟閣何人第一功末云軍事留孫楚行間識吕䝉防身一長劍將欲倚崆峒辭意與此詩同當是一時作或即因田投贈哥舒也題省中院壁一無院字掖垣竹埤梧十尋洞門對霤一作雪常隂隂落花遊絲白日靜鳴鳩乳燕青春深腐儒衰晩謬通籍退食遲迴違寸心衮職曽無一字補許身空比雙南金首句埤字解者各異愚謂埤與卑同此言竹卑梧髙也晉語松栢不生埤荀子埤汙庸俗漢書劉向傳増埤為髙五行志塞埤擁下子虚賦其埤溼則生蒼莨蒹葭皆可證射雉賦揆懸刀騁絶技如䡹如軒不髙不埤公荆南兵馬使趙公大食刀歌用之不髙亦不庳正出於此字又作庳是埤卑庳古通用也至左傳宫室卑庳二字連用别有音義宜隨文讀曲江陪鄭八丈南史飲雀啄江頭黄柳花鵁鶄􅗌鶒滿晴沙自知白髮非春事且盡芳樽戀物華近侍即今難浪迹此身那得更無家丈人才一作文力猶强健豈傍青門學種𤓰近侍即今難浪迹即吏情更覺滄洲逺又當與省中院壁一首合觀或出為司功事已萌芽勉為貧仕終非所好故立言如此與鵁鶄鸂鶒本取諸江南置苑中者今云滿晴沙與後秋興所云圍黄鵠起白鷗同一義非但賦一時景物也曲江對雨城上春雲覆苑牆江亭晩色靜年一作天芳林花著雨燕支一作脂溼一作落水荇牽風翠帶長龍武新軍深一作經駐輦芙蓉别殿謾焚香何時詔一作重此金錢㑹暫一作爛醉佳人錦瑟傍或曰此懐上皇南内之詩也明皇以萬騎軍平韋氏改為龍武軍親近宿衞今深居南内無復昔日駐輦游幸矣興慶宫南樓置酒眺望欲由夾城以達曲江芙蓉苑不可得矣金錢之㑹無開元天寳之盛對酒感歎意亦在上皇也愚按詩作於乾元元年春太上皇以去年十二月至自蜀居興慶宫帝自複道來起居太上皇亦時至大明宫或相逢道中帝命陳元禮髙力士王承恩魏悦玉真公主常在上皇左右梨園弟子日奏聲伎為娯是時帝父子尚慈孝無間也觀龍武新軍四字自當指肅宗言葢長安初復曲江游幸非復往時之盛故公對雨有感耳題鄭縣亭子鄭縣亭子澗之濵户牖憑髙發興新雲㫁岳蓮臨大路一作道天晴一作清宫一作官栁暗長春巢邊野雀一作鵲羣欺燕花底山蜂逺趁人更欲題詩滿青竹晩來幽獨恐傷神或謂雀欺燕蜂趁人亦即景所見不必謂喻羣小䜛譖按此詩明有寄託亦不必概去之詩無他意强作附㑹詩有寄託反謂無他皆好異之過也此詩乾元元年赴華州司功時作早秋苦熱堆案相仍原注時任華州司功七月六日苦炎蒸一作爇對食暫餐還不能每愁夜中一作來自足蠍況乃秋後轉一作復多蠅束帶發狂欲大叫簿書何急來相仍南望青松架短一作絶壑安得一作能赤腳蹋層氷夜中足蠍秋後多蠅當與題鄭縣亭子野雀山蠭例觀九日藍田崔氏莊老去悲秋强自寛興來今一作終日盡君歡羞將短髮還吹帽笑倩傍人為正冠藍水逺従千澗落玉山髙並兩峰寒明年此會知誰健一作在醉一作再把茱萸仔細看末句仔細看或謂看茱萸或謂綰上藍水玉山言之兩通須知藍水玉山非但寫景山水恒在人難常健當日生感之意在此崔氏東山草堂愛汝玉山草堂靜髙秋爽氣相一作多鮮新有時自發鐘磬響落日更見漁樵人盤剥白雅谷口㮚飯煮青泥坊底芹一作蓴何為西莊王給事柴門空閉鎖松筠或謂王給事非王維云舊書維晩年得宋之問藍田别墅陷賊以前尚未有也按維傳自維以詩名盛於開元天寳間已下皆櫽括生平行事晩年指維長齋一事與上文居常不茹葷血應下文並及與裴迪往來嘯詠事非謂此時始得藍田别墅也維長于公數嵗開元九年進士歴右拾遺監察御史左補闕庫部郎中給事中其責授太子中允當在至徳二載冬公贈詩稱中允聲名久史稱乾元中遷太子中庶子中書舍人復拜給事中轉尚書右丞當是一年數遷耳維以乾元二年七月卒公詩不見髙人王右丞藍田丘壑漫寒藤維卒後有感也何為西莊王給事柴門空閉鎖松筠維生前有感也當時藍田不聞别有一王給事也卜居上元元年二月成都及中間青城新津蜀州作浣花流一作之一作溪水水西頭主人為卜林塘幽已知出郭少塵事更有澄江銷客愁無數蜻蜓飛上下一雙􅗌鶒對沈浮東行萬里堪乗興須向山隂上一作入小舟或云甫卜居便有東行之興且東行欲至山隂奚啻萬里公必有不得已於卜居者冕之為主人者可知冕謂裴冕此説實未然成都萬事好未若歸吾廬公豈欲終老於蜀者且史乾元二年六月以左僕射裴冕為御史大夫成都尹持節充劍南節度副大使本道觀察使三年三月以京兆尹李若幽為成都尹劍南節度使是年閏四月改乾元為上元公卜居在是年春三月堂已成冕亦將去今人説公成都詩往往辠冕不能厚公冕亦寃矣特為雪之東行欲至山隂語更非是葢山隂上舟咫尺有萬里之思故是妙句若謂欲至山隂索然無味全失詩情矣公古詩有寄裴施州詩鄭典設自施州歸詩裴施州即冕讀此二詩當知冕在成都遇公應不薄也寄杜位原注位京中宅近西曲江詩尾有述近聞寛法離一作别新州想見歸懐尚百憂逐客雖皆萬里去悲君已是十年流干戈況復塵一作行隨眼鬢髮還應雪一作白滿頭玉壘題書心緒亂何時更得曲江遊或曰同一貶竄鄭䖍台州之流自論死減等猶曰嚴譴杜位在新州去國萬里長流十年始離貶所乃曰寛法葢位林甫之壻權奸擅國流毒天下釀成漁陽鼙鼓之禍觀位於林甫相時盍簪列炬氣燄如此林甫既敗僅加貶謫復従量移可不為曠蕩之恩乎嚴譴寛法四字便見老杜春秋之筆愚按鄭詩就貶官言自宜用嚴譴位詩就離貶所言自宜用寛法公有也霑新國用輕刑句亦為䖍作也詩文各有宜用字乃謂嚴譴寛法便見春秋之筆非是位公之族子故人詩首尾何等情至此等解累詩多矣不可不辯盍簪列炬即公守嵗位宅詩昔以為歡今以為辠亦大不可和裴迪登蜀州東亭送客逢早梅見寄東閣官梅動詩興還如何遜在揚州此時對雪遙相憶送客逢春一作花可一作更自由幸不折來傷嵗暮若為看去亂鄉一作春愁江邉一樹垂垂發朝夕催人自白頭此詩或謂迪従王縉在蜀縉嘗為相故詩用東閣又迪在縉幕如何遜在建安王幕故用揚州事此謬也新舊史縉傳無刺蜀事舊史王維傳亦無新史有之是時維自表已五短縉五長願歸所任官放田里使縉得還京師久乃召縉為左散騎常侍舊史維以乾元二年七月卒新史維以上元初卒二史皆云維卒時縉在鳯翔此詩上元二年作何得云縉在蜀州邪廣徳二年縉始拜黄門侍郎同平章事亦不得云縉嘗為相詩中東閣二字即詩題東亭二字何遜揚州但以梅事引用迪在縉幕遜在建安王幕及遜墓志東閣一開等語概芟之不溷心眼亦快事也集有和裴迪登新津寺寄王侍郎詩或云王侍郎即縉上元二年前縉嘗為工部侍郎上元二年四月明皇崩縉撰哀冊時稱為工改兵部侍郎此尚可通原注王時牧蜀應後人所為不可據王十七侍御掄許攜酒至草堂奉寄此詩便請邀髙三十五使君同到老夫卧穏朝慵起白屋寒多㬉始開江鸛一作鶴巧當幽徑浴鄰雞還過短牆來繡衣屢許攜家醖皁葢能忘折野梅戲假霜威促山簡須成一醉一作醉裏習池迴髙適嘗為蜀州刺史時或以事至成都故公請王侍御邀之同至草堂公蜀州有李司馬橋成承髙使君自成都回絶句是髙尚留成都公先往蜀州也嚴中丞枉駕見過原注嚴自東川除西川勅令兩川都節制元戎小隊出郊坰問栁尋花到野亭川合東西瞻使節地分南北任流一作孤萍扁舟不獨如張翰皁一作白帽還應一作應兼似管寧寂寞一作今日江天雲霧裏何人道有少微星末語歸美嚴公近解有云嚴武非能薦公者何人二字明指嚴徒枉草廬不能識公解詩最嫌此類亦無足辯然時顧喜之何也奉醻嚴公寄題野亭之作拾遺曽奏數行書嬾性從來水竹居奉引濫騎沙苑馬幽栖真釣錦江魚謝安不倦登臨費一作賞阮籍焉知禮法疏枉沐一作何日旌麾出城府草茆無一作蕪徑欲教鋤愚按首句荅嚴莫倚善題鸚鵡賦三句荅嚴何須不著鵕䴊冠嚴詩葢謂公耽詩賦而不仕也豈此時已有表薦之意乎故公荅以已亦曽任而濫騎官馬也奏數行書正對題鸚鵡賦騎沙苑馬正對著鵕䴊冠嬾性句荅嚴第二句幽栖句荅嚴第一句後四句荅嚴末二句也六句葢阮籍好飲酒公自謂以野人對嚴飲即禮法疏也公有小驛香醪句嚴荅云可但步兵偏愛酒是也或謂武過之公有時不冠故武云何須不著鵕䴊冠而公解其嘲曰阮籍焉知禮法疏臆解之失撰成事跡誣古人而迷誤後世可慨也舊辯有可取者録後容齋續筆新唐書嚴武傳云房琯以故宰相為巡内刺史武慢倨不為禮最厚杜甫然欲殺甫數次李白蜀道難為房與杜危之也甫傳云甫嘗醉登武牀瞪視曰嚴挺之乃生此兒武銜之一日欲殺甫冠鈎於簾者三左右白其母奔救得止舊史但云甫性躁褊嘗馮醉登武牀㡿其父名武不以為忤初無欲殺之説葢唐小説所載而新唐書以為然予按太白蜀道難本以譏章仇兼瓊前人嘗論之矣子美集中詩凡為武者㡬三十篇送還朝曰江邨獨歸處寂莫養殘生喜再鎮曰得歸茅屋赴成都直為文翁再剖符此猶武在時語至哭歸櫬云一哀三峽暮遺後見君情及八哀詩云空餘老賔客身上媿簪纓若果有欲殺之怨不應眷眷如此好事者但以武詩有莫倚善題鸚鵡賦之句故用證前説引黄祖殺禰衡為喻殆是癡人面前不得説㝱也武肯以黄祖自比乎野人送朱櫻西蜀櫻桃也自紅野人相贈滿筠籠數回細寫愁仍破萬顆勻圓訝許同憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日嘗新任轉蓬唐人賜櫻桃詩首摩詰次退之結語退之聊取成篇摩詰思路涌出然亦諛詞耳當時子美亦必濡毫縱佳不過比肩摩詰此詩油然忠愛遂為獨絶遇固不幸詩反因之據勝人謂詩能窮人又謂窮而後工由此論之不獨窮而工也題桃樹小徑升堂舊不斜五株桃樹亦従遮髙秋總饋貧人實來嵗還舒滿眼花簾户每宜通乳燕兒童莫信打慈雅寡妻羣盜非今日天下車書正一作已一家或曰此詩首曰小徑升堂舊不斜末曰天下車書正一家疑所題者故園之桃時方全盛未逢禍亂故桃亦可懐如此以歎今之不然與移栁㡬能存同感若云題成都桃末二語難通愚謂此解正自難通公詩本無不通寡妻羣盜非今日言鰥寡孤獨頻經􅍔亂觸目可傷天下車書正一家言畔逆削平四海一家吾人又安可以區區小物彼此貪戾於兵火之餘也與後夔州又呈呉郎一首同看其意自見髙秋總饋貧人實堂前撲棗任西鄰棗熟従人打拾穂許邨童寡妻羣盜非今日天下車書正一家已􅀈徴求貧到骨正思戎馬淚盈巾安得廣厦千萬間大庇天下寒士皆懽顔雄者左翮垂損傷已露筋白魚困宻網分減及溪魚吾徒胡為縱此樂暴殄天物聖所哀集中此等不可悉舉嘗謂公仁人長者也讀其詩者宜知嚴公仲夏枉駕草堂兼攜酒饌得寒字一作鄭公枉駕攜饌訪水亭竹裏行㕑洗玉盤花邉立馬簇金鞍非闗使者徵求急自識將軍禮數寛百年地僻一作闢柴門迥五月江深草閣寒看弄漁舟移白日老年何有罄交歡或曰國史補嚴武少以强俊知名蜀中坐衙杜甫袒跣登其几案武愛其才終不加害此所謂將軍禮數寛也鈎簾欲殺最為誣㒺不知宋子京新書何以載之本傳愚按杜公生平凡小説正史多不可憑當以詩為㫁其云阮籍焉知禮法疎正其不疎處葢阮之疎人知之阮之慎人不知之五君詠亦曰識宻公之疎與阮同觀可也集中凡為武作辭氣無不温謹後在武幕有云周防期稍稍大簡遂匆匆袒跣登案人乃為此語乎此公生平為人處所闗故不惜頻及秋盡秋盡東行且未迴茅齋寄在少城隈籬邊老卻陶潛菊江上徒逢袁紹杯雪嶺獨看西日落劍門猶阻一作㫁北人來不辭萬里長為客懐抱何時得好開嚴武仲夏攜饌至草堂又巴嶺荅公詩有籬下黄花菊對誰三四公葢以陶潛鄭康成自比以袁紹比武有思武意典畧河朔飲與鄭康成傳兼讀詩意始明涪城縣香積寺官閣寺下春江深不流山要官閣迥添愁含風翠壁孤雲細背日丹楓萬木稠小院迴廊春一作深一作清寂寂浴鳬飛鷺晩悠悠諸天合在藤蘿外昏黒應須到上頭上頭二字亦自有本古樂府東方千餘騎夫壻居上頭是也公湯東靈湫詩亦云東山氣鴻濛宫殿居上頭此詩題香積寺山要官閣上頭即山頂也諸天自四天王天至非有想非無想天影畧山頂殿像也昏黒有二意承上晩字又承上藤蘿字及背日萬木稠也送王十五判官扶侍還黔中得開字大家東征逐子回風生洲渚錦颿開青青竹筍迎船出白白一作日日江魚入饌來離别不堪無限意艱危須仗濟時才黔陽信使應稀少莫怪頻煩一作頻頻勸酒杯題曰還詩曰回猶有作之官解者諸家皆致辯所謂不足辯者此類是也楊用修以將字易逐字人多非之余謂逐字本不佳無怪用修欲易將領也鳯凰將九子楊亦引之不必訓養或謂東征賦原作余隨子乎東征當易以隨字白白江魚或引列女傳姜詩事每旦輒出雙鯉以日日為是按白白與青青對白白是也滕王亭子原注在玉臺觀内王調露中任閬州刺史一云閬州玉臺觀作王曽典此州君王臺榭枕巴山萬丈丹梯尚可攀春日鶯啼脩竹裏仙家犬吠白雲間清江碧一作錦石傷心麗嫩蘂濃花滿目斑人到於今歌出牧來遊此地不知還滕王即王子安所咏滕王髙閤臨江渚者也方輿勝覽云滕王以隆州衙宇卑陋遂修飾𢎞大之擬於宫苑謂之隆苑後改閬苑滕王亭元嬰所建無疑或云是天寳時嗣滕王湛然葢以元嬰生平多惡狀在隆州亦不循法子美不當以人到於今歌出牧稱之耳按湛然守閬州無據歌出牧自是子美失實語後世詩文家最不可信雖子美亦未免可以為戒玉臺觀原注滕王造中天積翠玉臺遙上帝髙居絳節朝遂有馮夷來擊鼓始知嬴女善吹簫江光隠見黿鼉窟石埶參差一作差池烏鵲橋更有紅顔生羽翰便應黄髮老漁樵或云觀中疑有公主遺跡故用嬴女吹簫事按此首又有烏鵲橋句全集又有五言律亦云彩雲蕭史駐此説不為無見但事不可考奉寄章十侍御原注時初罷梓州刺史東川留後將赴朝廷淮海維揚一俊人金章紫綬照青春指揮能事迴天地訓練强兵動鬼神湘一作襄西不得歸闗羽河内猶宜一作疑借寇恂朝覲從容問幽仄勿云江漢有一作老垂綸唐書國史補雲谿友議皆載嚴武殺章彛事或曰按此詩武再鎮蜀彛已入覲豈及其未行殺之耶愚謂好事者偽撰事實妄解杜詩如不著鵕䴊冠者多矣此或亦由湘西句造出也湘西荆州地不得歸者言闗公都督荆州方面重臣不得召之歸朝時章十侍御罷東川留後將赴朝廷故以此為比或謂此暗指來瑱之事或謂嚴武再鎮成都復合東西川為一節度東川留後在所宜廢湘西句言章侍御不復歸鎮皆非借寇恂者潁川也詩何以言河内蓋河内潁川皆寇舊治詩意謂潁川盜賊羣起固宜借之河内盜賊不起猶宜借之時段子璋反章討平之罷官歸朝故也此意諸家未言遂若子美誤用午亭文編卷四十九
