body:
  text: 午亭文編卷二大學士陳廷敬撰樂府逺遊篇逺遊何所之乃在大海隅海波何淡淡雲氣何舒舒赤螭為我駕翠虯為我驅神魚如山長電目邱松鬚緑髮兩仙童指引神所居飄眇白玉闕照耀黃金鋪珊瑚為階砌木難為門樞星娥倚東廂微笑玉齒殊仙老三五人龎眉曳輕裾食我以瓊蕊遺我石函書書中何所云保汝千年軀永同金石固日月齊靈符下視人間世榮華真斯須白馬篇白馬驕秋霜銀鞍照路傍黃金為馬銜珊瑚為劍裝被服間且都雜以綺羅香交遊競意氣俯仰垂榮光長兄二千石小弟侍中郎身冠羽林籍名艷鬬雞場要間烏號弓右發左挽強一縱連兩禽鳴鏑隨低昻歸來道狹邪緩帶傾華觴猗嗟陽阿舞迭奏邯鄲倡為樂苦不極紅顔坐凋傷關山月烽冷天山色霜明瀚海流臨關弓抱影度隴劍橫秋玉笛三更夢金閨萬里愁龍堆看夜夜長歎上邊樓陌上桑曉日渭橋東行人春思中桑間秦樓女緑映顔花紅玉釧低枝露香羅隔葉風蠶飢正歸去五馬立煙空班婕妤顔色春桃李東風寧久留昭陽飛燕寵長信婕妤愁玉階惟見月團扇已驚秋試問承恩者常懷衰謝憂明妃怨千古蛾眉意丹青畫不成生綃空有恨掖寢本無情紅淚邊花色朱絃磧雁聲那堪孤塜月還照漢時營銅雀臺昔時銅雀伎曾薦綺羅香遺恨千秋令雄心六尺牀舞餘金鳯冷望極玉蛾長日暮西陵道悲風生濁漳折楊栁二首樓下與君别栁條初覆肩栁今與樓長搖曳金窗煙春暗黃龍塞花明黑水川含情忍攀折逺寄東風前楊栁三春樹年年别恨長曲中官渡月枝上塞門霜紅粉倡園色黃沙劍客妝金鞭不可贈攀折暮情傷山鷓鴣何處鷓鴣飛湘江斑竹枝夕煙人影外斜日客行時斷續虞妃淚蒼黃屈子辭更聞賈太傅鵩鳥賦深悲猗蘭操猗猗其蘭乃在空谷我行四野奚處奚宿其蘭猗猗幽幽其香雜彼蕃蕪我心相羊蘭其如何維霜及霰時節晚暮不我能見子不我見我心則夷悠哉以老樂天弗疑將歸操河之水湯湯我欲濟兮川無梁豈繄川無梁我褰我裳河之水悠悠我欲濟兮波無舟豈繄波無舟我曳我裾我裳我裾不可以濡兮吾將焉求雉朝飛操雉夜兩兩朝雙飛雄者氣盈挾其雌雌欲啄雄欲飛雌不敢以東西彼獨何者羣遊中野雉子斑奏鳴絃羇孤向人生自憐梁父吟我歌梁父吟慨慷誰與陳君不見公旦巧能世絶倫吐哺握髮衆士親嗛嗛赤舄下白屋後來豈有如公人君不見吹簫販繒士所羞得時睥晲輕儒流賈生歎鵩陸生老刀筆之吏為通侯烏夜啼寒夜夜長夜不明五更盼斷霜禽聲紅顔易歇緑窗裏塞鴻欲度林鴉起金井雙桐露葉低秋閨月落玉關西年年為伴相思老莫向髙樓别處啼冉冉孤生竹冉冉孤生竹今為薊邱篁地寒出不髙枝葉稀飄揚不恨枝葉稀三冬被嚴霜豈無雨露滋時至則萎黃託根失處所撫心多慨傷幽澗泉白石爛爛流泉深松風寂歷吹素琴山窗明月弔孤影别來五度秋猿吟猿吟人不歸怨鶴空山飛泉水波木葉稀緝商綴羽張急徽北邙行洛陽城北山峨峨城中人少山墓多白烏半夜啄大屋青磷當晝燔陵谷自經喪亂墓無主野田髑髏悲自語寒食誰家送紙錢魂孤眼望愁鴟鳶客來遊眺蒼茫裏東見虎牢西熊耳山川酹酒一髙歌光武陵邊杏最美君子有所思行生民皇古前心志自淡泊逮彼喜怒煩憂患抵中惡聖人急其病道和救以藥作樂反性初緣情禮乃託悠哉咸韶音風淳合冥漠絙桐通神明截竹諧葦籥千秋鳯一鳴四海皆安樂艾如張艾而張羅旌門蕭蕭馬鳴獸嘷于田非好殺取足盈大庖白露下來麋鹿始交鹿有匹兮山有羅吹聲象匹鹿奈何芳樹芳樹長搖搖四邊多烈風黃鵠在其上養子芳樹中寒影濯清露羽毛亦不豐託身寧非髙心欲陵蒼穹回頭謂芳樹勿作風中蓬大者拔本根小能傷青蔥稀枝兼落葉與子分西東芳樹謝黃鵠此言何愚蒙風來無時休將吾誰適從汝自慎身口大造無全功黃鵠舉翅飛擕子躡雲蹤後來見芳樹低摧橫煙空種葛篇鬱鬱南山葛離離東井瓜本自不同生兔絲緣女蘿葛藟亦已長瓜蔓亦已多霜天各刈除棄捐于中阿種瓜瓜有種種葛葛有芽瓜葛相結連我心則匪他拳拳執明信嵗寒夫如何蒲生行浮萍篇浮萍東西流離離青蒲間小年事君子不知心所歡錦衾生恐栗半臂承夜寒恪勤在婦道冰雪灑肺肝霜天弄機杼繅絲織縑紈充君下體服自顧衣裳單米鹽碎小務家室粗以完慊慊三十載一日無歡顔容色不再好罪尤誠有端故人足可棄新人亦可憐人誰不娶婦君家婦良難新人不待故聞聲發永歎蒲生何離褷浮萍何汍瀾此曲不可竟曲竟增悲酸蒿里行青青松柏原鬱鬱古蒿里留待市朝人容華謝桃李桃李春光搖曳時東風未老已先悲蟲蝕葉雨摧枝成陰結子難豫知人生朝露日易晞滿堂歡笑翻涕洟言駕幽山去親戚相攀追遺君舊劍佩卷君舊羅幃清酒安可酌餘閣空盈巵狐兔夜深語賓朋四散歸各各有一日不必相歔欷蒿里路逺在百年近旦暮生時不自縱意樂坐見春花委芳樹隴頭吟生不願為隴頭客亦不願聞隴水聲隴頭作客腸應斷隴水聲多帶别情别情未已紅顔老北流是向龍城道一箭烽傳瀚海雲三時馬絶交河草隴坂回看隴樹春隴關四外戰塵昏行人莫作隴頭客從此邊心不可論豫章行秋風吹白楊搖搖豫章山落葉辭本根隨風不復還男兒逺别離戚戚成頽顔跳丸有迅晷逝波無停川生短嗟世長何况寡所歡賢聖齊窮達流坎天命然委順全逺節去日難重攀介福自已求鬢髮誰令斑猛虎行朝從猛虎食暮從野雀棲野雀無定端猛虎還苦飢水濁不見底水清石纍纍清濁各有以溝水流東西天風吹海色昏昏渺無涯遊心三神山百年曾幾時長歌行蝦鱔細小蟲生長潢潦間燕雀自儕侣寄命于柴藩豈知六月鵬髙翅摩雲天潛鱗濯鬐鬛遊戲于深淵物生各有分吾終慕羲軒空城雀鴻鵠翔寥廓鷦鷯聲啾啾翩翩嗟汝雀嗷嗷云何求回顧黃口兒常有羅網憂烏鳶各異態爪觜每見投摧頽太倉粟口腹身所仇物生有天命知此絶禍尤節雁行史館僚友語近事羅者獲雄雁雁活翎翅全置之樊籠中哀鳴欲有宣每當秋春時塞雁來翩翩顧步忍長繫飲啄苟自存賴彼牧豎兒飼視兩踰年其秋其雌來聞聲於九天夜半翔而下悲吟何關關以頸投籠中咽吭交相纒晨起人貾之雁則雙死焉適豫在史館有官屯民田屯夫既來告官因為豫言風簷展書坐雁唳過前軒聽者盡訝歎終朝掩遺編思用厲堅操作此節雁篇東海頭東海頭古來白骨成荒丘天生海水向東注日出月沒滄波流嗟我人民何用相讐東海頭長城起秦人築怨海水深不見長城見海水堠傍路堠傍路日日征人從此去古人行盡今人行春草春花只如故莫言今人與古人昨日車輪疊馬蹄寒風一夜吹何處雁門行雁門關雁不度關上長城髙插天鴻雁髙飛從此去雁飛長城間遊子關門還雁南君北向相望何由扳塞山連綿秋雲起西度五原東遼水傳語幽并輕俠兒雄飛雌伏休相疑飢烏行北風吹樹樹怒呼深枝飢啄雙老烏身微願違心羇孤野日凍雪霜蓬枯天寒夜昏何時旦黃鵠單飛淚如線鳴雁行鴻雁鳴度雁門風霜慘懍羽翮存養子俱髙飛中有斷雁陵雲翻渺然獨宿沙磧間江湖適逺伴侣非稻粱雖多身不肥羇孤畏人行色微心志皎潔衆雁知君有矰繳慎莫施彈射孤鳥古所悲門有萬里客門有萬里客落日照顔色問客適何鄉未言先歎息生長西蜀人故里多荆棘荆棘不可居虎豹嘷相索離鄉客四野席草蔭松柏草長茵以厚松柏上鬱錯不虞幕府書催令還鄉陌鄉陌不可居竟言雙淚落白鳩篇古之紀官或以四時或以雲其於物或以龍鳥至於鳩蓋鳥之一耳而以名官左氏郯子曰祝鳩氏司徒鴡鳩氏司馬鳲鳩氏司空爽鳩氏司冦鶻鳩氏司事鳩亦異於凡為鳥者哉余有感焉作白鳩篇亦古詩遺意也拂舞歌白鳬吳歌且吳舞感此清商音淚下不能語亦有白鳩辭新聲翻舊譜白鳩之白性安馴其子雖七恩平均食之朝上暮自下鳥有如此義且仁丹山鳯皇五色文身將九子凌青旻豈惟九子身自將百鳥不間疏與親嗚呼鳯德殊絶倫白鳩一遇三千春午亭文編卷二
