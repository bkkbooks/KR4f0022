body:
  text: 午亭文編卷三十大學士陳廷敬撰奏疏嵗終彚進講義疏康熙十六年十二月十五日經筵日講官起居注翰林院掌院學士兼禮部侍郎教習庶吉士臣陳廷敬題竊惟積日月而成嵗不已維天合經史以為功其勤者聖蓋典學行政道本相資溫故知新事須交盡我皇上亶聰亶明之資實由天授好學好問之篤度越前王出臨正朝則躬理萬幾深居大內則潛心羣典隆寒盛暑不廢丹鉛綴衣虎賁皆通章句逮於講幄尤切皇情每當敷奏先從天語發揮凡有咨詢迥出諸臣意表講畢有再拜之儀特䝉賜免頻年有便繁之錫更荷重頒此皆亘古所未聞而今兹所始覩者也臣等叨預顧問之榮班愧乏涓埃之微助嵗華欲滿舊例宜循其四書講義已於康熙十四年閏五月遵㫖先期彚進今將講過通鑑講義繕寫裝潢題明進呈伏願聖心折𠂻於誦讀之餘發揮於施行之際文武之道備在一人堯舜之治永傳萬代矣臣等不任諄切之至進呈刋完日講四書解義疏康熙十六年十二月十八日經筵日講官起居注翰林院掌院學士兼禮部侍郎教習庶吉士臣陳廷敬題臣等於康熙十六年三月十三日恭侍𢎞德殿進講䝉皇上面諭四書已經講完講章應行刋刻欽此臣等叨塵法從日侍經幃伏覩皇上聖躬親講典學彌殷天語下詢訪道愈篤凡在六經諸史靡不極意研精至於四子之書實備百王之道比年以來次第進講歷寒暑而罔間積日月以成編固已體驗於宸衷抑且發揮於政治除按日進覽年終彚呈盡在御前時厪睿照乃者思垂永久親降綸音爰令校刋宣布中外竊惟皇上聖學崇深真足超軼往古臣等經術淺陋曷克仰助涓埃顧鄒魯之大義微言炳如星日而師儒之參稽互訂著在簡編嘗慕宋臣以半部佐君先明敬信節愛願學朱子以四字入告亦曰誠意正心即致斯世於治平不外明德新民之理而使吾君為堯舜敢忘責難陳善之思仰惟宵旰之勤勞不輟宫闈之誦讀永光典訓示則臣民臣等謬效編摩復加刪潤校鋟成帙裝潢進呈惟我皇上嘗垂乙夜之觀存諸几席允懷千聖之道如晤羮墻將見文命誕敷而光華普著矣臣謹具題恭進以聞嵗終講義循例題明兼陳愚悃疏康熙十七年十二月十七日經筵日講官起居注翰林院掌院學士兼禮部侍郎臣陳廷敬題竊惟體乾德之運行學惟時敏成聖功於嵗月理本日新蓋百王之治雖殊道實同於師古而六經之文具在用之足以宜民必積纍之崇深乃化裁於久大欽惟皇上聖自生知才惟天授以虞舜之濬哲有大禹之克勤機務至多聽斷每煩於日昃圖書在御講誦常至於夜分既已循習簡編守二帝三王之大法抑又研精傳注窮殷盤周誥之全經帝庸作歌敕命凛惟幾惟康之㫖皇建有極敷言叶無偏無陂之音隻句片詞炳若日星之訓含毫落紙煥乎雲漢之章宣天地之中和義兼雅頌躋臣民於文治功並典謨臣等久歷金華又彌寒暑親承玉色得侍燕閒曽莫效其微勞實難酬於恩遇伏查嵗終講義例應彚寫進呈但尚書講義現在發刋而逐日進講已留御覽曽經請㫖停進謹循舊例題明伏願道協時行化同天運仰於穆之不已知日進於無疆則綏將純嘏之方來膺保永圖於孔固矣臣等無任諄切之至慰問謝恩疏康熙十七年十二月十三日經筵日講官起居注翰林院掌院學士兼禮部侍郎臣陳廷敬奏臣草茅豎儒質愚學陋謬膺重任纍厠清班無禆聖學之髙深曷稱君恩於萬一今臣母張氏不幸奄逝仰䝉睿念遣使慰問於本月初十日內閣學士臣屯泰翰林院掌院學士臣喇沙里到臣私寓傳奉詔㫖賜臣茶酒臣自顧何人叨兹曠典呼天搶地誓報捐糜臣母九原之下均戴感於無盡矣臣謹奉恩賜茶酒告奠臣母席前望闕叩頭並乞天使轉奏訖竊念一介之寒微敢勞曲軫况當萬幾之勤瘁猶厪洪慈恩重難酬感深莫罄臣遄奔子舍徒切望雲之悲回睇神京彌懷向日之戀臣不勝哀感涕零之至謹具本奏謝以聞諭祭謝恩疏康熙十八年七月初一日經筵日講官起居注翰林院掌院學士兼禮部侍郎臣陳廷敬奏臣以母憂於本年正月內回籍守制匍匐就道星夜遄奔抵舍以來寢處苫塊於六月內得閲邸抄禮部一本為恭請優恤事奉㫖陳廷敬侍從勤勞其母准照學士品級賜恤欽此臣不勝悲慟不勝感激恭設香案望闕叩頭謝恩訖臣自邅哀疚深荷矜憐辱天使之光臨沐恩頒於稠疊皇慈無盡禮數逾涯復奉特㫖憫臣微勞糜骨難酬撫膺知感伏念臣濫塵史局者草載備員經幄者七年文章虛負時名講論略無禆補時餕尚方之膳兼分內帑之金緣皇上推至心以待人俾微臣資厚祿以將母未免瞻雲之望粗紓愛日之勤不意臣命數竒窮致煩皇上睿懷軫念終天永訣徒遺慟於生前新命洊加實增光於身後兹逢優異備極哀榮徑從學士之階不拘詹事之考皆故事所未有雖勳舊何以加臣自惟三錫頻仍彌懼班行之忝竊即臣母九原可作應驚品秩之驟遷荷寵如斯未報涓埃於盛世捐軀何日敢懷疾痛之餘生仰惟聖神文武之光昭屬兹中外臣民之慶幸萬方送喜知咫尺之龍顏孑身抱憂逺瞻依於鳳闕顧臣子有難仰承之殊遇惟聖明示不世見之異恩回思鞠我之勞有懷罔極夙識事君之義莫效微忠苟溝壑之遂填永佩深仁而入地或蓋帷之未瘞長賡景福以齊天臣不勝匍匐頂戴之至謹具本遣臣男國子監生陳謙吉捧赴通政司投進為此奏謝以聞遵例自陳疏康熙二十年十月二十四日經筵日講官起居注翰林院掌院學士兼禮部侍郎臣陳廷敬奏伏見吏部題准康熙十八年京察例應自陳官員丁憂在籍服闋到京即行自陳臣丁母憂今年十月二十一日到京例當備開履歷事蹟仰祈睿鑒竊臣原籍山西澤州人中順治十五年進士選庶吉士十八年充㑹試同考試官本年授內祕書院檢討康熙元年以病請假回籍四年仍補檢討六年考察一等稱職八年升國子監司業九年升內祕書院侍讀十年改翰林院侍講本年轉侍讀升侍講學士十一年纂修世祖章皇帝實録告成加一級食俸本年充日講起居注官十二年考察一等稱職本年轉侍讀學士充武㑹試副主考又充武殿試讀卷官十四年升詹事府詹事兼翰林院侍讀學士十五年以冊立東宫奉使祭告北鎮本年升內閣學士兼禮部侍郎充經筵講官十六年轉翰林院掌院學士兼禮部侍郎教習庶吉士充日講起居注官本年充太宗文皇帝實録副總裁官十七年充纂修皇輿表總裁官本年十一月聞母訃回籍守制今服闋到京伏念臣蓬蓽賤士質鄙學踈叨沭殊恩纍擢近列厠講席深嚴之地玷禁庭侍從之班曲荷知憐初無報稱徒䝉寵渥時切憂兢臣前者遘罹母喪倉皇去職存問仰煩天使恩膏頒自尚方洎當請恤更出特恩憫似髮之微勞命從三錫降如天之異數澤及九原竊念臣母子之所邅皆自古君臣之希遘蓋恩隆則責宜重乃材薄而眷有加即糜隕百身莫塞尸榮之咎而栖遲三載已寬幽黜之期知有未報之鴻慈永慚髙厚良無可覩之後效恐負聖明伏祈皇上立賜處分以為不職者戒臣不勝悚息待命之至嵗終講義循例題明疏康熙二十年十二月十九日經筵日講官起居注翰林院掌院學士兼禮部侍郎臣陳廷敬題竊惟成湯自警惟又日以常新大禹克勤必寸隂之是惜蓋君道法天行之健而聖功懋時敏之修故積日月而嵗序以成於穆不已亦凜就將而德行斯顯悠久無疆欽惟皇上表正建中經文緯武造四海升平之治偕二儀覆載之功屬前者小醜之陸梁厪數載九重之旰昃邊機旁午未當息馬投戈文命誕敷不輟窮經論道蓋勵精遜志固已卓冠百王故神略英謀自爾前無千古運天下於掌上信內順而外威視萬里為目前亶風行而化洽遂成格苗戡黎之績允惟稽古右文之時既研極夫六藝之精出話經而吐辭雅亦推行於諸史之實承烈武而顯謨文謂大易載開物成務之微言而兩漢具鑑古知今之軼事縹緗進御嘗勤丙夜之觀帷幄敷陳時備宵衣之問臣等玩飛龍之大義雖願學昭素之對君覩司馬之全書未能如一柔之竟讀勉尋舊學忽逢嵗籥之更新懼負殊恩每近天顔之有喜閲流光之易邁知典學之彌殷日居月諸曽炎燠祁寒之罔間嵗聿暮矣猶晦明風雨之其勤伏值年終謹循舊例應將講義逐一題明易經日講解義現在校刋按日經鑑講章悉留省覽至於年終彚進前經睿㫖諭停非謂少損夫鉛槧之繁蓋因已置諸几席之上簡編盈溢義蘊𢎞多伏願體六位以成能象三辰而立極一道德而同風俗𢎞闡先聖之傳經興禮樂而定章程髙掩千秋之遺史將見光天之治再見於中天而震世之功永垂於奕世矣臣等不任諄切之至制錢銷毁滋弊疏康熙二十三年八月十七日經筵講官吏部左侍郎管右侍郎事仍兼翰林院學士管理京省錢法臣陳廷敬題竊惟銅鉛之微物製為錢貨之重寶愚民牟利法久弊滋所貴因時制宜務在便民裕國自古鑄錢時輕時重治平之世未有數十年而不改易者臣奉命清理錢法期於國寶流通公私交便以副我皇上簡任至意前所請核減耗銅節省工料等項業經奉㫖㑹議允行臣更有請者今日民間所不便者莫過於錢價甚貴定制每錢一千直銀一兩今則每銀一兩僅得錢八九百文其故由於制錢之少夫國家嵗嵗制錢宜乎錢日多而賤今乃日少而貴者蓋因姦宄不法毁錢作銅以牟厚利之所致耳夫銷燬制錢著之律令其罪至重然而不能禁止者厚利之所在故也今銅價每斤值銀一錢四五分計銀一兩僅買銅七斤有餘而燬錢一千得銅八斤十二兩即以今日極貴之錢用銀一兩換錢八九百文毁之為銅可得七斤七八兩尚浮於買銅之所得何况錢價賤時用銀一兩所換之錢可毁銅至十餘斤者乎銅價既貴奸人爭毁制錢以為射利之捷徑鼓鑄之數有限銷毁之途無窮安得不日少而日貴乎苟不因時變通其弊將無所底止矣若欲除毁錢之弊求制錢之多莫若鼓鑄稍輕之錢察康熙十九年錢價甚貴以致民間苦纍皇上特諭令一文重一錢九卿議以為順治錢重一錢因順治十年舊錢壅滯改鑄新錢重一錢二分五釐十七年因錢價賤又改鑄新錢重一錢四分前有廢輕而改為重者未有舍重而從輕者如錢輕少則有私鑄以此未經施行臣竊思國家之法夲以便民苟有利於民即於國無利猶當行之况行之利於國而亦利於民乎夫向之改輕為重為便民也今民既不便矣自應改重為輕今若改鑄重一錢之錢毁錢為銅既無厚利則毁錢之弊將不禁而自絶矣錢不毁而日多則錢價平而有利於民矣總計寶泉寶源二局每年各關動支稅銀二十五萬三千兩辦解銅三百八十九萬二千三百零七斤十一兩內除耗銅三十五萬三百零七斤十一兩浮銅三百五十四萬二千斤現行例鼓鑄錢四十萬零四千八百串直銀四十萬零四千八百兩今若改重一錢仍每串作銀一兩計每年多鼓鑄錢一十六萬一千九百二十串直銀一十六萬一千九百二十兩臣所謂利於民而亦利於國者也再察前經戶部等衙門議覆錢法侍郎田六善條奏令天下産銅鉛地方聽民開採行令直省督撫於産銅鉛處令道官總理府佐官分管州縣官専責稅其二分分别紀録加級至今開採寥寥皆因地方官征收其稅滋為弊端以致徒為收稅之名而無開採之實此後應一切停罷聽民自便或有開採則銅日多而錢價亦因可以得平也勸廉袪弊詳議定制疏康熙二十四年正月二十四日經筵講官都察院左都御史管理京省錢法臣陳廷敬奏竊惟國家久安長治之基關於風俗風俗盛衰之故繫乎人心正人心厚風俗之機存乎教化故品節度數必有定制所以辨上下定民志使天下移風易俗回心向道尤教化之急務也洪惟皇上堯仁舜哲禹儉湯勤總攬天下之大權先教化而後刑罰謂禮義廉恥國之四維而宏奬官方廉為尤重臣愚謂貪廉者治理之大關奢儉者貪廉之根柢欲教以廉當先使儉然而不能遽致者則積習使之然也臣伏見我皇上盛德淵純躬先節儉御服無竒麗之觀尚膳鮮兼珍之味蚤朝晏罷謹小慎微與中外臣民共登淳古之風一時公卿大夫是則是效宜蒸蒸有丕變之機矣臣謂風俗未能盡儉者蓋古者衣冠輿馬服飾器用之具婚喪之禮賤不得踰貴小不得加大今或等威未别因而奢僭之習未盡化也百金中人之産一裘之費奚啻百金綺紈之服機絲所織花草蟲魚時新日異舊者猶新新者已舊貧者循舊而見嗤富者即新而無厭轉相慕倣積以成風外官之任者或擁傔從數十百人衣輕䇿肥車馬闐咽震驚道路泥沙之用不惜貪叨之行易成由是則富者黷貨無已貧者恥其不如冒利觸禁妄冀苟免幸不罹於法則以髙資誇耀閭里愚民無知見其如此游末趨利多離農畝棄其本業賈誼所謂一人耕之十人聚而食之欲天下無飢不可得也百人織之不能衣一人欲天下無寒不可得也其始由於不儉其繼至於不廉其卒至於天下飢寒飢寒切於其身姦宄因之而起此所以刑罰未能衰止也然則風俗何以厚之亦曰正人心而已夫好尚嗜欲之中於人心猶水之失隄防也是教化之所宜先務矣伏祈敕下廷臣博考舊章詳議定制御賜之衣物許其服用及近御之人照常不議外官員士庶冠服衣裘飾用之制婚喪之禮有宜更定者斟酌損益務合於中其淺近易行如貂猞猁猻昔有官品之分今則庶人服之矣如緞綢昔有官民之别今則雜然無辨矣並宜釐正使永逺遵行至若外任官輿馬僕從不得過侈制度既定罔敢陵越則節儉之風可以漸致工者不必矜能於無用商者不必通貨於難得竒技淫巧棄本趨末之民將轉而緣南畝田疇闢則民無飢寒民無飢寒然後可以興於禮義廉恥而國之四維以張太平無疆之盛治端在於此又豈惟勸廉吏而已臣管窺蠡測無補髙深緣係條奏意須明悉字稍逾格統祈睿鑒施行請嚴考試親民之官以收吏治實效疏康熙二十四年正月二十四日經筵講官都察院左都御史管理京省錢法臣陳廷敬奏恭惟皇上宵衣昃食存心於天下加志於萬民洞知閭閻之疾苦歷觀稼穯之艱難擢用循良振興吏治將使官奉其職民樂其生永臻太平郅隆之風竊謂與國家共理此民者外則督撫司道府州縣等官督撫司道彈壓表率府州縣以理民者也而與民最親者無踰於知府知州知縣者矣臣愚謂親民之官其職至重至於文移簿書期㑹訟獄之事皆身自經理不得假手胥吏使夤緣為奸其事又甚難也自捐納以來有未經考試之人輒授正印親民之官者夫古者以經術為吏治必學古然後可以入官今即不能盡然而亦須略曉文義之人委以民社之寄臣查俊秀一項初捐既是白身有司曽未一試而吏部輒與選補則其文義通暗何由得知此項人若一槩束之髙閣則既已嘗許其得官若盡數録用則自古未有不曉文義之人可以為民父母者也臣察兵部有考試武職之例凡副將參將逰擊等官單雙月選補先期考試弓箭不合式者不准選補下月復考必待其合式而後用之武職重之如此何况親民之吏乎臣又察吏部有考試招民知縣之例招民之與捐資事體相類又不宜彼重而此輕也臣愚謂知府知州知縣凡俊秀捐納有已經考職後捐納者依例選除有未經考職遂行捐納者於選除之時仍行考試文義略曉者即與録用否則且令肄業聽其再試凡考試之時若繩以八股經義既非其所素習亦難以猝然而能合無試以時務䇿一道判一條但須嚴加防察毋得令其代倩傳遞徒應虛名如此則既不絶其功名仕進之路亦使之有鄭重名器之思庶可以責吏治之實效也伏祈睿鑒敕議施行午亭文編卷三十
