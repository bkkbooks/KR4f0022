body:
  text: 午亭文編巻十三大學士陳廷敬撰今體詩南谿贈别南谿卜築快幽深况有樓居俯茂林老至圖書従散亂春歸魚鳥任浮沉山畦花藥波紅雨軒砌藤蘿暈緑隂欲别夜䦨勤秉燭祗應明月照分襟次韻張子礎副憲兼懐竇在兹秀才前後清班忝竊同白頭相見意何窮春來御水還新緑别後東華自輭紅巳共侯生温釣石蚤輸𢎞景卧松風未應回首蓬山路林壑鶯花竟付公辛酉八月北上道中寄里中㳺好四首空山獨徃己三年近日羣㳺亦可憐風雨㫁魂迷隴上闗河雙淚落燈前離觴㡬處還三宿野館今宵是别筵一夜西樓纔小寐馬嘶人語聴凄然玉鵲菴西山寺東黄鶯送客訴春風花殘簾閣閒門閉栁老河梁别席空鄉樹斜陽迷故壘郵亭夕露濕寒叢栖栖夜火投人處宿鳥深枝笑轉蓬二十年前燈火地暫來重别易沾裳己無揚子一㕓老空有陶家三徑荒河漢影斜明月在館池人散朔風凉牀頭驛道車輪過半枕闗山夢許長望逺脩門再徃來秋霖秋日此裵􅏆身随旅雁辭家去心逐居人送我回落木天風催逺别寒花客路為誰開山川到處傷離别數日旗亭酒數杯小山城西前日吾來處野徑清流竹樹斜日暮出城拚一過不因水石為思家三家店温生具食出門已昏黑煙火隔城闉纔宿三家店便為千里人豆羹肥勝肉柿酒白如銀邂逅臨岐路情同故舊親過髙平弔畢亮四方伯二首重過躬耕地秋原木葉稀一哀銜别路雙淚落行衣書札臨危在文章託付非凄凉荒宅里清徳耿餘輝先生以遺藁屬余訂定寒露凄凄重悲雲漠漠清松楸憐昔恨絮酒慟餘生暮景衰容慘西風老淚傾那堪車馬色霑灑向長征余居隴側先生數以書存問野店曉發三日山程十日行郵亭漏鼓夜分明寒雞己報清霜曉夢後家園别後情潞安城南栁林二首一路黄沙白日寒栁林秋色送征鞍更堪昨夜西風落霜葉烟條太已殘野路籬花放蕋新古墩殘栁閱黄塵葉稀風起逢摇落猶挽長條贈逺人渡河歌白雲渡河河水隂朔風巻雲飛逺岑渡頭舟子青山曲賈客相看淚滿襟屯留道中二首留滯鄊闗路凄迷小縣城野禽呼有字村店問無名秋樹變黄緑漳流兼濁清山川與時物不減别離情鄉縣烟林外停車記昔曾此行秋色晩再别意難勝苦憶黄花放生憐白鬢增荒城時一憩未敢夢觚稜九日屯留客舎九日孤城對夕陽空階人靜館垣荒寒花寂寂開閒戍落木蕭蕭下濁漳只有雁鴻聞憭慄即無風雨意蒼茫未須更約登髙處客路何時不望鄉沁州道中山館郵籖數去程短長亭堠送人行悲風落葉銅鞮道細雨寒蕪石勒城漸逺闗河秋色盡欲投烟火暮雲平荒郊茅店凄其夜白髪黄塵莽自驚發沁州懐銅川赤嶂黄沙草樹荒銅鞮山色頗蒼蒼離心隻堠兼雙堠客淚清漳並濁漳野宿征夫連曉語南飛旅雁背人翔雞鳴徃路空回首惆悵衣篝五夜霜漳水源水石漳源鎮清漳自此流金風吹素瀨玉鏡㵼靈湫科斗收形小蛟龍託勢幽土人思德澤鼔笛賽春秋緜山晉侯旌善地夫子𣺌難攀野草環封界秋風緜上山蛇龍今寂寞水石日潺湲有母能偕隠蒼茫掩涕還龍洲驛雪懐南溪九月并州道飄颻早雪飛風兼木葉下寒映麥苖稀郵驛人踪疊雲山鳥路微南溪此時節籬菊正依依太原城南二首車馬斜暉不入城野亭北望路分明翻愁噭噭南鴻去却作天涯送客聲秋草寒雲壠麥遲嘉禾難見頴同時夜聞蟋蟀還多感惆悵唐風嵗暮時太原客夜霜横月落曙燈親一夜邉城刻漏頻二十五聲秋點盡直教點點到愁人客舎遇張子美蕭瑟霜風日夜吹棲遲客舎晩支離躭書似蠧空鑚紙兀坐如蠶自褁絲為别鄉山行漸緩偶逢舊故語移時還思接屋連牆日相對天涯是路岐土橋栁栁未全凋葉半新土橋風暖拂行塵邉闗景物今如此回首家園十月春晤劉訓夫提學旋别氷雪風裁水鑒方三年交儆寸心長相逢前路無知已未出并州是故鄉桑落酒清離恨重栁條風𦂳客情傷絳紗欲徹歸朝近應許追陪鴛鷺行鳴謙驛留别訓夫叠前韻驪駒欲駕隻輪方相送躊躇别語長去逺心翻隨去雁還朝情未似還鄉經横馬帳人初過客退龍門意轉傷鎻院弟兄京雒舊十年衰颯愧班行宿夀陽用韓公夕次夀陽驛題吴郎中詩韻寄弟素心里中與可京師如今薊北是長安纔過并州客路寒憶别汝時花共栁今宵三處月團團未至井陘口七里槐林鎮宿翠蛟潭自險青玉峽空名土屋懸崖置沙田帶石耕晩風山鬼歗夜月野雞鳴浩蕩闗門近悠悠行旅情過井陘口暮投縣索逆旅主人不得行三十里宿微水舗朝従井陘過暮向井陘投明月闗門閉西風塞水流青山連粉堞黄葉隠朱樓行路誰相識棲棲夜未休先夫人服除抵京詣宫門候安䝉遣臣英臣士竒慰問恭紀東華塵土帶征鞍三載重來鬢髪斑通謁竟由中貴使問安許㸃閣門班傳宣去久勞垂憶别奏歸朝損舊顔天語一時紛感激不禁清淚落潺湲滇南大㨗詩十首夜半傳呼萬嵗聲邉書送喜拔圍城霜天破賊烟塵靜不待新年賀太平羽騎星流掣電飛宫門霜月照行衣金鉦夜警投籖夢知是征南奏㨗歸玉座紗燈奏草開㨗音傳送滿宫來天雞未動銅龍闢親報慈寧萬喜回玊斧金戈寢殿開嘶風石馬殷奔雷翠華正值朝陵日輦上連章露布來烽火雙懸大將旗孤城三道集王師遥知銅柱銷兵地别號昆明洗甲池碧雞騰距古梁州飲馬瀾滄水不流廟略有征無戰鬬手提滇海付金甌一舉樓船定海隅雕題卉服效前驅三軍所過都無恙况復頻年詔賜租萬年厯數尊王㑹一統山河黜霸圖文徳武功相並美應教大政紀平吳邉機兵畫在深宫伐叛謀成睿想中上將指麾皆廟算板啚恢拓是神功索鈴神撼檄書成㡬載憂勤識聖情别奏凱歌人共樂先教傳唱羽林兵送張敦復學士還桐城二首詔恩相見慰浮沉徃事分明思不禁朝退常陪經席蚤内中初設直廬深蓬山地近天人别温樹春歸嵗月侵我去三年君宛在重來還對欲分襟辛酉還問闕學士慰於命宫門門外桐陂水驛通櫻桃初熟落帆風别來客鬢愁先白到日江亭問也紅也紅敦復亭予為作記偕隠己悲緜嶺上耦耕終約五湖東我來君去如相避解道人生是轉蓬送汪舟次檢討使流求二首萬里滄波使三宫法従班吾曾泛積水别久問神山天逺客星見孤帆秋汐還丈夫事異域那肯老離顔彭湖接烟火軍鼓亦闐闐絶島真無地中原只有天節旄來殿闕戈甲在樓船借問隆慮平聲將何如陸賈賢禮闈校士得十四韻數到掄才地承恩自禁林纔移經席仗猶殷屬車音白首氷銜晩青春鎻院深昔逰思裋褐榮路愧華簪銀燭三條盡銅壺午夜侵苑花應冉冉闈棘自森森簾下經過斷風前語笑沉樓明金牓月臺轉玉衡參地鄰觀象臺屢輟中宵夢回憐儤直心香凝新繡網寒戀舊綾衾忝竊繁文字蹉跎細討尋池邉蹲豈鳳書裏穴成蟫典職堪遲暮登賢鬱滯滛不辭鈎校切有暇得微吟闈夜夢母一夜春寒憶故山五更雙淚落潺湲重簾不鎻還鄉夢壠樹花時見母顔𤨏闈將出呈諸公忝接公卿席簪裾此地逢到來堦草長相憶野花濃忩暗鳴禽曙簾深報鼓重對牀燈火夕回首是離悰簡翊聖年八十别而再㑹於京師尚健無恙喜而有贈物候青春晩交情白首長三年為客在八十别來彊難老逢人少無憂羡汝狂平生瀟灑意相見不能忘春夜憶舊逰示豫朋獨宿寒齋夜悄然闗山丘隴鬱髙阡還如三載棲遲意未了平生寂寞縁漏轉微鐘時憶舊夢回殘月不成眠分明陟屺樓中事未齔相従最汝憐小屋小屋幽居稱蓬茅作意低忩開如釣舫籬揷似村溪絮栁縈簾近錢荷貼水齊景光還自愛未覺是羇栖登樓寄逺户牖長岑寂殘書且罷休落花時倚檻斜日一登樓白髪堪多病青春抵暮愁飛雲如有意冉冉下南州西樓懐潛菴時為先生較勘文集多病兼愁思登臨每獨來孤雲一飄𣺌萬里共裵􅏆文字堪心得風塵暫眼開頓忘形氣小空濶坐悠哉上手勅念諸臣勞命公暇逰賞苑中網魚攜歸恭述𣺌𣺌蓬池接露臺銀河一道象昭回金華不輟宵衣直玉几還随講席來記憶従官三伏近傳宣御札十行開侍臣空自慚歸遺曼倩當時未易才直講口號罘罳流影照青規黄巻丹霄㡬鬢絲簾外卻看閒抵戲羨他無事羽林兒恭和御製送杜相國致政歸寳坻十年深宻地親見翊承平龍尾随天路螭頭直殿楹歸田三疏意祖帳百僚情𢋫和懐賢什雲章麗太清恭和御製送馮相國致政歸益都河山還禹蹟帶礪得堯年嶽攬岱宗石海歸星宿泉身名多上相出處在髙賢日觀登臨數長懐直北天八月八日賜觀御府蔵畵於内殿進詩二首輕綃潑墨憶従容祕殿收來御印封掩映液池秋水色依稀仙仗翠微峯金函鎻處銜蹲鳳玉軸開時耀燭龍自是山川羅萬國畵圖江海見朝宗丹青龍蹴海三山銅鴨香開玉座間枝繞萬年花爛漫池添百子水潺湲紅羅夜閣胭脂濕碧鏤春亭翡翠還暇日每䝉天一笑畵中金粉解承顔十二日䝉召至瀛臺賜食已復賜魚大小四十恭紀畵槳文忩御舫開五龍雲水接南臺纔分玉箸蓬池膾親網金鱗又賜來中秋西樓讌集久别東巖月還為北塞㳺關山頻對酒風雨一登樓坐減青山興歌添白髪愁兩年長肺病顦顇况今秋瓮頭春酒昔得之林中丞家近日孫生頴力能釀此酒嵗暮獨酌為作二首風霜還飽舊時身相勸愁多酒入唇閉户不邀杯底月隔年先探瓮頭春隂陽清濁元同器黍麥低昻亦有神一笑朱顔今宛在黄公壚畔見何人收拾樽前見在身且教香味入吾唇飄颻北雪初霑地汎溢東風欲作春罷遣桃符驅嵗鬼休催羯鼓惱花神天寒日晩霜威重一醆陽和己趂人懐陟屺樓回首闗河草木黄浮雲西去野茫茫松楸未長霜先落陟屺樓空挂夕陽城南水榭懐施愚山渼陂連紫閣鳥影度秋屏逺望知巗壑髙居接渺冥湖光分裂帛山色擁來青花落題名處相思在敬亭嵗暮和子瞻與子由侍立邇英次韻絶句簡曺峨嵋編修四首凄凄梅萼艶猶清寂寂年華暗欲零一巻牙籖雙白鬢不應黄色上天庭侵曉衰顔鏡裏寒蕭蕭華髪鬢絲乾緇塵休㸃清霜色自愛新彈沐後冠誰解先生謔浪言摧頽病鶴亦乗軒如今恐被林鴉笑夜宿朝飛為啄吞東坡居士香山老出處差同晩節心不信千秋身寂寞名根終比道根深次韻彭羡門編修軟紅塵土又年餘久廢詩篇歎索居離别日多相憶老交㳺嵗晩㡬人疎閒門剥啄風微後好句摩挲月上初自點寒燈三過讀因君吟興未全除鼻不知臭屺瞻學士頗用嘲謔戲簡肺病經寒斗更加霜風如簇著含沙此身可入鮑魚肆有鼻誰聞薝蔔花未信運斤逢郢斲猶知舉扇向塵遮曉來頻嚏因君甚相憶連朝盡嵗華嵗除有感簡屺瞻華髪黄塵爆火前桃符土梗與周旋笑看敝帚千金貴懶點蛾眉半額妍空憶悲歡追昔夢且尋詩酒樂新年文書堆几風窗冷短檠頻移博醉眠正月十日睡醒示豫朋徃年嘗以是時宿新阡丙舎夢回忩外午雞聲睡足春陽潑眼明正似石閭攜汝宿新年田舎老農情蚤行憶石閭夢廻鐘漏客心闌馬首驚沙撲靣寒只似石閭風雪路不知春曉在長安午睡夢朱檢討錫鬯覺而讀其集荒荒欲落幽窗日䇿䇿時驚曲徑風一巻竹垞書在枕離心繚繞夢魂中二月二十六日同樊酉一飲酒城南古臺上野廟無人春鳥鳴古臺髙樹逺含情不因社日尋芳去嬾作城南半日行堤栁堤栁青如此山花紅奈何林鶯三月少塞雁一春多歴落愁心在羇遲旅鬢過吟詩聊自慰不覺是悲歌社日黒窰厰同樊酉一社日迥愁人髙臺絶四鄰隂晴分逺樹烟雨接殘春地僻逢花少川長對酒頻栁隂澹斜照沙際一垂綸送杜讓水令廣昌二十四韻一線飛狐道雙鳬下帝鄉地懸京邑險山接塞垣長留滯今為吏分岐忽異方野花開正落風雁過無行亭堠紛相接闗雲鬱在望昔逰同寂寞徃事黙悽傷乍散圖書地虚随翰墨場身名供刻畫文采益凄凉煩促賓朋絶凌兢笑語妨多才勤贈處雅志必周詳詩與名家稱書兼姓字香拜官非卜式歎老是馮唐曾奏重瞳聽還邀一命光孤城青塚月大漠黒河霜别意嗟飛動含情助激昻雄風生劍匣朔色映錐囊跡已輸屠釣謀仍恥稻粱故僚多背面薄宦易霑裳交道悲公叔心期感仲翔逢人難偃仰入世勿徉狂尚有遺簪戀聊為束帶忙青山對垂綬官舎解行裝荒外皆侯服邉沙盡我疆此邦有民社為爾决行藏立齋都憲惠酒且盡戲簡二首風雨城南一畨新提壺相勸獨逰頻只今酒盡添愁坐花落花開不當春己遣沉冥入醉鄉懶從燕市酒人狂故山亦有慈泉水乞取江南釀秫方樓上獨酌二首秋城如烟海看雲抵看山樓上一杯酒心與孤鴻閒孤鴻日夜飛悲鳴為曺偶道人學忘機離心亦何有吴耕方侍讀急裝出廣寧門一夕卒於逆旅貧不能斂行道傷歎追悼寄其孤多病交因宻常貧世與疎旅亭一宿客昨日數行書道術終何得飢寒屢晏如文章曺志在流慟想充閭答李子靜少司農兼索其書法二首千古風流讓蜀人西當太白望峨岷眼髙四海名無敵狂客誰為賀季真春蚓秋蛇老未休戲鴻墨法晩相求即無金玉裝匳軸肯設桓家寒具油將卜居而􅗌泉酒垂盡簡郭快圃翰讀二首􅗌泉郭釀也山泉美酒色香清故遣瓶罍細細傾自入青春嘗獨醉己多白髪未須驚賞心四事違朋好對影三人共月明今日一尊還寂寂慿誰相慰此時情鴻飛蹋雪去西東浮蟻堂中憶雪鴻雪鴻郭堂名樹下何人知有道醉鄉我亦愛無功六分春色三杯酒半世生涯一畝宫那有詩書堪乗載瓦盆傾倒向春風檐鵲寄公幹鵲蹋寒檐日影來飛鳴遶樹卻飛廻忽聞小弟傳書札報道山花取次開移居簡李鄴園大司馬門徑黄塵迥未侵青春棨㦸晝沉沉避喧每覺無幽處卜築翻因有素心新草臨窓生意淺落花欹枕夢魂深卻憐燕雀依檐棟敢道鵷鸞共一林樓上聞笛惆悵髙樓月迥明闗山無限曲中情薊城楊栁多春色解聽風前玉笛聲史事偶閒戲題長句為醫者孫生圖書跌宕謝公卿貧病交㳺尚有情藥裹年華逢薊子枕中仕宦笑盧生㡬人青史題無愧自古黄金鑄可成留取一篇方伎傳塵埃擾擾勝浮名新居春夜白首孤吟廹青春永歎深幽懐耿斜月清夢覺寒衾小巷更籌宻髙樓雁語沉頻年羇客意飄泊又従今送王仲昭還武林二首太白飄然仙者流凌風挂席下滄洲眼中一勺西湖水横海難為跋浪逰鐡笛遺聲寄竹枝扁舟應過水仙祠閒堂賜墅笙歌地惟有湖山似舊時對鏡昏黒柴門稚子迎鄰雞催曉報人行試看青鏡如絲髪一日還禁白㡬莖閒門小院斜陽盡閒門過客無晩花開欲笑歸鳥自相呼淨業觀前念浮生問坦途後生都莫較看取白髭鬚磨勘宿省中呈容齋兼懐黄麋給諌殿廊槐棘晩森森斜日清烟紫禁深把巻㡬回同笑語憐才終是共沉吟露寒桂子三秋色風落梧桐一夜隂舊日鎖㕔人好在白頭蕭颯映華簮送魏環溪先生致政歸蔚州二首君恩三疏得抽簪緑野新開古塞隂出處蚤闗天下計清忠不盡老臣心兩朝國是青編在一代身名白髪深金甲已銷耕鑿穏朔雲邉月快登臨地近翻驚數仞牆龍門賓客鄭公鄉早瞻舊省尚書履晩拂清塵御史牀心事傳經留奏草功名報國在文章非才欲達重瞳聽乞取青山傍講堂以黄柑羅酒博快圃􅗌泉之餉􅗌泉味美罷村沽折劵殘年謝酒壚獨酌巳多還寂寞細斟欲盡失歡娱黄柑春色分三寸白墮霜醅換百壺洗醆風軒聊一笑開嘗容對馬軍無嵗晩與繆虞良斜陽古巷嵗空䦨寥落寒廬亦故園梅際冷枝横凍硯雀邉疎影帶閒門縦拚泥飲防頻歎且為躭書與細論猿鶴㡬時音信少荒雞咿喔似山村甲子除夕還看上苑江梅蚤卻憶樊川岸栁新畎畝心長驚别舊闗河人老倦逢春庭前燎火年光換枕上鷄聲客夢頻辟惡桃枝先揷户六街車馬逐流塵春日懐西園先生流光堪把玩烟景易風飇旅夢牽花信春心著栁條露多憐緑徑雨濕憶紅橋將老甘離别生涯付寂寥卧病輟直奉簡入直諸公半月雙扉晝掩深𤨏窗朱網憶沉沉回驚廊閣三畨仗稍學仙人五戲禽勾檢篋書稀日草料量圍帶減塵襟數憐温語垂天問蒲栁先秋自不禁聞雞寄逆旅故人本置忩雞為報明疎林殘月半宵聲未回旅夢催人起底似征途惜别情戴文進畵漁家樂曾冩紅袍緑水隅衆中顔色果然殊蓑衣篛笠雲天濶可是秋江舊釣圖七夕城南晩歸書興碧落微雲月似鈎誰家簾捲曝衣樓流年巧婦矜紅粉半世癡兒已白頭河漢星低清淺水闗山人老别離秋夜凉一枕殘書夢潦倒西風萬古愁答立齋都憲凉風吹積雨晩景送新晴白筆秋吟興青編夜雨情名多綾餅艶心並玉壺清遥望臺中柏蒼蒼翠更生江村垂釣圖江湖且莫羡垂綸畵裏漁竿枉似真試看渭濱圖羽獵後車元載釣魚人文衡山潑墨山水供奉歸來野意閒紅欄緑浪五湖間誰知水墨蕭森物畵出荆闗著色山曉雪懐王幼華都諫淅瀝疎更外霏微小雪時映忩何曙蚤著樹欲銷遲寒重花兼出霑輕葉暫随坐殘鳷鵲影先遣掖垣知雪夜懐簡翊聖不見當時謔浪人鐙花如晝鬢如銀癡兒難了公家事狂叟相憐自在身午夜雲山連雁影千門霜瓦冷魚鱗風饕雪虐眠時蚤縮項寒廬一愴神雪夜懐張子美子文一片瑶華影霏霏入夜寒梅花疎故壘雪色滿長安漏下清霜迥風髙玉笛殘那堪羇旅夕蕭颯獨憑䦨當闗當闗呼不置殘夢㡬迷離鳥宿夜還散雞聲寒漸遲忩梅風寂歴徑竹雪參差睡美輕鐘外何因得此時卜居不定題家書後二首題得鄉書附短吟地罏紙帳覺蕭森姓名己受當時責筋力空教老境侵蝴蝶夢魂寒抱影梅花風月夜同心只須乞取青山在江北江南宅易尋夢回夜氣勘分明已睡還醒萬慮生古堞夜烏啼自語空梁山鬼嘯無情蔣山第宅終須棄潁水田園且未成贏得寒宵渾不寐風簾鐘漏度三更嵗暮夜歸冩懐寄南谿㳺好二首拂靣流塵倦曲肱人間只欲醉騰騰此身至老終成錯時輩多才合讓能雪徑數聲傳漏柝紙忩一醆讀書燈絶交論廣休重擬五術平生實未曾曉逐殘星暮落暉不成贈處不成歸尺書海内親朋㫁晩嵗天涯弟妹違河栁秋橋人判袂野棠春社酒霑衣叢祠西畔桑榆暖鼔笛聲殘隠翠微病齒平生未解巧如簧牙齒空然粲兩行善病終當留舌在多愁應不及脣亡相逢己守金人戒獨坐誰憐玉麈妨身老得閒差自慰雪梅烟竹倚殘陽露湑閣憶南谿逺望當歸亦枉然登臨遥憶在南川亂山缺處杏花滿危閣前頭松影圜短笛吹斜牛背日暮鐘聲散雁行天清歌薄酒殘燈火此事抛離又五年乙丑除夕移入青藤館新居五春三度移居日桃梗椒花總閉闗跌宕圖書新白髪漂摇風雨舊青山署門自信交㳺少卜竈先祈嵗月閒預擬送窮還罷卻殘年留伴老夫頑午亭文編巻十三
