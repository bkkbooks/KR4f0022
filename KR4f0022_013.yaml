body:
  text: 午亭文編卷十三大學士陳廷敬撰今體詩南溪贈别南溪卜築快幽深况有樓居俯茂林老至圖書從散亂春歸魚鳥任浮沉山畦花藥波紅雨軒砌藤蘿暈緑隂欲别夜闌勤秉燭祗應明月照分襟次韻張子礎副憲兼懷竇在兹秀才前後清班忝竊同白頭相見意何窮春來御水還新緑别後東華自軟紅巳共侯生溫釣石蚤輸𢎞景卧松風未應回首蓬山路林壑鶯花竟付公辛酉八月北上道中寄里中遊好四首空山獨往己三年近日羣遊亦可憐風雨斷魂迷隴上關河雙淚落燈前離觴幾處還三宿野館今宵是别筵一夜西樓才小寐馬嘶人語聽凄然玉鵲菴西山寺東黃鶯送客訴春風花殘簾閣間門閉栁老河梁别席空鄉樹斜陽迷故壘郵亭夕露濕寒叢栖栖夜火投人處宿鳥深枝笑轉蓬二十年前燈火地暫來重别易沾裳己無揚子一㕓老空有陶家三徑荒河漢影斜明月在館池人散朔風涼牀頭驛道車輪過半枕關山夢許長望逺修門再往來秋霖秋日此裴􅏆身隨旅雁辭家去心逐居人送我回落木天風催逺别寒花客路為誰開山川到處傷離别數日旗亭酒數杯小山城西前日吾來處野徑清流竹樹斜日暮出城拚一過不因水石為思家三家店溫生具食出門已昏黑煙火隔城闉才宿三家店便為千里人豆羹肥勝肉柿酒白如銀邂逅臨岐路情同故舊親過髙平弔畢亮四方伯二首重過躬耕地秋原木葉稀一哀銜别路雙淚落行衣書札臨危在文章託付非凄涼荒宅里清德耿餘輝先生以遺藁屬余訂定寒露凄凄重悲雲漠漠清松楸憐昔恨絮酒慟餘生暮景衰容慘西風老淚傾那堪車馬色霑灑向長征余居隴側先生數以書存問野店曉發三日山程十日行郵亭漏鼓夜分明寒雞己報清霜曉夢後家園别後情潞安城南栁林二首一路黃沙白日寒栁林秋色送征鞍更堪昨夜西風落霜葉煙條太已殘野路籬花放蕊新古墩殘栁閲黃塵葉稀風起逢搖落猶挽長條贈逺人渡河歌白雲渡河河水隂朔風卷雲飛逺岑渡頭舟子青山曲賈客相看淚滿襟屯留道中二首留滯鄊關路凄迷小縣城野禽呼有字村店問無名秋樹變黃緑漳流兼濁清山川與時物不減别離情鄉縣煙林外停車記昔曾此行秋色晚再别意難勝苦憶黃花放生憐白鬢增荒城時一憩未敢夢觚稜九日屯留客舍九日孤城對夕陽空階人靜館垣荒寒花寂寂開間戍落木蕭蕭下濁漳只有雁鴻聞憭栗即無風雨意蒼茫未須更約登髙處客路何時不望鄉沁州道中山館郵籖數去程短長亭堠送人行悲風落葉銅鞮道細雨寒蕪石勒城漸逺關河秋色盡欲投煙火暮雲平荒郊茅店凄其夜白髮黃塵莽自驚發沁州懷銅川赤嶂黃沙草樹荒銅鞮山色頗蒼蒼離心隻堠兼雙堠客淚清漳並濁漳野宿征夫連曉語南飛旅雁背人翔雞鳴往路空回首惆悵衣篝五夜霜漳水源水石漳源鎮清漳自此流金風吹素瀨玉鏡㵼靈湫科斗收形小蛟龍託勢幽土人思德澤鼓笛賽春秋綿山晉侯旌善地夫子渺難攀野草環封界秋風綿上山蛇龍今寂寞水石日潺湲有母能偕隱蒼茫掩涕還龍洲驛雪懷南溪九月并州道飄颻早雪飛風兼木葉下寒映麥苖稀郵驛人蹤疊雲山鳥路微南溪此時節籬菊正依依太原城南二首車馬斜暉不入城野亭北望路分明翻愁噭噭南鴻去却作天涯送客聲秋草寒雲壠麥遲嘉禾難見頴同時夜聞蟋蟀還多感惆悵唐風嵗暮時太原客夜霜橫月落曙燈親一夜邉城刻漏頻二十五聲秋點盡直教點點到愁人客舍遇張子美蕭瑟霜風日夜吹棲遲客舍晚支離耽書似蠧空鑽紙兀坐如蠶自褁絲為别鄉山行漸緩偶逢舊故語移時還思接屋連牆日相對天涯是路岐土橋栁栁未全凋葉半新土橋風暖拂行塵邉關景物今如此回首家園十月春晤劉訓夫提學旋别氷雪風裁水鑒方三年交警寸心長相逢前路無知已未出并州是故鄉桑落酒清離恨重栁條風緊客情傷絳紗欲徹歸朝近應許追陪鴛鷺行鳴謙驛留别訓夫疊前韻驪駒欲駕隻輪方相送躊躇别語長去逺心翻隨去雁還朝情未似還鄉經橫馬帳人初過客退龍門意轉傷鎖院弟兄京雒舊十年衰颯愧班行宿夀陽用韓公夕次夀陽驛題吳郎中詩韻寄弟素心里中與可京師如今薊北是長安才過并州客路寒憶别汝時花共栁今宵三處月團團未至井陘口七里槐林鎮宿翠蛟潭自險青玉峽空名土屋懸崖置沙田帶石耕晚風山鬼嘯夜月野雞鳴浩蕩關門近悠悠行旅情過井陘口暮投縣索逆旅主人不得行三十里宿微水鋪朝從井陘過暮向井陘投明月關門閉西風塞水流青山連粉堞黃葉隱朱樓行路誰相識棲棲夜未休先夫人服除抵京詣宫門候安蒙遣臣英臣士竒慰問恭紀東華塵土帶征鞍三載重來鬢髮斑通謁竟由中貴使問安許點閣門班傳宣去久勞垂憶别奏歸朝損舊顔天語一時紛感激不禁清淚落潺湲滇南大捷詩十首夜半傳呼萬嵗聲邉書送喜拔圍城霜天破賊煙塵靜不待新年賀太平羽騎星流掣電飛宫門霜月照行衣金鉦夜警投籖夢知是征南奏捷歸玉座紗燈奏草開捷音傳送滿宫來天雞未動銅龍闢親報慈寧萬喜回玊斧金戈寢殿開嘶風石馬殷奔雷翠華正值朝陵日輦上連章露布來烽火雙懸大將旗孤城三道集王師遙知銅柱銷兵地别號昆明洗甲池碧雞騰距古梁州飲馬瀾滄水不流廟略有征無戰鬬手提滇海付金甌一舉樓船定海隅雕題卉服效前驅三軍所過都無恙况復頻年詔賜租萬年厯數尊王會一統山河黜霸圖文德武功相並美應教大政紀平吳邉機兵畫在深宫伐叛謀成睿想中上將指麾皆廟算板啚恢拓是神功索鈴神撼檄書成幾載憂勤識聖情别奏凱歌人共樂先教傳唱羽林兵送張敦復學士還桐城二首詔恩相見慰浮沉往事分明思不禁朝退常陪經席蚤內中初設直廬深蓬山地近天人别溫樹春歸嵗月侵我去三年君宛在重來還對欲分襟辛酉還問闕學士慰於命宫門門外桐陂水驛通櫻桃初熟落帆風别來客鬢愁先白到日江亭問也紅也紅敦復亭豫為作記偕隱己悲綿嶺上耦耕終約五湖東我來君去如相避解道人生是轉蓬送汪舟次檢討使流求二首萬里滄波使三宫法從班吾曾泛積水别久問神山天逺客星見孤帆秋汐還丈夫事異域那肯老離顔彭湖接煙火軍鼓亦闐闐絶島真無地中原只有天節旄來殿闕戈甲在樓船借問隆慮平聲將何如陸賈賢禮闈校士得十四韻數到掄才地承恩自禁林才移經席仗猶殷屬車音白首氷銜晚青春鎖院深昔逰思裋褐榮路愧華簪銀燭三條盡銅壺午夜侵苑花應冉冉闈棘自森森簾下經過斷風前語笑沉樓明金榜月臺轉玉衡參地鄰觀象臺屢輟中宵夢回憐儤直心香凝新繡網寒戀舊綾衾忝竊繁文字蹉跎細討尋池邉蹲豈鳳書裏穴成蟫典職堪遲暮登賢鬱滯淫不辭鈎校切有暇得微吟闈夜夢母一夜春寒憶故山五更雙淚落潺湲重簾不鎖還鄉夢壠樹花時見母顔瑣闈將出呈諸公忝接公卿席簪裾此地逢到來階草長相憶野花濃忩暗鳴禽曙簾深報鼓重對牀燈火夕回首是離悰簡翊聖年八十别而再會於京師尚健無恙喜而有贈物候青春晚交情白首長三年為客在八十别來強難老逢人少無憂羡汝狂平生瀟灑意相見不能忘春夜憶舊逰示豫朋獨宿寒齋夜悄然關山丘隴鬱髙阡還如三載棲遲意未了平生寂寞緣漏轉微鐘時憶舊夢回殘月不成眠分明陟屺樓中事未齔相從最汝憐小屋小屋幽居稱蓬茅作意低忩開如釣舫籬插似村溪絮栁縈簾近錢荷貼水齊景光還自愛未覺是羇栖登樓寄逺户牖長岑寂殘書且罷休落花時倚檻斜日一登樓白髮堪多病青春抵暮愁飛雲如有意冉冉下南州西樓懷潛菴時為先生較勘文集多病兼愁思登臨每獨來孤雲一飄渺萬里共裴􅏆文字堪心得風塵暫眼開頓忘形氣小空濶坐悠哉上手敕念諸臣勞命公暇逰賞苑中網魚攜歸恭述渺渺蓬池接露臺銀河一道象昭回金華不輟宵衣直玉几還隨講席來記憶從官三伏近傳宣御札十行開侍臣空自慚歸遺曼倩當時未易才直講口號罘罳流影照青規黃卷丹霄幾鬢絲簾外卻看間抵戲羡他無事羽林兒恭和御製送杜相國致政歸寶坻十年深密地親見翊承平龍尾隨天路螭頭直殿楹歸田三疏意祖帳百僚情𢋫和懷賢什雲章麗太清恭和御製送馮相國致政歸益都河山還禹迹帶礪得堯年嶽攬岱宗石海歸星宿泉身名多上相出處在髙賢日觀登臨數長懷直北天八月八日賜觀御府藏畫於內殿進詩二首輕綃潑墨憶從容祕殿收來御印封掩映液池秋水色依稀仙仗翠微峯金函鎖處銜蹲鳳玉軸開時耀燭龍自是山川羅萬國畫圖江海見朝宗丹青龍蹴海三山銅鴨香開玉座間枝繞萬年花爛漫池添百子水潺湲紅羅夜閣胭脂濕碧鏤春亭翡翠還暇日每蒙天一笑畫中金粉解承顔十二日蒙召至瀛臺賜食已復賜魚大小四十恭紀畫槳文忩御舫開五龍雲水接南臺才分玉箸蓬池膾親網金鱗又賜來中秋西樓宴集久别東巖月還為北塞遊關山頻對酒風雨一登樓坐減青山興歌添白髮愁兩年長肺病憔悴况今秋甕頭春酒昔得之林中丞家近日孫生頴力能釀此酒嵗暮獨酌為作二首風霜還飽舊時身相勸愁多酒入唇閉户不邀杯底月隔年先探甕頭春隂陽清濁元同器黍麥低昻亦有神一笑朱顔今宛在黃公壚畔見何人收拾樽前見在身且教香味入吾唇飄颻北雪初霑地泛溢東風欲作春罷遣桃符驅嵗鬼休催羯鼓惱花神天寒日晚霜威重一盞陽和己趂人懷陟屺樓回首關河草木黃浮雲西去野茫茫松楸未長霜先落陟屺樓空挂夕陽城南水榭懷施愚山渼陂連紫閣鳥影度秋屏逺望知巗壑髙居接渺冥湖光分裂帛山色擁來青花落題名處相思在敬亭嵗暮和子瞻與子由侍立邇英次韻絶句簡曺峨嵋編修四首凄凄梅萼艷猶清寂寂年華暗欲零一卷牙籖雙白鬢不應黃色上天庭侵曉衰顔鏡裏寒蕭蕭華髮鬢絲乾緇塵休點清霜色自愛新彈沐後冠誰解先生謔浪言摧頽病鶴亦乘軒如今恐被林鴉笑夜宿朝飛為啄吞東坡居士香山老出處差同晚節心不信千秋身寂寞名根終比道根深次韻彭羡門編修軟紅塵土又年餘久廢詩篇歎索居離别日多相憶老交遊嵗晚幾人疏間門剝啄風微後好句摩挲月上初自點寒燈三過讀因君吟興未全除鼻不知臭屺瞻學士頗用嘲謔戲簡肺病經寒斗更加霜風如簇著含沙此身可入鮑魚肆有鼻誰聞薝蔔花未信運斤逢郢斫猶知舉扇向塵遮曉來頻嚏因君甚相憶連朝盡嵗華嵗除有感簡屺瞻華髮黃塵爆火前桃符土梗與周旋笑看敝帚千金貴懶點蛾眉半額妍空憶悲歡追昔夢且尋詩酒樂新年文書堆几風窗冷短檠頻移博醉眠正月十日睡醒示豫朋往年嘗以是時宿新阡丙舍夢回忩外午雞聲睡足春陽潑眼明正似石閭攜汝宿新年田舍老農情蚤行憶石閭夢回鐘漏客心闌馬首驚沙撲靣寒只似石閭風雪路不知春曉在長安午睡夢朱檢討錫鬯覺而讀其集荒荒欲落幽窗日䇿䇿時驚曲徑風一卷竹垞書在枕離心繚繞夢魂中二月二十六日同樊酉一飲酒城南古臺上野廟無人春鳥鳴古臺髙樹逺含情不因社日尋芳去懶作城南半日行堤栁堤栁青如此山花紅奈何林鶯三月少塞雁一春多歷落愁心在羇遲旅鬢過吟詩聊自慰不覺是悲歌社日黑窰厰同樊酉一社日迥愁人髙臺絶四鄰隂晴分逺樹煙雨接殘春地僻逢花少川長對酒頻栁隂淡斜照沙際一垂綸送杜讓水令廣昌二十四韻一線飛狐道雙鳬下帝鄉地懸京邑險山接塞垣長留滯今為吏分岐忽異方野花開正落風雁過無行亭堠紛相接關雲鬱在望昔逰同寂寞往事默悽傷乍散圖書地虛隨翰墨場身名供刻畫文采益凄涼煩促賓朋絶凌兢笑語妨多才勤贈處雅志必周詳詩與名家稱書兼姓字香拜官非卜式歎老是馮唐曾奏重瞳聽還邀一命光孤城青冢月大漠黑河霜别意嗟飛動含情助激昻雄風生劍匣朔色映錐囊迹已輸屠釣謀仍恥稻粱故僚多背面薄宦易霑裳交道悲公叔心期感仲翔逢人難偃仰入世勿徉狂尚有遺簪戀聊為束帶忙青山對垂綬官舍解行裝荒外皆侯服邉沙盡我疆此邦有民社為爾決行藏立齋都憲惠酒且盡戲簡二首風雨城南一畨新提壺相勸獨逰頻只今酒盡添愁坐花落花開不當春己遣沉冥入醉鄉懶從燕市酒人狂故山亦有慈泉水乞取江南釀秫方樓上獨酌二首秋城如煙海看雲抵看山樓上一杯酒心與孤鴻間孤鴻日夜飛悲鳴為曺偶道人學忘機離心亦何有吳耕方侍讀急裝出廣寧門一夕卒於逆旅貧不能斂行道傷歎追悼寄其孤多病交因密常貧世與疏旅亭一宿客昨日數行書道術終何得飢寒屢晏如文章曺志在流慟想充閭答李子靜少司農兼索其書法二首千古風流讓蜀人西當太白望峨岷眼髙四海名無敵狂客誰為賀季真春蚓秋蛇老未休戲鴻墨法晚相求即無金玉裝奩軸肯設桓家寒具油將卜居而􅗌泉酒垂盡簡郭快圃翰讀二首􅗌泉郭釀也山泉美酒色香清故遣瓶罍細細傾自入青春嘗獨醉己多白髮未須驚賞心四事違朋好對影三人共月明今日一尊還寂寂慿誰相慰此時情鴻飛踏雪去西東浮蟻堂中憶雪鴻雪鴻郭堂名樹下何人知有道醉鄉我亦愛無功六分春色三杯酒半世生涯一畝宫那有詩書堪乘載瓦盆傾倒向春風簷鵲寄公幹鵲踏寒簷日影來飛鳴繞樹卻飛回忽聞小弟傳書札報道山花取次開移居簡李鄴園大司馬門徑黃塵迥未侵青春棨戟晝沉沉避喧每覺無幽處卜築翻因有素心新草臨窗生意淺落花欹枕夢魂深卻憐燕雀依簷棟敢道鵷鸞共一林樓上聞笛惆悵髙樓月迥明關山無限曲中情薊城楊栁多春色解聽風前玉笛聲史事偶間戲題長句為醫者孫生圖書跌宕謝公卿貧病交遊尚有情藥裹年華逢薊子枕中仕宦笑盧生幾人青史題無愧自古黃金鑄可成留取一篇方伎傳塵埃擾擾勝浮名新居春夜白首孤吟迫青春永歎深幽懷耿斜月清夢覺寒衾小巷更籌密髙樓雁語沉頻年羇客意飄泊又從今送王仲昭還武林二首太白飄然仙者流凌風挂席下滄洲眼中一勺西湖水橫海難為跋浪逰鐡笛遺聲寄竹枝扁舟應過水仙祠間堂賜墅笙歌地惟有湖山似舊時對鏡昏黑柴門稚子迎鄰雞催曉報人行試看青鏡如絲髮一日還禁白幾莖間門小院斜陽盡間門過客無晚花開欲笑歸鳥自相呼淨業觀前念浮生問坦途後生都莫較看取白髭鬚磨勘宿省中呈容齋兼懷黃麋給諌殿廊槐棘晚森森斜日清煙紫禁深把卷幾回同笑語憐才終是共沉吟露寒桂子三秋色風落梧桐一夜隂舊日鎖廳人好在白頭蕭颯映華簮送魏環溪先生致政歸蔚州二首君恩三疏得抽簪緑野新開古塞隂出處蚤關天下計清忠不盡老臣心兩朝國是青編在一代身名白髮深金甲已銷耕鑿穩朔雲邉月快登臨地近翻驚數仞牆龍門賓客鄭公鄉早瞻舊省尚書履晚拂清塵御史牀心事傳經留奏草功名報國在文章非才欲達重瞳聽乞取青山傍講堂以黃柑羅酒博快圃􅗌泉之餉􅗌泉味美罷村沽折劵殘年謝酒壚獨酌巳多還寂寞細斟欲盡失歡娛黃柑春色分三寸白墮霜醅換百壺洗盞風軒聊一笑開嘗容對馬軍無嵗晚與繆虞良斜陽古巷嵗空闌寥落寒廬亦故園梅際冷枝橫凍硯雀邉疏影帶間門縱拚泥飲防頻歎且為耽書與細論猿鶴幾時音信少荒雞咿喔似山村甲子除夕還看上苑江梅蚤卻憶樊川岸栁新畎畝心長驚别舊關河人老倦逢春庭前燎火年光換枕上雞聲客夢頻辟惡桃枝先插户六街車馬逐流塵春日懷西園先生流光堪把玩煙景易風飇旅夢牽花信春心著栁條露多憐緑徑雨濕憶紅橋將老甘離别生涯付寂寥卧病輟直奉簡入直諸公半月雙扉晝掩深瑣窗朱網憶沉沉回驚廊閣三畨仗稍學仙人五戲禽勾檢篋書稀日草料量圍帶減塵襟數憐溫語垂天問蒲栁先秋自不禁聞雞寄逆旅故人本置忩雞為報明疏林殘月半宵聲未回旅夢催人起底似征途惜别情戴文進畫漁家樂曾寫紅袍緑水隅衆中顔色果然殊蓑衣篛笠雲天濶可是秋江舊釣圖七夕城南晚歸書興碧落微雲月似鈎誰家簾捲曝衣樓流年巧婦矜紅粉半世癡兒已白頭河漢星低清淺水關山人老别離秋夜涼一枕殘書夢潦倒西風萬古愁答立齋都憲涼風吹積雨晚景送新晴白筆秋吟興青編夜雨情名多綾餅艷心並玉壺清遙望臺中柏蒼蒼翠更生江村垂釣圖江湖且莫羡垂綸畫裏漁竿枉似真試看渭濱圖羽獵後車元載釣魚人文衡山潑墨山水供奉歸來野意間紅欄緑浪五湖間誰知水墨蕭森物畫出荆關著色山曉雪懷王幼華都諫淅瀝疏更外霏微小雪時映忩何曙蚤著樹欲銷遲寒重花兼出霑輕葉暫隨坐殘鳷鵲影先遣掖垣知雪夜懷簡翊聖不見當時謔浪人鐙花如晝鬢如銀癡兒難了公家事狂叟相憐自在身午夜雲山連雁影千門霜瓦冷魚鱗風叨雪虐眠時蚤縮項寒廬一愴神雪夜懷張子美子文一片瑶華影霏霏入夜寒梅花疏故壘雪色滿長安漏下清霜迥風髙玉笛殘那堪羇旅夕蕭颯獨憑闌當關當關呼不置殘夢幾迷離鳥宿夜還散雞聲寒漸遲忩梅風寂歷徑竹雪參差睡美輕鐘外何因得此時卜居不定題家書後二首題得鄉書附短吟地罏紙帳覺蕭森姓名己受當時責筋力空教老境侵蝴蝶夢魂寒抱影梅花風月夜同心只須乞取青山在江北江南宅易尋夢回夜氣勘分明已睡還醒萬慮生古堞夜烏啼自語空梁山鬼嘯無情蔣山第宅終須棄潁水田園且未成贏得寒宵渾不寐風簾鐘漏度三更嵗暮夜歸寫懷寄南溪遊好二首拂靣流塵倦曲肱人間只欲醉騰騰此身至老終成錯時輩多才合讓能雪徑數聲傳漏柝紙忩一盞讀書燈絶交論廣休重擬五術平生實未曾曉逐殘星暮落暉不成贈處不成歸尺書海內親朋斷晚嵗天涯弟妹違河栁秋橋人判袂野棠春社酒霑衣叢祠西畔桑榆暖鼓笛聲殘隱翠微病齒平生未解巧如簧牙齒空然粲兩行善病終當留舌在多愁應不及脣亡相逢己守金人戒獨坐誰憐玉麈妨身老得間差自慰雪梅煙竹倚殘陽露湑閣憶南溪逺望當歸亦枉然登臨遙憶在南川亂山缺處杏花滿危閣前頭松影圜短笛吹斜牛背日暮鐘聲散雁行天清歌薄酒殘燈火此事拋離又五年乙丑除夕移入青藤館新居五春三度移居日桃梗椒花總閉關跌宕圖書新白髮漂搖風雨舊青山署門自信交遊少卜竈先祈嵗月間預擬送窮還罷卻殘年留伴老夫頑午亭文編卷十三
