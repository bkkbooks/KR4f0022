body:
  text: 午亭文編卷三十三大學士陳廷敬撰史評漢書蕭何人臣履雄猜之朝以正自守猶恐不得免焉况可以詭道遇其君乎蕭何事髙帝僅而獲免者蓋皆以其賓客之言客之言可用者一不可用者一帝項羽相距京索間數使使勞苦丞相鮑生謂何曰數勞苦君者有疑君心莫若遣君子孫昆弟能勝兵者悉詣軍所何從其言帝大説陳豨反帝自將聞關中已誅韓信使使拜丞相為相國益封五千戶令卒五百人一都尉為相國衛召平謂何曰益封置衛以淮隂新反有疑君心願讓封勿受悉以家私財佐軍何從其計帝説鮑生召平之言其可用者也黥布反帝自將擊之數使使問相國何為客又説何曰君滅族不久矣君位相國初入關中得百姓心百姓皆附君數使使問君畏君傾動關中何不多買田地賤貰貸自汚何從其計帝乃大説客之言不可用者也其後何為民請上林中空棄地令得田帝大怒謂何多受賈人財物為請吾苑下何廷尉械繫之帝固惡何以此自媚於民而乃謂多受賈人金者夫孰謂非何向者賤買民田宅有以啓之乎史稱何恭謹又言買田宅必居窮僻處為家不治垣屋則是買田自汚非其本心託以免禍更得械繫後之人臣以詭道遇其君而失其所守者益可知所戒矣曺參自古主少國疑大臣當國輒變易祖宗法度後能善其終者少矣當孝惠時曺參代蕭何為相舉事無所變更一遵何約束日夜飲酒不事事有欲言者飲以醇酒至醉而後去帝使參子窋諫之輒笞之二百何若是甚也蓋參之意既以守職勿失為事而猶慮賓客子弟或夤緣假借故益張其事使天下曉然知吾循成法無變更以絶其覬覦之私而不得有所疑似懷望於其間也何事髙帝處其難參事惠帝處其易何以信謹獲免於髙帝之世而淮隂黥布等皆已誅滅參於此時亦何敢舍其所易者而輕有變動以貽身世之慮哉其慶流苖裔宜矣傳曰三年無改於父之道故參所為亦非直以自全蓋繼世秉國鈞者之法則也張良留侯畫計招四皓以輔翼太子前人論者衆矣吾斷以為髙帝本無遂易太子之心也髙帝起布衣與吕后更嘗憂患惠帝雖仁柔未大失愛於帝徒以戚姬牀笫之恩謂欲易太子而立其子趙王如意者彼戚姬夙畏吕后強虐帝春秋髙一旦棄天下太子立而吕后為政禍寧能旋踵與計必日夜泣請於帝帝陽許之耳帝既知太子不可易而戚姬少子之愛又不能以禮義自制始而陽許之既且付之無可如何而已亦終無必易太子之心也所以終無必易太子之心者吕后強虐易太子吕后後必為亂欲易太子先除吕后吕后既不可除則太子終不可易也留侯所與從容言天下事甚衆度此事帝必嘗與留侯言其委曲留侯度其事之難處不可以口舌爭也故不得已因吕澤之請畫招致四皓之䇿以堅帝不易太子之心是以帝見四皓謂戚姫曰我欲易之云云者所以謝戚姬也使帝果真有易太子之心豈四人之所能奪哉以帝之重子房而子房不能為言四人者豈真賢於子房者哉故知不易太子者帝之本心也至如楊維楨胡儼王守仁皆謂四皓隱者不可得致良因髙帝所素重使人偽飾以誑帝蓋皆疑其事而求為之説者不近事理甚矣王陵王陵賢人也吕后欲王諸吕問陵陵曰髙皇帝刑白馬而盟非劉氏而王天下共擊之太后不説問陳平周勃皆曰王吕氏無所不可太后喜此王陵所以為賢者也吕后遷陵為帝太傅奪之相權陵謝病免杜門自絶陵大節如此陵既免吕后徙平為右丞相審食其為左丞相食其幸於吕后其人不足比數若平其姦人之尤者哉平為丞相吕嬃以平前為髙帝謀執樊噲讒平不治事日飲醇酒戲婦人平聞日益甚吕后聞之私喜面質吕嬃於平前曰兒婦人口不可用顧君與我何如耳無畏吕嬃之譖蓋吕后幸審食其平以戲婦人同其惡故吕后私喜之此平所以為姦人之尤者也平以竒計稱而祕不傳度平為人必無甚竒計當時人猶朴質故平得以肆其欺誕鄙俚之術術甚陋亦戲婦人等比耳史載平事王陵傳中以見陵之忠直如彼而平之譎詭如此陵坐諌王吕氏廢而平以此愈顯此史家深意正所以愧平而見陵之賢也故又載平之言曰我多隂謀道家所禁吾世即廢亦已矣終不能復起以吾多隂禍也然則史家之意可見矣周亞夫景帝廢栗太子亞夫固爭帝由此疏之及竇太后欲侯皇后兄王信景帝曰請得與丞相計之亞夫曰髙帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上默然而沮按亞夫此言與王陵之對同過其父綘侯逺矣其後王徐盧等五人降漢上欲侯之亞夫曰彼背其主降侯之何以責人臣不守節者帝曰丞相議不可用亞夫因謝病免相久之卒下廷尉自殺人臣守正如王陵周亞夫或廢或至自殺如平勃順人主意卒得以功名終其將何以教天下之為人臣者乎夫吕后不殺王陵景帝乃殺亞夫景帝曾吕后之不若矣陸賈孔子惡利口史稱陸賈使南越降尉他勸髙帝事詩書奏十二篇新語又能説陳平交歡太尉卒誅諸吕功偉矣然賈名有口辨平原君朱建亦辨有口而義不苟合辟陽侯行不正得幸吕后欲知建建不肯見辟陽侯母死貧未有以發喪賈乃見辟陽侯説令厚送喪後人毁辟陽侯惠帝帝怒欲誅之太后慙不可言大臣欲遂誅辟陽侯卒賴建説孝惠幸臣閎籍孺以故辟陽侯得不誅食其幸吕后天下大惡也人人欲誅之而賈獨為計畫有口者變易是非如此賈誠有功而於此吾獨斥其非者以其有口而不專用於正而平原君亦以辨有口失其身孔子稱木訥近仁而惡夫佞又曰巧言鮮仁陸賈朱建之才賢猶且犯聖人之戒則信乎利口之不足為貴也鼂錯吳楚反景帝以爰盎言斬鼂錯盎故與錯有怨然非帝有欲殺錯之心即盎數語豈能斬錯也錯太子家令太子家號智囊在文帝時數言事文帝寬容所言多見施行然錯言宜削諸侯文帝不聽及景帝時聽錯言削諸侯支郡公卿列侯宗室雜議莫敢難獨竇嬰爭之不能得夫吳王不朝賜之几杖尉陀自王璽書開喻以孝文之寬仁盡下推恩藩國雖百鼂錯烏能召亂景帝之為人薄矣微鼂錯烏得不反反寧能獨任其過乎及七國反以誅錯為名爰盎因竇嬰見帝屏左右及錯具言吳楚反獨以錯故計惟斬錯發使赦吳楚則兵可毋血刃而俱罷於是上默然良久曰顧誠何如吾不愛一人謝天下則帝之心可見矣錯久侍太子多隂謀帝必有不自得於中者得盎言益堅斬錯之心然帝於錯略無舊恩薄矣哉路溫舒自賈生以來鼂錯賈山鄒陽枚乘路溫舒皆有文學詞辨數進諌説鼂錯事景帝以七國事誅賈山在文帝時言多激切鄒陽枚乘遊吳以正言劘濞之邪心不及於禍可謂邦無道免於刑戮者矣溫舒牧羊取澤中蒲截以為牒編用寫書其論尚德緩刑何其溫文爾雅有三代忠厚之遺風與以余觀數子溫舒之學幾於純已使其遇文帝所建言當不僅如此已也然史稱其後遂為世家禍福之於人豈信無天道哉董仲舒仲舒之學歷戰國秦漢未有其匹敵自孟子以來一人而已劉向稱其有王佐之材雖伊吕無以加使仲舒在商周之世其能為伊吕不可知然決非管晏伯者之佐所可及也向子歆叛其父之説乃謂伊吕聖人之耦王者不得則不興故顔淵死孔子曰天喪子唯此一人為能當之仲舒遭漢承秦滅學之後六經離析下帷發憤潛心大業令學者有所統一為羣儒首然考其師友淵源所漸猶未及乎遊夏而曰管晏弗及伊吕不加過矣歆之言出於正耶其父之説猶不當極斥之以自明其是而歆之言果不得為正論也叛父之罪不可逃矣孔子曰子為父隱至明攻其父之説而極斥之隱乎不隱乎君子以為向所説非攘羊比也歆遽證之何耶歆好左氏春秋嘗以難其父榖梁歆為人子専攻其父當仁不讓豈是之謂歟嚴助史稱巫蠱之禍不惟一江充之辜亦有天時非人力所致建元六年蚩尤之旗見其長竟天後遂命將出征略取河南建置朔方其春戾太子生自是之後師行三十年兵所誅屠死滅者不可勝數及巫蠱事起京師流血僵尸數萬太子子父皆敗故太子生長於兵與之終始豈獨一嬖臣哉雖然武帝好亂喜兵出自天性糜爛生民毒流宫禁亦其時之臣有以佐成之不得歸咎天時謂非人力所致也建元三年閩越圍東甌東甌告急於漢時武帝年未二十以問太尉田蚡蚡以為越人相攻擊不足以煩中國自秦時棄不屬嚴助乃詰蚡秦舉咸陽棄之何但越也今小國來告急天子不振又何以子萬國乎於是上遣助以節發兵會稽會稽守欲距法不為發助乃斬一司馬發兵浮海救東甌未至閩越引兵罷後三歲閩越復興兵擊南越為遣兩將軍將兵誅閩越淮南王安上書諌不聽兵遂出踰嶺適會閩越王弟餘善殺王以降帝自以為兵功令嚴助風指於南越南越遣子隨助入侍助還又諭意淮南當此時武帝之心益驕而兵端不可戢矣故其窮兵黷武好大喜功自是以來日無寧息生靈戕於鋒刃災禍發於骨肉方武帝少時志趨未定利害未更不有嚴助或師出無功抑其雄心末流之害當不至此烈也故曰其時之臣實佐成之而謂巫蠱之禍由於兵兵之興天時非人力豈不過與其後助以交私淮南論誅昔人有言毋為禍首助之謂夫霍光宣帝始立謁髙廟大將軍光驂乘上內嚴憚之若有芒刺在背後車騎將軍張安世代光驂乘天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳之曰威震主者不畜霍氏之禍萌於驂乘史載其事余以為非也雖微驂乘霍氏之禍庸得免乎光秉政二十年權侔天子雖守之以約持之以謙猶懼不得免而况霍氏之宜及於禍者其事固已多耶最著者在毒殺許后光既不能自制其妻又使其子姓甥壻黨親連體根據於朝廷雖微毒殺許后人臣若此有不及於禍者耶光貪冒權寵而不知止昭帝年二十而光不知歸政宣帝即位年十八矣諸事皆先白光然後奏事暗主且不可而况於宣帝之察察者乎光之性貪冒而不知止是以不能制顯致有淳于衍之事而其黨親連體根據於朝廷以此卒及於禍也王吉貢禹宣帝頗修武帝故事宫室車服盛於昭帝時外戚許史王氏貴寵王吉上疏言得失意有所規切然亦未敢顯言大抵欲興禮制流德化尚儉正俗最甚不過曰謹選左右審擇所使去角抵減樂府省尚方而已帝拒不納吉謝病歸貢禹在元帝時言有加於吉自乘輿後宫無所不言帝納善其忠至其卒帝猶追思其言吉禹有不得盡言有盡言一言輒令罷去盡言無所拂殁猶思之觀兩人之遇士之為道而仕幸不幸豈不繫乎時哉然元帝之受言過乎宣帝矣趙廣漢韓延夀王章漢所誅京兆尹趙廣漢韓延夀王章廣漢治潁川患俗朋黨構會吏民令相怨咎告訐其後強宗大族家家結為仇讐雖散落姦黨盜賊不發發又輒得然作小智尚詭道變易風俗而俗益大壞其所失不啻姦黨盜賊而已也為京兆尹雖善為鈎距以得事情迹其所為天資刻核至庇其客窮治男子蘇賢失計又疑殺邑子榮畜事發下丞相遂誣丞相夫人殺婢令跪庭下受辭悖又甚焉且近乎愚史稱聰眀非矣其自取殺身宜哉延夀治潁川變廣漢所為教民以禮讓徙東郡黃霸居潁川因其迹而大治延夀為吏上禮義好古教化所至必禮聘其賢士廣謀議納諌諍表孝弟有行接待下吏恩施甚厚或欺負之者延夀痛自刻責在東郡令行禁止斷獄大減為天下最入守左馮翊民化其德為蕭望之所厄寃矣王章果敢有為雖為大將軍王鳳所舉非鳳専權不親附會日蝕奏對事召見言鳳不可任用遂為鳯所陷而史言章不量輕重以陷刑戮如史言人臣當量輕重以全身負國耶孔光世多舉張禹孔光同譏然光未相及未罷時不希指苟合其議中山定陶誰宜為嗣光引尚書兄終弟及中山宜嗣議獨正問定陶共王太后宜何居光心恐傅太后剛暴與政事不欲令與帝旦夕相近議宜改築宫傅太后從弟子遷在左右傾邪既免歸以傅太后故復留光與師丹奏論之傅太后欲與成帝母俱稱尊號羣下多順指唯光與丹持不可光自議繼嗣有持異之隙又重忤傅太后由是䇿免光觀光所為皎然自立如此復相之後時當逆莽波靡雲流不能自止此所以貽譏於世與光不再相豈得不為完人也哉然光待董賢一事則真張禹之為矣翟方進漢災異輒殺宰相以應變綏和二年春熒惑守心賜册丞相翟方進即日自殺而顧祕之遣九卿册贈以丞相髙陵侯印綬賜乘輿祕器天子親臨弔者數至異於他相故事若幾幸其死者蓋漢視宰相重其意曰災異之應不於相則君而已矣懼而委之於相猶惟恐其不得當焉故幾幸其死則不憚禮儀恩勤之至此也若此人本無罪而吾用之以代吾身矣可不謂惑之尤甚者與何武何武所居亦無赫赫名去後常見思今讀其傳雖微此兩言而武之不以赫赫為名去後使人見思者隱然在簡册之間此亦足以見文章之妙也其曰功名略比薛宣其材不及也而經術正直過之則武優於宣明矣至武不阿王莽豈宣所得比哉王嘉元帝容受盡言過於宣帝成帝雖多內譏如谷永輩専攻上身後宫率常納其言漢無道之君未有如哀帝之殺賢相王嘉者也嘉以封還益幸臣董賢戶事見殺寃哉哀帝之哀允矣韓嬰韓嬰嘗與董仲舒論於武帝前其人精悍處事分明仲舒不能難也有口之人吾所畏亦聖之所斥嬰雖賢者而仲舒大賢既受此人之厄而又困於其徒吕步舒不有聖人惡夫佞表直道而行者吾之所謂畏不幾於謬哉張湯杜周張湯杜周不列酷吏史曰湯周子孫貴盛故别傳夫幽厲之名雖孝子慈孫百世不能改此三代之大法萬世之至公也而曰以子孫貴盛故别傳班史之為説謬矣郭解郭解每出人皆避有一人獨箕踞視之客欲殺之解曰居邑屋不見敬是吾德不修也乃隂請尉史曰是人吾所重至踐更時脫之後此人怪之問得其故乃肉袒謝罪此與王彥方輩亦復何異然解正欲以此立名聲非實能以德報怨者有公私之别故君子弗取焉然諸遊俠行事亦有過人者獨樓護始附五侯王莽時以執吕寬取封爵之賞此誠無賴小人耳愧遊俠諸人矣午亭文編卷三十三
