body:
  text: 午亭文編巻四十六大學士陳廷敬撰誌銘朝議大夫刑部山西司郎中約齋李公墓誌銘始余從蔚州魏先生游得交李公父子其後公之子旭升今給諫君以文字及吾門因益愈知公平生甚悉後久不見時時從給諌君問安否無何以訃至給諫君為狀謁銘於予按狀李氏十世祖自孝義遷蔚累世以武功顯然多厚重隠徳至父太公敦行仁義好善樂施尤稱長者遂大積於厥躬以造其家公生而早慧為博士弟子員食餼上庠數踏省門試不利於有司以選拔貢太學省其父歸里中魏先生方謫官家居以古儒者學行自任倡導其鄉公既天質沈摯近道聞魏先生講説益淬礪於問學家禮譜牒近世所弗急者公皆服習而修舉之選中書舍人内閣地深嚴闗機密公恪勤盡其職毋怠毋洩遷户部雲南司主事會用兵於滇賊壘未拔郛郭甫定封疆之吏以人未就業請免夏税以蘇民或言士馬供億必資近境議不可免公争於庭中卒如公議宣屬順懐安蔚衛頻年苦水沙沖壓民屯田有司請捐其賦議不決公盡言無諱卒韙其説督理右翼興平倉奸人窟穴其中弊不可究詰前後繫訟纍纍彌歴年嵗人憚其役公則精心釐畫潔身犯艱大猾屏跡進廣東司員外郎攝四川司事蜀自兵後嵗賦日耗議者令増賦日急公曰養殘黎如養劇病宜急培其元氣疾疢彌年而重以很厲之藥鮮不斃矣今惟責大吏招徠流遺田闢賦増毋俟重督於是議寢遷刑部山西司郎中榆次民段某奸㸃誣祁縣范某謀不軌公得其情㸃者服上刑而無辜皆釋會命重臣清刑獄公檢爰書可矜宥者司得八十六人雲中饑多掠賣人子女公察其偽券為斷還者甚衆公所歴官其事蹟皆此類公純孝友悌行於家施於族黨比閭皆足為世表儀旌人之善成人之名保人之孤復人之産終身汲汲如營已私衛守備何君出倉粟賑饑未及上請而病以殁法當坐侵欺籍孥公力白得免蘭溪丞徐喆舊有貸於公徐後罵賊死公急遣使持其券焚而弔之儉嵗盡出所積粟散施逺邇以為常至若建社學設義塚築垣堡諸鄉大夫之所得為者無不為事不可殫悉公雖謹厚檏直而天懐坦逸寄託髙邁自為郎出守黔中以缺裁不赴林居徜徉泉石詩酒以自陶寫嘗過龍門觀太華適吳越芒鞵竹杖有灑然出塵之思卒之日猶驅欵段尋舊所釣遊處歸而與家人論文談藝日夕不倦至夜分而形神離矣康熙三十四年六月二十日也春秋六十有八予嘗聞蔚州殁而有異雲氣覆其塚上其為天人無疑今公無疾化去其騎箕尾歴星辰而亦與天遊乎公之子六人昉辰行人司司副旭升壬戌科進士户科給事中與余有文字之知者也暉吉貢生暄亨甲戌科進士翰林院庶吉士映乾光禄寺典簿曙畿廩生女一適太學生劉曧孫十四人嗚呼公之所得於天全於人者如此此公可以無憾而世或謂天之報施善人或有不盡然者然觀於公亦庶㡬可以明於天人之故矣公諱振藻字天葩號約齋初配史恭人繼配沈恭人銘曰蔚州宿學不可捫寒松晩節今彌尊流風百世尚可敦名家清切連髙門韋相傳經遺後昆范公幕下羅璵璠少翁堯夫堪等倫矯矯介復何騰掀隴西世業堪重論維桑仙李深蟠根仲也耿耿登星垣季也詞館初髙鶱其餘頭角皆軒軒咸池迭奏如篪塤公胡不樂歸精魂隴岡樵牧無敢喧謝府君墓誌銘謝君名燕昌字翼之其先家平江上世祖曰宇以宋建炎中進士為定海令殁而民葬之後世依以不去遂為定海人元至正間為髙安令者曰嗣謙更五世為僉事者曰琛僉事以明正統己未進士初仕為上饒令政有異民祠祝之弗衰僉事弟璵生廷華君之五世祖也髙大父曰維寜曽大父曰綸兩世皆贈參政大父曰渭明萬厯庚戌進士累官四川按察使平水西有功民為立祠自其先世至按察仕者皆有功徳於民按察生子六人仲曰泰臻君考也贈文林郎君為人孝弟偘偘有節概國初時海叛帥以數千人入據縣君倉卒負親出挈兩弟匍匐叢篁險陿間黧面重趼連晝夜不息以免於難已而王師渡江餘賊匿島中将悉衆來寇君率家人設守禦謹偵候以兵法部勒之備未成賊至君白贈公寇亟矣盍避之公曰第以若母行毋更憂我賊入致公舟中公不為屈反覆數以大義且曰吾自度葬魚腹耳賊怒公及於難當此時君呼號走海上嚙指血淋漓求父在所岸上人遥望見之無不泣下後家益困嵗祲負米事母兄弟三人常易衣以出愉愉如也每催科符至輒掩巻而起已又篝鐙夜咿唔聲相荅和君讀書過目輒能暗記所習誦丹鉛校讐滿於筐篋羣從子弟工舉子業三十餘人以君為師㑹母病君旦夕侍卧起三年蟣虱盈衣帶至不可捫中夜籲天祈代母卒備哀如禮奉贈公衣冠杖履葬焉以博士弟子員游國學試輒髙等冠其儕流謁吏部試經義判又髙等授州同知歸而歎曰自吾父抱道不仕且仗節以死吾其敢違吾父之訓於是耕海之旁泊然将老矣顧於邦人有大利害則準其力之能為無所惜小浹港長山橋横絶縣東南當孔道毁於寇君治之橋完如初定海南東崗碶西接鄞東錢湖其中有渠嵗開碶版引湖灌渠溉田嘗數千頃版之分有上中下自下上鄞為首奉化次之定海又次之嵗旱則湖水淺不盈不能達渠雖開上版而於定海田未有利君謂錢湖利三縣田正賦是賴獨定海田無利是無賦也請易置版於鄞無害而定海實百世之利縣令上其言巡撫如君指既得請湖渠通流田盡腴壤比嵗大穰民歌舞以樂之盤嶴為靈巖奥區樵蘇饒於諸鄉然環溪而入淫潦不時水髙數丈或經月斷人行君則巉者削之窪者培之水深以衝者横以短梁填以巨石而險道以夷縣負海夏秋多颶風學宫數敧傾君董其役鼛鼓勸工不勞而成君雖不仕視今之仕者其所張設措施為何如哉假令君出而仕或拘於文法掣於上官其所能為豈盡得如其所志哉君既號長者一夕盜胠百金去盜之主禆帥既覺將按以法君曰舍之使其人悔改又當亂時人乘間竊槖中貲君知其人弗問後人自悔恐願以田償君君立謝取焚其券今其子孫每食必祝曰願世世毋忘君之徳然則君之行身與人不亦古之所謂賢豪間者耶君娶李孺人李先世以軍功襲指揮使孺人則脱棄紈綺温恭儉勤相其夫子以致孝養於其親教其子兼備恩義君弟妹之子若女孺人撫之如已子女使各有所成立君可謂有賢配已君性疎曠有精力嘗自營葬地曰白峯為堂清溪為闥吾魂魄樂而安之卒年五十有五逾月孺人亦卒年五十有八君卒以康熙二十二年十月二十七日孺人卒以是年十二月二十三日以明年某月某甲子合葬盤溪下樂嶴山之麓即君所自營地也子男二人長緒彦次緒章女三人皆嫁士人緒彦壬戌進士余既識其文君之弟監察御史兆昌聞君之喪将歸過取别以緒彦所為狀示余屬之銘既讀狀歎曰是惟賢也宜有銘銘曰誰與仕者民亦孔艱有介于石被褐以完惟定邑乘記隠君子謝氏聞人載張載弛銜鬚罵賊氣薄雲霄彼此肉食競以自豪惟仁成身式惠厥後亦繼其志惟徳之有子弟師之鄉社祠之或嬰簮組多為世疵世所争趨君勇絶之為所不為詎庸以私人曷思之洋洋海湄海如有涯泐此墓碑封户部河南司郎中在只王公墓誌銘封光禄大夫王公之葬也其孤山東運使廷掄使來請銘余與公同州里昔我先公為仲孫豫朋擇婦於里中得公長女賢孝聞於鄉邦葢公之行已教家以施諸世皆卓然有可稱述者焉運使君初筮仕為青州通判始親民事公來官舍提攜嚢篋以家貲辦公務屏去屬邑餉遺不取民一物民頌惠和聲滿青齊間公夫人李卒運使君奉公歸方是時晉郡縣大祲蝗蝝徧郊野公歸則出錢數十萬緡募人捕瘞我先公分口食食餓者公亦捐糈周給州人以故不流離嗚呼周禮相賙相卹之法行則天不為災而民不困於嵗後世人各自私於是比閭州黨有無死亡相視如秦越人莫之省顧一遇年凶荒則必仰於官之蠲賑幸遇長吏賢不壅於上聞又幸有仁主在上除租賦出金錢發粟設糜惟恐不及而吏之奉行之者猶有能有不能民之待澤者猶有及有不及則朝廷大恩其得被於窮簷蔀屋嗷嗷就斃之民者亦已鮮矣安得鄉有君子好行其徳如公之自保其鄉庶㡬猶有周禮之遺法乎太行古稱竒嶮實當孔道毁轅屠馬不絶於途葢其巖窞顛㚄烈於深淵行者憚焉公出私錢修治之險者夷陿者拓載馳載驟行旅歌謳比予再經忘嚮者之艱而思公之徳藉於無窮而太息之未有已也公所施設其利於人甚衆為紀其大者如此運使君入官户部公時一至焉以觀其所為及其出守汀州次子廷揚亦入官户部公戒之不資公府絲粒一如運使之在青汀也後運使君再涖山東公曰此汝昔所歴地盍益勉諸由是運使君奉公教惟謹以公訃而歸也山東人攀留之至不忍别去然則運使之奉教而施於民者可知己葢公之修已教家既卓然可觀宜其設施於外有過人者是以君子之觀人必本諸内行也公諱璇字在只居澤州之南曰楸木窪者自太行而北有山澗澗水北流可數十里公所居在澗之西土田髙起草木脩茂上有流泉可溉花竹公之祖諱國寳父諱自振卜築而安焉以長徳導其居人隠而未耀公與弟珣生皆穎異祖撫而竒之曰此兩兒殆興吾門乎公入州學為髙才生珣以武學生舉於鄉成進士公以貢入國學名在吏部為選人當需次縣令而遽引還退居蕭然自逺教二子皆有所成立此其於世之角逐於聲利之場者所得孰為多少也家居益敦古誼睦親族使皆有以自給喪者婚者徭賦之不備者緩急恃以無憂晩築小堡名曰永寜聚族黨勤守望講孝友婣睦任卹之道不倦而公亦且老矣運使君以卓異薦入京師賜蟒服既又封公光禄大夫贈公祖若父官皆如之運使君迎駕南幸賜公古稀人瑞御書四大字可謂榮顯已今年八月遽以疾逝二十一日也距其生崇禎十年十一月十八日得年七十公初娶贈一品夫人茹氏有婦徳生廷掄繼室以一品夫人李氏生廷揚進士君無後以廷揚為後女適甲戌進士鞏昌府撫民同知陳豫朋余之仲子即前所謂擇婦而得公女者也又二女一適吕宸一適陳修元孫鈞由庠生貢國學孫女五人先是李夫人葬某山之原至是以公卒之明嵗康熙四十又六年某月某甲子將啓其封而合葬焉銘曰有輝自家而極崇於朝也不顯其身則惟其子之褒也晉人載徳咸歌其休也徳之云遐若山峙而泉流也世繼繩繩永光此丘也贈詹事府少詹事田公暨配梁太恭人墓誌銘康熙三十年春正月學士田公以母喪去位予與學士生同鄉同官翰林在直廬日相見而未嘗一造其室至是徃弔於寢老屋蕭然風日漏穿苫土不飾學士觸地無容嚶嚶泣孺子聲弔者感動嘆息以為賢今世顯者之喪重幄帟飾芻靈象物多致貴人牓書氷紈霜縑被檐衣棟以自旌耀學士無一有焉哭拜且已又拜而言曰吾母之銘敢以煩執事且先大夫懿行久不銘以俟當世之能文者幸執事毋辭余倉卒不得讓諾而出余惟學士之賢而能不累於俗自力於孝如此其有由也夫公諱大稔字阜海馬邑人王父諱世芳以明經為絳州司訓稍遷太谷教諭嚴正直方律身以禮士皆憚讋嚮於學考諱嘉種耆宿長徳為諸生祭酒鄉黨化其行誼舉三男子伯以諸生不屈流賊李自成忼慨蹈義以死公其季也生而夙慧一目數行下年十三補博士弟子員純孝友恭篤踐實行與人無貴賤少長接以誠意紓難攘急族姻肅和喜賓客時至命觴盡客歡口不言人過人有言者輒不荅或亂以他語飲於郊客妄謂公慢已怒與俱歸讙於途吾酒方酣何爾遽罷若敢復飲乎適我公不辭比至客家客怒解竟歡如初夜有竊菽者僮物色得其人公謂僮吾家菽寜有符記耶温言謝其人人大悔改行公居心克己皆此類公卒以康熙壬寅四月年五十有三以學士貴贈中憲大夫日講官起居注詹事府少詹事兼翰林院侍講學士封太恭人梁氏山隂人父諱某以明經為學者師太恭人歸於公也温淑静好善治内事公事親孝太恭人晨昏左右恪恭罔怠公好客太恭人常脱佩環治醪醴肴核以盡公意公晩而不視生産太恭人用農事殖其家較晴雨時播種耕耘斂穫皆有法則凡公之為皆太恭人相之也太恭人卒以康熙辛未正月年七十有九男子子五人長即學士喜􅀢辛丑進士内閣學士兼禮部侍郎次喜䢮庠生早逝次喜霔嵗貢生汾陽訓導次喜鱠廩膳生次喜鰀南豐丞為後於仲父女子子一人適李維基孫男十二人學士又云先大夫棄不孝孤閲十稔矣所不墜我公遺緒以行身立朝者繄惟吾母之教觀太恭人之行於學士為賢母於公為賢妻觀公之行於世為賢人則學士之賢其有由也夫余是以願銘焉銘曰古者淳悶不相徃來我觀於鄉厥惟賢哉有美其居拒門弗開我觀於家猗嗟賢母吾莫逐榮亦莫予侮昔相夫子秀出士林温恭其徳如式玉金有而不施大其後人峨峨塞山鬱鬱髙墳昭昭無窮視此刻文提督陜西學政按察司僉事洪君墓誌銘始余竒洪生琅友之文琅友舉進士為中書舍人相聚於京師因交其從兄谷一君知其人賢者也居數年君由禮部督學秦中而琅友官吏部以卒余閉門謝交㳺雖以君之賢葢於今絶不通問者十年餘矣今年冬君之孤以君卒之月日及許給事承宣所為狀以來請銘曰君治命也予不得辭君歙人諱琮字谷一又字瑞玉上世有顯仕唐則黜陟使曰某宋則少師曰某明則尚書諡恭靖曰某恭靖有從子諱某以孝聞君之髙大父也曽大父太學生諱某大父贈承徳郎諱某父贈朝議大夫諱某以學行祀於鄉君弱冠以尚書領鄉薦國初為崇明教諭舉順治九年進士除平涼府推官承重丁祖母徐太安人憂服闋補廣東韶州府推官歴遷行人司行人刑部主事員外郎禮部郎中提督陜西學政終養母許太恭人以康熙二十三年十二月某日卒於家年六十有五初君之生十有一年能一日為經義七篇驚其長老由是江之南北號曰神童顧朝議公弗深喜曰古之學者道積而有言今子學未成而言之多若是吾懼子之外飾也盍道務是求於是君自為童子已志於正學矣故其自莅事教士治民罔弗本於其學東粤新附建兩藩王邑令府掾皆所易置憑依城社張距磨牙眈眈伺人君至則曰此濓溪先生提刑舊地也甫下車大書洗寃澤物四字榜之中堂為政精密嚴恕一以周子為師法成令修姦黠消沮强梗從化上下安悦折獄迎刃砉然而解訟者皆願之君所旁郡縣有寃獄皆就君治部使者行郡縣必與君俱招徠流亡闢土田通貿遷民稍稍出水火而登袵席矣當是時兵猶未戢征調頻繁諸郡縣苦供億弗繼則吏執其咎曲江始興保昌三縣令至相繼自裁君條上幇貼夫船長行之議謂夫船供應廩給額規而外若馬匹折乾索勒則宜革存留傳銀則宜請動支解運腳費則宜請例給鄰縣則宜議協濟大吏韙其議雄韶諸郡吏民有更生之樂勒石頌君功徳焉郴桂之界烏春山有妖民郭天鵬者為亂時議以兵誅之君曰無庸兵密召鄉勇計縛天鵬鬼子峝為亡命逋逃藪君選數騎乘夜抵其寨絶水道諭之順逆禍福即日弭散䖍賊王秀等已就降至翁源復叛渡江大掠約賊黨内應君用間誘使殺賊自効而督猺官與戰禽秀殱餘賊四十人曲江猺刼殺人君單騎徃鞫得其擅殺者七人抵法餘不問全活數千人於是督撫御史臺使者交章薦君於朝君在刑部取歴代疏議釋義箋注諸書考證晰疑使法必當情吏不得縁為奸律官私掘蔵物聴收用官私字誤官司廣西容縣民坐掘蔵物誤罹法者衆君取舊律文為證事得白更著為令君之莅事治民其大者如此初君之教授崇明也敦尚實行風勵學者毋苟趨利禄而文學之士彬彬興起及在秦中慨然念曰國家所命督者學也匪獨文也必學正而文興於是所以造士之法悉準於古重建闗中書院祀其鄉大儒横渠張子延李君中孚講學其中掲其條目為學之序修身接物之要實與白鹿之㫖相發明葢闗中理學之傳自明季馮少墟益推闡而光大之君則為之刋其論著布之學宫曰爾多士歸而求之有餘師也君之教士者如此以君之言其見於世者未能盡究其用而跡其所以張設措施之意悉不失其為學之指君於聖人之道可謂勤矣元配王氏贈恭人繼室方氏封恭人以某年月日葬於某里某原以元配王恭人祔恭人婉嫕有内徳前君二十九年卒子男五人景行東流縣學教諭覺行嵗貢生周行候選州同知雲行太學生時行幼女八人皆適世家有名行孫男十一人述庠生逵遇遴遵邃選連迥逖遹俱幼琅友名玕為人謹飭有文善書法予之知君以琅友琅友之殁余不及銘而銘君可慨也銘曰去聖經逺註箋紛如孰集其成孰究其初相厥宅里大賢所居髙原鬱鬱碑石峨峨近壠墓者紫陽之巖阿贈工部虞衡司員外郎闇然衛公暨配賈太宜人墓誌銘康熙三十有四年里有賢媪夀届百嵗里中大夫士以其故俗風謡圖冩屏風長筵勸酒以余濫爵厠名其中時實奉諱蒲伏弗敢躋堂惟國之人瑞願因喪除而徃見其廬無何媪卒春秋九十有七余将徃弔於寢門會拜户部之命為裝以行其冢孫維斗介其宗老太守君布狀謁銘於余曰將開奉政公之蔵而窆焉乞為合葬之銘奉政公者姓衛氏諱琦字闇然稱奉政贈公也年二十三嵗而殁媪封太宜人朝議大夫賈公某女今去奉政之殁葢七十有餘年矣按狀奉政公生而異姿賦質簡静疾華躭朴不與俗伍考徳攻業亡於悴勤事父母有曽閔之行至今誦説孝子孝子云殁之日雙親垂白幼孤三齡而同懐弟妹九人咸在太宜人自箴盥始事早著令儀至是霜晨臼杵夜月機絲内勤事育外捍門户養三齡兒稍長嚴熊荻之教後為御史有名世祖朝奉政之贈太宜人之封皆以侍御故先太宜人以殁於是時太宜人年八十矣維斗才九齡兩弟在襁褓初侍御君性剛嚴嘗嚄唶人過人畏忌者多及是則禦侮予抗横逆﨑嶇艱難之中再興衛氏故余以謂賢也嗚呼以奉政公之篤於孝豐於才而嗇於命天假太宜人立兩世之孤兒登百年之上夀彼蒼蒼者豈無意於斯人哉是以余銘奉政公之合窆而尤興起於太宜人之賢為可觀感也侍御君令商城遷水衡𣙜杭闗及以曹官代巡狩於江南也皆秉太宜人之教令以行商城河無津梁解槖金倡其縣人為橋以資利涉商城之人名之曰衛母橋其心存濟施皆此類也考終之日鄉里悲焉雖奉政公之不禄相見於泉門亦可怡然無憾也已矣奉政公生以萬厯二十六年七月十二日卒以萬厯四十八年三月初一日太宜人生以前明萬厯二十六年十月十八日卒以皇清康熙三十三年七月十五日男子正元更名正丙戌進士歴官御史内陞所謂三齡兒也孫男四維皇庠生卒維斗監生候補理藩院知事維本増廣生維正増廣生孫女一卒曽孫男二首榜廷榜曽孫女三衛氏先世為河東人遷陽城以甲乙科顯者甚衆奉政公髙祖世清曽祖九堯皆有隠徳祖天雨雄俊人也考遵訓邑諸生有聲儒林余北轅時太守公送之樊川之上謂余衛氏世行非子銘不彰余諾而行在道濡筆以銘不敢負太守君之屬太守君立鼎所謂維斗之宗老者也銘曰河東璿源其際清泚蔚彼裔苗産此杞梓不憖哲人光流景駛天豈謂然有美並起作儷淑媛造我堂構靈柯謝春穠華掩秀簮珥弗施象服爰授百齡未多千秋旦晝里館曉閉泉庭宵明崇芒鬱望哀輓愴聲維北沁流維南析城髙山長川悠悠我情兵部督捕主事龎君墓誌銘龎君名太棫字錦里其先即墨人上世祖某勝國初知髙平縣去官人吏卧轍攀轅借令君撫我既不得請則曰為鄉先生以矜式我父老子弟於是因留家焉子孫世居唐安里數遭兵刼譜牒散亡可考而知者逺祖有子三人伯氷仲佐明經為和陽縣丞叔清自清以下遺其名君之祖道興父志徳贈奉直大夫兵部主事母何氏贈恭人君弱不好弄獨時騎竹馬羣兒騶唱導從以嬉奉直君見而憐之曰吾田家兒後豈能有此乎及長侍奉直君羇游滑縣居益貧君間闗南北竭力顧養奉直君孺人相繼殁負土庀治窀穸過時而哀州里髙其行事君守貧益堅當此時鹽法大窳巡鹽使者嵗下司農鹺引目於郡縣長吏按户口徴斂盈詘不平公私交病於是巨貲大賈各有分地受鹽轉輸四出髙下其直以罔氓利然官引目亦由是通行嵗所上課如額官吏安之矣君獨謂以吾意行法法無不善北遊天津周旋客豪間欲以行其意人既知君長者就問之君曰母病民民不病法行斯善矣皆曰敬如君意以行鹽使者賴其力皆愛重君固安董氏之分地也鹽壅不行逋責盈積以屬人人罔敢應者君曰是獨不可行吾意乎至則與人約吾以急公家之務耳矢不以私贏病吾人行之未及期人以和輯官私辦給凡君於鹽筴攬綱挈目亦不屑屑身自持籌算顧喜親書册慕學行有褒衣博帶之風嘗慨然曰使吾當官以吾法行之官事必理時兵興西南行間饟需急朝廷終不以軍食困民下令能助軍資者以官賞相激勸君由是入貲以太學生為兵部督捕西第三司主事正刑書懲周内慎平反舞文骩法之吏斂手卻立莫敢仰視君歎曰法果不可以行吾意乎居六年𣙜崇明海闗税傾倒匳篋以自隨曰吾故不欲以財自汚敢不洗濯奉職滿差歸次維揚驛舍而卒卒之日故時槖皆已盡無海闗一物一錢嗚呼君之志固如此良可尚也已君孝友行義孤貧自立奮身郎署迴翔嵗時初贈考承徳郎妣安人再贈考如其官妣恭人始騎竹馬時贈君憐之而心不謂為然也今君所成立有異其亦非偶然者與君娶段氏無子賢而不妬忌為君納兩姬亦皆無子女一人段恭人出適里中馮生段恭人前君三年卒君卒以康熙己巳八月距生之年丙寅得年六十有四以姪嗣煊為後嗣煊卒以嗣焜嗣煜為後以姪孫奭為嗣煊後皆君所自擇而立者君於内外行修篤如此宜皆可銘銘曰材賢天畀匪直一科横鱗集翼藹吉斯多安平之壘齊城㠎嶫洋洋國風暢彼條葉泫氏之墟壺山且長蔽芾勿剪茇此甘棠流風邈矣復其孫子君奮孤童逺踵祖趾餘分閏氣産生駿雄光岳所䕃就日翔風白楊蕭蕭青竹斯在摩簡篹詞投筆一嘅巡撫浙江兵部右侍郎兼都察院右副都御史公孚張君墓誌銘陽城古堯都東鄙地其人能世其道徳風化之美以余所聞於長老士之以文學節㮣事功著名於時近代則原襄敏公楊正肅公張太宰公其尤卓卓在人覩記者公孚太宰公姪孫也公孚其字諱泰交居虎谷里其地在沁水傍沁水一曰洎水故又字洎谷上世祖可紀者曰演曰純曰曉曉以子昇貴贈中憲大夫河南衛輝府知府以曽孫慎言貴贈光禄大夫太子太保吏部尚書髙祖昇明嘉靖庚戌進士歴官河南左參政以孫慎言貴贈如其官慎言萬厯庚戌進士累仕至南京吏部尚書加太子太保稱太宰公著其官號也曽王父天與増廣生王父慎思貢生父履祥諸生皆以泰交貴贈如泰交官公孚之始生震雷繞舍有龍起壁中其明日隣媪夢天樂聲送兒來公孚生而秀碩有異質髫齡即知問學父遊覃懐間久不歸迄不知在所思慕悲號誦孝經至顯親揚名嗚咽不自勝年十二試於邑令令竒其才甫冠大父殁家益貧落欲棄書冊為賈人者數矣會祥符張君甫令邑中試邑中諸童子見公孚尤竒之初公孚業某經至是張君授以春秋胡氏傳遂治春秋康熙辛酉舉於鄉壬戌予承乏翰林掌院學士領貢舉同被命則相國前吏部尚書錢塘黄公工部尚書大興朱公相國前户部侍郎合肥李公皆嵬然耆宿謂余以文字為職業屬予勘定至春秋巻得公孚文予曰此可以魁其經矣諸公曰中有眷眷兩字未知所出予曰有之諸公於是與予畧有異同予反覆公孚之文未嘗不歎其果可以魁其經也先是予子壯履誦詩及易及見公孚通春秋傳因令從公孚學春秋葢公孚之於春秋可以為人師矣公孚雖為進士凜凜自修飭恥干請舍館授徒士之遊其門者彬彬如也居數年家益貧仕為太和令滇南去京師萬里予親為治裝祖道别去居五年太和大治行取授廣西道監察御史巡視長蘆鹽政御史例嵗二八月内陞外轉各一人在差則否公孚以特㫖内陞遷太僕寺少卿提督江南學政未一年遷大理寺卿數月遷都察院左副都御史又遷刑部右侍郎未㡬巡撫浙江自太僕至巡撫累遷皆在學政差葢上之知人善任如此公孚之在太和也治大理附郭民苦供億多竄亡兵占民居且十九而悍卒驕横以縣庭為營房令莫敢問前令僦民屋以居至則吏請就民屋公孚謂縣令命官宜有體何用民屋為遂馳入縣庭方視事庭中營兵來校射公孚謂縣令臨民地非兵校射所語不孫鞭撻之於是諸營讋伏永昌道轄七府大理轄八州縣而太和獨困煩役提學道臨試及提督道府公廨修葺諸所需物皆累太和民公孚曰民曷以堪耶請以府歸五州縣道署歸八州縣提學道歸十三學使供其費提督則自葺其廨莫有違者兵糧由府佐給公孚曰有司責也縣收府放徒煩轉運何如縣收縣放之為便大吏韙其請里中民夫苦輕役力除之雖上官皆出貲募不復輕役一夫營兵混民居男女襍沓為擇地立屋由是兵民異處矣嵗編審丁户例有心紅千金之饋公孚誓於城隍之神而革之至學宫城垣義倉義田諸廢具興不勞民力此太和之所以大治也公孚之詩予不多見今讀其去太和詩㸃蒼石在無船載洱海風狂有岸登此非名句耶其流風可想見矣其為御史也有疏通選法順天鄉試冒籍山左饑民諸疏一日朝退見旗人索債毆職官問其所償數已逾倍毁其券鞭其背事涉勢要弗顧也賽黄彪李三者巨猾也以私怨殺人誣山東人張乙所殺獄成矣鞫得情乙釋焉一日過予云刑部吏持文巻來獨遲某廷笞之刑曹譁然以為例無有夫笞吏非例獨不猶愈於闒茸者流乎予時因朝會語直公孚譁者乃已其在長蘆申條約革陋規人憚服焉其視江南學也絶交遊却私函雖家書必開封使人察之無他語始取視焉而待士惟寛士皆稱之上由是愈益知公孚矣其巡撫浙江嚴交際抑奔競恤災眚鎖盜萌留標兵以壯節鉞築江塘以弭水患民賴以安駕視河士民請渡江幸武林上召對行宫温語延問予時扈從在武林亦未及相過從其後邂逅於吳門執手為别明年公孚遂遘疾以殁方迴鑾時對閣臣言張泰交居官甚優如是者再上知公孚者甚深而公孚之所以報上者雖不能究其成功而心力亦已殫矣及卧疾上章辭歸里上遣内閣中書噶爾泰馳驛徃視章未下而公孚病且革前一日諸案牘猶耳聆口授及暮便不成語質明而逝時四十五年正月二十六日距生之年順治八年四月十二日得年五十有六上聞而悼惜賜卹逾常等予嘗謂陽城人有陶唐氏遺風雖其人類能自立以有成然更歴二帝一王迄今四千餘年之久其漸被而陶染之者徳化之所及猶有存焉况親逢聖人之教者哉觀上之所以終始於公孚者可以感發而興起矣陽城人及予所接多偉人竒士不具列而稱原楊二公者以長老之所傳聞世逺而論定也若予所接則姻婭友朋予之言既不足取信來者而又恐因是以累公孚也若公孚之所為既能承太宰公之家學而或亦可以無慚於原楊二公也矣後世必有知而論定之者公孚既幼失贈公自稚長每一念至哀痛感人友愛弱弟弟亦恭謹甚上嘗賜額推誠遇人夫知人則哲是之謂與母范氏前母曹氏贈一品夫人母范夫人之殁公孚毁幾殆哭而目胔皆裂至為巡撫目嘗不能良視上見每問焉初娶潘氏贈一品夫人夫人當困窶奉姑至孝備極敬養之宜及卒太夫人悼慟至以累其夀繼暢氏繼石氏封一品夫人夫人某官某女族貴而賢容以徳充儀以教立不福而灾又繼喬氏實主裳帷脯醢之事哀禮咸至以歸於鄉國初暢夫人有二子喪皆未及中殤将以某年某月某甲子合窆於某原之阡女子子四人潘夫人出者一適前翰林張公道湜子廩貢生徳渠先卒石夫人出者一未許字其二人側室某氏某氏出一許字户部左侍郎田公六善孫晉一未許字以從兄泰來子汝欽為子今走千數百里以狀來謁銘於予者汝欽也汝欽敦厚有家風克纉前緒用光於後公孚為有子矣銘曰生士鄉同里閈垂景耀披芳翰思古人不我見居是邦慕喆彦天茫茫知際畔君才富十倍算百年路浩壇曼吁嗟乎纔過半銘蔵幽發永歎奉直大夫達州知州立軒林公墓誌銘余獲交海内賢士大夫垂五十年最篤契者惟長洲汪編修鈍翁新城王尚書阮亭二公而已二公有入室弟子曰候官林佶者以二公故遊吾門余亦以二公之學業期之每來謁視其色輒愀然若重有憂者予詢之則知其父母老矣以拔貢來京師欲博升斗之養而不遂也無何佶歸覲因舉於鄉而父殁終喪再上春官不第乃以獻賦被㫖留直武英侍書而母又殁佶哀號痛禄不逮親而終天抱恨也衰絰蹐余門告奔喪歸葬且捧其兄侗來訃濡血篹狀以求銘先人之墓余何忍辭按狀林先家莆其遷福州自元進士重器始也四傳至明知江寜縣真而林之家聲益大又再傳而林之子姓始衍凡十二傳而至於公諱遜字敏子立軒其别字也幼刻苦力學為文踔厲風發貫穿古今竒而法也久噪場屋不售國初以嵗貢授校官旋中甲午鄉試副榜膺特薦始擇為吏也令三原七年以清節自砥不名一錢古之遺愛也擢守開州未期年遭父喪去職再補達州噓癃噢殘孑遺用康施政理人績未竟也以不能媚事上官投紱歸隠返初服也平生未嘗一日廢學復不妄學明體達用根據經史有大醇而無小疵也教子弟務循謹守禮法不汲汲榮名朗陵萬石之風也二子皆通經學古不溺流俗灼然可致顯揚也自少至老撮抄羣書幾等身耄而勤尤世所希惜炳燭也配陳宜人福清諸生陳公自程之女也産名家多媺行歸公後早經辛苦井臼親操中膺朱芾荆布不改勤且儉也其大者則孝尊章和娣姒教二子皆有學行撫三女兩以節孝著也他如處親族鄰並以恩禮待臧獲以仁凡尋常閨門之所有者不足為宜人道也嗚呼公為州縣長所至而民安之去而民思之居鄉而人敬之無不稱為善人長者公之得於人而非蘄於人者也罹兵亂不能侵遭荒嵗不能困宦途險巇履亨蹈夷自若且與宜人俱享上夀令徳考終公雖詘於天而卒未嘗不信者也贈承徳郎一鷟封安人陳公之王父母也封奉直大夫鼎春贈宜人施公之考妣也署教諭侗己夘科舉人武英殿侍書佶公之二子也字薛未行以純孝殁曰孟端嫁署教諭陳國琦曰廷端嫁廖超奉㫖旌表曰璋端皆公女也監生在㟶在崋廩生正青監生在衡在峩在岍公之孫也適莊宏者曰淑嘉適莊應琳者曰淑平適陳朝爵者曰淑和適陳聖恩者曰淑禧公之孫女也曽孫男十二人曽孫女十人尚幼也萬厯四十七年五月十二日未時萬厯四十六年十一月初四日丑時公與宜人生之年月日也康熙四十年九月初六日子時四十七年九月十七日未時公與宜人卒之年月日也公前以康熙壬午卜葬於北阡之長林莊林氏先世聚葬之原也今卜以某年月日奉宜人之喪合諸墓從先志也凡狀之所詳余撮其大書之其未詳者有子若孫能傳而述之也嗚呼世族大家世非乏也然遡四五百年名徳相承守譜牒奉丘壟詩書之道益昌如林氏者有㡬耶惟徳與年不可倖致髙行清節蔚為儒師且夫婦皆八九十嵗如公者又有㡬耶佶所悲者以不能取一第慰其親又以不及視母之含殮為傷痛然人子之所以不朽其親者固自有在佶憾雖無窮而亦安以是為歉耶况侍醫藥治棺衾有其長兄在佶之哀其亦可稍紓已乎余於汪王二公皆嘗有一日薦剡之雅獨於佶未汲引不能不徃來於懐焉然佶已自受知九重矣儲其才以養其器異日所以顯揚其親者又烏知所窮耶是公與宜人亦可含笑地下矣是宜銘銘曰閩越無諸為始封山川鬱積含敦厖士不遊宦道自尊自唐及宋迺漸通儒先蔚起相撞舂長林得姓林所宗遥遥華胄莆田分十二傳逮奉直公讀書汲古深磨礱一行作吏揚清風巻懐引去直如繩年髙徳卲聲彌宏夫妻白首相敬恭生子倜儻才過翁考文徴獻飭其躬是穮是蓘維年豐有鬱北阡峙巃嵸堂斧嶻嶪排幽宫左昭右穆環重重松楸夾植薦豆豋既安既固神所憑福流奕禩垂無窮封蕭母程孺人合祔墓誌銘翰林侍讀徳州蕭君視畿輔學政公亷造士顯聞於朝廷事已報命輒用親老乞歸養至是母孺人年八十有八以康熙二十年十月二十九日終於里第明年九月十五日合祔於封某官府君之阡先事侍讀君以書狀徴銘於不佞敬曰惟豫之侍吾母側也時時為嬰兒戲而吾母亦以嬰兒視之惟豫忘乎吾母之年而吾母亦忘乎惟豫之将老也今則已矣為嬰兒戲不可得矣吾聞其言而悲之侍讀君以終賈之年蜚英館閣及其奉使命司文教風裁嶽嶽不為俗凂海内士林有識之流聞聲相思喁喁嚮望宜且旦夕枋用當此時侍讀君年未及壯棄其官歸養母至二十五年之久孺人期頤康强考終無憾而侍讀君追憶之言猶自悲如此余於侍讀君忝齊年㸃僚伍浮沈一世進不能有所建明於時退不能安其親一日之養如吾嚮者母夫人之大故悠悠蒼天抱恨無極此吾之所以為悲者也余既悲侍讀君之言又竊自悲孺人之所以教誡其子有類於吾母者可得一二指數焉方侍讀君在館時迎養孺人俸錢不足食晨餐夕膳數進粗糲孺人則喜曰為翰林一如為諸生吾安爾養也是時余亦迎養吾母夫人於京邸歸之日解兒故敝衣持以去曰識之願兒無忘布衣時也侍讀君告而歸杜門深居泊然無營孺人為治生産娶一婦曰吾甚幸猶能為爾娶一婦矣嫁一女曰吾甚幸猶能為爾嫁一女矣則又喜曰為鄉紳一如為諸生吾不責爾養也余以母夫人病請急而歸也母夫人病良已戒其子曰女徃哉吾為爾娶婦嫁女治裝具給資斧焉慎母愛官家一錢葢侍讀君督學駐畿南余過而遇諸途泫然泣以相告也俯仰三十年出處離合之際多有可悲者孺人方登大夀以終而先夫人宰樹已拱矣此豈不尤可悲與孺人姓程氏故指揮程公諱尚之女生有淑姿端慤慈仁及笄歸於封某官府君府君豪俊不羇遭家中落孺人佐之勤儉家以復振撫異母男惟乾不知其非孺人出也孺人生二男子惟晉丁酉武舉人鳳翔守備惟豫即侍讀君戊戌進士與余同讀中秘書者也女三人皆適士人孫男九人孫女八人曽孫六人曽孫女七人𤣥孫男女九人凡内外孫數十人每遇良時節集坐前負者抱者卧枕膝者牽衣跳踉舞以嬉者孺人頷而樂之驕矜之色忿懥之意生平無幾微見於容止會地大震侍讀君急趨掖以起孺人從容言何蒼黄乃爾徐整衣出户庭其儀度閑飭類如此所居竹竿巷與田中丞雯母居比鄰二母以賢徳相式好田母之殁中丞以書幣走千里使敬為傳記母軼事今以侍讀君之請而銘孺人異日有傳列女如劉中壘其人乎並吾母而為三良可無愧詞矣故宜銘也銘曰世有母師教始幃庭微隠畢達萬目指稱黨序官政以翼以行我初受書先母諷傳發於其事老而不顛奕奕蕭君儒流競賀母誨良嗣謹小至大我蘄其施蠟貌巵辭君𢎞母教士祝其尸古求忠臣于孝子門白首孺慕忍負大君奉檄未晩天與斯文徳水之陽白雲如晦幽堂萬年芳儀儼在我作銘詩石永勿壊顧瞻舊阡輟筆遥嘅張母成太孺人墓誌銘故陜西巡撫右副都御史陽城張公諱瑃以名御史受知世廟擢撫闗隴政化大行清名盛徳流芬海内而以封通議公諱某府君為之父今户部主事茂生為之子而成太孺人者中丞之母通議公之妻户部之大母也户部官於朝聞太孺人喪以冢孫請承重遄歸手疏其大母内行問銘於余余方有母之喪且祥矣覩太孺人之事狀而益有慟乎吾母也太孺人生七十年而殁而吾母之年不能週一甲子太孺人素健無恙而吾母多憂善病天與以劬勞有限之年而遽奪於憂病相尋之日視太孺人之康寜夀考有豐歉之殊焉悠悠蒼天其謂之何而能不重余之悲也太孺人姓成氏父諱朝軒母王氏有家範通議公元配延太淑人既没繼配太孺人當此時中丞公年十二嵗矣而通議公賈於黎陽衛原之間兩尊人俱在堂晨昏孝養惟太孺人是依尤日夜課督中丞公曰張氏世有隠徳而兒器宇異凡兒他日興者其在汝乎而中丞公兄弟天性孝謹用能得太孺人歡余觀太孺人相其夫子孝其公姑教其子為世名臣而康寜夀考獲有寵榮宜矣如吾母之淑徳懿行積憂病以終身而曽不能安其子一日之養無湯藥之嘗無飯含之視而為其子者猶然偷息人世殆不如中丞公之生順而没寜也此又余之所以悲也太孺人生以前明萬厯三十九年四月十四日卒以大清康熙十九年三月六日子四人瑃癸未進士即中丞公璘官生候選州同知俱延太淑人出璿廩膳生員璡國子監生候選州同知女一人太孺人出孫男三人茂生廕生户部浙江清吏司主事揖生拊生俱幼孫女三人庚申十一月某日祔葬於通議公下佛之阡銘曰猗嗟張母教以成其子母兮鞠我我則昧罔恥澤猶杯棬跡陳圖史忍令喆母有子如此師彼賢豪以終吾母之志而已矣馮母楊夫人墓誌銘余少時伏里中聞代郡馮秋水先生學本經術以麟經世其家起而為吏所歴有聲名余雖不及見公心儀其賢及後登朝忝貳國子師公之子雲驤實分教諸生館下賴君力以亷正佐佑余余得不愧於諸生余用是知長君之賢余為翰林學士與庶常諸君相周旋公之子雲驌從授經者數年又以知次君之賢次君之子㻾少年取科第時過從於邸中余於是益知馮氏三世皆有文而賢何其盛耶余去京師兩馮君皆将母家居康熙甲戌余被召來京師見㻾問夫人無恙夫人者秋水先生方伯公之配而大馮君以參議辭其官小馮君以翰林編修請於朝朝夕侍養所云将母來諗者也越明年乙亥夫人卒兩馮君為狀介修撰胡君孟行以銘來請余與馮氏游舊矣况重以孟行其曷可辭余乃今知馮氏之三世有文而賢者皆以夫人也夫人生有貴徴通詩書明大義初歸於馮也姑太夫人以苦節孀婦時卧疾夫人襘裾不解目睫不交累日窮年侍益以勤至脱簮珥以充甘脆省侍御服用以佐夫子所不逮由是方伯公入則承歡出則問學益得肆其力於翰籍鉛槧之場與當世賢士大夫交游意雍容自得也迨舉賢良方正自為灤州守以至大官夫人未嘗不從以奉其姑以佐其夫子著短布澣濯之衣辟績不少休人謂夫人貴矣何苦復爾夫人謝淡泊吾所安亦令兒曹體吾意耳其時大馮君已成進士而夫人戒懼其詞由是方伯公感夫人意砥節礪操乾乾不懈始終為世聞人先是順治初公備兵西寜賊數萬騎薄城下夫人與公約必死當是時編修君始生夫人屬乳媪曰城破在旦夕我夫婦為人臣子必死於難此兒生不幸不能復相顧矣在圍城中四十日而始解誘之百端公不為動夫人實相之由是方伯公堅忠亮之節著攖城之功世莫不賢之夫人平居教諸子孫五六嵗時皆口授以孝經論語矻矻晨夕不厭而兩馮君及子姪皆後先䇿名於時其所造進方未易量余故曰馮氏之三世有文而賢者凡以夫人之故也自方伯公之移疾而歸歸而殁也夫人蚤夜劬辛執勤儉以推慈逮物凡養孤獨無告以百人為率月人給米一斛病醫藥冬裳衣時其緩急今行之三十年所矣余謂馮氏之興未可量者事殆有徴也故非夫人之澤不及此夫人姓楊氏明庚辰進士兵科都給事中恂女孫太學生可植女年十八繼室於方伯公公貴封夫人初公娶傅夫人生參議君四嵗而傅夫人殁遂養於王太夫人夫人歸馮而請於太夫人曰新婦當日夜奉太夫人歡奈何以孺子憂太夫人太夫人無自勞苦新婦自能子孺子王太夫人喜夫人撫視恩勤備至參議君迄今狀夫人而號泣天乎竟奪吾母葢幾不知夫人之非已出也嗚呼夫人信賢母已秋水先生諱如京秋水其字官至廣東布政使司左布政使男二傅夫人出者雲驤乙未進士福建督糧道布政使司參議夫人出者雲驌丙辰進士日講官起居注翰林院編修孫男六璧乙夘舉人㻾戊辰進士廣西梧州府同知壡㻺庠生㼂㻨幼孫女六人介夫人之狀以請余銘者編修君典試所得士初編修君之奉命典江南試也夫人戒之曰江南人文大邦汝先君之舊莅兹土也其無廢先子之功汝徃慎之哉編修君頓首受命所取士後對䇿果以狀元及第則今之介夫人狀者胡君也夫人言行皆應銘法銘曰世無少君若孟光神明乖違愆隂陽遥遥賢淑連梓鄉才徳殊邈匹配良斷織勸學感樂羊慈逾所生如穆姜禮宗母師代所望惠班女誡羅縑緗躬勤餘廩霑翳桑布施福徳能思量儒門淡薄家風長像末陵彛邪熾昌懸鼓定水皆微茫優曇鉢花難再芳考終徃生理則常為世標景與津梁我銘懿行心洋洋金石可泐詞無傷乳母趙墓銘乳母趙乳陳氏兒廷敬時嵗饑兒生月有十日凡以乳入陳氏門者已連十許輩兒見輒啼趙來兒就其乳食則不啼趙一乳窒以一乳乳兒母夫人憂之更易他乳又輒啼不食於是趙乳兒五年出陳氏門年七十二以疾卒及見所乳兒官御史大夫云葢至是母夫人見背已九年矣當夫人在時及見廷敬為翰林學士於時方優游文墨之塲責輕而寵深有餘樂而無他憂也比者洊歴公卿出入禁闥兢兢乎懼不克終吾少而病老而憂憂之時吾母夫人不及見而趙見之今已矣誰其憂吾之憂者趙卒以某年月日某年月日葬於玉溪之西原銘曰玉溪之泉其流濺濺玉溪之峯髙雲游空既固既崇安保母之躬午亭文編巻四十六
