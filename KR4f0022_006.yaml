body:
  text: 午亭文編卷六大學士陳廷敬撰古體詩七夕以柳惲流景對秋夕為韻作者錢亮工蔣京少吳震一方鳬宗宋稚恭于蓮士兒子豫朋五首霜娥垂半鬢清暉寒欲流復此照銀浦影落榆花秋天人苟無情靈匹何相求况我二三子能不結綢繆清響回新飇絶冥倒浮景流盼年光斜數子入眼冷擊築今遊燕變徴或歌郢針樓人應眠文字坐馳騁青鵲西飛來承華閟靈對此時東方生矯矯蒙英睞我本曬書人兼有標褌態心慕王子喬吹笙騎鶴背玉露未搖落志士懷凛秋清淺河漢水盈盈萬古愁星明佇含睇美人凝目留思君薦瑶席託興於牽牛鳳駕嵗不虛龍梭月再擲平時掃門人已斷轍蹄迹縱酒酌清流濯纓謝華劇將子復能來餘歡繼閏夕贈于蓮士逢君薊門樓對月滄海頭濯髮青漢邊下視渺九州我生走燕營意亦陵髙秋南行不百里江湖思逺遊蘭橈帶桂槳萬里橫中流巨靈撑兩足金焦雙拍浮物産必英異所見何殊尤豈知籬鷃輩不與飛鵬儔美才具舟楫明義敦山邱朂哉賢知士攬古光前修天禧宫古松歌次敦復韻張公走馬旋風松如騎鶴背陵仙宫青山崩迫白日冷天驚破碧騰遊龍抓拿霜霧勢嵂屼劈裂雷雨聲籠銅太華並根盤后土扶桑接葉橫髙穹相傳已自昧年嵗殷柏周栗將無同孤髙節目復磊砢落落寧許秦人封計株四十又加四大荒野隂連鬱蔥樛枝交加影疊見晴雲曉月還玲瓏苔色常濃殆自古濤響不息非關風千年茯苓此易得便欲劚之誰吾從神訶鬼守語匪幻心旌搖搖胸杵舂再拜肅謝愧自責干霄豈辱塵埃中不見慈恩雙老樹馬嘶羊觸紛西東棲棲盤踞不得地只今枯幹無留蹤松乎託身有如此能令萬古凡松空日斜杖策陪公去煙村已逺聞微鐘露湑閣望西山懷退谷舊遊二首秋山日轉佳天清逺峰集蒼然氣髙浮薄雲飛不入風吹縹眇樓對此每獨立徑微忖昔遊松落思俯拾何時曳芒履未憂露草溼寂寥退翁亭遺迹渺難及退翁耕近郊九經騁劇談尺五韋杜曲氣與霜空函及其棲此山捷徑非終南遊子領微尚幽僻性所耽旅食走京輦冷眼衝雲嵐青箱王公堂酌我春酒甘王文貞公二老道淪喪後生失毛聃短歌繼八哀冥漠天如藍退谷孫公北海所居廖生行廖生文采殊絶倫萬卷讀破筆有神試之有司輒不利生顔閔默亦不嗔為生短歌添酒巡棄置世事談蒼旻天公居髙蓋覆廣豈盡照燭窮幽垠役使衆靈雜鬼物攬執造化摶鴻鈞轟雷掣電走風雨鞭驅日月排星辰妖祥彗蝕猶尚爾况分曹府滋紛綸陸飛水潛山土藏各有主者如官臣量才大細百失一欂櫨杗桷寧皆真生乎與汝在世上直須勤買拋青春我歌君飲休辭頻萬事飇忽風中輪驥子十齡吾所珍頭白笑我徒苦辛淵明賢愚挂懷抱不見韓昶訛根銀煩生教兒粗識字姓名足記堪漁薪何必嗢咿學老子鼓刀販繒亦致身西山道中作二首我築晚晴臺以瞰西山故明滅嶺上霞依微巖際樹未解塵鞅緣遙寄邱中趣埤墉仰樵蹤簾閣俯鳥路遊思娛清暉清暉時一遇川長限無梁彩雲不可度振衣寒松嶺稅駕流泉處良遊勿蹉跎嵗月易遲暮旅行循煙村幽探散沙鷺臺髙輟回眺山近展徐步二客儼能從英流况厨顧既同西園遊時吟晚晴句石欄點筆人空翠沒巾屨同遊廖藝夫于蓮士昔與王侍郎阮亭受詔並為詩兼徴夙所製君進西山辭兹訪山中勝因以此卷隨涼風開篋笥山鬼來潛窺四顧舊所歷蒼茫多路岐侍郎既特逹拙疾豫棲遲山水自陶寫猿鶴相攀追離鴻過我前鳴聲何苦悲往時山遊人北宋與南施荔裳愚山文采今已矣大雅將在誰荒途披蔓草空谷羅華滋行行騁逺步言近兹山陲自聖感寺至寶珠洞西山最髙處回磴陵虛空秋雲御道長六龍所經處萬壑流神光半嶺礙河漢列宿方低昻猶未窮絶頂已足攬大荒平坡名豈稱新額題鸞凰故平坡寺賜額聖感窈窕陟危徑兩腋靈風翔洞中雖幽仄其外何堂堂雙闕那可辨一氣連混茫碣石在眼底滄海濵城隍我聞道家説三十六玉皇上有無極天此山或相當帝都跨嶽鎮頂背孰敢望俯視宇內山蠟屐可卷藏惜哉近市朝終焉難徜徉樊山一卷石臨老神黯傷龍泉寺下院日隱原上村秋隂起桑柘杳杳隨煙鐘悠悠逺峰下境空放梵長天迥飛雲瀉松門晚色靜碧草淨可藉風吹籬邊花寒香正盈把薄遊涉清曠所歷向瀟灑樂幽抵嗜芰味道如啖蔗至人患有身矧復簮纓假息心同冥寥聊此縶吾馬玉佳菴商飇振幽崖杖策跨蹊谷翻悵去徑窅何以極吾目稍上天影開餘翠淡林木髙臺秀逺峰日入淨如沐微興方陶然滅迹向茅屋仰躋清泉流泠泠灑飛瀑攀危不辭疲留念遲往復龍泉寺金銀二泉流乃在星漢間泠風不可御逺望空雲煙忽見秋山池映此碧玉環神魚長鬐鬛色異凡鮪鱣日影布石上魚躍不在淵食葉如樹遊吹氣成花圜洑流繞砌來吾欲尋其端稍憐松殿側泉眼明微瀾西軒俯木杪巗徑聞哀湍此泉自遙昔斯人如逝川誰能向杳靄終掩青蘿關徑祕魔崕登盧師山作溪回秋風溫徑仄殘陽閃坡陀下髙風草木相掩苒填咽谷葉丹山翠疊磨颭流澗波叢林清暉濃於染輟策稍忘疲駢席不覺險昔人晏坐處苔石無崕廣狎玩大小青理至物自感視龍猶蝘蜓蟲豸亦拘檢而我遊人間所遇足嗤點悵然盧師山觀身老冉冉碧雲寺二首寺門臨髙橋澗松交其端徑幽室何許欲憩行便姍瑣細花蒙密駮犖苔夤緣長櫩棲間雲曲榭縈孤煙稍深境轉佳靈風來清綿流泉隔篁竹日斜聲濺濺琤琮寫哀玉迸落如佩環山水解娛人何事歸塵寰泄雲被層阿餘霞帶前軒夕泉流愈駛林際驚湍奔尋山欣野宿汲水遲夜餐迢迢漏鼓斷漠漠煙磬昏煩囂於此息清回悽心魂風定寒蛸響月黑歸鳥翻匡牀靜無寐松窗明曉暾是日宿寺中來青軒觀紅葉歌來青之軒颯髙爽我來直欲攀蒼穹便因長空溯海月側身萬里三山東深山晦魄心轉悸假道北寺煙溟濛晨光小雨暗青笠白雲如絮連遙峰緣溪林木亦瑣細寒香幽草方蔥蘢豁然此軒俯下界千樹萬樹新霜紅是時西皓實司令赤帝行氣何沖融跨坑駕谷太陵競金烏避路爭瞳曨視之睨眴久不定羇魂閃爍眼力窮我本看山悵無月豈知奇詭驚愚蒙黃鶴仙人日來往霓旌火傘紛相從白榆但見露葉墜碧桃不覺春花濃丹砂布地靈境閟朱顔一笑回天風西山歸憩西樵門外雜記遊事山行意軒然不復肯慵惰同來盡所親幽探亦屢作友生各有適語默相答和大兒學阿爺吟詩勤自課小兒十齡許能騎駿馬大回策已如縈歷塊欲揚堁未忍斥輕肥一哂衰顔破草菴具野餐歸路發清餓乍辭山泉甘頗怯塵羮涴怖鴿晨不鳴蒼蠅晚相過攘攘浮埃間掩耳但困卧昭王臺春風吹緑草歷亂昭王臺空憐天下士祗為黃金來燕山落日出滄海古人白骨今安在海水東流西日斜但沽美酒燕姬家莫問當年陵谷事薊樓明月土城花挽鄭大夫振華建安秀江嶺萬古一考亭天遊羣鸞翔三十六峯青一峰上巉絶屹若劃巨靈紫陽光日月我公聲雷霆小學字忠孝大篇文六經舍生取仁義宜祀於孔庭女史並記載烈烈同芳聲郎君辱齊年遐躅思儀型回首題名處春風語塔鈴年年蒲柳緑人散稀晨星曹官偶接膝遺直明邦刑衙餐訊往迹輟箸涕泗零以余謬好古命我為公銘銘當三熏沐短歌侑神聽贈衍聖公翊宸見公問廟檜溯往徴其形世六十有七二千三百齡元氣祕柯葉修幹苞蒼青我聖宰萬彚豈獨一物靈不賢識其小有問辱公聆答言林多花被徑如繁星記一不辨九無名但芳馨皆門人土宜手自來封扃惟少杏與桃此理尤晶熒林端所生蓍莫敢擷寸莛旁下略采掇候過秋上丁積之凡二嵗數適大衍零許以當持贈奚慕堯時蓂斯文慨遐邈俄頃瞻儀型公親聖人裔淵角兼山庭絶學可繼聖為公几杖銘前山望王屋山懷蔡松年青山深淺中丘壑不一致清晨登前山髙秋散幽意千里如玦環黛色遙相次杳杳數峰間間雲忽飄墜我遊王屋山靈境仙所閟君昔從我遊棲隱偕宿志故人今在否臨風發逺喟池上晚秋山池如回溪緣流時獨往潺潺出石間幾曲聲逾響殘荷雖已零秋水日夜長澗邊木芙蓉亭亭接幽賞波淨理輕舟聊作江湖想木芙蓉灼灼拒霜花顔色衆所殊豈不惜芳時乃與晚嵗俱夭桃太冶艷野菊何蕭疏感此凌寒姿獨立將焉如秋曉由樊溪至山園徑回水鳥喧寒流隱疏樹風竹覆野橋離披豁幽步巖柯交日影籬花明曉露池館寂無人雙溪杳自注雨後至南園初霽涉南園曉池風寂歷前村雲未歸髙樹雨猶滴塵外體自舒林中欣有適遊目極逺山秋煙淨如滌遣興四首牽牛蹊人田田主取其牛蹊則良不直取牛致足羞螳蜋與異鵲忘身將誰尤微哉乘除理芒芴不可求重耳重五賢卓犖霸圖起胥臣賞先茅所貴在得士流風傳自今齷齪安足擬祁奚請老歸舉讐且舉子前驅射叔武弦髙犒秦師見義為則勇功過焉用知嗟此志士節遭彼愚者嗤别嫌古所戒來日猶可追嗣宗淡蕩人寄懷特髙妙臧否不挂口林壑展清眺蕭然蘇門生對之發長嘯寥寥鸞鳳音千載孰同調待友微曛度斜澗暝色赴前嶺石泉激清響風篁淡疏影煙鐘殷林深山禽宿夜永思君拂鳴琴巖壑渺愈靜秋懷寒色起亭臯髙樓逺峰集山斂夕曛低窗疏野煙溼畫欄見木末一葉新可拾景逸情未懶心賞歡何極自南村徑石院抵九仙臺紅葉深紅與淺紅濕雲細雨如春濃桑柘半凋柳黃落三里五里村村同徑轉溪開歎奇絶千山萬山皆玲瓏誰令巗壑擅異色純以金碧施神工寒煙消歇亦變態怪石磊砢環孤峰宇內名山亦無數此山如畫展毫素我聞虞山最佳麗丹崖紺壁儼畫具一峰道人飛仙人揮染平生釣遊處浮嵐暖翠曉千重玉洞桃花春萬樹仙人既去亦復還白雲黃鶴遊人間清都渺渺在何許玉階朝罷棲名山只今畫者誰其匹天髙氣清風寥栗欲攬太空為粉圖消得仙人兩三筆時擕得大癡畫卷南村煙中見南村窈眇徑迷舊陟危驚景佳問俗訝名陋陋村其名丹砂一林染鳴玉衆泉潄傍巗開荆扉雞犬喧清書幽興未云足古道迎隻堠宿石淙院山房行欲近半空人不知微徑礙古木青靄來差池鴨腳寒已亂鳥翼昏相追林開孤煙出飛崖落厜㕒巨靈擘左股元氣猶淋漓森嚴驚鬼物幽險疑蛟螭石坎象鐵盆千古垂流澌淙淙一線長晴雨無盈虧逝者有如此吾生幾何時潞州留别送者相送潞州道别袖屢已揮親賔自此盡徒侣相對稀薄暮涉漳河波浪沾人衣悲風起中流木葉交加飛四顧别時迹行塵連夕暉遊子感居人况乃骨肉違我無經世術空自勞驂騑所願官吏賢敢嗟生事微耕稼供井稅逍遙侍親闈誰甘逺離别逺離還思歸浭酒歌因玉田孟君寄曹冠五使君易酒甜多雪酒惡見花對月空蕭索前年滄酒貰滄州長瓶開㵼碧玉流年年泛溢東風蚤臘味輕香不全好依舊花前又寂寥那能月下常傾倒卻憶遼西塞上行酣歌劍舞出關城離筵嘗遍京東酒浭酒淋漓最有情東流浭水行相餞近海清波淨於練誰將浭水變春醅曹家兄弟成歡宴兄為二千石小弟尚書郎錦衣休浣敬愛客醉卧玉缸新酒傍朔雲去雁分飛後回首邊沙盈别袖鴒原宿草幾畨青使君朱顔宛如舊玉田孟君飲者豪絲繩絡送瓷罌髙東過浭水溪邊路因風為寄相思句浭酒歌歌正愁我今潦倒行歸休千巗萬壑太行險焉能致此燕山頭對酒秋山銜落日對酒黃金臺坐失萬古愁朱顔一為開孤斟快心賞海月天邊來連霞隱髙雁吟風空復哀霜邊野菊色盈盈照尊罍含情忽不飲白鬢紛相催忘形在濁醪浮名焉用哉東坡和淵明讀山海經十三首謂其七首皆仙語讀抱朴子有感和之余嘗欲作遊仙詩因次其韻人生醉與夢去天猶未疏以兹二者故終日息吾廬興至一把杯倦時或枕書故人多輕肥不必回其車閉户長幽草近市便美蔬形影互相答神明聊與居暫為生時計亦豫世外圖列仙不可幾吾衰將焉如至人黃石公青瞳方朱顔來往榖城道隱見千萬年上天下瀛海遊戲碣石山遺我丹臺書肯與世人言子房師黃石太華凌垤邱辟榖西入關英風渺難儔降心圮上老俯視園綺流聖道久不作且復為仙遊維南有王屋維北乃洞陽靈仙所窟宅杳杳煙雲長朝罷金銀闕鶴駕來輝光授我丹竈訣坐待爐芽黃散遣雙玉童孤鶴生愛憐晨騎朝碧落暮跨歸神山道逢青鳥使相贈以好言服食飲美酒與子保遐年伊余恨物感神喪如稿木泠然御長霄墮此深崖谷仙人憐垢氛為我勤湔浴時乎迫崦嵫悲歌至秉燭矯矯瓊樹枝羅生玉堂隂丹鳳一來儀和鳴成髙林半空天樂流誰能寫其音翹首虞山下肅然清我心登真御寥廓頗怪日月長當其寂寞時洞天為故常織女縫裳衣帝厨具餱糧豈特善口體萬年樂未央生不能追飛復不能投走季布諾千金在世誠無負硜硜執鄙吝於我意何有仙人勸酒杯且飲乾勿後東遊登髙邱渺然望雲海金堂玉室間仙真一一在青天絶紅埃一去應不悔丹砂定可成白髮幸相待淵明真仙人明明凛帝旨太傅才英奇至今皆不死偉哉東坡公忠亮可蹈履三賢友黃石萬劫足相恃翩翩雲中鶴下覩漫浪士仙人騎之來物外爰集止百年雖旦暮小住聊復耳願為仙人鶴鳴和及其子吾本幽憂人自無磊落才世故豈我願紛然胡為來六鑿滋罣礙諸天多嫌猜海山非歸處兜率或庶哉出郭出郭沙水清野林日杲杲柳眠風弄姿花落枝亦好逺山森入畫亂紅堆可掃昨日鏡中人朱顔今日老花稀柳復濃玉壺自傾倒及兹華髮時且勿驚衰早循西山下夜行逹曉落月欲落山之西緑煙未滅金盆低插天青嶂橫丹梯林壑窈冥微徑迷臨風悵望心魂悽道轉髙橋溪碧沙堤平栁眠雀啄花杏飄殘雪桃蒸霞我行已到山之涯東方海雲騰日車書沈石田山木畫次其自題韻我拙不解畫亦自喜竒逸朱粉姑置之蕭森此木石放意寫荒寒棲神遊逺碧染雲山半青落墨葉盡赤提挈羇旅頻卷舒日月疾署字是何年誰為弔古客見月夏雲如水交橫過上有明月新嵯峨我欲弄月乘輕波青天無梁風浪多陵風一舉君謂何久雨久雨殊未佳幽懷况鮮樂愁此逼仄居凛凛陷於淖髙旻停日車積隂連雲駮流霧捲地飛驚泡濺階閙平土水數尺窪處在泥窖暫歇還更然簷禽語稍稍稚子總無憂不能復騰趠排墻慮見及所傷豈皴皰天神自明聰乖龍失告教吾欲扣上穹微悃諒弗效中夜坐咿嚘困眠曉不覺五月十二日重遊崇效寺尋雪公看花之約後二日阮亭侍郎亦往遊焉以五月江深草閣寒為韻賦詩豫亦作七首野行不覺遲人影改亭午言尋惠休居豈獨招提古門前間草花戲蝶自迎舞修槐可中庭緑隂欲拾取飄然紅樓客笑齒粲可數問法離文字吟哦劇何苦斜風見動幡落日隱懸鼓我亦困詩妄新集編夏五昨遊尋東風徑草細緑髮微憐屐齒香散步意超忽青春歸茫茫幽芳亦未歇曲廊通野園曠若人寰闕古邱今猶存崩剝瘦見骨有似鱗爪枯中心自突兀四邊千樹棗嫩蕊嬌不發報花如報竹素書來一月書中何所云上云花在樁會當菖蒲節可供纓絡幢下云梔子林清芬散北窗長謡寄遐想覯止心則降開函愁細字數數挑銀缸我詩如虢鄶子男亦陋邦大師鄙島可居士慕老龎潘鬢已久白安用文如江文章小技耳吾欲觀其深以兹破萬卷寓我不住心湛然遺句字忽流天樂音譬之雲在天變化無古今形影豈一同蹤迹難重尋所以自開闢天雲長浮沈我心正如此萬劫勞相侵雖被世俗嗤或為知者欽折簡謝見招單車徑相造古殿橫翠微初地長瑶草夭矯槐龍蟠嚶呦竹鳥好顧渚瀹泉芳來禽展匣寶因從學佛間便欲為農老留客看治瓜餉鄰擬剝棗還坐讀我書西軒日杲杲何當卜夜闌軟語傾懷抱寄詩詩如何問花花恐落漠漠塵沙中鬢絲想禪樂别後秉畫燭橫陳蠟如嚼誰能從老僧破衲鐺折腳永絶羅綺緣亦無妻子縛又聞王侍郎欵門擕酒杓諸子並豪英紅顔矜綽約而我方寂然清風開卧閣憶昨俯寺閣縹眇髙雲端青天琉璃道日暮凝薄寒驚電徹罘罳宛虹垂闌干山門揖塵土歸徑迹已殘黃縑映繡轂憂患如翻瀾幸枉霞上作猶論巗中歡浮艷不挂眼新詩獨永歎子美師粲可良遊思渺漫北峰西山轉北峰城中見尋尺始晴出半岑橫雲帶斷碧劃如人靜好媌娥露修額紫臺連邊沙紅顔慨遙昔年年黑山春雪花青塜積羇士心多悲對此成目逆久雨喜晴懷王顓菴侍郎兼簡阮亭曉雨送廉纎晚雨迎絡繹歸來困欲卧屋漏牀牀窄稍聞流泉響樵語間㗲㗲夢裏青山長行盡溼無迹忽覺失煙霞孤枕斜光射晴鳥引圓吭風櫺轉清嗌隂雲雖解駮書琴久狼籍低徊把君詩吟誦手忍釋不獨銷愁憂兼亦快夙昔公朝時聮鑣官曹日接席玉山映頽顔瑶草起沉癖但無樽酒歡流連展遙夕况逢濟南生腹笥藏簡册説書口瀾翻論古人辟易一臺二妙俱我老壯神魄風流雜案牘相對未蕭索往來同廨署何俟越阡陌已辦青銅錢共醉慰衰白六月二十五日召至南書房賜御書手卷挂幅扇恭紀金猊踞地龍蟠棟赤霄雲卷晴暉重玉階行上近椒風小殿開簾褰額鳳青疏斜明飛紫煙封題宛轉光射天下臣姓名起微陋磨丹觀署迹未乾一函三錫煩屢識光華炯炯浮長箋臣名上所自署驪珠迸出蛟螭纒飇若雷電隨毫巔皎若日星麗璣璇霖雨初霽萬象妍錦機匹練天孫製淋漓御墨香螺漬書罷留題與後人剪刀不上絞綃織橫書綾以全端賜直書更有回鸞字仰觀再拜千金賜預恐茅齋破壁寒只應珍襲藏巾笥九華宫扇日邊來楚竹齊紈次第開明月煙銷香鴨動海天風起戲鴻回十九年中被恩遇承顔往往親縑素畫箑雲章喜絶倫涼秋未敢嗟遲暮丹青自古誰良臣終始君恩有幾人便蕃榮寵今如此恐懼獨立持其身題王石谷山水清暉卷後有序王君石谷以畫名聞天下比侍內廷東宫殿下髙其品誼書賜山水清暉四字蓋取靈運詩中之義廷敬捧睿書以觀欽仰久之謂山人何不遂稱清暉老人乎山人曰諾乃為賦清暉老人行云清暉老人王石谷紫鸞曾傍紅雲宿醉翻東華祕笈文黃塵霜掃秋眉緑君不見洛陽郭恕先君不見富陽黃大癡古來謫仙多畫師石谷汝畫天人姿真宰開鑿初淋漓煙雲欲落神龍隨鼠鬚麋角空爾為九重聞之亟召見寫圖每覿重瞳面倣佛凌霄夢裏遊不知身在蓬萊殿承華日永問安回寶墨書奩次第開揮賜謝家詩上句知君山水興難裁我聞一峰道人文采風流世無敵作畫半染君家虞山色彭祖巫咸皆輩行遊戲江湖不可測相逢夙昔若為情人間石谷留香名惜哉不以清暉稱誰為稱者午涯生擬古一首寄林吉人渌水湛明鏡照我青蛾眉幾回芳樹下蕩漾涼風吹思君渺銀漢洪濤浩無涯雙星雖迢迢會合嵗有期不見機中人停梭感鬢絲送廖衡素還雲間蕭條邊朔心時節迫晚暮以我幽憂居思君在岐路平生困鞍馬不識江湖處懷情向南雲極目空煙樹繫艇及流潮春風信來去送杜遇徐大宗伯致政歸檇李玉京仙人侍帝還紫清朝别暮丹山長風萬里留不得明河倒㵼隨潺潺金壺銀箭南宫漏尚書午夜遲箋奏扶桑弄影海雲生繚繞觚稜夢如舊遙思供奉西清日詔試與君連第一柏梁歌就賦長楊琉璃硯水蛟龍筆我愧紅顔君少年相逢意氣凌雲煙白駒晚景真過隙緑鬢秋霜已上顛詞華勳業鄒枚老曹省功名蹇夏偏簿書往事紛填委文酒風流只浪傳君如阮嗣宗臧否不挂口我如王無功泥飲欲濡首我留君去天蕭蕭離心千疊江山髙君過長蘆試相訪雞黍近局堪招邀謂朱竹垞巢學士賢母歌北門學士雙銀魚晨隨玉榻晝直廬有時惠我蓬萊書開函磊砢千驪珠上言母氏行凛凛與衆殊下言弱弟賢母教勤復劬朱門貴富世所慕孝弟為寶今有無又言子之文可以式浮趨子為我歌歌以壽母餘流傳篇籍無刪除我感公言為躊躇母善纍纍不可以别區母昔佐夫子惟孝忠不渝公今昆弟升華塗移孝作忠理不誣參執魁柄爭斯須守母善行為楷模吾聞母言食君之祿勿使我虞賢哉母言真丈夫青史萬年名與俱福祿永綏神明扶廣陵學士北征扈從圖方花磚影日未紅相逢鸞珮坳螭東臣朔空飽太倉米頗牧驚看在禁中蓬山仙官寂無語八窗雲開見下土清水蟾蜍咽玉壺紫塞胭脂卧鼙鼓龍旌一捲沙漠塵青山黃屋相嶙峋神功如天難繪畫歸來髙閣圖麒麟生綃别寫君年少橫槊簪毫皆入妙衰白對此意飛動掩卷臨風起清嘯飲酒寄荀少老至顔復酡飲少興無涯前有尊酒行樂府名最佳呼童使之歌聲澀如秦娃昔者與諸季樵唱相歡譁别來四五秋分散空荆柴逺或隔嶺嶠近或踰河淮君往官湘州湘州水湝湝渌水可作酒飲之寬君懷飲水還飲酒歌此當優俳出北郭門贈吳天章月斜雞未鳴中宵塵鞅間心清不染境眼明惟見山初日動林景和風吹客顔花枝自冉冉鳥語亦關關城中幽居者髙眠棲闠闤思君共芳草青春偕往還野亭對酒懷朱悔人朝來公事罷客心靜無氛頗訝衰拙迹忝兹鵷鷺羣悵然一樽酒無由舉屬君裴􅏆且未去為近青山雲午亭文編卷六
