body:
  text: 午亭文編卷三十七大學士陳廷敬撰序引疏存誠堂集序儒者以道德文章蒙知遇被顯擢在密勿論思之地晝日三接夕漏不休造滕之謀同列不聞伏蒲之語外庭不知推賢與能慶流朝著橫經講藝澤及生民彌歷嵗年延登受䇿於斯時也當大有為之日贊不世見之功休休乎濟濟乎駿聲鴻烈與五曜三階爭光映采可也豈猶與夫庭墀郎署備官散秩以及窮巷布衣韋帶之士競秀摛華角一字句之勝負蘄榮名於蟲書螙簡之中也哉雖然學術之不明久矣古之儒者窮經研義文禮詩樂治性理物罔可闕如况輔翊化成經緯羣倫而委棄大雅其謂之何此一代偉人神明寄託髙標霞舉流輝成文有不蘄其然而然者非夫人之可仰而測其津涯者也豫於相國桐城先生得斯義焉先生深經學敦儒行解巾釋褐仕為史官其時已有終焉之志會禁林建直隆學求賢登進髦士自是以來先生早夜侍焉積二十年餘而枋用所云儒者以道德文章蒙知遇被顯擢論思延登濟濟休休者公皆有焉而不以自居神明寄託顧嘗在丘中田間野雲流泉岑寂間曠之地既撡筆內廬暨鈞衡台席本經術以輔治化浹鬯幽遐時以其意發為詠歌髙文清思孤行獨賞田家漁父樵夫牧童則儲公之格髙調逸趣逺情深也在泉成珠著壁成畫則輞川之秀詞雅韻意愜理精也以至香山之挺出於長慶蘇陸之各擅於南北迹其流風會其神解皆超然於自得之餘此豈有意焉競秀摛華角一字句之榮名者哉蓋先生之所蓄積者然也窮逹不異其撡約樂不改其度故其得於心而溢於辭者有不蘄然而然者矣先生之詩必傳於後宜擇可傳之人而序以傳之余沗從先生後時在直廬先生每以兹事相屬余遜謝不遑於今十餘年所矣而先生督之不輟余以先生之文鋪陳鴻業鼓吹斯文敷為典誥伸為雅頌者能言之士必將誦説而傳之而獨取其義於斯者是亦先生之志也夫山行雜記詩序康熙十三年冬十一月將卜仁孝皇后山陵所宜地於遵化五龍山詔遣重臣率所司往相視於是髙陽公被命行既還奏下公卿集議僉曰可天子惻然念陵垣所入民廬田冡墓多吾不忍其往視孝陵遂可因厥績維用紓吾民大哉王言豫是以歎吾君吾相之用其心於天下甚厚也嘉謨嘉猷入告於內出不使人知者此宰相大臣之職則然若夫忠臣愛君其幽憂悱惻思深慮逺又往往見於獨寐寤言咏歌嗟歎之間蓋其中心之誠終有不可自掩者未幾髙陽公以山行雜記詩一帙見示廷敬受以讀作而言曰吾所為歎吾君吾相之用心者其在斯乎我公文學為海內宗師翰墨滿天下作為歌詩有専集行世今詩十五章耳山川厄塞土風民物所宜設險阻而振凋敝者悉發之登臨覽觀裴􅏆憑弔之深情夫密勿造膝之語豫小臣所不敢知而所可知者庶幾於是詩焉遇之於是益知我公之用其心於天下為尤厚也廷敬備員講席兼直起居上而乘輿出入典制詔令下及諸司百執事之敷陳獻替例得備書然日侍上御宫門但遙望見宰臣上奏事則斂身引避如不及使得循故事操尺簡濡筆直書其後於以揚君相之美而傳之無窮顧不為一代盛事哉而惜乎公之用其心於天下者僅於是詩焉遇之也是時閣臣奏事起居官不侍今典制釐然備矣合肥李相國詩序昔吳季子觀樂於魯工為歌詩其於十三國風俗之美惡及文武以降政治之得失季子皆能辨之若身際其世目擊其事者而當時詩人偶觸於中形諸諷詠或不自覺其所由然也記曰聲音之道與政通子輿氏謂誦詩讀書必先論世國風之有正變二雅之有盛衰豈作者哀樂之情有所偏毗於其間哉亦時為之也順治之十有五年嵗在戊戌今相國李公與余同登孫君承恩榜及祕書之選二人者又相同也歷今上御極前後四十餘年聖天子武烈有不戰之功文教有從欲之化當是時萬邦咸寧百職就理儒臣載筆出入禁廷如公與余者親見德化之成日覩文明之象或休沐少暇則置酒論文賦詩見志以鳴愈快今相國之詩具在其為歌功頌德者什之二三其與余贈貽唱和者亦什居一二自古作者多矣有唐以來獨推李杜然其困躓流離已甚其詩多厄窮憂世之詞以例三百篇列之變風變雅可也今李公位尊燮理沐浴至治之光華發為詩歌鼓吹兩間之和氣譬之於樂叩鐘擊玉絃匏雅頌諸什陳衛之趨數哀思閭巷之折楊皇荂雖欲干其律吕而不可得則夫際文武極盛之時而兼李杜二公之手筆者非公其誰與歸公詩經為經史子為緯而組織之以性情四言典雅淵秀深造吉甫之清風彭澤之逸韻也五七言古以少陵排宕之才運昌黎摩詰之筆五七近體格律精嚴神韻灑落在王杜伯仲間斷句緣情綺靡似竹枝一唱三歎似樂府此固各臻其極者若其取材之浩博則如觀滄海入珠宫珍貝陸離光怪眯目其筆力之沉著如巨靈擘山獅子搏象其摹寫景物則山水煙雲花鳥變態盡入爐錘如大冶賦形渾然天成而無刻畫之迹若此者溯流尋源直追騷雅牢籠漢魏陶鑄宋唐實集百家之大成允為一代之宗匠矣設有知音如季札者我朝主臣一德之風以及公生平光明俊偉之概皆將於詩乎識之天下後世不乏讀書尚論者定以余言為不誣也萊蕪張先生遺詩序敬生始齔齒解為詩又五年應童子試於潞州光祿公為諸生父子皆試於學使者學使者萊蕪張公問知余能詩獨不試詩試五經義立就曰吾以子冠諸童子光祿公在髙等食廪餼而伯氏長公是年以經魁於鄉於時父子並受知於公而公遇之皆有恩意故余自束髮迄於今老矣每念公遇我厚樂稱道公之賢以愧世之名為師弟子者雖然敬豈敢阿其所好哉公為學使者清公能知人為當時第一士為公所知者皆至大官公去數十年及公殁稱之有感思泣下者蓋公之清不名一錢名錢豈得為學使者豈得為凡為吏者是誠無可竒况不足以為公竒而余稱之者以習俗之所難也而且不怵於上官不奪於豪貴其公也尤人之所難也其知人也則失於余而猶靦顔忝為大官其勝余者或以功名或以道德而講學巖隱垂名册書甚衆將必有傳於後余不忍廣為諛以負公故皆略而弗道焉公既以直道違時卒用是受譴於上官故曰習俗之所難也公去官之日布袍蕭然䇿騎而返過吾邑吾追送公於野店之傍公怡然無幾微不豫之色苐曰子勉之矣千秋事業一日榮名失得在人取舍在巳子擇而為之余泣以拜受命今依依逆旅贈處之言余蓋有愧於公也敬後荏苒入仕公一就視於京師别去數年而歿公為鄉先生貧老嗜學以化其鄉人間為詩自娛公以正學自任沿流溯源晰河津餘姚之微嚴考亭象山之辨晚年造詣尤深與鄉人處遊雩浴沂吟風弄月鄉之人莫之能識也公所學者大而難舉况以余之不學負公之知人而欲強顔以為之辭其不可也明甚自念始以詩聞於公無寧取公之詩而諷誦之以畢余之思乎因就其裔孫嵩求公詩嵩曰公不樂以詩名詩成皆緣手散去固求之得如干篇伏而讀之皆非公之至者因復自恨余寡陋湮塞皓首無成既不能推明公學使有聞於斯世尚欲因公文章之一體敘而傳之使後之有志於斯文者知余以詩受知公而不以詩負公則余之終始於公者不惟以詩而即詩猶可考而知也乃公之詩少有存者幸而存之又非其至者然則天之有意於斯文其然耶其未然耶因又謂嵩天果未喪斯文也子必求而得之辛已正陽月受業門人陳廷敬拜手敬書張子潛詩序余年弱冠在翰林是時故司冦東谷白公在位以耆儒長德賓接後進研鑽文學余摳衣捧手侍公相見促數公每稱吾邦邑之賢以相淬礪余蓋始知陽城有詩人張子潛其人云公嘗語余子潛初困厄鬻豆腐於市中無書籍筆札從鄰人借得書流觀掩卷不更尋誦若夙生所記手畫心溫精魂奔會當其得意茅店孤燈蟻輪馬磨蹢躅行吟甕牖堵牆歌聲出金石市兒俗子莫不鬨笑已而又言老人愛其門前芝草鹿麋田之句故别字之曰麋田後五年余休沐而歸求觀其詩如登海估之舶如入五都之市珠璣犀貝無有不具姑以其所為業推類而喻之如玉禾之露而淡旨圓潔也如蘭肴珍饌齊和華錯而氣馨色腴崑山之脯元圃之葅讓其濡潤豐美也逮求其人而迢乎遼乎不可即也後二十年餘余倦遊而歸子潛擔簦負笈見余於樊川之上而詩愈益工蓋不以余之流離世故思雜風塵而猶謂其可比於知言之數也乃子潛歸而經涉旬月袖其新詩盈卷自名曰喜見吟者過以視余余受簡疾讀分隂移晷膝席絮語歎其法備味永芳外惠中有加曩昔至所云喜見者非他人則余也夫余也何足以當之往者曹郎鄭君見黃公梨洲而悅之名其集曰寒村見黃藳自序陳後山年三十有一見黃豫州盡棄其學而學焉寒村子見梨洲亦年三十有一遂以見黃自名其集黃公遺老宿儒唱道於浙東寒村子之以名其文也非直以其文之謂也余白首廢學而子潛亦華顛窮老方負其雋辭麗句以見余為喜誠出而交遊天下之士如黃公其人者見其所未見其所為喜當益有進焉雖然余嘉其志不以為愧而樂道之為喜見吟序石塢山房詩序汪子鈍翁以文章名天下天下所稱賢豪之士爭慕與之遊而鈍翁意所不可不肯茍隨其所可者必其人之果賢者也居堯峰十年絶迹州府四方大夫士多就之者幸而被其容接聆其言論而歸莫不爽然若有所失充然若有所得焉及其嘗所與遊去為逹官貴人雖欲一望其音塵而渺然不可得也孔子曰不得中行而與之必也狂狷乎若鈍翁則孔子所謂狷者矣堯峰之麓曰石塢王子咸中築室讀書其間與鈍翁所居為鄰輒相與登臨晏息乎塢中席文石酌芳泉攬山川之勝概舒贈答之雅懷柴門村徑晨往而夕歸於是鈍翁既為石塢山房記又數賦詩以歌詠之咸中合其前後所得若干篇書於册且以博徴海內之能為詩者而以自鳴獨得與鈍翁遊有如此也則其人之果為賢者不槩可見與或曰鈍翁之於人也可者與之不可者拒之似隘而不𢎞矣夫狷者有所不為孔子有取焉茍不察其人之賢否隨世俗為毁譽而又因以私於其人則是以聖人之言為不足信而使鄉願之説足以惑天下也咸中曰善請書以為石塢山房詩序轉蓬集序夫人有取於物苟可以寓其耳目泄其心思服習之不厭樂其中而有以自得焉雖世之可慕好而宜以為樂者不以加於其心其所見若此而止耳夫苟以寓耳目泄心思以為樂而忘其宜可慕好者非樂之至也然而不能強其所不見者姑以是為樂焉而已今夫塵羮土飯木胾童子取之以為戲當其戲也樂之不厭長者以謂塵羮土飯木胾也語之曰此不足戲童子其肯信之嘗試與之齊以蘭梅調以滑甘炮生切脯滋芬完兼則以是為適然而不足以戲何者其所見若彼故所樂者在彼而不在此也吾少而樂乎詩大抵所樂固其所見者而不能強其所不見者後得馬君玉坡與之論詩然後知嚮者塵羮土飯木胾之類果不足以戲而不可以為樂也别玉坡數年玉坡詩益工而余於詩廢且不為嗚呼吾嚮者所見在吾之詩童子之塵羮土飯木胾也既而所見在玉坡之詩故又以為長者蘭梅之齊滑甘之調生脯而滋芬也過童子所見矣今者所見不惟在吾之詩與玉坡之詩意者太羮玄酒天下之至味存焉蓋將求其宜慕好而可以為至樂者焉雖然今之所見既異於昔安知後之所見不又有異於今者耶願與玉坡深思而極論之而姑記其説以為轉蓬集序嵗寒吟序余性不能多接物比年間居顧復喜賓客去年赴召嵗晚嚴裝與家人别獨與客數輩俱既至數日而嵗除為治具延客上坐燒燈灑酒以為客歡酒數行客皆低佪感慨羇旅别離之思見於顔色余亦因以不樂遂罷去改嵗數日江都殷子以其所為詩嵗寒吟十五章謁余讀未已驚曰異哉夫人之才之詩也悉召諸客使更番讀之每一客讀未終篇諸客從傍皆昻首拊掌大快嘯咏稱善皆曰異哉不圖詩之至此極也讀既已命酒觴客且曉之曰客亦知遇不遇之有道乎夫殷子居於外五年矣以其雄才藻思奔逸陵轢於詞場意得神王無羇旅别離之感若忘其身之為客者而至曜靈縱轡光流景急感時節之易邁慨青序之復來於是始窮幽情殫微緒發作於清言麗句之間以視客之辭家匝月更一嵗除輒有無聊之感者意度不侔矣且夫殷子天下士也遊光揚聲如以寶珍陳於五都之市公卿大夫過焉猶且忽而不察而况乎幽遐之質藴璞之玉所從與遊如僕者又碌碌不足比數之人欲早自振拔於窮巷席門之中一不遇則廢然思返何其過也雖然以殷子之才且賢彼固必有遇也客姑學殷子之學學如殷子其亦無患乎不遇也矣於是客皆喜而酌盡醉大樂而後罷明日且授其語於簡會殷子介吾友左司農王先生問序於余王先生旦晚且登用將有進賢用士之責者為書其與客遊處之言以告之且塞殷子之請焉海寧查布衣詩序海寧布衣查君諱容字韜荒一字漸江有文名聞於世歿數年余始得誦其詩余嘗論士必有直方特立卓犖不羈之行其心之所存語言之所發始能不茍同於流俗而後之誦其書者雖千百世之逺猶邈然想見其為人此文之所以可傳也豈不繫乎其人哉若君者於吾心有所感焉君少時應童子試於有司𨽻止君搜檢君大怒曰朝廷以取天下之賢士而有司以不肖待之遂拂衣徑去不試以布衣終君生有異稟讀書經目輒不忘於書無所不讀所讀書皆能誦説之論古今成敗人物臧否制度因革地形險易明晳如指諸掌如懸河㵼溜滚滚不窮也顧獨喜飲酒世嘗譏其使酒罵坐然遇人無貴賤皆盡其歡其心所不欲雖貴人不以屑其意以故貴人咸嚴憚之而卒不敢有所加於君嗚乎此豈可易及者與而人或謂其肆志輕世以明髙過矣又其甚者或茍得偷合以希一日之虛聲咸指目君為異物而其時安貧樂義之士嗜詩書慕林藪不為得失利害動其心者皆感興於緒論被服於流風君之力亦不為不多也君吾既不得見今讀君之詩邈然如見其人焉此君之文所以可傳也聲山君宗也曰盍不書是語以為君詩之序余曰諾為點定其詩而書之篇首云吳元朗詩集序於乎此吾元朗之遺詩也元朗以藐諸孤承先人之緒修其家學詩名盛於一時而戊辰對䇿萬言超然獨異豫時讀其文廷中曰此必吾元朗也當魁天下已而竟弗得後豫在户曹元朗為郎官以其暇日得與論詩豫嘗謂元朗古人有言聲畫之美者無如文文之精者無如詩夫文以載道詩獨不然乎自昔宋初學者祧少陵而宗義山雖以歐陽公之賢猶捨杜而學韓歐陽公詩不逮文固無可論然亦豈非以韓詩之為尤近於道與近世詩人多學白香山香山之詩視義山為優然當時之人已有議之者而杜牧之為特甚則其弗幾乎道者不為時所重而傳之後世得無流弊也不其難與二子豫之鄉人也豫不敢諱言之昔有吳中巨公自負攬文章之柄一日謂豫人不學杜詩斯可矣豫心識其言之非而未有以應也今吾子生長吳中才俊之區能不狃於鄉人之見取其近於道者去其不近於道者此子之詩所以見重於時也元朗以豫言之不謬故時時與豫論詩今元朗已矣此豫之所為悼歎過時而不能自已也先是豫在內閣元朗以曹郎考選科道官上顧問廷敬此數人中有素知者否廷敬奏言吳璟有文詩名最甚是日試奏議元朗果第一授給事中進都給事中亡何以宴會細故落職上惜其才命修書於殿廷及分書得書畫譜豫在內廷又復得典勘其文同時被命者侍郎孫君樹峯中丞宋君堅齋學士王君麓臺給諌王君耳溪皆雅重元朗雖以諸公搜羅編撰之勤而元朗尤晝考夕稽㸐脂繼晷殫精積瘁為書百卷將呈進而遭太夫人大故以歸歸而卒以孝死嗚呼使假之以年其進於道而有為於世當必有大過於今者蓋天之生材亦難矣松棟柏梁不待百年而斤斧尋焉或芝蘭當户鋤而去之天之意固若此與抑亦其人之為之與此豫所裴􅏆悼歎而不能解者也元朗卒之明年友人徐子葆光將輯其遺詩而問序於豫是以追憶與元朗平昔論文之言敘其仕進退處之大略如此若元朗之詩之卓然名世而必傳於後者則天下自有公論也故不復詳著云史蕉飲過江詩集序比在直廬上遣中使傳問今之詩人孰與爾等比今或未然其後可冀有成者為誰悉以聞維時以綸音優異惶恐幾不能對有頃乃言今之大官才士皆為上所深知臣皆弗能如後進之士臣交遊絶少以今所慬而知者則翰林史某周某其人也蓋桐野之詩其始聞於韓慕廬宗伯而蕉飲則惠然貺我以篇章者也豫以才小任重退居深念蕭然閉門不能盡交天下之賢豪至如二子者或聞而知之或惠然貺我以篇章則固豫所欣然自慶樂從之遊將賴其劘切討論以自䇿勵使不至於耄老而無成者也夫詩之為物發乎情止乎禮義其至者足以動天地而格神祗窮性命而明道德雖不能至然心竊嚮往焉豈不亦甚盛矣乎而終以窘陋少暇坐荒如此然二子果天下之賢豪間出者也桐野久在翰林而蕉飲改官給事中掌垣事今請急將歸維揚示我以前後所為詩洋洋乎風人雅頌之遺音矣其氣淵若本乎性也其言藹如約乎情也可以字句求而不可以字句盡也上嘗有是言矣賜廷敬詩序有曰清醇雅厚非積句纍字之學所能窺也於戲此風雅之本原詩人之極致廷敬何足以當之其惟吾蕉飲乎昔周之盛以文王周公之聖化行俗美其時名卿賢士賡揚雅頌播諸朝廟下至兔罝考槃之野人逸民莫不能詩太史采之順其音節被之管絃蓋詩之為教𢎞矣今者運值休明人思復古風人之遺未嘗不在兔罝考槃間也蕉飲歸而涉逵林探澗谷與野人逸民咏吟嘯歌以適其樂而豫且歸老於田間茅簷竹簟以其餘日引觴點筆遙為屬和用以忘老至之憂亦以見友朋遭際之隆皆上之明賜將永矢勿替焉而前所云窮性命而逹天人者於蕉飲乎望之豫老矣弗能幾及已讀書紀數略序極天下之至賾者莫如名物紀天下之至賾者莫如數自一名一物以至十百千萬之名物有時而盡自一數以至十百千萬之數用之至於不可勝窮夫一名一物各有本根至於數豈無所自始與蓋數之始至微渺矣而析之縷縷而不盡其變合之渾渾而莫窺其端近而日用飲食之末逺而家國天下之大原其始而要其終莫不有至理存焉知之坐照而無疑守之服膺而弗失適歸乎性命道德之極致焉數之時義大矣哉善言數者莫如易昔者聖人之作易也能知數之所自始而後能用數以作易易之數始於河圖自漢魏以來洎有宋儒者莫不推言之而卦爻之數始於河圖之中五蔑有能明著之者是以萬有一千五百二十之䇿加倍推之之法又往往支離而弗合言易數者既不知其數所自始則將無以驗之事物體之身心或僅漫視為卜筮之書余滋懼焉往因退居多暇玩索彌年於此恍然自覺有得嵗時流邁衰暮孤危欲就正世之有道君子而決擇所適從也有味哉宫中丞公之讀書以數紀書也豫覽之躍躍然有感於吾心焉謂其以數之為可貴也則必能求其數之所自始者矣公味道含經述作不倦上自金版玉匱之書旁及海外名山之籍逖訪遐稽其繫於數者紀之於册其數之所不繫者罔不穿穴采掇橫見側出於其間如編貝聨珠璨絢震耀蕩人心目其善用數也如此豫是以因讀公之書姑以向所得於易之言數者引其端以質於公若其精微之指則非親聆公之緒言固不能縷悉其萬一也方公之為是書也上視河駐蹕淮上公以所撰初卷及義例奏進上覽而嘉焉命以例編緝夫以學士大夫歸田野處道幽間而託篇翰與人主相上下可否此亦不世見之遭逄儒林之美談不朽之盛事不惟公一己之為榮而已也書成既進御問序於豫豫髦且老而益喜學易乃以其芒芒然慬若有所得者質於公自忘其􅌊燭之明不足語於白日之昭昭也不禁其逌然顧影而自笑矣畢亮四論訂歷科經義序畢先生亮四生同鄉初不相識及余有母之喪畢先生來弔來會葬久之往謁謝未至數里迷失路别使人瞷畢先生則身自耕於田要所使人留止其家與之坐而食以食畢先生無僮指其所食使人食皆身自食之且食且自飼其蠶日昳時至畢先生家則蓬藋滿門徑牛欄雞塒雜置堂下堂中則處其所自飼蠶肅客入其東一室流塵蔽凝畢先生擁篲襒席揖客而坐坐定視畢先生蓋冥然農家者流耳及相與語則談天衍雕龍奭炙轂過髠吾雖未見其人聞其語意者即畢先生其人其言是也畢先生家與農民最下者比所守甚危苦而家獨多藏書勝國君臣事迹典故文字關史家者尤多其他書皆世所不常見其議論磅礴澶漫汪洋恣肆旁紹曲托橫貫徑出指畫口道如瀛海汗瀾浩乎無垠而天光瑩晶也如蛟龍奮翔鱗爪開張而波騰雷動也如驅騏驥騕裊駕重車臨廣途停䇿委轡不終日而馳千里而駑馬顧望嘶鳴蹢躅遼乎其後也豫所信為其人其言者豈謂過與畢先生語不休豫亦歎息不能遽去畢先生飯我以脫粟酌我以流泉因留相與深語而後别居無何為書數千言以所輯録明以來制科之文數百篇抵豫皆手自抄寫旁詁夾注細書如繭絲牛毛每一人則敘其問學治行著述本未可以系之國籍屬之史乘皆所謂世不常見者近時館局編纂家其能有此乎不也畢先生曰藏之名山傳之其人吾之志也豫實慙非其人而悲畢先生之志惜其將老而無傳也為序夫訂交之所始而因以略著其得於畢先生之萬一者如此張氏合刻家藁序古之文近於古之制科之文故工之易今之文逺於今之制科之文故工之難此今之文所由以大逺於古之文與雖然文者載道之器道無古今文無古今也以今之制科之文論之所重者厥惟經義經者聖人之文而聖人之道載之之器也今夫人自少而長亦既服習其器矣其擬諸其心而出諸其言也猶未逺於聖人之道故古今取士之法由宋迄今更數百年其法不可變而經義卒不可廢夫古之將相公卿名當世而傳後祀者由三代漢唐以來何可勝數而自有經義其間將相公卿果皆可以名當世而傳後祀否耶雖不能盡然果猶及於古否耶若猶未及於古則無乃夫子所謂莫不飲食鮮能知味孟子所謂行不著習不察或明知之而故叛之者耶誠若是是豈文之咎哉使由今之文以求古之道安見古今人不相及也居晉之鄙陶唐有虞氏之遺風猶有存者故其人多君子長者而積學綴文之士亦往往而有而尤加意制科之文若故少司寇東山張公以名進士起家所歷官有聲望世所稱君子長者也其諸昆季攻制科之文合刻家藁而問序於豫豫非能為制科之文者烏足以序之因道古今制科之文之得失之故又以為士君子所以立志行身當求古人之所以為人以幾於道而不貴汲汲焉效今人之所以為文也太上感應篇集注序儒者之學以求誠也而誠貫乎學之終始傳曰不誠無物况學之大乎六籍皆勸善禁惡導吉避凶之書學者服習其文至於老死鮮有明於心而行於身者則亦不誠之故而已矣夫天之與人一誠之所為也故舉念而天監焉出言而天聽焉行事而天視焉禍福之報各以類應亦惟其誠而已孔子曰善不積不足以成名惡不積不足以滅身董子曰善惡之極乃與天地流通而往來相應夫善惡積之而至於極則誠矣誠安有不感感安有不應孟子曰至誠而不動者未之有也不誠未有能動者也動即感應之謂也古今言感應未有深切著明於此者也豫觀太上篇中既列善惡之目而於終篇則要之以語視行三者夫一日之間三者皆備可謂誠矣而又積之至於三年則誠之至矣􅍔福之應豈自外來乎夫無妄之福無妄之禍君子無所容心焉若夫致自已者正當取之以考其善與不善誠與不誠如是則禍福皆修身之助矣世之諱言之者竊以為過矣一日在內直見查淡逺宫詹手一編専視而貌肅若神明與俱者就而視之則感應篇集注不書撰人名氏其箋釋則先發明義理而後證以事實更引他説以暢之其文約而不漏詳而不雜切近而顯明用之警世動俗可以勉進於正而懲創其邪僻與六籍所載勸善禁惡導吉避凶之指無異焉而淡逺好之如此其誠由是道也暗室屋漏出王遊衍皆若旻天鬼神之降監其有禆於吾儒立誠之學者豈淺鮮哉余嘉是書之可以警世動俗也遂出資以付剞劂淡逺屬豫標其大指於簡端云筠廊二筆小引豫老而失學欲繼􅌊燭之勤而靈源翳塞明瞳昏如嘗竊自笑吞紙可以果腹食字可以飽蠧世即有之吾弗能巳然以結習驅使不能自休輒欲效海南宗人晨夕陳五經拜之兾以略識字於萬一者而匆匆塵坱中亦不暇以為以是之故凡以文字見遺者多至纍帙少至尺幅寸箋謹拜而受之雖不能卒業心竊敬愛嚮往焉牧仲先生見示筠廊二筆本天咫極民彜朝章國是前言往行具焉余獨能讀之終篇忘其老而倦也先生以學術為吏治兩開府於東南所至事集民和以其暇益覃精古學著書滿家筠廊筆其一也今兹晉冡卿總百官任大事繁而誦詩讀書為文章益不衰此余之所以尤愛敬而嚮往焉者也先生方以聖主眷遇之隆出其胸中萬卷書盡展底藴以贊襄太平無疆之大業而余且優遊卒嵗於山巔水涯得先生所為筠廊之三筆及四五筆而未已者坐卧讀之拋午枕之書飽殘年之飯樂而忘憂不知其老之至也則豫所得於先生者不其多哉施鴻臚對菊思親圖引日居燕市寥寥如無人莊生所謂逃空谷而喜聞人足音者余兹有焉燕市四逹九逵日昃朝夕之聚十萬家自公卿百僚下至傭販皂𨽻狗屠者流唱騶呌歡塞於道踵相接肩相摩也而曰寥寥無人曰空谷不太過矣哉顧余所謂無人非真無人也無至余門之人也謂之空谷奚過乎余有幽憂之疾性又好餌草木藥物之味時時獨求醫於市中庶幾遇其人焉故與吾逰者醫之外無人焉耳矣醫又輒難其人既而得鴻臚施君培菊與之逰稍久吾之所謂其人者其施君與吾私怪施君何以字培菊曰先人好菊吾親之所好謹識不忘云爾而能畫者為寫其形曰對菊思親圖培菊以一物之微不忘其親之所好將孺慕之終身焉此其所志為何如也培菊又言始吾里中陳生雲客善畫人貌與吾父逰吾父之存也貌不及畫殁時雲客逰滇南使它畫工畫終不肖心恨之其後客有詩畫吾像者輒辭謝去曰吾父像未有畫吾何以吾像為久之雲客歸自謂能追畫吾父蓋昔雲客與吾父以奕逰甚習也至是雲客閉一室靜坐曰取碁枰來狀若對奕者居七日夜每夜深乃開户相接語畫卒不成竊謂雲客欺我乎明日從壁空中私窺之枰上有像焉驚失聲曰是吾父矣其時老僕先入户見之拜伏地及吾趨入諦視之無不肖也大哭淚湧血出殷紅漬枰紙且哭且拜又轉而拜雲客蓋自是吾父始有畫像矣夫然後敢請畫吾像及菊語巳泣謂余得夫子一言可以永吾思矣夫畫像細故耳培菊既鄭重之宜其不忘其親之所好也况其有大於畫像者哉况其有大於所好之菊者哉吾故樂觀此圖而識其事以見吾之所取於人與人之至於吾門者皆非苟然者也培菊名庭銓常州無錫人自其先世有詩書禮樂之習而兼為醫至培菊十四世矣而有科目者七世世之為科舉之學者多矣或數世而無其遇焉培菊之世顯者之多如此則其為醫之道亦可知也夫乾明寺修葺募疏澤州西北隅可寒山者澗谷幽窅流泉出焉其間有寺曰乾明唐天祐十四年創修由是迄明代加葺理今則棟折榱崩風日穿漏圖像顛墜僧徒散奔余過而慨焉昔郡人裴公騫碑記寺故唐未避兵地也𨽻澤晉城縣建興鄉砂城里七幹管義興邑都維那劉紹輩居之二十餘年兵定即其處興造臺殿以報佛恩考天祐前二十年所則僖昭之際也戈鋋蜂湧禍亂叢生宦者強藩煽災肆虐昭義一軍孤懸域外而梁晉紛紛夾河爭戰及其後也汴人夾寨之營馬牢之戰烽煙所屆遺壘竄墟近在耕壠室家婦子何得一晌安眠所謂避兵而兵定者亦聊爾其言而已耳不知當時鋒鏑餘魂朝梁暮晉其何以為生也且又安得此餘間出其物資以事營建與迄於今千有餘年撫其遺迹感興廢之無端忽須臾而往古世運屢變陵谷依然此邦之人生齒繁興耕食鑿飲樂太平無事之時而溯洄上世念其先祖栖草萊庇風雨恟懼掉眩於兵革鬭亂之間者豈不以此為極樂淨土而彼為鬼國灰場此為瑞日祥雲和風甘澍而彼為刀塗血路熱鐡鑊湯也哉然昔也當彼原野蕭條白骨如莽之日猶能斬荒刈穢飛樓涌閣變現於空無而今日者蒙業而居優遊於化日光天之下曾不能以財施法施補弊修墜使成迹舊觀泯焉淪替將復為荒榛衰草童山頽谷也其亦可悲憫而愧恧也夫余里居之始僧來告曰環山前後而居者無慮數十村落長者耆艾有德之士率其子弟炷香作禮發願重修思得居士一言以為之勸其時比嵗旱凶民艱於食余不敢遽為詞以請也兹年榖小登春雨頻降僧復來促居士不言將沮衆念余不復能辭因略敘其興造之時代而致歎於始作之易善繼之難諸父老子弟果有意於斯乎固不必以余言為勸竊懼其以余言之不逹於辭而沮也吾父老子弟擇可而行之毋毁前模毋飾後觀量力稱心毋拂毋怠以底厥成有永其休其尚善圖之哉海會寺石堰募疏余每嵗冬春之交煮粥於海會之東偏玉鵲菴者三月以食原野道途之人時至其處身自經紀其事自玉鵲迤邐而西平沙曠土度可百畝杖藜獨步遙陟寺門流泉滸滸適出百畝之上若疏瀹而挹注之資其灌溉皆可為沮澤沃壤也而乃皆在荒沙蔓草斷溪亂石中詰其所以若此者蓋傍皆臨河方冬水涸見為空野夏秋水至故為河道失流激急沙草漂流茫洋漫澶其勢可以盡百畝而吞之是以耕者謹避焉且夫將以廣田先須培土一難也田成河衝與無田同二難也不有隄防其曷克田三難也以此三難是以鬱為平沙間為曠土廢置於溪流石磧之間者今且將千年矣余低徊彌望浩然而歎於時寺僧言昔者故冢宰藐山張公嘗有意於斯矣輟而弗興今公既嵗輸金錢設糜濟衆曷不捐資築堰堰成而田然後陂山通道舉鍤引渠永作耕畲蔚為水耨嵗以所贏粟為粥資其德不更多與余曰唯唯獨善不若與人請與衆共之蓋此邦之民亦既苦矣環邑數百里山多地少沙多土少石多水少今數百里之髙山有數百畝平陸不可謂非幸矣而將纍土引水築防以其三少搆此三難余何力之與有與衆共之亦其勢也且吾見今留心民事者往往言西北水利近吾邑者惟沁水水既汙下地皆墝塉仰髙無所得水利兹寺之流泉如建瓴寫瓶泱然出地上而不能為地用則豈盡無水與水下之咎哉水利之興肇於魏史起引漳水溉鄴田起之言曰漳水在鄴傍西門豹不知用是不智也乃吾聞昔者張公所見與今同非前之人盡知之不及也或者其力有待於衆與沿門持鉢雖釋子之事則然而將興事以濟人則余曷忍辭焉昔起又以漳水不溉鄴田二百畝當行田百畝謂之惡田今儻因衆之力以為善田聖朝方以飬民墾荒為政田既善而賦以正供民牧人長舉斯義以行之為益溥哉午亭文編卷三十七
