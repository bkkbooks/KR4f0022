body:
  text: 午亭文編卷四十一大學士陳廷敬撰傳太子太保兵部尚書總督江南江西諡清端于公傳公諱成龍字北溟永寧人先世仕明者諱坦有聲𢎞治朝官至大中丞父時煌里中稱長者明末盜起西疆里中築堡于公先壠傍形家者言堡成不利于氏公笑曰我里千家保聚獨我家不利害少而利多堡當築矣堡成卒無害公生而才智絶人攻場屋應舉之文中崇禎已卯副榜入國朝仕為羅城令羅城秦桂林地故多瘴癘又猺獞頑黠不可治仕或自罷去公喟然曰荒徼皆吾民土惟國家所使人生仕宦豈擇險易哉且羅城可遂無官耶單裝徑往羅城無城郭廬室居人數家公廨在叢篁深箐間披草木入得微徑插籬棘為門牖虎嘯猿擲白晝行庭中陽陽穿壞壁去公即庭中纍土為几案其傍置爨一釜一盂炊烟併日召吏民來前從容問所苦喻以急公敬上之義申令行事吏民皆鳥言咿嚶與之語心耳遼絶公解析譬曉神色愷易良久皆欣然拱聽既去則據案讀書以數錢貰惡酒獨酌醉則隱几而卧或竟日不冠履既數月吏民樂公坦懷益樂就當是時西粵數叛服羅城民皆竄山谷而猺獞與大姓相仇殺民既失業則阻險為盜他令或飾威規利民益疑畏不敢前公至則悉除諸禁拊循殘氓誠意憐惻感人人皆自至以田賦親輸公手或留數錢置案上公問何意曰阿耶不要火耗不謀衣食寧酒亦不買耶公感其意為留數錢計得酒一壺而止民益親愛因與朝夕問地方利害悉得其要領編置保甲約束猺民盜皆屏跡先是鄰猺殺掠我人畜嵗二三至以為常至是鼓勒鄉勇將進搗其巢猺大震懼自誓不敢犯界上歸所掠人畜夫然後民得安居盡力於耕稼之事矣每春時命兩猺舁竹兜行田野中見力耕者輒呼與語相勞苦民知公來皆率婦子環公羅拜或坐樹下與飲食笑語歡如家人嘉其勤而穫者愧其惰者荒蕪者民大勸悔􅕗穗被野牛羊滿山公以其暇日增陴浚隍招民入居新築室者公手書題額或門聯以示奬異立學宫教民其中能讀書應舉者免徭役民俗輯和獨數大姓者負勢不為下其人皆號總戎侯伯嘗指揮長吏恣為殘慝公曰此曹向皆倚恃猺獞盜賊為之爪牙一逆其心則立致亂變是故他令多匿意阿忍之今吾威令已行民服禮教此曹可令終不悛耶會一大姓執其僮豫公屬致之死公訊當與杖視之已杖矣因怒謂爾既歸之官則有朝廷法在何得先自擅刑藐官蔑法乎叱之跪將杖下之獄大姓大恐叩頭謝死罪移時始得免公乃為陳順逆禍福之理遂大感悟自是數大姓皆奉法以公事至者望籬門股栗項縮無復跳踉桀驁於公庭之上者矣三年政成臺使者敕粵中令以羅城為法公乃牒上寬征徭疏鹺引諸利弊所宜興罷者行之民愛敬如父母焉公自來羅城從僕皆散去二僕病不能去旋亦皆死羅人憐公每晨夕視問安否間斂金錢跪進云知阿耶苦我曹供些少鹽米費耳公笑謝曰我一人何須如許物可持歸易甘㫖奉汝父母一如我受也衆怏怏持去居數年家人來羅人則大喜奔譁庭中言阿耶人來好將物安家去又進金錢如初公又笑謝曰此去我家六千里單人攜資適為纍耳麾使去衆皆伏泣公亦泣卒不受丙午秋試辦事外簾公布袍數浣破被如鐵一蒼頭從衆簾官皆美服盛飾傔從姣好公衣敝垢藍縷諸吏人皆指目揶揄之大吏夙聞公名指衣敝垢藍縷者曰必羅城令也諸吏人皆相顧愕眙於是大吏委公以試事使専督之事無不精當者因與極論時事所宜及古今成敗是非得失之跡公掀髯抵掌詞氣激昻語有倫要大吏甚器重之交章舉公卓異在羅城七年遷知合州公復牒十事上幕府皆為公行之去羅城羅人遮道呼號公今去我儕無天矣追送數百里哭而還一眇者獨留不去公問故曰民習星卜度公槖中資不能及千里民技猶可資以行也公感其意因不遣去會霪雨資盡竟賴其力得達合州州領三縣合計才遺黎百餘人正賦十四兩而供役繁重不支官有騶從之費公盡除習弊畜一羸馬以家僕自隨府帖下取魚公曰民脂膏竭矣無憐而問者顧乃欲漁吾魚吾安所得魚乎卒不與府中魚因極陳荒殘疾困狀郡守笑謝為裁革十餘事公念合州民多流亡往時新歸流户便即力役而墾田既熟土著訟而爭之以故集者復散公皆為區畫田廬牛種官立案籍復三年而後同新集者既知田業可恃為已有而復無征發倉卒之憂逺近悅赴旬月之間户以千計未幾用前卓異遷黃州同知分鎮岐亭岐亭當黃麻偏界地多汊湖幽壑盜所窟巢時急盜案官文法頗繁長吏至諱忌不欲聞盜盜反持長吏所忌白晝行劫莫敢何問公捕得九人集諸父老謂之曰此皆巨盜彼恃捕後上解則牽制官吏長短往往得脫今以示諸父老有能保後不為盜者吾將貰之否則盡吾法諸父老願以身保者二人立命鋃鐺駢首繫七賊即諸父老前為坑坑之盜自是驚匿嘗草笠蹇驢微行村堡以周訪山川要害閭里之情僞貰大盜責以捕盜自贖捕輒得無脫者四方來謁者無貴賤皆接以恩禮延問利病咨訪人物是以所興舉悉中人情黃州境壤蒸蒸樂土矣攝漢陽黃安通城事皆先絶火耗飭保甲所至輒著異跡操守益自危苦惡衣疏食以圖民之急巡撫張朝珍雅重之特以卓異聞會滇逆亂作檄攝武昌事問禦亂之䇿公對以安人心莫先停徴求時朝珍草疏欲奏公意與合以故凡兵事皆倚公以辦公悉意擘畫羽書交馳師旅雲集軍資億萬皆咄嗟而具惡少憑依禁旅罔敢指問公立置之法白大將軍申明軍令甲士十餘萬擁公忿譁公不為動詞譬理解神色抗厲知公不可奪皆徐斂去或諜得武昌大姓與賊交通指藏器仗為證朝珍欲發兵捕而召公公言自烽警以來武黃諸巨家多盡室避兵良子湖中家人藏兵械以備他盜耳若遽加兵人人恐矣跡之果無他公之鎮定知大體多此類也用卓異遷知建寧朝珍奏改武昌時逆賊陷嶽州長沙我師進𠞰取道蒲圻朝珍檄公往造軍所渡橋賊鋒迫近蒲圻人潰驚城郭為墟公入城嚴斥􅕤戢逃兵招集居人城以不墮通我師嶽長之徑旬日成橋山水暴漲橋復壞公以此去職會東山亂作朝珍謂公極知君勞苦然非公莫可辦賊公曰聞命矣夫公知遇最深敢辭艱乎但黃州東連廬皖北接光固據三省形勝控制七十二寨其人剽悍善鬭阻險跳梁難以猝勝若公見委須便宜行事方敢受命朝珍大喜自起酌公曰君肯任事吾無憂矣𠞰撫一以聽君需兵幾何公曰賊衆我寡兵多適資亂以前守蒲圻數人與俱足矣遂嚴裝以行初東山之亂也妖人黃金龍詭言得天書寶劍來往興寧山中煽惑愚民匿跡黃麻劉君孚家君孚黠猾多智數收召亡命亦數數能禽獲盜賊守令多其能每撫而用之公鎮岐時君孚亦嘗居門下後得滇逆僞劄遂與金龍潛結河南江西諸渠魁私立將帥衆號十萬約以七月起事會有人欲發之君孚恐事泄遂以五月望反於曹家河黃守將王宗臣率所部兵駐興福寺麻城令屈振竒率鄉勇駐白杲約日進攻君孚夜遣七騎斫黃將營鄉勇亦自潰退保麻城賊勢甚張而諸盜所在益蜂起公行次陽邏偵知君孚雖反以衆未合猶豫持兩端遂兼程抵白杲距賊十里止宿榜示脅從者自首免罪誣陷者即赴訴過三日以從賊論於是投訴者日千計公皆宥之賊勢大孤君孚及其黨素服公恩信聞公來皆莫有鬬志欲即降恐見誅惟擁衆自固公度君孚倉猝反其衆未聚可就撫若旬日黨合則難圖矣遂命白杲鄉約一人持檄往布太守來待以不死之意度已至賊所公則獨騎一黑騾一蓋一鑼與二人徑趨賊寨未至二里許命鳴鑼前導者行呼太守來救爾山中人君孚不虞公自來倉皇匿後山令數百鳥鎗弩矢夾道伏望見公皆燃火控弦擬向公公不顧直前賊亦卒不敢發至寨門門開公入舍下騾即㕔中坐衆賊環列其黠者率衆羅拜公問老奴安在老奴君孚也以舊居麾下故易昵之衆云暫出頃可至矣又姁姁問今嵗山中雨暘禾稼若何若良民何作賊取屠戮耶時酷熱若父母妻子匿何所得無苦乎衆皆泣公曰熱甚須少憩令賊為脫鞾取水飲或支榻揮扇餘四圍牆立公熟睡鼾聲如雷賊驚異不知何為移時寤又謾罵君孚老奴何為久不出豈有客至不設酒脯者君孚初意公必以兵來且懼見紿故深自匿及見公推誠無猜趨出叩頭訴所以激變故公為開陳利害順逆許以招撫約日而還至日盡降其衆數千人黃麻數縣皆解嚴朝珍上其事於朝再命公知武昌朝珍檄公留麻城公親歷村落度地形所宜分立區保籍其區之有勇力若火藥兵械者為烟民以慤者長之曰遇警而集蹤跡疑者區長白逐之容隱者同罪於是前與君孚金龍潛結為賊者皆𨽻烟民樂為用秋七月經畫有緒行還武昌當是時金龍留君孚所君孚既無所用金龍因縱之逃與紙棚河賊鄒君申合公次岐亭移檄東南區長得二千人率門下諸生數人督兵進討駐望花山君申初謂公已還武昌今忽聞以兵來大驚退保山寨公䇿賊新反未穫食少利速戰而我兵驟集攻之不如困之乃分軍軍其三面度賊走必徑黃岡馬鞍山故不守而隂伏兵嶮􅀈間君申金龍果糧絶夜走馬鞍山遇伏盡禽公坐山上受俘金龍縛急欲以妖術遁公手劍叱之術不得施遂斬其首捷至武昌朝珍持露布示寮屬曰人謂我不應用醉漢今定何如公酒無量嘗為簾官與大吏抵掌論事時觴公公飲輒數十巨觥露幘揎袖酡顔瞋目而語吏人皆竊笑公酒狂及往東山或以為言故朝珍云然也疏聞晉級八月調守黃州時荆嶽兵事急公外輸供億內靖奸宄郡壤以寧十月江西賊犯湖口旁掠興寧蘄州戒嚴又滇逆密布僞劄書湖北地復大亂陳鼎業合逃兵掠驛馬反陽邏何士榮反永寧鄉劉啓業反石陂周鐵爪鮑世庸反白水畈各擁衆數千人號稱十萬遙連湖口寧州諸賊約以十月上旬取黃州遂及武昌漢陽髙山大湖烽火相望城門皆晝閉墟里寂無人各鎮援兵悉隨大軍進攻湖南黃州餘吏民才數百人至不能備閽柝議者欲棄黃州退保麻城公曰黃州為湖北七郡門户我師屯荆嶽者數十萬水陸轉運取道於此且瀕江而城控制阻險前倚興寧廬阜後壓天堂金剛諸寨實東南關鍵釋此不守則荆嶽有狼顧之虞七郡成瓦解之勢所繫非僅一城已也吾誓死不能去此然吾坐困以待不若相機進𠞰猶可僥幸以圖存賊勢雖衆皆取士榮進止若先破士榮餘可不戰而下於是徴各區鄉勇又分守山隘令逃民不得入合賊别遣黃岡令李經政攻鼎業禽其父子陽邏平十一月二日率諸生及吏卒二十二人前進時千夫長百夫長李茂升羅登雲吳之蘭以所部來會各區長讀公檄皆感憤灑泣厲鄉勇以同仇之義漸次輻輳得二千人於是立什伍標旗幟號令明整卒如素習部署甫定諜報士榮已據黃土坳公遣登雲偕武舉張尚聖以偏師往偵自率大隊遂發七日尚聖等遇賊前鋒與戰賊小卻公疾馳抵尚聖營衆見公來歡譟請賞公無以應惟用言語意氣拊循慰勞衆感泣氣益增下舂鄉勇大集有衆五千人屯箔金寨下與賊對壘八日黎明士榮賊數萬自牧馬崖分東西兩路夾攻我師賊皆手揮紅雜色旗照耀山野公著舊絨衣匹馬仗劍當營門立見東路賊少命登雲率千人禦之自以大軍當其西命尚聖攻右之蘭攻左公衝其中堅戰甫合之蘭中鎗死賊鬭益急炮火如爆豆著處皆穿左右勸公盍少避公叱之曰今吾死日也敢言退者斬我軍見之蘭死又被傷者衆少卻而箔金寨後民素為賊誘見我軍卻鼓掌歡譁袖出小紅旗相摩麾公見勢益急鞭馬徑前回顧茂升曰我死可歸報張公茂升恐失公急發一矢翦其大旗我軍少進茂升馬被創倒茂升步射殺二人鎗洞衷甲乘他馬以進短兵相接復手刃數人而尚聖自右山繞出賊後我軍急擊盡搴其旗賊遂大敗士榮手長矛殿後左臂斷猶力戰陷泥中遂被禽登雲擊賊東亦追奔數十里是役也斬馘數千山谷填溢溪水盡赤獲軍資器械無算檻送士榮於朝珍公得賊名籍立焚之衆心以安乘勝進至呂王城茂升等欲少息公曰白水石陂諸賊本以士榮為盟主今士榮既禽諸賊膽落捲甲疾趨將自崩解所謂破竹之勢不可失也若淹留晷刻賊據險致死矣時諸營才午炊公命盡覆其釡以進據鞍草檄有能禽賊來獻者重賞投誠者待以不死脅從而歸者但閉門坐家無軍器者即從賊概不追問身無鄉勇印號家藏兵仗即良民亦誅死於是衆賊聞士榮禽既大悔懼及得檄書又知毁其名籍一時解散略盡師至白水畈鐵爪世庸等尚有親兵數百人欲保什子寨公已先令人守隘不得上脫身走君孚十一日軍定惠寺遣追盡禽之而石陂等賊亦皆平公駐黃市撫戢軍民東山大定散各路鄉勇歸農勒石黃市旗亭間班師而還自出軍至是僅二十四日以鄉民數千破賊數萬不費公家粒粟不煩師旅徒手奮身摧鋒陷堅而奏膚功此近世所希有也當此時荆門嶽湖燧火相望對壘連疆耕戎交跡內患既消邉圉孔固公之功在天下而不在一隅矣十四年春湖南兵久不解公于征斂轉輸重紓民力而行間所需物用器什文檄橫飛旁午絡繹公皆躬自購造不假胥吏省民費以千萬計嚴飭屬邑禁羡耗絶私派懲誣告杜饋遺以其隙招致文學之士講論經學興起廢墜人若無兵秋大饑發廩賑恤廣募輸積嚴冬冒雪計口受賑全活數萬人十五年水旱洊臻訛言復起公謂人心易搖宜示以暇豫與為鎮靜修治赤壁亭榭日與文武寮吏嘯咏飲射其間士民相與慶曰我公如此吾屬何憂又以祕計禽詰奸細撫定凶黨流釁頓息會丁繼母李夫人憂士民數萬人伏撫軍轅門號咷請留制撫亦心知公不可去疏請奪情公勉起視事十六年制撫以蘄州上接荆武下臨潯吳南連大冶興國東鄰宿松太湖水陸要區奏復江防道以公為之三奏而報可公規復沿江墩戍繕治戰艦練習水師計禽僞官渠盜江境肅然十七年遷福建按察使士民請留不得朝珍曰公去失吾所憑公條便宜十餘事乘五兩小舟蕭然去楚去之日蘄黃及旁郡人沿岸遮送至九江者數萬哭聲與江濤相亂公亦垂泣不忍視十八年春抵閩時耿精忠亂新定海寇犯漳泉四郡連數嵗用兵徴役煩苦又數起大獄繫滿囹圄每一卷牘罹重辟者輒至數十百人獄皆已具公視之怛然謂民命所關寧以獄既成而可不慎乎時以親王主兵事語聞王令公會滿漢大臣覆録公言通海數案所牽引半皆平民遂白王釋不問或有持輕重兩可公已盡得其狀侃侃面折不為屈指庭下婦人孺子曰此曹皆何辜乃攖斧鑕皇天在上人命至重吾誓不能緘阿從事王久聞公名至是愈益傾折每疑案子公専訊讞決明允所生全以千計其久繫得白貧不能歸者皆給資遣還淹滯為之一空逆亂時多掠浙東江右子女及後投誠沒為奴婢老弱轉棄溝中僵尸相屬公設法勸募贖之歸籍小兒女不能歸者養之署中積數千百人計滿一舟則給口食歸其父母親戚公退食羣兒皆環繞膝前爭索果餌喧歡以為笑樂初占匿者猶衆至是皆顧化多自遣還者矣為臬司官吏懾服閩俗翕然一變未及朞遷布政使閩地久駐兵重資民力莝夫月計數萬公白王軍人芻牧本有常役今民困方殷矧忍橫派悉索耶力爭請免或謂非所職何自苦為公曰設兵以為民無民設兵何為調停者復議改折公爭之益力王卒是公言向所科莝夫數萬一日盡皆罷去民既樂公德愛而凡軍中所需乃益趨事恐後八郡正供及江浙協餉不下數百萬皆司庫收公大書揭庭中命皆應時收正項外不增銖黍即令原解官役計項支撥略無虧纍署中薪米不給至無衣可典或終日一食隨征滿漢大臣朝使者有時來過徑入卧內或繞署閒行曲房阿閣無不歷覽几案間蛛絲鼠跡一竹笥貯朝服一釜備炊爨文卷書冊數十束此外都無一物咸歎曰于公清苦天下第一也外畨貢舶或有所獻公悉屏斥或呈樣香一嗅即持還去貢使皆囓指作禮謂譯使云天朝洪福我儕實未見此清官也將軍制撫交章論薦舉卓異十九年春開府畿內去閩亦如前去楚時也駐節上谷郡邑吏望風爭自濯磨求稱公意會旱步禱時雨大沛禾麥重岐三穗民號曰于公穗立保甲申約束緝劇盜懲豪强政大修舉所條上利病興除前後數十事皆朝上夕報可語在奏疏中不具載二十年春督理孝昭皇后梓宫前詣山陵過闕請陛見上久知公清忠著有勳勞聞公入見念其年老不勝步命侍衛持席於午門中令少坐公拜謝坐少頃入見賜食並內帑金天間馬御書手卷及御製詩一章既數日山陵還過闕又賜鞍馬一匹蓋自是隆禮異恩不可殫紀是年冬請歸葬母夫人得俞㫖數日命總督江南江西單騎孤裝如赴羅城時方公之節制兩江也初被命即已亷得陋習數十事比至則揭之通衢數翦除豪吏大猾隱蠧舊弊神明洞察如親至目覩墨吏日數十驚出見白髯偉軀長者輒膽落謂為公微行公亦數微行以實之檄郡邑條具便宜皆為興舉郡邑吏無不畏愛趨令南中風俗素侈麗厚自奉美服游冶聞公來公私皆爭衣布褐布褐價騰貴而賤綺縠文繡公知人心漸即於善遂専用德化誨導之凡文議爰書皆手自批勘第其甲乙以示褒貶自雞鳴至夜分不休寢食為廢或勸之少息輒曰吾非不知食少事繁養生所忌第吾受國厚恩兩江官吏多至千百何可盡劾耶所以為此者冀其見聞知警歸於亷慎吾雖盡瘁國家所得不已多乎性善飲至是纍月不一醉嘗中夜苦飢索少米作糜不得遂笑而起視事達旦時上下貺遺都絶端午日遣視寮吏無敢以黍角諸節物相饋者童孺攜金錢過市門交易而退無敢欺吏民安恬有歌笑而無管絃有醉飽而無羞錯商旅輻輳關市流通每一令出父老扶觀有讀之垂涕者公之清嚴忠直勤勞國家利濟民生者大較如此二十三年春被命巡海還護理安徽江蘇兩巡撫印四月十八日晨起視事未出户疾作召諸司語不及家事端坐而逝至夜漏四十刻坐不敧倚顔色如生年六十有八將軍都統寮吏來至寢室皆見牀頭敝笥中惟綈袍一襲靴帶二事堂後瓦瓮米數斛鹽豉數器而已無不慟哭失聲士民男女無少長皆巷哭罷市持香楮錢日至者數萬人下至菜傭負販色目番僧亦伏地哭盡哀公鞫獄多所平反銜恩者皆設位於家至是皆奉以來櫬歸士民數萬人步二十里外伏地哭江干江水聲如不聞公之得吏民之心江寧人謂數百年來無能如此者士民立祠於清涼山如黃州之赤壁云訃聞於朝天子震悼祭恤有加已而上東巡還謂內閣九卿詹事科道曰國家澄叙官方首重亷吏其治行最著者尤當優加異數以示褒揚故江南江西總督于成龍操守端嚴始終如一朕巡幸江南延訪吏治博採輿評咸稱居官清正為今古第一亷吏應加褒恤為內外大小臣工勸其詳加議恤具聞於是集議加太子太保諡清端廕一子入監讀書蓋上於公禮意盛隆初終罔替由公以來士之以風節著者皆知慕效公則豈獨公之為幸也與公剛介沈毅彊力多智正直自持不少回曲而臨事決機應變無方蓋其誠與才合識與力并故所至能集大勳而著令名焉初東山亂時劉君孚為逋逃主黨羽甚衆公欲用其力而實患之會黃金龍就禽公亟典衣分俸得百金賞之衆皆不平謂君孚匿金龍何反被賞公曰金龍之禽實由君孚密計君等不知耳其黨以為然又見君孚果得百金不讓於是益疑君孚實賣金龍其黨各稍稍散去而公又因以縱間離其親屬君孚計益窮遂鬱鬱以死其坑七盜也其魁初以盜降為游徼每進見公輒賜酒肉慰勞之曰吾深知汝能汝為吾盡心禽盜吾貰罪旌汝一日又見賜之酒問羣盜數名魁唯唯不盡言因復飲之竟醉矣出公微服伺之魁意得甚與其徒大飲肆中出槖中籍歷指其名别其勤惰狡拙公悉覩聽之明日召魁盛賜之酒食遂益歡恃無所忌復大醉放意盡言諸盜狀公曰吾聞汝槖中有籍可取視否匿不肯出摉得之大小盜名皆具公因謂若此行不可立於人世矣宜速歸曰小人從公復何歸公曰汝歸黃壤耳乃惶懼言死自其分幸與母訣不許取篋中俸金一兩俾寄其母立斃之公自得其籍按以緝盜無不得者公嘗曰人命至重上天好生自非精察確訊若寃殺一人便應以命償之故多徒步獨行或䇿蹇疾驅雜田夫旅人中偵聽野籬村店樵牧童叟之語以是疑情細事無不如犀燃燭照遣使往察事人亦不敢欺也而往往蹙額哀矜多所減宥一日逮一盜盜觳觫甚公曰吾知汝已改行矣汝傳語若黨改行與否官必知之賞誅隨之矣賜以酒食放歸一竊者公訊之曰汝竊也未至死汝所知某某皆巨盜罪應死然能自新吾亦赦之今釋汝歸語若輩羣盜聞之皆大畏斂跡一營辨餽餉軍前其弟無賴子也久客歸而是夜盡失其餉遂執弟歸之官弟不勝拷掠因誣服株引平日交游市井惡少十餘人問其贓皆云用已盡獄具公適以江防來謁巡撫偶舉此事公曰無贓則案終疑且數千金何得遽盡乎巡撫曰吾固疑之今以屬君公承命祕其事不發越二日引衆囚至略訊即釋去復巡撫曰江夏盜案無一人實者問囚安在公曰盡釋之矣巡撫大驚恚公曰囚被刑已極若再訊即恐立斃誠不忍其無罪就死且上讞須得真盜留此屬何所用之巡撫問真盜安在公指撫軍帳下一校曰盜主家也縛以付公公曰衆盜數日可盡致也既數日果皆就縛贓在校家封識如故巡撫問公何術能爾公笑謝而已他如此類皆神變不可測閩囚數十人當斬公察知其枉白王王下其事獄詞六七返不決公度此終不得即脫即取囚出坐之階下與飲食去桎梏凡囚臨刑給食脫械衆囚謂即死皆相對啼呼忽聞傳語寃已白令歸復業乃驚喜不自持狂叫叩頭出血時滿漢吏方有事至公署亦感激雨泣自是羅織之風少衰當事聞囚已盡釋亦無以奪之也公之緝盜惟善用人所蓄游徼及降盜恆撫以恩威四方有盜此數人皆得來先白公帶間繫一布夾袋得盜名即投其中自劇賊偷兒蹤跡畢具探袋中名勾捕無不得開府時袋已敝左右請去之公曰此袋昔貯盜今以貯酷墨吏未可去也公自言人見我發奸摘伏疑有他術不知皆古人成法第因時宜行以誠心求耳公每論事輒稱曰上帝式臨或曰天鑒在兹蓋往往夢寐與神明通故其斷獄制事亦若神有相之者公既苦節好施豫每聽斷時民有當償人錢物力不能則倒囊代之償嵗饑得俸多少悉施與不顧已罄矣惟一騾公所出入騎者鬻之得十金施一刻而盡公日食粗糲年飢更甚舉家食粥以少米為之雜以黍炒糠令微焦屑之粥垂熟入糠屑其中客至亦出此粥勸令依此法為食冀得存餘蓄以濟飢者客皆不能堪為公强食之有膏粱子不下咽公謂之曰貧苦士之常富貴人之幸今民不飽糠籺而汝忍獨飫肥甘乎若不節食及人吾罰汝賑飢矣時人謡曰要得清亷分數足惟學于公食糠粥公在岐亭公子來省及行署中有一醃鴨割其半與之時人有半鴨于公之謡先是公每晨市豆腐二斤許故又謡云于公豆腐量太狹長公臨歸割半鴨半鴨于公過夜錢五釐酒價何處拈蓋公飲酒每夜以半壺為準楚酒半壺價五釐故云爾公軀幹修偉紅頰隆準美髭髯精神炯炯四映平居與人交不擇貴賤談宴終日略不拘忌及當大事若羣議會讞有所可否雖王公大人不為少貶性極慈易而御物整嚴賓客故人有時過存蔬食菜羹言娓娓不倦或當歡笑一語涉私即正色斥詰諸吏望公威若負霜雪及論說籌咨輒霽顔商確務盡事理以是雖見嚴憚愈益親樂之其喜怒哀樂本乎天性得乎學力如此公嘗語人曰人當惜福為子孫留餘地布衣蔬飯享受無窮膏粱紈綺實不解有何可戀凡公話言文字單詞斷紙皆可以感人心挽習尚不悉載載其與友人荆雪濤書書言羅城事略曰廣西栁州羅城偏在山隅土司環繞山如劍排水如湯沸蠻烟瘴雨北人居此生還者什不一二土民有猺獞狑狼之種帶刀執鎗性好鬭殺父子兄弟反目操戈恬不知怪順治十六年冬初入版籍成龍以十八年之官選授後親者不以為親故者不以為故行李蕭條次清源同年生王君吉人所其人慷慨好義反覆開譬謂粵西非吉祥地夙知成龍家食尚可自給勸之勿往成龍時年四十五矣然英氣有餘私心自度古人利不苟趨害不苟避之義何為也俯首不答王亦默知其意揮淚别去抵舍别母及妻兒典鬻田屋得百金攜蒼頭五人頗勇壯可資瀕行族屬老稚相餞歡飲至夜扶醉就枕而天已曙矣大兒廷翼為諸生已久猶謹朴如處子以田産文劵歷歷付之但命之云我為官不管汝汝作人莫想我而已拜别先祠不覺腸斷門內外但聞哭聲不復回顧此時壯氣直可吞猺獞而餐烟瘴也行及湖南冷水灘卧病顛連扶掖陸行至桂林謁上官見羸體伶仃驚憫特異皆勸以善調治勿亟赴羅城抱疴之人至是膽落往日豪氣不知消磨何所矣病幾危苦孽未盡不速死及栁州稍瘥尚不知羅城在何許也羅城與融縣沙鞏連界行至沙鞏遇鄉老細詢之乃知對山即是羅境登山一望蒿草滿目無人行徑繞山都似營壘陳場瘴雲慘淡苦霧凄迷回憶同年生之忠告不置也入縣中居民僅六家宿漢夀亭侯廟支牀周桓侯背後永夜不成寐明日到縣庭無門垣草屋三間東斷為賓館西斷為書吏舍中闢一門入亦屋三間內廨支茆穿漏四無牆壁鬱從中來病不自持一卧月餘從僕環向而泣了無生氣張目一視各不相顧無如咎孽未盡死而弗死乞歸無路扶病理事立意修善以回天意凡有陋弊清察釐革自以分死一官而已命不殞纍及僕從黃瘦如壁畫隂鬼相對而泣莫能救無幾何一僕死餘僕皆病成龍自忖一官落魄復何恨諸僕無罪何苦貽纍叮嚀令各逃生一僕蘇朝卿仗義大言若今生當死於此去亦不得活棄主人流落他鄉即生亦何為餘僕掉頭不顧當時通詳邉荒久反之地一官一僕難以理事乞賜生歸當事者置之一笑而已無何蘇僕亦死其年逃僕歸家大兒續覔四僕來而三僕又前後皆死止存一僕晝夜號咷如風魔欲遣之則一人難以遠行且此僕歸則孑身更苦無奈其思歸日切遂聽其浩然長往萬里惟餘一身生死莫能自主夜枕刀卧牀頭樹二鎗以自防然思為民興利除害囊無一物猺獞雖頑無可取之資亦無可殺之仇也事到萬不得已時只須勉强為之申明保甲不得帶刀攜鎗咸遵無犯間有截路傷命無蹤盜情必務緝獲隱昧情事盡心推詳必得真實立時誅戮懸首郊野漸次人心信服地方寧靜而上官採訪真確於是有大事招擬解省小事即行處決之通行羅城雖安而地與栁州西鄉接境其人祖孫父子生長為賊申明當事輒以盜案為艱置之髙閣竊自思漸不可長身為民父母而可使子弟罹殃咎乎約集鄉民練兵親督𠞰殺椎牛盟誓合力攻擊先發牌修路刻日進攻此未奉委命而擅兵自揣功成亦在不赦之條矣但奮不顧身為民而死勝於瘴病而死也渠魁俯首乞恩講和虜掠男女牛畜皆送還仍約每年十月犒賞牛酒敢有侵我境者竟行𠞰滅蓋獞人不畏殺惟以剝皮為號令而鄰盜漸息至是上官採訪更確反厭各州縣之請兵不已報盜不休為多事也嗣後官民親睦或三日或六日環集問安如家人父子言及家信杳絶悲痛如切已膚土謡云武陽岡三年必一反比及三年甚憂之蓋人既和謡不驗矣又云三年一小𠞰五年一大𠞰比及五年又復無事而民俗婚喪之事亦皆行之以禮感之以情羅城之治如斯而已自數年來本非為功名富貴計止欲生歸故里日二食或日一食讀書堂上坐睡堂上毛頭赤腳無復官長體夜酒一壺直錢四文無下酒物亦不用箸快讀唐詩寫俚語痛哭流涕並不知杯中之為酒為淚也回思同僚諸人死亡無一得脫興言及此能不寒心赴蜀之日益勵前操至死不變此數年之大概也偶書寄以發知已萬里一慨余昔過上谷公自言一生得力在令羅城蓋其淡泊之操堅危之節始卒不渝老而彌厲者已預定於此故余獨載此書以見公之志焉余見公時當公巡撫京畿逆旅深夜執余手而語有知已之言蓋康熙二十年冬十月也後七年公孫户部郎中準從余游得公傳略及軼事雜文攬掇而為此傳陳廷敬曰異時吾陽城楊公繼宗天下稱清白吏所首指名者也豫為史官時陽城田侍御在京師京師一老嫗往來侍御家間嘗讕語云某不愛錢豈楊繼宗耶楊公去嫗時三百二十年餘矣而嫗能稱說之蓋當時名聞天下後世婦人女子猶皆習聞其名而尊美焉凡為士者可不嚮慕乎哉豫感嫗言而心識之其後與衛文清公周祚魏敏果公象樞布政畢公振姬數公者遊數公天下之所謂亷吏也皆晉人在陽城二三百里間夫天下清白吏不易得而為世所指名者乃獨多在於晉可謂盛矣乃今又得于公于公之清操偉烈章章如是千百年下必有如老嫗之稱楊公者可無以余文為也獨是余公之鄉人也既多賢人之迭出於其鄉而又嘗職在史官親見聞公之行事廢名臣之烈湮鄉先生之蹟咎莫重焉故次叙之傳曰髙山仰止景行行止雖不能至然心嚮往之余生賢人之鄉而志其操行亦將以為取斯也午亭文編卷四十一
