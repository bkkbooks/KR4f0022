body:
  text: 午亭文編卷五大學士陳廷敬撰古體詩立夏氣始至贈湯潛菴司空立夏氣始至晝日昏昏然嵗月真白駒悔吝成華顛歎恨晚學道欲老今衰顔先生玉潤姿眸子瞭且妍修辭寡則要妙理無支繁物我通冥悟沖和相盤旋對之心融釋追往徒險艱景光不肯留此日足可憐别後三數晨示我以文篇浩浩河江流漭漭星宿源聖路久充塞百家翻狂瀾誰能芟淫詖默識天無言遊心墳索外斂精羲皇前誓將奮遲暮矯厲思孤鶱瀛臺進講贈孫屺瞻學士歷歷河上柳宛宛城邊路夜短雞始號月出天已曙驅馬瀛臺門神居渺煙霧玉繩低繚垣金波耿回渡屢修獨對辭一邀重瞳顧湖州真天人秀眉心膽露上闡羲軒文下晰王霸務至尊時霽顔鄙儒謬學步荷風翻縹緗爐香裊章句終恐徒冰兢感激愧恩遇忽復秋風涼疏雨滴瑶樹破屋行贈葉子吉侍講破屋不任葺四壁空嵯峨夜半風雨至屋漏成洪河漂搖增繁憂夏秋連滂沱崩騰奪視聽耳目被傾邪詎惟錯昏晝實恐隂陽訛重茅卷驚湍餘花委回波空梁燕雀飛蝙蝠伺其窠禽鳥飢為身所見理則那黃鵠翅翎溼亦如嬰虞羅悲鳴欲有訴翻懼彈射加逼側南巷士移居近西家書籍正捆載瓶罍亦紛拏君如遷喬鶯我如槃室蝸破屋雨不止壓覆將如何感君有同患寫意於詩歌御府藏翰歌時賢上御乾清宫召臣賜觀名法書越日臣為詩以獻聖皇稽古典制作覃敷文命流荒朔玉榻引近親儒臣縹緗羅列探祕閣書法無過王右軍淋漓寶墨今尚存龍跳虎卧在眼底置身鳳闕當天門草聖昔時誰獨步漢有張芝唐懷素長沙自言得三昧快筆風飇與神遇平原大節何嶙峋端人正士儼垂紳世人學書工側媚塗飾形貌無其真五代以來推趙宋眉山作勢看飛動大海紫瀾波濤雄琅玕碧樹枝柯重米家書畫滿載船字迹逸宕尤爭妍近來董王皆自出翰墨風流天下傳考亭樂道亦遊藝縱橫妙得蒼史意頓挫盤蹙勢最竒行空天馬羣鴻戲其餘書者紛紛多承旨秀出誰能過東晉遺法宛猶在戈鋩波磔含沖和數卷蛟螭盤玉軸名家豪素藏天祿寶篋開封近御頻光華偏入重瞳目丹霄綈几罏煙浮宸章五色兼銀鈎神姿結搆世無比落筆萬象風雲收至尊宵衣偶揮灑敻絶天巧非人謀允惟睿聖超百辟生知好古而敏求中秋屺瞻送酒去年登樓風雨夜肺病不飲杯空把今年明月夜登樓有酒無病心何憂湖州學士猶記某遺以香醪可一斗開瓶傾寫清光來醉舞狂歌回白首卻憶西清風露涼殿門帷幄靜髙張影娥池畔金波月曾照擕書近御牀夜行逺樹啼荒雞秋城滴疏漏起坐夜方宴獨行念如舊寒沙草色微殘月人影瘦韶華去已逺朱顔不可又千載笑子雲投閣寧自救夜直懷屺瞻窈窕洞門夕持被入屏營周廬爛官燭列宿搖空明民碞近崇髙夜久宫漏清皎皎階月淨漠漠池水平羣居寡所諧獨處懷友生晨朝陪經席鬒髮添霜莖韋蘇州詩書後我觀韋公詩淡然生道心鮮食冰玉潔浩歌流清音疏絃下衆響繁手聲方淫誰能追大雅辭多吾所針昔遊贈衛慎之明府昔遊灤江上落日弭輕榜浪花映圜蘚魚泳出浮響薄雲邀旅宿孤霞駐清賞沙邊桃花村野徑散遙想君今鳴琴暇遺蹤一相訪秋夜凛凛天氣變冉冉時節違明星帶簷樹凄風吹荆扉秋夜何漫漫褰幃伺晨晞黃葉旦夕霣鴻雁東南飛萬彚思本根吾生亦何依運遷感物理時往悟世機空軒獨寤言穨然如委衣嵗暮崢嶸嵗華臨欲滿一如寸寸彎強弓十年往迹宛在眼艱難默數風中蓬流光衮衮奔輪裏暮景飛騰已如此有酒且飲酣且歌萬事無憂亦無喜天晴斜陽窗雪明紅梅蔫綿蕊半委何處紫芝與石髓濁醪此中有妙理世上紛紛焉足齒廳前水石怪石誰所作開池俯前窗其上想丘壑其下觀湖江輕風淡微波藻魚自擊撞颯然風雨至流聲亦淙淙念此一曲水不殊萬里瀧時節逼炎燠即物心屢降移居别庭前山石束書遊京國卉載無一椽僦居胭脂巷怪石羅堂前僻性寡朋侣對此情孤鶱落月偏曉勢斜日回逺煙春花不岑寂秋樹相連娟閉門長兀傲隱几舒沉綿有時因塵鞅芒角遭磨鐫兹石不改色專靜無尤愆蕭條别汝去况復當殘年回首風雪夜幽夢遙相憐流求刀歌為汪舟次作丈夫得志為雲龍摶服蛟兕羞雕蟲歸來畫笏奏天子寶刀拜獻明光宫餘者虎氣亦騰躍拔鞘漠漠生涼風滄波險絶窮髮東乘槎使者浮空濛圖書裝輕不滿篋碧花鐫錯青芙蓉含霞飲景霜鍔動方口斫地如渴虹麟角鸞趾詎所觸剸割暴猛蠲妖凶古強入山豺虎逸方平獨卧鬼物空豈似此刀光熊熊大食日本皆提封三金合冶紫煙重海日鼓槖波雲紅洮鴨緑石不受礪雪刃凌亂神鼇峰東方侏儒飽斗粟昔者賜出驚鳴鴻君方入侍禮遇崇身夾日月乘天風逺人脫贈意有以斷金切玉理則同沙場此物久不試來庭文齒兼穴胸禁中頗牧掞翰藻搖筆辟易千夫雄清晝造膝三數公英盼往往回重瞳男兒致身有如此况值威德兼黃農試看渭叟鼓刀者干戈載戢櫜強弓夏夜朱曦晝晷長入夜絶衆緣撫枕獨不寐危坐臨前軒自非蚤聞道奈此百感纒風埃苟不興水鏡良復然朗月生奇懷皎皎光輝妍易簡淡自足何為紛險艱以兹頗念世人誰金石堅問蝗行六月八日蝗暮飛紛如接翅昏鴉歸忽欺斜日夕影亂漸掩列宿寒芒稀汝曹璅璅行醜惡能令天宇沈晶輝昨者朝寧下明詔憂旱問蝗何因依公卿不語面平視或舉五事及細微某也昻首矯奮臆上言主聖臣職違下言小民吾根本三時勤苦終嵗飢長官鞭笞吏卒怒但向公府供輕肥夏秋稅糧分應爾緩之數月榖庶幾自知無有大裨補傳聞此語是耶非天心至仁諒無他涼雲吹雨蠲煩苛傾注四野蘇黍禾蝗欲下來愁奈何吾言不中理則那題禹尚基自寫真禹生靜者懷孤鶱搖筆風雨落屋椽雨收風止萬象寂海霞島日相澄鮮丹青好手衆所憐幽樹卷石皆娟娟水村之圖世最傳禁廬一見心悠然集賢學士共嗟賞瑣窗晴晝生雲煙生也此圖擬水村神妙意若無王孫更自寫真著蓑笠便欲漁釣歸柴門王孫遭時昔多故齒豁頭童不歸去丹青猶有身後名富貴真如草頭露生方年少豈長貧奮飛一舉陵髙旻録别二首皎皎明月光照我清夜牀欲寢不能寐攬衣起倣徨羇人思萬里各在天一方雙雙兩黃鵠中道陵寒霜羽翼一以乖河漢遙相望北風吹河梁明星隱歷歷悠悠征馬嘶驅車將安適白日照東隅黃沙掩行迹念我同袍人髙舉奮羽翮離顔如卉草霜露忽復易時節已晚暮窮賤竟何益出門十日懶出門萬事何叢殘事如風中花心如古井瀾飛花投墮水井瀾寂不起此語解書紳時行而時止浮山和敦復時在直廬我聞浮渡山欲往情蕭騷瑣窗閉晴晝寫興於歌謡嵒崿忽在眼飛薄如奔濤石罅粲可數一一穿青霄空靈駭澒洞倒側疑簸搖翏翏長風聲萬竅皆怒號中有千載雲出岫不可招蒸嵐自通透濺瀑巧適遭真宰工刻鏤無乃用意勞卓犖龍眠公嘯詠冠偶曹鳳鸞在巖廊猿鶴空林臯斐然繼有作聊足以自豪夏日遣興四首幽居卧青林白日不得晚語默失端倪情欲爭舒卷不如捨之遊寓目成登覽昔者古幽州平沙曠浩衍飛甍何參差引流亦宛澶此中英雄人朽骨疇可辨茫茫六合間人命何能逭誓從今日後悠哉謀獨善西日既隱山餘光樹顛明赤雲帶連岡綺霞散層城虛簷交微風當窗落青冥林景稍一動翛然煙磬聲寡欲性有託息慮身無營大雅久寂寞苦吟誰見榮勳名苟不立章句老此生依依見新月下照古時城古人對新月應如今人情列星初爛漫滅燭何杳冥河霧宿近樹竹煙羅前楹風鳴弦素響夜靜吹玉笙閲世樂幽獨外物身崢嶸有酒起自酌誰能關浮名我本蓬室士田牧東山椒山家間嵗月即事以自勞水碧日照色麥黃風翻濤西莊邀社酒東鄰饗炮羔遄歸方三載行遊違林臯中情異絶裾吾生希挂瓢解愛五千言日玩乾初爻志士陵鴻鵠小人爭牛毛遁世以無悶託興長消搖洞陽山我家太行盡處村蛟龍欲落留爪䀶蜿蜿腹背故隆起振鱗掉尾如雷奔波濤隱見吞萬壑似覽衆水窮河源古稱上黨天下脊兹山拔地尤騰鶱俯視砥柱一卷石析城王屋雙杯樽頗訝大禹所經畫足迹未到回南轅徑下河濟急疏瀹北顧參井髙莫捫乃知龍性躍天漢肯同蝘蜓尺水渾太行以南多峻山地勢愈下難並論兹山何不列嶽鎮使我歎息增煩寃何為歎息增煩寃萬古無害兹山尊開元鐘後唐李嗣昭守上黨勝梁範銅為鐘在開元寺後置元妙觀蒼茫陵谷開元寺古鐘猶帶開元字尋向桃花觀裏來鐘聲依舊浮空翠此鐘流傳自後唐誰與作者李昭義黃塵清水變須臾鬭雞小兒聊角戲昭義此時亦人傑屹立孤城下無地夾寨重雲鳥不飛余吾殘營白晝閉流矢拔足客不知血暗淋漓痛劈臂龍驤神捷等沙蟲銘以蒲牢毋失墜生子當如李亞子進通忠孝先王識我怪歐陽傳五代嗣昭特書多可紀當時亦有劉羲叟飄零頗恨文章躓今我來觀開元鐘與客談詠梁唐事更數百年歌者誰鐘聲未歇聞歎喟冬日雜詩四首雪後落照紅隂風黯中夕蕭條關塞情杳然生咫尺念我故鄉人同作他鄉客冰堅蛟龍深山長鳥獸寂戚戚傷精魂悠悠阻筋力寒鐙閉門時明月照促膝流風舞回雪飄颻盈客衣連雁去安極路逺何時歸含情掩房闥憂來不可揮觸物悔吝集觀身色相違逹人慎其端託想謝危機擁衾抱霜月四壁生清暉仙人王子晉霞舉陵太清緬想鍊金液呼吸獵至精所以緱氏嶺時聞吹玉笙逸響久歇絶誰聆空外聲徒令千載下寂寞傳其名少負英邁氣索居逃人羣偶然事詩書遣情遊天雲一自落世網昏宦相糾紛起舞擊短劍慷慨雞鳴晨流浪時忽徂三十無令聞空名竟何益心懷難重陳東岡獨遊亭午風日佳陟髙循前澗石古徑杳冥溪長水清淺巗中熏疏蘭汀曲蔭蒼蘚臺行既修迥樹坐乃幽緬挂蘿弱可捫落花多愁踐懷古事豈殊人往迹空顯依依楊柳華萋萋葛葉展時序催物情悠哉誰與遣東岡同子弟及張王二客樊川美風日羣遊陟東岡少長各異趣曹偶森成行張卿頗解事王郎興亦長子姓復朗拔矯矯凌雲翔伊余少欣悅頗怪鬢髮蒼叢祠晚雲薄哀歌何激昻遲暮賴陶寫此意成悲涼登髙望古城墟里煙微茫俯仰已今昔塵世鬱中腸寄言少俊人及時為樂方空山空山悽心魂中夜四五起憭栗天蚤寒悲風鳴不已六月草閣涼况乃秋節邇窗月炯殘明壁燈凝暮紫稚兒睡爛漫倦僕坐觸抵人生雖殊塗勞逸本一理念我徒自傷多憂應爾耳呼僮使之卧抱膝當隱几石閭晚眺山髙墟落出社鼓晚欲歇林隂暝色來村燈見復沒獨立聞虎風小步踏松月羣動又已息幽尋愧倉卒農人夜早眠鼾睡侵卧榻更多秋蟲聲仰枕兩耳聒誰與寫愁憂野宿寄傲兀返舍留三日復往石閭秋風前日來我亦薄言歸雞鳴發山館日髙到柴扉寄迹如飛鴻爪雪相因依一墮泥塗中膠擾森重圍算口計米鹽將老生事微兀兀困細瑣愁卧至夕暉開我所居室凝塵蔽敗幃拂拭愴孤懷坐念百事違明鐙飢鼠竄昏院蝙蝠飛妻子可脫屐身世真馽鞿吹笙憶子喬化鶴思令威感此捨之去聊用息吾機秋日往石閭捨策涉險艱窈窕窮清秋溪流沙徑細草長荒陂幽日髙臨往路亭午陟逺丘舊居渺蕞爾中有萬古憂返躬集悔吝閲世紛愆尤遁迹心逾危憫俗行且休遊戲采芝藥芳序忽已遒羡門不可即徐生入海求仙者良冥漠塵埃難久留何得奮翎翅遐舉凌滄洲思母菴夜雨空山夜雨秋浪浪危樓夢回衾簟涼我今獨來神黯傷千憂萬恨堆心腸雞鳴窗白雨不細睡鄉避人亦避世長松裊雲煙漲溪杳杳人蹤門晝閉隂黑睡起疑日中山前山後雨濛濛去家十里信不通山澗水滿岸路窮前日我來秋風凄今日欲歸秋雨迷人生聚散隔風雨蹇驢卧鳴僕誶語前日日晴不肯歸薪芻雨阻人驢飢樊川東岡寫懷二首伊昔少賤時志在泉石間髙步謝時輩遊射窮溪山隱遁事不集挾册謁帝關睨眴公卿側跌宕文史班歸來忽華髮壯日不可攀陟丘感舊迹照水羞故顔南山獨尚爾蒼翠橫煙鬟安得遂雲卧仙侣與往還謝客慕張邴乞身不待年嵇生愧嚴鄭樂道欲自全我無安石量而乏絲竹歡亦有東山遊仿佛臨斜川展步涉林澗忘疲恣躋攀且無念百嵗聊開一日顔凄風生巖壑暝色紛煙巒端居集遙慨息慮終閉關髙齋二首髙齋日已暝憭栗霜氣寒倚闌望逺道露下衣裳單入門復出門躊躇心未安委委池中荷萋萋窗下蘭及時媚榮景惜哉芳嵗闌北風日凄凄中堂明燈低北風不入户所居各東西隔河有言辭阻風莫致之雖不聞好音清芳夾路垂南樓夜歌日落闌干霜氣幽燈昏鐘鳴山寺樓書帷窗幔下已久天風新寒增暮愁鴻雁嗷嗷集中洲沙明月髙繁露流思君不見城南夜黃草白雲天盡頭東山亭子放歌東山望南山百里墮我前山亭橫絶浮空翠闌干縹眇臨無地我來氣與霜天髙風塵歸後寒蕭騷拂衣枕石每獨往垤蟻羣笑滄溟鼇百事回頭如舊否一片青山落吾手倦客重尋岡上廬童時舊種門前柳盡掃西風萬古愁且傾落日三杯酒君不見謝公髙卧東山時起為蒼生已白首昔時絲竹轉凄涼美人黃土今安有百年我亦一東山日夕樵歌動林藪譜牒後書側聞長老訓諸祖稱豪賢披籍閲往代歎息良復然誡詞炳星日志氣薄雲天處士及吏隱一一皆可傳淳休被邑里聲華如蟬聨緬維卜東莊始自宣德年耕稼三百載風義桑梓前小子恥甘肥食利忘所先惕然從中懼朂哉以無愆南樓見砥柱午壁亭西南有山亦名砥柱樓外砥柱山几席浮青空神禹所表置髙標天闕通王屋連析城秀色摩蒼穹登樓遙見之懷古心憂忡二崤秦壘滅三川晉國雄蠻觸紛鬭爭役役會有窮渺然想開闢元化觀無終題東坡先生集星宿渺一泉漭沆歸滄池黃河天上來仿佛青蓮詞杜韓鬱崩騰回風激瀧湄香山放乎海淡淡天無涯餘子導其流遙遙分纎支蘇公天上人萬丈銀河垂舉手捫星辰足踏龍與螭旋斡周四運浩氣森淋漓感心生直亮體道忘艱危聖刪三千篇劫火燒其遺真宰固有意風雅將在兹斯文配天命大化需人為何不陟輔相致民如堯時一聞韶濩音季葉還春熙道上逢張參首丈驅車越郊邑落日下馮軾豈不急歸思惜此輿臺力既夕煙霧生星月互相匿遲回大道傍感舊勞胸臆眷言更嵗華霜雪暗顔色對面始若疑聞聲乃歎息心懸秋浦西目斷黃雲北相逢逆旅間離别情何極九女臺北黑龍潭維南有金焦江間屹不動詎知砥柱東山起挾河縫河流兩沄沄此山磬而控其北皆連峰排拶故縱送陡崕臨數仞潭水鬱澒洞相傳是海眼仰口若大甕鬼工施鑿成人力匪所用俯視悸心魂危立仗傔從四山下驚風崩墜影與共取道青石叢出險衆聲哄此中龍潛棲禱雨屢則中古祠明月髙秋軒發幽夢囊中五絃琴改調一撫弄送韓六一僉憲赴桂林春明門外柳往往拂行裝疇昔攀柳時送人還故鄉故鄉今送人駕言適何方遙發天北隅軒車指南疆居人戀落日客子懷路長矯矯雙黃鵠陵風各分翔良無萬里翮何因附頡頏贈李翰之吾州隱君嘗樂飢一生髙視世不羇西崖古屋蓬蒿衰小亭晝閉春隂移我時徒步往見之顔色渥丹霜鬢滋年近九十心膽竒大書灑墨光淋漓短札細字如毫絲方瞳炯如巖電垂仙者縹眇髙莫追浮丘洪崖世難知吾徒縮手歸來時赤松黃石今可師偶觸懷故山道攬輿地圖適見嶽神字悲惻從中來澘然落寒淚此山天馬形浮空勢東至其陽宛回龍母阡鬱蒼翠兩載閲晨昏新松常守視悄悄巖谷間曾有萬端思嵗月何逾邁真如過隙駛臨别屢回頭欲去每停轡晝思勞逺魂夜念驚暫寐時忖所歷山或與此山類忽然覩名稱感觸心中事朔風含酸辛落日助怛悸恨不如飛鳥疾往有翎翅掩册神太傷孤征渺行騎登屯留城至龍潭登城秋氣變凄風屢增愁路逺一望鄉但見漳水流漳水南自去客行北未休寒雁相背發眇眇髙雲浮城荒悵籬落樹古驚潭湫小邑窮歷覽孤征獨夷猶立馬更延佇應知道阻修宿沁州懷吳銅川通政凌晨涉野流㟏岈入澗口林深長木魈堠古立土偶霜葉得紅梨風條惜黃柳嵗物森愴懷關山鬱回首地聞叔向賢村云徐績後舊迹渺猶存遺風嗇而厚懸崖人散居營窟老相守華榱及鼎肉蕭然此安有仁里銅川子潔清吾所友夙歡結同心離居念分手重為京雒遊然諾應無負獨覺感異方鄉心亂已久六賢堂下馬平潭驛訪古六賢堂滏陽政寬簡湧雲思煒煌趙尚書秉文堂即湧雲樓舊基趙有記文獻總文柄楊趙齊輩行楊文獻雲翼左司富才藻晚節猶芬芳元左司好問欒城老封龍鑑湖映末光李文正治四賢既卓犖堪此一瓣香後益以王吕名迹能禁當王司業構吕忠肅思誠山川景英哲祠宇成蒼涼士節古所重此道今凋傷荒城鬱茂草倚徙悲殘陽梅花用坡公次李公擇韻寒夜凛客心雞鳴車轂動節往如逝湍光景一玩弄稍惜幽窗梅著花破嚴凍天公憐寂寞物態競喧鬨飛霜點衣裘風埃暗騶從我生無町畦昔者每自縱山澤延四友竹徑從二仲息景棲東岡水石獲清貢冷梅坼冰雪析析柯屢重卧厭短簷日疏影雜禽哢有時但孤吟足供樵牧諷今是寧昔非當歡忍前痛光寵愧少俊鞍馬事上雍未招羅浮魂但惹春明夢何當十年計繞屋手溉種春風吹白日羲馭不得鞚别後綺窗前何人燈火共挂枝愛桐花蹲池怪老鳳得如黃葉山灑掃青螺洞待我花下歸白酒傾百甕午亭文編卷五
