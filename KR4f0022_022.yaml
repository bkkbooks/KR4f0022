body:
  text: 午亭文編巻二十二大學士陳廷敬撰襍著胡氏安國夏時冠周月辨胡氏傳曰左氏曰王周正月周人以建子為嵗首則冬十有一月是也前乎周者以丑為正其書始即位曰惟元祀十有二月則知月不易也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也愚按胡氏引左氏王周正月之説而論之曰周人以建子為嵗首則冬十有一月是也是明以周正月之説為是謂冬十一月為周正月矣而又曰前乎周者書元祀十有二月則知月不易也則是前乎周者未嘗改月至周始改其嵗首之月為正月也夫殷不改月而周始改月考之經傳未有明文胡氏之意亦殆不謂然也其意若以謂建子為嵗首耳未便以為正月也故下文曰冬十有一月是也然明引左氏王周正月之文矣而又㫁以為冬十有一月者不知胡氏之意進退何所據乎又曰後乎周者時不易胡氏之意非遂謂漢不易時而周獨易時也其意不過謂周不易時取漢以為證耳故下文曰建子非春亦明矣是胡氏不主改時之説也其又曰乃以夏時冠周月何哉云者是胡氏亦知周果改十一月為正月矣特未便以為春是周之正月乃夏之十一月仍為夏正之冬也孔子作春秋取春之一字加於周正月之上耳是胡氏之意也故下文又曰聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之驗於是而胡氏之誤更有不可勝言者矣夫周之月建子之月也建子非春胡氏自言之矣使周果不改時而孔子作春秋以建子非春之月强取春之一字加於其上此乃天時所不受稍知詩書識道理者將逆折其萌而不敢以為而牧兒芸叟婦人女子之所聞而恠笑者也曽謂孔子而為之乎行夏之時子有是言矣假使周而果不改時也則建子之月儼然冬也冬則正夏之時也夏之時曰冬孔子書之曰春是周本行夏之時而孔子乃變夏之時矣行夏之時者果當若是乎假使孔子之於春秋果寓行夏時之意而周果不改時也則建子之月必將直書之曰冬使後之人猶得有所考而正焉曰周之不改時如此也以子月為正月如此也其不若夏寅月之為正月如此也此所謂非行夏之時也後之人由此考正而行夏之時焉豈不亦甚明白矣乎而顧冬而書春曰吾欲行夏之時寧有是理乎又其論曰以夏時冠月垂法後世以周正紀事示無其位不敢自專假使孔子果以夏時冠月則亦何難以夏正紀事時可自專月獨不可自專乎夫春夏秋冬之時自正至十二之月以為可改則皆可改以為不可改則皆不可改也今改夏之冬為春曰將以垂法後世不改周之子月為十一月曰吾無其位不敢自專無其位而改冬為春冬必不可為春也不可為春者而悍然命之為春無其位者又敢自專如此乎且使後之人何所取法乎而謂以此垂法後世者其果何法之垂也書云王省惟嵗卿士惟月師尹惟日言以嵗月日之大小别王及卿士師尹之尊卑也今謂夫子改時不改月是敢於其大而不敢於其小也聖人豈有是乎至其謂夫子有聖徳無其位而改正朔夫正者正月朔者月朔也如胡氏説則正月亦夫子所改矣吾不知胡氏所謂正朔者果何所指也聖人之言語文章皆其光明正大之心其語顔子則正告以為邦之事其作春秋則直書以魯史之文魯史之文曰春王正月孔子書之亦何至如後儒支離剥割之見巧為新意於其間哉或有如胡氏之見者曰春秋天子之事也若魯史曰春王正月孔子書之曰春王正月夫人皆能之何必孔子乎何以為天子之事乎余應之曰所謂天子之事者天子有命徳討罪之權春秋有褒善貶惡之㫖顯其事使善惡昭然㣲其文故褒貶具在是所謂天子之事也是所謂春秋也事蹟之昭昭者尚不得而飾其詞以變易是非况年時月日之一定者哉若於年時月日巧為新意於其間以誣聖人其得罪聖人大矣吾不可以無辨春秋始隠公論粤自西周板蕩王轍東遷平王以來流離世故斯亦極矣眷言豐鎬有故國舊京之感焉此周家之一大變局也春秋托始於平王無可疑者陳氏𫝊良曰春秋非始於平王始於桓王也當平王之世魯隠之奉其弟軌宋穆之舍其子馮諸侯猶有讓千乗之國者也衛石碏晉九宗五正嘉父宋孔父之流猶知尊君親上也鄭莊公為卿士王貳於虢於是周鄭交惡隠之三年平王崩桓王即位四年而鄭始朝身為卿士而有志於叛王此春秋所以作也嘗試論之夫桓之於鄭孰與平之於申鄫而鄭之叛志孰與齊楚秦晉之强僣四年而朝孰與周鄭之交質繻葛自將之役孰與犬戎弑父之大變故謂春秋託始於桓王者是亦齊末之見矣孟子曰王者之迹熄而詩亡詩亡然後春秋作二雅絶於幽王平王之世詩下降於國風是所謂王者之迹熄也又何疑於春秋之託始與然則曷不始於平王之初年也趙氏鵬飛有言子嘗曰吾其為東周乎葢將興西周矣興西周之志不得行於時而寓於春秋則春秋者中興周室之書也又言平王之末政愈不綱天下之亂有加於前而中興無其人矣夫子於是憫悼衰世而作春秋也趙氏説雖善矣而未盡也余謂春秋之作始於隠公者隠公之元年當平王之季世隠公有讓國之心而遭篡弑之禍其父子君臣之際有臣子所難言者夫子垂典法於萬世明大戒於方來首記其事有㣲文顯志焉或曰祻基於惠而記始於隠者何也曰傷隠之賢而誅桓之篡也或又曰隠攝也桓宜為君者也宜為君者而誅其篡何也曰凡隠之立夫子許其為公不言其為攝攝經無明文也非攝而親遇弑焉其為篡也何疑乎是以劉氏敞曰讓則不攝攝則不讓而傳謂隠公攝是非其位而據之者也於王法所不得為於王法所不得為則桓之弑隠惡少減矣春秋不宜深絶之今以其深絶之知隠公乃讓也非攝也今以攝言隠公是不盡春秋之情也而榖梁子之論隠公也曰春秋貴義而不貴惠信道而不信邪孝子揚父之美不揚父之惡先君之欲與桓非正也邪也既勝其邪心以與隠矣己探先君之邪志而遂以與桓則是成父之惡也盖榖梁之論過甚矣昔者周之始興也泰伯之讓孔子賢之當春秋之世視泰伯之時何時也有能以讓而身䝉禍患猶刻責之追詬其所為曰探先君之邪志曰成父之惡使此人之隠衷大節既無以白於天下而世不復知讓為盛徳以篡奪為固然將隂以生亂臣賊子之心其何以勸善而懲惡也亦異乎君子成人之美矣且太王之欲傳位季歴亦可謂為邪志而季歴及昌亦可謂為成先君之惡者耶雖隠公之賢不及泰伯而惡亦未著春秋之作將以奬善戒惡耳惡者猶欲進之於善况非惡之尤著者乎惡未著而被之以成父之惡之名聖人與人之意度不出此故曰傷隠之賢誅桓之簒此夫子之微文顯志也或者謂春秋有書即位有不書即位隠不書即位者不成其為公也不成其為公是夫子不許之也曰是豈然與凡即位之例啖氏助言之陸氏淳誦説之余嘗求其義矣知隠之不即位有非例所得盡者而啖氏未能究其義也啖氏之言曰凡先君正終則嗣子踰年行即位禮榖梁云繼正即位也文成襄昭哀五公是此例也凡先君遇弑則嗣子廢即位之禮不忍行也榖梁云繼弑君不書即位正也莊閔僖三公是也凡繼弑君而行即位禮非也榖梁云桓公繼弑君而行即位則是與聞乎弑也公羊云宣公繼弑君而行即位其意也意欲為君故黨於賊而行即位左氏不達其意曲為其説而云莊公不言即位文姜出故也閔公不言即位亂故也僖公不言即位公出故也左氏云閔公弑後成季以僖公適邾共仲奔莒乃入立之公出復入不書諱故也言經中無僖公出入之文以得罪去國猶曰不忍父為他國所弑其情若何不舉其大而舉其細非通論也且三月文姜方孫何妨正月即位乎故知解莊公不言即位妄也國有危難豈妨行禮故知解閔公不言即位妄也若君出諱而不書昭公何以書乎假如實出亦當非時即位如定公也故知解僖公不言即位妄也按陸氏引啖子所稱繼正即位繼弑不即位之説當矣至其闢左氏所云莊閔僖之不即位辭尤辨而正也而獨於隠則猶因左氏公榖之説者余故以為未究其義也左氏云不書即位攝也而公羊以為何以不言即位成公意也公將平國而反之桓榖梁以為何以不言即位成公志也言君之不取為公也君之不取為公將以讓桓也愚以謂左氏言攝既與經違而公榖以為成公之意志云云者是公既即位而孔子削其事矣審如是則是夫子欲成隠讓國之心而隠實未得行即位之事不得行即位之事而即位焉是在隠初非欲讓者也烏在其為成其意志乎是以由左氏公榖之論而知啖氏之言猶未究其義也宜乎隠公讓國之賢未大著明於後世而遂失聖人所以作經之心矣故吾㫁以謂隠不書即位者隠自不行即位之禮耳夫子不得而書故夫子亦不得而削也及觀趙氏汸之論而有合焉趙氏有謂筞書之大體者曰行其禮則書不行其禮則不書此無待於筆削者吾無加損焉盖隠公之即位筞書之大體也其書於䇿則存而不削不書於䇿雖聖人不得而益之趙氏之説有以得乎聖人光明正大之心而不同乎谿刻詭僻之見宜其合於吾心也明乎此而後知隠之於桓讓也非攝也讓而弑之夫子是以傷其賢而誅其簒春秋之始紀隠公而善善惡惡之大義巳並行而不悖焉此其為聖經也與且夫吾之於春秋也恒體聖人善善長惡惡短之義而不敢有谿刻詭僻之見以冀無失聖人光明正大之心是以於隠公之事不敢有過求焉爾因叙春秋之所以始為論其義而辨之若夫求其義而不得妄生穿鑿如葉氏夢得所云天有十二月冕有十二旒服有十二章春秋紀十二公逆而推之至於隠公以成其數者是皆小見破道邪説亂經學者尤當以為戒也書錢氏春秋論後紅丸之案孫慎行引春秋許世子事直攻方從哲名之為弑魏大中繼之而其辭加甚矣錢氏遵王為春秋論自䟦其後曰進藥之獄余有猜焉進藥決之禁中閣臣不為藥主一也光宗寢疾彌留非以紅丸故奄棄萬國二也舍崔文昇而問李可灼三也榖梁子曰於趙盾見忠臣之至於許世子止見孝子之至儒者相沿服習以為精義執此以㫁斯獄則過也斯亦可謂原情之論者矣故其論曰引春秋之義㫁後世之獄是猶禁奸盗以結繩理文書以科斗欲以趙盾許世子止之獄辭傅本朝之律令不巳迂乎然於梃擊移宫之事則論曰春秋書曰夫人孫於齊左氏曰不稱姜氏絶不為親禮也夫人姜氏薨於夷齊人以歸夫人氏之喪至自齊公羊曰貶必於重者莫重乎其以喪至也何休曰刑人於市與衆棄之必於臣子集迎之時貶之所以明誅得其罪也吾夫子魯之臣子也於魯之二夫人大書特書無所忌諱耿育之所謂暴露私燕謗及山陵者吾夫子其戎首也哉夫夫人姜氏通於齊侯致有公子彭生之禍所謂罪大惡極凡為臣子不共戴天之仇也而吾夫子猶隠其辭而不斥言其事鄭貴妃之於神宗李選侍之於光宗可比姜氏之於桓公乎否也梃擊之於光宗移宫之於熹宗罪狀未明深文周内取淫慝凶亂之事同詆並譏是以春秋之獄辭傅光熹之律令也光宗阨於鄭氏終其世未嘗出一惡語可謂孝子仁人矣熹宗沖人闇弱始因臣下之煩言搆怨李氏至為手勅顯布外庭嗚呼薄矣而乃引耿育之言以為口實明之鄭李漢之趙昭儀其本末亦不齊矣而欲以此附春秋之義又庸有當乎盖常易其心而求三案之是非君子小人互有得失不有璫禍借三案以殺人則君子之所謂得者未必是小人之所謂失者未必非惟姦璫殺人則借三案而一時畏禍趨利之徒亦借三案以為縁於是乎君子小人之目判然如白黒之不可混淆而鄭李之罪惟恐其不明彰大著於天下是故成鄭李之罪者始於諸君子而終於魏忠賢也忠賢之亂政亦鄭李之不幸也而自諸君子發其端是可為痛惜也已余因覽錢氏之論而聊述其義後之君子其不以余之言為非而不惑於當時門戸黨朋者之説則千秋之是非得失必將覈其寔而無為徒狥其名矣古今易説易於六經最古遭秦燒書以卜筮獨得存最為完書最古而完而今所傳者特為淆亂視他經為甚焉樂既散亡二禮經晩出雖闕然幸不為後人所亂書得之孔子屋壁詩賴諷誦以存雖不無殘脱然考詩書之序或皆繫於篇末或自合為一篇其始皆不亂於正經書自孔安國詩自毛公始别序入經冠之篇首朱子除其序各合為一編以置經外而復詩書之舊焉春秋一經三傳初皆别行漢以來儒者欲省學者兩讀至以公榖配經左氏分傳附經之年朱子雖未及詳定而亦别出左氏經文盖將以復春秋之舊也經之存者五惟易最古而最先亂已而幸正之卒又亂焉藝文志云易經十二篇顔師古謂上下經及十翼葢古經也漢費直以彖象釋經附於卦後今乾卦起大哉乾元至用九天徳不可為首是其例也雖其初加一傳字以别於經然十二篇之經直已亂之矣漢鄭康成注易合彖象於經而所謂彖象不連經文者猶在也至魏王弼注易用康成本又増入乾坤文言雖加彖曰象曰文言曰以别於經然直之所既亂者弼又從而亂之若説卦等篇仍其舊總曰繫辭自是世儒知有弼易而不知有古經矣程子作易傳因弼本未暇更正嵩山晁説之考訂古今釐為八巻卦爻一彖二象三文言四繫辭五説卦六序卦七雜卦八而吕氏大防周易古經上經一下經二上彖三下彖四上象五下象六繫辭上七繫辭下八文言九説卦十序卦十一雜卦十二王氏原叔家古易本卦辭一彖辭二大象三小象四文言五繫辭上六繫辭下七説卦八序卦九雜卦十東萊吕祖謙則定為經二巻傳十巻上經一下經二彖上傳一彖下傳二象上傳三象下傳四繫辭上傳五繫辭下傳六文言傳七説卦傳八序卦傳九雜卦傳十朱子本義從之故朱子曰經則伏羲之畫文王周公之辭也并孔子所作之傳十篇凡十二篇中間頗為諸儒所亂近世晁氏始正其失而未能盡合古文吕氏又更定著為經二巻傳十巻乃復孔氏之舊云按朱子之言幸古經之復正也明永樂時修五經大全易則從程傳元本而本義則以類從夫以程子未及更正之經取朱子從古經説易之辭割裂參錯於其間使古經己正而復亂而最繆戾者簡首仍載朱子幸古經復正之説而又不言其不從古經之故是則所謂復孔氏之舊者果安在乎至使前賢之意乖剌不明至今三百年餘未有能正之者也成化間奉化學教諭成矩謂世之讀易者先本義而後傳遂獨刻本義行於世今家傳戸誦者成矩之書也夫朱子因古經作本義明初諸人以本義參附於傳而一之巳失朱子之意矣然猶曰此集諸儒之説非專朱子之書也今矩所訂之書儼然朱子之書世之學者遵信之而不復知其舛譌之若此也盖易之最古而完者及今猶可考見故與世諗焉皇極數説理數一也岐而二之者非也言理不言數此近世學者之通病然天下豈有理外之數哉故曰理數一也邵子於數精矣世之學者求之而不得其解姑曰易之為書理而巳矣數非所尚也豈不悖哉皇極之數世失其傳嘗殫心研索積數年之勤以求之恍若鬼神之來告焉巳復參之書冊遂無弗悉合者故於理數之際有可得而略言者焉大傳謂極其數遂定天下之象大哉言乎皇極之數斯當之矣盖河圖之數生於五而成以十此數之始也自十而百百而千千而萬而後謂數之極易逆數必極其萬而千千而百百而十十而零之數而後謂極其數也既能極其數矣而後天下之象定焉夫見天下之賾者儗諸形容象其物宜是之謂象象誠天下之賾者哉天下之賾極之至於萬千百十零而天下之象定之止於一二三四五六七八九十而此十數者又止用其四焉是天下之象四象焉盡之矣故曰定也其法以數求卦上卦動以動因十以卦因零下卦動以卦因十以動因零再加卦數爻數而先天之數成矣通計萬千百十零之數去萬以千百十零為元㑹運世是為四象而五行生尅吉凶㫁焉以乾卦言之六陽䇿數二百一十有六如五爻動是上卦動也以原䇿數二百一十有六為本數五爻加五十原䇿數為數萬有八百是為以動因十乾位一加一原䇿數為數二百一十有六上下乾位各加一為數二五爻加五為數五是為以卦因零通計為數萬有一千二百三十有九是為一二三九也如二爻動是下卦動也以原䇿數二百一十有六為本數乾位一加十原䇿數為數二千一百六十是為以卦因十二爻加兩原䇿數為數四百三十有二上下乾位各加一為數二二爻加二為數二是為以動因零通計二千八百一十有二是為二八一二也以坤卦言之六隂䇿數一百四十有四如六爻動是上卦動也以原䇿數一百四十有四為本數上爻加六十原䇿數為數八千六百四十是為以動因十坤位八加八原䇿數為數千有一百五十有二上下坤位各加八為數十六上爻加六為數六是為以卦因零通計九千九百五十八是為九九五八也如三爻動是下卦動也以原䇿數一百四十有四為本數坤位八加八十原䇿數為數萬有一千五百二十是為以卦因十三爻加三原䇿數為數四百三十有二上下坤位各加八為數十有六三爻加三為數三是為以動因零通計萬有二千一百一十有五是為二一一五也以坎卦言之二陽四隂䇿數百六十有八如四爻動是上卦動也以原䇿數一百六十有八為本數四爻加四十原䇿數為數六千七百二十坎位六加六原䇿數為數一千有八上下坎位各加六為數十有二四爻加四為數四是為以卦因零通計為數七千九百一十有二是為七九一二也如初爻動是下卦動也以原䇿數百六十有八為本數坎位六加六十原䇿數為數萬有八千是為以卦因十初爻加一原䇿數為數百六十有八上下坎位各加六為數十有二初爻加一為數一是為以動因零通計為數萬有四百二十有九是為四二九也以離卦言之二隂四陽策數百九十有二如上爻動是上卦動也以原䇿數百九十有二為本數上爻加六十原䇿數為數萬有一千五百二十是為以動因十離位三加三原䇿數為數五百七十有六上下離位各加三為數六上爻加六為數六是為以卦因零通計為數一萬二千三百是為二三也如三爻動是下卦動也以原策數百九十有二為本數離位三加三十原䇿數為數五千七百六十是為以卦因十三爻加三原策數為數五百七十有六上下離位各加三為數六三爻加三為數三是為以動因零通計為數六千五百三十有七是為六五三七也如三陽三隂之咸䇿數百有八十為本數上爻動以動因十加六十原䇿數為數萬有八百以卦因零兑位二加兩原䇿數為數三百六十上兌位二加二下艮位七加七為數九上爻加六為數六通計為數萬有一千三百五十有五是為一三五五也初爻動以卦因十艮位七加七十原䇿數為數萬有二千六百以動因零初爻加一原䇿數為數百有八十上兑位加二下艮位加七為數九初爻加一為數一通計為數萬有二千九百七十是為二九七也如五隂一陽之復策數百五十有六為本數四爻動以動因十加四十原䇿數為數六千二百四十以卦因零坤位八加八原䇿數為數千二百四十有八上坤位八加八下震位四加四為數十二四爻加四為數四通計為數七千六百六十是為七六六也三爻動以卦因十震位四加四十原䇿數為數六千二百四十以動因零三爻加三原䇿數為數四百六十有八上坤位加八下震位加四為數十二三爻加三為數三通計為數六千八百七十有九是為六八七九也推之至於他卦悉準此法先天之數無遺義矣三正説夏書三正傳謂為天地人之正道馬融曰建子建丑建寅三正也孔穎達謂三正為三才按三正之説生於三律成於三統漢書律厯志云三統者天施地化人事之紀也十一月乾之初九陽氣伏於地下始著為一萬物萌動鍾於太隂故黄鍾為天統六月坤之初六隂氣受任於太陽繼養化柔萬物生長楙之於未令種剛彊大故林鍾為地統正月乾之九三萬物棣通族出於寅人奉而成之仁以養之義以行之令事物各得其理寅木也為仁其聲商也為義故太蔟為人統此三律之謂矣是為三統其於三正也黄鍾子為天正林鍾未之衝丑為地正太蔟寅為人正三正正始是以地正適其始紐於陽東北丑位易曰東北喪朋乃終有慶答應之道也故三正之説生於三律成於三統者謂此也孔氏以三正為三才未知所據易大傳曰易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也夫天下之事物義則可以兼通名不可以假借若非然者是周易可以言三正尚書可以言三才今既言三正矣而以三才釋之未見其可也自是以來解者紛然其未有定矣陳氏大猷書集傳或問馬氏以建子建丑建寅為三正如何曰新安王氏辨之巳詳使其果為不用正朔亦豈應言三正乎曰夏氏謂董仲舒言舜紹堯改正朔如何曰漢儒多喜言改正朔經内舜禹初無此也按蘇氏有言王者各以五行之徳王改正朔易服色自舜以前必有以子丑為正者有扈不用夏之正朔服色是叛也王氏辨之謂堯之授時以寅為正月舜因之至商乃以十二月為嵗首至周乃以十一月為嵗首堯舜之前安有丑正子正乎按鄭康成謂帝王易代莫不改正堯正建丑舜正建子正月上日者未即位未改堯正也月正元日者即位之後乃改堯正也孔氏不取其説謂先儒王肅諸人以為惟殷周改正易民視聽自夏巳上皆以建寅為正嵗二月傳言既班瑞之明月以此為建寅之月也按傳云班瑞之明月並不言寅穎達直謂以此為建寅之月是其臆説非傳意也若夫王氏之辨襲頴達之説吾無取焉又謂漢儒多喜言改正朔經内舜禹初無此然則建寅之月經内曽有此乎程氏大昌云創建丑子惟商周耳自唐迄夏即皆建寅髙堂隆謂舜更堯厯首嵗以子堯同少昊首嵗以亥皆不與詩書合夫舜首嵗以子堯首嵗以亥雖不見於詩書而謂自唐迄夏即皆建寅者果詩書之明文歟詩書既無建寅之説而謂皆不與詩書合者果何所指與此其説皆祖禰穎達與經背馳而尤其甚者王耕野氏讀書管見云怠棄三正以為子丑寅之正不知王朝頒朔三正並頒於諸侯耶抑止頒寅正也而奈何責有扈以怠棄三正且不奉正朔是欲擅變禮樂改易制度何得云怠棄或者以為養民莫重於六府三事威侮五行是不修六府怠棄三正是不務三事為諸侯而不知養民此天所以絶之也按王氏此説較諸説為優似可以折吾之説者請得與辨之王氏云止頒寅正固矣而經言三正者特以三正命於天而行於人者也有扈氏不畏天不恤人故雖頒寅正而兼言三正者正所以深責之也王氏云不奉正朔是欲擅變禮樂改易制度何得云怠棄夫王氏之説誠善矣然經所謂怠棄者正以其不畏天不恤人兼三正之義以深著其罪故謂之怠棄云爾衆言淆亂若此則盇不觀朱子之言乎朱子曰天開於子地闢於丑人生於寅故斗柄建此三辰之月皆可以為嵗首又語録云邵子皇極經世書一元統十二㑹一萬八百年為一㑹當初一萬八百年而天始開在子會又一萬八百年而地始成在丑㑹又一萬八百年而人始生在寅㑹邵子於寅上方注一開物字子丑寅皆天地人之始故皆可以為正蔡氏沈習聞此説故集傳謂三正子丑寅之正也三正迭建其來久矣舜恊時月正日亦所以一正朔也子丑寅之建唐虞之前嘗已有之蔡氏斯言可謂得之矣至有扈氏暴殄天物輕忽不敬林氏之奇尚書全解云但言其廢三綱五常耳此盖模稜之言宋人如此者甚衆皆不足與辨者以林氏於尚書最有名故及之自漢唐迄宋元碌碌者無論已其為説之最著可以害經而惑世者故取以致辨焉方澤壇左右辨王者南面以聽天下宫室廟庭罔弗南嚮故古北郊位皆南嚮無北嚮配位皆西嚮宋政和間用北牖答隂之義始改地壇位北嚮而太祖配位東嚮盖壇位既北嚮則西為位左方配位居西東嚮是左昭之義也南渡後壇復南嚮明嘉靖九年建方澤壇用宋政和制地祗北嚮祀典考曰配位居左既曰左則宜東嚮明矣王圻續文獻通考載嘉靖初年祀方澤儀注云配位西嚮當是時猶未用政和之禮也其西嚮也固宜今壇制沿明舊而用儀注西嚮之文不察配位居左之義夫今之方澤非嘉靖初年之方澤是用政和禮改建之方澤也壇位既北嚮矣而仍以東為左以西為右則是尊昭也而顧使居於穆次穆也而顧使居於昭以昭居穆以穆居昭者是有司失考昧左右之義矣盖東與西為定位左與右為虛名配位之或東或西從壇位之南嚮北嚮也北嚮之東乃南嚮之左非北嚮之左也北嚮之西乃北嚮之左也故方澤北嚮宜取左而居西嚮東不宜仍從南嚮取東而居右也今位西嚮是居南嚮之左非居北嚮之左矣按禮昭穆昭南面穆北面昔之所謂南北今之所謂東西也今之所謂左右昔之所謂昭穆也是左為昭右為穆也若宜東嚮而西嚮是宜居左而居右矣是以右為昭而左為穆矣由是位不得不東嚮則宜穆而乃昭矣當時禮官忽左右之位執東西之名以有定之東西冒無定之左右其於昭穆之義果皆合歟否歟於愚心竊有未安也當俟諸議禮之君子焉春秋齊桓晉文説古者建國親侯列爵惟五而統於一尊大小相維厥有常制而强凌弱衆暴寡挾天子以令友邦率羣力以侮孤國此三王之罪人萬世之所公惡也是以仲尼之徒無道桓文之事者而夫子曰其事則齊桓晉文者其故何哉或謂隠桓之世王室卑而齊伯興春秋之所由以始定哀之世中國衰而晉伯廢春秋之所由以終若是則春秋為奬伯之書喜其興而懼其廢也夫竊天子征伐之權挾諸侯以㑹盟之事名為尊王實以自雄開兼并之漸兆禍亂之原聖人謹微防患之心不如是其踈也春秋懼亂而作桓文之事聖人之所大懼也是所由以書也不然者以二百四十二年之記一百二十四國之行事朝㑹盟聘圍伐滅入無有不書而獨曰其事則齊桓晉文者豈真有慕於伯者之為哉或曰方伯得專征伐是天子之所與也然不請於天子而主盟擅討執其君殺其臣滅其土地無王之甚矣春秋豈與其無王者哉其曰其事則齊桓晉文者嚴首惡也是春秋之㫖也春秋明天道説春秋以禮樂征伐之權歸於天子凡不出於天子而私會私盟私相朝私侵私伐顓殺者春秋皆罪之夫禮樂征伐之權天子有之雖天子亦不得而自私之也天之所命要當以天事行之故春秋者天道也書曰天佑下民作之君作之師惟其克相上帝寵綏四方有罪無罪予曷敢有越厥志又曰天叙有典勅我五典五惇哉天秩有禮自我五禮有庸哉天命有徳五服五章哉天討有罪五刑五用哉是天之所命天子亦不得而私之也而有一人之敢衡行敢作好惡作威福是謂逆天故凡春秋之所誅天之所誅也故曰春秋天道也漢以來説左氏者以為春秋周公之志周徳衰典禮喪宣父因魯史成文考其真偽正其典禮上以尊周公之制下以明將來之法為公羊者曰春秋變周之文從夏之質甚則以為黜周王魯也為榖梁者曰平王東遷周室微弱天下板蕩王道盡矣夫子傷之乃作春秋所以明黜陟著勸戒成天下之事業定天下之邪正三家之説榖梁近於理而未得聖人之心後世遂有以天命為不足畏者是使聖人之心不明於天下也春秋之時王者徒擁虛號於上勢不若一執國命之陪臣春秋於春正月既以繫之於王其意以為天下習見王者之不足尊也又尊其名曰天王天下敢不尊王有敢不尊天者乎是可以見春秋之志也夫㑹盟朝聘侵伐刑殺之權攘竊之既久馴至於弑逆原其始皆無王之一念為之而春秋曰有天在焉天在斯王在也亂臣賊子之敢於推刃於其君父者以謂無天耳今曰天王是王可無天亦可得而無也耶天卒不可得而無是王卒不可得而無也故曰春秋之志也其他日食星變水旱雨雹冰雪孛彗凡闗天事者尤致謹焉傳曰聖人以天自處故聖人者一天也春秋一天道也春秋因事約文説天地之道易簡而已矣聖人之道法天地而已矣易傳曰言行君子之所以動天地也見之於行事者謂之行見之於口見之於書者謂之言孔子曰我欲載之空言不如見之行事之為深切著明也然則春秋者聖人之言王公卿大夫之行事而即聖人之行事所由寓焉者也聖人之言行無有不本於易簡者况其制作之書乎孔子生當文勝之時嘗自歎曰文勝質則史古者天子有史官列國有國史大事書於䇿小事書於簡牘當其盛也無飾行無支言彬彬然文有其質者杜預所謂舊典禮經是也平王之世隠公以來官失其守史所記注皆違舊章是孔子之所歎也是文勝其質者也孔子取魯史記因事約文二百四十二年之事約於一萬八千言之間文髙而㫖逺辭少而義詳要其意歸於易簡而已矣傳春秋者左氏公榖鄒夾其後逓相師授為論注傳疏者百千人何休所謂講誦師言至於百萬猶有不解時加讓嘲者也其辭愈費而聖人之意愈隠矣以二百四十二年之事費辭至百萬之多而猶有所不解使其上叙二千四百三十二年之逺其辭之費而不解者又焉有窮乎夫天地無終極者也二百四十二年其間一旦暮耳由無終極以後以紀無終極以前其辭之費不知又當何如也然則春秋之作聖人之慮在萬世者也豈真為旦暮之間而然歟故後世不達春秋之意不可以為史不知易簡之道不可以達春秋春秋為史法説春秋聖人之史也非經也後世謂之經也有史官之史未經筆削之春秋是也有聖人之史既經筆削之春秋是也聖人之史古無此體乃夫子㫁自聖心創為義例為萬世不刋之史法也杜預曰遵周公之遺制又曰明周公之志以為明周公之志則可以為遵周公之制則不可栁宗元言杜預謂例為周公之常法曽不知侵伐入滅周公之盛時不應預立其法栁子可謂知言矣故春秋者由周公以來未有此體也聖人為史法以詔萬世曰其文則史而後之人名之曰經名之經者其意主於尊聖人而後世遂專以經尊春秋而不知為聖人之史於是聖人之史法遂亡春秋有達例有特筆達例者史官之史也特筆者聖人之史也聖人之特筆如化工之生物不必駢枝儷葉節節而生之而全體已具史官之達例欲圖日月而繪天地不已難乎曰聖人為史法以詔萬世後之為史者以春秋為法可乎曰奚為而不可有聖人之才則可無聖人之才則妄也曰然則如之何曰姑為史官之史焉烏知後世不有聖人者出與古不修墓辨孔子葬母於防為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古不修墓劉向曰盖非之也又言殷湯無葬處文武周公葬於畢秦穆公葬於雍槖泉宫祈年館下樗里子葬於武庫皆無丘隴謂為賢君智士逺覽獨慮無窮之計嘻亦過矣凡向之言特借以成其薄葬之説而不自知其言之過也夫以人子之葬其君親必令後世無丘隴之可尋恒人之情有不安於此者矣而謂弟子之修墓孔子非之則尤為不知言而昧於聖人之所為也儀禮筮宅曰度兹幽宅兆基無有後艱既井椁則又卜之曰考降無有近悔及葬實土三其慎如是孟子所謂盡於人心也古不修墓之語殆猶無有後艱無有近悔之義乎墳雨而崩盖孔子傷之也非非之也向之言何其過歟康熙庚申閏八月晦日書於百鶴新阡丙舍午亭文編巻二十二
