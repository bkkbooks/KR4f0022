body:
  text: 午亭文編卷四十五大學士陳廷敬撰志銘翰林院侍讀吳默巖墓志銘孫君承恩榜進士其第三人君也君吳氏諱國對字玉隨又字默巖初母夫人有身夢二龍相對己而同乳生二男子君先生故名對其季曰龍當世廟時用誅流以懲南北鄉試之弊其明年禮闈校士上親定題目夜半遣親臣齎送鎖院其防密如此既策之於廷上曰吾既以法懲除積弊宜可得天下真才故於是嵗所取士恩意尤有加焉連數日引見拔庶吉士三十二人與承恩等三人讀書翰林中上嘗幸景山瀛臺南苑輒召以從賜坐延問如家人有欷歔感泣者嘗問君君侃侃以對上重焉舊制初教習分國書漢書人習一書至是上謂此皆真才漢書其所嘗習命人兼二書每間一月御試之殿中親第其高下由是翰林之選益重焉君海內名宿試皆在上第長於諷詠指物引類對坐客運翰如飛鏗鏘幽窈㫖趣感人顧是時雖重漢書而士之不能習國書者則斥以去君既専精辭翰又年盛氣盈風采言議懾伏一世若無足以為我難者久之於國書不能竟學乃喟然嘆曰此乃天之所以限我才也明年則以病去居六年補編修典試福建遷國子司業侍讀又乞遷葬去居八年補侍讀提督順天學政事竣又以病去蓋公於仕進未嘗久居其官如此後數年天子進用臣僚不次登擢或名一藝懷一長者不必纍日浹月輒至大官以君之才使用於時其所得為必有異乎人者君既皆不久於其官而仕方按籍平進其名跡止於是者固知士有遇有不遇焉矣然翰林以文章論思為職及其為國子師視畿輔學皆當時之榮未可為不遇而君之文學為世所宗所至克舉其職為學政稍久故聲績尤著亦未可謂不用於時而世以為如君之才其施設有未盡者蓋不獨為君致惜也君兄弟五人伯國鼎叔國縉君其季最季國龍皆進士惟仲國器為布衣好老子術蓋余從君後召見時君所上聞於世廟者其家世與其系譜並如此最季者後為給諫同朝兩人風貌言笑相似甚雖以余之久與居每驟見初不能辨識見給諫以為君也及與之語乃知其為給諫每大笑而别君性篤孝時時語其先人輒嗚咽下泣好舉古昔稱先進世或笑其迂亦不以為嫉也蓋其誠明坦易人亦多有化之者而尤重友愛給諫死君之子旦賢而有文亦死余與君相見於京師君鬢髮颯然皆白其意氣亦衰矣謂余曰旦之死命也夫吾弟之亡吾蓋不能委順焉吾亦無意於斯世矣余聞其言而悲之君雖衰其才誠有過人者用之皆足以有為而不盡其用此吾之所以終悲君之不遇也君於古文研論最深而工於騷賦之作故獨喜多為詩其愁憂歡愈離合諷諭警戒之㫖恆發之於詩名曰詩乘數十卷藏于家君之先世居東甌遷六合後遷全椒今為全椒人曽祖諱鳳祖諱謙父諱沛道德文學為東南學者宗師稱海若先生後以君贈翰林院編修儒林郎以給諫贈儒林郎禮科掌印給事中母盛氏纍贈太安人君初娶陳氏贈安人繼娶汪氏封安人先二年卒男子三人旦考授州同知先卒次朂國學生俱陳安人出次升戊午舉人女子二人皆適世家子俱汪安人出孫男五人長霖起旦出次霄瑞次霜髙次雱逺俱朂出次露湛升出孫女六人君以庚申十一月一日卒於揚州寓舍年六十有五以某年月日葬於某原蓋君之學行於法宜銘銘曰士初罔學君雄其文吐辭落簡蒸如霞雲㸃竄不施驚其坐人士初賤書我張我軍斷紙零墨世寶其芬匪文藝然於道敏行衡門鼓鐘聲聞於廷誕惟厥考人師經師聿來則效章縫祁祁君之兄弟式穀在兹以道為文以學為吏君在詞垣仕凜風義羅材於閩俊乂在位視學於畿士喜不喟君之在官先後幾年進少退多其美如何人亦官久於君何有進者己而其退孔嘉君節皎然銘此幽遐敬視圭石允興厥家封朝議大夫內𢎞文院侍讀孫公暨配顔恭人墓志銘余同年友鹽城孫君惟一其為人淡泊自外於進取聲利蓋巋然成德君子也故同年生在翰林也余獨喜從之遊閒居無事讀書誦詩相與商𣙜古今人物又往往皆自道其先世之賢居無何余與惟一前後請急歸比余再至京師惟一亦再至又未幾而請急歸又再至而余與惟一前後皆以母憂去余再至京師惟一家居不復出而有父朝議公之喪介以宋生恭貽走數千里來謁銘孫氏家世之賢昔熟於耳今宋生能言孫氏軼事思惟一之為人而徵以生之說不謬也生之言曰朝議公諱助字益我其先蘇州人明初遷鹽城西南十五里以耕讀傳其家自其上世蓋隱居者流鄉里髙其行誼至公之父諱某字時遇德益卲譽聞益著生四子公其季也娶玉田顔公女公少而醇謹朴茂力田事父母繼母以孝稱事其兄如事父族黨里閈化之於是孫氏孝友姻睦之風聞四方四方之學士大夫過孫氏之廬者必式公有丈夫子四人自以貧故棄其書而田教其子得肆力於書季子一鯨攻文學為學官弟子入為國子生而仲子一致以廷對第二人官翰苑有名於時即吾友惟一也以惟一貴公初封文林郎內國史院編修再封朝議大夫內𢎞文院侍讀加一級顔太君初封孺人再封恭人公謂恭人吾家故隱者流顯於時若此吾聞古之君子不以隱顯易其行且吾子雖貴其漠然于世無所能俯仰顧嘗獨喜書自吾苦貧不得卒業於書而吾子好之如此此吾志也於是惟一聞公言兩以病乞歸奉養閉門益讀書以承公志而公與恭人菽粟布絮安田家之樂四方之學士大夫向知敬慕公者皆愧厲感發而歎謂孫氏之能世其家者如此能教其子以有成而隱顯不易其行者如此洵可以風世而勸俗也生之言大較如是余猶記惟一之言曰吾父之賢原於吾祖吾祖為人嚴正誠慤一言動不肯茍諸子侍側或容止不飭輒譙呵及之里人嵗時燕飲或儔輩中攻詰人短刺人陰私事則踧踖不自寧起而歸必痛戒諸子毋以虛言斷元氣毋以非分蠱心術耕者宜穫覬其必穫或不穫讀者宜遇覬其必遇或不遇尊理敬命以俟之天而己觀時遇公之教其家知朝議公之所以教其子有由也惟一自釋褐而仕仕輒不久于其官其淡泊能自外於進取聲利蓋奉其祖父父母之教者深矣故名其為巋然成德之君子無疑也惟一又為余言方在孕時恭人操井臼治午炊挾大器挹水注釡用力猛娠動纍日幾危而卒無恙宋生又言惟一之再赴京師也祖餞者晨集郭門外惟一攀恭人衣呱呱泣嬰兒聲達户庭既趣季君出郭門辭諸祖餞者皆罷去公恭人迫其行日晡乃行别數月得恭人凶問惟一以不得卒養恭人恨慟濱於死觀恭人之育子與惟一之思慕恭人其隱約艱難通塞之際其可悲為何如也當此之時余亦有母之喪回憶曩昔又悲不能自勝也公以康熙辛酉九月卒年八十恭人以己未四月卒年七十七長子一中次一致戊戌進士翰林院侍講學士次一鵬次一鯨太學生孫八人汝翼汝為汝聽汝弼一中出汝礪太學生汝霖汝梅一致出汝楫一鯨出孫女八人一中出者二一致出者四一鵬一鯨出者各一曽孫三人二汝翼出一汝為出曽孫女四人一汝翼出二汝為出一汝礪出以某年月日合葬于城南之新阡銘曰以余所觀古今文章之士能卓然成一代之名者必其先世多稽古好學之人心濡目染知為學之方而後曉然於所趨而造乎其至士之特立崛興無所因而然者蓋十無一二焉若吾友孫君惟一奮然自起於耕藝樵牧之間可不謂豪傑之士哉及吾觀太公生平以學勉其子者至矣又以知吾向之所信古今文章之士必本其先世之賢者不誣也文林郎河南道監察御史孫君墓志銘國家總一海內分𨽻民土於有司故縣令最重設臺諫以通下情防壅蔽臺諫缺擢用令令與臺諫故又相倚為重為賢令入則為名臺諫者君其人己君諱必振字卧雲初為懷慶推官三年推官裁省補陵川知縣六年入為河南道監察御史差按兩浙鹺政還掌山東陜西兩道事凡為御史七年以歸君之在懷慶也以正風俗興教化為先舉孝弟於鄉表節行於閭課士於庠講約讀法身自臨歷輒知其吏民賢姦直曲是非之實風流令行郡以大治武陟富民僉人利其財陷於獄三年君察知立脫之置陷之者重法修武令饋鮮筍以竹籠之發視皆黃金君呼其人斥去曰何敢以汚我行縣至溫溫令有苞苴顯呵之令皆震懾漕米至小灘鎮例監兊金二千兩君悉卻不受曰此吾民膏血勒石以絶來者是嵗以亷進秩一級總督三省朱公聞君名召咨以制府事無大小悉以委君三省之事以治及為令陵川陵川在山硤間土狹瘠難理然自其長老傳記士為鼎甲者七人後寖以衰微殆四十年不見科目君至則易置孔子廟立義學創書院教士其中親為勸課士果連舉於鄉民解黃絲黃絹顔料等祛其纍嵗所省悉歸民民用大豐俗故好訟豪猾連蠧役為奸每勾差出縣庭里閭騷然君痛懲艾令訟者自以其人來既至剖決無滯留民化其德訟事稀簡去之日民遮道留數百里既去為君立祠君為御史前後疏五十餘上皆時政之要其最著者時三叛連衡秦隴兵相接潼關新設稅差請速撤以安人心又請分别倡亂脅從以靖方圉選人以急兵費多銓注而科目最淹遲請疏清選法收用真才其為鹺政皭然洗手自淬益以潔清聞蓋君為推官以至為令或所已行所未行及為言官盡發其所藴蓄故其禆益為多至今指數以賢令為名臺諫者君輒在其間君丙戌舉於鄉至戊戌中試南宫己亥成進士余與君為同嵗生陵川吾鄉邑故知君之事行也詳君卒以康熙二十七年二月二十四日年七十其孤以狀來乞銘按狀君諸城人曽大父諱陸大父諱柱考諱獻赤贈御史母贈孺人御史鄭公某女君初娶鄭氏再娶李氏皆封孺人子男八人長濰源廩生次濰址增生次濰溥候選知縣次濰沛候選州同知次濰潤候選行人司正次濰湑拔貢生次濰湜候選州同知次濰溶幼女七人孫六人初母孺人教家嚴午夜篝燈督君誦書與機杼聲相軋母孺人卒時遺負券數十君約諸負者焚之曰此孺人囑也遭亂家毁贈君不知在所招魂營葬鄭孺人以不屈於賊卒君與六嵗女相依為命破壁赬土結茅以棲晝操農業夜擁書冊流離困厄之中其所成就如此可不謂賢哉銘曰士或困窮而為艱勤曰維華膴以娛其身盜仇戴天君思永恫牲鼎䀌傷榮枯若夢名德令聞峙山渟淵視彼貴富凄如浮烟懷抱皎日桑榆未晏委順歸休守道不變我銘斯丘發潛表幽爾樵爾蘇敬君子居故中憲大夫江西提刑按察使司按察使塗公墓志銘順治六年嵗在己丑寇犯上黨河南兵備副使分巡河北道容宇塗公死於其職天子加恩恤贈光祿卿諭賜祭葬于鄴廕其一子曰應泰入監讀書初出知江南廣德州用薦擢知福建汀州府遷長蘆都轉運使歷湖廣布政使司參政分守湖南道陜西按察使司廣西右布政使以罣誤去任起補江西按察使司坐小法免公為人質直坦易而勇于有為起家州郡歷階兩司所在有能聲其大要在弭盜息民折衷于剛折柔廢之間雖不為鈎距擲發之行而豪右兼并姦宄竊發輒捕鞫無所容其有不便於民者如疾痛疴癢之在身必求蠲除而後己即沮格成例齟齬上官不顧也知汀州時海氛方熾山寇乘問劫掠公率鎮兵四出討賊巨寇姦猾斂跡不敢入境一郡晏然秦中鎮兵獷悍難制番人肆虐尤甚公至按其驕橫者置於法鎮將亦屏息聽命莫敢枝梧湖南寶慶衡永三郡舊食粵鹽相距郴嶺道逺價貴民多食淡者公為力請得改淮鹽著為令夫人之才如水也刃也坳堂之水不能運芥舟族庖之刀不能中肯綮公所守多劇郡又乘兵燹蹂躪之餘於閩中總攝巡道司馬别駕司李諸事於九江又兼署驛傳鹽法藩司諸篆當是時獄訟簿書徵發期會鱗分蝟集拙者當此袖手懼傷而公泛應猝辦處之若無事如利器之發新硎江湖之負大瓠茫茫乎其無津涯也恢恢乎其有餘地也非夫內重外輕神定天全而才餘於事者其能勝任而滿志耶公行三字天交世居遼東鐵嶺衛祖諱必逺天啓甲子舉人陜西宜君縣令父光祿容宇公諱廓皆以公貴覃恩追贈中憲大夫如公官祖母孫氏母王氏暨公原配完氏俱封淑人繼配金氏崔氏汪氏昆弟三人曰國泰直𨽻撫標右營參將曰永泰廣東南海縣令曰𢎞泰早世子二中坦邑庠生入直御書房辦事中坮太學生候選縣丞女二長適庠生朱中山次適候選縣丞張國琦孫三錦鈺奎孫女一公自江西罷歸既老不仕僦居都城與余比舍時或載酒過從因得悉其生平卒於康熙三十三年甲戌三月初十日春秋七十有二越三載卜兆於都城東便門外髙北店之南原孤中坦具行狀請銘於余余惟公光明俊偉之槩磊犖果毅之才治行卓然可方兩漢諸良吏皆不容無傳也乃為之銘銘曰佳城鬱鬱漳水蟠忠魂來遊驂紫鸞南州巷哭留餘酸山河氣壯隨朝元有子鵬鶱登大官素絲五馬垂朱繁統轄郡縣多凋殘龔黃為易公為難精強綜核搯腎肝腰懸弓韔身據鞍福我人民摧豪奸晚乃斂退才未殫太行北走紛巖巒如堂封閉松楸寒撰公遺蹟鐫琅玕藏之幽竁永不刋西園先生墓志銘西園先生諱多學字覺初先世沁水人後徙陽城鄉之郭峪曰從儀至先生八世矣七世廣六世車皆隱農野不顯髙祖珩初用季子好爵貴贈承德郎户部浙江清吏司主事再用長子好古貴贈奉政大夫四川按察司僉事兄弟皆中甲科歷官並有名而僉事公初令元城有貴顯不法公抗論置於理直聲大著遷刑曹司讞決而奏免陽城溢額之賦事具邑乘通志是為先生曽祖僉事公子植修先公農業行義於里中先生王父也先生父以萃禮部儒官儒官公伯兄鴻盤萬厯癸酉科舉人歷仕景州知州儒官公蔭積髙門行身儉讓里中稱曰長者長者云先生方重亮直不茍訾笑巋然儒行碩德為學者師蓋以其學施於倫物散見於事為自少而老敦行無厭是以於親則孝於兄弟則友恭於朋友則信於凡所接之人則無不率是意而遇之以誠故其殁也學者悲焉曰天不憗遺吾師儒官公長子多聞為弟子員儒官公愛之先生事之如父未年三十有冉耕之疾狼藉枕席間至不可嚮邇先生躬為扶侍臥起湯藥嘗而後進比卒慟不自勝過時而悲儒官公以愛子故暮年竟忽忽而病先生捧手將敬肅容承志視氣聽聲隨事順體躬自潔食飲視進多少為憂喜晨昏無少違間儒官公以安侍從昆弟同恩一視儒官公既殁先生孤立或鬩於牆堂構漂搖不可搘拄先生曰無庸平心和顔摩肌煦肉卒以格具邪心招其淑氣學者曰白華之子棠棣之弟先生有焉余所謂孝於親友於兄弟者如此幼與我冢宰公我先世父侍御公同學於鄉我冢宰公嘗曰吾曹兄弟也但各姓耳往來阡陌輸寫情好連日浹旬我先世父侍御公性嚴重老而歸也闔門罕與人接獨敬先生時時坐先生後披襟展顔舉酒談燕先生穆然其間神明湛定坐者融其心神靜其視聽默焉而退若皆有得也學者曰隱不違親正不絶俗先生有焉余所謂信於朋友者如此平居嶄然自持孤介峭潔若不可人意與人語溫溫焉侃侃焉勉其善而遏其非被容接聆謦咳者薰蕕氷炭氣沮意消里黨急難咸恃以濟卒無矜伐意學者曰伐木乾餱之義先生有焉余所謂凡所接之人無不遇之以誠者如此先生安貧守約有以自樂而檢身甚嚴余少壯里居侍我冢宰公游樊山之巔先生几杖在焉中席酒酣引避拉友人倚樓浮白語笑縱橫脫略繩檢中夜不寢先生明日面責余曰節飲養身君其念之自後每見必以相規余至今思其言未嘗不潸然泣也先生教子甚勤老屋三間藉書枕冊浸漬丹墨元日除夜猶聞絃誦之聲渟涵演迤作為制義之文其書滿家凝塵網蟲蠧簡齾翰余過而從先生為文嘗暗窺竊探取其字句至今恧焉先生加意造士與我冢宰公結文社於樊川之上邑之俊人勝流畢集其中閲五日晨露未晞桑柘交陰叢花蔽路先生布袍草笠循河渚而來與我冢宰公山崖水湄危坐竟日以待諸君為文口吟手畫賞其俊句或有不嗛慨然而歎移時不樂余與先兄庶常公先生令子實親炙其盛焉其時學者摳衣執經侍兩公側者厥後多所成立跡先生行事舉十之一二以見其生平學力之専致用之美者蓋先儒有言人生惟是感應之理從先生學者殁而益思之即余之不肖每念先生諈諉之言則不禁潸然泣者是知先生之感人者深矣故論先生之行事而歸本於學而序次之以為之銘焉先生一子于廷順治己亥與余先庶常兄同舉進士者也為永從令先生以故封文林郎先生生以前明萬厯二十四年五月二十九日卒以大清康熙十七年九月二十八日年八十有三葬以康熙三十三年九月初一日卜新兆于南坡之阡三孺人祔焉蓋至是先生殁己十六年所矣初配孺人王氏繼孺人于氏再繼于氏女三一適貢監生李易其二皆為士人妻孫男一之麒康熙庚午科舉人銘曰長者傳聞東山東始有顯者張兩公東山魚飛鱗摩空我冢宰公人中龍世父豸冠光熊熊兩家川嶽靈所鍾先生華胄承流風麟傷鳳逝吾何從典型淪亡天晦䝉風木痛劇朞再終祥琴欲鼓聲難工松柏已長宿草豐先生馬鬛猶未封嵗周星紀加四冬執筆為銘辭載攻緒言皎皎悲填胸人生有情無終窮劖文珉石藏幽宫千秋不泐情與同海水有涸石無礱麟昭張公墓志銘晉故唐封邑堯都在焉昔季札觀周樂至歌唐風曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是說者謂民性既敦厖而又有先聖之流風遺澤故習俗異於他國余讀詩至蟋蟀山樞倣佛見其意焉至宋時明道程先生為晉城令實涖我州以禮義節儉為教誨故其民至今皆力耕昏作減縮衣食其士亦却掃誦習不騖於聲利有古隱君子之風如我舅麟昭張公其人也公家沁水為甲族諱之屏公者萬厯中進士官陜西商洛道左參政為公之祖諱洪翼號萬涵公者舉於鄉令直𨽻威縣則公之考而余之外祖也外祖母王氏明吏部尚書王公之長孫女生三女季歸先考尚書公廷敬母也外祖任威縣數日而殁祖母攜公扶柩歸里歸而流寇肆掠沁城失守公隨祖母避兵於外家寇退返沁則家業蕩落祇餘汙萊數百畝公才弱齡以隻身搘持門户里胥縣役日夜踵門叫呼公應之有方時有僞官斂餉於沁不能應則拘公於獄者纍月邑中耆老士庶咸曰不可禍清白吏子孫咸赴僞官别白僞官亦感悟釋之方姜瓖之亂外祖母避陽城艱於奉養公往還陽沁間營辦甘膬不恤勤瘁未幾外祖母卒公身自舁檟材於百里外含殮祭葬皆不失禮及生母陳卒亦如之外祖有兄二人皆無嗣殁而葬於他所公每愀然曰異時誰為酹一巵酒者因皆遷葬於祖塋之側公於家人生死恩義大抵類此公雅好經籍為博士弟子鋭志進取顧為家計纍弗克竟業常訓其諸子曰吾少遭多難未能肆力於經史汝輩多暇宜盡心治之公既不顯於世嘗慨然謂士不能績學成名則當勤其四體以自養若安坐衣食無所事事世之大蠧也日常辨色而起往田間督課視其樹殖耘耔芟柞收穫以為樂或親執農器以教耕作者曰我竟為老農矣治家綜理微密不遺纎悉下至柵雞苙豕區芋畦薑莫不井井中法佳辰令節召故舊鄰里十數人㑹飲不立崖岸半酣後語尤不休然不及世務談說者桑麻菽麥雨晴寒燠而巳雖居城市終身未嘗謁見官府縣舉鄉飲禮請為賓亦弗詣曰非我所樂也公體幹豐碩精神充裕余官京師四十載公自家視余邸舍先後十三至無倦色恩意周篤亦筋力強固能然也年幾八十猶善飯健步履謂可百齡嗚呼孰意其竟止於斯耶公生某年五月初十日卒以康熙四十三年七月二十二日享年七十有八元配馬氏陽城庠生馬君銑女繼配尚氏處士尚君元祚女皆柔靜有德子男五長問士庠生次衡士太學生馬氏出次恂士奉祀生次徵士廩生次碩士業儒尚氏出女子三長適拔貢生樊度中次適庠生李三畏次適庠生李膚功尚氏出俱先卒孫男七人克履太學生克晉業儒問士出克㢲衡士出克益徵士出克有克賁恂士出克豐碩士出孫女五人問士出者二長適庠生霍正元次適庠生張茂功衡士出者一恂士出者一徵士出者一俱幼未字以某年某月某日合祔於祖塋之側其甥廷敬為之志系以銘曰人之生有戚姻所自出為最親我母之弟存者一人其敦倫也以厚其理生也以勤我視其貌抑抑恂恂我視其家肅肅誾誾懷才齎志屈而弗伸戴仁浴德用淑厥身有山嶻嶪有水漣淪體魄潛藏兮秋復春孰究其年數之所臻故永從令張君行谷墓志銘故永從令張君諱于廷字顯卿其家在太行山谷間之郭峪故一字行谷太行西來幾萬里至陽城迤南百里嶄然而盡如化城蜃樓列嶂北向郭峪在其中謂之鎮郭峪方三四里各倚山巖麓為籬落相保聚或間百步或數十步林木交枝炊烟相接自前明至今官侍郎巡撫翰林臺省監司守令者嘗相續不絶於時蓋近二百年所矣顧郭氏今無聞而張氏其先獨巋然以科目顯曰好爵嘉靖某科進士户部主事曰好古嘉靖癸未科進士四川按察司僉事摧折權貴直聲著聞曰以漸萬厯癸卯科舉人景州知州僉事公君之髙祖也考西園公諱多學邑庠生耆年長德立行教子鄉黨宗焉君順治辛卯科舉人已亥科進士性直亮刻厲學問長豫十嵗豫兄事之平居侃侃自矜重豫每謂君之才如此又名家子當有所樹立筮仕為貴州黎平府永從縣知縣南荒深昧之區日以益闢此天地之運使然亦必賴世有賢人君子能變其舊俗與之維新雖蠻獠窮鄉使異類為君子故君之所以施於永從及永從之人所以報君者不過區區百里之間而其效可垂之百世風勵天下不可沒也黎平以永樂十一年始置府永從以正統七年始置縣縣逼湖廣四川雲南之介山谷嶮峻雜苗分族而處俗凶獷不知禮義飲食言語與中土不相通耕沙礫溪淖以自食輸賨布為租唐宋以前羈縻而己君至則身歷山洞間親為誦說朝廷設官化民之至意於是始以中土之法治之延師儒立黨孰未幾而絃誦之聲響應溪洞矣常平倉制未設也嵗饑則苗民皆竄去賦既不辦而縣吏役皆逺雇他郡邑及滇蜀人君設倉庾講積貯逾年得數千石仿義倉之法時其斂散於是雖凶嵗苗民恃以不饑苗俗昧昏禮世傳鬼竿跳月之陋君憫焉置官媒聘幣有額民便樂之月吉讀法諄復感人爭者願息久則讐殺鬭狠之氣以銷民俗寖變而縣以大治署雍安篆如治永從去雍安民攀號不忍舍去嗚呼若此者可以觀民情矣彼貪叨殘忍者據百里之地日取其人而刀俎之雖其境在中土禮義素所漸摩風俗素稱朴厚而使其人怨讟並興噭呼狂走而曽不之悔謂民實負我不可化誨夫民果負我哉又誰則不可化誨者也抑治其民不張君若耳使君得一郡若一州或不在蠻獠邊徼之地其所樹立當又何如哉君之治行見於為吏者僅若此為可惜已滇中之亂脅大府遇害永從孤城不可守君攜縣印跣行匿山峒間旬日不得食苗民跡君所在銅鼓岩進稗麥食君求得君家人悉以送君所夫當顛沛流離之際而苗民之不忘其恩如此彼中土之民平居無事而噭呼狂走豈其禮義之漸摩風俗之朴厚其性習反有異於蠻獠邊徼之人乎是尤可為太息者也未幾叛者平君竟無害攜印詣軍門陳情父年老願歸事比歸家人無一失者當是時西園公已老而尚健人曰天之所以報君父子也君初為諸生我先公以元日訪西園公聞君讀書聲歸謂廷敬曰張氏子元日猶讀書邪豫聞而自警焉西園公教君嚴至不令茍一步趨妄一語言西園公生君一子君生亦一子曰之麒庚午科舉人君殁之麒走二千里丐銘於余余不得辭且曰子世家自子祖父及子皆好學問力行仁義其後必昌乎是皆可銘也君生於前明崇禎元年十月二十日終於大清康熙四十五年四月三十日得年七十有九君母于孺人君娶王孺人生之麒女五人一適江西建昌府知府王君嘉植一適甲戌科進士內閣中書田君沆餘皆嫁為士人妻孺人生于天啓七年二月二十九日終於康熙四十四年八月二十九日年八十以某年某月某甲子合葬君孺人於某山之原之麒女七人以族兄之子國梁為子之麒既别去余為君銘未發扈從河上濟寧道中聞之麒舉子名曰某豫謂後其必昌者以理斷其必然而事固己可驗已銘曰猗嗟觀士為吏可哀天之生嘉穀伍蒿萊推較其本根穀美哉我友行谷君今若此往事猶增傷來誓止命不稱君才時有以銅鼓之深岩君所廬蕉黃荔子丹雜肴蔬君逺遊歸來眇愁豫太行之谷人堯風古飲沁水清流耕瘠土剪紙招君魂與君語公侯必復始昔有云君之孤兒賢且學文千秋及百世繩繩繼我華其銘者信勿替王君乾六暨配陳孺人墓志銘崇禎末流賊犯陽城山東右參政寧前道王公諱徵俊死之公有子曰龍御府君有婦曰陳氏孺人賊既執參政公君謂孺人父必不屈賊往從必父子俱死無益乃變姓名陰左右公公果不為賊屈賊怒下僞縣令使嚴繫公君夜忽悲啼不自禁賊察知公子益怒使鐵騎勒君歸立取資來蓋賊痛惡士大夫自宰執至庶官括其金皆以品髙下為率公為人剛而亷無所得金而僞令聞公名雅重公陰縱公還公謂君與孺人曰委贄為人臣當國家難以身濟之事已不濟有死無二君孺人涕泣請從公曰我人臣義不辱身汝曹無自苦今所傳公死難時大書二十二字有曰身不任辱義無自免云云者君與孺人實親承其命云公既遇難君孺人號痛庀喪事哀毁幾傷生顧念父之孤忠恐身填溝壑他日誰當請褒恤之者於是強自節釋忍死葬公公所自縊拂雲樓君孺人終不忍再履其處其後每遇公被繫及殉難前後十餘日齊戒哭泣積數十年以為常初公所書二十二字君寢食與俱及公死難時始末謹書之牘跣行走京師訴當事當事相視閔默卒無肯為公聲言之者君每與人言未嘗不泣下也君豪邁倜儻而善自矜飭母范孺人教家嚴君多讀書美言議為學官弟子顧心不悅學使者試士規告於公願隨國子讀書公官薊遼王母張太孺人喪君率孺人拜哭就孫位人曰知禮事母孝母喪盡禮如公喪張太孺人孫公肇興為學使者以君明經上其名於禮部凡一再至京師終不就國子試曰吾父之大節猶未褒顯也君雖外若豪舉而其中有鬱鬱不自得者凡以參政公之故也順治丙申夏暴病不能言明日遂卒四月某日也年四十嵗某年月日葬於參政公墓左始祖可考者曰四四生十十生懷英懷英生得剛得剛生聰聰生子文以冢宰國光公貴贈尚書子文國光曽祖也子文生昺亦贈尚書昺國光祖也昺生承恩蓋自是參政公與冢宰公始分矣承恩生潜光潜光生如春嵗貢生當陽教諭以參政公貴贈韓城知縣是為君祖陳孺人廷敬之從姑也祖三樂贈尚書父經正慷慨有大節孺人有女德歸於君方少而為擇宜子者侍之生子及女君殁後甘虀鹽攻荼蓼婺矛牙居垂二十三年閨門之內具有法度儀則卒於康熙戊午六月年六十有一觀孺人助其夫子以周旋於參政公之側以至公臨難從容而死生無愧抑亦可以為忠臣孝子賢婦矣子男一人復繪國子監生女一人適余弟太原府學訓導廷扆俱側室李出孫男一人吉慶孫女四人廷敬有母之喪禮不得以文辭自見復繪泣以請曰始吾祖待國家之愍綸而渴葬也未有銘葬吾父因未敢有銘今吾母不幸又殁將以某年月日與吾父合窆焉吾聞諸吾母當吾子髫髮之年吾先人知器重子銘吾父母莫如子宜余固辭不獲也且余懼參政公之大節久而無傳焉因得牽引書之雖然孺人廷敬諸母行也假斯言以告哀亦吾母之念云爾銘曰吁彼鄙夫貪生避死有僇其躬有覆其祀忠臣之後克享厥家佳兒佳婦以泣以歌奕奕忠魂庇其孫子敬作銘詩告於惇史韓君佚園墓志銘君韓氏諱崇朴字佚園順治中余年十六七始識君一見以為異人杯酒結交而去其後請命於先公要君為舉子業家孰中豫居山谷間與先庶常兄閉門閲古書好自矜許輒曰吾志古之道耳何屑屑世俗事為由是見嫉鄉里是時先侍御公初謝賓客鄉之凶人至有侮豫家者君至則謂余兄弟讀書以通今致用家之不治曷以書為余兄弟始折節自克厲於是鄉之長者既愛護善類其惡少亦稍稍解去君髙才能文章善開導學者余既於君有得而其於行身保家處世之道尤得於君者為多迄今五十餘年蓋每念不忘也豫自通籍守官自誓清白以貽子孫未嘗不有感於良友規戒之言君之終也無以為賻乃輟山田一嵗之入為君窀穸資雖家人以口分不給告不恤也君又精於醫藥養生之事晚而深明理學堂奧雖復喜詩酒登山臨水有春風沂雩之思人亦莫得而窺其淺深也君至性過人雖灑落不羈而游心冥默嘗山亭涼夜相對於時月暗螢明清風蕭颯忽語及生死大事兩人抱頭大哭哭已復笑如醉如醒如夢如覺由今思之猶復可笑可哭也往年君舉前語以書咨余余應之曰孔子答仲由曰未知生焉知死知生之道大學言明明德其功始於致知中庸言至誠其功始於明善明誠之理乃生死之大關未有誠而不明亦未有明而不誠者由教以入明為要焉故易傳言大人者與天地合德與日月合明與四時合序與鬼神合吉凶先天而天弗違後天而奉天時天且弗違況於鬼神乎天與鬼神不能違何有於生死乎是以子思之贊仲尼也曰譬如天地之無不持載無不覆幬譬如四時之錯行如日月之代明猶之易傳之義亦即明誠之義也謂夫子不告以知生之道則夫子之所以教諸弟子者果何事乎學者但當由夫子平日之言以求進乎致知明善之實生死之說不求知而自知矣豫復於君者如此豫是以於道德性命始終之際思君之所以相勉而交警之者不能己於心也君好學老而不衰能為古文尤長於詩豫懷君詩前後至數十首有云寒窗燈火平生語除却君知世不聞亦追憶昔時涼夜之時而豫與君從遊聚散之梗槩亦大略可覩己君終之日寄豫詩髙朗超越了然生死之際則君之有所自得於中者益可信其決然也己豫交天下士多矣如君者能有幾人哉非豫為之銘當誰屬焉其孤時中輩以狀來求銘按狀敘曰韓氏系出南陽今為沁水人自五代宋遼以來兵革之餘譜牒放失傳之長老先世有為王者故村曰韓王村有墓在焉君又字曰韓山因村名也其世系之可考者則自祖能始能四子長曰純為君九世祖次曰聰三世生侍御曰恩次曰度五世生青州守曰肫仁六世生桃源令曰張參議曰琠純二子長曰彪彪生鋭鋭三子長曰贈文林郎崑次曰王府典膳崙次曰王府儀賓巍臨難不屈贈奉訓大夫諡忠義廟食太康崑子曰子義恩貢再為縣令纍封中憲大夫通政使司右通政使子義生范君之曽祖也某科進士纍官通政使司右通政祖仰斗初為邑學生後棄去博學修行名重士林是為少室先生父尊今惇厚孝友生三子君其長也君邑學增廣生九應省試不利於有司幼聰警絶人五嵗失母馬孺人自解去采衣不茹葷血劈踊哭泣如成人鄉里傳以為奇闖賊犯州邑設僞官専以拷掠士大夫劫取金帛為事比至沁水大索通政公家時君才弱冠先諸父往抗辨縣庭不屈賊官相顧失色錯愕咋舌釋不問已而賊圍所居寨君登寨樓語賊曰汝輩不過欲多得金帛耳寨中金帛悉以委汝賊喜諾已而賊敗約攻寨破寨中人四散走先是君父已穴牆去君不知也以不得父在所出入寨內外尋父遂為賊酋所得賊授以一鎗一包置君麾下君以他事紿賊脫身走陽城白巷親屬家至則君父先在焉其時天晦冥暗不知道會白犬引路以是得先達人謂天之相君父子也君初遇賊時身已被創求父迫竟忘其痛父子相聚背有血沾泥始知為創也蓋君之誠孝如此事繼毋霍孺人得其歡心與季弟友愛分甘解衣至老不倦親族不能自養者君戒其子我與汝曹不食飲則已不爾則曷忍使骨肉失所生平輕財利類任俠者雖以教授供八口所餘則勤施豫又以其餘買書貰酒蒔花木畜禽魚於所築撮園中嘯咏自得有奇書必借觀手自抄寫故所寫書為尤多好飲酒飲則悉令子孫環侍有弗至則弗樂也君坦懷任運自適其適皆得於天性其行於家而及於友朋無間然者有感於豫心也君卒以康熙四十又五年八月初八日距生之年月得年八十有四初娶丙戌進士某官王公度女有婦德婦容卒繼室以侯孺人生二子時中履中女一適南康府推官竇公復儼孫庠生逵子候選知縣斯在孫男四人然燾默鳳孫女三人以某年某月某甲子葬某山之原銘曰君惟有文為學者師深造道域樂天不疑豫懷幽憂如馽如羈晚慕正學西日載馳衆言淆亂將曷從之去聖雖逺簡冊在兹明善為宗尊聞行知明則誠矣時措咸宜惟君知我謂我不欺炯炯長存朗月朝曦君其不沒萬古如斯午亭文編卷四十五
