body:
  text: 午亭文編卷七大學士陳廷敬撰古體詩李厚菴少司馬生日詩紫陽起八閩斯文振千古夫子繼清塵鄉國近接武流風五百年名世天所許伊昔王道微儒冠賤如土紛紛霸與雄管樂僅遇主嬴火照西秦遺經壁東魯其後稍稍出寒芒翳復吐五星聚於井隱見豈再覩濂洛不逢時渡江况齲齲得如休明運龍飛當九五斂容陳周孔講學佐堯禹奎文移禁中兵柄攬畿輔民有耕桑居士有側陋舉封章贊廟謨兼多造榻語梧桐髙岡音聲聞逹九宇五色所披拂德輝蕩羣羽古來儒者流誰及文明普會當臨閶闔雲霄灑霖雨天壽卜人歡輿歌翻樂譜公聽旌門外千村連社鼓送吳天章歸中條壽母歌君不見太華山前黃河水山前沄沄走萬里崑崙之源天上來十二玉樓相向開丹山有鳥形如鶴王母騎之珠繡絡五色神龍班狻猊黃金茸茸䫇耐垂仙真羽節從所適小駐崆峒下姑射太華連綿中條長黃河之水流滂洋龍門結束玉溪古男兒不出亦不處有文萬卷不求名聊向京華走塵土仙人一笑子歸來黃河十月氷崔嵬太華不騫為母壽玉女金盆酌春酒送桐城張相國還龍眠山歌聞道龍眠山龍眠今不眠白雲從之去縹眇青冥天一朝噓氣生紫烟沾灑千山與萬川先生昔時此山居白雲出岫隨軒車自從雲去山逾靜春猿秋鶴相吟呼雲今冉冉歸來乎山前修竹林山下芙蓉湖水石公釣遊花鳥公友于曲江荔子嗟莫致成都桑樹餘幾株乃知賢逹少儔侣赤松黃石差可夫且如白雲何山無龍眠之山山不如朱悔人遊廬山觀三疊泉圖歌五老峰邊三疊泉飛流三疊落九天誰其觀者前謫仙後有坡老差並肩邇來千載風流歇空使江山坐超忽建安已來蓬萊姿矯矯才名又清發見君朗如行玉山萬里卷入胸懷間手持觀泉圖颯颯天風還燕山雲動海月出照此令我開心顔欲騎白黿去銀河相躋攀倒身笑殺五湖水平流淺碧徒潺潺上元即事簡湯西崖都諫春山蒼蒼春樹緑月髙起行月漸沒今夜元夜月應圓曉月雖去夜還出我初擊筑北遊燕橫腰寶劍光可憐行向燕人問岐路易水清流古道邊歸來落日紫烟生壯心未已白髮驚遙看青綺門前月已度黃雲塞上城少年踏月瓊樓下清輝照耀銀鞍馬漏水金壺逹曉稀袒屣歌筵與舞社只今閉門對月閒門前燈火髙如山忽聞剝啄聲逾靜雲章五色投柴關撫卷摩挲揩老眼頓使少年看月精魂還嗚呼此月萬古長出瀛海裏此詩萬古長留天地間西崖示使黔集紫毫筆歌誰何磊落天人姿手捫星斗騎蛟螭長風萬里上閶闔玉皇香案親來隨彩毫掀舞墨花落鋪張霞綺搴雲旗昨朝示我筆精妙法從天授非人為龍跳虎卧勢宛爾紫貂頴力如熊羆文犀琬象式古雋朱網翠羽光淋漓會稽鼠鬚少牙角中山兔頴徒毛錐良工市肆皆則效都人四逺傳流之侍中直廬䝉眷睞奎章雲翰常攜持囊中往往藏此筆黃封題字標瓌竒貯以幽蘭含郁馥濯以清流開芬滋染以芳松之烟霧疏以端溪之紋漪邇英側畔青藜閣剡藤鵝絹攔烏絲誠懸心正存矩矱世南戈法多風儀丹青㸃染具生動山光水色心情移寫詩作畫無不適雅與此筆稱相宜無何惠我意則厚風流文采焉能追生花五色夢特異别管三品書難窺珊瑚為閣巧安置寶玉在執憂顛危君不見吳興承㫖迹不泯華亭尚書聲方馳至尊文思髙萬古猶憐二子非同時吾屬幸生休明世公乎努力當如斯人生遇合豈易得况逢聖神為君師野亭懷魏無僞孤雲隨客來飄飄自舒卷言遵西山行不覺野亭逺微吟記獨遊憶我心所善魏生西山西關河阻幽緬徐給事虞門宣沙視牧寫真邊沙夜靜晝不昏長城不鎖開關門時清歸馬天山下千匹萬匹如雲屯宣沙千廄尤最盛考牧攻駒得雄俊誰其典領坐致此臨城長官赤縣令使君今為掖闥臣風貌奕奕愈有神肯信書生事鞍馬故爾寫真傳後人更畫此圖著省壁青瑣花驄照夜白就中八尺生有神怪底龍池飛霹靂書江補齊太常江山覽勝圖我聞漾水出崑崙禹所導漾非其源東流為漢走萬里仙人黃鶴隨孤鶱黃鶴樓空逾千載黃鶴髙飛至今在漢水東流無盡時朝發閬風暮碧海青霄宫闕渺何許身到紅雲最深處不知經歷幾春秋還憶江山汗漫遊大别山滄浪水今之畫圖得無似掀髯英盼夫為誰仙骨驚人見吾子吾子巍巍廊廟姿寄興烟霞聊爾耳玉宸朝退凝清香江山一片空明裏九日贈同直近公聲山玉晨俯清都髙處閲九州何暇尋逺山蕭條增繁憂瑣窗過白日坐對黃花幽兩賢真好我語默皆綢繆始愜絶紛擾遂欲恣冥搜耳目寡外緣一室安天游翻念登髙人徒令日暮愁野亭望西山青山有何好望之開我心我心含虛空豈受溪壑侵奈此前塵影鬱若交蘆森明鏡鎖匣中清光寧久沉一見青山色豁然愜幽尋再哭孟孫三月草一日我老夙少歡奄忽遭深悲皇天豈私酷要是業所為淚流輒復咽焉得成綆縻我生實愚戇衾影恆自持魔事與魔民侵陵無盡時此心痛自恨克己將尤誰汝去逾半載執筆為此辭汝則聰慧人去去慎所之歸詹事孝儀畫像鳳鳴時一聞窅窕千秋長飛鵬上萬里重霄閟其光唶嗟天下士有道不得行丹青貌顔色攬圖神揚揚此中含誠明可以為世坊詞林枝葉大根柢誰持將風輪激海水日夜沃扶桑自非此理存斯文得不亡偉哉桐城公管領翰墨場春雲靄萬卉髙議無否臧有時屈一指詹事傳芬芳昔余知詹事公實告之詳所得副所聞歷久彌煒煌自聽山陽笛感舊猶沾裳公今謝政歸雲卧龍眠莊詹事有賢子繭足陟澗岡乞公一紙書細字森琳琅上言陳主恩嵗月游虞唐下言叙友誼斐然及文章謂非子一言實至名不彰余昧作者意念古徒傍徨七哀難可繼一慟有餘傷紀事畏掛漏選詞愁倉皇惟賢故知賢舉綱目以張以兹示來哲筆簡情無量題汪東山寫真聚奎堂中二十夕闈棘森如背芒刺况復冬烘鬼眯眼老夫耄矣嗟狼籍座中汪君壓萬夫手握隋珠奪秦璧文采風流貌有神蛟龍欲落搖空碧筆陳橫掃詞源傾斂我精魂壯心魄散若風雨飄雲烟聞君將泛五湖船衡門兩版晝常閉剝啄過我生無緣我時早出歸在夜軟塵漠漠吹華顛當歸不歸歸未得君歸卻是當少年丹青畫出好顔色攬圖對君猶依然我留此圖君不可回首春時院空鎖君是名場第一人來乎來乎思致身舟行舟行迷南北杳杳信所適但見東月生銀灣落帆席回首軟紅塵車馬倦行役及兹稍休駕涉境喜地僻浮家欲恣情羇旅畏滯跡遙看江鴈過髙舉雲中翮逝將跨黃鶴觀海先碣石風泊沙河玉杓指東風聮綿送逺道留帆潞河水氷澌欲盡掃舳艫行稍遲雲山歷更好微茫平沙流出沒回巒抱仰視圓月髙俯覺衆星倒六鼇奠坤維四海際蒼昊且欲觀長江未暇覽絶鳥從此涉波濤忠信以為寶放棹水宿無常程春氣今日佳篙師喜相將故棹河之涯一自發京輦登艫願始偕復此美烟景良辰天公排岸轉捷飛鳥樹過回奔騧初或礙淨目久乃增竒懷物象雖有變藴真無所乖君看六幅蒲何如十二街不動而謂動長年來俳諧舟中題李龍眠畫佛像歌龍眠畫佛誰可摹大等須彌細入無三十二相信有諸一相本無相乃殊千幅輪文雁王綺紺青宛轉珂雪俱耳門三昧詎易畫廣長之舌聲難呼平生說法不閉口一字未說驚萬夫師利再請遭佛詬清凉臺寺歸來乎居士作詩說法如以詩觀詩堪盧胡船窗水急日已晡微雲淡月光糢糊髙卧卷卻龍眠圖前塵分别心不孤天津北分水處放舟南行二十里夜泊漾舟今始佳分流波轉急津條近堪攀水華俯可拾落日滿孤帆餘霞帶輕楫鄙人耽幽懷夙昔寡遊集得此稍自娛風景亦屢挹采緑雖不盈臨川每獨立見月仍尚圓計日忽欲十慎持中夜心無使百憂入靜海弔勵近公侍郎公昔侍禁庭惟余日月至桐城解機務敕蚤暮勿離無何公卧疾池亭鬱把臂迄今行旅間凛凛佩明義初發抵津南靜海吾所志仲春九日夜宣召御舟次大艑換小艑輕風緩遙吹雲月互蔽虧漁燈照一穗丁東漏水聲旌門屢顛躓玉音下已久至尊坐不寐謂言公慎勤卅載獨勞勩今兹臨故居天書寫奰屭閣臣偕禮官議賜以令諡嗚呼公精誠更僕難遍記夜分始回船鳴雞覆奏事詔曰汝議可文恪標朱字大恩潤羣萌露雨灑蕉萃我衰如柳蒲本根幸䝉庇飄飄玉墀傍葉稀恐失墜日斜龍尾道顧影却欲避春流繞山溪吾生亦浮寄宿草何茫茫三年數行淚遙酹一巵酒匆匆絮難漬晚泊青縣懷勵文恪公山陽笛裏聲凄斷催人去遙遙河上帆渺渺烟中樹回首蓬萊宫髙話滄洲趣何處君釣遊逺道猶返顧滄州微雪河曲連烟村岸古鬱沙柳蕭蕭蘆荻花猶灑秋風後是時當春陽潤色上隴畝雲師豈無意滕六初試手微雪映鸛跡橫靄薄鷁首我行適江海臨深堅所守欲搴湘沚芳不醉滄州酒望中條懷吳天章條山蒼河水黃陽城諫議不可作白雲終古空茫茫滄州已過官河長時清無事容徜徉我思昔人遙相望隱淪更訪河之陽髙逹夫劉文房二子此地曾頡頏蒲東佳士吳天章新詩可與二子當此去中條踰千里髙才秀士知有幾吳生相近玉溪村干旌若賁事堪論論晉中詩人懷天章摩詰秀千葉柳州儼天人義山最崛起流别自有真上下五百載遺山接清塵自餘諸作者海山羅竒珍嘗鼎分一臠已足甘喉脣鄙人老無學枌榆私所親豈惟鄉里賢名與天壤新我初慕聖道矯首思河津緬維三千篇刪述埀千春大雅久凋喪風流隨波淪昔者卜子夏論詩河之濱沿洄溯洙泗餘潤沾窮鱗文章寧小技矩矱存先民以兹慰衰晚奮翼攀鳳麟既得金鵝子金鵝天章齊名刮眼辨玉珉子居玉溪上義山舊卜鄰况復龍門峻岧嶤臨髙旻執鞭今所願參駕豈同倫蚍蜉與大樹天賦理則均撼之適足笑安分不失身扁舟阻千里寸心無由申所期鄉國間詩教還清淳武城行行慕往跡况復聖所至此非費武城昔人以名識而我以其名寫此流覽意斜陽望極浦風帆渺河涘當時河未鑿絃歌繞平地雲天故如常陵谷不相似我來情實耽恐與曩者異覩兹屢怊悵悠悠起遐思轍環齊衛間西邁見簡子趙氏殺鳴犢臨河阻風義鄙夫本晉人丱角知靦耻我生謬好古千秋有恨事今此入征途頽垣傍沙水猶幸一笑留聖目所眄視誰謂沮溺賢滔滔同一喟榖城山在東阿東北五里子房年少時擊秦博浪中亡匿游下邳折節圮上翁期後十三載相見榖城東伏臘祠黃石此義千古雄昔夢黃鶴客綢繆蓬萊宫亦有山澤約俟我乎河嵩河嵩不可到榖城訪遺蹤扁舟渺然去但見烟濛濛觀汶水南北分流處昨行天津北汶水東流出今行濟寧北汶水西流發西流來不近及此初蕩潏南北忽分流北三分南七投木柿試之其數不一失悠悠百年後此豈有牽率緬想開鑿人用意必祗栗憑之儼有神不匱復不溢利涉通湖江倉庾衛京室盈盈一水間伴我已草日往路幸相從溯洄猶未畢有情若汶水生理向君說老夫今老矣往往情懷惡晨夕亦已久君應悉本末使我飲水心即事自欣悅分流水送人北歸分流水流濺濺行人到此寂無語别淚滴作分流泉我行南來幾千里多情送逺北河水北河相送去茫茫南河相迎客路長與君相别分流處春草春花易斷腸魚臺東境山水好山過客不知名好水圖經不入選我行魚臺山水間輕綃半幅平如剪連峰依人行欲近翠嶺橫天去復逺山青水緑畫新就道人宴坐却掩卷東行若更見麻姑不問蓬萊水深淺湖風行獨山微山東兩湖獨山光淨平練鋪微山宿雨春糢糊侵曉衆皺堆不舒初猶料峭成崎嶇既乃簸揚塵漲途神靈卷舌帝命敷大塊噫氣噓焦枯誰令如雷聲如呼摶鵬退鷁奔天吳下逮水黿鼉龜魚魴鯉鯊鱮鱣鯽鱸潛形息影四散逋罾網雖設愁三虞行人髙卧棲艦艫守湖使者前相於為言船行牛酒俱衁池肉屯神其娛我謂飛廉盍少徐錢帛已空單衣襦葷血不飽甘藜蔬村醪十日一懶酤神之清潔凌太虛餐霞吸露奚啜餔我斟河水奠滿盂生民正直神所扶作歌反風在斯須歌殘雨來帆影孤泇河詠雪春寒不歸柳欲催輕烟蘸水如青苔宿麥在隴色自好農夫荷耒爭黃埃河水沄沄可灌溉我欲手挽東流回惜哉老耄身無力雲師風伯多見猜龍公作意初試手映空小雨行裴􅏆土膏沾潤拜明惠縱橫忽訝紛瓊瑰資清以化本天德夾鐘之律猶飛灰表賀瑞雪吾豈敢詩詠豐年亦快哉淮南放舟抵金山作太行窈窕穿林麓千里相隨到京國我本﨑嶇山谷人泛泛湖河望平陸人生無奈是有情流水青山憶茅屋十日見水不見山今朝喜見三烟鬟船頭低昻如有意招我紫金浮玉間忽焉江天萬里豁丹青幻出峰巉巉鵾鵬摶風乍羈紲龍象截流猶崢潺靈巗湧出多寶塔隨身宫殿忘却還帝釋冥搜巧施設豈同工力煩人寰廬山面目在山外此山在水尤孱顔天下江山難遍到得此已足栖幽閒故山有夢不歸去江神抵掌笑我頑惠山泉和東坡追用唐處士王武陵竇羣朱宿所賦詩韻兼以泉水貽桐城先生三首昨夕發京口不踏焦山蒼今夕過惠山不登漪瀾堂昔者蘇夫子鸞鶴空翺翔邈然下江海泉水流雲光虛明見何色清淨聞何香今我亦栖栖塵影豈易忘水行亦近山清暉相娛人湖江去浩渺巖澗來幽新吾生亦聊爾與物無緇磷性僻耽佳句道逺泥客塵夜來濁水珠皎皎凌清旻永言沿餘波猶冀德潤鄰殘紅亞山坳微緑散林樾夙聞此中泉色味稱兩絶遣舟取一壺蕩槳烟明滅去山亦已逺傾水瀉山月眷言臭如蘭佳處相映發分甌隨清波川行靡定轍南園贈彭訪濂我行泊船來胥門銀濤日落昭關昏短衣走馬蘇臺北回鞭忽漫思南園南園近在故人舍剝啄相驚喜復訝開軒掃榻具盤飱二十年中一夕話酒䦨燈灺夜何其月出凉風吹白髭荏苒海山歸去路凄迷林壑到來時海山林壑差相似南園閲盡興衰事金谷花凋蔓草生平泉石散孤雲逝吳越舊國廣陵王此地豪華擅一方辛苦為園逾一世美人詞客盈髙堂前有麋鹿後狐兔元璙那復蹈其故如今亭閣盡埃塵菜圃紛紛野烟暮君家結屋數茅椽歸來手種南園田吳中相識亦無數與君似是前生緣六日淹留不欲去臨行執手心茫然吾生有涯知無涯為我試問南華仙滄浪亭次歐陽公韻清水濯纓濁濯足朅來髙詠滄浪篇歐子吟詩跡不到我今遊目亭依然應知結搆存古制故令閲世如循環喬木已疏閒弄影雜花交映春爭妍冷梅苦竹亦間發時有百舌來啾喧蘇君在日不得志精魂此地棲雲烟我生幸值休明運不應與子相夤緣嗟豫賦性慕放誕一枕喜遇龜兹仙十洲三島不可望天留老眼湖江邊公乎避讐如避冦雒陽豈無二頃田嵩丘萬古疊蒼翠洪河清濟波淪漣賢妻孺子飽蔬食那肯浪用公紙錢惜哉與時自齟齬汹汹人怒天須憐人生有命天所定屈申未了還聽天水清水濁源自異如金在沙玉在淵鬱於生前昌厥後回頭萬事輸醉眠自昔遺臭甘百世流芳故自經千年我來弔古君識取惡詩不用人間傳長水道中重題滄浪亭懷宋牧仲中丞昨吟滄浪詩祗作滄浪觀滄浪見野老語多頻雜亂短歌欲申寫挂一定漏萬謂言滄浪亭都堂公所玩公來活我吳百事費廉幹此亭幾興廢排墻亦畫墁公暇求古跡文字並堂按悠悠一千年人往亭亦換公曰但因之勿令滋漶漫作無侈前模成不張彩幔錢財出食餘俸祿計口算又言我蘇州正賦天下冠賦外曰火耗似是冶與煆不知始何年長吏恣壠斷始初輸一金四三分兼間後來至七八實重吳人患公曰悉除之無已稍及半猶然四三分亦可足私便人生堪俯仰何苦慕富羡大哉仁人言境壤謳歌遍是時行舟急野老相追餞殷勤再四語春鳩相鳴喚細雨荷鋤去枝詞為點竄回望滄浪亭旅泊客遊倦請公聽此歌諒不謂河漢自靈隱至韜光菴靈隱之峰世所稀天巧不煩人施為誰與妄者久雕鑿我今來遊長嗟咨藏嵐泄雲故宛爾徒令汝輩尋刀錐冷泉之亭蹟最古青松危石粲可數凍能墮指當炎熱深始出淵連厚土我今衰顔時復寒對此翩然欲霞舉為問此泉可飲乎僧言衆水泥塗俱接竹連筒致山水山上有泉如噴珠徑隨水道覔往路新篁紫籜森扶疏韜光之寺餘杭無浙江滄海巖前鋪斜陽不見海日出輕烟逺覺江潮孤江潮海日常時在行人速去山靈怪仙客何須歎寂寥岧嶤自與神明會雪山葱嶺杳何許渺渺恆河亦溝澮江山歷盡好安禪只恐兹遊不可再雲棲寺湖亭賞未愜言尋山寺幽巖溪杳微徑忽見長江流隨潮送逺目島浪海氣浮天開豁遙想路永生羇愁崖花方爛爛野竹何修修臺殿稀壯觀雲霞媚林丘道人棲此山了悟空中漚吾兹佩遺教息心將焉求婁東道中次韻西齊題夏重初白菴圖行行江樹驕春風誰識秋風待枯槁婁東美人青瑣客溪外落花紅不掃朱顔如渥鬢如漆亦解人生有衰老查田居士金閨彥心寄山林事幽討朅來畫作初白圖不將宴坐離煩惱吳生有文能逹觀弄筆吟窗展懷抱白髮白盡與初白所白不殊見顛倒縱道長安多少年富貴何須致身早感君清興寓瑶篇一為勞人慰草草查田漠漠望如雲征途不辨方與皂有似前年鎖院時看花時節冬烘腦初白之名名最佳白盡尤知白髮好四月三十日龍見於金山余月月夕明欲蘇金山傳漏方午餘微波吹江江水舒靈風􅘒吸雲四鋪蒼龍挾雨光有無濃靄畫出一縷粗自南亘北橫天樞度之十丈長自逾圓徑數尺不可摹白雲周遭中糢糊我未見龍誠有諸同時見者皆呀吁指㸃似有鱗爪俱倚空流盼爭斯須儻恍自北而南趨斂形就小尾不逋搖曳撇簸重雲膚天晴日晶景氣殊吾聞龍者德之符感應和氣遊沼湖自從羲皇河出圖榮光休至當有虞舜東巡狩龍當塗五彩負卷留舜車爾後寂寥栖八虛無聖則隱見不渝漢皇有道來不誣及其矯僞分龍豬吾君聖德同古初神靈表瑞盈亨衢作歌紀祥徴策書塵埃載筆愧雅儒與虞良嗚呼三千篇什一今尚存宣尼絶韋編於此尤討論好古述不作精意探化元我衰才思劣歸老道德源滄海不可涉沿流競追奔日暮失津涯霣涕流潺湲吾子誠賢哲夙植詞林根朅來二十載風雅方騰鶱樂志尋孔顔放意遊羲軒願言共晨夕相對各忘言惠濟祠觀河歌桐柏之山兮髙峨峨下有清淮兮泛濫多浩浩洋洋兮殫為洪河殫為洪河兮浮齧桑走臨淮兮騰維揚使淮水其安流兮河弗逆經之營之兮匪伊朝夕烏用白馬兮湛玉璧駕飛龍以周遊兮指舊川以為期彼滔滔兮來迎淡容與兮河之湄荷蓋兮驂􅀈登東陸兮遐思攬日月兮時正中奠四海兮將焉窮蜀山廣陵亦屢宿不到平山堂蜀岡如夢寐歸來心傍徨蜀山山磊磊蜀山湖洋洋蜀山萬丈青城長花明玉洞雲錦張峨眉插天兩相映仙經地志不可詳此山似是巨靈開鑿時殘峰斷嶺分擕將東置汶田西維揚汶水連綿浩渺茫灑作雲海東邊窈窕色巗岫噴薄天門傍天門髙髙日觀逺我欲登之日已晚此山此湖難久留丁東玉漏催方舟仙人騎羊跨白鹿雲中笑我來遲去何速空負青霞賞遙謝紫芝曲朱顔白髮已如斯歸向茅堂卧幽谷西齊遊城西南詩三首余見之因亦往遊焉次韻有作呂仙祠訪古悵秋城尋幽快仙閣即無黃鶴飛時見白雲落未能餐烟霞且欲飽蔬藿天人不可攀三復岩上作黑龍潭蕭蕭蘆葦花奈此凉風夕沙水入秋清松雲近潭黑朅來見海眼神龍所窟宅頻年禱祀稀憫我田畯厄陶然亭野水延清暉寺亭豁逺趣煙流鐘隨殷裊裊落岩樹聲聞竟何歸塵影此暫聚山僧習辟支吾向大乘住題牧仲冢宰西陂魚麥圖去年相别滄浪亭春水緑波春草青今年相見長安道西華夢想西陂好西陂烟水似滄浪我欲從之路阻長誰料軟紅香土裏幻出雲山翰墨場披圖最有江南意春月春風滿巾笥五湖三畝未歸人紅欄緑浪經過地滄浪野老别來久瓦盆酹酒為公壽想見攀轅卧轍情棠樹村村間花柳藤隂兩株今作家扶桑萬疊影不斜回憶西陂此時節釣魚刈麥荷有花鏡湖一曲天所賚也待行年八十外潞公未老魏公壯髙會耆英且莫讓因安溪先生寄梅定九處士待漏院中清晝長安溪閣老來平章公所薦士不可數宛陵處士尤芬芳梅君好古懷軒唐胸羅七曜包八荒御舟三日三召對懸河東注河伯忙老笨多時語屢誤聞此不覺神揚揚又聞日坐玉座傍龍箋捧出星日光賈生一見便前席劉洎何勞登帝牀丈夫遭遇有如此稽古之榮世莫比白衣宣至白衣還他年正可書青史昔我與君俱壯年交親氣概回雲天職在論思不能薦忽忽白首空徒然耆舊飄零萬事畢新知記一不識十如君幾人王佐才聖朝優老令歸來我今時節已晚暮江湖魏闕心悠哉人生會面難再得短歌長吟淚填臆若附音書寄李公為道良時須努力中條行金吾將軍八十餘直入延英門上呼中條山人事得已貞元亦是明天子我望中條思諫議小事不言言大事延齡奸佞陸贄賢外人皆知天下傳九重深閉不得見人言不信誰敢言金吾敢言帝肯聽一朝忠謇回唐天山人昔在中條久窮逹於君亦何有終南捷徑誰爾疑犀首無事但飲酒泉石烟霞世豈知折檻披鱗時亦偶千里中條日暮過迢迢回望舊巗阿秦山渭水不可見白雲青靄空復多登舟酬别宋牧仲太宰御溝屬瀛海馳道連大川流澌及晨潮解纜春風前湖江渺萬里似攬崑崙源巍巍居崇髙下念臨深淵羽衛靜無聲波濤平不喧息慮寡朝謁離羣曠周旋既慙隱淪樂尚慕肥遁賢别意方超忽贈處昔所敦維舟懷朱竹垞潘稼堂河關渺吳越一水行可至吳越有故人天逺浮空翠登舟夢見之明月照不寐老將歸田廬荒山寡車騎悠悠川路閒此行上所賜海潮動逸響津樹饒野意極浦來風聲枉渚蓄春氣永懷期明發旅泊展遐思河間道中懷阮亭陶謝吾生晚斯文厄橫流非君展心目千古誰冥搜結交四十載往往異沉浮京洛雖夙好雲山復悠悠及兹事行役聊為千里遊南浦草未緑青門柳色稠息軌陸塗疲鼓枻川路幽未愜隱淪想每懷離析憂逺烟生海樹孤月隱河樓懷人渺晨夕瞻言此夷猶倘惠瑶華音庶以永綢繆河間道中劉隨州故里瀛州百里路五緯生寒芒東有髙逹夫西有劉文房髙君不坎軻劉君遭謗傷更憐二子名差異無定千秋翰墨場惜哉二子生同地聲華並美誰能繼善善欲長惡惡短况復文章一小技我趁輕鷗刺船去隨州杳杳知何處可堪蹭蹬向時人得意猶為草頭露寂寞悠悠身後名為君三歎傷我情相如同時子雲老蒼茫掩卷涕縱橫南皮道中和京江先生楊村旅宿與客談江夏郭侍郎舊事詩伊余侍公下天漢桂舟容與海西岸敢云千里結同心自顧凌風矯短翰朅來惠我楊村篇孤篷日上流餘絢清文迢遞引芳音陳迹蒼茫起遐觀昔者遺腹華奎兒孿生兩兒事並奇楚王無子乃有二何怪悠悠道路疑楚宗奏上不得入楚王辨章恣抵巇中朝貴人習省事樂取軟熟誇嚅唲江夏侍郎勵風操居是邦也行則危但請勘王跡自白大義炯炯世所知親王不勘是何語四明一言兼八疵侍郎竟刺扁舟去舟膠凍水河邊住妖書告密何紛紛北寺南衙莽錯互金吾緹騎夜如飛十口孤村墜霜霧百年青簡誰為編蕉園遺藳猶如故覽公新詠一髙歌弔古懷賢寄興多杜若洲長烟樹逺相從無奈暮愁何吳橋道中題劉隨州詩寄查夏重望望東陽城曖曖將陵樹我慕劉隨州清詩美無度此地揚蛾眉同生逢妬嫭惜哉後來者耳食狥好惡非君誰與言佳期不可遇行行已晦月離心馳永路長川雖暫娛大江欲飛渡故人來何時春水悠悠去德州道中寄繆虞良前年共君來吳地芳草菲去年送君去燕山木葉飛今年此懷君春帆凌浩渺燕山在青霄吳地限江表雲中岱宗出天際黃河流嚴程赴長淮王事有淹留儻入京口船應泊楓橋夜南園昔所經髙齊榻可下曙窗語烟禽雜花滿故枝君其尚能來正及前年時水宿水宿溪渚幽晴暉入枕席何異巗棲時夢醒一畝宅雲雁去屢遙沙禽方自適散帙坐清曉塵務罕見迫願言謝朋徒從此解纓舄暫陟泰山髙欲訪勞山僻仙人豈我欺我名挂玉籍縱未證無生亦復往息迹千秋幸若斯結歡慰于役紛吾慕逺遊沉憂竟何益白雁行我有錦字書欲寄歸鴻語歸鴻入雲長超忽不可數前行雙白雁眼明粲可覩實秉皎潔姿非因霜雪苦一雁俄後飛單孤不成侣本欲託音書翩翻自無主將書置懷袖淚落三春雨南旺分水行導淮桐柏會泗沂東流於海禹所治趙宋黃河決而南淮與泗沂兼併之河於中土一大物况挾衆流行恣睢爾後六百有餘載多為世患違津涯吳艘越舶亘天來神京陸挽人驢疲偉哉潘生伏下職建言為國陳良規濟寧同知潘叔正建言開河通漕運宋公舉事不漫浪宋尚書禮下采羣策褒參禆是何老人白其姓厥名曰英超等夷銅壺倒影測纍黍玉尺量地窮四維老人白英建䇿分水河灣接流二十里北走千里誠一奇我行南旺分水處此豈地利皆人為百川朝宗盡東下却與西北浮雲馳君不見漢漕山東百萬粟更歷砥柱多險巇又不見唐挽江淮道汴洛濁濤惡浪紛追隨泗沂實與汶水合禹跡不湮勞川師洪河德水寧有二細流不擇成大陂古來萬事亦如此短歌微吟風漣漪次濟寧有憶漕水向北流春草日夜緑今朝水南下緑草連湖曲湖波淡淡草萋萋北去南來人解擕臨風欲采芳洲寄歸雁何由到隴西仲家淺望嶧山作言過仲家淺仲廟河水傍嶧山對廟門百里來青蒼影連初日動勢接春水長遙峰插天漢空翠分崕岡不覩泰山尊爭長雄東方歘吸亘南戒逶迤趨西疆豁然去欲無林巒鬱回翔掩映仲子廟千祀嶫相望我兹在川上漾舟涉微茫前浦行修途未登洙泗堂生不逢孔子日月依末光扣舷問漁父夕照明滄浪古意二首春草隨長陌年年著舊痕教人歸未得且莫怨王孫單飛不作行單宿不同處記得雙宿時前年舊洲渚徐州道中二月十五夜月一身為太虛明月在其裏天邊見明月太虛復如此仲春三五月宛是前年明明月不改色所見有虧盈泊舟清口凱公學士惠以篇什即事有作淮水生桐柏及此勢屢變金波帶餘霞翠紋回淨練烟深色逾澄夜久光不眩滄滄已朝宗滚滚復春見持此皎潔質得與潢汙薦眺逺意少悰撫景興寧倦一身為虛舟孤懷託才彥秀眉揚芳風清言發雅倩髙文迥朝列新詩廣篇翰思君如淮水干里才未半淝水出其側百里日已晏上窺河漢流下照星宿爛夕靄辨經途晨暉戒申旦稍知逹人心聊同性所玩渡江見焦山有作懷林吉人江流近海迎朝暾焦山蒼蒼當海門憶君焦山古鼎篇勢凌海日傾江源金山樓觀特瑰麗撞鐘伐鼓風濤喧我行再過焦山下海雲堂中空夢魂兹山不到屢惆悵懷慙竟踐蘇公言惟我於君亦如此知禰不薦昔人耻只有思君日夜心長江湛湛東流水登報恩寺塔大海漚滅無虛空多寶古塔何獨雄金陵南郭長千里髙標屹立滄江東昔遊不到去惆悵使我情想紛難窮浮生萬事皆顛錯更堪筋力枯秋蓬眼明忽覩琉璃影陡覺兩翼摶長風捫星歷斗涉清漢倣佛似已凌蒼穹吳宫晉代那復道三山二水烟濛濛曼陀優曇灑香界野花閒草徒䝉蘢夙觀勝因悟淨理身雲湧現空明中諸天龍象亦偶爾豈與人世爭沙蟲登臨浩歌日欲暮歸途且逐春塵紅惠山泉青林欲斷蒼山起山色沉沉出泉水散作清暉百道飛逺映千船萬船裏急呼雙槳快幽尋清賞迢迢愜素心溪邊靃靡披瑶草石上潺湲寫玉琴我行吳越千山道春山處處流泉好玉牀金井紛徒然一酌清泉可終老山僧知我再來情汲泉遣致雙瓷瓶黃泥赤印漫天下見此雙瓶信可憑龍團手試清漚發引滿浮空對明月七碗一飲不盡興夜來少睡心愲愲摩挲雙瓶為三歎我自愁多豈汝怨提擕珍惜向故山折腳鐺中煮粥飯石門舟次桑葉緑溪隂映我孤篷去飄搖楊柳花千里隨來處及兹契幽情那得問新故柳條攀更生桑枝亦已附物理信有常人意莽更互超忽不可尋沉沉戒往路武林歸舟懷龍眠先生前年同宿浮玉山海風吹月照别顔蓬瀛縹眇不可到大江東流去不還今年相别闔閭城寒烟漠漠春水清滄浪亭上白雲古古人今人無限情歸舟一夜武林道夢回枉覺湖山好老去那能五嶽遊茆檐竹簟自悠悠不買蘇卿二頃田不搆元龍百尺樓一邱一壑足遊釣摧眉折腰謝年少短歌聽者龍眠公緱嶺仙人獨長嘯平山堂我浮大江來回望江上山山逺翠猶送江去潮復還江山遞明滅暝宿茱萸灣訪古平山堂水竹清心顔遂登堂上樓江流山色閒是時夏景殊雲峰爭烟鬟歐公千載後何人共躋攀風流寄欣賞寬簡蘇㷀鰥豈惟雄文字實將激懦頑門前清渠水至今餘潺湲留題渺何處似有墨痕斑夢太白五月初六日作太白天上人入世思沉冥昔過酒樓下扁舟繫客情昨夜忽夢公千載猶崢嶸花月十年醉聲名一日榮十年花月西園醉一日聲名北斗髙豫庚午嵗夢中所得句也此義我贈君出處亦甚明年至不歸去惜哉身後名風雅亦細故所患在有生無生斯無死天人渾一成餘語不可悉孤篷急晨征明當過酒樓靈爽使人驚魯郡南泊舟寄龍眠先生龍眠公龍眠公長江與子分帆風君向江南歸我向江北去别時雙纜解流潮潮回不到長淮路微生著處如浮烟那惜飄零限江樹舟中得病萬慮空十日卧渡黃河東感公勸我舒懷抱有同慧日開愚䝉人生踏地莫憂老兩腳能行便是好此言未寒吾已踐為樂從公苦不早泰山髙滄海深鳳歌邈矣不可尋榖城黃石圮橋水千古惟公知此心汶水舟中寄阮亭朝發濟水南暮泊汶水東思君如流水日夜隨征篷征篷雖泛泛所歷物象雄遙望泰嶽雲孤撐摩蒼穹澒洞出逺岫飄颻乘長風灑然忽歸來星月相朣朧卷舒亦何心託興將無同尤憐汶水淨清波映玉虹解作西北流千里浮烟空縱復雜行潦皎潔含冲融低徊赴滄海意若無成功奔潨謝衆壑浩蕩將焉窮對此感離别與子期鴻濛題寄齊尚書雙松五桂圖公才天所篤矯矯凌雲姿班朝面槐棘青春貫四時紫薇間紅藥香與清風吹而我攬此圖霜幹含芳滋喬松表遐心粹然君子儀嵩髙千丈齊百木紛離披下䕃丹桂花松前開五枝譬彼芝蘭秀玉樹連軒墀畫師巧用意根葉相猗猗逹人體造物至德通皇羲雨過長卉草陽回傾藿葵功宣化自洽感此動植知公其佐鴻鈞斯理更不疑桃李豈有言成蹊如路逵一唱松桂篇或可絃聲詩蔣南沙宫贊畫紅牆下小槐樹飄颻塵外跡清賞寄草木迢迢紅牆隂芳樹騁幽矚天秋衆卉凋見此生意足風葉留餘暄霜餘灑新緑瑣窗展書人寫生盈簡牘委身垂華纓結念同林谷持畫對芳樹宛在山澗曲題林吉人北阡草廬圖草廬之圖雲龍蹲下見閩海橫飛翻海山隱顯走萬里出沒日月旋乾坤開闢以來奠鰲極漢家拓地秦東門自東以南海氣昏扶桑弄影萬象吞流球南交可指數十步五步如烟村天作嵩髙東鼓山勝概如此難具論林生惟嶽降有神矯如威鳳初騰鶱德輝逺覽翔欲下裴􅏆返顧西山樊松楸鬱鬱枌榆古嵗時伏臘陳樽俎築堂丙舍兼家孰絃誦殷殷答石鼓漢家寂寞東西京二十四帝無抔土生也邱墳四百年名流輩出繩其武君不見劉郎石馬泣秋風相如凌雲氣如虎半日村以詩代書答張麋田白東谷先生嘗盛稱張門前芝草鹿麋田之句因遂字之以麋田朝謁得幽蹤逺心展阡陌袖中一紙書清言想平昔門外鹿麋田千里在咫尺芝草秀嵗寒元氣肖翕闢蘿蔦因風翻靈根詎蕭槭已從白社招孰假元纁辟悠然人世寬不覺天地窄念子如孤雲託以桑榆夕尋暢樓詩為吳孟舉賦南國有佳人髙步凌太清周覽四荒外延佇臨層城層城十二樓一樓何亭亭迢迢若木枝拂我東簷楹銀河水清淺欲落當窗橫散為三江流下與吳山平還顧蓬瀛間海月灔灔生登兹俯百川川上月俱明我心正如此皎潔含至精春月與春風四序相回縈伊昔遘嘉會歡言邁羣英客亭載酒時題樓聞令名厥名曰尋暢此理可服膺别來四十載宛爾嵗寒盟松柏千年姿寧羡桃李榮彼哉塵壒事邈矣浮雲情持用祝眉壽諧之金石聲三峽流泉歌為曹鍊師作惜哉髙漸離燕市擊筑徒爾為却笑陳梓州瑶琴椎碎求人知老夫埋名燕山陲有客抱琴請賦詩自言此中可度世三峽流泉挂我青桐枝聞公有雅志髙枕談庖羲鴻濛閟元氣彈出七條絲不論髙山與流水一丘一壑庸詎奇蓬萊方丈可徑到阮公仲容儼在兹何用仙人赤城杖騰駕自有長風吹是日空堂花落時一彈為我生顔姿寂寂幽窗語沉沉若有思豁然野曠當簾帷琮琤萬馬搖金羈奔崖走石幾千里五丁運斧神工施飛泉漠漠皎如練銀河倒下清且漪楚雲窈窕作變態挾將暮雨凉侵肌章華人去細腰盡仿佛似有猿聲悲終彈使我再三歎師今年少紅兩頤老我衰颯雙白鬢故山有約相參差感君古音發妙指狀君雅調無妍辭攫深醳愈各有以鼓琴直可還春熙史胄司端尹奉使南海却寄昔我北鎮奉明詔東上海樓俯清眺海水沄沄不滿眼望逺倚樓獨長嘯三十年餘一瞬過回頭頗惜朱顔少驅馳未盡登臨意逼仄依然卧蓬藋今君南海使再行往事不殊官同調昔豫亦以詹事奉使少壯能為萬里逰山行水宿向炎洲黃木灣徑扶胥口紫瀾碧浪堆陵丘祝融冠冕儼王者視諸海神如公侯使星所臨氣暗靄方饗拱揖若有求只今天帝眷四顧中原黎庶安鉏耰海波不興嵗屢稔五榖飽飫魚蟹休蜃樓蛟室盡帖妥實惟廊廟思遐幽八極大瀛在懷抱兹海一泓才浮漚曰歸此意逹帝所精魂恍忽神光留使者詩盡人間意入海窮摉百靈閟韓公之碑蘇公詩如子之才端可致仙人託興雖偶然莫使斯文但游戲歸來歸來玉座髙直上青天展鵬翅午亭文編卷七
