body:
  text: 午亭文編卷一大學士陳廷敬撰樂府朝會燕饗樂章十四篇并序康熙二十年十二月定饗祀樂章詔禮部翰林院議明年正月尚書臣帥顔保學士臣陳廷敬等集議言郊廟樂章世祖章皇帝所親定臣等不敢變易獨朝會燕饗沿習前明典章未備祈勅下臣等考古樂之原定聲律之節作為雅歌用昭盛美詔曰可於是禮臣曰此詞臣職也以屬臣廷敬臣待辠掌院事乃集諸詞臣謂之曰廷敬材能淺薄不足以光制述之事樂歌之作無如公等為宜諸詞臣固以讓臣臣不得辭嘗考古樂之備者莫如詩朝會之樂正大雅之詩是也燕饗之樂正小雅之詩是也漢以來失雅詩之義魏得杜夔所傳古樂四篇遂倣鹿鳴作於赫篇以祀武帝倣騶虞作巍巍篇以祀文帝倣文王作洋洋篇以祀明帝則直以雅為頌且亂以風又烏能得雅詩正義乎晉以後去古雖逺間存雅詩之遺逮梁武帝南北郊明堂太廟三朝悉名為雅則是頌聲亡而正雅之用混也唐分雅俗二部然所謂雅者以别俗之名耳其實皆俗樂也宋郊廟之樂曰安其義亦猶唐曰和隋曰夏也而朝會燕饗之樂亦以安名詞皆短歌其亦猶有雅詩之遺意者與惟六變之曲聲調靡曼實皆五字長句也及乎明之樂無有足觀者矣我朝郊廟之樂名曰平今臣所撰樂章實先定名義朝會皇帝升坐曰隆平還宫曰顯平萬夀升坐曰乾平還宫曰泰平元旦升坐曰元平還宫曰和平冬至升坐曰遂平還宫曰允平小宴升坐曰協平還宫曰興平郊祀導迎曰祐平廟祀導迎曰禧平謝見曰慶平外藩謝見曰治平雖略倣乎宋而要皆以雅詩之義為準至於六變之曲則槩無取焉臣又嘗誦正雅朝會之詩曰無念爾祖曰無遏爾躬燕饗之詩曰視民不佻曰徧為爾徳㒺不盡其反覆丁寧之意而不専主乎鋪張揚厲之辭臣雖愚陋竊取此義故十四章之中所以陳述天命之不易大業之艱難者雖不能盡其辭亦略舉其指焉臣不任皇恐頓首謹序朝會皇帝升坐中和韶樂作奏隆平之章赫矣天鑒眷求惟聖保右我清既集有命假樂大君天位以正莅下有容監于萬方念兹崇功駿命孔常右隆平之章十句皇帝還宫中和韶樂作奏顯平之章於昭三后誕降世徳亹亹我皇克艱衮職治定功成中和建極龍飛在天鳯儀于庭式奏王夏垂億萬齡右顯平之章十句萬夀皇帝升坐中和韶樂作奏乾平之章二儀清寧三辰順則維帝凝命函冒區域仁恩廣覃訖于動植久道化成隆功駿徳聖人多夀年世萬億右乾平之章十句皇帝還宫中和韶樂作奏泰平之章鑒觀惟徳丕命惟皇肇兹夀域薄海要荒物性育茂謡俗樂康冠帶之國望斗辨方曰惟萬年同于昊蒼右泰平之章十句元旦皇帝升坐中和韶樂作奏元平之章於穆元后敬授人時四始和令三陽肇基鸞路倉龍載青其旂迎氣布徳百工允釐行慶施惠及我烝黎右元平之章十句皇帝還宫中和韶樂作奏和平之章有奕元會天子穆穆蹡蹡羣公至自九服正朔所加海外臣僕率土恵懐萬民子育千齡億祀永綏茀禄右和平之章十句冬至皇帝升坐中和韶樂作奏遂平之章乾符在握道轉鴻鈞天心見復物始資元景長舜日紀協堯春玉琯應瑞寳厯肇新衆正在位輔翼一人右遂平之章十句皇帝還宫中和韶樂作奏允平之章皇帝在宥一陽斯溥淵黙臨朝天職修舉君子道長駢珪聮組占日書雲産祥降嘏宜暘而暘宜雨而雨右允平之章十句小宴皇帝升坐丹陛大樂作奏協平之章聖皇莅止穆穆皇皇百爾卿士章服斯光吹笙鼓琴式燕嘉賓萬福既同歸美一人右協平之章八句皇帝還宫丹陛大樂作奏興平之章湛湛露零維豐之芑猗與在公思皇多士宴示慈恵以洽百禮敬慎威儀福禄來只右興平之章八句郊祀導迎樂作奏祐平之章皇天有命列聖承之我后配徳文匡武綏海隅寧謐神靈宴娭於萬斯年流慶降釐右祐平之章八句廟祀導迎樂作奏禧平之章於皇紹烈累熙重光銷鑠羣慝我武奮揚肅肅清廟峩峩奉璋奠鬯斯馨祚命無疆右禧平之章八句謝見丹陛大樂作奏慶平之章皇覆萬㝢品物咸亨九賓在列百譯輸誠濟濟卿士式造在庭帝仁如天帝明如日親賢任能愛民育物禮備樂成聲教四訖右慶平之章十二句外藩謝見丹陛大樂作奏治平之章天盡所覆以畀我清我徳配命涵濡羣生萬國蹈舞來享來庭俁俁僔僔視彼干戚天威式臨其儀不忒右治平之章十句獻平滇雅表一首臣廷敬嘗誦詩見大小雅六月采芑江漢常武皆言周宣王南征北伐興治撥亂以定四方平天下之功臣嘗竊歎以為如詩所載可謂盛哉後讀栁宗元平淮雅表言宣王之形容與其輔佐由今望之若神人然直以雅之故也臣按宗元意以謂宣王定四方平天下苟非其臣尹吉甫召穆公輩作為雅詩傳之于今今雖欲望宣王之形容及其輔佐之盛其道無從而宣王定四方平天下之功亦不能赫赫必傳於後世烏虖宣王之功後罕匹矣迺推較往古驗之方今功徳盛隆邁于周雅而適無有尹吉甫召穆公其人播為聲詩彰大其道其何以昭宣治績丕揚成功傳之於後然則雅之作厥義重矣哉臣伏見皇上文武神聖天錫智勇光宅天下奠安八荒仁威所加率土内外㒺不讋服乃有孽臣潛伏伺釁煽搆禍亂震摇我疆圉俶擾我人民皇上赫然一怒命將授鉞頃年以來定秦隴降閩海平兩粤收巴蜀天兵所向次第告捷而滇逆竊據南楚實為亂首皇上神機中斷指授規略埽清湖湘進克黔南破堅摧險直薄滇城之下師久不解朝㫖督進軍麾一動氛祲消滅皆由廟堂動㒺遺䇿是以疆場舉必有功海外怖駭臣黎懽躍太平之會實當今日臣嘗計滇逆之興亂干誅也耗糜帑賦私籍甲兵招納亡命擅行威福尾大不掉反勢已成正如漢削七國唐縱藩鎮蚤發則易圖優容則難拔故三藩之事聖慮先覺不辭大創之勞永奠萬年之治臣所謂功徳過於宣王而大雅不作不勝惑焉顧朝臣至多豈無尹吉甫召穆公其人者以颺大清之盛美於無窮臣獨何人敢専斯事然臣備員法從尤以文章為職業不得以能薄材謭不足以自効為解謹撰平滇雅三篇再拜以獻臣廷敬誠惶誠恐稽首頓首謹言平滇雅三篇并序岳湖逐冦也岳湖洋洋我武洸洸謂南有藩無敢撼我疆岳湖滔滔我武嚻嚻謂南有藩無敢闞我郊一章我疆大矣我圉溢矣牙蘖其間竦棘合蝟昔我南藩化為異類二章帝曰大君以覆以載推食以食解衣以衣遷之善地勿剪勿拔三章彼惟狂昏狡焉生心肆為誅首啓戎于南如螳奮臂如蚋決眥首仰臆張如豕斯鷙四章惟帝咨嗟恵威是崇薄往禽之孰佐予功予矜下民救此一方取其殘凶是類是造禡于臨衝楛矢敦弓五章我弓我矢靡旌摩壘兵無遺鏃耕無失耜天塹茫茫限此江水既斷其趾且斬其頍六章盗負險阻距趯躍踉翾飛饑歗羽翅以張候在太白占于天狼我涇我隴是震是驚七章維彼閩粤波盪海垠帝屢下顧哀此墊昏盗往連結倚以父母乃餌乃誘乃為盗守八章帝援天矛鎩羽截鱗嶺海革面䝉羞來臣禽􅕝于威柔肌于恩盗失厥助飛魄殞命九章老雄野死梟雛棲棲巢湖飲江傾摇于波爾居臲卼我步逶遲大袒髙驤賊焉遯逃十章洞庭湯湯岳陽峨峨載驅載馳爰拔厥家十一章惟人歸徳惟帝之謨窮經窟宅是剪是屠我武燀燿式廓鬼區百蠻萬國傒我來蘇十二章岳湖十有二章八章章八句二章章六句一章十句一章四句湘東克衡也衡盗倚為巢克之武功將成也師踰于江于湘之東師如雷馮震衡岳以尊一夫為逆多方則病播虐抗有徳我人斯奮卒歸厥命一章歸命伊何衡人之災衡盗所家追奔逐北犀甲雕戈虎旂龍節天威所加二章帝臣如虎帝師貙武烈烈旓旌淵淵金鼓嶷嶷綏章嘽嘽戎路莫我敢拒三章右刈武陵左埽星沙磨崕岣嶁我功孔嘉戎馬晨服候烽夕遮劋絶惡本敢遺萌芽四章其恃楓木其恃辰龍震之拔之自西自東陟嶺踰徼于山于川逺招邇歸囚豪解顔五章東西合師進次于沅孽童日蹙怙兇忍頑左擣其虚右攻其堅載闢載祓會于中權六章既克于沅沅人媐媐如日之昇如霖遇晞以肉其枯以勍其羸式歌且舞以樂我師七章南訖羅施來迎壺漿鳴鞞銅鼓洗兵盤江彼冦輿屍晝匿宵奔滇人荒荼待我于門八章凡此滇功惟斷乃成古者推轂梱外以行今者决勝一秉廟庭孰是遺孽而厪睿明九章師徒渾渾漸集于滇惟天威式監官臣恪守乃獲其醜保大定功流聲焉窮十章湘東十章一章九句三章章七句六章章八句滇池盗伏于滇師受聖䇿平之武功成也滇池洶洶帝乃平之匪彼元戎惟帝之功髙居北極洞視下方惟仁智勇克靖萬邦一章帝命臣塔汝從西粤急擣其窟塔拜受命銜枚束刃環滇其來龍駭鵬鶱軍聲轟然如墜自天二章帝命臣里汝從巴蜀橫剪側入里拜受命量沙追蓐有疾其驅無暴我邦踣柵跐壘言壁其東三章帝命臣泰汝從黔趨惟此蟊賊數載曠誅汝將士用命賊其敢逋泰拜受命于皇之訓四章我旐我旗于苗于蠻度幕輕留彌險蔽闗奪其阻隘掀其籬藩獸窮負嵎我師固以完五章帝命我師勢為掎角麾城摲邑萬里手握維彼鷇麛敢抗喬嶽維彼萌枿敢傲霜雹六章彼枿繁矣于焉蟠根雨露既濡忘帝力之勤聖人神武施設芟夷斮彼梟驁張我熊螭七章傃鐔批亢下甲陷堅箕張翼舒合圍于原獸窮于阱人或獸哀快彼凶醜覆卵毁胎八章帝曰吁嗟勞我人師日費百萬大農不支滇人望拯如餔療饑載礪載攻天䇿攸宜九章孟冬月杪師薄于城降旛夕竪逆駭縱橫林野塗腦郵驛遞顱滇人歌舞于屋于衢十章夜半捷來天心惻楚閔憐下氓罹此荼苦我將我師于野暴露布恵醻功急疾如火十一章于廟于郊其儀孔熾華俎腯牲永言昭事都人士女白􅙕黃童歡呀噎笑祝我聖躬十二章帝曰歸來予開明堂制禮興樂登賢拔良孩養無告施厚仁滂熙我庶績綱舉目張永萬斯年率由不忘十三章滇池十三章十章章八句二章章九句一章十句北征大捷功成振旅凱歌二十首并序日者皇上北顧邊陲永惟戡定聖心獨斷決䇿親征羣臣震悚表請遣命將士毋煩車駕逺行䝉詔㫖開喻弗允臣廷敬伏念皇上為天下勤勞歴涉沙磧躬莅戰陣而臣下晏然安處其何以自寧於時奏乞扈從仰䝉天心矜憐謂臣年力就衰恩㫖下頒臣恭聴之頃不覺涕零伏念臣以衰薄不克備戎行効職役今者天戈一指兇醜破滅朝至暮捷功成漏刻敷天率土㒺不懽忻臣受恩髙厚無所報稱惟譔述文句以導揚盛徳於萬一而臣愧非其才惶恐踰時復不能自已臣伏見皇上覆育四海撫有萬邦東西朔南懐仁歸義聲教所通遐荒異域侯王君長稽顙闕廷至若聖略天威武功丕顯御極以來平察哈爾定三逆取臺灣服倭羅斯收喀爾喀埽蕩邊塵廓清疆宇固已烜赫炳耀亘古今而昭天壌𢎞恢服而奠生民矣迺厄魯特噶爾丹者違我徳化自絶生成梟獍猖狂侵我屬國洵法所必討師出有名皇上躬御六龍親䕶諸將驅鷹揚螭虎之士臨大荒盡窮幕風行電激聲震雷霆而天申顯佑百靈効順風雨不驚水草應候時日吉良士馬利賴殱廿年逋誅之冦建萬世不拔之功此誠開闢迄今簡冊所宣布宇宙所流傳聖績神猷曠古無匹者也臣雖不能侍行幄至營壘親見剪獯屠戎之盛猶欲形之篇翰製為詠歌以敬颺我九伐之光明亦臣之至幸也謹按王師大獻奏愷樂周禮始著其義釋者曰愷兵樂也司馬法云得意則愷樂所以示喜也漢有短簫鐃歌魏克官渡晉征遼東皆製歌曲被之聲樂凡以諷道戰伐之事而申冩三軍凱樂之情唐栁宗元有鐃歌鼓吹曲宋有姜夔聖宋鐃歌曲皆其所自作以進之朝廷此皆古體詩也然自岑參劉禹錫諸人已自以今體為凱歌聲調具有風雅之遺臣今竊取宗元夔進詩之義詩用參禹錫之體作北征大捷功成振旅凱歌二十首臣目雖昬眵勉自繕冩字畫蕪穢仰塵慈覽臣不任榮忭不任兢惕之至皇家本意為銷兵刻日邊沙一戰清九伐元從天子出翠華親總六師行聞道神功斷乃成盈庭連表諫親征誰知聖算髙千古一著戎衣定太平蕭蕭龍笛出闗聲雲斾晴翻朔吹輕十萬羽林眡夜月迴看北斗挂南營汗馬河源飲欲乾夕陽萬竈冷炊烟玉鞭應有山靈䕶指處三軍見井泉宜暘時節草芊芊便是窮荒大有年風伯雨師齊効順可知聖徳格皇天算得西營計日糧玉音纔罷見封章懸知宿飽三軍士金革銜恩在戰場祗為生民事逺征前軍馬上捷書成絲綸簿載蛟龍筆批答人知出塞情月上旌門映細旃旄頭影落斷狼烟尚衣髙鎖黃金甲長記龍韜決勝年開拓邊疆四接天職方環海浩無邊黃雲萬疊青霄外收取山河直到燕苗格于今正七旬兩階干羽更森森全收瀚海為靈囿要置天山列禁林幕南庭北接王畿一道清塵㨗騎飛四十九藩先拜舞朔天生飬在皇威漠漠雲随露布生人知天意為親征朝衣半溼蒼龍雨㸃㸃分明浄洗兵迴軍吹角罷連營疊鼓風多破陣聲冩入天朝新樂府流傳奕世見昇平武功文徳並崔巍聖藻篇章每獨裁萬古燕然留片石磨崖共仰勒銘迴春歸苑樹别長安六月龍沙草露漙邊栁千條花萬朶一時留助凱歌歡今來楊栁正依依昔去闗山雨雪霏魚海輕陰猶未㪚五雲常繞六龍飛天廐驍騰汗血斑嘶風别去籋雲還𤓰時不遣黃龍戍苜蓿青青意自閒九邊萬里抱神京地盡遥荒戍不驚夜夜闗門開曉月天家本不用長城劍花弓月拂雲還歸路邊庭障塞閒數首新詞翻鼓吹凱歌聲裏舊闗山帝徳天威日正中九賓王享百蠻通炎黃以降多青史萬乗臨戎第一功謹獻大駕三臨沙漠親平僭逆聖武雅表一首臣廷敬伏見我皇上撫御萬方盡有四海内外恩徳鴻龎聲教遐暨比年以來天下宴安而推溯武功所由戡定則誅三逆以平滇黔粤閩楚蜀外闢察哈爾臺灣倭羅斯喀爾喀之地幅􅊷之廣超越前古治化之隆巍煥莫並今神謀獨斷聖武布昭伐罪救民躬行天討大憝授首餘黨歸誠厄魯特全國蕩平捷書至日雷動嵩呼中外臣士閭巷小民㒺不歡欣忭慶盖是時車駕親征馳驅戎壘凡三出朔塞矣當天衷决䇿初御六師中朝悚慄僚庶攀留臣以年力就衰䝉恩矜憐弗允扈從之請自是以來祗遵成命不敢再凟天慈而違離聖顔日夕䖍惕伏念皇上為天下掃除殘賊為邊疆永致廓清跋歴窮荒經涉寒暑勤勞軍務旰食宵興而臣子安居略無寸効今已無事言念國恩無所報稱猶欲俯竭愚誠撰儗文句敬颺聖烈之無窮而臣媕鄙無學尋繹累日莫知所擇竊惟自古帝王有功於天下其名聲彰著於後世者方䇿之所紀載金石之所刋録聲詩之所流傳後之人覽其事而遐想其盛焉是以昭昭然若昨日事也然而其盛者亦不數數覯矣阪泉涿鹿以還古今稱善用兵者漢之髙帝唐之太宗皆自興事之始乗時搆會底於成功若我皇上聖徳而踐天位躬居大寳志切生民仁育羣倫義征不譓尊臨九重制勝萬里天威所至攻戰多方撲滅兇殘蕩埽巢窟宿冦遺孽一朝頓除伏卅載之逋誅樹九邊之壯觀殱其渠魁降其支黨燧烽永息亭堠不施曠古難平之部落盡為臣僕普天所有之土宇咸入版圖自此寰海清平兆民樂業集萬年之鴻慶成千古之大功臣仰窺聖烈俯稽往古漢祖唐宗起於側陋角一時之雄乗末流之敝雖精於兵事而我皇上文謨武烈聖徳神功實逺邁前徽矣若夫書冊所載既有天下優游宫禁之中不過遣将興師身居其逸坐收其效間有親征如宋藝祖之北伐明成祖之行邊宋則失利明則鮮功是以方䇿金石聲詩之文仿彿儗比可導揚盛美之萬一者盖徬徨震掉而莫知所擇焉求之於詩惟周宣王身為天子南征北伐有定天下之功雖淮夷諸小敵未為甚難平之冦而玁狁之伐止於太原皆命臣士以行事蹟殊不類然其臣詠歌之詞孔子有取焉唐臣栁宗元本其義作唐雅臣於嚮者滇逆之平不度固陋竊取其義進平滇雅曾上塵聖覽今臣伏思後世鐃歌鼓吹之曲未足以盡聖武之形容仍依古體謹譔大駕三臨沙漠親平僣逆聖武雅三篇繕録以進臣之愚意固以敷宣人事之盛美而其義則歸本於天我皇上即天也覆載照臨雷霆風雨天之所以為道栽培傾覆治亂侮亡皇上之所以為功彼噶爾丹自外於覆載照臨之内干雷霆之誅絶風雨之澤盖所謂逆天者亡也我皇上天威所臨賊始則沙塲糜敗妻孥磔屠繼則衆叛親離孤雛就縛其卒也我皇上親揮將士廹抵賊巢賊知逆天必誅飲藥自殺遡始訖終我皇上馳驅萬里勞苦艱難若非親征大舉必不克迅致膚功此人事也即天也至若晴暘以時靈泉表異水草應候百神致祥旋師之先甘雨灑郊飲至之日雲陰開霽臣僚擁道恭迎都人父老孺子瓣香欣躍愷樂慶成臣推本於天之義由兹益自信焉臣不任榮幸歡忭之至聖武雅三篇并序惟天初臨沙漠安邊靖冦破敵大捷行慶于民振旅還京武功盛也惟天惟帝惟帝乃天盡天所覆我徼我邊何彼逆鷔為我人患帝自伐之往取其殘一章衆曰至尊毋勞萬乗我師武臣孰不恭命帝曰吁哉自昔弔民如水斯溺如火斯焚二章帝謂卿士朕必親往彼惡貫盈煽虐滋廣𢷬其腹心離其支黨安我荒服除彼狙獷三章諏春吉日是類是宜聖謨先定協于神祇既攻我車既秣我馬峙我糇糧于塞之下四章六龍遄飛闗雲四開師行如山如霆如雷蠲租已賦民有慶哉屬國讙呀天子自來五章茫茫荒磧伐薪孔遐溼烟不㸑萬竈以譁我軍之行晴空洋洋雨師避道宜暘而暘六章帝減尚食哺我士飢飲我士渴朝斯暮斯野曠無水何以為糜玊鞭所指靈泉瀰瀰七章無人之鄉絶轡之野五日窮追賊衆解瓦彼狂何知竄徙顛魄不謂帝來初猶笑啞八章冦昏以驚聞帝自將獸窮突奔心膽墮喪軍扼于途大殱巨創瀚海塵揚天山簸蕩九章築顱于丘波血于河九州百蠻為鑒孔多燕然之山蒼崕嵯峨伐石紀功萬載不磨十章都人黃耉扶擕來迎鐃吹所歌告武之成桑麻在郊民熙以耕戎衣一著四海永清十一章惟天十有一章章八句皇矣再臨沙漠相機宜撫降人安兵民武功再盛也皇矣聖功邊氓孔安惟帝念兹冀即于完自我來歸由暑訖寒旅師在野雨雪其漫一章天初生人豈擇莠良帝徳好生并包八荒從化者存不龔者亡汝尚能來無或汝戕二章汝家糜矣汝徒嫠矣羈孤單棲云何嬉矣汝尚能來食之衣之天無不幬天無不持三章怙終者誅國有明紀彼頑不悛盗我儲峙師進逐之原野萬里皆我職方何奔何止四章皇命于廷是礪是攻拔本塞亂惟義之中朕不親往邊人㷀㷀我怙我恃豈憚征行五章朔風蕭蕭捲我斾旓翠華載臨儼渉我郊藩落老稚簞壺以勞帝來撫我于險于遥六章或擁周道或控馬首帝顔霽温下拊以手如燠如春恩語勤厚坐使來前薄饗其有七章言幸師營言廹賊壘烜赫天聲賊黨破徙其降如歸其趨如市來者既多惟恐後至八章帝待降人曰彼大辜汝則何罪罹彼毒荼致汝于鋒致汝于屠其來汝拔爰止爰居九章帝謂降人我黎我赤草枯于原冰堅于磧藹藹陽和于疆于陌盡降其人大醜斯獲十章我士我旅嵗其云遷帝念我人言歸言旋凱聲載路士女闐闐帝威帝徳振古無前十一章皇矣十有一章章八句武成三臨沙漠禽其孽子殱其渠兇餘黨歸命武功大成也武成自初三援天戈惟皇之命神人以和長彼蟊螟奈此嘉禾既化其類胥顛其窠一章載祓載嚴式張我武雲旂飄翩日繞熊虎風飇烈烈揚于金鼔弧矢朱弓不殊干羽二章皇眷西土我理我疆于闗于塞于邊之牆于隴于畝于河之陽下民何幸近天子光三章皇撫吾民以覆以載是幸是臨恩逾汪濊帝來人歡帝行人思六師所過言錫我釐四章帝行天中如日正車咨遣兩師以翼漠沙尅日並進毋謂逺遐角之掎之天威所加五章爰陟爰止狼居胥山四顧藩部于川于原皆我在宥矜兹彈丸如毒斯螫如爪斯搴六章彼梟日蹙孤雛棲棲我禽獮之檻致于畿人之無良不保妻子惟汝之為求禍自爾七章我師日進言廹其巢卵傾翼折梟困以嘷腊斯焚斯不復逺跳乃如之賊為戒兹昭八章戮尸于軍傳首于邊變容慄股孰敢不䖍皇赫斯怒逺人所觀如帶如礪如石之磐九章載馳載旋言歸凱樂于以慶成于郊于廟載沛徳音四方是告帝開明堂萬邦畢照十章惟天同符以清以寧自此無事泰階永平惟帝之功與天無極斯嵗斯年于萬于億十一章武成十有一章章八句南廵歌十二章并序聖駕親視河工宏恤民隠恩膏廣沛逺邇同庥臣廷敬備員户曹於今六易年所每䝉天語垂問郡國水旱年嵗豐歉仰見我皇上天覆四海子育兆民尊居九重慮周萬里無時不以黎庶為念無事不以仁愛為心兹以黃運兩河闗漕輓之安危繫民生之休戚乗輿臨厯指示規為翠華所莅皇澤覃敷臣所不及知者多矣以臣所領職事奉明詔而宣徳意者郵驛所傳源源靡已臣等謹循職守恭繹恩綸俯同官僚欣感聖政惟我皇上徳盛功高仁深澤厚際天蟠地曠古振今生民以來所未有也臣等雖未獲與扈蹕之榮而實竊幸遭逢之盛每接詔㫖仰遵宣布傳示遐邇朝臣颺頌閭巷歡舞以及四逺之人無不手額稱慶僉曰聖徳厚矣至矣無以加矣吾曹何幸而生聖人之世也臣伏惟皇上念切民依特事巡省恩波肆暨江海同沾而始也以河決不治患及吾民仰煩聖慮夫治河誠國之大事也臣嘗稽之往古禹底九河之績禹貢詳其文漢築宣房之宫作歌紀其事盖篇籍所傳詠歌所述厥務亦綦重矣我皇上仰符天道俯惬輿情盼睞之間指揮斯定已收數十年不奏之功肇億萬載平成之績聖謨廣運嫓隆神禹而恩澤宏普恤民之災謀其生計憫民之乏免其正供有禹貢之所不能載者扈從諸臣宜備書方冊垂休奕禩矣若夫漢塞瓠子作宫其上是名宣房而作瓠子之歌章美其事載在漢書中臣以謂漢塞一決河耳且猶詠歌之我皇上治河上下數千里至於江海之廣咸䝉聖恩誠有非漢代之所能幾及萬一者而樂府不作其何以闡揚盛美臣不揣固陋謹因臣部所奉詔㫖每譔一歌仰識聖徳神功於永永無極且以慶幸臣之榮遇焉至若寛恤有司矜釋刑獄事下他部而臣所及知者亦謹併識焉詞雖不文然其聲調頗取漢魏以來樂府夫樂府之作皆以被之金石絲竹薦之朝廟用之家國非徒為文字觀美而已今臣所譔雖不敢妄擬古之作者實欲俾奕世知我國家功徳誠逺侔三代之隆斷非漢以來盛時所可比擬萬一於治定功成播朝廷之美宣天地之和庶幾其義有取焉爾臣不任兢惕不任忻忭以聞嵗二月第一皇太頌奉輿時巡也后鑾嵗二月巡狩惟虞帝之則其始由岱宗順時布令徳我皇握天樞舉事合經籍煌煌大業初慈闈共夙昔及兹撫金甌九圍覩式廓晨昏在帷鑾玊顔正怡懌孝理通烝民歡心洽萬國右嵗二月十四句平成第二紀閲河也平成際時雍聖人肇興萬世功以仁為涵濡義為繩約禮為隄防智為疏鑿清河排決萬斛泥髙堰水落蛟鼉移上下河海吾皇不來民其將焉如爰取其陳恵此貧者士女歌舞金堤下右平成十四句淮水清第三述留漕也淮水清黃水波中有漕船過率三十鍾才致一石多淮揚水流滂沱水中人營巢居其能免乎為魚寒者待衣饑者待餔留船漕二十萬石行者得休居者得食感皇恩歌以易泣稼穡艱難一粒一珠皇恩浩汗右淮水清十九句江南北第四紀免江南北逋賦也江南北江茫茫吾君恩澤江流與長江以南江以北頌洋洋緩新除舊賦婦子偕樂康江天髙髙崇隆上天施雨露時乗駕六龍瞻雲而就日萬姓來邕邕視聴自我民民依與天通夀萬億年福禄同年年三月春風中右江南北十九句時和第五紀免淮揚額賦也時和景鴻長聖人莅阼萬斯年恩膏溥流布我民一時違作息潤枯甘雨㴻盡賜舊年租新穀登塲在旦暮曲體民生從來王道本人情仁且明愛民如此所以致昇平右時和十三句呉山第六紀免浙江逋賦也呉山髙越水長江流無波海不揚引領望幸慰我耕桑攀留鑾輿福我子婦復其民無有所與長吏安所事蒲鞭九年耕賜三年賦右呉山十一句海濵田第七紀恤商也海濱田川貢珍皎玉雪奔若雲民所重儼耕芸聖澤隆瑞氣氲沛汪濊潤下土寛餘筴恵萬估靈露零錫嘉祜叙八政修九府鹺殷殷爛揚光若農畮禾稼穣四時榮和衆芳聖人出萬寳昌右海濱田二十四句江湖盤第八述廣入學額也江湖盤坡陀美哉磊犖而英多菁菁者莪在中阿言采其芹于泮之沚芃芃棫樸薪槱是以奕奕龍光濟濟多士萬年以寧媚天子右江湖盤十句淮南第九紀免鳳陽額賦也淮南涘渚混牛馬禾穟生耳卧原野秋穀在田中囷簏盖寡帝南巡恩澤滂欲令里閭富蓄蔵天意豈獨私一方十行詔下通雨暘不事金木占饑穣穀我婦子千倉萬箱祝聖君萬夀昌右淮南十四句岱峰第十紀免山東額賦并賜緩征逋租也岱峰觸雲根膏雨來天門自皇之來矣解網賜生存天下民自以不寃自皇之旋矣頻施除復恩岱峰峨峨肅然祥風乗朝曦播神功周覽滄海聖澤龐洪道光素王心傳魯東躋民仁壽中刑措銷兵戎右岱峰十七句於昭第十一天藻頌題留聖書頒賜也於昭惟天惟聖皇盡覆下土臨萬方文思被格侔陶唐讀書萬卷摛天章倬哉雲漢神龍翔彤池灑墨江海光山川留題奕葉長從官拜賜羅御牀賚及守土同巖廊舊臣何幸趨帝傍鸞迴鳯舞親攜將心依日月身江鄉我皇文治洵煒煌輝映百彚皆蕃昌微臣奉職占農祥欲請未敢中傍徨作歌傳後示不忘右於昭十七句擊壤第十二皇上頌太平也連嵗北伐率土臣服四方晏然猶復治創興鴻基巡厯益求治宵旰不遑兹者之臣及四方靡不沾被吴越凡所經過自守土湛恩蠲租除賦赦過省刑太和之化洋溢萬國記曰心和形和則天地之和應之此作樂之本也擊壤歌太平惟吾君聖神萬里絶沙漠掃除妖氛安黎元尚慮疾苦壅上聞嵗在木日營室皇乃時巡供張不復煩吾民枯者以濡寒者以暄除租賦以裕其儲蓄方伯二千石復其爵秩俾謹身撫字子養有若父與昆蠲釋苛與煩囹圄之幽囘春温天子實活我不知獄吏尊自兖沿呉越愷澤流無垠路無拾遺之夫䘏商惠農時吏不呼門九歌既叙兮九叙惟歌九州懽愉兮九奏孔多億萬斯年兮舞蹈太和右擊壌三十句午亭文編巻一
