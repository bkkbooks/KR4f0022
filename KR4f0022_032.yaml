body:
  text: 午亭文編卷三十二大學士陳廷敬撰表論雲南蕩平賀皇上表誠歡誠忭稽首頓首上言伏以聖武光昭奮聲靈之赫濯神功巍煥躋天地於平成區宇廓清臣黎欣慶欽惟皇帝陛下亶聰作后大勇安民屬逆孽之竊興致神人之交憤春秋之義大一統惟亂臣賊子之必誅帝王之師動萬全斯七德九功之並奏兵戎永息邉徼咸寧臣等恭際昌辰欣逢大捷伏願皇風時洽永卜年卜世之鴻圖睿治日新揚丕顯丕承之大烈臣等瞻天仰聖無任踴躍歡忭之至謹奉表稱賀以聞雲南蕩平賀太皇太后表誠歡誠忭稽首頓首上言伏以懿範昭宣撫重熙之景運徽音光被佑耆定之鴻勳海㝢清寧宫庭豫泰恭惟昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣太皇太后陛下道符烈祖功擁神孫集萬國之共球尊飬承歡於重慶舞兩階之干羽怡愈增喜於慈顔臣等恭際隆平欣沾厚澤伏願調延年之玉食遐登眉夀於無疆鞏卜世之金甌益介純禧於有永進鑑古輯覽表上言先奉上諭古昔聖賢忠臣孝子義士大儒隱逸凡經史所記載卓然有關於世運者詳察里居名字諡號官爵及所著作纂成一書歷代奸邪亦附於後以備稽考又奉㫖賜名鑑古輯覽今已成書者伏以鑒百代之人材仰承聖斷羅千秋之簡籍俯竭愚衷淹歷嵗時粗完篇帙庶勤夙夜未答恩私竊惟堯舜之治先務知人詩書所傳厥惟述古蓋觀人所由立政而考古於以知今周禮太平之書設官分職之是謹春秋天子之事善善惡惡之惟嚴歷觀傳記之文具載賢奸之迹博綜軼事散在羣言至如瑰瑋俊傑之儔檮杌窮竒之伍方策所載臧否易明若傳聞之異詞或是非之失實苟非旁摉逺引曷以顯微闡幽討論為艱研極匪易况夫辭嚴義括儼然信史之褒譏類别區分迥作羣倫之法戒必折衷於至當乃垂訓於方來臣等材質凡庸見聞卑瑣略知章句謬與編摩學不足以貫穿典墳識不足以鑒衡人物徒幸遭逢之盛得參論次之榮非歐陽之唐書屢改官而始就豈溫公之通鑑嘗㩦局以自隨實資睿慮之裁成竊附儒林之編録兹蓋伏遇皇帝陛下寤寐求賢旰宵思治不輕天下之士遹隆聖作之功東壁西清自衍圖文之奧深宫燕寢髙披冊府之藏自古治忽之機實關貞邪之故宸衷獨見欲昭示於臣民手敕親裁更丁寧於綸綍遐稽往牒稍輯成書已事為師常切髙山之望前車可鑒敢忘覆轍之心戴天地之崇深寧論裨補瞻海山之廣大莫效涓埃臣等無任戰栗屏營之至謹奉表隨進以聞恭進聖德萬夀詩表伏以德並乾行純嘏允符函蓋光齊日照遐齡永配曦輪欣逢景運之昌慶洽承平之盛陽春發育喜萬彚之䝉庥化域和恆咏九如而獻祝臣陳廷敬誠歡誠忭稽首頓首上言洪惟我皇上珍符誕握寶籙𢎞膺居正體元備聖人之全德履仁蹈義躋天下於咸寧有生民未有之竒道隆三古兼前代未兼之業功蓋百王文命敷而風教式於九圍武烈昭而聲靈振乎八極既髙蕩蕩巍巍之績復溥穹穹厚厚之恩偕闓澤於神人遍謳歌於中外蓋以肇天極而修人紀用是闡皇綱而恢帝紘昔當初臨寶祚之時正是孝事慈寧之日重闈問以為君何欲我皇答曰圖治愛民曽傳聖語於當年言為經而辭為緯果見太平於今日治已定而功已成猶思由後以視今每念謹終其如始廓明德新民之量廣錫類不匱之原存心養性以達天主敬立誠而體道容儀清穆肅雍殫昭事之䖍齊袚潔嚴享祀盡明禋之實危微精一接統緒於勳華濂洛關閩㑹淵源於鄒魯籖分甲乙探冊府之藏卷歷丹黃發圖疇之袐西清東璧古今絶企夫天章二典三謨前後允推夫御製並虞廷之什義兼風雅之長超唐人之篇理取宋儒之正冠六文而首出邁八體以遐標玩程頤即此是學之言契神化於形聲之內愛公權心正筆正之語運經綸於文字之中宫漏未移已布千言於紙上封章才罷早回萬象於毫端貫乎百家而我學不厭遊於六藝而惟聖多能玉尺儀天溥博如天之大土圭候日昭明如日之新春搜夏苖適修軍國之禮投戈講藝不忘弧矢之威凡此躬行心得之精微具見帝德宸修之廣大奉東朝之鼎養允矣孝慈操北斗之璣衡皇哉作述龍樓鳳閣光華朗映前星玉葉瑶枝芳馥長凝叢桂克勤克儉建昭代之儀型是訓是行彰皇家之法守體節用之指約省百倍於前朝𢎞益下之規德澤頻施於萬姓惜金錢於太府無非寬閭左征徭减玉食於尚方正以裕民間積貯時頒渙汗蠲逋嵗至再三屢沛絲綸賜免動逾千萬當爰書之覆奏必惻怛於宸衷祥風轉草色於圜扉協氣應星光於貫索夫自端居燕寢無時不以黎庶為心至於問俗觀民隨在必以補助為事鑾車駕而需雲布慶翠旗指而解澤旁敷河淮為國計攸關疏瀹悉聖謨所示山川永奠春回禹貢之區漕挽咸宜人樂我朝之制良由無逺弗矚視萬里如目前以故靡舉不神運天下於掌上在昔逆藩蠢動致勞天討遐施一怒而安四海之民一舉而靖三方之亂彼有元之餘裔曽負固於窮邊奮我武之維揚七旬弗俟殄纍朝之不逞彌月而平海不揚波郡縣盡臺灣之地野無斥堠享王來域外之人逮喀爾喀歸依幬冒之中乃噶爾丹自棄生成之外神謀獨斷廟算無遺朔漠三臨銘勒天山之表羽林大捷塵清瀚海而遙慕義嚮風日出悉冠裳之㑹同文合軌月支皆職貢之邦惟聖主過化而存神故王師有征而無戰所以行焉斯效動罔不臧總眀目達聰之休𢎞集思廣益之美自執河魁之柄睿照遐周髙披天鏡之光物情畢鑒規模𢎞逺令甲宣昭轉輸通遼海之舟航水利興西北之農畝積倉平糶以逮窮簷發粟截漕以蘇澤國郵傳用恤而恩渥輿徒鹺稅是輕而惠流商賈頖宫璧水奉針勸以欣榮魚服豹韜感投醪而鼓勵仕循資格而立賢無方才許薦揚而用人惟已時施仁於後世每致憫其嗣人念臣子末路之艱見覆載兼容之大凡沾雨露思竭涓埃共荷帡幪罔酬髙厚今者歡呼遍於率土忭舞極夫含生雲燦星輝轉洪鈞於一氣麟遊鳳集開夀域於遐荒八千嵗為春秋籌增太乙億萬年齊甲子世躋華胥昔天保頌岡陵推誠受祿及豳風陳忠愛歸嚮稱觥臣廷敬忝列侍從之班幸際雍熙之代伏覩聖德廣運同歡萬夀無疆謹獻詩十二首管窺蠡測而莫罄歌衢擊壤以難名臣不任瞻天仰聖踴躍歡忭之至謹隨表恭進以聞好名論上臣嘗言三代以下惟恐不好名此衰世之論非盛世所宜有者非謂名非盛世所宜有謂好名之流弊足以為盛世之纍也三代以上之帝王其名最著於世者無過堯舜禹湯文武使君人者好堯舜禹湯文武之名求堯舜禹湯文武之實而因以成其名安見名之遂不可好哉即三代以下之賢君如漢文帝唐太宗宋仁宗三君者人主誠好其名而求其實雖或不能如三代之盛時亦可謂間世之英君誼辟也然而謂好名之流弊足以為盛世之纍者何也人君之好惡不可有所偏使天下漠然不見其好惡之迹而天下之真好真惡出焉故慶賞刑威豫奪黜陟一出以虛平公正之心而百官萬民胥受裁成焉是以人君如天渾渾耳穆穆耳不言而四時成化無為而品物咸亨故曰惟天為大惟堯則之蕩蕩乎民無能名焉傳曰不識不知順帝之則又曰民日遷善而不知為之者知識且泯而况於名乎又安見其名之可用於民者乎書曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路此之謂也若人君之所好一有所偏則其流弊不可勝言上好忠直之名則下多上書告密之事上好長厚之名則下多模稜脂韋之習上好廉介之名則下多布被脫粟之僞上好恬退之名則下多處士捷徑之巧上好真率之名則下多囚首垢面之詐上好敏給之名則下多利口便捷之姦人主苟一不察而貪榮嗜利之徒習為小人穿窬之行探其情而逢其欲則名實之真亂矣故曰足為盛世之纍者此也且上有好者下必甚焉傳曰好名之人能讓千乘之國苟非其人簞食豆羮見於色言好名之不可為信也又曰未有上好仁而下不好義者也未有好義其事不終者也又曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情自昔聖賢未有以好名為訓者故治天下亦務好其實而已矣或曰孟子不以齊宣王好貨好色為非因遂欲引之於道名之不可好孰與貨色乎昔衛靈公問陳孔子曰丘未嘗學軍旅之事孟子參乎權孔子純乎經者也參乎權而不失乎經者後之人臣能者鮮矣故以孔子之對為事君之法好名論下人君不可有獨好其名之心不可使天下無好名之心好其實故不得獨好其名因名以責實故不得不使天下好名今夫天下善惡二端而已矣治天下使天下遷善逺惡而已矣有善無惡者人之性名為善而喜名為惡而惡者人之情今使天下渾渾焉不知名之可妤則善不足以為喜惡不足以為惡喜與惡不加於其情則其為惡也與為善無以别而亦漸失其性故夫名者先王動天下之微權也先王因民之所好而采章服物以榮之爵祿慶賞以勸之表宅錫閭以奬異之若曰使人遷善而惡自逺是以不純任刑罰而任禮教名與禮相近而逺於刑故名者所以助禮之行而操於刑之先者也孔子曰民可使由之不可使知之使天下之民日循循焉歸於吾禮教之中則刑罰可以措而不用而天下固已大治故曰名者先王動天下之微權也然其始特不可有自好其名之心自好其名則直以為名焉已耳自好其名而或靳天下之名此其意已近於刑而逺於禮欲天下之治不可得也故王道以無欲為本鄉願論鄉願最惡者狂狷有問於鄉願者曰是人也可殺與曰可可舉而用之與曰可問於狂狷狂狷不然可可否否無所隱避於是鄉願好其與已同惡其與已異故曰鄉願最惡者狂狷也夫人至於可殺恨之至也至於可舉而用之愛之至也使其不顧人之可殺與否因其恨而殺之則所殺者或為君子不顧其人之可舉用與否因其好而舉而用之則所舉用者或為小人鄉願之心隂私險巧惟知趨利避害不察事之可否理之是非閹然自媚於世佯為無所甚好無所甚惡而隂以行其所好所惡之心故天下之好惡莫有甚於鄉願者也孔子以為德之賊不信然與夫使天下無狂狷則是君子可殺而小人可舉用也幸而有一狂者狷者乃不幸而為鄉願之所惡則是鄉願之禍不至盡殺天下之君子不盡舉用天下之小人不止始於一人之好惡而流毒於天下國家自古以還天下之事壞於小人者十二三壞於鄉願者十常八九鄉願者小人之渠魁也而其禍自惡狂狷始有天下國家者當亟誅鄉願鄉願誅則狂狷興矣狂狷興則天下之為君子小人者各得其理矣易曰君子道長小人道消書曰惇德允元而難壬人何畏乎巧言令色孔壬此之謂也然則何以辨之書不云乎有言逆于女心必求諸道有言孫于女志必求諸非道求諸道者所以辨狂狷也求諸非道者所以辨鄉願也昔楚文王有疾告大夫曰管饒犯我以義違我以禮與處不安不見不思然吾有得焉必以吾時爵之申侯伯吾所欲者勸我為之吾所樂者先我行之與處則安不見則思然吾有喪焉必以吾時遣之觀楚文王之御二臣者是又辨鄉願狂狷之大端也辨之則鄉願之好惡豈至毒天下哉經學家法論朱子論貢舉治經謂宜討論諸經之說各立家法而皆以注疏為主易則兼取胡瑗石介歐陽修王安石邵雍程頤張載吕大臨楊時書則兼取劉敞王安石蘇軾程頤楊時朝說之葉夢得吳棫薛季宣吕祖謙詩則兼取歐陽修蘇軾程頤張載王安石吕大臨楊時吕祖謙周禮則劉敞王安石楊時儀禮則劉敞二戴禮記則劉敞程頤張載吕大臨春秋則啖助趙匡陸淳孫明復劉敞程頤胡安國大學論語中庸孟子則集解等書而蘇軾王雱吳棫胡寅等說亦可采令應舉人各占兩家以上於家狀內及經義卷子第一行內一般聲說將來答義則以本說為主而旁通他說以辨其是非則治經者不敢妄牽已意而必有据依矣愚按朱子此議欲治經者以注疏為主而兼取諸家之說以求其至是亦未欲其専取一家之言也而曰以注疏為主是更不欲擯注疏而不用明矣今之學者不然易則專取本義詩則集傳書則蔡沉春秋則胡安國禮記則陳澔周禮儀禮廢已久蓋不惟諸家之說概不列於學宫而舉朱子所云專以為主之注疏學者有終其身不知為何物者矣即如所謂大全者又非甚别於專家之說而有獨見之論也其與朱子所云以所治之說旁及他說而後以已意辨晰以求其至是者亦大異矣且大全之書明永樂朝急就之書也七年開館於祕閣十三年帝問纂修如何館中人聞之懼倉卒録舊書略加刪飾以進四書則倪氏輯釋易則董楷輯疏書則董鼎輯録詩則劉瑾通釋春秋則汪克寬纂疏禮記則陳澔集說故大全者甚不全之書也然學者猶憚其煩苦而不之讀所服習者本義集傳蔡沈胡安國陳澔之所謂五經而已易詩書禮經學文者猶加誦習焉春秋則概刪聖人之經不讀讀胡氏傳傳亦不盡讀擇其可為題目者以其意鋪叙為文不敢稍渝分寸以求合於有司又最甚者擇取傳中字句文義以意牽合妄託聖經移彼就此名為合題豈惟不合經意揆之傳者之意亦初不自知其何以位置安排顛錯之如此也慢棄聖言割裂傳注又如朱子所謂名為治經而實為經學之賊號為作文而實為文字之妖者也蓋經學之弊原於時文昔者經義之興本以論斷為體不執一說引據經傳非如後之描畫聲口簧鼓吻脣乳兒小生侮聖言而代為之詞勢不得不單守一家之詁訓以便行文而其腐朽惡爛不逾時歷嵗改頭換面以趨新巧使學者窮年積月從事於無用之空言考其實枵然無所得也又何有於經學哉然則何以正之曰必如朱子之言而後可朱子論經義欲令明著問目之文而疏其上下文通約三十字以上次列所治之說而論其意又次旁列他說而以已意反復辨晰以求至當之歸但令直論聖賢本意與其施用之實不必如今日分段破題對偶敷衍之體每道限五六百字以上則雖多增所治之經而答義不至枉費辭說日力亦有餘矣蓋今之時義又與南宋之時異朱子所謂不問題之大小長短而必欲分為兩段仍作兩句對偶破題又須借用他語以暗貼題中之字必極於工巧而後已其後多者二三千言别無他意不過止是反復敷衍破題兩句之說而已今之八比雖與此異而其為弊則一也故欲正經學之失須革時文之弊時文之弊革然後學者可以旁通諸家之說以求得乎聖人精意之所存而士不苦於無用之空言國家收實學之效也秦論余覽秦事而歎其先世之無道所從來久矣惟天生民弗能自理建后王君公以為民上俾獲遂其生養以全安其性命而已或不得已有刑誅兵革之事猶非天心之所忍故先王尤以不忍之意行之秦起西垂習用故俗法最慘刻然至取無罪之人而迫之以從其死此果何理也哉孔子曰始作俑者其無後乎俑象人而用之孔子以為無後至於用生人當如何耶武公從死者六十六人繆公從死者百七十七人其良臣子車氏三人奄息仲行針虎秦人哀之黃鳥之詩所為作也按武繆所為於法寧止無後而其子孫乃至於有天下何也孟子謂三代得天下以仁其失天下以不仁他日又謂不仁而得國者有之不仁而得天下未之有也蓋自有天地以來至於孔子孟子之時未有以不仁而得天下者商周之興其先皆積纍仁厚數十世今秦所為若此所得若彼豈得謂孟子之言不足深信抑亦天道至是有常有變邪孟子又謂行一不義殺一不辜而得天下有所不為得天下至太一不辜至微然而不為者以非天之所忍故不忍為之耳夫天不忍於一不辜而忍於六十六人百七十七人其他嚴法繁刑屠戮無辜尤難悉數倘所謂天道固若此耶至於始皇之葬後宫非有子者皆令從死死者甚衆葬既已下或言工匠為機藏皆知之於是盡閉工匠藏者無復出者則其殘殺不辜愈益甚矣然以始皇之强才及二世而絶孰謂非天道耶故自三代以來不仁而得天下者有之矣不仁而守天下者未之有也漢髙帝得天下之正論自古帝王受命而興者率皆當世之諸侯增修其德至於其子孫以有天下故崛起而為天子者雖其身非賢聖亦必其皆賢聖之苗裔也至於以田壄之小夫徒步而爭天下不階尺土而有之而其始甚微其人又非卓然賢聖有必可以得天下之理此豈非古今之大變哉昔者亡秦殘滅六國而漢髙帝秦之眇然一黔首也一旦起草澤之中驅其亡命五年之間南面而據髙位開闢以來豈有此也而世之儒者徒見魏晉隋唐之季或受重爵或承託孤之命以大臣而篡奪人國謂漢起自匹夫得天下為最正豫竊謂不然也尊卑貴賤者天地古今之大防也傳曰辨上下定民志自三代之衰以迄春秋戰國之際生人之理幾於滅息矣然猶未有以農畞之賤微起而與君上之至尊相抗衡而劫奪者夫使天下後世之人操耰鋤援白梃侈然遂有稱帝稱王之心者其誰為之倡也創古今之未有壞天地之大防啓斯民犯上作亂之心吾必曰髙祖焉烏見其得天下之正也然則秦廢封建矣以其臣則有篡奪之嫌以其民則有犯上之罪必何如而後可以與於得天下之正哉亦曰惟其人而已矣人臣而可以放伐其君湯武是也匹夫而有得天下之理孔子是也孔子不有天下而凡為匹夫者無必可以得天下之理苟幸而得之遂曰得之最正是使天下後世之凡為匹夫者日生其心而有犯上作亂之事也是烏乎可哉雖然撫則后虐則仇如秦者其亦自反其所為也哉漢髙帝知吕氏之禍亂論夫論古人成敗往往惟其意之所之以自成其一家之說有可議者焉明允之以漢髙帝以太尉屬勃也謂其知有吕氏之禍也其言曰帝意百嵗後將相大臣及諸侯王有武庚祿父者無以制之也獨計以為家有主母豪奴悍婢不敢與弱子抗故不去吕后者為惠帝計也且夫古今之禍敗多矣未聞有以婦人而能戡亂救亡者且吕氏之不死其禍豈小於唐之武氏哉吕祿吕産之王武三思武承嗣之將立也趙王如意趙王友趙王恢之死唐宗室諸王之殘滅也孝惠之病廢廬陵之在房州也方吕后之未死較武后之末年其勢已成所未及為者改號革命耳幸其早死陳平劫酈商得以行其旦夕苟且之計使吕后而尚在漢之存亡未可知也謂髙帝既知有吕氏之禍而又不去吕后以為惠帝計者此可議者也夫髙帝豈能逆計吕后之必早死而不至於改號革命哉誠知有改號革命之禍又安在其能為惠帝計哉髙帝最愛者戚姬如意吕后最惡者亦戚姬如意吕后能為禍先及此母子耳曽謂髙帝知之而使為之耶明允又言髙帝之視吕后猶醫者之視堇使其毒可以治病而無至於殺人嗟夫吕后鴆也非堇也今有虎且噬其子曰姑養虎以備外盜是豈人情哉故謂髙帝知有吕氏之禍者非也吕后之能為禍髙帝不知也而張良知之知之而不以言甚矣處人骨肉之難也狄仁傑舉子論武后令宰相各舉尚書郎一人狄仁傑舉其子光嗣時比之祁奚失其指矣蓋與左師觸龍諌趙太后請長安君為質事絶相類當時武承嗣武三思營求為太子仁傑每從容進諫勸召還廬陵王他日武后語仁傑夢鸚鵡兩翼折仁傑對以武者陛下之姓兩翼謂二子起二子則兩翼振矣鸚鵡之翼釋以二子權也舉子之事亦權也而遂正告之矣故左師之憐舒祺仁傑之舉光嗣其跡雖殊所以感其心者則一也卒之長安君為質於齊而趙國不被兵中宗復辟而唐社稷卒不變嘗觀李德裕忠諌論言近世名臣王石泉居相時以子為眉州司士太后嘗問曰君在相位子何逺乎對曰廬陵是陛下愛子今猶在逺臣之子焉敢相近故知人臣進諌正告之不能得者有時乎用權然權者豈人臣之得已哉人主貴察其心而已矣陳子昻仕武后論昔揚雄仕莽君子恥之唐武后以一婦人竊天下威柄屠滅宗子賊殺忠正之士姦謀革命蕩覆唐室此古今之異變視莽為何如也當此時其小人靦顏事之無論矣其賢者則謂之何哉嘗觀陳子昻氏以言事武后數召見今考其言辭論雅飭有兩漢之風而薦圭璧於房闥以脂澤汙漫之賢者之所以自處者其果謂之何也曽鞏論揚雄謂有所不得去又不必死仕莽而就之合於箕子之明夷至論雄美新之文謂非其可已而不已比之箕子之囚奴鞏之言雖未得為至論然以觀子昻之事而歎賢者之所遭其志亦有足悲者何其與雄相似也武后稱皇帝改國號子昻上受命頌其亦美新之類乎夫以武后之淫虐隱慝既多猜忌滋密一時才望之臣罕有得脫其禍者以郝處俊之賢猶不能忘情於身殁子昻之所為豈得已者哉或謂士不幸遭亂朝即不必死猶可潔身而去也而鞏謂雄有所不得去子昻亦蹈雄轍者何哉然考子昻後以父老解官歸父喪廬冡次哀感聞者縣令段簡貪暴聞子昻富欲害之家人納錢二十萬緡簡薄其賂捕送獄中竟死於獄子昻豈得已者哉或曰士君子不得志於朝則安其身於野明哲之謂何而顧令以身殉也嗟乎子昻不辱其身則捐其生而已不仕於朝則死於令而已矣是以知人者必論其世而亦不得過為刻核之論也褚魏優劣論唐初以諫諍顯者魏徴褚遂良然兩人有幸有不幸焉凡進諌於人主者有順有逆有易有難徵遭遇太宗諫合謀行其進說也順而易遂良後事髙宗嬖內逺賢言發得禍其進說也逆而難順而易雖中人可作其敢言之氣逆而難即賢者有不得行其志焉此所謂幸不幸也兩人豈有優劣哉雖然蓋徴嘗事隱太子矣及廢太子承乾失德魏王泰驕奢不法徵於此時既無事不言而天下之事又莫有當言於此者而徵未顯言其失何也遂良極論宜塞嫌疑之漸除禍亂之源徴不過從容請魏王泰勿從居武德殿而已固知武后之事徴而尚在不必其言之也此又徴之所謂幸也昔太宗謂徴嫵媚徵再拜言曰陛下開臣使言故臣得盡其愚若拒而不受何敢數批逆鱗髙宗武后之逆鱗徴之不數批明矣是以君子論遂良諫髙宗立武后之事而惜其所處之不幸也李善感諫封禪論唐髙宗既封泰山欲遍封五嶽作奉天宫於嵩山南監察御史裏行李善感諌史稱自禇遂良韓瑗之死以言為諱無敢逆意直諌幾二十年及善感始諌天下皆喜謂之鳴鳳朝陽嘗讀歐陽文忠公書有云事柔暗之君言人主則易言大臣則難蓋謂勢之所在雖人主有時而獨輕而進言者必貴攻其所難而後可以反其極重之勢此諫者之則也髙宗之世勢不在人主大臣而在中宫方是時言人主大臣則易言後宫則難言其難幸而見從則宗社之福不幸不見用如褚韓輩然後可以與於輕重之數而不愧乎忠諫之名言其易雖舉天下之事櫛比而毛剔之猶無益也何也非其勢之所急也而况其一枝一節之硜硜者哉善感之言既美矣而愚猶以為未盡也當髙宗惑溺武后武后竊弄國柄前有言者上官儀後有言者郝處俊若儀處俊者可謂言其所難者矣此兩人所言皆在禇韓死後而史謂二十年無敢有逆意直諫者何與記曰君子表微况儀處俊所建白尤皎皎在人覩記者乎而善感顧獨䝉美名世之畢智竭忠盡力於所事而名不彰顯於後世者豈真有幸有不幸耶昊天與聖人皆有四府其道何如康熙丁卯五月十一日乾清宫應詔臣聞惟天盡物惟聖盡民能盡物謂之昊天能盡民謂之聖人昊天聖人一而已矣然昊天能盡物而不能盡民聖人能盡民而亦能盡物故曰惟天下至誠能盡其性能盡性則能盡人物之性可以贊化育而參天地故又曰天地位焉萬物育焉易大傳曰易簡而天下之理得矣天下之理得而成位乎其中矣昊天聖人其道詎有二哉邵子曰昊天之盡物聖人之盡民皆有四府焉臣嘗求其義春為生物之府夏為長物之府秋為收物之府冬為藏物之府謂之昊天之四府也易為生物之府書為長物之府詩為收物之府春秋為藏物之府謂之聖人之四府也昊天以時生長收藏乎萬物故能盡萬物聖人以經生長收藏乎萬民故能盡萬民是昊天之時聖人之經其道一也是以又曰昊天以時授人聖人以經法天若卲子可謂善言天人之際者矣夫天能生長收藏乎萬物而不能生長收藏乎萬民聖人能生長收藏乎萬民而亦能生長收藏乎萬物臣故曰天能盡物聖人能盡民亦能盡物若是者聖人豈有加於天哉聖人者天之所生也天生聖人以生長收藏之權委之聖人而天不與故春而生也夏而長也秋而收也冬而藏也人見其盡物焉而已聖人法天以生長收藏之權委之經而聖人不與故易以生之書以長之詩以收之春秋以藏之人見其盡民焉而已然臣何以謂聖人能盡民亦能盡物也天不言而聖人言之易書詩春秋是也春無言而易存夏無言而書存秋無言而詩存冬無言而春秋存易之言如春書之言如夏詩之言如秋春秋之言如冬春夏秋冬天之所以盡物也易書詩春秋聖人之春夏秋冬也聖人之所以盡物也故曰聖人能盡民亦能盡物聖人者一天而已矣且夫昊天與聖人既皆有四府矣臣謂昊天有大府聖人亦有大府何言乎大府也蓋天有四德元亨利貞聖人有四端曰仁義禮智元之德見乎春亨之德見乎夏利之德見乎秋貞之德見乎冬仁之端見乎易義之端見乎書禮之端見乎詩智之端見乎春秋亨利貞之德統乎元義禮智之端統乎仁元亨利貞之德統乎乾仁義禮智之端統乎性元亨利貞之德不可見而見之於春夏秋冬故春夏秋冬者昊天之四府也仁義禮智之端不可見而見之於易書詩春秋故易書詩春秋者聖人之四府也元亨利貞見於春夏秋冬不能無所統而統於乾是乾者春夏秋冬之大府也仁義禮智見於易書詩春秋不能無所統而統於性是性者易書詩春秋之大府也臣故曰昊天與聖人皆有大府也惟聖人法天之乾盡人之性雖與昊天各有一大府實與昊天同有一大府也臣前所言惟天下至誠能盡其性以至於贊化育而參天地者其謂此與我皇上盡性達天仁民育物作君作師參兩天地臣等䝉清燕之餘俯賜延問臣學識荒陋不能仰副聖意不勝皇恐臣謹對午亭文編卷三十二
