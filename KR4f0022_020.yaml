body:
  text: 午亭文編巻二十大學士陳廷敬撰今體詩題内閣楮樹二首桐方蔡紙在人間樗櫟何曾似子頑紅藥嬾驕春蘂艶閣中舊有芍藥緑毛解惜鬢絲斑聽殘鈴索音聲樹去趁花磚供奉班時兼内直一種西牆連沃葉輸他桑者自閑閑近樹十武有桑一本映日籠烟紫禁深萬年枝下亦森森絲綸自重黄繒色槐栁元多碧樹隂薄有流膏因湛露那無散木寄長林茅檐得就桑榆暖閒向山農詫越吟北墅懐魏無偽栁花風定麥花開北墅西頭日幾迴夏雨欲看鋪隴上春泉且喜入池來延英舊事懐遺直禁苑新綸寵異才自是鳳毛常五色獨憐沙鷺立裵􅏆為李東生中丞作三年政地知吾老毎見除書歎子賢名姓直從天筆定絲綸不假殿麻宣髙烏故自栖臺柏鳴鳳還須叶帝絃舊日蔚州芳跡在龍門不逺雁門前奉同安溪先生夜行赴苑中應召即事賦呈自看蒲栁向秋零柔翰功名一葉萍近日詔麻推將相有人綸閣重朝廷晝勤三接稀宫漏夜久頻宣撼索鈴斷續火城沙路逺百城還擁讀書螢夜行即送咸受返故園一燈無語對青熒誰道傳呼近火城玉勒馬嘶驚判路銅街人起報三更我尋北墅烟中去子望西山月下行十里隂晴渾不定祗應浪迹過浮生雨行二首栁長紅橋低緑垂隂隂何處黄留離山禽引雛雨中去燕子到家人未知鬢絲榻畔裊茶烟眼底松牕一覺眠雨黑不知時早晚合昏花似夜摩天夜摩天以花開合為晝夜西湖詩查徳尹太史見和出入懐袖已逾一載贈處之義情不能已疊韻奉詶八首把君詩句一開顔夢裏烟波别後山近日心情還似舊西湖風月軟紅間二州連守為江湖一笑蘇公蓑笠圖君是玉堂天上客也因雲水羡林逋孤槳扁舟路轉遥濛濛烟雨水瀟瀟白公隄向蘇隄去不看湖山趂早朝過江南渡與錢鏐歴歴皇輿屬帝州君向迴鑾亭北望望湖樓是望京樓雨葉烟枝樹短長南屏西畔水雲莊不因桃李縁堤好自愛閑閑十畆桑拄笏看山杖策迴湖光裂帛湧成堆憑君莫道西湖好自有西山爽氣來纔踏金坡春草迴荷衣爭遣野人猜花磚鬢影髼鬆甚儻趂朱顔合早來孝然石室對江潮仙去名山尚屬焦記得與君離别地段橋應喚作查橋憶與牧仲郊館夜集二絶句夢入新豐路未長依然題竹滿筠廊恠來詩與花枝好人在宜春别苑傍泉石蒼烟接近村夜深月照兩閒門午亭歸路憑君問山後青山是故園雨不止示家人自要蓬門閉不開蕭蕭苔徑長蒿萊從教新雨無人過曾見人誰舊雨來次韻牧仲晚凉之作肅肅花影動檐風催早秋梁栖雙燕老簾度一螢幽書欲親黄奶六朝人以書為黄奶人誰共白頭聞君感䊵扇緩置篋中不閒情流俗知誰是閒情覺未慵壚添沽酒劵市㨂買花傭風逐髙雲去烟和細雨重忘機隨物性遲暮適何從史蕉飲都諫春泉洗藥圖欲訪名山未有期鹿門逸興謝家詩御溝流到春泉水正是當階紅藥時南行將發京題彭訪濓茅山集却寄二首夢裏西牕可重尋瑶華相贈比南金春風送客花枝動遲日維舟栁色深佳句百篇千里路尺書三載故人心白頭萬事都抛却猶愛夫君吳㑹吟九河水接五湖流直到君家下小舟歳月載添衰謝恨江山一洗别離愁春來逺客今聊爾老去狂歌且未休了却南園重到意乞身章上便林丘待舟題北鎮舊詩栁暗青門道花明白玉珂三春飛斾去萬里使車過漁唱江南曲龍沙塞上歌平生遲暮意無那壯逰何安溪先生獻歳有詩即事留别萬人傳唱和人驚要眇朱絃殿閣聲最有文章縁政事豈因官職重詩名相看綸藁詞先定獨對花枝句又成皓首從公真覺晚一春小别廿年情張衡臣編修以扈從先歸覲省贈别也紅亭逺栁毿毿我去君來春正酣試向亭前傳一語櫻桃時節到江南留别齋中花樹栁葉似為青眼客桃花應笑白頭人早償洛下三生債老趂江南兩度春未到啼鶯吟自苦還同旅雁夢相親數枝寒竹經冬緑留待歸時紫籜新夜坐别雪隖皎皎春初夜團團月逈明還為敷座坐不似别家行塵垢山河淨琉璃世界平此時殊有意那得竟無情恩許先一日發京於水次待駕羽衛傳清蹕天行念老臣暫分仙仗路先及屬車塵雲水臨前浦烟花接早春恩光隨處好普為萬方民宿安平鎮殘更待曉闕薄靄投遥林不覩溝塍處寧知耒耜心雲山春色早簮組歳華深昨夜來燕市猶聞擊筑吟潞河見月寫懐明月生海上蒼茫東海東仙人亦悵望吾意偶然同信宿萬里始離塵千慮空夜來摩尼色似已凌清風聞笛楊栁青青沙雁還時清𦍑笛戍樓閒更誰吹出闗山月照盡邉闗與塞山白河白河通鳳沼遥暎玉泉峯山曉月光澹水明花影重逺波歸海近空翠落潮濃淼淼江湖去仙源此處逢武清道中雉乳野雞鳴迢迢逺鳳城連天海色暗湧地一輪明百里京華道千山故國情南來重囘首春盡是歸程武清南店贈楊生野館官河路春風蕩栁條輕烟直沽水斜日木蘭橈香稻來江國汀洲上海潮喜逢燕趙士還與酒帘招天津津門控上游銀漢接天流水合三义口檣連萬里舟烟花河兩岸城郭海西頭自是繁華地無忘羇旅憂次楊栁青船上作二首三日黄雲逐岸沙得船今日似歸家午亭烟舫春光暖飛盡東風楊栁花漁子風潮若個邉榜人相就宿寒烟天家賜與舟船好欵乃聲中似往年舟中寄舍弟青山原上百花洲浪逐桃紅出澗流夢裏京華千里外不知今夜在扁舟舟中留别京師親故一棹烟波萬慮輕畫旂斜捲晩風晴好春臨水灣灣好明月隨人處處明海上蓬山違昔夢天涯書舫得浮生緑楊影蘸桃花浪應是離人惜别情楊栁青解維襍題兼寄彭訪濓六首秋日楊栁黄春日楊栁青千條與萬條長亭復短亭河上江雁來飛飛塞北去江南有故人來時在何處驛使經年到梅花寄隴頭一枝東閣晩應是在揚州離京三百里為客九迴腸平野天疑盡官河路轉長思君比流水到海有終極與君相見時别後思不息暝色赴孤舟烟中夕鳥投水行無定準幾日到吳洲武清道中寄西齋二首惆悵别離盡素心安所期海潮初到處江雁逺來時路入深春早舟行夕照遲烟波望無際渺渺寄相思思君如明月處處映清波舊隠江邉在新詩海内多舟航通水國燈火宿春河誰道天涯逺東風一棹過靜海道中往來成利涉烟景豈蹉跎夜舫覺潮響春燈聞棹歌百川東近海千里北流河疏鑿當年意吾生喜重過舟泊静海南四十里贈勵南湖君家河水上數里惜王程海色連津樹春流遶縣城檣烏歸岸逺沙雁入雲平行漏迢迢夜非闗契濶情滄州道中懐勵文恪公春風渤海郡人日草堂詩髙達夫有人日寄杜詩故里淹行客芳洲惹夢思功名元特達文采重凄其迴首山陽笛孤舟淚欲垂河上逢子文河水東流雁北迴青青栁色傍人來停舟借問江南客江上梅花開未開桑園山東境南宿十五里曉發寄舍弟京師桑園漁火接通津未比桃源逺世塵但有河流長送客祗因栁色解隨人雲山海國蒼烟晩風景幽州白日春昨夜池塘青草色夢囘陡覺别離頻徳州北曉發遇阮亭春岸沉沉撥棹聲長川踈栁帶髙城寒燈夜雪依篷重清鏡衰顔映水明毎惜芳年曾久别驟看遲暮若為情相思應到分流處汶水東西兩送行河上有懐二絶句水流東到海到海是歸期惟有思君意悠悠無盡時思君比海水海水鎮常好不似與君離生年日易老夾馬驛次韻京江先生雪中並騎囘舟見遺之作自覺衰顔組濫紆陽春雅調入疎蕪門迎宋祖銷寒酒用宋藝祖雪夜訪趙相事筆掃袁安卧雪圖共喜雲霄千里瑞儘堪蓑笠一舟孤年來大手蠲逋詔何止山東百萬租臨清待閘懐湯西厓中州前歳下滄州春雲接薊樓今宵泊東郡西月挂嵩丘清濟還長見黄河自曲流與君塵外賞能緩别離愁臨清閘逢劉生昔别燕京道今逢衛水濱閘西衛水所入處栁條堪寄逺草色解隨人渌酒燈前意丹砂物外親川途方浩蕩常恐白鷗嗔祖徳有序余家近堯畿代有文學髙伯祖容山公萬歴甲戌進士歴闗陜副憲詩名尤重於世嘗有云未遂持螯意空懸擊楫心葢未嘗至江海間也余小子昔奉使至海上今扈從視河有舟航之賜珍食之飫追溯祖徳感歎而記以詩丁亥二月初六日北河第一閘書祖徳斯文在家傳正始音歌謡依帝日分野直辰參丘壑三生客雲天萬里心持螯兼擊楫佳句獨長吟第二閘蚤起宴坐寄李中孚先生二首宴坐春船裏波濤静不喧斯文如未䘮名理與誰論雁影窓中月雞聲岸上村浮生何所著有得是無言落落身名晩茫茫歳月違春風吹墮月曉色攬行衣四海幾人在百年萬事非祗應與夫子偃息向荆扉舟中示兒子忠信涉滄海清明揖岱宗無營心澹泊蚤起事從容文字元多累功名是偶逢行行鄒魯近捨此適何從第二閘過後簡同直諸公在别舟春氣漸氤氲鑪香憶夕熏行看三尺日囘見一川雲歸雁不可數逺鐘何處聞風帆猶未落客思正紛紛清平縣有懐諸學士水驛清平縣孤帆日暮來天低泰嶽觀雲淡魯連臺浦岸人嘗見谿烟棹却迴邑名元自好羡爾濟時才東昌河上絶句袖中三載篋中書行向河闗千里餘流水無涯人易老海山消息近何如陽榖縣江黄曾此㑹渺渺棹扁舟野草迷陽榖汀花落濟州盟寒菏澤水春近嶽雲樓日暮絃歌地空悲戰伐秋青川驛青川望杳杳幽思與誰論倦客夢迴枕午雞聲近村浦舟隠北樹驛騎下東原魯酒一杯醉孤篷自掩門荆門驛漢水不可涉荆門齊魯間客行半春路舟在九河灣飛鳥目猶送孤雲心與閒悠然川上興偃息想潺湲張秋鎮境壤連三縣岸北𨽻陽榖東岸東阿西岸夀張人烟接二東漁商河市上雞犬漕船中平野遲斜照孤帆送逺風浮生信所適雲水夕濛濛寄桐城先生泰嶽日邉出黄河天際流我行千里逺迢逓下南洲遥憶龍眠處長隨雲去留相期明月夜同宿大江樓汶上道中舟泊水逾響潺潺夕棹間清堪流石髪緑欲㸃苔斑言涉江海道况見東南山稍愜塵外賞沙鷗相對閒舟巾聞琴倚槳緑波細泠泠聞七絲㣲風松定後明月雁歸時誰以黄金錯飾兹桐樹枝伊余方晏寂此理陶公知二月十二日曉發濟寧作杜李曾逰處能令百世思任城無賀老濟水似唐時野店雞聲早官河人去遲斯文終未喪儒雅是吾師漆園城隠吏何人解息機漆園漠漠草菲菲只今夢裏三千載惟見春來蝴蝶飛魚臺舟次錢絅菴見訪晨發濟北地暮期湖陵城天晴候雁逈烟曉春帆明執手豁野興欵言生古情子方富才藻予老趨柴荆月夜歸舟作大船泊岸鳥棲枝小船迴棹歸人遲夜深却似南谿月池水東邉漸上時舟中題畵妙手勾吳設色工沙明水暖翠浮空扁舟便欲相從去不道烟雲是畵中滕縣道中榜歌聲漸襍吳音滕縣花寒栁緑隂欲渡清淮春色晩絶憐汶泗碧流深彭城道中落日彭城道凄凉戰伐功至今㕔事下猶説覇王雄烟草隨蕭子風雲感沛公虞兮不寂莫人在楚歌中徐州道中寄荀少京師扁舟一葉水連天歸雁成行落照邉今夜黄樓春草夢遥思風雨對牀眠下邳道中髙鳥長淮去淼茫楚州人物入蒼凉誰知百尺樓中客自許元龍卧大牀鍾吾驛古道鍾吾驛秦餘下相城黄河天外落海水日邉生九㸃齊烟盡孤舟楚岸横東南風景異同是夕陽明晩望桃源縣風帆憑水國驛路入桃源蝶夢時依枕雞聲漸近村春深海西岸月出秦東門欲就漁人宿還期静者言賦得揚州郭裏暮潮生昨辭瀛海水迢迢直到揚州見暮潮聞道仙人在方丈竹西晨過夜楓橋渡淮北岸曉行暮抵曺家廟同儼齋尚書春水生桐栢迢迢下楚州花開猶古渡月映自清流芳杜思南國蒼烟問故侯相從憑眺逺留艇寄閒鷗清江浦寄秋崖閩天無盡暮雲生淮水東邉月漸明同是離心江海上思君無那夜猿聲淮上髙鳥依依去閒雲故故斜蒼凉淮水上歴落楚人家舊日英雄里殘陽野草花不辭胯下辱噲