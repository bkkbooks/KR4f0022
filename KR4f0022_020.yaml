人楮窓人又老相對葉凋殘近覺無能好還思忍事難慵拈書帙厚喜接酒杯寛賴有新題句憑君暖眼看曉行西山下懐素心兼寄秋厓閩中荀六荀少粤東太行千萬叠人在太行西與汝為兄弟多生合解擕野雲歸路逺霜鳥宿枝低更想遥天末如閒猿夜啼十二月二十日夢中得句春苑多桃李孤松獨稱心云是白香山所貽覺而有異因續成詩春苑多桃李孤松獨稱心夢中名句味天上紫虚音夫子云何在髙風實所欽詩仙題鳳藻聲價重雞林最有文章貴還知道徳深言辭嘗諫諍勲業不銷沉千里黄河曲三峯華岳臨曇花開一見薝蔔與重尋騎換令公鶴絃添元亮琴唐家猶盛日精爽到如今半日村唐詩人郎士元酬王季友題半日村别業詩村暎寒原日巳斜烟生宻竹早歸鴉長溪南路當羣岫半景東鄰照數家余往來北墅率在夕陽時偶誦君胄之詩謂亦可以半日名兹村也行盡髙城望北原寒烟衰栁向柴門鳥鳴欲下斜陽樹客到堪題半日村自古繁華成寂莫只今好景易黄昏紅罏煖炕推窓坐新月還當泛酒樽夀樊秋試失解有作晉陽宫栁噪寒鵶桂葉飄零烟月斜孺子已堪為逐客老人那得不思家槐根待醒殘年夢梅蘂禁看破臘花聞道春耕田絶少陽坡留與種秋𤓰十一月十七日半日村草堂獨宿壯履以事歸城中排悶作二首曲巷茆堂轉藥欄新豐將作舊村看青山送老千年在紫陌尋幽半日歡懶慢從教書帙亂忙閒放任酒杯寛墻花階草饒春意况有園松耐歳寒半日離家半日歡老人情緒亦無端自憐為客衰顔冷那敢逢人白眼看坐久山村真寂寂夜來冬月尚團團應知短檠攤書處猶是寒窓映雪寒半日村曉起即事沙寒幽草覆清溪步野村邉獨杖藜千里雲山行塞逺四圍烟樹接天低流泉近海還趨北落月臨闗故向西昨夢分明在巖谷數聲催斷五更雞半日村即事述懐寄朱竹垞西郊槐市逺北墅草堂偏紫陌韶華晚黄塵歳序遷偶來嘗半日小住或經年裂帛湖隂迥來青閣道懸飛雲交碧樹幽澗出紅泉覽結情難徧登臨興毎牽繚墻環斗極列館應星躔邸第看榮謝蓬茆得静便圖書容懶慢丘壑可流連入直居人後投林在鳥先風光堪送老景物似歸田洛下三生客江東八詠篇多時常繾綣即事益纒綿伊昔宫庭裏相隨供奉前公才真特達契分與周旋文史紛填委言辭賴討研蛟龍騰彩筆鸞鳳上華箋自賞千金貴誰為半額妍蛾眉從古妬狗監幾人賢浩蕩江湖外蕭條杖履邉寳牀香漸散團扇月空圓花為春愁放風因急雨顛暮霞猶片片霜菊尚鮮鮮獨有殘年者歸與盍已焉對人同野鶴無語類寒蟬㸃綴絲綸簿棲遲粥飯縁漏稀銀箭水日慢綺窓錢身世誠由命行藏豈任天劄嘗兩迴上謂兩進摺子乞歸書待一封專已蠟登山屐還尋載雪船故人知好在雙鬢各飄然天夀崇明徳思君一勉㫋桐城先生輓詩四十韻有序桐城先生初以史官特擢長直内廬閱數載予始由翰林學士掌院事被宣召間日月一至至或更歳時復出與公聫事最久公洊歴院部及參大政入侍帷幄出踐臺閣予前後在官未嘗與公不相從也公既予告歸予實忝繼公後公和而不屈約而能通口無言過動為行表擬量絜徳予多愧焉典型猶在哲人云亡終始之際得無愴懐銜慟致詞畢攄情志同天逰復旦惟岳降生申世向百年老公為千載人台階環斗極箕尾上鈎陳達命元通化登仙竟若神公見夢巳為文昌列仙龍眠騰赤道鵬運絶蒼旻時論歸前輩斯文起後塵過門傷賜第為位哭霑巾令徳今長在流徽久不冺魏徴多嫵媚子夀更清醇履次平如水經冬暖似春共知經術美直取性情真有犯心何校忘機物自馴罷琴聲斷咽别鶴唳嚬呻賤子衰庸日恭承明聖辰追陪紛感激遲暮易逡廵弱植依温樹非材忝積薪凄凉飽韓菽瀟灑想吳蓴餞宴樽罍盛班寮祖席勻湖山疏沼榭雨露滴松筠最愜幽棲志髙標獨立身寒更待漏院羸馬子城闉蕭颯驚從衆乖離失所親冰兢趨閣道惶恐接麻綸往事看調鼎餘波欲問津酒罏約犀首卜肆謝嚴遵自撥形骸累寧由禄命屯且容行坦坦不覺走踆踆指口翻成錯摧眉敢效顰裵囘深殿路邂逅大江濵聚散逾三紀逢迎再浹旬先生憐故舊後死痛沉淪何處青囊藥堪扶凅轍鱗還丹應有術冲舉豈無因溝壑嗟填委雲霄訝屈伸葛公泉味冽苦縣李嘗新帝所升賢喆朝家念舊臣浮生投浄域上宰佐鴻鈞幽賛參軒姒神功邁渭莘精誠仍報國靈爽必殊倫明月清風夜無辭入夢頻園栁送南歸客園栁凄迷戀落暉不成攀折送人歸曉風何處棲枝鳥正是江南雁北飛閣中見題名録有懐張澤長下第村花溪草共柴荆幾度春風在逺行松月照窓思伴直杏烟㸃筆悵題名家山正是懐君處客路翻同下第情那有斯人滯空谷皇天老眼自分明杏花二首昨朝紅蘂巳離離今日花開定不遲未到曉鐘人别去歸時應惜未開時客舍紅芳又一時别時常早見時遲成隂結子匆匆過知汝明年可對誰北寺坐久對花作懶慢時常絶送迎相逢且作看花行忘花坐久兼忘我何况悠悠世上情杏花半落又題二首宛轉辭枝似别家飄零衰白向天涯春光未老多桃李恠底心情為杏花絳雪飄蕭落似銀年年有約趂芳春祗憐白髪終難變總有丹砂信不真去歳與牧仲同出西便門今春過此門感舊却寄音書迢遰雁飛翻往事重堪與細論十里烟花隨輦路五更燈火出譙門東都祖帳何人在北海賔朋舊日存再見渭城新栁色殘年銷得幾迴魂夜讀四書有作蕭然衣馬耻輕肥更覺閒門客到稀未盡百年誰竟是巳過七十早知非天迴鄒魯生人命地轉江河造化機道在六經先四子焚膏還欲繼餘暉獨坐與澤長示隨正獨捲殘書坐誰堪繼夜缸花飛紅濕硯蝶舞緑隂窓晩景春猶在歸心老却降相憐去住意客夢各雙雙春暮卧病志感殘花細雨眼迷離乞取春光為鬢絲裁就緑章封未上一年忘却送春詩雨中簡曹生無數垂楊綰别離春風春雨又歸遲暮鴉棲斷黄昏樹正是平沙落雁時四月初七日病假杜門忽已半月偶遇南使冩懐寄訪濓蕭蕭白髪不勝冠拄笏西山日日看又落牆花知客久未歸江雁覺春寒忘機書向忙中展好嬾琴從静處彈相見故人傳一語只今卧病在長安卧疾寄夀樊春歸何處渺天涯門掩踈籬久客家雨過啼烏還繞樹風吹驚蝶尚尋花緑隂漸覺東牆厚白日迴看西嶺斜有約陽坡棲寂地來時未必及秋𤓰曹生過予彈琴門如寒水近方壺三徑依然興不孤蘿月有情稀客過松風無價待琴沽音聞寂歴銷塵刼烟雨空濛入畵圖萬事浮生難住著儘將閒處費工夫與髙鍊師栁布誰知著隠淪五陵車馬逐流塵古稱燕趙悲歌士我愛雲山歴落人蘿徑風花長避客石壇烟樹若為鄰雅琴自昔同相賞笙鶴從教分外親自題午亭山村圖往年有卜居江南之意撫今追昔因兼寄懐訪濓侍講謹庸宫賛一百韻元㑹中天盛勲華二典懸王畿千里内甸服四門前宫室茅茨下羮牆日月邉瞻依從北極耕鑿向東偏宗祏猗蘭大支條奕葉連我陳真忝竊帝系本纒綿媯汭波流逺胡公錫命專蒼茫經百世播蕩詎三遷履武因蒲坂觀星並潁川地開王覇迹野次觜參躔華岳遥撑拒黄河近折旋歴山容陟降雷澤許洄沿巖壑蠶叢濶峰巒鳥翼翩太行故犄角清洎復淪漣終古唐風在於今舜徳延周家虞叔國原邑趙衰田往事皆如昨遺蹤一浩然闗城紛接塞山水上連天自昔黄圖逈髙居白壤駢距河臨兖雍都冀盡并燕以徳承三統無私戒十愆紛紛强役弱往往急相煎簒奪何知足誅夷或併肩王風委蔓草宗國混戈鋋禮樂資師表詩書費討研鳳兮誠已矣麟也曷終焉茅土乖王命封疆競自便夏盟誰竟主晉國逓相蹎遂有陪臣亂能操共主權九州方迸裂初命更轟闐韓土三分僣留侯五世賢莫强兵馬地獨切虎狼縁七國爭鋒鏑孤嬴擾幅􅊷職方經界壊王制井田寘餘烈窮塵燄殘灰積刼然狐鳴篝火爛蟻鬭穴沙填華屋嗟危栗蒼生痛忿悁三精埋魯壁九鼎墮虞淵自古興亡業何曾白手搴人占芒碭氣天厭祖龍燀戰地無秦壘清時有漢田耎亭名留午壁表字問丁年毎憶樊川藳相同杜牧編標題殊未忝笑語任流傳余所居名樊川昔曾以樊川名集彭澤窮山海桑欽撰水泉閒時供把翫佳處借陶甄適與情相洽還因取自箋㑹心仍古蹟選勝得遺篇白石欣相賞朱坡悔欲湔午亭鄉夢短故壠客心㾓迴首余生後移家宣徳先吾宗繁子姓小子一夫㕓頗按酈生註幽尋沁水谸析城髙掩映上澗側便姍濩澤東交滙陽阿左洑漩浸山霞縹緲潄石玉潺湲獨往淨如練單行清且獧樊山迴峻嶺丙舍列長梴峽起村完聚風藏氣鬰芊西流東澗水南暝北峯烟物外人稀到區中事少牽桃花春十里桐葉歳三千舊是唐封地兹為世陌阡古今同一慨俯仰各相憐過隙云何駛安居即是禪生涯從薄産貧樂悟真詮猿鶴容疎放雲烟不棄捐但攻章句學寧為藻辭妍在昔龍門史能驅虎觀員汾川宗浩浩洓水破濺濺天使斯民覺心歸至道堅斗標聫氣色桑梓接壇筵詎敢憐同調因之願執鞭文瀾寛似海義路直于弦源逺惟涓滴途長祗躓顛龍鱗攀莫逮鵬翼附難騫忽漫思姑射聊將效偓佺幽憂能解免羈思遂拘攣只訝廵欄鹿還悲飲露蟬自教身寂莫豈是遇迍邅狷㓗思巢父孤髙慕善巻衡茆今未逺仕隠古難全肝膽分秦越菁華合削朘少言羞拙訥多病愧娟嬛腕力驚鸞紙臀膚困馬韉金丹誰與鍊白髪豈須蠲蝶粉頻銷落蠶絲數裹纒阮孚幾蠟屐子敬舊青氊荏苒時將晚蹉跎業未竣春華今巳謝夏月又重圓留舫思安道登樓憶仲宣草池珠並綴雪塢璧常聨河北歸樵路江東下釣船故人徴晉問南國被薰絃吳地觀型土堯封慕采椽騰翔憑騕褭蹇鈍託䕫蚿獻納勤三祝謳歌暨八埏采洲思杜若卜築試筳篿葺芷編荷屋疏蘭傍蕙櫋蓴鱸與藜糝那復異坤乾牆邊隙地可種栁有感而止贈張大夢到鄉園覺後驚天涯芳草傍愁生牆邉更不栽楊栁恐惹征人去住情病起夜詣苑中簡方若一月閒居理去裝連宵又罷乞身章風迴烟草春如夢月上溪花夜有香嘶馬漸隨雞唱逺流泉還與漏聲長思君未了詩縁在擬向樽前醉幾場方若見和復次韻一世生涯在槖裝明珠照乗辱新章我如散木天容老君比幽蘭國有香魚鑰曉催鐘漏盡馬蹏春緩玉鞭長九衢三畆都陳迹且可相尋翰墨場野寺寄素心伏枕春歸見夏雲眼中物態又紛紛林花飄落隨殘靄牆栁玲瓏暎隙曛一簇逰蜂憐幻影幾迴喧雀斷聲聞俗縁易了情難遣詩思禪心並憶君嵇母節夀詩編修嵇曽筠母博士永仁夫人表忠有喜到慈闈彩鳳銜書下紫微天上尾箕明歳次人間蘭玉茁春暉賔朋重整陶家讌綸綍新裁孟母機賜得錦袍親看著開箱還檢侍中衣湯西厓視學中州使還簡懐别久思君首重搔音書斷絶夢魂勞中流濟水清長在秋色嵩雲晚並髙自有雄文歸諫苑信知亷吏出詞曺相逢不覺衰顔冷喜共承平氣象豪題西亭榆樹寄豫朋二首白榆歴歴在秋河種向亭前映緑莎幾度西風見摇落樹猶如此奈人何紙上功名換笠蓑槐庭栁塞不爭多只今垂老漁陽客望斷關榆曳落河八月十二日半日村侵曉夢獨行迷失道攀縁絶磴上見土壤平豁枕山帶郭風氣鬰然有朱衣夾路問之曰合肥李公墓也哭失聲而覺二首夢魂枕上江南路覺後初當墮淚時宿草幾迴秋色老傷心為欠哭君詩雲車風馬像平生指㸃朱衣導我行囘首黄扉十年事荒原今日見交情韓質良來自梅莊憶舊逰却寄舍弟問訊山中客山中十載前朱坡連杜曲石塢自樊川看竹擕殘帙題松襞短箋曝裩家似阮欹枕腹如邉燕壘花銜補鶯窠栁對懸陶琴元未鼓姜被㡬迴眠苔滑經妨屐沙晴坐勝綿寺樓釃酒借鄰舍引渠穿行馬能踈放騎驢任倒顛山歌遲嶺月牧笛上墟烟雞犬知人意樵漁省世縁至今溪水上閒却夕陽船題紫滄醉吟圖二首閣道天街隔禁林黄昏獨坐紫薇深如今問取香山老那有閒時得醉吟長慶文章筆晉人十三行後㸃波新情知子敬風流在故遣生綃畫洛神謂圖中冩景周在清孝亷館王眉長學士家數以學士意來診視余疾冩懐申謝之作十二韻卅年如隔世相對意蒼茫蘂榜人還少槐根夢許長物華遽超忽遲暮獨凄凉語黙思難遣逢迎性頗傷病縁聞道晩時為訪醫忙臣朔公車客留侯辟榖方藥來嘗苦口事往戒迴腸肝膽雖顛錯心神頓激昂古人知國士吾老惜文場伴直因松月棲巢得鳳皇雲天殊浩濶鵬路合翺翔他日紆簮紱無須學楚狂題衛㑹嘉竹間圖二首浮筠瀟碧野烟生天帚還應傍玉清不度岑華尋嶰谷此中自有鳳皇鳴瞻彼淇園衛叔賢風人載詠武公篇誰知千户侯封日十畆依然在渭川己丑八月予承祭聖廟我裕以分獻同事越日見示冩真冊子徴予近詩走筆題四首夫子宫牆數仞尊婺源源水接崑崙百官宗廟多時見正是長身幾世孫長恨摳趨後魯堂三千弟子不同行也應髙士軒中去灑埽還賫一瓣香曾聞五老降星精萬古宗祊在魯城不見閩天誕睿日芙蓉藻井白虹生先聖生有五老降庭文公誕降於閩是日有白虹起於婺之丘壠我裕家吳楚間故有此首珠嚢金鏡赤書新冠劍何堪間後塵四海絃歌同此日故應吟詠作詩人王藎臣將還故山見過取别大隠還須讓散人翛然採藥問歸津巳將白髪安吾老只為丹砂濟世貧午枕流連鄉夢逺閒門剥啄子來頻故山亦有胡麻飯莫向天台訪玉真午亭文編巻二十
