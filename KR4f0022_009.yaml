body:
  text: 午亭文編巻九大學士陳廷敬撰今體詩世廟實録預纂修恭紀二首天顔如覲祕函新東觀重登載筆頻日厯早垂青史事編年仍屬舊詞臣容衣弓劍春前淚玊几江山戰後塵手闢太平歸聖主寢園雲氣繞楓宸清霜版屋起炊烟車馬重城轉寂然寒夜衣裳眠待漏蕭辰婦子話歸田攜家身訃兼生計拜禄餐錢倍俸錢史職月給餐錢倍俸卻念兩朝虚供奉秋風霑灑孝陵編郊祀朝賀恭紀呈實録館諸公昨夜陽回曉仗過天門鐘鼓競鳴珂朝衣舊染罏烟重宫日新移扇影多雲物編年書鳳簡嵗華簪筆紀鸞坡亦知詞賦工無益若為昇平許載歌蚤春局中感成苑樹輕烟已鬱葱玉霄散吏閤門東日疏直草官真曠月有餐錢槖未空輦路三年春色裏家山千里夕陽中承恩終乏涓埃報老大従敎歎轉蓬題家書後楊栁紅亭路青青又放春逺逰思弟妹薄禄謝交親客裏南來雁愁邉北去人梅花忩下月二十五回新生日次韻酬熊次侯學士詞垣風義動簮紳門引詩賢有白申相見官曹貧似病敢論人物積如薪焚餘蕉史思殘事别後槐㕔共㡬人先是同直明史舘自笑陸生新鬢髮浮沉空歎二毛辰生日寄張氏妹年華驚久客宅相足離憂姻婭思前事園林阻一丘到州無百里歸路卻千愁為報髙堂語年來尚黒頭三月廿八日劉户部公㦷招同汪户部苕文吴編修玉随董御史玉虬梁御史曰緝王儀部貽上李檢討湘北集宣武門東河樓看栁三首十載來燕市三春上薊樓樹驚為客老人惜送春逰烟月章臺路風花灞水流纎條兼弱絮管盡古今愁城下春流憶逺江樓邉栁色坐平忩東風還肯留三日乗興能來倒玉缸紅簾亭子枕城河雲氣青青水碧波楊栁千條春不去一聲吹笛落花多髙陽公為廣文楊廣生索詩平生托贈興蕭然東閣驚呼賜彩箋君許才名三省重我慙詩句萬人傳絳紗早設諸公帳醴酒新開相國筵最羡龍門門下士後堂髙㑹過彭宣夏夜懐玉谿舊隠寄張顯卿四輔三伏向盡朱火蔵炎蒸未巳愁中腸流螢入簾故宛轉明星照席何低昻琴書休夏年力異藥餌經時歸興長焉得清溪千尺水與君濯足臨滄浪立秋夜懐張賁白吉甫丈露濕西清螢火流東山花月想同逰宦情寂寞従人嬾客路悲歌可自由暮雨幽花閒戍壘驚風吹角動城樓庭前摇落梧桐影知到鄉園㡬葉秋樓堞樓堞青霄外黄雲帶古城凉天􅓋篥動斜日槖駞鳴朔色沉西塞秋光冷北平闗山對何極霜露逺含情舊舘舊舘金臺坼秋城粉堞斜凉風吹白草落日澹黄沙交道存屠狗人情忌畵蛇誰能市駿骨委棄在天涯雙扉白版雙扉掩青籬小院幽心情堪舊事肺病及新秋疎樹墻月墮閒花堦露流誰知清夜景一併入繁憂心跡月上還在路雞鳴已出門養親甘仕宦為客别田園白髪無才思青山只夢魂輭塵没鞍馬心跡向誰論郊壇道院臺下青隂覆院牆槐花落地㸃微黄風軒便是修心處欹枕蟬聲送午凉夜歸白月清沙照夜深城南歸路漏沉沉笙歌豈是無情物不染西忩晏坐心懐青丘舊隠愁絶懐人夜心飛一葉秋孤征猶北雁别恨自南樓一夏幸無病三年成薄逰陽坡𤓰熟否摇落舊青丘與比鄰孫侍御懐傅隠君青主西山出屋角峯色共東家墻上頻過酒籬邉數見花嶺雲連嵗晩鄉樹極天涯汾水相思處殘陽㡬度斜送孔動之赴瀘州舊知瀘水逺天盡暮雲邉雁過逢江雪蠻歌隔瘴烟到京逾萬里為郡在明年南顧勞黄屋還將喻檄傳秋夜懐吴玉随玊騧碧雲似逺水銀浦漾寒流㡬度長安月何人江上樓潮廻揚子渡山擁秣陵秋憭慄西風起蕭蕭落木愁八月十一夜夢中作夕夢逰仙散客愁羽衣鐵笛海山秋笑看泰華如巻石星宿黄河一線流城下夜行憶樊溪秋近髙樓玊漏清金笳吹月送殘更馬蹄夢續闗山路猶聽泠泠澗水聲秋日懐崔定齋移家百泉青門楊栁送君行露葉風林逺思生忽見荒寒秋樹色却憐烟月舊逰情闗河雁後書難寄風雨鐙前夢未成聞道移家傍淇水范陽桑柘接凄清玉随使還夜集有作一行書信附詩筒兩見燕山木葉紅嶺外啼猿江路險閩中秋雁海天空郵籖夜語船忩月驛騎朝吟浦岸風芳草王程歸路逺今宵清漏禁城東荅平定齊守西來山驛停車日囘首并州又兩年嵗暮懐人逢雨雪天寒行部問耕田政成神爵元堪下旱後螟蝗劇可憐尹鐸昔曽勤保障使君今比晉陽賢十月十五夜月蝕圎魄初無影浮雲亦暫明衆星翻歴亂寒夜自青熒蓂莢疑全落姮娥似始生鼔鐘聲不斷曖曖動皇情閒情習習簾風動娟娟窓月明歡娱分夜漏安隠謝時名文賦粗能解山經細欲評較量身外事難得是閒情花月對月但覺好看花欲奈何登樓還縦目把酒復髙歌不畏風凉冷能禁病折磨青蘿掩窓坐宴息似山阿友人送梅瑶華肯相贈逸興滿春雲屋小稀枝放窓明細蕋分影憐寒日伴香惜定中聞渾似深山坐朝朝到夕曛瓶梅林下沙邉憶舊時野梅今向綺窓移坐看疎影横斜勢行索寒香淺澹枝未許風塵妨笑眼肯令冰雪老愁眉勞生共爾徘徊意釣艇漁磯是後期上元雪過靈祐道院六分春色一分知暇日初逰興不遲野舘隂晴連畤樹廟門風雪下靈旗鶯花世界空濛裏燎火京城雜沓時歴遍海山尋兜率雲霞歸路重相思上元夜雪過吴玉随編修次孫惟一侍讀韻贈潘吴兩生暮雪寒威獨有權帝城如海醉誰先東華嵗月新正酒北斗隂晴萬里天走馬競尋元夜約題詩須趂落鐙傳孫郎帳下才無敵不少江東子布賢㑹稽唐公以寜國郡丞入覲示詩留别依韻奉酧二首青門祖道少人知歸去翻酬别後詞湖海未消新意氣東南應起舊瘡痍督郵束帶心難下閭左無衣涙欲垂此日澄清闗大吏一官那肯合時宜誰言司馬江州日却是宣城治郡時落落公才今並駕悠悠吾道欲何之昭亭草色縈征騎宛水春流入夢思别後吴天諸父老閒田爭譲府君慈蚤春有懐同館諸公徃事凄凉供奉秋明光曉蹋記同逰衣冠諸子今誰在昏宦三生可自由遲日燕鶯京陌路東風花栁故園樓年華㡬度垂垂老擥鏡潘生欲白頭清明日過吴耕方編修寂寂桐華院萋萋芳草茵禁烟連日雨射栁一年春時序交㳺老行蔵鬢髮新篋中三賦在遺慟泣龍鱗丁酉南北闈覆試耕方三試皆第一夜雪春衾曉寒重髙齋殘夢清忩前知夜雪沉沉折竹聲絶句花魂栁影逓消磨春日春情一半過不是道人閒不出前廊後院葛藤多寒食絶句參差紅杏栁條斜冷節闗山不見家一陣晩寒風色惡絶憐天意為吹花與楊琴士城南野飲官菜園西緑漸深草痕随路得幽尋浮雲不定髙天色野水多連古岸隂忽忽未知生是樂茫茫須覔醉時心一壺珍重銷愁物曲罷還教與細斟集吴玉随編修宅同令弟玊騧給事兄是東坡弟潁濱官曺文采並同倫黄門草奏趨青𤨏紅藥翻書對紫宸蚤夏酒杯三五夜西華朝鼓十年鄰曉天連步深更語一月相邀定㡬廵春日懐孝章素心六箴與可荀少公幹簾閣翠微西雲山望欲迷晩風歸雁急細雨落花低文史何狼籍音書故解携愁心牽短夢春草逺萋萋午夢夾巷皆秋色車塵稀到門草花知旦暮蚱蜢試寒温午夢離西閣青山入故園久躭幽僻趣有得是無言夜讀書情一事悲歡酒一觴百年回首興蒼茫孤鐙讀史雄心在明月懐人旅夢長碧草逢春連大漠紅顔經嵗老漁陽紙錢麥飯西陵路惟有桃花欲斷腸春曉宿鳥檐前倦未飛葱曨忩外曉星稀闗心眠食何曽是過眼榮枯旋覺非凍樹雨翻花欲綻雕梁風埽雁初歸澄懐觀物三春過且向塵埃自息機逰慈慧寺春氣鳥鳴細谿流花影重雙林在何許烟際聞微鐘記夢夢與故人語同在南水頭覺誦故人詩淚添清波流天漢一道白虹秋居然天漢流荒雞聞午夜殘角想邉樓兵氣闗春色花時送客愁西凉今右臂設險貴前謀雨中懐貽上慈仁寺城南坊北路遥思積空烟忩急初更雨衣寒四月緜徘徊坐鐙燭繾綣把詩篇欲訪維摩室愁時獨蚤眠過惟一夜歸口號醉别清樽緑歸憐蠟炬紅六街星爛漫一水月空濛檐鳥宿已久院花隂漸䝉所居隔深巷清漏此時同大司馬芝麓龔公招同劉公㦷吴玉随梁曰緝汪苕文程周量王貽上李湘北陳其年集城南送董玉虬御史赴隴右分用杜公秦州詩韻得彊字繁字南院逢君日秋來十載彊曉風天語近晝刻奏書長度隴新旌節行邉舊驌驦秦州西日外極目已蒼蒼日下秦闗險霜前隴樹繁寒花迎驛騎秋色動河源渭北雲山道江南烟水村行蔵倚聖主莫更憶蓬門此二詩玉虬一日因酒㑹謂諸公曰一時作者此為第一雨夜憶故山與翊聖栁色鶯歌别鳳池春山寒雨夜相思如何客舎青燈裏却憶春山惆悵時曝書書帙閒庭曝晩凉牙籖萬巻爛生光螢忩蠧壁情何限送老流年付夕陽書貽上所蔵畵秋來最有江山興夜雨寒披積雪圖水驛無人村徑晩梅花滿地月明孤九日大司馬龔公招同諸子集城南登髙以東籬南山為韻四首令公開宴地秋色翠微中雁帶邊城雨臺臨古木風鄉心紛逺近客望各西東四海孤蹤晩登髙㡬處同灞滻登髙㑹龍沙久客時望鄉秋步健灑酒壮心衰共訝狂花早翻疑晩菊遲暄寒驚節候杏蕋艶疎籬時春卉競開晩霽開亭帳秋聲萬樹含天清斜月下地僻古城南紅燭催更柝黄花上盍簮謝公墩似昔長此得停驂尚書真北斗供奉媿清班宻坐分杯數歡㳺著屐閒江天銷戰伐秋戍静闗山鼓角中宵罷酣歌未擬還菊遲簡鈍菴梧桐欲落拒霜催斜日空庭雁影來更有寒花知客意籬邉秋晩待君開秋日過惟一故人憐寂寞相見慰招尋薄俗心難定浮生病轉侵花寒秋色晩酒盡客情深興發忘摇落歸鞍聊一吟送孫古喤還嘉興君是承明客江蓴别思牽才多科第外名起孝廉前海近聞琴處潮分字鶴田髙堂㳺子意白髪向秋偏中秋夜集惟一宅送别二首百年今夜月終古獨横秋蕭颯三時别空明萬象收闗河臨客路星漢入歸舟摇落天聲滿清淮木葉流圓月秋頻見離人酒一巵髙城霜下蚤江路雁飛遲霑灑臨風淚凄清欲别詩射湖足烟水繫艇一相思送陳其年歸宜興白雁過時木葉青霜林秋氣已凋零相思後夜孤帆客知宿江程第㡬亭送孫惟一還鹽城次李湘北餞别韻三首秋花落盡雁還來一到離筵尊一開九月淮南芳草在三年湖上釣船廽蓴鱸已覺新詩好鷗鳥何知後命催風栁青門黄葉路交情白首為裵􅏆三年兩度返巖阿酒癖詩魔是舊疴漸老離情今夜重近來懐抱向君多一官同舎歸偏蚤有客孤蹤滯若何明發更堅臨别約髙秋江上慎風波寒暄又歴嵗時頻忽漫鐙前百感新綾餅夢回春宴地旗亭詩冩酒䦨身鶯花過眼同官日水旱驚心去國人此夕重門猶咫尺銅龍清漏易傷神對菊秋老凋羣卉天寒有菊花月稀堦影白風定檻枝斜獨立真憐汝逢開每憶家故園經别處籬外是天涯秋夜聽楊山人彈琴古調繁聲外秋林方颯然松風兼曲度海月映人妍信指初三叠忘言只一絃白頭温室夜供奉説當年酬王北山給諌題寓亭竹影如子寒天裏能來夜叩門髙風摇菉竹明月正黄昏鐙亂廻看色階移欲别痕何時為貰酒留醉坐霜根十月晦日書懐冬日初凄𦂳年華已暗侵不因身病蚤那覺道縁深筋力趨朝異才名與世沉晩風黄葉下髙鳥急投林長至日雪中下直晩風人下校書樓吏散烏啼暝色幽日影已旋天北極雲隂漸合殿東頭金鋪欲鎻千門静葭琯初吹六出浮恰是微陽如綫日九霄清冷不禁愁送李容齋還合肥燈火空堂嵗載隂倉皇忍對欲分襟一官竟有瞻雲恨舊事誰憐捧檄心南使闗山音信少北風雨雪淚痕深國書未就歸偏蚤京雒相看去雁沉廣寧門再送容齋二首西門一步地送客已他鄉古廟官橋下離亭大道傍塞鴻初斷影灞栁不成行翹首懐人處闗河近夕陽壯逰芳嵗晩屢别客愁新草土霑衣淚烟霄抗手人白雲虛在目落日對傷神忍約重來事萋萋苑樹春嵗暮寄午亭友人二首小驛星軺問路岐梅花寄與隴頭枝烟霜闗塞春來蚤燈火音書夜到遲為客漸多殘嵗事懐人長别少年時相思不及東風便楊栁西園取次吹嵗盡雲山客倦㳺每當落日憶吾州鼓鐘白堕荒城社風雨黄昏舊寺樓别久交親多入夢官貧僮僕亦知愁殘書濁酒真無那有底閒時不自由嵗暮二絶句掾曹京兆亦何求正使官貧得自由寂寂年華尊酒在蒲桃一斗勝凉州爆火紛紛近嵗除闗山迢逓記離居南溪明月梅花路香粉飄零十載餘次韻吴黙巖司業戊申除夕韻二首守嵗椒花已頌春芸香藜火待元辰一天雨雪東風轉萬里星河北斗新玉漏滴殘藍尾酒金龜解向謫仙人年華終古蒼茫裏甲子從頭㡬戊申金鑰千門午夜風玊珂聲在夢魂中黄封酒賜春波緑白獸尊開曉炭紅石鼔文探岐獵後蕉園草起日華東十年朋舊官曺改潦倒鵷行舞拜同己酉元日蚤朝叠除夕韻二首斗轉風廻左掖春頻年簪筆侍元辰看移雉尾疏星落行近螭頭曉霧新三殿旌旗分閣道九門鐘漏聽雞人太平朝會垂衣蚤欲採民風取次申玉律陽回靜朔風鑾坡嵗月漏聲中苑墻夕燎霏烟碧宫閣春雲送曉紅朝褏香濃天仗外歸鞍日霽掖門東欣逢主聖時清際禁近何人作頌同正月七日憶昔西清侍從辰忽驚遺詔泣龍鱗乾坤自此新陵寢嵗月依然舊史臣幾度春光如短夢每逢人日易傷神當時記輓宫車出慟哭東風賸㡬人蚤春實録舘呈素存編修兩朝金鑒在鑾坡春色東來王氣多苑裏鶯花新嵗月眼中松杏舊山河直廬風雨分藜火散帙縑緗映玉珂香案前頭親授簡曲江風度好誰過新正小集渭城客路𣺌闗河惆悵何戡别後歌千里鄉園春色逺一時京雒故人多愁邉燭影看書劍花外杯香憶薜蘿誰道長楊叨侍從十年心事媿鳴珂上元夜二首閒却銅街玉漏聲落梅風起蹋塵行十年走馬歡娱地卧看蛜蝛獨夜情玉館金牀坐上貂鈿蟬銀甲閙檀槽健兒正罷征東役刁斗無聲夜月髙張侍郎送鱘魚回首清江興𣺌然玊鱗網送蚤春前秋風漫有鱸魚思已得槎頭縮項鯿曉角宣武門西聽曙更東華魚鑰漸平明獨聞曉角春城上立馬風前第一聲摩訶菴再逰四首别久祗林樹山門繫馬開清明三度過花栁兩廻來圃亂春畦水僧閒退院苔沙鷗相對立鶯燕莫嫌猜暮景西村僻精藍此地逢殘花落清梵深竹度烟鐘春雨紅樓暗香林碧樹濃近來幽意愜巾拂對從容後園臨野色春日自凄迷暄冷時無定鶯花晩未齊墟烟松鼠竄山暝木魈啼回首髙梁水蒼蒼落照低登臨小丘上空際碧巉巉澗底長松䕃山义落日銜野花随步屧村酒濕春衫大塊韶光晩柴闗憶舊巖酬上官松石廷尉二首如茵芳草傍春城三月東風聽蚤鶯栁外朝衣霑雨過花邉官馬隔塵行鴛鸞嵗月多新侣水石風流少舊盟莫問買山歸隠計濟時今望宦先成春色輕隂暗禁城宫花萬樹宿流鶯斗間自識雙龍氣門下今容駟馬行法從君當雷雨候冷官吾守嵗寒盟題詩欲盡燈前意漏下虛堂句未成雨夜雜感宿火微紅映曙光楮衾猶挹博山香愁心歸燕迷蓬户客夢啼烏過女牆裘馬故人誰感激狗屠交道亦凄凉春來歴亂傷心處細雨寒生覺夜長送王北山給事歸茬平二首惜别梧桐樹西垣一院隂封章終夜上御札十行深饑溺憂民日艱難去國心孤山開舊墅簪紱羡投林珥筆承明地回鑾羽獵辰風波萬事濶聚散十年頻舊邸歌重聽離亭酒一廵時清東海上未許戀垂綸雨中集田沛蒼學士宅和白東谷先生琉璃厰西急雨飛驅車到門雨細微緑忩隔席寒淰淰紅燭巻簾烟霏霏潞州濁酒琥珀色藐姑羣公氷雪肌夜深霑醉此何適得歸射獵開荆扉送少師衛公還曲沃二首一卧雲霄殿閣空主恩容易别鵷鴻兩朝清論氷心後四海蒼生病疏中絳灌調和惟相國廟堂鎮静賴元功玉堂制草西清直㡬處孤踪歎轉蓬黄扉十載握丝綸勅斷來章請急頻食禄還同三省厚賜金特為二疏貧舍人圖史歸装舊驛路雲山入夢新先帝老臣今澤渥祝公眠食慰斯民書局即事栁邉走馬夾城西落盡桃花燕麥萋玉局一春休沐少金門十載夢魂迷黄封勅使開緗帙白首宫臣識御題下直却如歸院晩槐隂依舊暮鴉啼寄楊松谷鄴下寒雁南飛欲盡時北來鄉信苦參差闗河匹馬身何適風雪綈袍淚暗垂漳水烟波空浪跡銅臺歌舞自深悲年華冉冉征途裏寂寞黄門數首詩松谷故給諌沁湄子送劉公㦷吏部還潁州懐抱何由好逢君欲細傾行蔵輸萬事文酒負平生數聽驪歌亂猶聞玊漏清藤隂他夜月蕭颯别時情城南即目莫作近前嗔行㳺野水濱委心随萬物留眼送殘春眠栁如人嬾孤鴻似客貧晩花一含笑多恐對傷神飲酒花下與翊聖東風冉冉逐流塵憶昔相逢似隔晨㡬樹庭花迎蚤夏一年心事送殘春青衣度曲傳新調白首同歡感故人記取坡公催秉燭光隂臨老速奔輪買馬買馬黄金事已非青驄門外繫斜暉玉闗别後嘶風逺苑路騎來汗血微顧影自驚髀肉老喜心翻覺羽書稀渥洼空有騰驤步蹋徧秋城草未肥寄素心六箴與可蚤凉睡美輕鐘後忽憶對牀風雨清十年仕宦差一笑少日文酒空深情故園池臺𣺌岑寂客路荆棘長從横我行歸休君努力那將嬾漫趨時名懐荀少公幹少睡多愁夜秋忩夢不成西樓風雨恨南浦别離情有患吾身老相憐萬事輕年華又摇落息念學無生冬夜行河上潺潺石橋水遥接漏聲長澄月金鋪鏡清沙玉糝霜臘殘催物候冬暖入年芳莫紀無氷日溝渠只向陽張東山少司㓂宅觀奕人事紛紛似奕棋故山回首爛柯遲古松流水幽尋後清簟疏簾對坐時舊壘滄桑初歴亂曙天星斗忽參差祇應萬事推枰外夜雨秋燈話後期玉河橋夜行寄苕文一道銀河下玉京雙魚北上逺含情九門夜鎻邉風落愁聽南飛過雁聲王樸菴編修見過同作落葉蕭蕭冷碧波衝寒羸馬肯相過五升方朔饑時米八詠休文病裏歌城闕秋隂風雨盛江湖天濶夢魂多即論婚嫁今難畢歸去青山奈晩何睡起遣興寄汪沁水霜月車輪犯曉沙軒忩歸卧夕陽斜嬾書咄咄空中字自愛蘧蘧夢裏家濁酒三杯聊送暖寒鐙連夜自成花却因寄語青山尹擁被黄紬蚤放衙夜行雞聲催我行起坐殘夢接蕭條夜來風開門滿落葉落葉何翻飛驚風吹馬首夜行不見人明月照髙栁詠史四首舎人兒七十好竒計黄金生内疑鴻門不見聽笑殺外黄兒歴下軍野渡平原水孤軍歴下城田横方縱酒酈生已就烹李少卿少卿軍數急貳師何逡廵腐刑下遷史終為李夫人蘇子卿雪中何所餐野鼠勞供億流連青史編一昔為不食學書頗勤自嘲筆家成堆潑墨香練帬棐几抵縑緗臨池晩覺黄庭好掩鏡先愁白髪長身世葛懐非浪迹古今臧榖共亡羊梅花書閣殘陽下把翫流年亦自傷晚出宣武門懐舊逰寄公㦷玉虬宣武門東記舊逰暮鴉啼徹夕陽秋楊花落盡風流散别後何人上水樓樓居望西山秋杪思紅葉冬來眺碧巒夕陽過磵逺山色入窗寒嵐氣通書幔香泉嫋釣竿烟光三十里春到約重看夜雪懐人夜雪逢君事𣺌然梅花庭北緑尊前如今見雪長相憶旅舘寒燈十六年落葉紅牆楊栁夾城頭落葉西風滿逕幽夜度玉橋秋色逺清波明月送深愁己酉除夕前一夜小集懐午亭舊逰二首此夜如除夜他鄊是故鄊殘年驚隔日徃事樂千塲山路梅花放村帘竹葉香平生嵇阮輩嵗月老清狂點檢京華事叢殘守嵗詩葦桃催臘蚤梅栁入春遲署尾多新字題襟减舊詞風流銷歇甚應遣故人知午亭文編巻九
