body:
  text: 午亭文編卷九大學士陳廷敬撰今體詩世廟實録預纂修恭紀二首天顔如覲祕函新東觀重登載筆頻日厯早垂青史事編年仍屬舊詞臣容衣弓劍春前淚玊几江山戰後塵手闢太平歸聖主寢園雲氣繞楓宸清霜版屋起炊煙車馬重城轉寂然寒夜衣裳眠待漏蕭辰婦子話歸田攜家身訃兼生計拜祿餐錢倍俸錢史職月給餐錢倍俸卻念兩朝虛供奉秋風霑灑孝陵編郊祀朝賀恭紀呈實録館諸公昨夜陽回曉仗過天門鐘鼓競鳴珂朝衣舊染罏煙重宫日新移扇影多雲物編年書鳳簡嵗華簪筆紀鸞坡亦知詞賦工無益若為升平許載歌蚤春局中感成苑樹輕煙已鬱蔥玉霄散吏閣門東日疏直草官真曠月有餐錢槖未空輦路三年春色裏家山千里夕陽中承恩終乏涓埃報老大從教歎轉蓬題家書後楊栁紅亭路青青又放春逺逰思弟妹薄祿謝交親客裏南來雁愁邉北去人梅花忩下月二十五回新生日次韻酬熊次侯學士詞垣風義動簮紳門引詩賢有白申相見官曹貧似病敢論人物積如薪焚餘蕉史思殘事别後槐廳共幾人先是同直明史館自笑陸生新鬢髮浮沉空歎二毛辰生日寄張氏妹年華驚久客宅相足離憂姻婭思前事園林阻一丘到州無百里歸路卻千愁為報髙堂語年來尚黑頭三月草八日劉户部公勇招同汪户部苕文吳編修玉隨董御史玉虬梁御史曰緝王儀部貽上李檢討湘北集宣武門東河樓看栁三首十載來燕市三春上薊樓樹驚為客老人惜送春逰煙月章臺路風花灞水流纎條兼弱絮管盡古今愁城下春流憶逺江樓邉栁色坐平忩東風還肯留三日乘興能來倒玉缸紅簾亭子枕城河雲氣青青水碧波楊栁千條春不去一聲吹笛落花多髙陽公為廣文楊廣生索詩平生托贈興蕭然東閣驚呼賜彩箋君許才名三省重我慙詩句萬人傳絳紗早設諸公帳醴酒新開相國筵最羡龍門門下士後堂髙會過彭宣夏夜懷玉溪舊隱寄張顯卿四輔三伏向盡朱火藏炎蒸未巳愁中腸流螢入簾故宛轉明星照席何低昻琴書休夏年力異藥餌經時歸興長焉得清溪千尺水與君濯足臨滄浪立秋夜懷張賁白吉甫丈露濕西清螢火流東山花月想同逰宦情寂寞從人懶客路悲歌可自由暮雨幽花間戍壘驚風吹角動城樓庭前搖落梧桐影知到鄉園幾葉秋樓堞樓堞青霄外黃雲帶古城涼天􅓋篥動斜日槖駝鳴朔色沉西塞秋光冷北平關山對何極霜露逺含情舊館舊館金臺坼秋城粉堞斜涼風吹白草落日淡黃沙交道存屠狗人情忌畫蛇誰能市駿骨委棄在天涯雙扉白版雙扉掩青籬小院幽心情堪舊事肺病及新秋疏樹墻月墮間花階露流誰知清夜景一併入繁憂心迹月上還在路雞鳴已出門養親甘仕宦為客别田園白髮無才思青山只夢魂軟塵沒鞍馬心迹向誰論郊壇道院臺下青隂覆院牆槐花落地點微黃風軒便是修心處欹枕蟬聲送午涼夜歸白月清沙照夜深城南歸路漏沉沉笙歌豈是無情物不染西忩晏坐心懷青丘舊隱愁絶懷人夜心飛一葉秋孤征猶北雁别恨自南樓一夏幸無病三年成薄逰陽坡瓜熟否搖落舊青丘與比鄰孫侍御懷傅隱君青主西山出屋角峯色共東家墻上頻過酒籬邉數見花嶺雲連嵗晚鄉樹極天涯汾水相思處殘陽幾度斜送孔動之赴瀘州舊知瀘水逺天盡暮雲邉雁過逢江雪蠻歌隔瘴煙到京逾萬里為郡在明年南顧勞黃屋還將喻檄傳秋夜懷吳玉隨玊騧碧雲似逺水銀浦漾寒流幾度長安月何人江上樓潮回揚子渡山擁秣陵秋憭栗西風起蕭蕭落木愁八月十一夜夢中作夕夢逰仙散客愁羽衣鐵笛海山秋笑看泰華如卷石星宿黃河一線流城下夜行憶樊溪秋近髙樓玊漏清金笳吹月送殘更馬蹄夢續關山路猶聽泠泠澗水聲秋日懷崔定齋移家百泉青門楊栁送君行露葉風林逺思生忽見荒寒秋樹色却憐煙月舊逰情關河雁後書難寄風雨鐙前夢未成聞道移家傍淇水范陽桑柘接凄清玉隨使還夜集有作一行書信附詩筒兩見燕山木葉紅嶺外啼猿江路險閩中秋雁海天空郵籖夜語船忩月驛騎朝吟浦岸風芳草王程歸路逺今宵清漏禁城東答平定齊守西來山驛停車日回首并州又兩年嵗暮懷人逢雨雪天寒行部問耕田政成神爵元堪下旱後螟蝗劇可憐尹鐸昔曽勤保障使君今比晉陽賢十月十五夜月蝕圎魄初無影浮雲亦暫明衆星翻歷亂寒夜自青熒蓂莢疑全落姮娥似始生鼓鐘聲不斷曖曖動皇情間情習習簾風動娟娟窗月明歡娛分夜漏安隱謝時名文賦粗能解山經細欲評較量身外事難得是間情花月對月但覺好看花欲奈何登樓還縱目把酒復髙歌不畏風涼冷能禁病折磨青蘿掩窗坐宴息似山阿友人送梅瑶華肯相贈逸興滿春雲屋小稀枝放窗明細蕊分影憐寒日伴香惜定中聞渾似深山坐朝朝到夕曛瓶梅林下沙邉憶舊時野梅今向綺窗移坐看疏影橫斜勢行索寒香淺淡枝未許風塵妨笑眼肯令冰雪老愁眉勞生共爾徘徊意釣艇漁磯是後期上元雪過靈祐道院六分春色一分知暇日初逰興不遲野館隂晴連畤樹廟門風雪下靈旗鶯花世界空濛裏燎火京城雜沓時歷遍海山尋兜率雲霞歸路重相思上元夜雪過吳玉隨編修次孫惟一侍讀韻贈潘吳兩生暮雪寒威獨有權帝城如海醉誰先東華嵗月新正酒北斗隂晴萬里天走馬競尋元夜約題詩須趂落鐙傳孫郎帳下才無敵不少江東子布賢會稽唐公以寧國郡丞入覲示詩留别依韻奉酬二首青門祖道少人知歸去翻酬别後詞湖海未消新意氣東南應起舊瘡痍督郵束帶心難下閭左無衣淚欲垂此日澄清關大吏一官那肯合時宜誰言司馬江州日却是宣城治郡時落落公才今並駕悠悠吾道欲何之昭亭草色縈征騎宛水春流入夢思别後吳天諸父老間田爭讓府君慈蚤春有懷同館諸公往事凄涼供奉秋明光曉踏記同逰衣冠諸子今誰在昏宦三生可自由遲日燕鶯京陌路東風花栁故園樓年華幾度垂垂老攬鏡潘生欲白頭清明日過吳耕方編修寂寂桐華院萋萋芳草茵禁煙連日雨射栁一年春時序交遊老行藏鬢髮新篋中三賦在遺慟泣龍鱗丁酉南北闈覆試耕方三試皆第一夜雪春衾曉寒重髙齋殘夢清忩前知夜雪沉沉折竹聲絶句花魂栁影遞消磨春日春情一半過不是道人間不出前廊後院葛藤多寒食絶句參差紅杏栁條斜冷節關山不見家一陳晚寒風色惡絶憐天意為吹花與楊琴士城南野飲官菜園西緑漸深草痕隨路得幽尋浮雲不定髙天色野水多連古岸隂忽忽未知生是樂茫茫須覔醉時心一壺珍重銷愁物曲罷還教與細斟集吳玉隨編修宅同令弟玊騧給事兄是東坡弟潁濱官曺文采並同倫黃門草奏趨青瑣紅藥翻書對紫宸蚤夏酒杯三五夜西華朝鼓十年鄰曉天連步深更語一月相邀定幾巡春日懷孝章素心六針與可荀少公幹簾閣翠微西雲山望欲迷晚風歸雁急細雨落花低文史何狼籍音書故解携愁心牽短夢春草逺萋萋午夢夾巷皆秋色車塵稀到門草花知旦暮蚱蜢試寒溫午夢離西閣青山入故園久耽幽僻趣有得是無言夜讀書情一事悲歡酒一觴百年回首興蒼茫孤鐙讀史雄心在明月懷人旅夢長碧草逢春連大漠紅顔經嵗老漁陽紙錢麥飯西陵路惟有桃花欲斷腸春曉宿鳥簷前倦未飛蔥曨忩外曉星稀關心眠食何曽是過眼榮枯旋覺非凍樹雨翻花欲綻雕梁風掃雁初歸澄懷觀物三春過且向塵埃自息機逰慈慧寺春氣鳥鳴細溪流花影重雙林在何許煙際聞微鐘記夢夢與故人語同在南水頭覺誦故人詩淚添清波流天漢一道白虹秋居然天漢流荒雞聞午夜殘角想邉樓兵氣關春色花時送客愁西涼今右臂設險貴前謀雨中懷貽上慈仁寺城南坊北路遙思積空煙忩急初更雨衣寒四月綿徘徊坐鐙燭繾綣把詩篇欲訪維摩室愁時獨蚤眠過惟一夜歸口號醉别清樽緑歸憐蠟炬紅六街星爛漫一水月空濛簷鳥宿已久院花隂漸蒙所居隔深巷清漏此時同大司馬芝麓龔公招同劉公勇吳玉隨梁曰緝汪苕文程周量王貽上李湘北陳其年集城南送董玉虬御史赴隴右分用杜公秦州詩韻得強字繁字南院逢君日秋來十載強曉風天語近晝刻奏書長度隴新旌節行邉舊驌驦秦州西日外極目已蒼蒼日下秦關險霜前隴樹繁寒花迎驛騎秋色動河源渭北雲山道江南煙水村行藏倚聖主莫更憶蓬門此二詩玉虬一日因酒會謂諸公曰一時作者此為第一雨夜憶故山與翊聖栁色鶯歌别鳳池春山寒雨夜相思如何客舍青燈裏却憶春山惆悵時曝書書帙間庭曝晚涼牙籖萬卷爛生光螢忩蠧壁情何限送老流年付夕陽書貽上所藏畫秋來最有江山興夜雨寒披積雪圖水驛無人村徑晚梅花滿地月明孤九日大司馬龔公招同諸子集城南登髙以東籬南山為韻四首令公開宴地秋色翠微中雁帶邊城雨臺臨古木風鄉心紛逺近客望各西東四海孤蹤晚登髙幾處同灞滻登髙會龍沙久客時望鄉秋步健灑酒壯心衰共訝狂花早翻疑晚菊遲暄寒驚節候杏蕊艷疏籬時春卉競開晚霽開亭帳秋聲萬樹含天清斜月下地僻古城南紅燭催更柝黃花上盍簮謝公墩似昔長此得停驂尚書真北斗供奉愧清班密坐分杯數歡遊著屐間江天銷戰伐秋戍靜關山鼓角中宵罷酣歌未擬還菊遲簡鈍菴梧桐欲落拒霜催斜日空庭雁影來更有寒花知客意籬邉秋晚待君開秋日過惟一故人憐寂寞相見慰招尋薄俗心難定浮生病轉侵花寒秋色晚酒盡客情深興發忘搖落歸鞍聊一吟送孫古喤還嘉興君是承明客江蓴别思牽才多科第外名起孝廉前海近聞琴處潮分字鶴田髙堂遊子意白髮向秋偏中秋夜集惟一宅送别二首百年今夜月終古獨橫秋蕭颯三時别空明萬象收關河臨客路星漢入歸舟搖落天聲滿清淮木葉流圓月秋頻見離人酒一巵髙城霜下蚤江路雁飛遲霑灑臨風淚凄清欲别詩射湖足煙水繫艇一相思送陳其年歸宜興白雁過時木葉青霜林秋氣已凋零相思後夜孤帆客知宿江程第幾亭送孫惟一還鹽城次李湘北餞别韻三首秋花落盡雁還來一到離筵尊一開九月淮南芳草在三年湖上釣船廽蓴鱸已覺新詩好鷗鳥何知後命催風栁青門黃葉路交情白首為裴􅏆三年兩度返巖阿酒癖詩魔是舊疴漸老離情今夜重近來懷抱向君多一官同舍歸偏蚤有客孤蹤滯若何明發更堅臨别約髙秋江上慎風波寒暄又歷嵗時頻忽漫鐙前百感新綾餅夢回春宴地旗亭詩寫酒闌身鶯花過眼同官日水旱驚心去國人此夕重門猶咫尺銅龍清漏易傷神對菊秋老凋羣卉天寒有菊花月稀階影白風定檻枝斜獨立真憐汝逢開每憶家故園經别處籬外是天涯秋夜聽楊山人彈琴古調繁聲外秋林方颯然松風兼曲度海月映人妍信指初三疊忘言只一絃白頭溫室夜供奉説當年酬王北山給諌題寓亭竹影如子寒天裏能來夜叩門髙風搖菉竹明月正黃昏鐙亂回看色階移欲别痕何時為貰酒留醉坐霜根十月晦日書懷冬日初凄緊年華已暗侵不因身病蚤那覺道緣深筋力趨朝異才名與世沉晚風黃葉下髙鳥急投林長至日雪中下直晚風人下校書樓吏散烏啼暝色幽日影已旋天北極雲隂漸合殿東頭金鋪欲鎖千門靜葭琯初吹六出浮恰是微陽如線日九霄清冷不禁愁送李容齋還合肥燈火空堂嵗載隂倉皇忍對欲分襟一官竟有瞻雲恨舊事誰憐捧檄心南使關山音信少北風雨雪淚痕深國書未就歸偏蚤京雒相看去雁沉廣寧門再送容齋二首西門一步地送客已他鄉古廟官橋下離亭大道傍塞鴻初斷影灞栁不成行翹首懷人處關河近夕陽壯逰芳嵗晚屢别客愁新草土霑衣淚煙霄抗手人白雲虛在目落日對傷神忍約重來事萋萋苑樹春嵗暮寄午亭友人二首小驛星軺問路岐梅花寄與隴頭枝煙霜關塞春來蚤燈火音書夜到遲為客漸多殘嵗事懷人長别少年時相思不及東風便楊栁西園取次吹嵗盡雲山客倦遊每當落日憶吾州鼓鐘白墮荒城社風雨黃昏舊寺樓别久交親多入夢官貧僮僕亦知愁殘書濁酒真無那有底間時不自由嵗暮二絶句掾曹京兆亦何求正使官貧得自由寂寂年華尊酒在蒲桃一斗勝涼州爆火紛紛近嵗除關山迢遞記離居南溪明月梅花路香粉飄零十載餘次韻吳默巖司業戊申除夕韻二首守嵗椒花已頌春藝香藜火待元辰一天雨雪東風轉萬里星河北斗新玉漏滴殘藍尾酒金龜解向謫仙人年華終古蒼茫裏甲子從頭幾戊申金鑰千門午夜風玊珂聲在夢魂中黃封酒賜春波緑白獸尊開曉炭紅石鼓文探岐獵後蕉園草起日華東十年朋舊官曺改潦倒鵷行舞拜同己酉元日蚤朝疊除夕韻二首斗轉風回左掖春頻年簪筆侍元辰看移雉尾疏星落行近螭頭曉霧新三殿旌旗分閣道九門鐘漏聽雞人太平朝會垂衣蚤欲採民風取次申玉律陽回靜朔風鑾坡嵗月漏聲中苑墻夕燎霏煙碧宫閣春雲送曉紅朝褎香濃天仗外歸鞍日霽掖門東欣逢主聖時清際禁近何人作頌同正月七日憶昔西清侍從辰忽驚遺詔泣龍鱗乾坤自此新陵寢嵗月依然舊史臣幾度春光如短夢每逢人日易傷神當時記挽宫車出慟哭東風賸幾人蚤春實録館呈素存編修兩朝金鑒在鑾坡春色東來王氣多苑裏鶯花新嵗月眼中松杏舊山河直廬風雨分藜火散帙縑緗映玉珂香案前頭親授簡曲江風度好誰過新正小集渭城客路渺關河惆悵何戡别後歌千里鄉園春色逺一時京雒故人多愁邉燭影看書劍花外杯香憶薜蘿誰道長楊叨侍從十年心事愧鳴珂上元夜二首間却銅街玉漏聲落梅風起踏塵行十年走馬歡娛地卧看蛜蝛獨夜情玉館金牀坐上貂鈿蟬銀甲閙檀槽健兒正罷征東役刁斗無聲夜月髙張侍郎送鱘魚回首清江興渺然玊鱗網送蚤春前秋風漫有鱸魚思已得槎頭縮項鯿曉角宣武門西聽曙更東華魚鑰漸平明獨聞曉角春城上立馬風前第一聲摩訶菴再逰四首别久祗林樹山門繫馬開清明三度過花栁兩回來圃亂春畦水僧間退院苔沙鷗相對立鶯燕莫嫌猜暮景西村僻精藍此地逢殘花落清梵深竹度煙鐘春雨紅樓暗香林碧樹濃近來幽意愜巾拂對從容後園臨野色春日自凄迷暄冷時無定鶯花晚未齊墟煙松鼠竄山暝木魈啼回首髙梁水蒼蒼落照低登臨小丘上空際碧巉巉澗底長松蔭山義落日銜野花隨步屧村酒濕春衫大塊韶光晚柴關憶舊巖酬上官松石廷尉二首如茵芳草傍春城三月東風聽蚤鶯栁外朝衣霑雨過花邉官馬隔塵行鴛鸞嵗月多新侣水石風流少舊盟莫問買山歸隱計濟時今望宦先成春色輕隂暗禁城宫花萬樹宿流鶯斗間自識雙龍氣門下今容駟馬行法從君當雷雨候冷官吾守嵗寒盟題詩欲盡燈前意漏下虛堂句未成雨夜雜感宿火微紅映曙光楮衾猶挹博山香愁心歸燕迷蓬户客夢啼烏過女牆裘馬故人誰感激狗屠交道亦凄涼春來歷亂傷心處細雨寒生覺夜長送王北山給事歸茬平二首惜别梧桐樹西垣一院隂封章終夜上御札十行深飢溺憂民日艱難去國心孤山開舊墅簪紱羡投林珥筆承明地回鑾羽獵辰風波萬事濶聚散十年頻舊邸歌重聽離亭酒一巡時清東海上未許戀垂綸雨中集田沛蒼學士宅和白東谷先生琉璃厰西急雨飛驅車到門雨細微緑忩隔席寒淰淰紅燭卷簾煙霏霏潞州濁酒琥珀色藐姑羣公氷雪肌夜深霑醉此何適得歸射獵開荆扉送少師衛公還曲沃二首一卧雲霄殿閣空主恩容易别鵷鴻兩朝清論氷心後四海蒼生病疏中絳灌調和惟相國廟堂鎮靜賴元功玉堂制草西清直幾處孤蹤歎轉蓬黃扉十載握絲綸敕斷來章請急頻食祿還同三省厚賜金特為二疏貧舍人圖史歸裝舊驛路雲山入夢新先帝老臣今澤渥祝公眠食慰斯民書局即事栁邉走馬夾城西落盡桃花燕麥萋玉局一春休沐少金門十載夢魂迷黃封敕使開緗帙白首宫臣識御題下直却如歸院晚槐隂依舊暮鴉啼寄楊松谷鄴下寒雁南飛欲盡時北來鄉信苦參差關河匹馬身何適風雪綈袍淚暗垂漳水煙波空浪迹銅臺歌舞自深悲年華冉冉征途裏寂寞黃門數首詩松谷故給諌沁湄子送劉公勇吏部還潁州懷抱何由好逢君欲細傾行藏輸萬事文酒負平生數聽驪歌亂猶聞玊漏清藤隂他夜月蕭颯别時情城南即目莫作近前嗔行遊野水濱委心隨萬物留眼送殘春眠栁如人懶孤鴻似客貧晚花一含笑多恐對傷神飲酒花下與翊聖東風冉冉逐流塵憶昔相逢似隔晨幾樹庭花迎蚤夏一年心事送殘春青衣度曲傳新調白首同歡感故人記取坡公催秉燭光隂臨老速奔輪買馬買馬黃金事已非青驄門外繫斜暉玉關别後嘶風逺苑路騎來汗血微顧影自驚髀肉老喜心翻覺羽書稀渥窪空有騰驤步踏遍秋城草未肥寄素心六針與可蚤涼睡美輕鐘後忽憶對牀風雨清十年仕宦差一笑少日文酒空深情故園池臺渺岑寂客路荆棘長從橫我行歸休君努力那將懶漫趨時名懷荀少公幹少睡多愁夜秋忩夢不成西樓風雨恨南浦别離情有患吾身老相憐萬事輕年華又搖落息念學無生冬夜行河上潺潺石橋水遙接漏聲長澄月金鋪鏡清沙玉糝霜臘殘催物候冬暖入年芳莫紀無氷日溝渠只向陽張東山少司寇宅觀奕人事紛紛似奕棋故山回首爛柯遲古松流水幽尋後清簟疏簾對坐時舊壘滄桑初歷亂曙天星斗忽參差祇應萬事推枰外夜雨秋燈話後期玉河橋夜行寄苕文一道銀河下玉京雙魚北上逺含情九門夜鎖邉風落愁聽南飛過雁聲王朴菴編修見過同作落葉蕭蕭冷碧波衝寒羸馬肯相過五升方朔飢時米八詠休文病裏歌城闕秋隂風雨盛江湖天濶夢魂多即論婚嫁今難畢歸去青山奈晚何睡起遣興寄汪沁水霜月車輪犯曉沙軒忩歸卧夕陽斜懶書咄咄空中字自愛蘧蘧夢裏家濁酒三杯聊送暖寒鐙連夜自成花却因寄語青山尹擁被黃紬蚤放衙夜行雞聲催我行起坐殘夢接蕭條夜來風開門滿落葉落葉何翻飛驚風吹馬首夜行不見人明月照髙栁詠史四首舍人兒七十好竒計黃金生內疑鴻門不見聽笑殺外黃兒歷下軍野渡平原水孤軍歷下城田橫方縱酒酈生已就烹李少卿少卿軍數急二師何逡巡腐刑下遷史終為李夫人蘇子卿雪中何所餐野鼠勞供億流連青史編一昔為不食學書頗勤自嘲筆家成堆潑墨香練裙棐几抵縑緗臨池晚覺黃庭好掩鏡先愁白髮長身世葛懷非浪迹古今臧榖共亡羊梅花書閣殘陽下把玩流年亦自傷晚出宣武門懷舊逰寄公勇玉虬宣武門東記舊逰暮鴉啼徹夕陽秋楊花落盡風流散别後何人上水樓樓居望西山秋杪思紅葉冬來眺碧巒夕陽過澗逺山色入窗寒嵐氣通書幔香泉嫋釣竿煙光三十里春到約重看夜雪懷人夜雪逢君事渺然梅花庭北緑尊前如今見雪長相憶旅館寒燈十六年落葉紅牆楊栁夾城頭落葉西風滿徑幽夜度玉橋秋色逺清波明月送深愁己酉除夕前一夜小集懷午亭舊逰二首此夜如除夜他鄊是故鄊殘年驚隔日往事樂千場山路梅花放村簾竹葉香平生嵇阮輩嵗月老清狂點檢京華事叢殘守嵗詩葦桃催臘蚤梅栁入春遲署尾多新字題襟減舊詞風流銷歇甚應遣故人知午亭文編卷九
