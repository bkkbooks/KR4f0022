body:
  text: 午亭文編卷四十大學士陳廷敬撰頌針銘贊幸闕里頌有序命時直內廷特臣與議皇帝康熙之二十有三年是嵗甲子東巡狩謁孔子林廟先事皇帝曰事先師禮重且嚴汝廷敬實惟豫舊講臣其與議所宜行臣從諸臣後議具上詔曰俞及恭覩禮成臣不勝歡忭震躍仰惟皇上聖神首出化洽萬邦君師之統千祀一時乃猶屈已求賢詢輿訪道廣厦細旃之上册書討研勤逾儒素遐瞻東魯慨想宣尼希代曠古前未有也其時三事大夫揚言曰昔者刻玉逰河披圖巡雒襄壄之駕塗山之會皆能焜耀簡籍垂於方來今兹萬國既同誠宜宣省風教展義魯邦下塞衆望皇上凝睿思延廷問久之乃曰朕慕聖道厯久於兹敬因省方詣先師宅里其母重煩吾民供億於是肆赦軫農蠲租已責𢎞敷愷澤於天下乃厯吉日協靈辰壄廬警路宫正設蹕玉輿曉升帷殿夕御前驅珠旗屬車日羽以臨乎岱宗是時未臻夫闕里也飛斾江淮觀民設教月屇黃鍾旋軫南陸聿來聖居覽觀山川雲物廟寢圖書之盛嚴恭將事禮行樂奏聖歆如答臣廷敬雖不得備從官之列緬懷宫牆逖稽掌故太牢特祀肇自西京褒成祼將爰及東漢貞觀定朝會之儀開元錫文宣之號器物之賜渥於廣順陪位之班詔始祥符至和加衍聖之稱承安世曲阜之令凡為崇儒重道是以異代同符若乃萬世師表之稱則與乾坤同其悠久也六經表章之澤則與日月並其光華也留鳳蓋於戟門車服禮器所未備也頒龍章於鄉校普天率土所共瞻也矞矞皇皇莫與京矣臣謹拜手稽首而獻頌曰惟聖體道生民拔萃德踰位兮惟帝則聖統一萬類位斯配兮龍飛于天周覽八極嘉鳳德兮聖作物覩垂祀萬億視魯國兮帝開明堂于羮于墻坐則見兮帝會方嶽東西南朔來殷薦兮鑾車戾止鏘鏘穆穆金絲肅兮駐蹕古亭雲霞委屬清泉澓兮上公稽首籩豆奔走昭世守兮暨四姓後博士童耉恩滂厚兮賜所過租歌騰于塗惠我人兮惟帝福我我神其妥戴大君兮莘莘髦士百爾濟濟頌聲美兮於赫帝功與天比崇無終窮兮聖文神武至德頌并序惟我皇上聖文神武躬御大寶君臨萬邦於今三十載矣維時九垓軌道四海波澄至德所敷際天蟠地黎庶咸登仁夀寰宇共砥時和固已符合三皇功加五帝矣而我皇上猶復治益求治宵旰之焦勞宫庭之咨警無息不以生民為念此與書傳所稱大禹之勤儉成湯之寬仁文王之不遑暇食若出一轍蓋先聖後聖罔不同揆也夫是以蠲租減賦省斂省耕凡山陬海徼窮荒僻陋之鄉扶杖嬉逰瞻天表聆玉音識朝廷之德意被盛世之恩膏咸感激帖息如雷霆之鼓萬物罔不振懾其威又如雨露之沐羣生靡不沾濡其澤蓋區宇蕩平中夏肅穆有由然也至如外藩之地遼逺之區其屬四十有八部衆地大蘖牙間生而自我皇上建極以來治化光被四十八部之長皆謹凛震懾以為上有聖人德洋恩普靡不得其所此真吾君吾所天也以故頓顙請命奉贄稱臣蓋今天下太平數十年聖天子功德隆盛浸灌浹洽入於人心無逺無近願俯首而承順者皆動於不自知而感於不及覺非威力之所加非詔檄之所迫蓋邊徼之外其願為聖天子之民而以不得親見聖天子赫濯之聲靈為悵悵者正不止四十八部矣乃喀爾喀曩在蒙古則雄長一方擁其部族人民十餘萬衆雖貢使絡繹而未嘗躬修臣節今者戴天威而懷聖德向化輸誠傾心臣服皇上又念其僻處邊陲罔知禮教宸衷裁決撫安激勸必車駕親臨於是乃馭馴駮之駟乘雕玉之車明月珠旗干將雄戟糾紛交錯猗靡扶輿壯中土之英聲示逺人以文德駕至之日諸部咸集蓋莫不覩車旗甲從而嗒然自失也仰文物聲名而欣然歎羡也慕義歸誠聿得沐恩光親笑語而歡忭相慶也天子嘉之隆以宴賚爵秩有差什五有制於時庭實既陳皇歡是式獻萬夀而喜氣綿幕醉百壺而軍聲愷康於以靖障塞於萬年震威靈於奕葉洵超古軼今之偉略哉臣忝竊遭逢得侍廷陛不能韜弓荷殳帓首韡袴躍馬以從駕旋之時拜賀於車塵馬足之前覩侍衛之雍容見師陳之整肅用以舞蹈抑用以自愧也而間從扈從諸臣得悉諸部落免胄趨風革心效順之盛事踴躍之至無以頌揚謹賦韻語紀載神功垂諸來世使知我皇上之所以治冠百王功髙千聖者蓋誠如天之無不覆如地之無不載凡有血氣莫不尊親而非徒以區宇蕩平中夏肅穆為盛治也頌曰上聖垂統巍巍皇皇仁育義正怙冒萬方時雍風動謡俗樂康邇安逺慕恩遍遐荒幅􅊷西東朔南萬里日月出沒至無涯涘罔不率從我疆我理皇風震赫奮揚天威馴梟屈暴匪德焉歸鴻澤以濡讋我帝命咸來享之遂若厥性環翼我畿邉氓永靖恩覃萬祀歷久逾深帝念外服悉天所臨萬物得所豫惟宅心古者天子有適諸侯言巡所守行慶賜休兵車百萬烈烈其旗清風卷舒交龍熊螭平沙際天雷迅雲馳桓桓糾糾羅列衛營耳耳前驅雅雅吉行士若銜枚驂牡不鳴殷殷雷霆川谷以震既奉帝車亦象天陳恃力者殱從德者順弓櫜不控箙委羽鋩一農之飢飼以峙粻一夫之寒暖以襲裳扶老提稚近天子光四十八部增一曰九匪惟册九來者恐後五十餘屬厥角稽首踰于古昔王會其圖百辟內向要荒外俱咿嗢重譯萬狀睢盱一我冠帶同我車書帝曰汝衆朕不専有天下萬家四海為守爵賞賚豫繼絶持危濯痍吹溫登之皥熙如雨載霖如日初晞躑躅謳歌舒愈以嬉惟帝錫嘏如山如茨降百斯祥延萬斯禧醇醴萬石嘉樽靜籩既莊以和秩秩斯筵存問齠耋玉音朗然守約則豐克已乃賢瞿瞿兢兢若臨深淵如帶如礪如石其磐凡兹藩長帝訓是式毋怠毋虞毋敢失職帝之歸來如離慈哺攀遮衮衣逺越閭伍帝其何時更歷下土緬昔重華王畿靡遙九州雖建亦有三苖三代之域兵甲未銷孰嫓我皇文神武聖燮伐既張干羽大定擴清疆圉惠安黎元治成禮備功昭德宣永永眉夀昌熾萬年言針與其易爾言也寧喪爾躬喪爾躬人所同也易爾言禍不可窮也不車而裂不鼎而烹也水溺火焚情相攻也慨然永嘆以身終也胡不忍於俄頃而禍及生平也動針天下之動凶悔吝何多也主吉而動凶悔吝如我何動以吉其後有他我其如凶悔吝何吉不易為靜以勝之天下不能有靜而無動也動之其奚宜易稱幾者動之微知幾其神惟君子吾與歸虛舟亭銘我遊於人人觸而怒怒不在人觸以我故我與世遊載沉載浮泝焉洄焉泛泛中流適彼萬里一葉輕蘋隨所遇遭無有怖嗔或干翠霞或栖丹壑志士冥心默往自託自託伊何體物無方大莫之國無何之鄉方舟濟河虛船洋洋船來觸舟渺然無人有人怒呼無人曷云不見其人不獲其身虛舟名亭汝視汝聽信芳齋銘芰荷製衣芙蓉集裳靈均詔余垂華流光鴸鳴賢退彗耀鯨藏鵜鴂之聲百草不香余獨何為顔此信芳相彼蕭艾亦離於霜維薋菉葹江蘺杜衡孰穢孰潔孰枯孰榮有嘉我室竹扉茅堂扶疏荷屋窈窕藥房余獨樂斯好修為常春蘭秋菊年嵗永康尊聞堂銘古人於道有見而知有聞而知有傳聞而知自孔子歿七十子散所見所聞寥寥千載其誰其見於書者所傳聞異辭博觀而求約取而思儼私淑之在兹吾不幸不生齊魯及孔子之時遊夏之賢孰敢等夷我思其狂琴張牧皮俯仰百世我友我師既不可得見聞若傳聞者是亦曰聞是故尊之慈泉銘并序樊山之陽髙千仞未至巔百步有泉在山徑沙石間坎甃清徹味甘冽異他水不盈不涸居人兩三家汲以飲㸑不見多食千人不見少百鶴阡在其東母夫人之所藏也故得名慈泉而銘之慈山巖巖下視王屋我民錯居賴此川瀆巖巖兹山民居其巔載耕載穫以粥以餐承液生雲洑流含潤利澤之施豈適膚寸影月流天漪風肅然相我阡隴於千億年米海嶽硯銘并序聞吾州有米海嶽硯舊矣莫知在所素心弟於民間求得之以遺豫刻文曰彤池紫霧魚龍起碧落五星共月明中窪而缺兩隅殺墨而不敗筆洵可寶也銘曰刳有腹剗有隅隅不側腹能瀦以嫓德與我俱米家書世莫如石為兄是吾徒弟得此故遺余義冢碑銘吾所居鎮曰郭谷者連四五村居人逾千家皆在回峯斷嶺長溪荒谷之間地最磽狹耕牧無所其土方數畝者絶少其狹者不可以畫遂溝廣者不可以經洫澮或土戴石或泥淖沙田既少而悉歸於有力者其子孫或世守其先人之産而重轉鬻諸人其人好力作負販俗尚儉嗇四方來居者人日益衆而田日益不足生既不能以田為事死則無所於歸即一旦不幸叩強有力有田者之門丐尺寸之土而瘞焉異時或斬鑿平治之求若斧若馬鬛安可得古之人所謂不封不樹者豈遂若此耶余捐金置義冢得田若干畝公之貧無地以葬者余惟古者井天下之田人有分地自秦以兼并廢先王之制始開阡陌而天下於是有甚貧甚富之民至使斯人生無以飬而死無以葬者暴秦之罪於今為烈也夫分井均田之法其大者不能行矣若能令豪侈之家稍知品節制度使天下甚窮之民生有所養而死有所歸無餓身暴骨之患是亦有天下及祿食者之所宜三致思也故吾為書置冢之故而系以銘曰記昔侍帝狩於近郊掩骼埋胔豈惟搜苖工官戒途誤平人冢帝察治之仁斷傾竦顧瞻疆服時聞興嗟征骨露野戰血染沙時豫之恤孰紓豫懷記帝言動臣所職哉矧惟國家怙冒下土眷言我民億萬以數溝壑填委道路棄捐封狐夜嘯飢烏曉餐凡我人牧孰軫孰憐樊山之原樊川之浦天寒雨濕魂訴如語解金卜幽鬼兮宅女耘叟耕夫莫或女侮山回峩峨川流湯湯纍纍兹墳我心摧傷我力則殫哀此衆民爰作銘詩以倡後人宛平王公像贊階平星聚泰運肇啓二五儲精誕生夫子神觀挺拔才名日起受知世祖顧問密邇綸扉視草籌政決疑謂宜大任燕翼是貽我皇踐阼表率憲司數奏封事正議忠規三垂不靖怙衆作逆九伐張皇中樞運策欃槍迅掃宗社磐石遂陟台衡臯夔接迹稽典定法教洽治宣黼黻衣被遍於九埏退朝宴坐泰宇翛然誰其侍側玉樹風前鄴侯既相仙骨在軀精神淵著不視體膚謖謖清舉溫溫德符麟閣凌煙此為之模六公贊并序吾鄉國多賢人君子其以清德為世所稱者則有若曲汶衛文清公周祚陽城故刑部尚書白公胤謙蔚州魏敏果公象樞永寧于清端公成龍陽城故巡撫張公椿髙平故布政使畢公振姬此六公者生同時皆在鄉國數百里之內然皆所謂天下之士也而吾辱從之遊夫吾豈能友天下之善士乎哉吾之得遊於六公者直以鄉人之故耳六公之賢宜余知之尤得其實也詩曰維桑與梓必恭敬止又曰髙山仰止景行行止於是作六公贊云曲沃衛文清公周祚公狷以和不嬰於物如秋之霜如冬之日清廟明堂不改其節金鐘大鏞朱絃疏越陽城故刑部尚書白公胤謙公起詞苑無赫赫聲清忠端亮式和且平有文有質是訓是程及蔚州公理學宗盟蔚州魏敏果公象樞國僑以惠公叔以文稱名責實公清最聞紹宗聖學道集儒勳頌詩讀書百世彌尊永寧于清端公成龍我懷斯人流風悠邈巍峩實望磊砢節目厥芳幽蘭其堅純璞社稷人民即此是學陽城故巡撫張公椿嶷嶷英挺身標勝流厯顯若晦居辱不尤聲迹未墜民今思謳瞻望衡宇景彼前修髙平故布政使畢公振姬公文竒字公行竒節振玉摐金飲冰嚼鐵拂衣耕壄耰而不輟髙風誰嗣生芻凄咽任君八十像贊我見黃石來臨峨峨仙禽無聲息駕庭柯貽我話言禔福孔多不辭而去客有相過手青松障一老顔酡適意與會紫芝煙蘿云何贈之黃石同科午亭文編卷四十
