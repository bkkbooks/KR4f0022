body:
  text: 午亭文編卷五十大學士陳廷敬撰杜律詩話下將赴成都草堂途中有作先寄嚴公五首得歸茅屋赴成都直一作真為文翁再剖符但使閭閻還揖讓敢論松竹久荒蕪魚知丙穴由來美酒憶郫筒不用酤五馬舊曽諳小徑幾回書札待潛夫寶應元年武自成都召還拜京兆尹明年為二聖山陵橋道使封鄭國公遷黃門侍郎廣德二年復節度劍南公自閬州歸成都而作此詩也讀奉待嚴大夫及此五首嚴杜交情略見注者乃云杜知武不能用已詩含風刺大非前嚴公枉駕已發此意可類推宿府清秋幕府井梧一作桐寒獨宿江城蠟炬一作燭殘永夜角聲悲自語中天月色好誰看風塵荏苒音書絶關塞蕭條行路難已忍伶俜十年事強移棲息一枝安伶俜十年事自當指亂離奔走自巳亥棄官至甲辰參謀僅是六年十年者舉大數耳不必過泥題是宿府詩上言行路下言棲息此解自可通或有十年乃字之説非本意也十二月一日即看燕子入山扉豈有黃鸝歷翠微短短桃花臨水岸輕輕柳絮點人衣春來準擬開懷久老去親知見面稀他日一杯難強進重嗟筋力故山違他日一杯難強進言不能如舊時之能飲也他日舊時也注謂後時非寄常徵君白水青山空復春徵君晚節傍風塵楚妃堂上色殊衆海鶴階前鳴向人萬事糾紛猶絶粒一官羇絆實藏身開州入夏知涼冷不似雲安毒熱新楚妃猶言宋子齊薑燕趙佳人或謂樊姬非也此句言仕途同官名位相軋各炫才媢嫉下句方指徴君二句皆比體宜合讀通首尾讀無非知交深悲極痛之辭近注者皆謂公風刺徵君吾所未解示獠奴阿段山木蒼蒼落日曛竹竿裊裊細泉分郡人入夜爭餘瀝稚一作豎子尋源獨不聞病渴三更回白首傳聲一注溼青雲曽驚陶侃胡奴異怪爾常穿虎豹羣陶侃之奴偽蘇注及劉敬叔異苑其不可信人皆知之然其事卒不知所出愚舊有臆解陶侃或是陶峴峴彭澤之孫浮遊江湖與孟彥深孟雲卿焦遂共載人號水仙有崑崙奴名摩訶善泅水後峴投劍西塞江水命奴取久之奴支體磔裂浮於水上峴流涕回棹賦詩自敘不復遊江湖峴既公同時人其友又公之友異事新聞故公用之耳陶奴入水卒死蛟龍公奴入山宜防虎豹事相類侃峴音相近但峴事僻人因改作侃也公常以時人姓名入詩如李白雲卿之類又傳寫訛謬如周顒作何顒之類此説或亦可存諸將五首昨日玉魚蒙葬地早時金碗出人間見愁汗馬西戎逼曽閃朱旗北斗殷多少材官守涇渭將軍且莫破愁顔此詩説者不知作於何時各以已意注之愚謂當作於大厯二年秋冬間三年正月則去夔出峽末章不得云巫峽清秋萬壑哀矣考史代宗時吐蕃之寇無嵗無之廣德元年遂陷京師留十五日乃走千秋尚入關蓋指此也舊注指安祿山非蓋不應舍近而言逺也廣德二年八月吐蕃寇邠州寇奉天十一月吐蕃兵潰永泰元年八月㒒固懷恩及吐蕃回紇黨項羌渾奴刺寇邊九月吐蕃寇醴泉奉天黨項羌寇同州渾奴刺寇盩厔京師戒嚴以史考之其亂視廣德二年為甚大厯元年九月吐蕃陷原州二年九月吐蕃寇靈州寇邠州郭子儀屯於涇陽京師戒嚴見愁汗馬西戎逼蓋指此大厯二年之事追述永泰元年之事以為鑒故曰曽閃朱旗北斗殷曽者已往之事也考代宗紀永泰元年吐蕃黨項羌等入寇天子自率六軍屯於苑郭子儀屯於涇陽郭子儀傳云懷恩盡説吐蕃回紇黨項羌渾奴刺等三十萬掠涇躪鳯翔入醴泉京師大震於是帝命李忠臣屯渭橋李光進屯雲陽馬璘郝廷玉屯便橋駱奉先李日越屯盩厔李抱玉屯鳯翔周智光屯同州杜冕屯坊州天子自將屯苑中急召子儀屯涇陽吐蕃列傳與子儀傳同又加以渾日進孫守亮屯奉天朱旗北斗殷言軍之衆也觀史可見但代宗紀略子儀傳詳吐蕃傳又詳可以互見耳見愁四句蓋言見今所愁將士汗馬西戎或深入不止逼近內地也愁者雖未逼愁將逼也邠州靈州視醴泉盩厔為逺地若逼則如永泰元年故事矣永泰元年將士分屯者多曽閃朱旗北斗殷賴郭子儀免胄見敵幸得無事若今不知多少材官守涇渭能如永泰分屯之衆乎雖有一子儀屯涇陽其餘將軍豈可遂破愁顔耶此詩前四句廣德元年事見愁汗馬句大厯二年事曽閃朱旗句永泰元年事大厯二年秋冬間夔州作諸家聚訟直夢語耳首四句借漢喻唐借漢事故言千秋既喻唐不必泥求漢事又玉魚金碗紛紛辨證以愚論之此玉魚金碗泛指陵墓珍寶如珠𥜗玉柙及秦始皇水銀為江海黃金為鳬雁之類何必苦求出處代宗紀吐蕃陷京師不言掘陵寢豈史有所諱而不書與或謂祿山作逆繼以吐蕃焚毁未已駸駸有發掘之虞玉魚金碗借尋常墳墓事以婉言之此説雖巧未合也蓋陵寢雖無恙而貴戚之玉魚金碗已遭發掘於詩意未為不合公故不欲斥言陵寢耳或謂關為潼關故以入關指安祿山按栁伉疏犬戎以數萬衆犯關渡隴歷秦渭掠邠涇不血刃而入京師是此詩入關的證伉疏又云謀臣不奮一言武士不力一戰提卒叫呼劫宫闈焚陵寢此將士叛陛下也數語又是當日諸將罪案然則首四句是責諸將既不能禁其入而又乘亂縱兵焚掠非止敘外寇也韓公本意築三城豈謂盡煩回紇馬翻然逺救朔方兵龍起猶聞晉水清獨使至尊憂社稷諸君何以答升平上一章責代宗時吐蕃亂諸將也此章責肅宗初祿山亂諸將也第一句曰本意第三句曰豈謂轉折極明朔方兵者不敢斥言乘輿也子儀上代宗疏云先帝興朔方誅慶緒是也第七句獨使至尊憂社稷正與此應考回紇傳回紇使者來請助討祿山帝詔燉煌郡王承寀與約可汗以可敦妹為女妻承寀帝欲固其心即封其女為毗伽公主帝駐彭原使者葛羅支見恥班下帝不欲使鞅鞅引升殿慰而遣葉護至帝因册毗伽公主為王妃命廣平王見葉護約為昆弟肅宗屈已回紇以憂社稷故也五句追敘潼關之敗此明皇幸蜀之由六句追述髙祖龍起之事猶言晉陽以一旅肇興至於有天下而不能自振乃獨使至尊憂社稷不得已而用回紇諸君何以答升平乎八句一事當合而讀之此章注説雖多本意愈晦今槩刪之已另為注説矣愚更有説龍起者興慶宫龍池事也張九齡龍池聖德頌序略云惟龍池蓋天之所以祚聖即今上卜居之舊里又云中宗採識者之議厭王氣而來遊聖上處或躍之時出飛龍而合應臨淄始封也邸第在焉上黨歷試也靈符紹至天其以是永命我唐云云公此句即九齡天其以是永命我唐意也猶聞晉水清以晉水比龍池言與髙祖開國同符獨使至尊憂社稷指祿山反潼關失守明皇下詔親征事如此説於上下意不待解説自明兩存之以正讀者朝廷衮職誰爭補天下軍儲不自供稍喜臨邊王相國肯銷金甲事春農此章責以宰相臨邊之諸將也觀五句七句可見幅􅊷日蹙貢賦日減軍需皆仰給饋餉獨王相國肯銷甲事農安得不喜稍喜者以天下皆不自供銷甲事農僅王一人也或以稍喜為不足王縉之辭非然唐書王縉傳亦不見銷甲事農事越裳翡翠無消息南海明珠久寂寥殊錫曽為大司馬總戎皆插侍中貂炎風朔雪天王地只在忠良翊聖朝此章舊注云子美嘗有自平宫中吕太一南海收珠千餘日之句蓋廣德元年吕太一為廣州市舶使舉兵叛故翡翠明珠久不貢朝廷説者多引此詩以解太一之事舊注之説不過如此或由此通首皆指宦官句各以事實之云云按楊思朂雖殘酷安南五溪之變實在先以越裳不貢責之思朂服乎吕太一之事近之然杜詩云自平宫中吕太一收珠南海千餘日近供生犀翡翠稀復恐征戍干戈密豈非太一既平之後明珠暫至又絶乎亦當責之太一乎考李輔國傳輔國為兵部尚書未嘗為大司馬古今官職沿革名同實異者多今人溷稱兵部尚書為大司馬不知唐之兵部尚書不可稱大司馬也唐百官志兵部尚書正三品輔國册進司空兼中書令進封博陸郡王三品之官何足異乎以魚朝恩曽為觀軍容使故謂之總戎總戎二字杜詩常用總戎楚蜀應全未聞道總戎雲鳥敶髙適嚴武亦皆觀軍容使邪此蓋緣誤認侍中貂三字注唐人詩當以唐書為據唐書百官志云門下省侍中二人正二品掌出納帝命相禮儀凡國家之務與中書令參總而顓判省事又云左散騎常侍二人正三品注云顯慶二年分左右𨽻門下中書省皆金蟬珥貂左散騎與侍中為左貂右散騎與中書令為右貂以此論之侍中貂非中人也如馬燧渾瑊皆拜侍中燧瑊豈中人乎百官志中人有內侍省監內常侍諸稱無侍中宦者傳諸宦官封王公為中書令者有之無侍中然則此詩當何如解蓋責藩鎮兼宰相之諸將也上章舉內地削責其徒煩輸挽此章舉逺人畔責其不能鎮撫首四句猶上章首四句之意不必實指其人大司馬唐百官志無之外官天下兵馬元帥副元帥都統下有行軍司馬行軍左司馬行軍右司馬節度使下有行軍司馬大都督府下有司馬中都督府下有司馬下都督府下有司馬大都督護府下有司馬上都護下有司馬以意論之則副元帥都統副都統節度使大都督中都督下都督大都護上都護皆可稱大司馬上都護掌統諸蕃撫慰征討敘功罰過與本詩扶桑銅柱越裳南海炎風朔雪等甚合又唐初制元帥大都督大都護或親王領之或親王遙領連上殊錫二字觀之大司馬必指此類非兵部尚書也兵部尚書與吏户禮刑工尚書皆尚書省中書令之屬兵部之屬有四一曰兵部二曰職方三曰駕部四曰庫部無稱司馬者兵部尚書安得稱大司馬乎總戎二字即以公詩證之當指節度使皆插侍中貂則帶宰相之銜者也但以此解之詩意自明漢書注師古曰禮含文嘉云九錫者車馬衣服樂懸朱户納陛武賁鐵鉞弓矢秬鬯也此詩殊錫不必九錫大抵非常寵錫耳漢書百官公卿表相國丞相後即太尉太尉秦官掌武事武帝建元二年省元狩四年初置大司馬以冠將軍之號漢代大司馬為武官極品其權藝丞相不如也此詩大司馬借漢官言唐官未為不可但泥李輔國曽為兵部尚書以唐兵部尚書為大司馬遂難通矣錦江春色逐人來巫峽清秋萬壑哀正憶往時嚴僕射共迎中使望鄉臺主恩前後三持節軍令分明數舉杯西蜀地形天下險安危須仗出羣材或云此言蜀中將帥也崔旰殺郭英乂柏茂琳李昌夔楊子琳舉兵討旰蜀中大亂杜鴻漸受命鎮蜀畏旰數薦之於朝請以節制讓旰茂琳等各為本州刺史上不得已從之鴻漸以宰相兼成都尹劍南東西川副元帥主恩尤隆於嚴武而畏怯無略憚旰雄武反委以任姑息養亂日與從事置酒髙會其有愧於前鎮多矣公詩標巫峽錦江指西蜀之地形也曰正憶曰往時感今而指昔也又云軍令分明數舉杯蓋暗譏其日飲不事事也八哀詩於嚴武云豈無成都酒憂國只細傾則鴻漸之縱飲於憂國之志荒矣右説於數舉杯三字看出刺鴻漸意然云公詩標巫峽錦江指西蜀之地形尚可商愚謂錦江春色逐人來指嚴武最後至蜀時人字即指武巫峽清秋指今日思武時也公將赴成都草堂途中有作先寄嚴鄭公云故園猶得見殘春又云肯藉荒庭春草色春歸云别來頻甲子歸到忽春華皆可證年譜亦云或謂永泰元年四月嚴武卒此詩作於是年之秋離草堂而來正當春色逐人今又清秋追念武知已之恩不覺萬壑皆哀按年譜公永泰元年正月辭幕府歸草堂四月嚴武卒五月遂離蜀南下自戎州至渝州六月至忠州秋至雲安觀此此説之誤可知清秋指至雲安之清秋亦不妥安知非大厯二年之清秋耶自平宫中吕太一收珠南海千餘日近供生犀翡翠稀復恐征戍干戈密太一以廣德元年十二月反平之必在二年自大厯二年逆數為三年故曰千餘日近供生犀翡翠稀即第五詩所云南海明珠久寂寥也一言近供一言久寂似相忤然自平詩是自收珠南海千餘日數之此詩則連太一未平時言之也詩不作於雲安此乂一證五首合而觀之一漢朝陵墓二韓公三城三洛陽宫殿四扶桑銅柱五錦江春色皆以地名起分而觀之一二作對一責代宗時吐蕃亂諸將一責肅宗初祿山亂諸將其事對其詩章句法亦相似三四作對一舉內地割責以宰相臨邊之將徒煩輸挽一舉逺人畔責以藩鎮兼相之將不能鎮撫其事對其詩章法句法亦相似末則另為一體杜詩無論其他以此類言亦可想當日爐錘之苦所謂晚節漸於詩律細也與秋興八首並觀愈見秋興八首玉露凋傷楓樹林巫山巫峽氣蕭森江間波浪兼天湧塞上風雲接地隂叢菊兩一作重開他日淚孤舟一繫故園心寒衣處處催刀尺白帝城髙急暮砧波浪兼天風雲接地非但寫夔州山水公時艤舟欲下江漢此即孤舟去路也有謂塞上指由蜀入秦之塞此章八句皆指夔州若七句指夔州獨一句指蜀塞不成章法矣夔府書懷詩絶塞烏蠻北孤城白帝邊白帝城樓詩江度寒門閣城髙絶塞樓返照詩絶塞愁多早閉門何必蜀塞乃可言塞邪他日與故鄉一類即後章所云昔時蓋故里樊川之感也前後詩有歸楫生衣卧具舟將出峽等句是此孤舟即歸舟也白帝城樓詩夷陵春色起漸擬進扁舟曉望白帝城鹽山春城見松雪始擬進歸舟未嘗一日忘故園之心也叢菊映楓林孤舟映巫峽章法尤竒夔府孤城落日斜每依北一作南斗望京華聽猿實下三聲淚奉使虛隨八月槎畫省香罏違伏枕山樓粉堞隱悲笳請看石上藤蘿月已映洲前蘆荻花陸遊入蜀記唐故夔州與白帝城相連杜詩白帝夔州各異城言難辨也此謂夔府孤城當與上章孤舟例看蓋以客子言之雖蜀麻吳鹽清秋萬船不礙其為孤舟雖白帝夔州兩城相連赤甲白鹽閭閻繚繞不礙其為孤城也上章白帝暮砧城髙砧易聞也此言夔府落日白帝在東夔府在西也皆非漫下北斗或作南斗按秦城上直北斗又北斗之宿七星明第一主帝為樞星上句言日此句言斗又言望京華以類而言非南斗明矣唐人亦多用北斗如平臨北斗之類公詩亦多用北斗如秦城近斗杓之類或又引三輔黃圖云漢初長安城狹小惠帝更築之城南為南斗形城北為北斗形至今人呼斗城謂之南北皆可其説亦非奉使句非謂乘槎到天河徒為虛語蓋槎與上章孤舟相映乘槎可到天河今繫舟不能至京華故曰虛隨八月槎公詩有愁邊有江水焉得北之朝之句三四一應夔府一應京華虛隨八月槎不如此説不可與言京華應矣五畫省應京華六粉堞應夔府其意易見千家山郭靜朝暉日日一作日處一作一日一作百處江樓坐翠微信宿漁人還泛泛清秋燕子故飛飛匡衡抗疏功名薄劉向傳經心事違同學少年多不賤五陵裘馬自輕肥首章言暮砧次章言落日此章言朝暉當時日夜無聊不遑安處讀之如見日日江樓與漁人還泛泛同故賦所見以自喻信宿正與豳風於汝信處於汝信宿一意清秋燕子是將去之物故飛飛者若見客不去故以飛飛將去嘲之也雲安子規詩客愁那聽此故作傍人低公天寶初應進士不第天寶末獻三大禮賦明皇召試文章授河西尉改右衛率府胄曹參軍此與衡初以好學射策科甲不應令除太常掌故調平原文學略似後肅宗至德二載拜行在左拾遺以上疏救房琯獲譴得免推問扈從還京未幾出為華州司户參軍後遂棄官流寓於蜀廣德元年召補京兆功曹不赴二年嚴武表為節度參謀檢校工部員外郎賜緋魚袋明年春辭幕府離蜀大厯元年至夔視衡由史髙幕入朝廷上疏至丞相封侯果何如乎故曰匡衡抗疏功名薄也諸家注衡皆太略衡之文學經術與史髙辟薦本末皆不及如此則古來抗疏者多何獨以衡為言公獻賦授官與向初獻宣帝賦頌數十篇亦略同後遂流滯於外不能入朝雖時為詩歌不忘朝廷視向之數退數進傳經以寄忠悃得乎故曰劉向傳經心事違也衡之抗疏多傳經義向之傳經亦諷時政其前後疏多及經義舊注向亦太略公與衡向皆文學士故引用之七句遂及同學少年同學者一時同為文學者也少年者以已白頭視彼為少年也抗疏傳經皆在朝廷五陵即京華地衡向古人同學今人公俯仰古今感慨係之不必泥衣馬輕肥以為譏刺有謂同學少年既非抗疏之匡衡又非傳經之劉向志趣與公絶不相同果如此當言異學何言同學乎聞道長安似奕棋百年世事不勝一作堪悲王侯第宅皆新主文武衣冠異昔時直北關山金鼓震一作振征西車馬一作騎羽書馳一本作遲魚龍寂莫秋江冷故國平居有所思奕棋者倐勝倐負局勢變遷廣德二年吐蕃入寇代宗如陜州吐蕃陷京師立廣武郡王承宏為帝郭子儀復京師代宗至自陜州所謂似奕棋也是時公在蜀故言聞然亦諱辭也下句又合祿山陷京師明皇幸蜀及肅宗復京師明皇至自蜀之事言之故曰百年世事其實兩句皆指代宗時事也明皇事百年中帶言之耳聞道二字又不止貫此兩句直貫至五六句止各説一事説者以王侯文武二句為奕棋為不勝悲非也唐人最重族望所謂衣冠者族望也喪亂衣冠流離所用文武流品猥雜故曰文武衣冠異昔時舊注未明或謂直北指夔北乃隴右關輔間不知此章直北征西與下章西望東來皆據長安言直北二字與愁看直北是長安之直北不同凡看詩文宜知大段此章前六句作段讀者多以四句為段非也是時西北多事姑以廣德二年言之又以僕固懷恩及吐蕃回紇等寇邊一事言之吐蕃寇醴泉奉天黨項羌寇同州渾奴刺寇盩厔直北關山金鼓震征西車馬羽書馳當是此等或以廣德元年吐蕃入長安徵天下兵莫至故曰羽書遲非是八章中前三章詳夔州略長安後五章詳長安略夔州此章末句可以結本章可以起下章可以總起下四章故國平居有所思猶歷歷開元事分明在眼前蓬萊宫闕對南山承露金莖霄漢間西望瑤池降王母東來紫氣滿函關雲移雉尾開宫扇日繞龍鱗識聖顔一卧滄江驚嵗晚幾回青瑣點一作照朝班按漢武承露銅柱在建章宫西建章宫在長安城外西北隅唐東內在京城東北不聞有承露盤事此章蓋言唐開寶宫闕之盛又以明皇好道故以蓬萊承露瑤池紫氣連類言之不必實有金莖唐公主如金仙玉真之類多為道士築觀京師西望瑤池蓋言道觀之盛與上宫闕一類如玉臺觀詩馮夷嬴女亦是形容玉臺觀之盛仿佛有馮夷嬴女非咏嬴女也公詩有王母晝下雲旗翻東來紫氣指太清宫或謂公蓋以瑤池王母之飲隱喻貴妃之册為太真紫氣函關之臨顯譏玄元之降於永昌如此説是追數前朝之失非追憶前朝之盛也史稱明皇儀範偉麗有非常之表潞州别駕時州境有黃龍白日升天又京師所居宅外水池浸溢頃餘望氣者以為龍氣又所居里名隆慶時人語訛以隆為龍韋庶人稱制改元又為唐隆上益自負此詩日繞龍鱗與常説稱天子龍顔不同舊注引漢髙帝隆準龍顔齊髙帝龍顙鐘聲鱗文遍體皆非也享龍池樂章薑皎一篇有常經此地謁龍顔句可為此作注或謂一卧滄江言一卧不復起也驚嵗晚追遡身歷三朝皆成往事今不知幾時再列朝班蓋公自天寶十載獻三大禮賦時年四十以布衣一識聖顔至肅宗至德二載拜左拾遺時年四十六始點朝班至代宗大厯元年自雲安至夔時年五十五矣此説非是一卧者卧病於夔所謂伏枕也嵗晚即秋也詩言幾回青瑣如上説當改為幾時青瑣回與時各一義豈可溷解此詩前六句是明皇時事一卧滄江是代宗時事青瑣點朝班是肅宗時事前六句但言天寶之盛陡然截住即陡接末二語他人為此中間當有幾許繁絮蓋上章言長安之衰此章言長安之盛合而讀之其義自見也瞿唐峽口曲江頭萬里風煙接素秋花萼夾城通御氣芙蓉小苑入邊愁朱簾繡柱圍黃鵠一作鶴錦纜牙檣起白鷗回首可憐歌舞地秦中自古帝王州上章長安宫闕此下三章長安城外池苑此章曲江也上下四章皆前六句長安後及夔州此章在中首二句便以瞿唐曲江合言亦章法變換處然已下只言曲江不言瞿唐以詳於首章故也明皇始築夾城至曲江芙蓉園而外人不知祿山犯闕帝登興慶宫花萼樓置酒悽愴自此遂西幸通御氣入邊愁圍黃鵠起白鷗四句皆上盛下衰通御氣三字尤詩人立言之妙解者失之與外人不知對看自明曲江與樂遊園杏園慈恩寺等相近地本秦漢遺迹唐開元中疏鑿更為勝境故曰回首可憐歌舞地秦中自古帝王州由衰憶盛感慨無窮昆明池水漢時功武帝旌旗在眼中織女機絲虛夜月一作月夜石鯨鱗甲動秋風波漂菰米沈雲黑露冷蓮房墜粉紅關塞極天唯鳥道江湖滿地一漁翁此章憶昆明池也虛夜月動秋風波漂菰米露冷蓮房與上章圍黃鵠起白鷗皆遙想彼中秋色也此章六句長安七八句夔州關塞即首章塞上江即首章江間連湖言之者地勢接近公將出峽赴荆南故也陡轉陡住筆端髙絶出尋常蹊徑之外或極力辨楊用修之説謂杜以唐人敘漢事摩挲陳迹故有機絲夜月之詞此立言之體非傷喪亂愚按昆明池水漢時功是據唐代言不僅前朝陳迹以唐人敘漢事摩挲陳迹尚有感況以唐人敘唐陳迹謂非傷喪亂可乎又云昆明一章緊接上章秦中自古帝王州一句而申言之時則曰漢時帝則曰武帝云云如此則是上章思唐此章思漢矣但以上章末句為此章來脈可也一漁翁斷作杜自謂將赴荆南寄别李劍州云路經灧澦雙蓬鬢天入滄浪一釣舟寄别馬巴州云獨把漁竿終逺去皆可證下墜粉紅就蓮房言此沈雲黑亦當就菰米言不就水言一説陳藏器本草菰首小者擘之內有黑灰如墨名鳥鬱人亦食之按庾肩吾詩黑米生菰葑青華出稻苗公行官張望補稻畦水歸亦云秋菰生黑米此説較得昆吾御宿自逶迆紫閣峰隂入渼陂一作紫閣峰隂入渼陂昆吾御宿自逶迆香稻一作紅豆一作紅稻一作紅飯啄餘一作殘鸚鵡粒碧梧棲老鳯凰枝佳人拾翠春相問仙侣同舟晚更移綵筆昔曽一作遊干氣象白頭吟望苦低垂或云此言遊宴渼陂之事按此章合言長安城南昆吾御宿渼陂諸境不皆曲江昆明但指一處也香稻碧梧屬昆吾御宿佳人拾翠仙侣同舟屬渼陂西陂泛舟詩云青蛾皓齒在樓船橫笛短簫悲逺天西陂即渼陂所謂青蛾即佳人拾翠春相問也問字用雜佩以問之問其意則如贈之以勺藥耳仙侣同舟晚更移指與岑參兄弟不妨渼陂行船舷暝戞雲際寺水面月出藍田關即晚更移之證也舊注香稻宫中以供鸚鵡按鸚鵡者出隴州當是昆吾御宿間豪家共有之物不必宫中拈出亦可見當時彼中珍禽佳樹之美其實詩止重香稻碧梧以鸚鵡鳯凰粧點作麗句耳渼陂種稻未見言者公與鄠縣源大少府宴渼陂詩有飯抄雲子白句説者謂雲子碎雲母以擬飯之白升菴韻藻引山稻名雲子河柳號雨師直以雲子為稻名渼陂有稻亦未可知香稻二句與上章波漂菰米露冷蓮房同皆遙想彼中秋景下二句由秋追述春時遊賞之樂上二句現前下二句過去也因又追念當時獻賦有謂綵筆指渼陂行諸詩干氣象即賦詩分氣象意不如指獻賦言吟望望字與第二章望京華相應既望而又低垂是不能望也筆干氣象何其壯白頭低垂何其憊詩至此聲淚俱盡故終焉杜此八首命意練句之妙不必論以章法論章各有法合則首尾如一章兵家常山陳庶幾似之人皆云李如史記杜如漢書豫獨謂不然杜合子長孟堅為一手者也或八章擇取一二者非又杜此詩古今獨絶妄擬者尤非詠懷古迹五首説四首支離東北風塵際漂泊西南天地間三峽樓臺淹日月五溪衣服共雲山詞客哀時且未還庾信平生最蕭瑟暮年詩賦動江關東北風塵指祿山亂與第五句相應或指少為齊趙之遊或云公初陷賊中在山東河北間皆非此章公自賦以庾信為比耳夔州無信古迹或因信曽居宋玉江陵故宅強牽立説非也此詩題曰詠懷古迹有謂首章詠懷餘四古迹者其説雖非尚知詠懷二字不得専泥古迹遂忘詠懷也宋玉昭君先主武侯遇皆不偶是章章古迹章章詠懷宜知此搖落深知宋玉一作為主悲風流儒雅亦吾師悵望千秋一灑淚蕭條異代不同時江山故宅空文藻雲雨荒臺豈夢思最是楚宫俱泯滅舟人指點到今疑風流儒雅即第五句文藻師者師其文藻正與李陵蘇武是吾師同耳或云亦字有不滿意又云非道德師乃文雅師或云景行之至不惟尚友直欲師之皆非悵望二句杜言已今日悵望千秋之下一畨灑淚如宋玉悲秋異代同一蕭條惜不同時耳同時如漢武讀相如子虛賦而善之曰朕獨不得與此人同時哉灑淚如秋興八首之類江山二句言故宅已無空有文藻彼雲雨荒臺本出夢思今反現在豈得為夢思邪蓋皆後人所為耳不止荒臺不可信即楚宫亦俱泯滅舟人指點皆可疑也人與宅俱亡正感慨處羣山萬壑赴荆門生長明妃尚有村一去紫臺連朔漠獨留青冢向黃昏畫圖省識春風面環珮空歸月夜魂千載一作嵗琵琶作胡語分明怨一作愁恨曲中論此詩二明字杜詩時有復字然負薪行止作昭君村疑此明妃或後人妄改畫圖句言後人不能親覩但於畫圖省識其面耳省識者審視也此即用毛延夀事變化出竒如九日藍田崔氏莊用孟嘉事也或云省字宜訓省事之省猶約略之義非或云省記也言不見其人但憶曽於畫圖中認看春風面耳亦通諸葛大名垂宇宙宗臣遺像肅清髙三分割據紆籌策萬古雲霄一羽毛伯仲之間見伊吕指揮若定失蕭曹運一作福移漢祚終難復一作難恢復志決身殱軍務勞公詩屢用宗臣字此二字本出蕭曹列傳贊尤可與第六句相映武侯在軍亦綸巾羽扇遺像清髙不可略身都將相氣象猶然草廬功名富貴不能束縛卓然髙出古今無兩萬古雲霄一羽毛謂此也易漸卦有鴻漸于逵其羽可用為儀詩意本此而不見用古之迹或言孔明聲名飛揚卓絶萬古如雲霄一羽誰能匹之或言嗣主不才再傳而失鞠躬盡瘁所謂髙義薄雲霄者徒付灰飛煙滅不啻羽毛之輕皆非焦氏筆乘云昔人以三分割據為孔明功業不知此乃其所輕為正如雲霄間一羽毛耳亦非諸將末章巫峽清秋此第二章悵望灑淚與秋興八首是一時作可合觀之覃山人隱居南極老人自有星北山移文誰勒銘徵君已去獨松菊哀壑無光留户庭豫見亂離不得已子知出處必須經髙車駟馬帶傾覆悵望秋天虛翠屏首句公自喻南遊周南留滯古所惜南極老人應夀昌結託老人星羅浮展遐步今霄南極外甘作老人星公詩屢用二三四惜山人之去五句承首句六七八承二三四言出處之難苦辭正論厚道深情生人感悟但云風刺孤此老矣當與常徵君一首並讀柏學士茅屋碧山學士焚銀魚白馬卻走身嵒居古人已用三冬足年少今一作曽開萬卷餘晴雲滿户團傾蓋秋水浮階溜決渠富貴必從勤苦得男兒須讀五車書柏學士諸家無定論愚按全集有覽柏中丞兼子姪數人除官制詞因述父子兄弟四美載歌絲綸此柏學士應是中丞子姪學士或即所除之官全集此詩後即題柏學士山居壁二首又寄柏學士林居一首茅屋即山居林居也此詩云白馬卻走身嵒居後詩云山居精典籍又云歎彼幽居載典籍蕭然暴露山之阿此云晴雲滿户團傾蓋秋水浮階溜決渠後云壄屋流寒水山籬帶白雲語意皆合無所疑也全集有覽鏡呈柏中丞陪柏中丞觀宴將士奉送柏二别駕將中丞命赴江陵送菜詩云常荷地主恩送瓜詩云柏公鎮夔國公遊於柏氏父子兄弟間熟矣柏公即柏茂林或作茂琳與柏正節是一人此柏學士必不屑以門廕進身而願以文章顯名者何必以世系將門為疑哉又古詩文所云學士不盡官名亦有泛言文學之士者柏氏子弟已有銀魚而好學以學士稱之亦無妨也奉送蜀州柏二别駕將中丞命赴江陵起居衛尚書太夫人因示從弟行軍司馬位中丞問俗畫熊頻愛弟傳書綵鷁新遷轉五州防禦使起居八座太夫人楚宫臘送荆門水白帝雲偷碧海春與報一作報與惠連詩一作書非不惜知吾斑鬢總如銀或曰唐書世系表杜濟與位同出杜景秀下並征南十四代孫公為征南十三葉集有示從孫濟詩斯為合矣位又稱從弟何與新表承用譜牒恐必有誤或曰位是公之姪今曰從弟應是從姪之誤愚謂題稱從弟詩稱惠連本非有誤世系表多誤未可據之反疑詩也濟位並征南十四代孫公為征南十三葉稱濟從孫亦未為合公有過從孫濟詩濟必非征南十四代孫此詩稱位從弟後有乘雨入行軍六弟宅詩云令弟雄軍佐位自是公之弟非姪也以位為公姪當以守嵗阿戎家為據然阿戎非王渾子戎是王晏從弟王思逺小字阿戎全集杜位宅守嵗下前人已辨之矣人日此日此時人共得一談一笑俗相看尊前柏葉休隨酒勝裏金華巧耐寒劍佩衝星聊暫拔柙琴流水自須彈早春重引江湖興直道無憂行路難公集元日太嵗日人日皆有詩人日當時令節談笑恆事休隨酒休者廢也非禁止詞時公以肺病不飲早春江湖續得觀書題所謂正月中旬定出三峽也本無他意今見説者附會占嵗書以休隨酒是戒其談笑後四句蓋欲避俗而行全非本意時人顧深喜以為獨得聊復一辨集本題五言一首自當合看三句元日四句人日即春寒華較遲意五六以不飲聊及劍琴亦將行俶裝意也直道亦偶然及之不必執泥妄生枝蔓宇文朝尚書之甥崔彧司業之孫尚書之子重泛鄭監前湖郊扉俗逺長幽寂野水春來更按連錦席淹留還出浦葛巾敧側未回船尊當霞綺輕初散棹拂荷珠碎卻圓不但習池歸酩酊君看鄭谷去夤緣集後有夏夜李尚書筵送宇文石首赴縣聨句此宇文朝即宇文石首石首縣名屬江陵府尚書即李之芳聨句公首倡云愛客尚書重之官宅相賢結句之芳云客居逢自出為别幾凄然尚書之甥此其證也彧云翟表郎官瑞鳬看令宰仙又云興饒行樂處離惜醉中眠即此崔彧也尚書之子佚其名一云孫下當有缺字是也重泛鄭監前湖者集中此詩之前暮春陪李尚書李中丞過鄭監湖亭泛舟得過字一首是也近見一解云此詩是崔姓一人重邀公泛湖而作此崔姓者是宇文朝尚書之甥崔彧司業之孫尚書之子杜撰可笑且云公薄其人不樂與之同泛故製題如此公溫然長者反似輕薄惡少此等解纍之也其書方有時名故辨之韻會夤緣連絡也本詩家常用字孟浩然沙岸曉夤緣公詩蓱泛苦夤緣俗語賄作道地亦曰夤緣時解遂謂此二字公所以深致鄙誚附識以戒妄説留别公安大易沙門隱居欲就廬山逺麗藻初逢休上人數問舟航留製作長開篋笥擬心神沙村白雪仍含凍江縣紅梅已放春先踏罏峰置蘭若徐飛錫杖出風塵此詩末二句或謂時公欲往廬山故言當先置寺於彼以待大易之來飛錫或引志公與白鶴道人爭潛山麓事出風塵或謂勉其勿戀戀麗藻俱非此蓋欲大易置蘭若精進於此徐俟道成飛錫本用湛方生廬山神仙詩序今備録左方讀者自知晉湛方生廬山神仙詩序曰潯陽有廬山者盤基彭蠡之西其崇標峻極辰光隔輝幽澗澄深積深百仞若乃絶阻重險非人迹之所遊窈窕沖深常含霞而貯氣真可謂神明之區域列真之苑囿矣太元十一年有樵採其陽者於時鮮霞褰林傾暉映岫見一沙門披法衣獨在嵒中俄頃振裳揮錫陵崖直上排丹霄而輕舉起九折而一指既白雲之可乘何帝鄉之足逺哉窮日蒼蒼翳然滅迹詩曰吸風玄圃飲露丹霄室宅五嶽賔友松喬午亭文編卷五十
