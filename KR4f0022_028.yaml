body:
  text: 午亭文編卷二十八大學士陳廷敬撰經解書詩禮堯典唐虞之際盛矣嘗竊以謂此天人之介君子小人消長之關而天下治亂之所由分也當堯之時四凶五臣並列而驩兜舉共工比周為黨五臣雖各率其職未聞有能明其為凶而放殛之者則天人消長治亂之關其故豈其微哉蓋堯知有舜乆矣以為非舜則四凶不能誅而五臣不能盡其才堯若曰與其誅四凶不若登用舜嗚呼此堯之所以為君之大也當其時驩兜居中而三苖負固於外鯀方以洪水自重以妎天下雖以堯之聖而不能不遲迴審顧於其間者蓋待凶人若斯之難也堯若以謂及吾之身而制之使猶不得逞也然庻㡬其有悔心乎既不得逞而有悔心吾與斯人亦相忘於大化之中而已矣即非然者有舜在焉舜之心猶吾之心也至是而終無悔心之萌矣舉而誅之不見其有震驚之迹而措天下於磐石之安是以孔子贊堯之大而又曰無為而治者其舜也與夫舜有為而曰無為聖人之心如天天之心無為聖人之心亦無為當堯之時四凶可以不必誅當舜之時四凶不得不誅皆天也非人之所能為也故舜之無為猶堯之無得而名也舜登用而四凶誅五臣各得盡其才君子道長小人道消天下極治而無亂者本堯用舜以誅四凶之故也非然者則天人消長之關可勝言哉觀堯之所以待四凶與所以用舜者然後知堯之為君之大也舜典虞書者舜史臣所記首堯典者尊堯也舜典而尊堯故先堯典而舜典繫焉故曰尊堯也尊堯而不别之以為唐書者何也曰尊之也親之也舜之於堯義則君臣恩則父子君臣主義父子主恩尊堯而曰虞書者若將引為一體聯為一家合而同焉不欲離而異焉懼以君臣之義掩父子之恩也不然者雖以舜之史臣獨不可紀堯之行事特為一書如後世修勝國之史者乎故不别為書者尊之至也親之至也是以觀舜典而尊尊親親之道備焉禹貢予於禹貢而見聖人憂天下之深且遠也當是時山川既治水土既平九州攸同矣於是任土作貢孟子曰夏后氏五十而貢其實什一也然自漆絲鹽絺以至海物鉛松怪石浮磬蠙珠瑶琨篠簜之屬無不僃貢焉何其繁也則若於田賦之外又有所謂貢者雖二猶不足如之何其謂之什一也且自土階茅茨以來歴堯舜之世凡所謂海物鉛松怪石浮磬蠙珠瑶琨篠簜諸異物既不見於經則知其未嘗有也而禹於是時始制為法令綜核嚴宻如此况又在什一之外乎而孰知其非然也蓋聖人憂天下之心如此也其心以為吾之取於民者什一而已而海物鉛松怪石浮磬蠙珠瑤琨篠簜諸異物㒺不畢具則凡宫府之所需賓師之所資其可以充吾用者皆已足於此後之人雖欲專用意於海物鉛松怪石浮磬蠙珠瑶琨篠簜諸異物亦不得求多於民蓋取之什一之中而皆已足矣則凡吾所定為制者使後世無以加也則聖人憂天下之心可不謂深且遠邪若什一之外諸異物更取於民此稍知治理者所不忍為而謂禹忍而為之乎嗚呼自渾沕之風漸遠服食器用已不能如往者草衣木食汙樽抔飲之風矣此聖人之所深憂也而懼其甚焉故定之為經曰雖好異物不得過焉聖人憂天下之心何其遠與臯陶作士舜五臣禹稷契臯陶伯益禹及身以有天下稷契伯益其後世子孫亦皆有天下獨臯陶以刑官不有天下此天道與非與後世于公治獄令髙大其門曰當吾後必有興者于公之興以天道决之耳臯陶之不有天下亦天道與臯陶作士刑期無刑民協于中舜念其功曰四方風動惟乃之休惟禹亦云朕德㒺克民不依臯陶邁種德德乃降黎民懐之念兹在兹釋兹在兹名言兹在兹允出兹在兹其反復念之不忘如此今考臯陶謨所載其在當時徳果不在禹稷下可知也然而既不有天下而楚人滅六蓼臯陶既不得比禹稷契伯益亦將不得比於于公與何天於臯陶則嚴而於于公則恕也將所謂天道終不可得而知與蓋天德好生其在於人有能使民不陷於罪不致於刑長養而安全之斯則可以為徳矣上古之民犯法者少亦不能無䧟於罪而致於刑者天若曰當其罪而已耳亦何徳之有焉後世變故滋多民犯法者衆士師者能得其情鮮矣天若曰苟能當其罪矣斯亦可以謂為徳矣于公之所以大其門也臯陶之徳大矣而天若有靳焉者蓋以彼其徳可以使民不䧟於罪而致於刑也致於刑非天之心也楚人之禍舍天道吾無以决之也孟子有曰小徳役大德小賢役大賢小役大弱役强斯二者皆天也蓋唐虞之世有天下以德以德故苟有小異乎德之為者天所懼也則不得不致其嚴於臯陶是也漢之世有天下以力以力故苟有小異乎力之為者天所善也則不得不行其恕於于公是也費誓孔子序書存魯誓何也曰為東周也維魯之弱也魯宗國維魯之弱所以為東周也費誓載魯侯帥師征徐戎之事伯禽秉周公之教傳稱周禮在魯制度典章宜其見於簡册者多矣而孔子獨於此有取焉者何也當時周道衰平王遷洛晉鄭焉依而魯宗國寖以式微其後三桓秉政陪臣執命親攻昭公而出之而征伐之權上不由天子下不出方伯齊田常弑其君孔子請伐之哀公不聽孔子蓋傷不復得如曩者盛時承王命率諸侯以討不臣而伐僭亂也故於魯伐徐戎之事有取焉爾今誦其辭曰無敢不弔無敢不善曰汝則有常刑者三曰汝則有大刑者再嚴威整暇猶有三代之遺風焉此所以取其辭存之以繼於帝王之後也意者魯之孫子有能明王道强君德攬賞罰之權紹乃祖烈者乎吾庻㡬其遇之昔伯禽之魯三年而報政太公封齊五月而報政周公乃歎曰魯後世其北面事齊矣夫魯之亡於弱周公既知之矣孔子不忍宗國之弱以亡其亦猶周公之歎也夫秦誓書存二誓而終於秦者何陳子曰存魯所以維其弱而終秦所以抑其强蓋聖人之志在魯天下之勢在秦勢在秦者天也非人之所能為也然聖人重言天命而必推極於人事之所當為昔者秦伐鄭晉敗秦師於殽穆公誓告羣臣孔子錄之書之終篇傳者謂穆公悔過孔子有取焉孔子曷取乎爾蓋天下之勢在秦孔子所知也而聖人曰有人事焉貴德賤力守其疆服毋敢稱兵搆禍獲罪於先王此人事也以秦前日之所為雖得天下不可乆長以為生民主今幸其悔心之萌矣毋敢稱兵搆禍矣安知周之弱不可以敵秦之强也哉又安知彼即有天下不可以久長為生民主也哉故於穆公有取云爾不然彭衙濟河之師何有乎悔過而聖人許之耶其後秦滅詩書尚首功併吞諸國終有天下不二世而亡孰謂聖人之憂為過計耶或曰秦始孝公富國强兵穆公僻處西陲未得為會盟之主當其時天下之勢烏知其在秦也雖然後世䜟緯符命之事聖人所不道然天下之勢微聖人烏足以知之周南召南二南之作也當文王受命之時耶周之德及於民者至矣詩有之自西自東自南自北無思不服宜其名詩不得獨取二南也顧其時西則昆夷北則玁狁東則紂紂昆夷玁狁末之如何矣而文王之化自周召而南漸被於江漢之人此二南之所以獨為名也夫昆夷玁狁紂自外於聖人之化無足責矣而當時之人生其封落之中者亦何其不幸耶周召有詩無詩甘棠專美召公而麟之趾兼稱公子無美周公者周公勲德豈出召公下哉易之辭曰二多譽遠也召公之謂也四多懼近也周公之謂也觀周召有詩無詩而譽與懼之義益明魯頌頌者下頌其上之辭耳猶之國風美刺非有典法禁侯國不得作也然則行父曷為請於周蓋當時周衰上下陵替魯國秉禮雖頌亦請之非謂魯於法不得作頌如請隧之類必待天子之命而後行也魯人既不忘其先君之賢而尤以王命為尊可以風天下矣魯無風而有頌聖人存之思深哉商頌或問詩周書而存商頌何也曰歐陽子有言大商祖之德予紂之不憾明武王周公之心余嘗論之夫謂大商祖之德者商周本以征誅有天下周之於紂猶商之於桀明其德以見有商祖之德則實有可以得天下之理如無其德則是雖有天下且不可况敢行放伐之事乎故謂大商祖之德者是也謂予紂之不憾明武王周公之心其義尚有未盡者武之革命順天應人聖人者天人之至公者也亦安計紂之憾與不憾而武王周公之心亦何待諄諄焉明於天下後世哉故謂予紂之不憾明武王周公之心者非也然則商頌之存果何義與曰明統也周得統扵商明統所以尊周也魯親周後明統而尊尊親親之義僃焉夫是以周書而存商頌也新宫有聲無詩南陔白華華黍由庚崇丘由儀此六篇者鄉飲酒燕禮之笙詩也笙入立於縣中奏南陔白華華黍又間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀笙詩自漢已來謂遭戰國及秦之亂而亡之朱子曰非亡也葢有聲而無辭者也鄭氏謂燕禮有升歌鹿鳴下管新宫新宫亦詩篇名辭義皆亡無以知其篇第之處愚按笙詩在笙中吹之則下管之詩亦在管中吹之其有聲無詞與六篇同也或曰笙詩篇目見於經而傳者為之作序六月之序亦連及之而新宫皆無焉故鄭氏箋以為辭義皆亡而孔氏疏以為六篇有義無辭新宫并義亦無則新宫非六篇之比是亡詩也非果有聲無辭者也夫篇目之見於毛氏之所傳者非經之所本有也毛氏覩儀禮而補入其名耳然則毛氏奚為闕新宫而不補曰漏也衛宏因之不為作序又何足怪乎若謂六篇之目果見於經孔子不應獨刪新宫之目若謂六篇果有其辭遭亂而亡又不應皆僅存其目其為毛氏之所補入無疑也左氏傳昭二十五年宋公享昭子賦新宫新宫之詩或别有其辭非下管所吹之聲也孔子刪之耳是以朱子又疑以為斯干之詩而未敢必也孔氏又謂自宋公賦新宫至孔子時三十餘年而新宫逸亡夫新宫之詩儀禮所用之詩非他詩比也儀禮周公所以興禮樂定太平之大政也禮樂之大具者莫僃於魯魯豈有遺詩耶假令魯詩間有遺者此儀禮所用之詩其行於天下者乆且遠豈有求而不得者耶多聞博學如孔子豈有不求得者耶且三十年未乆也而謂行於天下者昔猶在人口而今遂亡之其可信也耶卷耳采采巻耳不盈頃筐嗟我懷人寘彼周行唐人詩提籠忘採葉昨夜夢漁陽本此如序云輔佐君子求賢審官是全與此詩無渉也亦豈復有意味之可尋乎野有死麕詩言以茅包麕而誘懐春之女又述此女之辭姑徐徐其來無感我帨無使厖吠有幽婉之情無嚴峻之意安見其惡無禮也而繫之召南之中不可解矣豈其出秦火之餘而簡編有錯亂者耶擊鼔記曰五十不從力政六十不與服戎役與兵皆國之重事也州吁虐用其民土功戎事一時並興至使其民吁嗟刺怨其曰土國城漕我獨南行者豈其民之猶樂為力役哉蓋其時之民習見夫輕用其力以土功力役之事不足為勞苦耳是其情尤足悲也豈知夫先王之制五十而罷役比之六十而還兵者猶兢兢焉不敢過用其力也彼州吁殘民以逞烏足以語此雄雉二則首章曰自貽伊阻卒章曰不忮不求何用不臧此詩之㫖有合於中庸不怨不尤正已無求無入不自得之意而出於行役之婦人其亦猶周南之汝墳召南之草蟲乎不可謂非巻耳之遺風也以是知先王德教之及人遠矣汝墳草蟲思其君子不過閱年嵗之改易感時物之變遷或慰勞其王事之勤或自道其思念之意而止耳而雄雉之詩反身自責憂深慮遠或恐其難乎免於今之世也其所以勉其君子者無不至焉世變之可覩蓋如此式微式微式微胡不歸詩七言之權輿也胡為乎中露詩五言之胚胎也何必柏梁蘇李哉一章之中而古今之詩體僃焉然其嗟嘆永歌之情發於中而成於文者所謂亡國之音哀以思也黎侯失國而寄於人有媿乎其臣矣簡兮舜命䕫典樂教胄子周官大司樂掌教國子是古者樂官掌教事任至重也簡兮之賢者實有教國子諸子學舞之責其在職之事有可為者非如後世伶官之比也亦何為而輕世肆志如此哉蓋先王教士之法至此時而寖壞雖存其文而誠意不至無復有禮賢敎士之實不過以伶官待之而下亦遂以伶官自待矣賢者處此宜其不得志於時而其言之玩世不恭有如此也北門先儒謂北門之忠臣至於窶貧而莫知其艱窮而呼天無怨尤之辭而又以為有臣如此不能忠信重禄以勸之國之所以亡也嘗試論之其君既失勸士之道而為之臣者其所以自處亦未得為盡善也君子之仕於人國道合則留不合則去至於窶貧實甚室人無以自安不思所以自處之宜乃惟呼天而訴之亦何益哉然或者其時為之苟以容其身未可知也夫有道之國士君子得盡其所學就使不得志亦不使失其所守為國而使人既不得志又失其守至苟以容其身如衛者欲不亡得乎君子偕老風人主文而譎諫言之無罪聞之者足以戒莫著於君子偕老之詩此詩惟稱述夫人服飾之盛容貌之尊以感動其天良激發其愧耻而終不斥言其滛亂之事所謂辭益婉而意益深是風詩之最善者也載馳禮國君夫人父母没則不得歸寧使大夫寧於兄弟載馳之詩首章曰大夫跋渉我心則憂是許大夫之唁於衛者也故其卒章曰大夫君子無我有尤百爾所思不如我所之此大夫即唁衛之大夫也夫人言大夫君子無以我為有過而爾大夫自以為能往而集衛事也雖百爾大夫之所思慮不如我之親往也申言首章大夫跋渉我心則憂之義也載馳之詩許夫人傷宗國之亡欲歸唁於衛其二章曰既不我嘉不能旋反是夫人終以禮自制所謂發乎情止乎禮義者也夫宗社覆滅非常之變又豈能宴然坐視而已也故其卒章曰我行其野麥芃芃然方盛長也將控告於大邦未知將何所因而何所至也則是夫人雖不果於行而其閔亡救亂之心至矣夫人可不謂賢哉夫以宣公宣姜之惡而有女之賢如此世類果足以限人哉又何疑乎文公之能幹蠱而克家也大車大車毳衣民望而畏之止其邪心不待刑政之及也然則革車衮冕繢衣繡裳豈曰體安駕乘目好五色而已哉而或者欲去其節文蕩然即於簡陋過矣叔于田二篇吾觀于田二篇之詩而歎其上驕下諂國無道之甚也三代之衰也善惡賞罰不明乎上而是非毁譽之在下者恒得而别白之蓋猶直道在人心而公議在人口也若叔段者不義而得衆而國人之美之者以其弋獵馳騁舉火暴虎飲酒服馬之事競為諛悅而無復三代之遺風叔雖欲不為亂豈可得哉東方未明序曰東方未明刺無節也蓋其興居無節號令不時挈壺氏不能掌其職焉朱子辨説夏官挈壺氏下士六人置壺浮箭以為晝夜之節漏刻不明固可以見其無政然所以興居無節號令不明未必皆挈壺氏之罪味序義謂興居無節號令不明是宜夙而莫宜莫而夙至使挈壺氏亦不能操其漏刻以舉其職明其一出於一時偶然之意而行之使人無所遵守也此東方未明之詩所為作與敝笱詩以敝笱為喻而首章曰其從如雲次章曰其從如雨卒章曰其從如水至於如水而流蕩忘反不可復制詩人語有淺深次第之不同亦可謂警戒著明矣善乎胡氏之言禮義者天下之大防也其禁亂之所由生猶防止水之所自來也以舊防為無所用而廢之是以至此其極取以證敝笱之詩尤脗合云唐風前漢志曰河東本唐堯所居有先王遺敎君子深思小人儉嗇集傳曰其地土瘠民貧勤儉質朴憂深思遠有堯之遺風蓋吾讀詩考志傳所稱二南而後於唐風有取焉然自漢以來解者多所淆亂如蟋蟀山有樞綢繆杕杜葛生采苓諸篇序概指為譏刺時君之詩得朱子辨説而聖經之本指以明於是益歎大賢與人為善其是非取捨一凖乎義理之公不惑於穿鑿傅㑹之説而後晉風之厚民俗之淳益粲然明著於後世則信乎可以排列國之風而獨出矣雖然是豈獨可以見民俗之淳厚而已哉益以知前聖遺風之遠也車鄰車馬侍御詩人美之則秦之所以為秦者如此而已耳並坐鼔瑟亦豈真能有禮樂之好哉蓋自三代以來未有以力得天下者至於秦而世運民風忽焉一變聖人有以見夫得天下不必皆以徳也故魏唐次以秦以見晉亡而秦興也秦風首車鄰以見以力得天下將始於秦也孟子曰天下無道小役大弱役强豈不然與小戎小戎猛烈壯厲非婦人所能作其曰言念君子詩人託興之辭耳輔氏所謂極其憂思情也無所怨刺義也夫汝墳草蟲不免於憂悲而謂小戎之婦人為能知義耶蓋詩人之代為辭不如婦人之自為言為能盡其情也小戎言而不盡其情故又以知非婦人之作也黄鳥三良之事蓋穆公之惡而康公成之彼三子者宜亦有過焉黃鳥不能高飛遠引擇木而栖止于棘與桑與楚則詩人之意見矣東門之楊東門之楊序謂親迎而女不至親迎不見於詩特以昏以為期一句斷之耳而尤可異者鄭氏之說詩也鄭氏箋云女留他巴不肯時行考昏禮父親醮子而命之迎子承命而行主人筵几於廟而拜迎于門外壻執雁入揖譲升堂再拜奠雁降出御婦車而壻授綏御輪三周先俟于外婦至壻揖婦以入此士親迎之禮也父醮女而俟迎者母南面于房外女出于母左父西面戒之母戒諸西階上父送女命之曰戒之敬之夙夜無違命母施襟結帨曰勉之敬之夙夜無違宫事庶母及門内施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸衿鞶此父母命戒之辭也以親迎之禮威儀節文如彼以父母命戒之辭重愼如此士不親迎則已既曰親迎矣當時雖世教衰微而古禮之遺猶當存什一於千百不至蕩然盡廢也而曰女於是時留他巴不肯時行豈不可異哉或以謂親皆没昏姻失時無父母之命或父母存而不能以禮制其女雖然儷皮束帛請納徵矣女子許嫁筓而醴之矣雖留他巴欲何為哉甚矣序之誤而鄭氏之謬也豳風豳何以終風大周公之功而以明臣道也周之王業成于周公聖人著國風之正變以明王業之盛衰故凡公之自為詩與詩為公而作者皆得繫於公風皆以國名魯公國也不繫之魯者何或曰伯禽封魯公實不之國故不繋魯然而非也公功在天下魯一國耳假令公之魯庸得以魯盡公耶故凡繋於公之詩不得曰魯也周之王業成於公曷不繋以周弗敢專也豳者夏之列國先公之所居也繋以豳公之志也而以終乎風者易曰无成有終又曰地道无成而代有終也常棣常棣朱子云國語富辰之言以為周文公之詩但春秋傳為富辰之言乂以為召穆公思周德之不類故糾合宗族於成周而作此詩二書之言皆出富辰且其時去召穆公又未遠不知其説何故如此杜預以作詩為作樂而奏此詩恐亦非是愚按常棣周公為管蔡而作先儒論之無異辭矣富辰謂召穆公作此詩殆猶春秋傳所謂賦詩云爾傳凡言賦詩有二義公入而賦大隧之中其樂也融融姜出而賦大隧之外其樂也洩洩凡此是自為詩也公子賦河水公賦六月凡此是誦古詩也召穆公之作常棣是誦古詩也杜預以為作樂而奏此詩與賦詩之義自别宜朱子不取其説也三禮古禮二經周禮儀禮而已周禮者周官政典之書儀禮者儀法度數之事禮記者則諸儒雜記之書非古禮經也所謂周官政典之書者蓋周公所作載官府職掌之禮漢武帝時河間獻王得而獻之失其冬官哀帝時劉歆校理祕書以考工記補冬官僃周官六篇之數今謂之周禮是也所謂儀法度數之事者蓋周以來朝聘饗射冠婚䘮祭威儀之制漢承秦燔書滅學禮經殘壞魯髙堂生傳士禮十七篇以授瑕丘蕭奮奮授東海孟卿卿授后蒼后蒼授大戴德小戴聖又有劉氏所傳十七篇次第為優鄭康成從而注之今謂之儀禮是也自后蒼為儀禮之學别録數萬言號曲臺雜記戴德傳之者八十五篇或云八十一篇今其書存者總四十篇謂之大戴記戴聖傳之者四十三篇曲禮檀弓雜記分上下馬氏増以月令明堂位樂記總四十九篇謂之小戴記二戴禮並是曲臺雜記漢世諸儒言禮者並取二家今大戴禮不頒於學宫所謂禮記者小戴記也謂為諸儒雜記之書者此也朱子謂周官為禮之綱領儀禮乃其本經而禮記郊特牲冠義等篇乃其義說則是禮記者二經之傳注也宋以前有三禮通禮諸科自王安石行新經義獨存禮記之科迄今莫敢議其非者間嘗論之周禮一書可行於文武周公之世不能行於春秋戰國之時自是以來儒生雖復誦習而鮮可被之實用故王莽之王田市易安石之青苖均輸以之速亡召亂蓋古今之勢不同而法亦因時而屢變也韓愈嘗苦儀禮難讀謂其行於今者蓋寡沿襲不同復之無由是二經者之不行亦其勢使然而已矣小戴之書先王之遺訓猶存往行前言彬彬可考焉蓋掇取大戴之精華為一家之記述安石之獨存此科亦不可謂無見也顧其傳述舛駮往往而有月令出於吕不韋王制出於漢儒後世不以為秦漢之書而以為商周之禮不以為傳注而以為經是則可議也有聖人者出必將刪定焉又嘗考戴聖治行多不法而聖子賓客為盗身為禮宗奸犯名義君子不以人廢言信哉午亭文編巻二十八
