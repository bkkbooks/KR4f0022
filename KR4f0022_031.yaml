body:
  text: 午亭文編卷三十一大學士陳廷敬撰奏疏請嚴督撫之責成疏康熙二十四年九月初六日經筵講官都察院左都御史管理京省錢法臣陳廷敬奏今天下之事繫於督撫督撫之職在察吏安民若民犯法者多刑辟不止惡在其能安民也察吏之意欲令民安若民犯法者多刑辟不止惡在其能察吏也臣見直省各督撫所上刑獄章奏繁多夫督撫之職在安民者非謂民既犯法而明於擊斷之為能盡其職也謂民未犯法而嚴禁令謹科條使民遷善逺罪至於刑清政簡之為能盡其職也故督撫之能與不能視其所治之民而已矣民之安與不安視其刑之清與不清政之簡與不簡而已矣直省之刑清而朝廷之刑清矣直省之政簡而朝廷之政簡矣政簡刑清王道之大端也或曰民自犯法耳於督撫何尤焉孔子有言上教之不行罪不在民也故欲使民不犯法而刑辟衰止莫先於行上之教欲行上之教繄惟督撫是問督撫曰是將在羣吏夫吏果廉能毋敢有加派毋敢有火耗毋敢黷貨於詞訟毋敢朘削夫富民然後一意行上之教而民不罹於刑今吏或不能誠有罪焉然非盡吏之罪也人苟稍稍知詩書識道理一行作吏誰忍自棄而今或不能者非盡吏之欲私肥其家蓋迫於上官耳上官廉則吏自不敢為貪上官不廉則吏雖欲為廉而不可得吏既不得廉則凡所為加派火耗黷貨朘削之事日以曲事上官之不暇而又何有於行上之教使民不罹於刑雖使吏勉强行之而民習見吏之所為多不法也曰是惡能教我誰其從之是教之不行刑之不止吏為之也吏之為之者督撫使之然也方今要務在於督撫得人為督撫者既不以利欲動其心然後能正身以董吏吏既不復以曲事上官為心然後能加意於民向之所為加派火耗黷貨朘削之事舉皆無之夫然後民可徐得其養養立而後教可行也至於教民之法三代盛矣古今異宜所貴得其意而神明之而其大要莫重於讀法之令周禮鄉大夫之職各掌其鄉之政教禁令正月之吉受教法於司徒退而頒之於其鄉吏使各以教其所治歷代以來有講讀律令之法皆周禮之遺意為教民之要務也夫欲教民以道必先信上之令以實致乎民管子曰國之重器莫重乎令令重則君尊君尊則國安賈山曰臣聞山東吏布詔令民雖老羸癃疾扶杖而往聽之思見德化之成是以人臣敬君之命令尊之如雷霆之不敢侮蓋以人君之所以為國鼓舞羣下者恃其命令而已臣伏讀皇上聖諭十六條頒行已久彼時雖一經張挂曉諭而鄉村山谷之民至今尚有未知者臣近日惟見山東巡撫張鵬有上諭十六則講義及臣鄉山西寧鄉縣知縣龔應霖講約書其實心奉行與否當俟之事久論定之時至於一經曉諭而旋視為具文者比比皆然臣所謂信上之令以實致乎民者責在有司而督撫為要矣臣欲祈皇上特降嚴綸通飭督撫使賢者知勉而否者知懼洗滌舊染專以潔已教吏吏得一心養民教民為事其督撫保薦府州縣官也須要第一條實填一本官無加派無火耗無黷貨詞訟無朘削富民十九字第二條實填一本官實心奉行上諭每月吉聚衆講解鄉村鄉約講解二十二字如保薦不實者請敕部將保薦之督撫具揭之司道並所保薦之官嚴議處分定例不得仍用常例處分餘條仍照舊例開具實蹟凡若此者所貴督撫知功令之重在此顧名思義觸目警心以導羣吏也而皇上之考察督撫則以潔已教吏吏得一心養民教民為稱職否者罷黜治罪聖主在上坐照如神自有洞鑒臣之愚惟祈朝廷切責督撫以幾刑清政簡之風故敢獻其鄙言助成王道之治竊虞辭難達意故字多逾格統冀鑒宥施行請議水旱疏康熙二十四年九月初六日經筵講官都察院左都御史管理錢法臣陳廷敬奏臣伏惟皇上盛德湛恩蟠際天壤閔念黎元甚于赤子發倉廩蠲租賦弛山海之禁謹儲積之防重恤農事勤求民瘼所以便利安全兆姓之道甚備兹者仰賴皇上德恩嵗榖既登惟一二水災猶厪睿慮夫水旱凶荒堯湯之世不能盡無惟其備及於豫而賙當其急故民恃以無恐臣於報免災荒敢因聖意之所垂念者少獻其末議焉臣前見山東巡撫徐旭齡於康熙二十三年九月題報濟寧海豐霑化水災情形該部題覆行今委官踏勘於十一月該撫題濟寧等三州縣成災分數並應蠲免錢糧冊結該部題覆行令分晰地畝髙下於二十四年四月巡撫張鵬題濟寧等三州縣並無揑報被災分數照例請免本年錢糧該部乃覆准蠲免自去年九月至今年四月八閲月矣是此一水災之報也巡撫初題報其形情再題報其分數三題稱無揑報此一水災之免也該部初覆令其委官踏勘再覆令其分晰地畝髙下及其具題至於三也然後覆免是則自報至免巡撫具題者三戶部具覆者三疊疏奏聞上勞聽覽以故德音下逮近省已踰半年逺省將不止一載在皇上恤民之意如彼其勤而在所司出納之際如此其遲回者非故為是鄭重也所行之例則然耳臣愚謂被災之分數即見地畝髙下之間而地畝之髙下即宜分晰於分數多寡之內蓋再題而該部可具覆矣不必駁察至再而具題至三也如此則上宣聖主勤民之意下慰小民望澤之心中不得使猾吏奸胥緣為弊竇况該部既行令委官踏勘分數於初又行令分晰地畝髙下於再其分數髙下從來惟以巡撫之具題為據不見有所增損其間則咨行亦是虛文再駁愈覺可已臣請於巡撫具題分數之後既有冊結可據該部即宜具覆豁免更不再駁務取早結為便昔漢武帝使汲黯視河內火還報曰臣過河南貧人傷水旱萬餘家謹以便宜持節發河南倉粟以賑貧民請歸節伏矯制之罪武帝賢而釋之夫黯所視者火而所賑者水旱黯不以非其職自解武帝不以矯制罪黯蓋急民之急也昔人謂救荒如拯焚溺若稽遲嵗月始沛德音皇上如天怙冒之心必不若此臣之所見實聖意之所及故敢進其愚說伏祈睿鑒採擇施行撫臣虧餉負國據實糾參疏康熙二十四年九月初六日經筵講官都察院左都御史管理京省錢法臣陳廷敬奏竊惟雲南捐納事例乃皇上斟酌時宜所以恤民而裕餉顆粒皆係國儲絲毫悉關軍食為撫臣者宜如何撙節清釐以無負封疆之重寄乃臣於雲南巡撫某有異焉臣閲邸抄據該撫某疏稱大兵還京尚餘捐納米五十一萬四千六百餘石草一千一百六十一萬五千餘束彼時即應支放乃留米不發反動支庫銀二萬五六千兩買米一萬石每石用銀二兩二錢至二兩八錢不等又留草不給動支庫銀四十四五萬兩折給草一千七百五萬一千七百六十四束每束用銀三分以現在之米草不以支給大兵而濫用公帑另行採買此何說也及至大兵凱旋始巧行題請將前項所存米草動給官吏等項驛遞馬匹米一石止扣銀一兩二錢草一束止扣銀一分以今扣算之數較前採買之價相去不啻霄壤此又何說也臣意某當大兵還京之日使果有現存米草斷不另買必是先將報捐之米草多行折銀入已無從支給故為此掩飾一時之計是其侵沒之弊顯然可見者也至於凱旋之後苦於開銷無䇿乃朦朧請給本省官俸驛遞蓋以大兵之供應甚急而本省之支銷可緩大兵之供應分毫不可假借而本省之支銷任意可以通融也獨不思某當日所收之米草即照採買之價計之米五十一萬四千餘石為銀一百二十九萬兩有餘草一千一百六十餘萬束為銀三十萬兩有餘而今請扣之銀止共為七十餘萬兩是一那移之間而某侵沒餉銀已九十餘萬兩矣即使無侵沒入已之弊而身為封疆大吏當軍興之際不思裕國省餉虧損國課幾至百萬之多溺職不忠之罪某雖百喙何以自解乎伏乞皇上敕部檢察前後報部文冊奏銷價值難逃睿照迅賜處分庶錢糧不致侵溷而官邪知所警惕矣臣職司風紀不避怨嫌謹據實糾參伏祈睿鑒施行俯瀝懇誠祈准回籍以安愚分疏康熙二十七年五月初二日經筵講官吏部尚書管理修書總裁事務臣陳廷敬奏臣薄劣孤生迂拙自守荷䝉皇上天地飬育之恩生成造就寵祿逾涯臣自念無他材能報塞萬一惟早夜兢兢思自淬厲不狥親黨不阿友朋上恐負聖主之殊恩下欲全微臣之小節乃至積有疑釁飛語中傷如前楚撫一案者汧雖臣戚涇渭自分嫌疑之際尤臣所慎彼既敗事遂疑及臣積疑成恨語涉連染今幸我皇上日月中天無幽不燭既難逃聖主睿鑒之明復一付盈廷至公之論雖臣之心跡即此可白而臣之自處須適所宜惟當引退田閭永銜恩於髙厚詎可抱咎夙夜猶厠跡於班行即聖度之寬容曲加憐恤而臣心之局蹐倍切倣徨且臣年力早衰兩目昏暗自被誣以來神志摧沮事多健忘奏對之頃失其常度䝉皇上不加譴責而臣之心實難自安也若復貪冒榮寵罔識進退曠官尸位過誤滋多又臣父年八十有一倚閭懸望昔戴恩而未去今因事以陳情伏乞聖心憐憫准與回籍則詠歌舜日常沐浴於時休耕鑿堯天得自安其愚分臣無任感激涕泗戰栗屏營之至直陳言官建白疏康熙二十九年四月十一日經筵講官都察院左都御史臣陳廷敬奏臣賦質迂踈謬膺重任茲荷新命再領臺班氷檗自持涓埃未答伏念風紀重任臣若不正已率屬益加砥礪則有負皇上簡畀之意亦非生平惓惓報主之心視事以來每進臺臣而告誡之退食私居嚴杜請謁凡有建白不許預聞於堂官僚友以滋指使囑托之弊其有陋習未除必仰兾天語申飭者敬為皇上陳之臣思科道之設所以廣耳目而申獻納於人才之邪正吏治之貪廉事關生民利害者必正言無隱而後克副斯職如中外臣僚果有奸貪不法因革事宜果有紀綱關係者則當切實指陳否則與其生事以塞責不若省事而擇言蓋專欲以塞責了事則不免毛舉細故剔摘成例馴至於刻薄繁碎不急之務而無禆於聖朝寬大經久之規如近日兵部議處武官以踈防為諱盜革職多員䝉皇上神明洞照令其改正此類事情部臣何以不言必待言官言之而言官所言者又不能皆如此確當有益之事是以或失於苛細不急之務而徒為此紛擾也臣故曰與其生事以塞責不若省事而擇言也方今朝廷清明紀綱具在所不能保其必無者猾法不肖之人耳國家耳目之官專因此輩而設若能省事而擇言則必持重而養鋭言不輕發發而必當使不肖之徒有所警戒顧忌而不敢恣意為非此言官之職掌即紀綱之攸存臣所謂省事而擇言非欲其避事以自便伏乞皇上特加申飭嚴禁塞責則庶乎不至以無補之繁言瑣瀆聖聽也臣又念進言之體貴乎簡明近見條奏一事冗長之詞多論事之言反少我皇上聖學聖治豐功懿德日盛月新史官書之儒臣紀之而且萬方臣庶共矢謳歌海外風行亦深頌禱顯鑠一時而垂美億祀者既已至矣亦何待言官於條奏建白之時綴述數端既不足以揚盛美之萬一而於言事之體有不當然者况皇上一日萬幾旰食不遑而章疏拉雜閒文冗沓繁蕪致煩乙覽兼乖辭尚體要之義諒我皇上必已厭薄之特聖度優容不加詰責耳併祈嚴敕科道官不得踵習前弊多引煩詞如有不遵量加處分庶幾息便辟之風作謇諤之氣矣慰問謝恩疏康熙三十一年八月十六日經筵講官刑部尚書加二級臣陳廷敬奏為恭謝天恩事臣以庸愚䝉聖恩教養三十餘年不次拔擢歷遷要職備極殊榮仰戴髙深莫報萬一臣辜負聖恩命竒福薄蹇遭父故仰䝉聖心矜憐遣內閣學士兼禮部侍郎臣戴通內閣學士兼禮部侍郎臣王尹方至臣私寓恩賜茶酒臣聞命自天撫躬無地殊恩異數霑被非常臣不勝悲痛不勝感激伏念臣父昌期䝉恩纍封資政大夫吏部尚書再䝉恩封光祿大夫刑部尚書生晉崇階殁邀曠典此實古今來最難得之恩遇允惟臣父子不世出之遭逢蓋君恩莫大乎榮親而臣力長慚於報主臣今回籍守制自此逺去闕廷無由瞻望天顔臣不任銜感涕零之至諭祭謝恩疏康熙三十二年二月初二日經筵講官刑部尚書加二級臣陳廷敬奏為恭謝天恩事臣以父憂䝉聖心軫念臣銜恩就道感泣抵家父老見臣逺歸間來慰唁臣荒迷之際但聞皆稱聖君在上蠲租賜粟吾儕小民得以樂生已又見深山窮谷感頌皇仁至於村童野婦無不皆然而自冬以來雨雪頻仍豐年可卜臣治喪稍暇閉門寂處忽䝉天恩賜與諭祭到臣廬次臣謹望闕謝恩感激悲傷不能自已伏念臣遭憂之日䝉遣使恩賜茶酒臣隨具奏恭謝仰荷聖㫖批答又獲天寵下頒光生閭里臣感恩戴德彌切氷兢謹瀝陳微悃恭遣義男陳忠賫奉通政司封進仰祈聖鑒臣不任悚惕瞻依之至午亭文編卷三十一
