body:
  text: 午亭文編卷二十九大學士陳廷敬撰講筵奏對録有序臣廷敬伏惟聖主以天縱生知好學不倦臣叨侍講筵多歷年所仰聆天語闡明經義契往聖之心傳實前王所未有盛德日新光輝宣著是以措天下於隆平開萬年之景運文謨武烈史不勝書皇哉唐哉至矣盡矣臣自惟愚陋莫贊高深每當玉音下詢獲申奏對因而講義之外薄有敷陳兹謹輯録數條仰紀聖學之崇宏俯志微臣之遭遇名曰講筵奏對録臣不任慶幸悚栗之至戊午九月五日臣廷敬進講啓乃心沃朕心若藥弗瞑眩一節惟暨乃僚一節嗚呼欽豫時命一節上曰朕觀髙宗命傅說諄諄以納誨輔德為言可見自古君臣一德一心至誠孚感為上者實心聽納以收明目達聰之益為臣者實心獻替以盡責難陳善之忠然後主德進於光大化理躋於隆平後世君臣之間徒為虛文中鮮實意治不逮古職此故耳廷敬奏言有高宗之為君所以有傅說之為臣皇上此言誠社稷萬年之大慶也壬戌某月某日進講晉康侯用錫馬蕃庶晝日三接奏對言人臣盡忠事主豈得以希榮干寵為心人君以禮使臣固必有報德酬功之典日講六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也奏對言守正不阿君子立身之大防依違干進小人求容之私計以六二之賢而有愁如之象蓋賢者事君以得時行道為念非為一已之榮辱進退而然也故爻曰貞吉象曰中正於此而察人才之邪正審心術之公私俾為臣有喜起之風而無愁如之意此實治道汚隆之所繫也又云受兹介福此蓋論其理耳亦有懷才抱德而沉於下僚亦有才微德薄而竊據髙位此理之所不必然而事之所常有者故六二之介福聖人所以深慶之也日講六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也奏對云昔者帝堯之時擊壤之歌曰帝力何有於我哉康衢之謡曰不識不知順帝之則而孟子論王道亦曰民日遷善而不知為之者此見帝王天覆地載之量無一毫計功謀利之私六五失得勿恤深合此意所以吉無不利往而有慶也五月初九日講初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也奏對言傳曰枉已者未有能正人者也古之人所以嚴於去就之義者非愛其身正愛其道耳故士君子必有難進易退之節而後有匡王定國之勳此明夷之君子所以守不食之義也又奏對言薛方王莽時人莽以安車迎方方謝曰堯舜在上下有巢由今明主方隆唐虞之德小臣欲守巢由之節莽悅其言遂不强致故曰薛方保身而自全揚雄為莽大夫莽惡劉棻等符命之說置於法棻嘗從揚雄學作竒字治獄使者欲收雄時挍書天祿閣恐不免乃從閣上自投下故曰揚雄投閣而不免也士君子觀薛方揚雄之事可以得處明夷之道矣初十日講六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也奏對言此一爻商之微子當之其在書曰吾家耄遜于荒又曰王子弗出我乃顚隮其後微子抱祭器歸周以存商祀正得此爻之意十一日講箕子之明夷利貞象曰箕子之貞明不可息也奏對言殷有三仁微子之去利而不貞比干貞而不利惟箕子之所為利也貞也故象傳曰箕子以之爻辭曰箕子之明夷所以表忠良之隱原臣子之心而聖人繫易之㫖深矣十七日講象曰風自火出家人君子以言有物而行有恆奏對言帝王以天下為家一言之微有前後左右之竊聽一行之細為子孫臣庶之隱憂是以聖帝明王必愼乎此十八日講家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也奏對言齊家治世莫善於禮禮本天下之至嚴用之各得其分則至和故齊家者與其過於和寧過於嚴與其過於嚴寧準於禮準乎禮則無過嚴之失而有至和之美矣二十二日講睽小事吉奏對言睽之時可小事而不可大事矣至於世道休明之日人心聯合之時正當大有為之際必有紀綱宏遠之規模為社稷靈長之大計慮萬年毋狃於旦夕成大事毋見於小利此又憂盛危明防於未睽之道也二十四日講九二遇主于巷無咎象曰遇主于巷未失道也奏對言人臣當進以禮退以義平居有難進易退之節則臨事有尊主庇民之功蓋士人一身之進退為禮義廉耻之所關即為世道人心之所繫故必合於道而後可然此在平日以禮義廉耻養之然後人以禮義廉耻自處格人心而正風俗此尤為要務也二十六日講六三見輿曵其牛掣其人天且劓無初有終象曰見輿曵位不當也無初有終遇剛也奏對言無初有終聖人亦論其理當如此蓋論其理邪固不能勝正而歷觀古來邪正之際正實往往不能勝邪惟聖人在上能使君子道長小人道消斯可以决其理之不爽耳二十八日講睽孤見豕負塗載鬼一車先張之弧後說之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也論君臣道合奏對言上有堯舜之君下有臯陶稷契之臣明良喜起都俞吁咈於一堂之上後世如唐之太宗致治幾於三代之隆亦必魏徵房杜之為其臣故能成貞觀極盛之治此可謂君臣道合一德交孚也二十九日講蹇利西南不利東北利見大人貞吉奏對言利西南不利東北言濟蹇之道貴得地利也昔漢昭烈有撥亂之志諸葛亮有王佐之才然而困於西蜀一隅者以不得地利也利見大人言濟蹇之道貴得其人也昔張子房之從漢髙馬援之歸光武可謂得其人矣貞吉言濟蹇之道貴得其正也三代以後有濟世安民之功如唐之太宗宋之藝祖亦可謂得貞吉之意者矣八月十八日講初六無咎象曰剛柔之際義無咎也奏對言此一爻專主臣道言蓋以柔在下則有小心恭順之誠而上應乎剛則有擔當任事之力此皆無咎之道然解卦諸爻皆以解小人為義大抵易之一書扶陽抑隂進君子退小人之意為多不獨解卦諸爻為然此所以有資於治道也十九日講田獲三狐得黃矢貞吉象曰九二貞吉得中道也奏對言解小人所以杜惑上殘民之禍者也從來上之德意不能下究民之疾苦不能上聞者皆小人為之壅蔽於其間也故貴解而去之小人之害有不可勝言者蓋小人未得志之時必工為諂媚之術既得志之後則肆其險毒之奸是以斷然必解而去之也二十三日講君子維有解吉有孚于小人象曰君子有解小人退也上問君子小人奏對言小人患得患失無所不至其貪位固寵之術有如物之固結而不可解聖人特筆書之曰君子維有解蓋言斷然解去之不使其為國家之患也又講義有郭之所以危句奏對言昔齊桓公至於郭國問郭之父老曰郭何以危父老對曰郭公善善而惡惡桓公曰善善而惡惡是賢君也郭何以危父老對曰善善而不能用惡惡而不能去郭之所以危也觀於此可不戒與二十六日講上六公用射隼于髙墉之上獲之無不利象曰公用射隼以解悖也奏對言隼以象其凶惡髙墉以象其權勢小人而乘權藉勢乃刑法之所必加也故不曰解而直曰射此所以嚴小人之誅也上爻在大臣之位大臣以天下為心無一已之私好私惡然後有天下之公是公非是非明而後國是定國是定而後人心正治道成九月初七日講象曰山下有澤損君子以懲忿窒欲奏對言人心本然之善原與太虛同體太虛中無一物吾心中亦無一物所以聖賢格物之功正以求復其無物之體故損之又損以至於無乃見此心本然之善而其所最當損者莫過於忿欲兩端懲之窒之則凡類於忿欲者可以不勞而克治之矣十九日講六三三人行則損一人一人行則得其友象曰一人行三則疑也論朋黨奏對言君子以同道為朋小人以同利為黨苟不辨其邪正而惟以其同則指為朋黨不免有黨同伐異之患歐陽修朋黨論正是此意二十一日講六五或益之十朋之龜弗克違元吉象曰六五之吉自上祐也論楚人以二臣之賢珍於白珩齊王以四子之功美於照乘奏對言昔楚之王孫圉聘於晉趙簡子問曰楚之白珩猶在乎王孫圉對曰楚未嘗以此為寶楚之所寶者觀射父能作訓辭以行事於諸侯又有左史倚相能道訓典以朝夕獻善敗於寡君此楚不以白珩為寶而以善人為寶也昔齊威王魏惠王會田於郊惠王以徑寸之珠照車前後各十二乘者誇於威王威王曰寡人之所以為寶者與玉異吾臣有檀子者使守南城有肹子者使守髙唐有黔夫者使守徐州有種首者使僃盜賊此四臣者將照千里豈特十二乘哉惠王有慙色此齊以四子之功勝於照乘之珠也二十三日講彖曰損上益下民說無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行奏對言損上益下之主以至誠惻怛之心為愛養斯民之政初不計民之為我用也而當此之時動罔不臧故彖辭曰利有攸往利涉大川彖曰損上益下民說無疆可見損上者正所以益上也有子嘗言百姓足君孰與不足百姓不足君孰與足大學言與其有聚斂之臣寧有盜臣如裴延齡桑𢎞羊輩皆以言利固寵一時貽譏後世此又可以為龜鑑也日講六四中行告公從利用為依遷國象曰告公從以益志也奏對言舉天下之大事在於得天下之民心而所以得民心之道惟在聖君賢臣朝夕講求以實心行實政非一切權宜之計所可幾也如漢文帝之止輦受言唐太宗之虛懷納諫所謂諫行言聽膏澤下於民正此爻之義也十八日講上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也奏對言聖人最惡言利之臣至比之為盜臣之不如昔周厲王以榮夷公為卿士榮夷公言利之臣也芮良夫諫之以為不可用其後厲王卒用榮夷公為卿士諸侯自是不享則芮良夫之言驗矣又講夬揚于王庭孚號有厲告自邑不利即戎利有攸往奏對言君子光明磊落即有過失人所易見小人巧佞回邪患得患失凡所以貪位固寵者無所不至又能形人之短見已之長能使人主信任而不疑故得專權而肆其惡昔唐德宗謂李泌曰盧杞清忠彊介人言其奸邪朕初不覺泌對曰此乃杞之所以為奸邪也使陛下覺之豈有建中之亂乎泌之所言正有合於知人其難之義十一月十四日講彖曰夬决也剛决柔也健而說决而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也奏對言大抵易言君子小人之際未嘗不委曲詳盡而於君子所以决去小人之道又未嘗不反復丁寧雖以五陽之盛决一隂之微而諄諄告戒如此可見小人之難去而君子往往不能勝之也十六日講九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也奏對言小人讒害君子不在於大庭廣衆之際而在於燕閒私語之時使人主聽受其言而不覺故聖人比之為莫夜之戎惟聖明之主嚴絶其端則可以無此患矣故曰所言公公言之所言私王者無私二十七日講上六無號終有凶象曰無號之凶終不可長也上顧廷敬曰君子得志尚能容小人小人得志必不能容君子對曰誠如聖言此古今同慨惟聖明在上有以察之經筵講章天叙有典敕我五典五惇哉天秩有禮自我五禮有庸哉此臯陶陳安民之謨以告帝舜也謂夫五倫在人自其經常不易者謂典蓋原於上帝付豫之初固天叙之也然天能叙之不能保其後也所以立之教化敕正我五典使倫叙益厚者則在人君矣五典在人自其節文不過者謂禮蓋天理之品節固天秩之也然天能秩之不能保其繼也所以立之制度用我五禮使品秩有常者則在人君矣是典禮出於天而為君道之所係如此臣因是而繹思之盡倫本乎天道要惟惇厚以咸宜制禮順乎人情尤貴庸常而可久是知大典大禮之宗必屬作君作師之任矣仰惟皇上教先親遜化首溫文藝極陳常立愛立敬以訓世綏猷節性中規中矩以宜民固已覺悟羣倫斟酌百代矣臣愚更願建中垂裕創制顯庸彜紀懋修益奏協和之化經綸盡善彌勤劼毖之衷斯率土共識尊親而編氓咸知禮讓矣臣愚不勝顒望克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍此一節書是史臣紀帝堯放勳之實也謂夫德性之中萬善悉僃合天地民物為一體統親疏遐邇於同原德本自大也惟其有物欲之私所以鮮昭融之量而人已之間多扞格矣惟帝堯天理渾然能明其大德存諸心者此德之全體具足見諸身者此德之妙用流行推此德以親九族則倫紀以修恩義以篤九族已親而睦矣推此德以平章百姓則舊染之俗咸與維新畿內之民皆昭然自明其德矣推此德以協和萬邦則萬邦黎民美哉變惡為善已於是而雍和矣是勳放於家國天下者如此臣因是而繹思之執中開危微精一之傳為千古人君之極則明德立修齊治平之準實萬世聖學之源流故知開天首出之一人必有過化存神之偉烈仰惟皇上迪哲無逸生知敏求稽古𢎞經闡傳心之要察倫明物大保治之規固已建巍巍之成功宣亹亹之令聞矣臣愚更願性道彌崇皇風益暢天行不息時厪於聰明睿知之心日進無疆允懋夫聖神文武之治則丕振光華之盛績而永垂佑啓之鴻圖矣臣愚不勝顒望文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也此一節書是孔子申言乾德之具於人心也謂夫乾天道也亦人道也人得天之氣以生渾然與天同體故元亨利貞四者在天為春夏秋冬造物無心而成化在人即為仁義禮智懿德不言而同然觀夫元之為仁者慈祥一念統百行而開先乃衆善之長矣亨之為禮者經緯萬端合情文而並粹乃嘉美之會矣利之為義者物得其裁制則分定而情安義之所由以和矣貞之為智者識進於堅凝則見明而守固事之所依為幹矣天德之本然具於吾性者如此臣因是而繹思之人生為萬物之靈固僃仁義禮智之全德維皇建庶民之極尤兼聖神文武之宏圖故能體道於當躬自可繼天而作則仰惟皇上性裕中和學勤遜敏彜倫攸叙立萬國之儀型精一常存紹百王之心法固已亶聰明而作乂勵夙夜而觀成矣臣愚更願廣運無疆升恆有永允懷而修來日積懋敬而聖域彌優則道畢協於四氣之和而福長綿於億年之久矣臣愚不勝顒望君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事此一節書是言君子兼體四德之全功也文言曰元亨利貞之德在人皆有其同然而盡性合天之功惟君子乃為克僃君子與仁合一而存發皆仁故足以大仁民愛物之施而長人矣美其所會而動罔不臧故足以協天秩天叙之常而合禮矣於分之所宜因物而各足之則安生於分定和生於能均而足以和義矣知正之所在而固守之則定見不疑定守不撓而足以幹事矣君子兼體四德之全功如此臣因是而繹思之天命不已元亨利貞之所以流行也聖功無息仁義禮智之所以體僃也默契天人性道之大本端望乘乾首出之一人仰惟皇上法天廣運如日正中式廓鴻圖聲教實朔南之暨聿新駿命惠懷無遐邇之殊固已履中蹈和揆文奮武矣臣愚更願大猷允塞至德彌崇清明在躬凛惟幾惟康之㫖夙夜基命厪未安未治之心則天德與王道同功修已與治人兼至將美化浹於四海而福祚永於兩儀矣臣愚不勝顒望帝庸作歌曰敕天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉此言虞帝勉其臣以保治之道也當舜之時天下既已乂安而舜之心猶恐怠荒易啓用作歌相警先述其意曰天命難諶至為可畏欲保治於無窮必操心於不懈惟一時之暫惟一事之微無弗戒敕庶天命可永保也乃歌曰為臣者樂於趨事而股肱喜哉則治化振興而元首起哉庶績修舉而百工熙哉蓋舜以保治之道望其臣者如此臣因是而繹思之天體雖髙而動靜云為無時非旦明之所寓天道雖遠而典禮命討無事非陟降之所臨惟主臣交致其憂勤斯化理聿臻於隆洽仰惟皇上乾行剛健謙德尊光睿學精深單淵衷於夙夜宸章炳煜昭泰象於星雲固已紹二帝之心傳鞏萬年之基緒矣臣愚更願治益求治安愈圖安日進無疆默契貞恆之運皇建有極宏敷彞訓之休則府事茂底於修和而功德彌徵於巍煥矣臣愚不勝顒望子曰君子矜而不爭羣而不黨此一章書是以君子立持已處衆之坊也孔子意謂人之品誼貴於嚴毅自持然或過於立異勢必涉於乖戾之為君子則莊以飭躬可謂矜矣而未嘗以氣陵人何爭之有人之度量貴於樂易可親然或一於從俗勢必入於阿比之私君子則和以應世可謂羣矣而未嘗以情狥人何黨之有君子於人已之際各得其宜如此臣因是而繹思之立品者無論為介為通可以驗學術之邪正觀人者即其為同為異可以别人品之僞真允惟明作惇大之朝克有正直和平之化仰惟皇上思睿作聖體仁長人是訓是行廣敷言於率土惟和惟一開泰運於中天固已立極臣鄰協衷堂陛矣臣愚更願道隆位育功茂裁成政教遐宣三德之剛柔並乂風聲丕樹四方之綱紀常新則至化作人賡雅歌於棫朴羣工亮采接盛際於唐虞矣臣愚不勝顒望易簡而天下之理得矣天下之理得而成位乎其中矣此一節書見聖人體道之極功也孔子繫易傳曰人心與天地本同一原而聖人之極功符乎天地蓋此易知簡能之理天地之所以立心即聖人之所以合撰人能以一心㑹易簡之原則天下萬殊之理無所不貫洵足以範圍曲成而不遺矣夫法乾之易而天下之險阻皆平法坤之簡而天下之紛紜自靜將見天位乎上地位乎下而人成位乎其中體道之極功寧外易簡以致之哉臣因是而繹思之帝王本天地之德以居心即協天地之化以為政天施地生覆載之神功也府修事和裁成之大用也而惟此易簡之理貫浹其間宰之者不勞斯出之也自裕聖人參贊髙深為萬世人道之凖端在此矣仰惟皇上得一以貞兼三出治主敬存誠而立極明作惇大以有功固已廣運被於兩間彌綸周於無外矣臣愚更願升恆不息悠久無疆富有日新僃篤實光輝之妙甄陶鼓舞昭流行化育之機則四時成序於不言萬國同風而遵道矣臣愚不勝顒望教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和此言舜命䕫以豫教之道也虞書紀舜之命䕫曰汝以樂教胄子在涵養其德性使直遂者濟以溫厚寬緩者濟以莊栗剛徑者無至刻虐簡略者無至傲慢焉若夫作樂之道則心發於言而為詩是詩以言志也有詩則有節奏可歌是歌以永言也有節奏則有髙下清濁之聲是聲依永而出也有聲則有十二律以調和之是律以和此聲也由是播之八音皆能諧和不失倫序而薦之郊廟奏之朝廷神人無不和矣蓋舜之命䕫者如此臣因是而繹思之善教必先育德在淑其性而節其情聖學具有全功惟興於詩而成於樂故盛世有廣大清明之象而熙朝多溫文恭敬之風欽惟皇上精一執中光華復旦止慈止孝聿徵大順之休作君作師式表元良之範固已道隆創述慶衍靈長矣臣愚更願德合乾符祥凝泰運升中以迓鳯儀之瑞垂裕以開燕翼之謀則基緒萬年而本支百世矣臣愚不勝顒望致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮此言君子尊道之極功也言德性本自廣大惟致之以擴其全量又問學而精察於幾微期至夫窮神逹化之實德性本自髙明惟極之以復其本體又問學而體驗於日用求當乎民彜物則之恆德性之已知者故也溫之而涵泳於不已又問學以充拓理義俾見其日新焉德性之已能者厚也敦之而培養於不息又問學以體尚節文務底於日崇焉蓋君子尊道之功如此臣因是而繹思之德性即心而具存心乃養性之功問學以知為端致知實進學之要故雖生知安行之聖猶勤遜志時敏之修仰惟皇上健協天行靜符人極道彌綸於六合廣運難名德宥密於一心精純罔間固已誕登文岸覃被堯光矣臣愚更願上理彌隆大猷永秩執契以宰清寧之化垂裳而著熙皥之風則九服承休而萬年詒燕矣臣愚不勝顒望孟子曰盡其心者知其性也知其性則知天矣此發明心性之學見知性之為要也孟子言人之一心具衆理應萬事有全體大用焉而欲極其本然之量則必由於知性蓋性為心所具之理人能於吾之心體一無所虧者必其於吾之性分一無所蔽者也顧性藴於心而原於天在人為性在天即為命非有二也既能知性則性之所從出者亦洞徹無間知天固不待他求矣孟子究言心性之學如此臣因是而繹思之盡心由於知性格物致知誠意正心之功也知性即以知天居敬窮理盡性至命之事也天德王道豈非一以貫之者哉仰惟皇上建極綏猷執中宰化體文武聖神之德勳華上嫓唐虞立天人性命之宗道法同符洙泗固已範圍六合胞與羣生矣臣愚更願位育茂隆淸寧永奠登道岸而仁風丕應握治原而協氣旁流則百福凝休而萬年垂裕矣臣愚不勝顒望天地之道博也厚也高也明也悠也久也此言天地功用之盛一如至誠之所徵也子思謂夫天地之道惟其不二故氣化流行各極其盛自地道言之既含𢎞而無外又靜深而無間博也厚也自天道言之既神功之峻極又光明之下濟髙也明也合天地之道言之既運行而有漸又始終之不渝悠也久也蓋天地之誠初與至誠無異故天地之徵亦與至誠相符者如此臣因是而繹思之天道得一以常清地道得一以常寧極覆載生成之功不外至誠無妄之理聖人參贊化育於此可見矣仰惟皇上聰明時憲聖敬日躋惇大明作而早奏升平久道化成而猶勤宵旰固已功符首出德合無疆矣臣愚更願熙皥同風彌綸罔間有生之族涵濡於樂利之天於萬斯年沐浴乎隆平之化則太和普洽而至治益光矣臣愚不勝顒望子曰人能𢎞道非道𢎞人此一章書是孔子勉人以體道之實也孔子謂道之大原出於天道之實理僃於人誠以天命人以性人率性而為道故能格物致知以立其本明善誠身以復其初推而極之齊治均平參贊位育以擴其量莫非道也莫非人之能有以𢎞之也苟非其人道不虛行道豈能𢎞人也哉人之不可以自諉也如此臣因是而繹思之道在於人治本乎道故有內聖外王之學斯成可久可大之功仰惟皇上聰明睿知文武聖神宥密本乎一心執中宰物彌綸遍於六合廣運成功固已會千古道統之歸立萬世人倫之則矣臣愚更願鴻猷允塞大化彌彰御郅隆之圖協淳風於有永撫久安之運綿寶歷於無疆則道法並治法常昭而皇極與人極丕著矣臣愚不勝顒望講筵在日講外每歲春二月秋八月進講先是臣前後為日講官兼經筵講官者八年及遷職院部去日講前後為經筵講官又十年自癸未直內閣仍兼經筵於今又七易年所矣蓋經筵命講臣獨為多今存講義數首以識大略雖局促無所發明存之以見聖主典學之勤如此也康熙己丑十二月臣廷敬恭跋午亭文編卷二十九
