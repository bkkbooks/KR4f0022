body:
  text: 午亭文編别集類六國朝提要臣等謹案午亭文編五十卷國朝陳廷敬撰廷敬字子端號説巖澤州人順治戊戌進士改庶吉士授檢討本名敬以是科有兩陳敬奉旨增廷字官至大學士諡文貞嘗著尊聞堂集八十卷晚年手定為此編其門人侯官林佶繕寫付雕午亭為陳氏陽城别業因水經注沁水徑午壁亭而名所謂午亭山村也集中詩二十卷雜著四卷經解四卷奏疏序記及各體文共二十卷杜律詩話二卷廷敬家故多藏書少時即能縱觀喜為詩歌門徑宗仰少陵頗不與王士禎相合而士禎甚奇其詩所為古文汪琬見而大異之遂肆力焉其生平回翔館閣遭際昌期膺受非常之知遇出入禁闥幾四十年正值國家文運昌隆之時而廷敬以淵雅之才從容簪筆典司文章得與海內名流以咏歌鼓吹為職業故其著述大抵和平深厚當時咸以大手筆推之卷首有廷敬自序謂于汪王不苟雷同然其詩文實各自成家分途競爽雖就其才力之所及蹊徑不無稍殊而要為和聲以鳴盛則固無異軌也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀午亭文編原序吾六七嵗從孰師受句讀見左氏尚書傳喜而竊誦之雖訶其不急弗顧也後每見古文輒喜誦之家故多書世父道莊府君有文為簾吏以御史視江南學政皎皎潔嚴踰太行而北也槖中蕭然不足具芻糧顧獨載書卷以歸詒吾兄庶常君庶常尤好古文先太宰公命余從之學乃盡發其新舊書得縱觀焉為詩歌古文辭年二十釋褐登朝優遊詞館與二三同學獨多為詩新城王阮亭方有髙名吾詩不與之合王竒吾詩益因以自負然卒亦不求與之合非苟求異其才質使然也其間亦復稍稍為古文以自娛長洲汪鈍翁見而大異之苕文故世父所知士吾感汪言遂肆力於古文若自有得焉後召見殿中余言貽上詔求文學之士余言苕文兩人皆官翰林益礲礪切靡為學以求進於道汪未久告歸吳中王今且為名臣而余隤然將老矣始吾於汪王顧頗自得不欲苟雷同豈惟才質乎將以力之所近者求至於吾道焉已耳古之為文者非以其辭期於明道也故或即道以為文或因文以見道其致一其勞逸殊也見今世有有道而能文如二子者與吾欣慕焉頃理舊藳因自敘其為學之大意如此澤州陳廷敬序
