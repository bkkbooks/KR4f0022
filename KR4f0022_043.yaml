body:
  text: 午亭文編卷四十三大學士陳廷敬撰阡表百鶴阡表我陳氏實舜後世稱侯邦賓於三代子孫散處列國為代著姓顧瞻蒲坂興言舊畿則吾陳氏尤近在封域者也陳氏世德仁厚播於山右誕我先公孤廷敬庸敢即先公之德業顯著於家邦者詮次而繫以辭先公諱昌期字大來晚而號魚山老人初為廩膳生垂聲黌序順治中詔郡縣用文試各舉髙第一人先公文冠一州名上吏禮部志在養母不樂仕為學以窮經為亟深於易禮經尤好程子易傳嘗言曲禮上下篇當倣學庸列四子書中自少壯而老吐辭制行務合經義以故見於家邦者可為世表儀焉先公生明萬厯中親見國家之所以興廢君子小人之所以消長人心風俗之所以隆替盛衰故修身教家敦行厲世本於學術不移於物情不奪於利勢不憂不懼特立獨行惟凖乎聖人之道而盡心焉流賊起西秦先公先事謀保聚築樓河山間樓將卒工而賊數萬果遽集樓下圍攻之數重先世父侍御公時為孝亷在樓中我先公謂侍御公賊勢衆矣即固守圍久不解樓中食盡人飢終不可保自請間道告於州幸州人救援我尚可圖存侍御公曰此危道奈何我先公曰苟得當活樓上下千人且不使賊驚吾母為益大矣若坐斃於此非計之得也慨然固請行中夜自樓顛縋而下縋絶先公墮地久不聞音聲賊火照山上下明如晝治攻具益急樓中人人目相懾無敢下樓救者㒒李忠奮前曰死生命也救主義也義在而死命之正也忠願下樓忠下樓縋先公而上未蘇也質明宛然無恙若神有相者一時樓中人咸異焉賊圍樓攻之三晝夜謂樓中渴且降先公汲樓井中水揚樓四邊賊驚相視謂不可以渴降也徐驅去長老曰吾聞活千人者其後必大陳氏其興乎當是時中外恬熙州郡久不被兵流賊漫衍而東騰華蹀河景霍之城汾澮之淵如履房闥如跨澗溪所過壞裂糜沸而野處巖居無牆堞垣墉之限屠毒尤慘先公創兹樓也里富人竊笑之曰我將謂陳氏為園囿觀逰之娛也無故築為樓過矣賊至則縛富人拷掠金帛挾樓下以讋衆及賊去而富人亦效為樓樓亦至今在焉蓋先公之盛德哲謀先事而備類若此廷敬每念縋樓事視平原之抗賊霽雲之乞師艱危有甚焉以一書生欲穿賊壘冒鋒刃跣行七十里以達於州此萬不可必得之勢故縋之絶我公之不往者天也非人之所能為也賊退有羽客過而言此樓活千人其名當與河山並永題曰河山為囿其意又若應前富人園囿為娛之説者長老至今呼河山樓云崇禎末流賊隳突走北京别遣賊劫掠澤潞我公奮然曰勿待彼來當先往以折其鋒馳驅一晝夜行達賊壘賊率坐帳中矛棘森立鈎鏑挺露我公從容曉譬天道人事順逆禍福之故謂民實無辜孽母自作左右趨前欲逼賊率曰此狂生縱之去且令與一箭為信戒其黨勿犯我里恃以安當明之季急黨朋亂正邪騁空言略實效而封疆之事不可問矣我公不出而任人家國事以危樓撑拒數萬之賊以立談摧挫羣凶之氣行其義於一鄉者如此此可以論世而知人矣大清蕩除醜類臣一四海叛帥薑瓖擾雲中煽惑晉以南郡縣澤州則賊渠張斗光據州治迫脅士夫獨卑詞招先公先公怒裂眥罵賊賊奴死在旦夕敢辱我耶拉其書寸寸斷賊慙恚己丑十月率賊數千人直抵吾家家故於樓南擴為堡賊圍攻如流賊廷敬是時年十二嵗矣猶記賊於薄暮射書堡中先公得書手裂之登陴慷慨謂衆曰受恩本朝為臣子誓不陷身於賊賊反覆倡亂此特待命漏刻耳吾已度外置妻子若汝曺不協力堅守一旦為賊所汚王師至無噍類矣衆皆聽命賊度不可攻則索金帛先公曰金帛以勞守者賊怒攻三日堡且陷賊忽開一角去已而盡去及後乃知賊聞天兵自北下也賴國家之恩以有今日使遲三日不至我盡室委命矣先公治家勤儉以其餘賙給鄉人戊辰捐穀焚券鄉人感德詣撫軍請旌奏先公知之遽追抑其事數日人益感奮罷市輟農疊上狀郡縣求請旌建祠郡上之方伯方伯上之撫軍皆交口嗟咨竟通牒禮部先公聞之大驚自草狀辭辭極懇苦乞速寢其事遣使七晝夜達京師廷敬上狀禮部部大人感歎久之曰成長者志檄撫軍曲體至情仰成謙德自行褒旌以答衆好其時都人士競為文若詩以鋪述咏歌而鄉人之懷思頌義刻石以載其詞者至三十餘所卒不能禁焉易簀之月盡出篋中資易米數斛以賙鄰里當捐資時諸子或無以為食而先公怡然不以屑意蓋積仁纍義樂善不倦出於至誠如此待諸子嚴教兄子庶常君如諸子世父侍御公宦遊久庶常君自六嵗就家孰至弱冠以經魁其鄉皆先公躬自訓督之也嘗曰學者攻應舉文字恆視讀書立品為二事吾所以教汝曺者以讀聖賢書當實存諸心而見之行事凡讀書令往復涵泳其中身體力行以變化氣質為先庶常君及諸子言動略有過差訶責終日尤戒多言謂多言多尤汝不聞乎所接人有言行之越於理雖近理而佞或喋喋者則不憚規其人退必舉示諸子以為戒侍御公既捐館舍庶常君始舉進士庶常君嘗曰公吾父也先公燕居無隋容怠色起居食息有常度中夜或踰時而寢雞鳴必興盥洗詣范太夫人榻下終身無間日太夫人見背廢問安之禮而興也常在昧爽前嚴冬不具火盛暑不解衣所居室圖書滿前凝塵蔽席四壁多張古人前言往行如曲禮所載生平無私語無嗜好未嘗以細故鞭撲僮奴食飲菲惡常衣敝衣食取充口物雖精好略嘗而止不恣食飲酒則無量不亂夜就枕輒酣寢當張賊圍攻時堡中人舉皇皇不能寐每伺攻稍間先公就睡如無事時人皆異焉侍御公假而歸一日雨與飲於山園路滑失足傷臂侍御公大驚同卧堂中侍御公方輾轉不安席先公鼾聲殷殷然侍御公曰吾不及汝父也蓋事無巨細應之則已無幾微凝滯於中臨事斷決無遲回卻顧自圖便私意與人言不隱情惜已無沮色忸辭上自達官貴人下至簞豆微賤無炎涼髙下常面折人人無不服無城府崖岸纎毫務已自私之意望之如泰山喬嶽即之如滄海澄江坦平寬大益覺和易如春風披人時雨潤物於人無宿怨藏怒是是非非準乎理道而務適其宜不為煦煦之行以要浮名卒之盛德感人化而為善人者歌頌而禱祝焉蓋先公性稟天成學術醇正純乎天理以義勝物得易之直方大不習無不利得禮之毋不敬儼若思安定辭居家尤力行家禮故由家而達於鄉國其彰彰在人耳目者此其大較也蓋其詩書仁義之澤源逺流長所鍾祥而挺生者有由然也陳氏自明宣德初七世祖諱林遷陽城中道莊樂其山巖水泉之勝居焉六世祖諱秀有詩名以人材為西鄉尉清操徑節著聞方是時士大夫修名行潔去就雖小官亦卓然自立西鄉公尤為上官重禮為尉數年皎然自持民戴之若慈母攝固城令居久之不得代一旦竟挂冠廳事壁去西鄉公子珏為滑尉贈户部主事户部公子天祐明嘉靖甲辰科進士歷官陜西副使亷正不阿以詩聞於時副使公於先公為曽伯祖曽祖諱修隱居耕稼以餘粟惠鄉人鄉人以公利人濟物羣稱之曰嵗星祖諱三樂慷慨有節概克修父業初贈光祿大夫刑部尚書纍贈光祿大夫吏部尚書文淵閣大學士考諱經濟諸生初贈文林郎浙江道御史纍贈光祿大夫吏部尚書文淵閣大學士祖妣妣皆纍贈一品太夫人先公以廷敬官翰林歷院部遇聖上登極恩敕封翰林院庶吉士徴仕郎以親政恩敕封檢討文林郎又以慈和皇太后祔廟恩誥封奉政大夫內𢎞文院侍讀學士以加上兩宮徽號恩誥封通議大夫日講官起居注詹事府詹事兼翰林院侍讀學士以滇南蕩平恩誥封翰林院掌院學士兼禮部侍郎通議大夫以東巡恩誥封資政大夫經筵講官都察院左都御史以文皇后祔廟恩誥封資政大夫吏部尚書以克襄公務恩晉封光祿大夫經筵講官刑部尚書嗚呼自是先公棄不孝孤矣後二十年廷敬以非才入閣辦事主上推恩誥贈先公光祿大夫吏部尚書文淵閣大學士先公之自號魚山老人也當西鄉公時有石魚飛出山巖大石中及兵燹後石魚不知所歸先公建一閣石魚所出處閣前圖刻飛魚形故自號魚山也吾母先太夫人初封孺人再封孺人晉封宜人淑人而先太夫人棄不孝孤矣又贈淑人晉贈夫人再贈夫人晉贈一品夫人先公贈閣銜先夫人贈一品太夫人前母李夫人贈並同廷敬追敘先公軼事蓋所為者事難而節著功倍而澤溥方之古獨行之傳無多讓焉後之君子擇而采之光於册書孤之志也先公以康熙三十一年壬申七月二十五日終於中道莊之里第享年八十有五近遠哀號奔赴明年癸酉十二月四日啓太夫人百鶴阡之兆而合葬焉太夫人之棄諸孤也先先公十五年實康熙十七年十月二十九日也享年五十有九其時廷敬方官於京師承乏翰林掌院事學士在講筵上聞而軫惻特遣內閣學士屯泰翰林院掌院學士喇沙里慰問諭以節哀自愛賜茶酒四器廷敬捧而跽酹以謝國家故事勳舊大臣遭喪者方蒙此典漢臣前此所未有也及廷敬蒲伏歸子舍部議廷敬母以詹事任封例不得與祭葬上曰廷敬侍從勤勞其母準以學士品級賜恤嗚呼微吾母之賢曷以及此逮先公之訃上軫惻勞問遣重臣賜茶酒諸典禮如太夫人焉太夫人姓張氏家世沁水名族皆以文學科目顯高祖鏜以文高為嵗貢生起家瑞金王府教授曽祖知本贈禮部員外郎祖之屏萬厯甲戌科進士纍官陜西商洛道左參政父諱洪翼字萬涵萬厯癸卯科舉人署教朝邑至廣平府威縣知縣母王孺人吏部尚書諱國光公孫女萬涵公年壯無子既得太夫人少而穎慧特異與王孺人皆竒愛之萬涵公在朝邑手授太夫人四子通鑑及列女傳諸書無不背誦通曉大義能文工書道如經生然王孺人既以宗胄顯懿克修禮範太夫人祗順母儀合於國史肅肅雍雍王孺人固欲擇良配久之聞我先公節操行義州里矜式士林推髙乃歸我先公歸而孝仁恭儉德專行淑冠於九族范太夫人賢之而安焉時先王父贈侍御公巳殁先王父有三子長昌言世稱道莊公崇禎甲戌科進士官至浙江道監察御史次我先公又次大虞公昌齊州學生侍御公配李安人善病大虞公夫婦又皆早夭獨太夫人侍范太夫人側吾家自上世已來雖業儒然本農家衣食僅自給而侍御公自為樂亭令有亷名性嚴峭不能與時俯仰有一介不取與之風囊無私積俸入之餘以公同爨嘗曰吾不以為家纍也流賊拷掠紳士至我先公賊渠謂此雖御史弟吾聞御史清官遽釋之則不以為家纍者世父與我先公蓋已辨之早矣當太夫人之主饋也家益清貧凡烹飪縫紉諸瑣事皆躬親之范太夫人老而長齋喜潔清非太夫人饋食則不甘太夫人多子女纍又苦力作每免身三日即趨事范太夫人諸米鹽器什嘗不繼太夫人每鬻簮珥以辦給間與先公往復論説者悉皆前古忠孝義烈之行當薑瓖之亂也賊攻莊堡先公既手裂賊書賊怒攻堡堡中人人震恐太夫人初育第三妹在蓐中奮然曰此非安卧時遂起具糗糧給酒炙佐先公拊循堡中人一堡得完諸感頌先公者無不感頌太夫人也太夫人於家政稍暇即出書籍慿几莊誦非丙夜不歸寢經生好學者亦無以加也廷敬尚未就外傅凡四子書毛詩皆太夫人口授以誦及官京師每先公有書至太夫人亦必附手書以教誡廷敬所以兢兢自守至今日者固皆主上非常之恩蓋亦兩大人之教使然也太夫人有子八人廷敬其長也廷繼廷藎廷愫廷扆廷統廷弼廷翰女五人凡昏宦及諸內外孫及詳志中者不備書書其大略焉廷敬為太夫人初卜吉於樊山百鶴來翔故名百鶴阡今謹輯兩大人軼事為百鶴阡表竊取歐陽子瀧阡之義云廷敬浮沉仕路以先人遺教更歷世故稍從事於性命道德之學兾無忝所生不虧名節主上聖明下鑒檏鄙以康熙四十二年令入閣辦事今六年矣蒙聖恩賜爵賜封顯崇先世庇賴後昆乃列其世系又載我先公先太夫人之懿行遺烈所以詒謀積慶俾余小子克承先緒者具刻於碑以昭眂於無窮康熙四十又七年月朔男賜進士出身光祿大夫吏部尚書文淵閣大學士廷敬表午亭文編卷四十三
