body:
  text: 午亭文編巻十九大學士陳廷敬撰今體詩賜船恭紀舟航利涉是殊榮特賜還勞記主名命以石家船賜臣此去真從天上坐多時偏詐御前行命在前行御舟春山春水年年好江草江花處處生不為勤民叨法從烟波空有叩舷情潞河詶吳西齋送别鞍馬頻年老薊城臨流擊楫憶平生文章自冩衰遲意烟水新闗故舊情君向海山分位業我從塵土濯簮纓觚稜小别勞相念栁外花邉昨日行舟發潞河簡同直諸公解纜冰銷及好春碧琉璃淨鏡光新别來官舍隨漁舍禮罷山神見水神塞北幾時今已老江南有夢竟成真連船擁楫相從處應是三生未了因冩懐與同舟兼寄京師逰好杜陵野老一生詩抗䟽匡衡早遇時得失渾如前日事塵埃敢道十年遲天涯船舫為書局官路鶯花付酒巵寄語京華驢背客水雲閒淡有人知題石家船版上禁中清漏語頻宣水驛郵籖興渺然令徳世稱倉氏族佳名天錫石家船諭旨石家船好桃花滿載金波月楊栁全浮玉座烟大地恩光隨處是五湖三泖櫂歌邉舟行晏坐即事畫舫烏檣宿靄晴罏烟近接御香清吉祥雲裏從容住安穏光中自在行水月似曾經夢寐山河今已見空明君恩載得舟船重五日才為百里程狼窩狼窩名匪佳條狼義有取還將天山弓射殺白額虎花朝寄阮亭花朝往事夢魂遥鎖院重簾話寂寥十五年來頻聚散今朝烟水是花朝辛未與阮亭同領貢舉語江南烟水之勝余有詩云記取花朝明日是幾畨風雨對牀時聞岸上梵聲明滅斜陽洲景㣲梵聲何處出林扉浮雲不限身南北慧日常銷世是非塵刼逺尋期鷲嶺江湖有夢到漁磯長河風利翻嫌駛處處茅菴可息機同行諸子皆江南人即事有贈輕寒薄靄汎遥津一出青門事事新官舫但容搜句客别船還載著書人河橋煙栁堪相贈江縣紅梅早放春君是南歸我去北不知誰主與誰賔憶午涯煙舫題南來小舟四絶句竹篙青幕漾輕嵐如葉隨風下釣潭秋水一塘䑳一隻當時曾擬到江南水嬉天慰白頭人南舫來時物候新不礙琉璃清淨眼揚州烟月冶城春南船應載五湖逰散盡行人萬頃愁得似多情白太傅歸來舊舫憶蘇州也是雲天是水天春花如霧栁如煙怪他日夜東流水送盡南來北去船舟行寄舍弟乞得篷牕盡日留今朝晴暖趁春逰一生閲世如窺牖臨老逢人解泛舟别後無書題塞雁行來有約寄沙鷗憑君了却公家事山水漁樵儘自由汶水汶水南來處迢迢作意行帆檣連帝里漕輓達神京善下還多讓居髙最有情合流同到海對此豁平生余觀天津北汶水潞河合流處心固已異之及東南行數日見汶水曲折流數百里而北一旦遇潞河水折而東若無意然者於余心益有感焉既為汶水詩又題長句以示壯履舟過東南十日程偏於汶水最含情為憐宛轉朝京去還見低徊赴海行能以功成如未有却將身退等無名人生解識清流意何處人心不太平早發滄州南三十里磚河驛懐湯西厓給諫與君同扈從先後是同舟春水生河驛閒花上戍樓三山連大海五壘抱皇州千古承平意因風寄擢謳交河河岸古寺茫茫兩岸即恒沙行客流光暮景斜天雨似曾施藥草春風空自逐楊花心逰三昧渾如夢身許雙峰却是家煩惱不辭為晏坐碧雲無礙水無涯入山東界寄阮亭千里江湖夢三春雨雪逰風帆出渤海星野入齊州九㸃烟仍在長河日自流相思若汶水不斷繞行舟徳州南界懐田綸霞馮大木夜過東陽界朝行衛水濆青春方浩浩白髪任紛紛山逺留殘照川長宿去雲閒心逐流水今日為思君夜行遇淺寄秋崖京師臨深方浩渺遇淺亦嶙峋月黒憑漁火天髙訴水神千檣雖共集四海若無鄰試問栖栖者何如京洛塵曉行東光縣界相報桃花恐易迷紅雲未動月輪西長年大是多情客伴我黄昏伴曉雞南皮二絶句漳水瀟瀟覇業休鄴中文采自風流甘𤓰朱李西園夜囘首南皮是舊逰繁華寂莫在斯須金谷池臺徧緑蕪最是墜樓人未老真珠終不負齊奴棘津城倚櫂臨前浦蒼茫弔古情遥思渭濵叟一望棘津城水帶春星動沙流岸月明祗應垂釣處漁父足平生武城南界懐六箴鄖陽荀少桂陽纔向燕齊問路岐還於楚客寄相思一官萬里湖南北兩地三年人别離芳草池塘江上夢緑波春浦巻中詩不因霄漢乘槎下爭見連天水去遲次臨清懐梅莊江海平生意逺逰誰與同滿槽東上水半幅北來風栁已多含緑梅應早放紅山花開又落不擬在船中河干逢蔣念祖使君撫今追往因有是贈御史牀邉栢工烏龍門人在舊摳趨山長水逺詩難好化美風移興不孤説尹野人終在口勸耕春鳥曉相呼郎君已自施行馬最有清名滿帝都過臨清計程阮亭相見不逺戲有此寄長風駕浪去悤悤過訪何當似剡中元禮自為倉卒客樂天豈是囁嚅翁極知浩蕩如前浦聊得安閒出至公蠶尾鵲花紛在眼不應獨賞與相同船牕見月岸馬動如羣沙明曙色分樹迎前浦月人卧半船雲雁影連朝盡漁歌徹夜聞篷牕開復掩春思恐紛紛土橋待閘行五閘矣五閘行來物候新日髙浪捲岸無塵似將池沼縈逥勢留得煙雲浩蕩春雞犬村邉勸農吏漁商波上太平民昨宵親見天顔喜畫舫丁東玉漏頻夜泊東昌城下臨清昨夜春水生河上春燈曉送行今夜泊舟鉅鹿郡黄昏煙火似臨清東昌城下已泊夜移船欲過閘未得城東北隅有望嶽樓一夜停橈處千秋望嶽情水流聊攝地雲鎻魯連城擊汰堤花動移檣閘火明東樓不可上迢逓且南征出陽榖界春秋齊宋江黄㑹于陽榖少昊遺墟歴大東吾衰那敢夢周公周以少昊之墟封伯禽絃歌魯國春風裏盟土齊侯夕照中終古奎婁天象在至今禾黍覇圖空斯文適遇興王㑹鳳鳥何時過故宫湖雲二首水上烟嵐迥不羣望中溶漾杳難分蜃樓日觀連天起知是湖雲是海雲金臺玉殿侣仙羣雲是三山萬𣲖分欲向此中訪黄鶴仙人騎鶴亦騎雲汶水道中題觀海集風流文采幾人同芳草萋萋汶水東千里山川髙枕外百年身世一舟中風帆欲定歸神燕烟擢無聲近野鴻我亦乘流觀海去把君詩巻問鴻濛滕縣岸上人家岸逺湖平雪浪堆煙禽飛處釣船迴凄凉華屋都經過只愛茅軒照水開水鳥初飛似整亂還低自信塗鴉一抹齊水鳥也思排雁字笑他野鶩厭家雞沛縣界珠梅閘過三十九閘矣退之汴泗交流句今日長吟笑口開解道洛川三十九不如春水一帆來雨泊泇河二首紅濕牕花逐幔浮翠低隴麥映波流蘭旌桂櫂終難似從此舟名喜雨舟好風好雨送遥津同是敲冰嚼雪人酹取清波當桂醑敢將牛酒瀆龍神社日晚泊寄韓韓山娟娟雲月㸃空斜忽漫春隂闇物華舊隠相依同社日孤帆陡覺在天涯難逢有味偷閒客易過無情伴老花囘首厭厭真一夢海漚滅處是吾家夢孟孫有序孟孫小字臺哥余殤孫也以庚辰除夜生生之夕余夢孟子之孫來故名之曰孟孫生而聰慧絶人余特愛之以癸未中秋日不病俄頃而亡自恨心清老未慵來無所止去何從斷魂往事孤舟客猶是當時夢裏逢夢人贈筆一字何曾轉法車膏肓泉石癖烟霞多君枉贈如椽筆幸不生來筆上花將渡河夢與朱字緑别汶流相送日清泠忽漫洪河望渺冥千里扈行猶輦路幾囘話别是離亭花飛旅鬢逢人白草長天涯似舊青不為隴頭嗚咽水也因南浦惜飄零渡河畫舸中流一擢過日邉雲際渡黄河靈槎已見仙源路驚浪還為徳水波禹鑿八年因地險帝平三患得天和吳檣越榜連江漢欲笑宣房瓠子歌河上遇桐城先生二首也紅亭子近如何歸路櫻桃應漸多不似黄柑三百顆封題逺寄洞庭波也紅先生亭名予為作記屢見集中連日春隂雨滿河河邉相遇日晴和却看雲散歸無事猶作烟巒水上多河上白鳥羣飛畧似北雁一水連天雲四圍成行水鳥弄晴暉眼明不見春歸雁昨日北河相背飛泊淮安城下廣陵以春橘見贈春華秋實總含情金橘和枝露染成珍重過淮為枳意相逢今夜泊淮城清江浦舟宿懐及門諸子渾似都亭未别時紅舷烏榜倍相思文章自是千秋責衰晚誰堪一字師北去雲山人夢寐南來烟水路參差囘看擊筑髙歌地柔翰新編數首詩二絶句寂莫韓侯五世情不逢亭長亦埋名橋邉書巻知何用只好相尋向榖城解道人生隙過塵仙家辟榖豈無因娥姁彊食縁何事祗似摩登破戒人平河橋南二首芒鞵蹋透利名闗一葉輕舟祗是閒獨立斜陽心萬里四天雲巻更無山千枝萬枝岸邉栁三家五家川上邨剪茅葢屋荻編壁縣吏來時輕打門三湖二首湖光杳無際河上櫂歌行春水連天盡斜陽接地平雲霞三百里烟火幾重城可惜風帆駛郵籖促去程三湖望不極夕艇進長河老屋偏臨水兒童解弄波星明依釣火月影散漁蓑閲盡烟濤意生涯足歗歌揚州二首緑楊城郭古揚州多是三生夢裏逰今日到來雙鬢老朱樓空捲玉簾鈎煙月揚州處處花風流贏得俗人誇憑君更數凄凉句終古垂楊有暮鴉泊舟揚州城下午睡起作二首竹西何處水悠悠鼓吹居然擁上逰不信揚州佳麗地道人岑寂卧孤舟破睡無如茗一甌松風魚眼已颼飀更分一掬中泠水洗盡江山萬古愁江天寺即金山吳楚地分南北界江山天擁畫圖中拍浮慧日中流住湧現身雲彼岸空多寳已乘雙象老巨靈還戴六鼇雄却看無實無虚義元相居然逝水東聖恩叠被復䝉賜金恭紀香羅蛺蝶錦麒麟飽食天厨盡上珍節儉皇朝多厚禄寒㣲家世不長貧一時更拜千金賜四海還同萬户春行向禹疆南北路蠲租處處樂堯民虎丘五絶句雲巖寺雲根㧞地玉琅玕鎻向松門浸碧瀾深掩青山遮緑水只因多著畫䦨干生公講堂一字何曾道著來拈花世界又花開誰知一片千人石日日生公坐講臺短簿祠短簿祠荒春草新東亭往蹟久成塵能令公喜令公怒憐爾當時好事人顔魯公刻石魯公書翰自通神潑墨雲山跡尚新清逺仙人曾不死應同塵世歴周秦石刻清逺道士詩有云我本長殷周遭罹歴秦漢千頃雲寺後東軒名義取東坡詩雲水麗千頃繡出春畦映水文菜花黄盡緑隂分無邉無礙虚明相萬頃波光萬頃雲雲間竹枝五首城外海江天一涯城中烟火萬人家溝渠盡長通潮水籬落都開向日花江城流水逐門開水上殘紅映碧苔試問栁塘深幾許兒童相報早潮來山禽杳杳白雲中一日能乘九萬風何事華亭不見鶴鶴坡元只在城東烟巒數仞立孱顔下瞰清溪碧玉環行盡九峯休悵望道人只住小横山江東人物渺荒丘寂莫孫郎覇業休落日青龍江上水故應千古向東流寳雲寺寄儼齋尚書兼懐瑁湖薛澱兩侍郎官橋鄰淨宇川路接遥天潮送春畦水鐘流逺樹烟清華江左映文字禁林傳萬事從游處無心問八禪泊舟松江城下寄廖樾阡林慮早潮相送晚潮迎帆落潮平暮靄生老去北山思舊隠夢囘南浦悵離情清泉曉映黄華谷芳草春深白苧城才子髙名喧小邑可堪經術用西京雲間弔董閬石目為傷春極情因感舊長數行垂老淚千古别離腸江館荀鳴鶴亭林顧野王才名終寂莫憑弔向斜陽次嘉興寄儼齋尚書二首逥合三江送碧流雲間東望水悠悠越山未到吳烟暝脩竹柔桑入秀州西去扁舟夕照時落帆亭下落帆遲五茸好景空囘首為報江南數首詩過嘉興懐朱竹垞一城屹立仞牆孤東並三江盡五湖渾似天津分水處故人喚作小長蘆舟次襍咏四首京口至餘杭河渠八百里本為通舟船分作溉田水栽桑如挿稻溪上自成田始信麻姑語曾疑是浪傳夜夜水上宿識得水上趣鴛鴦與鸕鷀原在無人處三月吳興守千秋數首詩苕溪與霅水淚比峴山碑懐彭羡門少宰二首相思極浦空流水終古寒潮帶夕陽一到江天吟秀句故人文采似文房寒潮句彷彿記憶是羡門詩集亡去無可檢視仿彿清詩慰寂寥吳山越水路迢迢試吟海月江潮句自古精靈應未消雙溪橋寄廖衡素虞箴二首前日三江口五朝復五暮今日雙溪橋是向松江路江路人已逺臨流獨浩歌思君若春水日夜向秋波西湖同京江先生宿瑪瑙寺碧峯削玉挿雲浮明鏡湖光淨不流雲水到來如昔夢波濤渉後見虚舟山人有約遲歸鶴野客忘機狎白鷗一片閒心天付與煩公時厪廟堂謀詔以臣廷敬昔未至湖上命出觀一日臣玉書臣揆叙並同即事恭紀海山恩澤到樵漁處處香花祝帝圖若問浙西名勝地韜光過後是西湖杜鵑花江南處處有之皆紅色至武林乃有進白杜鵑花者扈從諸公皆有作亦作一首杜鵑花發杜鵑枝絶域經年到玉墀自有風光隨鶴駕豈因霜雪老蛾眉月明影靜三更後香冷聲銷萬籟時解語無言還獨笑啼紅空負錦城詩玉泉寺碧玉環流浸碧虚玉泉只可伴山居他時重舉東坡語曾識南屏金鯽魚西湖八首不愁平展漣漪水最愛斜堆斷續山誰識天公才思好留將詩畫與人間江東北固與西湖好景天然兩畫圖霜竹已非劉氏宅湖山留得一林逋一水孤山未覺遥夢中竹閣雨瀟瀟樂天院裏無人到應恐清都誤早朝漫將往事説錢鏐陌上花飛似汴州我向西湖湖裏住不須更上望湖樓自識為農氣味長伴他鰕舍與漁莊六橋花栁無閒地猶有人家幾樹桑欲盡江山未却囘錢塘波浪雪成堆西泠橋外汀洲路為看江潮昨日來放鶴亭邉鶴未囘水禽相對不嫌猜門前來往孤山下三日鸕鷀日日來看盡江潮與海潮湖心小駐似金焦籃輿早趂扁舟道囘首閒情在斷橋歸舟太倉道中懐王顓菴司冦畫省從容吏散遲水天閒話寄相思孤舟來往婁東道鳴鳥踈鐘憶舊時吳門迴舟走筆襍題留别訪濓五首玉局筵前捩舵行長思苦語盡平生淋漓一夜征衫濕不是人間離别情兩度髙齋往却還忙時相對别時閒白雲囘首姑蘇道不覺歸帆過惠山把君詩巻重璵璠贈我新篇道氣存絶妙好辭髭亦白乃知文字是名根青天萬仞一身形飛去何因有翅翎今日黄粱雖已熟盧生枕上不曾醒腸斷孤舟春水聲雙魚逺寄百愁生無情頗記楞嚴語度世何嘗不有情句容道中寄彭蓼洲史胄司二首三茅誰繼古仙蹤占斷金陵地肺重歸去海山猶未是教人却憶小茅峯二子清詞獨起予瑯嬛祕籍近何如然青檢遍仙人録應在隨鑾第七車聖駕展禮明太祖孝陵恭紀皇情思往代曠典逮前王封樹生春色山川賁寵光雲霞扶御輦日月擁垂裳展禮如禋祀敷詞毎肅將臣工紛感動士卒亦徬徨一念同天大千齡應運昌歴觀前史徧孰與聖恩長紀載無雙筆謳歌自萬方恭陪逢喜起伏謁在班行擬進封人祝還賡天保章秣陵口號南渡風流跡未賒囘看嵩洛日西斜中原曾是煙塵壘江左還留故舊家𤣥武湖連桃葉水烏衣巷滿冶城花白門却似隋隄栁終古蕭條有暮鴉金陵留題逆旅主人壁兼詠懐古蹟十首終古行人夢未醒勞勞亭外短長亭白門栁色依然在一種離魂草更青蓆帽山人去渺茫奉金贈逺意何長相思他日來相訪王屋山前是小莊晉苑吳宫夢裏逰登臨無暇去悠悠不須盡攬江山勝二水三山也是愁烟塵金粉並成空六代興亡過眼中留與悲歌渾閒事祖堂山畔問南融華屋山丘事可傷謝公遺跡一霑裳㑹稽自有東山好却上城南石子岡一角殘山夕照昏秦淮往事黯銷魂留將三畆烏衣巷江左清言屬謝鯤伊蒲人自潔齋厨香飯多年啖野蔬何事誌公蓮舌底居然吐出鱠殘魚不老青山路不窮長江千古自流東紅塵白日紛紛去舉世何人似葛公江總宅邉淮水流閒花野草自春秋衰顔羞照青溪影憐爾還家尚黑頭悠悠西浦覯濃妝洛水明珠贈桂陽判斷三生縁已了憑他神女杜蘭香蔣山蔣山行處是碧玉削芙蓉一别清溪曲雲嵐隔幾重風林前浦笛烟寺逺江鐘似有神靈語他年訪舊蹤靈谷寺靈谷鍾山事豈同孝陵不復有遺弓天留布帽傳千佛人訝金棺識大雄已墮鼎髯終寂莫常乘牙象在虚空神光湧現華嚴界塔影江聲問誌公歸次金山寺作崔嵬千尺影巉巉除却浮槎渺莫攀獨立何曾縁兩岸並行終欲後三山天遥海蜃長漂泊日落江潮自往還波浪若能驚地軸孤根應不在人間歸自金陵次金山寺懐孝感先生二首澹粉輕烟往蹟遥蔣山殘靄暮江潮萬山氣象巗巗裏也為風流愛六朝俯仰天淵道甚明興亡難問石頭城水心山骨留題處想見先生萬古情郭景純墓香火情多故國縁來看靈爽在江天後湖亦借公名重多恐先生是水仙景純聞喜人墓在江中一云在𤣥武湖中金山懐史蕉飲却寄周桐埜二首空明浮玉挿青霄姑射仙人近可招却望蕪城詩思好大江鐘送海門潮蕉飲詩浮玉鐘聲剛到岸又隨潮送海門秋余毎愛而誦之青山猶是六朝非走馬金陵昨日歸萬古澄江淨如練有人解憶謝元暉始余訂交桐埜以金陵懐古詩焦山二首過眼榮華絶可憐漢家宫闕渺浮烟江東曾是孫郎地却有名山屬孝然焦公舊隠跡如新西向孤墳弔景純千里江山不寂莫遥憐二子是鄉人孝然亦晉人𤓰步道中渚邨維畫舫步屧入烟蘿水㹀風眠栁江魚雨戲荷笛聲浮翠落帆影拂雲過歸去淮南路青山隔岸多次維揚賦答徐蘋邨侍郎見和西湖詩八首蕪城相望倍相親鄭重瓊瑶袖裏珍二十四橋空在眼只應囘憶六橋春公望公才在廟廊琅函典領水雲鄉西湖風月東華路囘首登臨憶侍郎錦標奪得萬人中御覽詩陳造化功毎奏一篇天一笑并將圗繪入豳風槐庭往事十年時靈鵲聲中晝漏遲擕得蛟龍天上筆扁舟吟過水仙祠黄河逺上憶旗亭人散尊前幾度聴更奏聖湖新樂府一時傳唱與秦青别去情懐白首中磨丹漬墨有何功文章大手終須讓又見風流小許公羽林小駐碧灣間濫㸃蓬萊侍從班我是歐公堂上客相隨不復到平山何郎請郡為花來得似孤山院裏梅自笑江淹才欲盡筆花載得滿船囘䢴江舟中别訪濓此行此别欲凄凉忽灑臨岐淚數行夢裏不知闗塞逺歸時那惜道途長調飢辟榖思真訣多病安心試好方江上青山猶送客連檣况復似連牀虎丘不及弔汪鈍翁歸次廣陵聞蛟門墓在平山堂側亦不得一往志感二首宿草春風幾度青江東耆舊總飄零誰知此日孤舟淚并在山陽笛裏聴烟月揚州夢裏縁故人精爽自依然囘車何處平山路腹痛當時語浪傳楊子鎮在昔䢴溝外金沙積未平江臨楊子鎮山近廣陵城地自隋唐異情因今古生凄其陵谷意付與濁醪傾召伯埭出鎮東南節葢雄廣陵北埭晉時功已無雙檜甘棠在此地人知憶謝公謝安宅有手植雙檜唐時尚存發廣陵夜行明日次寳應懐王方若竹西歌吹罷灣口似殘春何處金釵澗相思玉局人五湖猶在夢三𤱔可同鄰浩蕩烟波裏沙鷗已自馴圮橋自偕黄石老不共赤松逰五世韓陵土千秋博浪流功名是伊吕人代異商周淼淼圮橋水斜陽去未休淮上懐孫籜菴學士二首斜日歸帆去未休淮隂城下水交流逢人欲問娑羅樹碑版常懐李海州籜菴書古詩十九首石刻藏扵家年少相逢意氣麤送歸曾賦射陽湖恰如莘老初登第甓社光中得大珠淮水桐栢深源濫不収出山爭似在山幽能兼百里馳千里故使清流瀹濁流水面暗浮春色逺湖心髙映月輪秋時行坎止闗人事自古防川貴善謀歸舟渡河却寄王昊廬尚書三首小謝青山太白磯大江西望入清暉當年欲買金陵宅今日孤舟逆浪歸鳳凰臺逈夕陽邉拄頰雞籠望渺然也是江東一囘到人生蹤跡總堪憐湖海逢人一笑還秣陵風景夢魂間相思為報三山老已見黄河北岸山歸次天津寄舍弟别後江南路歸來薊北門誰知潞河岸還見海潮痕船舫城邉市漁商水上村結茆何處好一一細堪論題夢緑草堂種樹六載艱難蜀道行秋來迢逓在秦城無端種得西墻樹日日斜陽送晩晴和人燒香曲不論年老與身忙萬刼浮生坐裏長何限娑婆閒世界能消幾許六銖香小山臺同虞良西齋對酒作小山文字飲臨眺盡秋城徑逐虚嵐上樽隨淨露迎人間從野性物外得歡情今夜清吟客誰聴别院聲西齋居臺南院次韻西厓題河上集八首行漏郵籖水驛遲滄江今是鳳凰池相看青翰如青鎖春到鸞坡下上時熏風欲和五絃琴雙鳥千秋㑹一尋誰作人間膠漆意雲門天上奏元音海山歸路渺無邉曾與仙人撫八絃近日水雲空處住不思依止向人天桃花時節想君詩惠我東籬采菊時囘首青谿南畔路陶家酒勝謝家碁謖謖長松夢裏風優曇花散此山中不因歸騎悤悤去問法求詩並向公逰靈隠西厓先在草堂未遇清詩相贈抵聞韶我亦因風度碧寥東野為雲從上下南過天目北中條不見黄門日易秋故人吳質近南樓元朗作我比鄰眼中吾子聲名在老我能堪第二流西湖左掖從逰地館閣年來物望多更把黔陽詩過日雲山萬叠勢嵯峨時誦君使黔集九月十五日循西山下行過亂石村峯嶺竒秀輿中讀使黔集及扇上詩有懐西厓二首石竒那得亂村好自知名紅葉通西寺青山繞北平未窮闗塞勝難盡古今情却羡黄門客能為萬里行紈扇如明月清光袖裏偕凉風字不滅白雪調難諧重以友朋念兼之山水懐行行纔昨日秋色滿槐街寒夜即事寄訪濓館文霜風催我出前軒惆悵西窓宿火温待漏院傳深夜㸃校書閣掩幾重門春歸江海傷離别歳晚闗山役夢魂遥想揚州人未去官梅詩興與誰論苦寒出門懐荀少多少無衣陌上人乘車那惜出門頻自驚客路今年冷誰見郊原十月春風急不知黄葉盡霜明欲稱白頭新天公作意催吾老相别相逢只愴神野宿答虞良殘夜城邉客斜陽幾度催暮雲依樹宿歸鳥逐人來春入新詩句寒銷濁酒杯北門應下鎻愁絶夢能迴夜行寄給孤僧祗林霜月挂踈松倒影寒階落葉重庭樹鳥栖人去早五更誰聴寺樓鐘北墅夜寄訪濓六分春色去匆匆惜别江鴻與塞鴻宿麥已遲三月雨桃花先落五更風夢魂顛倒青山外文字叢殘白髪中君過清泠江上水憑將一洗陌塵紅隂雲連日風輙散之有作薄隂㣲靄過髙城忽漫狂飇四野晴花蘂總開紅濕少栁條空颭緑烟輕雲師杜甫誅堪惜風伯昌黎訟未成獨使九重勞旰食堂餐深覺愧平生北墅歸偶書湖光裂帛隠嵯峨泉石西山望裏過一路栁風踈雨後半身花影夕陽多行來沙際留鴻跡歸到門前有雀羅老屋幽窓聊暫憩經春寒竹共婆娑郊館夜晤牧仲冢宰黄散功名畫省詩卅年心事故人知逥驚海内交逰少却訝天涯聚散遲芳草長洲春去後落花髙館夜深時藤隂舊是栖栖地風月今宵有夢思春思落盡桃花栁絮飛粘風蛺蝶上春衣金錢欲卜還抛却怕説行人且未歸猶子觀顒咸受相聚於京師惘然欲别率爾言懐汝伯衰顔意自傷浮沉二子各飛翔春歸晝省留紅葯人到踈籬待晩香拙宦已都成夢寐早年何用卜行藏牙籖白首誰能觸萬巻擕將代紫囊三月二十八日夜與牧仲有郊館唱詶詩一時和者甚衆五月三日夜獨宿疊前韻二首漫叟遺風冩興詩闗西清徳畏人知竹林啟事偏來早蘭褉流觴不較遲秀句我應慙少俊名場公自擅當時龍雲相逐還相見卅載能禁一昔思同詠清暉謝客詩暮天雲樹杜陵知二泉水繞波來逺西山有二泉著名新月山長影去遲麥熟鳩飛踈雨外栁眠人過晚凉時相逢為道頻相憶綴璧連珠繫我思贈蔣靜山尺五城南一畆㕓寂寥因見子雲賢杜陵韋曲宜春外芳草孤花夕照前臺逈黄金多士貴調髙緑綺幾人傳君王自賞相如賦不用吹嘘送上天荀少近喜為詩日以示子遂忘羇旅之感即事冩懐亦冀夫有進乎是而得詩人之意也眼前念念迹皆陳物候推移幾故新秀句自吟差有味好書多讀可忘貧墻頭青實全宜夏屋角紅花别似春簾閣縈香清晝永此時相對即離塵午亭文編巻十九
