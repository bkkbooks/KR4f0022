body:
  text: 午亭文編巻十四大學士陳廷敬撰今體詩丙寅元日曙色葱蘢右掖門上趨北極侍含元罏烟風轉銅龍仗燎火寒迴白獸樽欲報聖朝無闕事濫重經席是深恩多慙衰鬢青春早暎日宫花壓帽温敦復澹人二學士見和除夕元日詩叠前韻二首春色蓬門取次還總無過客也須闗休辭白墮頻傾醆頗却青錢忘買山爆竹誰家方競勝桃符昨夜蹔投閒椒花滿眼紛相映笑煞頑夫老更頑粗治文書久拒門年光幾度向朝元殘經獨抱時開巻嵗酒將闌己合樽悶遣葦桃驅路鬼戲從魚鼠問長恩春寒切憶鵷鸞侣身在凌霄氣象温上元夜扈從出永定門作對仗金牀下殿行玉街車馬溢春聲天迴烟景低帷殿野曠星河出幔城北斗龍杓隨鳯輦東風畫鼔雜鼉更歸來獨擁殘書坐一穗缸花夜笑生李唐長夏江寺圖於大内見之宋髙宗題云李唐畫可比唐李思訓花石綱殘艮岳空湖山金粉畫難工那知零落風烟外郤閉金函玉櫝中水邨圖二首并序水邨圖趙文敏筆也自署云大徳六年十一月望為錢徳鈞作元人題者五十一人皆秀逸可喜康熈二十五年歸於大内時在直廬得縱觀記以詩秋雨秋風澹墨間燕雲粉本映闗山百年智巧銷磨盡却在清江水石間菰蘆門外水連天我己移家約釣船從此烟波秋色逺憑誰先寫舊樊川張尚書賜金園圖鸞坡鳯閣晝沉沉畫裏龍眠著意尋田宅漫成歸老計江湖頻有託居心買山不比千秋觀置酒何須太傅金直使君恩滿巖壑流傳勝事紀園林春夜懐富雲麓侍郎勞勞亭下水淙淙送客沙頭倒玉缸萬里長風吹别䄂五更疎雨落寒忩羇魂炎海離愁濶過眼紅塵老淚雙城角欲殘清夢斷相思惟有片心降新居送素心歸里窗閣新開客過稀茅茨只似舊雙扉清明嵗閏花禁坼風雨春寒燕未歸青鬢流年思弟妹白雲長日戀庭闈因君為問田園事何處烟波無釣磯陳白陽畫果蔬二首正是江天櫻筍初谿邨風露擷園蔬春花開落多秋實老圃吾生愧不如肉食朱門客滿堂何人解識菜根香鱸魚大有江東思只是蓴絲味亦長晦日信芳齋遣興萋迷春色老塵沙晦日風光感物華粗有軒忩安客舎儘教籬徑似山家天涯裊裊逢歸燕世事紛紛送落花一種垂楊愁萬叠輕烟摇颺日西斜楊花六言二首物態森如枳棘客心弱似楊花忙過雕闌玉磶閒投茅舍山家垣短條垂弱縷水明葉蘸㣲波燕語巧催春去花飛知奈愁何賜衣二首有序閏四月二十八日直内庭上遣内侍問臣廷敬在否有頃賫賜御服紗衣臣同臣英臣士竒臣訥實被恩賚縠文金鈕御香宛然且諭曰是朕所嘗服者臣服之感而紀以詩天機雲錦帝垂裳解賜丹霄黼座旁不是裁縫収在笥玉篝新染蚤時香碧紗鍼縷海圖明垂領蕭蕭素髪驚天上著來人欲老不禁清淚卻霑纓齋中讀書即事二首繙餘殘史意厭厭清簟斜曛晝下簾笑憶相如逢狗監懶從詹尹拂龜占心如苦筍風還折愁比黄楊閏更添剰有草庭生意在筆花頻夜夢江淹花時事過甘頭白老境春殘奈酒濃近日情懐還漫浪㡬人語笑更從容歸田己媿陶彭澤矢口常憐阮嗣宗遺事吟殘杯一進五更睡美不聞鐘次韻繆虞良見懐之作載酒題襟少舊歡鬢絲藥裹在長安翻餘汗簡常多忘畫出河圖欲細觀時方學易薑蔗歸田羞負郭風騷投老笑登壇知非己迫桑榆晩袖裏殘文擬自彈送故人王徳新還太原三首明月闗門影漸髙朔風猶照舊綈袍離情逺似桑乾水難㫁并州快剪刀白雲汾水影離離又是秋風雁去時落盡别時官閣栁晉陽宫畔最相思曽將刀筆傲通侯掛檄歸來汗漫遊畫榼香螺桑落酒青州從此勝凉州王嗜酒選為尉不赴琉璃盛水蓄魚如鱦者三兩頭外視之倐小而大游泳下上而見魚之多至不可勝數于子龍秀才為詩戲和掉尾鯨波笑伏鱗眼光如海蝨如輪晴牕試檢蟲魚注亦是天涯磊落人丙寅除夕撰易圖成示虞良樾阡玉漏金壺夜色新藜牀蔬食不嫌貧自成蕭索門庭在無那歡娛節序頻蠟炬椒花迎嵗酒火銷香灺隔年人更闌㸃檢殘經罷勘得浮生處處春丁夘元日即事示兩兒華髪朝天蚤劇忙青春閉閣興還長年光得得如流水旅夢蘧蘧向夕陽驥子誦詩驚過客虎兒弄筆勝諸郎一枝應逐桑榆煖三徑何當在帝鄉初春與與可書巻生涯避要津雀羅門巷燕鶯頻也浮翠柏尊中酒己放紅梅硯北春五夜霜霏殘醉醒萬家烟景一時新朗吟夢草西堂句好在池塘未是貧上元夜簡内直諸公曲晏傳柑記徃年疎星澹月故依然張燈小巷春無那羅雀閒門意自便節過欲泥丹竈火夜來重爇賜罏烟九衢簫鼓三更夢又是君恩放假眠寄湖上翁呈敦復翁敦復兄也久向烟波擬釣筒移家有約竟成空平生解愛江南客晩嵗心知湖上翁香草舊蓑閒卧月蘆花小艇不驚風眼明細寫烏絲字寄與東華問軟紅晩春下直同健菴侍郎如寄人生欲奈何野桃村栁又蹉跎百年强半酒人散徃年春日嘗與苕文貽上諸公水樓看栁二十四畨花信過細玩流光真漸少總攖塵網也無多軟紅歸馬東華路好㸃青燈照醉歌閲農應制四月十日臨視諸臣作御乾清宫聖作勤三事天行啟四聰有年惟帝力無逸即田功桑柘扶鑾輅茅茨駐玉驄野花穿仗發山翠拂旗空壤繡分交錯川長引鬱葱嘉禾方剡剡瑞麥己芃芃鶯度濯枝雨栁眠吹絮風周原千畝緑漢粟萬箱紅下濟光明逺髙居造化工年華丹禁裏烟景幔城中粒食増堯匕熏絃倚舜桐九農應送喜歌舞海隅同禹鴻臚畵樊川歸樵圖巷栁園花又一巡二毛加白向青春平生但可供描畵面目於今是假真蔡澤輕肥原有相揚雄容貎不踰人束薪己辦腰鐮具寫入樊川小様新晩同儼齋侍郎下直長遣雙扉去後闗曉風驅馬夕陽還曹司愧㸃圖書地筋力虚陪供奉班正落殘花留意别欲棲幽鳥笑人頑城鐘未起燈初上了得公家事蚤閒排悶一步强彎一寸弓滿船齊看滿帆風呼牛應牛故爾爾得馬失馬何悤悤橡栗生涯愁杜甫蛙蛇家口老盧仝此身真作浮游計到底輸他造化工閏嵗七夕前二日咫尺神霄奈若何頻年相望不相過頭童烏鵲忙如許節厄黄楊閏較多秋到雙蛾驚嵗月天留老眼見星河九疑凝目峰皆似不比盈盈一水波蓼花臨砌妨檐短秋來嫋嫋長綠捎新雨霽紅透晩風凉野水蘆花外江村竹篠傍只應伴笭箵繫艇近斜陽七月九日召左都御史臣廷敬侍郎臣乾學學士臣英侍讀學士臣士竒編修臣訥賜食西苑秋雲亭遣中使就賜御書及内製法瑯塗金罏缾匙箸香合各一恭紀五首鴛行拂曙影裵􅏆風舞槐龍翠作堆北極金輿天上轉西清黄繖日邊來從容刻漏傳仙饌親切烟霄侍帝臺詔許甘泉承曲宴幾人榮遇得追陪御匳書巻日相隨勤政簾前奏對時文囿先知新稼穡堯階不剪舊茅茨渚花含笑移舟近水鳥銜恩度檻遲自有衢樽聫鎬飲微臣長誦蓼蕭詩鈿軸開函翠帕舒羲圖頡迹豈能如驪珠何止千金賜鳯藻曽經萬巻書日歴定須編翰簡流傳應許到樵漁桑榆記取茅檐下長捧恩華望屬車珍錫琳瑯列禁筵博山新製侑嘉籩含熏欲泛金莖露宿火猶分玉篆烟光爛卿雲逢舜日文鐫寳厯紀堯年銀罌翠管休相擬歸路天香滿繡韉龍尾追趨内掖門綴班烏署直㣲垣飫知中禁蘭庖味别賜西園玉膳恩坐對宫花偏露重歸來臺柏帶春温叨隨芝閣分藜火剩有氷心奉至尊九日晩晴臺泥飲九日悤悤節序頻髙臺摇落上逡巡生逢白髪相欺老家有黄花不厭貧愁遣眼前慿濁酒名争身後是癡人牧之詩句陶公興笑口常開漉葛巾鄉人王疎菴先生為太宰時構水鏡堂於署後之東南隅余在翰林以事曽一至焉今謬繼公後瓦礫茂草故處不可復問冬夜宿署中感而有作水鏡堂曽到遺蹤悵莫尋鳥栖荒署蚤葉落短垣深黯澹題名字蒼茫啟事心夜寒霜月白猶照古藤隂靈祐宫夜憶石閭抱膝支頤計未非黑甜贏得到斜暉飄蓬欲訪敲爻去度世終思跨鶴飛自為逃名甘隐吏己因觀妙解忘機石閭流水寒松夜一枕騰騰夢裏歸五十初度華髪童心老竟真自驚身埒老人羣新詩翻許推髙適健筆猶誇屬右軍梅栁眼看過至日犁耝手把向春雲青山舉白一浮汝自此相從已暮曛夜過六友齋與樾阡客舎一柴荆歸時夕照明寒花簾外影新雁月中聲老境親書卷幽懐託友生秋齋燈火近城柝易深更與芸夫沙塞鴻飛日風林葉落時百年猶旦暮徃事益凄其屠狗身宜貴雕蟲技未竒急將瀟灑意為緩鬢成絲晩晴臺咏懐示謙吉晚晴一上晚晴臺片片明霞映酒杯燕掠檐牙殘靄去栁低樓角夕陽來經過物理愁眉放勘破生涯笑口開田舎未成頭半白青山買得敢裵􅏆大行太皇太后輓辭六首次都御史徐乾學韻帝孝重華並慈徽太姒齊陵園新玉座匳匣舊金泥長樂疎鐘外瑶池落月西雞鳴思問寢龍尾接城隄警衛連宫仗行帷出苑牆鶴驚宵館露鳳咽曉樓霜翣栁飄哀輓陵花濺淚行盡聞天子孝親切侍中郎尚想戎衣著謳歌起鎬豐親逢開創日身享太平功文物三朝備榮哀萬國同還因思厚載率土泣攢宫倚廬心未己歠粥孝難名素靷鑾刀斷詔歩詣輦紖以陵園斷示不御青繩砥道平攀號天歩逺顦顇聖顔清臣庶皆人子誰無感激情神光留武帳雨淚變彤幃雲慘青山暮風纒紫極悲金蠶寒食後玉燕上陵時苑栁年年發長垂寢殿枝禮成衰絰盛制與諒闇同詔諭情何限封章意未窮劬勞知聖德忠愛結臣衷孝饗榮名貴清歌小閟宫王黄麋在吏垣有文名没三年矣夜宿省中追悼之禁掖難勝感舊情諫坡留得幾人名夢醒月落朱顔在宿草春來老淚傾孫怍庭少司馬來赴國恤憶徃時余與怍庭同環溪先生禮闈校勘連牀數晨夕今蔚州殁而余銘其墓不勝存亡之感知君定似阮光禄朝罷山陵却便還忍説凄涼十年事更誰追别到方山歴下羣公海嶽姿風流耆舊是人師相逢一事煩傳語無愧新阡有道碑合和羮二首并序合和羮襍菽麥野菜為之太史公所謂民之食大抵飯菽藿羮者是也然自秦及燕趙皆食之而南方聞者毎竊笑焉嘗與南溟湘北宿左闕下二公皆南人而獨喜食此且為歌詩以見贈余亦和而歌之所以志余之辱交於二公亦以物之幸而見知於世有如此也衢歌含哺敢忘情華省翻成麥飯名不笑唐風多儉陋茅茨曽啖小人羹鹽䜴休烹婁䕶鯖山蔬㸃就瓦盆盛交情淡久真如水肉食何人憶大羹大行太皇太后仙馭遐升詔行倚廬之禮百官有司更進遞諫詔㫖開喻益切宣聴之際恭紀以詩彩仗金輿隔暮雲倚廬涕涙濕斜曛已知孝饗同虞帝何止期禫似魏文苴杖三年千古事封章一日㡬回聞他時青簡留題處惟有芳名屬聖君除夕同南溟容齋即事二首一院梧桐影漸移西垣山色在簾帷欲尋巗壑抒心跡辦取樵漁寄鬢絲林鳥倦隨鴛鷺後野梅蚤避燕鶯時草廬門巷斜暉外禁省端居有夢思櫪馬林鴉節序頻同曹聨步集蕭晨銅龍日冷東朝㑹金爵星明左掖春欲盡漏鐘添一嵗不須杯月得三人疎燈寒燼凄其夜青瑣相看鬢似銀鹿尾塞草秋肥斑鹿鳴那知㫁尾是珍烹三驅解識君王意長憶慈寧進御情戊辰元日左闕下呈南溟容齋兩少宰過眼交遊閱世忙星趨漏散只隨行春遲荀令香三日正月三日立春花共江淹夢一牀剩有蓼芽驚節物更無綵勝惜年芳相依渾似舟船坐夕照蓬牕影漸長叠元日韻與兩少宰擾擾塵埃一夜忙新年追逐在班行﨑嶇阮藉東西路顛倒元龍上下牀臘退栁桃應自媚辛殘薑桂有餘芳蒼顔白髪吾曹甚愁入青春睡味長春宿左掖髙二鮑給事空所居室以居余二鮑工畫嘗為余作修褉圖末句及之掖垣栖鳥暮啾啾襆被居然接勝流賀革方牀纔六尺士龍瓦屋在東頭周廬宿火多時共燕寢清香盡日留不是南山來伴直畫圖輞水已同遊春日晩歸書懐一官遲重寸心清榆莢圜時栁絮輕衣上緇塵渾不染鏡中華髪蚤忘情鶯花怨客侵愁老蟣蝨欺人薄肉生暝色不歸歸亦倦揶揄路鬼正縱横睡起晩晴臺野眺懐南谿逰好一枕黄塵眯眼開闗河清夢片時回屢因春睡思長假祇為鄉心上小臺雙闕萬家還閴寂孤烟落日共裵􅏆故園只在青山外管領鶯花待我來昔使廣寧出東便門十三年矣仐春重過此門感成城門曉色時啼鴉征馬長嘶向磧沙雨雪闗山初出塞清明時節正思家鄉心萬里逢歸雁野館三春見落花少壯逺逰俱寂寞祇應衰老惜年華大風落花二首自入青春只醉眠花開花落捲簾前顛風作意吹將去不是花時不放顛風本無情一陣空花如有意向春風殘香徙倚斜陽外飛入儂家酒醆中口號與翁寳林少宰春城楊栁三眠後江館櫻桃九熟時贏得殘年歸計晩眼中花霧髩邊絲九日夜雨何處登髙㑹端居獨掩扉草蟲閒自語霜雁逺還飛殘夜開籬菊髙秋見箧衣南谿今日酒酩酊㡬人歸雨夜懐思母菴小幕牕風入閒堦檐溜懸苑鐘疎㸃外塞雁曉聲前潄石三秋雨流花第二泉為親從禄仕書信問歸田樊山慈泉第一泉也菴之泉為第二送荀少之官臨湘落葉滿征衣鞭絲掛夕暉壯逰非寂莫歸興卻翻飛白髪一莖蚤黄金萬事違宦途憐小弟慎莫愛輕肥畫鶡雀翻翔鶡雀在髙秋老隠天台用意幽但欲雕龍開别墅至今常笑郭營丘題蔡方麓修撰寫真二首青縑被暖火紅銷正是熏衣事蚤朝㡬日金鐙歸院晩天寒須整侍臣貂蓬山靈鵲鎮常啼鈴索聲寒曉月低一巻牙籖心十載東華牡鑰汝南雞橄㰖祝鯁何煩戒老饞解酲不畏酒頻添葉飄櫸栁枝邊弱身殢桃膠味後甜誰解撥魚堪作楫最愁調鼎要無鹽縱教苦口心還在寒綠森森色正嚴嵗暮閒居二首頻年萬事苦紛挐頗喜衡門賦索居子度何堪署紙尾河東空解誦亡書江梅有信衝寒蚤牕樹多情帶月疎茗椀藥嚢隨客意殘杯冷炙待何如平生寂歴少清歡又覺蕭條節序闌世上宦遊今己足天涯風物㡬回看杏花眼孔三春熱梅子心腸隔嵗酸迂叟當年思一笑閒居洛下不休官戊辰除夕與樾阡休將樂事等虚名魚躍鳶飛妙臭聲千仭跛羊行自喜一時駑馬路羞争氷霜不惜經殘夜泉石終堪託此生會得舞雩童冠意春風何處不春情已己元日與樾阡談白沙之學效其體作二首桃符土梗浪相侵舊雨何人肻見臨一日又過誰用力百年空老未求心鶯花有約春還到風月無邊樂重尋回首姚江成别派輸他嶺海自閒吟歸老羲文物候侵更看蓍扐布成臨布蓍得臨卦詩因聞道知真味學不求名見自心白日只今耽酒過黄粱何用曲肱尋紛紛得失遺編在留與閒人作笑吟春日出城看花戲作四絶句賣花己喚山桃開馬軍走探園花回風花爛熳喜相報明日不出狂枝摧出門十里旋治装賃車借馬半夜忙料得旁人破口笑觸忤物態神暗傷西鄰杏花亦不惡兩頭夾籬牆邊紅比似摩訶菴裏樹千株萬株同春風憶昔年少看花時城邊水樹梁園池故人雖在少音信閒門惟有春風吹春日經水樓感舊浮雲䦧世閉門中惟有閒游事不空過客竟誰如舊雨尋春相識是東風多情栁絮依然白無主桃花只自紅吟散酒樓人在否懶將詩句寄郵筒春遊韋曲城邊㶚水涯詩籖酒榼鎮常隨閒花滿樹春蕪長正是先生行樂時社日遊城南看花不飲自嘲與樾阡黄四娘家花朶紅多情白髪颺春風佯聾入世君知否社日何妨酒醆空竇在兹至懐韓韓山問汝西來事韓山是小山飛花隨釣艇叢桂掩柴闗棖觸經時别低徊落月顔相憐清洎曲㡬度共潺湲書查夏重蘆塘放鴨圖二首春水江潮掉浪輕扁舟烟雨有誰争白鷗萬里滄波興偶寄紅闌鬭鴨情君是金鳬殿裏人寒蘆鷗鳥却情親相隨欲作江南老魚藻池邊又過春社日不飲有詩漫與樾阡未㡬兩耳岑岑有聲經旬不散對酒戲作顛倒春來事沉㝠物外情一杯還酩酊兩耳任嘲轟鶯語都無次花飛别有聲回憐社日酒爛醉不辭傾春晩檐角殘紅斂牆隂暗緑斜月侵飛絮栁風弄折枝花春色閒將盡霜毛陡自加不愁難過遣飄忽是年華書局與健菴池上人看老鳯來多情鷗鳥合相猜休言洛下閒居事猶是西京御史臺孝懿皇后輓詞六首軒曜璇階映長秋網户緘玉衣人自覆石字燕來銜鍾乳調靈匕文螭進别函椒塗纔隔日園寢泣松杉長慟彌留際褕衣送寝門大文推陸九盛典邁貞元冊諡崇朝並榮哀奕葉尊勤民知内治脱珥是深恩白日凄蘭殿清秋冷桂宫星娥一夕返雲馭九霄空淚濺銀河水悲纒玉樹風詠歌傳六寝應紀二南中楚輓悲鷖輅虞歌咽鳯笳燎庭殘曉月叢殿落秋花北首青山近西風綵仗斜公桑零露葉猶望濯龍車每憶朝陵日宫車並往來花迎綃帳合栁拂幔城開輦路皆陳迹山園引舊哀夢迴閒故館涼雨濕莓苔景胄凌烟貴神儀偃月長安貞應地厚聖善翊天王異豈徴沙麓祥曽定洽陽宵衣思女則遺澤及遐方竹林寺觀一峰道人畫千古髙風憶閉闗地偏人静軟紅間坐深祗樹雲常定朝散清都鶴自還身度尾箕燕斗宿跡留方丈海神山前塵影事三生話珍重晴忩學駐顔木𤓰二首正是橙黄掩緑隂秋烟一樹照華林包殘橘柚揚州貢投比瓊琚衛叔心霜實豈應防化枳寒香終不逐來禽宣城洛下無芳訊長伴江梅入夜吟朝雲晻靄忽蕭辰纔過花開落實新盧橘寒分秦苑雨海棠色借蜀江春削泥藥籠兼防老漬粉香匳不勸人更與封題霜後顆清芬也合避緇塵午亭文編巻十四
