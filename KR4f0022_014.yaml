body:
  text: 午亭文編卷十四大學士陳廷敬撰今體詩丙寅元日曙色蔥蘢右掖門上趨北極侍含元罏煙風轉銅龍仗燎火寒回白獸樽欲報聖朝無闕事濫重經席是深恩多慙衰鬢青春早映日宫花壓帽溫敦復淡人二學士見和除夕元日詩疊前韻二首春色蓬門取次還總無過客也須關休辭白墮頻傾盞頗却青錢忘買山爆竹誰家方競勝桃符昨夜暫投間椒花滿眼紛相映笑煞頑夫老更頑粗治文書久拒門年光幾度向朝元殘經獨抱時開卷嵗酒將闌己合樽悶遣葦桃驅路鬼戲從魚鼠問長恩春寒切憶鵷鸞侣身在凌霄氣象溫上元夜扈從出永定門作對仗金牀下殿行玉街車馬溢春聲天回煙景低帷殿野曠星河出幔城北斗龍杓隨鳯輦東風畫鼓雜鼉更歸來獨擁殘書坐一穗缸花夜笑生李唐長夏江寺圖於大內見之宋髙宗題云李唐畫可比唐李思訓花石綱殘艮嶽空湖山金粉畫難工那知零落風煙外郤閉金函玉櫝中水村圖二首并序水村圖趙文敏筆也自署云大德六年十一月望為錢德鈞作元人題者五十一人皆秀逸可喜康熙二十五年歸於大內時在直廬得縱觀記以詩秋雨秋風淡墨間燕雲粉本映關山百年智巧銷磨盡却在清江水石間菰蘆門外水連天我己移家約釣船從此煙波秋色逺憑誰先寫舊樊川張尚書賜金園圖鸞坡鳯閣晝沉沉畫裏龍眠著意尋田宅漫成歸老計江湖頻有託居心買山不比千秋觀置酒何須太傅金直使君恩滿巖壑流傳勝事紀園林春夜懷富雲麓侍郎勞勞亭下水淙淙送客沙頭倒玉缸萬里長風吹别袖五更疏雨落寒忩羇魂炎海離愁濶過眼紅塵老淚雙城角欲殘清夢斷相思惟有片心降新居送素心歸里窗閣新開客過稀茅茨只似舊雙扉清明嵗閏花禁坼風雨春寒燕未歸青鬢流年思弟妹白雲長日戀庭闈因君為問田園事何處煙波無釣磯陳白陽畫果蔬二首正是江天櫻筍初溪村風露擷園蔬春花開落多秋實老圃吾生愧不如肉食朱門客滿堂何人解識菜根香鱸魚大有江東思只是蓴絲味亦長晦日信芳齋遣興萋迷春色老塵沙晦日風光感物華粗有軒忩安客舍儘教籬徑似山家天涯裊裊逢歸燕世事紛紛送落花一種垂楊愁萬疊輕煙搖揚日西斜楊花六言二首物態森如枳棘客心弱似楊花忙過雕闌玉磶間投茅舍山家垣短條垂弱縷水明葉蘸微波燕語巧催春去花飛知奈愁何賜衣二首有序閏四月二十八日直內庭上遣內侍問臣廷敬在否有頃賫賜御服紗衣臣同臣英臣士竒臣訥實被恩賚縠文金鈕御香宛然且諭曰是朕所嘗服者臣服之感而紀以詩天機雲錦帝垂裳解賜丹霄黼座旁不是裁縫收在笥玉篝新染蚤時香碧紗針縷海圖明垂領蕭蕭素髮驚天上著來人欲老不禁清淚卻霑纓齋中讀書即事二首翻餘殘史意厭厭清簟斜曛晝下簾笑憶相如逢狗監懶從詹尹拂龜占心如苦筍風還折愁比黃楊閏更添剩有草庭生意在筆花頻夜夢江淹花時事過甘頭白老境春殘奈酒濃近日情懷還漫浪幾人語笑更從容歸田己愧陶彭澤矢口常憐阮嗣宗遺事吟殘杯一進五更睡美不聞鐘次韻繆虞良見懷之作載酒題襟少舊歡鬢絲藥裹在長安翻餘汗簡常多忘畫出河圖欲細觀時方學易薑蔗歸田羞負郭風騷投老笑登壇知非己迫桑榆晚袖裏殘文擬自彈送故人王德新還太原三首明月關門影漸髙朔風猶照舊綈袍離情逺似桑乾水難斷并州快剪刀白雲汾水影離離又是秋風雁去時落盡别時官閣栁晉陽宫畔最相思曽將刀筆傲通侯挂檄歸來汗漫遊畫榼香螺桑落酒青州從此勝涼州王嗜酒選為尉不赴琉璃盛水蓄魚如鱦者三兩頭外視之倐小而大遊泳下上而見魚之多至不可勝數于子龍秀才為詩戲和掉尾鯨波笑伏鱗眼光如海蝨如輪晴窗試檢蟲魚注亦是天涯磊落人丙寅除夕撰易圖成示虞良樾阡玉漏金壺夜色新藜牀蔬食不嫌貧自成蕭索門庭在無那歡娛節序頻蠟炬椒花迎嵗酒火銷香灺隔年人更闌點檢殘經罷勘得浮生處處春丁卯元日即事示兩兒華髮朝天蚤劇忙青春閉閣興還長年光得得如流水旅夢蘧蘧向夕陽驥子誦詩驚過客虎兒弄筆勝諸郎一枝應逐桑榆暖三徑何當在帝鄉初春與與可書卷生涯避要津雀羅門巷燕鶯頻也浮翠柏尊中酒己放紅梅硯北春五夜霜霏殘醉醒萬家煙景一時新朗吟夢草西堂句好在池塘未是貧上元夜簡內直諸公曲晏傳柑記往年疏星淡月故依然張燈小巷春無那羅雀間門意自便節過欲泥丹竈火夜來重爇賜罏煙九衢簫鼓三更夢又是君恩放假眠寄湖上翁呈敦復翁敦復兄也久向煙波擬釣筒移家有約竟成空平生解愛江南客晚嵗心知湖上翁香草舊蓑間卧月蘆花小艇不驚風眼明細寫烏絲字寄與東華問軟紅晚春下直同健菴侍郎如寄人生欲奈何野桃村栁又蹉跎百年強半酒人散往年春日嘗與苕文貽上諸公水樓看栁二十四畨花信過細玩流光真漸少總攖塵網也無多軟紅歸馬東華路好點青燈照醉歌閲農應制四月十日臨視諸臣作御乾清宫聖作勤三事天行啓四聰有年惟帝力無逸即田功桑柘扶鑾輅茅茨駐玉驄野花穿仗發山翠拂旗空壤繡分交錯川長引鬱蔥嘉禾方剡剡瑞麥己芃芃鶯度濯枝雨栁眠吹絮風周原千畝緑漢粟萬箱紅下濟光明逺髙居造化工年華丹禁裏煙景幔城中粒食增堯匕熏絃倚舜桐九農應送喜歌舞海隅同禹鴻臚畫樊川歸樵圖巷栁園花又一巡二毛加白向青春平生但可供描畫面目於今是假真蔡澤輕肥原有相揚雄容貌不踰人束薪己辦腰鐮具寫入樊川小樣新晚同儼齋侍郎下直長遣雙扉去後關曉風驅馬夕陽還曹司愧點圖書地筋力虛陪供奉班正落殘花留意别欲棲幽鳥笑人頑城鐘未起燈初上了得公家事蚤間排悶一步強彎一寸弓滿船齊看滿帆風呼牛應牛故爾爾得馬失馬何匆匆橡栗生涯愁杜甫蛙蛇家口老盧同此身真作浮遊計到底輸他造化工閏嵗七夕前二日咫尺神霄奈若何頻年相望不相過頭童烏鵲忙如許節厄黃楊閏較多秋到雙蛾驚嵗月天留老眼見星河九疑凝目峰皆似不比盈盈一水波蓼花臨砌妨簷短秋來嫋嫋長緑捎新雨霽紅透晚風涼野水蘆花外江村竹篠傍只應伴笭箵繫艇近斜陽七月九日召左都御史臣廷敬侍郎臣乾學學士臣英侍讀學士臣士竒編修臣訥賜食西苑秋雲亭遣中使就賜御書及內製法琅塗金罏瓶匙箸香合各一恭紀五首鴛行拂曙影裴􅏆風舞槐龍翠作堆北極金輿天上轉西清黃繖日邊來從容刻漏傳仙饌親切煙霄侍帝臺詔許甘泉承曲宴幾人榮遇得追陪御奩書卷日相隨勤政簾前奏對時文囿先知新稼穡堯階不剪舊茅茨渚花含笑移舟近水鳥銜恩度檻遲自有衢樽聫鎬飲微臣長誦蓼蕭詩鈿軸開函翠帕舒羲圖頡迹豈能如驪珠何止千金賜鳯藻曽經萬卷書日歷定須編翰簡流傳應許到樵漁桑榆記取茅簷下長捧恩華望屬車珍錫琳琅列禁筵博山新製侑嘉籩含熏欲泛金莖露宿火猶分玉篆煙光爛卿雲逢舜日文鐫寶厯紀堯年銀罌翠管休相擬歸路天香滿繡韉龍尾追趨內掖門綴班烏署直微垣飫知中禁蘭庖味别賜西園玉膳恩坐對宫花偏露重歸來臺柏帶春溫叨隨芝閣分藜火剩有氷心奉至尊九日晚晴臺泥飲九日匆匆節序頻髙臺搖落上逡巡生逢白髮相欺老家有黃花不厭貧愁遣眼前慿濁酒名爭身後是癡人牧之詩句陶公興笑口常開漉葛巾鄉人王疏菴先生為太宰時構水鏡堂於署後之東南隅余在翰林以事曽一至焉今謬繼公後瓦礫茂草故處不可復問冬夜宿署中感而有作水鏡堂曽到遺蹤悵莫尋鳥栖荒署蚤葉落短垣深黯淡題名字蒼茫啓事心夜寒霜月白猶照古藤隂靈祐宫夜憶石閭抱膝支頤計未非黑甜贏得到斜暉飄蓬欲訪敲爻去度世終思跨鶴飛自為逃名甘隱吏己因觀妙解忘機石閭流水寒松夜一枕騰騰夢裏歸五十初度華髮童心老竟真自驚身埒老人羣新詩翻許推髙適健筆猶誇屬右軍梅栁眼看過至日犁耝手把向春雲青山舉白一浮汝自此相從已暮曛夜過六友齋與樾阡客舍一柴荆歸時夕照明寒花簾外影新雁月中聲老境親書卷幽懷託友生秋齋燈火近城柝易深更與藝夫沙塞鴻飛日風林葉落時百年猶旦暮往事益凄其屠狗身宜貴雕蟲技未竒急將瀟灑意為緩鬢成絲晚晴臺咏懷示謙吉晚晴一上晚晴臺片片明霞映酒杯燕掠簷牙殘靄去栁低樓角夕陽來經過物理愁眉放勘破生涯笑口開田舍未成頭半白青山買得敢裴􅏆大行太皇太后挽辭六首次都御史徐乾學韻帝孝重華並慈徽太姒齊陵園新玉座奩匣舊金泥長樂疏鐘外瑶池落月西雞鳴思問寢龍尾接城隄警衛連宫仗行帷出苑牆鶴驚宵館露鳳咽曉樓霜翣栁飄哀挽陵花濺淚行盡聞天子孝親切侍中郎尚想戎衣著謳歌起鎬豐親逢開創日身享太平功文物三朝備榮哀萬國同還因思厚載率土泣攢宫倚廬心未己啜粥孝難名素靷鑾刀斷詔步詣輦紖以陵園斷示不御青繩砥道平攀號天步逺憔悴聖顔清臣庶皆人子誰無感激情神光留武帳雨淚變彤幃雲慘青山暮風纒紫極悲金蠶寒食後玉燕上陵時苑栁年年發長垂寢殿枝禮成衰絰盛制與諒暗同詔諭情何限封章意未窮劬勞知聖德忠愛結臣衷孝饗榮名貴清歌小閟宫王黃麋在吏垣有文名沒三年矣夜宿省中追悼之禁掖難勝感舊情諫坡留得幾人名夢醒月落朱顔在宿草春來老淚傾孫怍庭少司馬來赴國恤憶往時余與怍庭同環溪先生禮闈校勘連牀數晨夕今蔚州殁而余銘其墓不勝存亡之感知君定似阮光祿朝罷山陵却便還忍説凄涼十年事更誰追别到方山歷下羣公海嶽姿風流耆舊是人師相逢一事煩傳語無愧新阡有道碑合和羮二首并序合和羮雜菽麥野菜為之太史公所謂民之食大抵飯菽藿羮者是也然自秦及燕趙皆食之而南方聞者每竊笑焉嘗與南溟湘北宿左闕下二公皆南人而獨喜食此且為歌詩以見贈余亦和而歌之所以志余之辱交於二公亦以物之幸而見知於世有如此也衢歌含哺敢忘情華省翻成麥飯名不笑唐風多儉陋茅茨曽啖小人羹鹽䜴休烹婁護鯖山蔬點就瓦盆盛交情淡久真如水肉食何人憶大羹大行太皇太后仙馭遐升詔行倚廬之禮百官有司更進遞諫詔旨開喻益切宣聽之際恭紀以詩彩仗金輿隔暮雲倚廬涕淚濕斜曛已知孝饗同虞帝何止期禫似魏文苴杖三年千古事封章一日幾回聞他時青簡留題處惟有芳名屬聖君除夕同南溟容齋即事二首一院梧桐影漸移西垣山色在簾帷欲尋巗壑抒心迹辦取樵漁寄鬢絲林鳥倦隨鴛鷺後野梅蚤避燕鶯時草廬門巷斜暉外禁省端居有夢思櫪馬林鴉節序頻同曹聨步集蕭晨銅龍日冷東朝會金爵星明左掖春欲盡漏鐘添一嵗不須杯月得三人疏燈寒燼凄其夜青瑣相看鬢似銀鹿尾塞草秋肥斑鹿鳴那知斷尾是珍烹三驅解識君王意長憶慈寧進御情戊辰元日左闕下呈南溟容齋兩少宰過眼交遊閲世忙星趨漏散只隨行春遲荀令香三日正月三日立春花共江淹夢一牀剩有蓼芽驚節物更無綵勝惜年芳相依渾似舟船坐夕照蓬窗影漸長疊元日韻與兩少宰擾擾塵埃一夜忙新年追逐在班行﨑嶇阮藉東西路顛倒元龍上下牀臘退栁桃應自媚辛殘薑桂有餘芳蒼顔白髮吾曹甚愁入青春睡味長春宿左掖髙二鮑給事空所居室以居余二鮑工畫嘗為余作修褉圖末句及之掖垣栖鳥暮啾啾襆被居然接勝流賀革方牀才六尺士龍瓦屋在東頭周廬宿火多時共燕寢清香盡日留不是南山來伴直畫圖輞水已同遊春日晚歸書懷一官遲重寸心清榆莢圜時栁絮輕衣上緇塵渾不染鏡中華髮蚤忘情鶯花怨客侵愁老蟣蝨欺人薄肉生暝色不歸歸亦倦揶揄路鬼正縱橫睡起晚晴臺野眺懷南溪逰好一枕黃塵眯眼開關河清夢片時回屢因春睡思長假祇為鄉心上小臺雙闕萬家還閴寂孤煙落日共裴􅏆故園只在青山外管領鶯花待我來昔使廣寧出東便門十三年矣仐春重過此門感成城門曉色時啼鴉征馬長嘶向磧沙雨雪關山初出塞清明時節正思家鄉心萬里逢歸雁野館三春見落花少壯逺逰俱寂寞祇應衰老惜年華大風落花二首自入青春只醉眠花開花落捲簾前顛風作意吹將去不是花時不放顛風本無情一陳空花如有意向春風殘香徙倚斜陽外飛入儂家酒盞中口號與翁寶林少宰春城楊栁三眠後江館櫻桃九熟時贏得殘年歸計晚眼中花霧鬢邊絲九日夜雨何處登髙會端居獨掩扉草蟲間自語霜雁逺還飛殘夜開籬菊髙秋見篋衣南溪今日酒酩酊幾人歸雨夜懷思母菴小幕窗風入間階簷溜懸苑鐘疏點外塞雁曉聲前潄石三秋雨流花第二泉為親從祿仕書信問歸田樊山慈泉第一泉也菴之泉為第二送荀少之官臨湘落葉滿征衣鞭絲挂夕暉壯逰非寂莫歸興卻翻飛白髮一莖蚤黃金萬事違宦途憐小弟慎莫愛輕肥畫鶡雀翻翔鶡雀在髙秋老隱天台用意幽但欲雕龍開别墅至今常笑郭營丘題蔡方麓修撰寫真二首青縑被暖火紅銷正是熏衣事蚤朝幾日金鐙歸院晚天寒須整侍臣貂蓬山靈鵲鎮常啼鈴索聲寒曉月低一卷牙籖心十載東華牡鑰汝南雞橄欖祝鯁何煩戒老饞解酲不畏酒頻添葉飄櫸栁枝邊弱身殢桃膠味後甜誰解撥魚堪作楫最愁調鼎要無鹽縱教苦口心還在寒緑森森色正嚴嵗暮間居二首頻年萬事苦紛拿頗喜衡門賦索居子度何堪署紙尾河東空解誦亡書江梅有信衝寒蚤窗樹多情帶月疏茗碗藥囊隨客意殘杯冷炙待何如平生寂歷少清歡又覺蕭條節序闌世上宦遊今己足天涯風物幾回看杏花眼孔三春熱梅子心腸隔嵗酸迂叟當年思一笑間居洛下不休官戊辰除夕與樾阡休將樂事等虛名魚躍鳶飛妙臭聲千仭跛羊行自喜一時駑馬路羞爭氷霜不惜經殘夜泉石終堪託此生會得舞雩童冠意春風何處不春情已己元日與樾阡談白沙之學效其體作二首桃符土梗浪相侵舊雨何人肻見臨一日又過誰用力百年空老未求心鶯花有約春還到風月無邊樂重尋回首姚江成别派輸他嶺海自間吟歸老羲文物候侵更看蓍扐布成臨布蓍得臨卦詩因聞道知真味學不求名見自心白日只今耽酒過黃粱何用曲肱尋紛紛得失遺編在留與間人作笑吟春日出城看花戲作四絶句賣花己喚山桃開馬軍走探園花回風花爛熳喜相報明日不出狂枝摧出門十里旋治裝賃車借馬半夜忙料得旁人破口笑觸忤物態神暗傷西鄰杏花亦不惡兩頭夾籬牆邊紅比似摩訶菴裏樹千株萬株同春風憶昔年少看花時城邊水樹梁園池故人雖在少音信間門惟有春風吹春日經水樓感舊浮雲鬩世閉門中惟有間遊事不空過客竟誰如舊雨尋春相識是東風多情栁絮依然白無主桃花只自紅吟散酒樓人在否懶將詩句寄郵筒春遊韋曲城邊灞水涯詩籖酒榼鎮常隨間花滿樹春蕪長正是先生行樂時社日遊城南看花不飲自嘲與樾阡黃四娘家花朵紅多情白髮揚春風佯聾入世君知否社日何妨酒盞空竇在兹至懷韓韓山問汝西來事韓山是小山飛花隨釣艇叢桂掩柴關棖觸經時别低徊落月顔相憐清洎曲幾度共潺湲書查夏重蘆塘放鴨圖二首春水江潮掉浪輕扁舟煙雨有誰爭白鷗萬里滄波興偶寄紅闌鬭鴨情君是金鳬殿裏人寒蘆鷗鳥却情親相隨欲作江南老魚藻池邊又過春社日不飲有詩漫與樾阡未幾兩耳岑岑有聲經旬不散對酒戲作顛倒春來事沉冥物外情一杯還酩酊兩耳任嘲轟鶯語都無次花飛别有聲回憐社日酒爛醉不辭傾春晚簷角殘紅斂牆隂暗緑斜月侵飛絮栁風弄折枝花春色間將盡霜毛陡自加不愁難過遣飄忽是年華書局與健菴池上人看老鳯來多情鷗鳥合相猜休言洛下間居事猶是西京御史臺孝懿皇后挽詞六首軒曜璇階映長秋網户緘玉衣人自覆石字燕來銜鍾乳調靈匕文螭進别函椒塗才隔日園寢泣松杉長慟彌留際褕衣送寢門大文推陸九盛典邁貞元册諡崇朝並榮哀奕葉尊勤民知內治脫珥是深恩白日凄蘭殿清秋冷桂宫星娥一夕返雲馭九霄空淚濺銀河水悲纒玉樹風詠歌傳六寢應紀二南中楚挽悲鷖輅虞歌咽鳯笳燎庭殘曉月叢殿落秋花北首青山近西風綵仗斜公桑零露葉猶望濯龍車每憶朝陵日宫車並往來花迎綃帳合栁拂幔城開輦路皆陳迹山園引舊哀夢回間故館涼雨濕莓苔景胄凌煙貴神儀偃月長安貞應地厚聖善翊天王異豈徴沙麓祥曽定洽陽宵衣思女則遺澤及遐方竹林寺觀一峰道人畫千古髙風憶閉關地偏人靜軟紅間坐深祗樹雲常定朝散清都鶴自還身度尾箕燕斗宿迹留方丈海神山前塵影事三生話珍重晴忩學駐顔木瓜二首正是橙黃掩緑隂秋煙一樹照華林包殘橘柚揚州貢投比瓊琚衛叔心霜實豈應防化枳寒香終不逐來禽宣城洛下無芳訊長伴江梅入夜吟朝雲暗靄忽蕭辰才過花開落實新盧橘寒分秦苑雨海棠色借蜀江春削泥藥籠兼防老漬粉香奩不勸人更與封題霜後顆清芬也合避緇塵午亭文編卷十四
