body:
  text: 午亭文編巻八大學士陳廷敬撰今體詩草堂東風忩樹外吟望倚斜陽萬里驚春色三年卧草堂蚤花能破蘂新栁忽成行往日青門道紅芳壓驌驦濂村以濂泉得名泉在兎垸當午亭之北舊業東山麓濂泉在北原引渠通野圃分翠入烟村一勺支流水諸峯耳葉孫道州千古意勝絶敢重論月巖亦曰說巖閒居成詠巖居非石隠山舘有餘清輞水漁樵興斜川故舊情宿雲開峭壁新月上孤城遥識青門栁春風緑處生春日松嶺寺孤峯春院迥晩景野鐘初山勢兼雲動松隂帶月虚禽因僧梵引泉為圃花疏香閣登臨處閒情世不如析城山河東形勝古王畿蒲坂南來疊嶂竒禹貢山川連底柱唐風宫室盡茅茨隂埋半嶺雲車過翠入中峯雨脚移極目下方千萬壑樵村歸路客先知太行四首天井闗門跨碧空太行開闢想神功遥連絶塞羊腸盡下視中原虎踞雄嵩嶽諸峯元拱北河源萬里逺隨東驛樓斜日慿軒意回首蕭蕭落木風家山歸處路分明北上車輪夢裏聲每憶梁公如葢語髙歌孟徳苦寒行横遮四塞如長塹俯抱三川似列城午壁亭前方畝地祇應耕鑿足吾生比似人間路較强崔巍歴盡亦康荘嵇生未解青泥飲孫綽空登赤石梁少華西看峯影小大形東望海雲長遺民敢笑唐風陋山水連天接混茫絶嶂登臨興未孤白雲迴合盡平蕪界分韓魏初盟土表裏山川舊帝都曽度千峯趨大漠懶從五嶽問真圖更看天上黄河水長作巖前雪練鋪過海㑹院二首川長塔迥費躋攀路轉溪雲杳靄間石鏡泉鳴寒夜月翠屏鳥拂曉春山上方色界諸天静雙樹香林萬象閒除却山僧與樵叟松門無客不須闗浮圖金碧照山隈略彴横斜隔浦廽鐘動幽林風葉落鳥銜空翠雨花來引泉不礙孤生竹埽石長防未破苔曲徑禪房容易好髙亭還對野塘開韓大韓山送柿酒二首白芡烏菱得比倫黄柑差擬洞庭春不辭風味清如水一片寒光解醉人旋埽風軒洗破樽朱顔零落酒人存瓦盆舊是田家物柴汝官哥莫漫論春雪懐李容齋檢討二月曉花紅霏微春雪中有香争入樹無力怯從風詞伯今誰敵清樽聊可同十年梁苑客賦罷各西東東山上懐古之作太行南欲盡萬里勢猶雄地迥標河朔川長起岱嵩六卿空晉土二典自唐風逺遡龍門業誰當繼史公月巖二首萬古東巖月柴門獨照時溪花連竹塢林卧觀黄羲家在山巖中清暉帶林樾門前碧玉流金波漾新月晏起日照中林曉夢餘離離花影映忩虚平明心事三春後一覺閒眠巧破除樓夜樓上風簾燭淚深曉凉庭院似秋隂夜殘無寐單衾冷一枕荒雞半世心登月院山觀普照寺樹杪水濺濺羣峯矗碧天松門留曉月板屋過流泉谷口山城逺忩中鳥道懸前林少人跡寒磬下溪烟與山鐵鎻鈎梯細磴分半空時有鳳簫聞雙峯夹送三清月萬壑全收太岳雲挿漢桂榆垂欲下摩霄龍鶴動成羣人間何限卑栖意待剪香茅嶺上耘青蓮寺禪人方丈二首眀月髙髙在上方禪心不住水流長埽花風定苔依徑穿樹鐘來葉滿廊白社南朝常侍宅紅樓北寺賛公房桫欏别院清凉境惟見威儀古道塲寺名不愧是青蓮始信人間别有天花比金輪寒暎月藕多玊井大如船吟身漸老知詩妄愁鬢新稀識酒權欲向支公聊問法可憐神駿意翩翩午亭詩二十首午園結廬午壁側著書午園間上有沁水流下有砥柱山濓泉泉水清且漣古村濂泉下不見昔時人浩歌寄來者流花峪曉風吹殘紅夜雨洗微緑不愁風雨多流花滿溪谷飛魚閣有石魚出山間石魚出山時山雲宿舊處髙閣風雨多魚飛自來去梯橋桃花橋上枝殘紅帶茅屋夫君行不歸緑隂桃子熟浴鶴池荷花生川池葉小荷未起海鶴欲下時夕陽照春水梅子岡逺林聞微香青春入叢薄散歩梅子岡幽花自開落太丘峯斷雲出横嶺明月生髙峯無人與晨夕時倚巖際松嶺泉亭方池鑿山翠石罅清泉滴客心映空寒眀月鑒寂歴雙谿雙谿來交横谿源淼難即惟見石上流清泉不改色老姥掌夜静山月髙照我山樓上微聞松蘿風遥逓石泉響詠歸亭野水流溪逺春泉入檻深殘生不寂寞童冠有知音七柿灘秋水落汀渚古木餘磊砢山家黄葉村晩紅拾霜顆端畦漠漠谿田水萋萋野墅花何人解來徃相識是山家西田行逐前溪雲疎雨挂晴蝀日斜桑柘隂犂鋤手自弄兎垸兹山數峯落一峯出一泉尋泉杖輕䇿遥見墟中烟西垞朝為西垞逰暮為東垞宿谿行人不知野橋夾脩竹西山院落日清磬響數峯相對閒復此值秋色坐見烟禽還小西山院後山惟白雲幽人對極目前山行雨歸還就山雲宿樊口樊山南下處十里到樊口春風夫如何惟見花與栁沁水道中谷口千巖合闗門驛路分秋風迎馬首晴日亂鷗羣峽轉黄厓水山開古鎮雲孤城何處是碪杵急斜曛宿榼山寺天外樓祗林廻望沁流明數里深山到漸平翠柏不隨雙鬢老白雲常共一身輕髙峯月上僧初定亂水風多鳥自驚新桂舊松青未了半生難問况三生南谿逰詩六首涉溪縁窈窕不識有山家忽到松門外春風埽落花泉聲來逺山空林間人語響多聞不殊春風復春雨春隂柔桑枝映此谿沙緑烟中聞耒聲暮就田家宿十日宿山房春光變啼鳥山月上復斜半簾落花曉道人行藥時東垞復西崦日斜返深林落葉山扉掩晚雲寒不飛凍雨宿峯首惟有逺鐘聲相随出谿口臺樹二首去倚臺樹送來倚臺樹迎來時臺樹在去日不同情臺上古時樹下䕃今城曲秋風樹葉黄春風樹葉緑碧落寺重逰二首碧落天邉寺青山有夢尋􅏙迷初地逺人覺化城深猿鶴三秋意鐘魚一昔心到來想陳迹黄葉滿前林十里荒寒路栖栖續舊逰泉鳴松澗冷雲卧石堂秋粉堞山城古香燈佛火幽畵龍猶掉尾飛去殿西頭樊溪二絶句岡嶺廽遮曲曲村髙齋日日坐黄昏庭蕪緑徧無人到惟有花飛時欵門緑深苔巷雨初微漠漠隂凉布穀飛但使時清官長好早驅黄犢暮來歸古臺曲三首古臺雲日午溪口水烟昏恰到茅堂裏春風自閉門幽人住何許朝眠紫霞室夢覺聞松風起行理瑶瑟有客希到門蹋破碧苔色春風瑶草花聞香不曽識柴扉柴扉開向曉秋氣覺初凉夜雨侵苔徑西風落草堂村烟山市蚤社日野農忙獨有幽居者琴書在一牀倦客倦客夜無睡秋忩應欲明人行殘月影犬吠隔林聲物理何多故吾生太有情風軒衾席冷輾轉百憂生逰可寒山乾明寺窈窕溪山路孤峯迥自尊秋花隠危石斜日到閒門鳥影烟中寂泉聲雨後喧法雲堪倚徙不擬向前村月巖二首月明南園樹緑隂紛如積溪村人未歸山忩夜蕭瑟幽人耽林卧軒忩靣髙樹秋風羅帷開明月照深處再逰乾明寺二首峯腰雨歇野雲留晴樹斜陽在上頭野蘚全凝臺殿色土花半老繚牆秋丹青照夜餘神鬼河漢凌空近斗牛除却牧䦨樵隖客何人解作看山逰千峯排浪湧遥空一抹雙林磴道通山暝僧歸紅雨外樹深鳥度碧烟中澗泉色冷元無暑松閣聲多豈為風擬學香山老居士徃來蹤跡似秋鴻桂叢草堂書壁蕭颯天風吹羽翰疏雲凉雨别長安夢回藜閣金鐙暗路逺蓬山晝漏寒苑裏紫薇霜樹落山中青桂晩花殘自憐亦似相如渇漢闕秋來賜露盤曉雪懐富雲麓杜遇徐兩編修遥夜闗山夢霜風各一天新寒髙枕外白雪曉忩前書巻開宵帙罏熏繞夕烟折梅如可贈鴻雁久凄然冬曉懐青岳宗玊北忩上寒日落木正紛紛殘夜碪猶急清晨雁屢聞厨烟開屋雪樓霽對山雲天氣宜晴曉悠悠念樂羣臘月十九日立春朔氣曉沉沉東風變夕隂月臨寒夜早春入舊年深殘臘晴光轉韶華瑞雪侵忽聞歌管發一半落梅音宿定興寄盧明府已下七首追録壬寅假歸舊作迢逓停驂逺帝京郵亭今宿第三程荆闗紅葉随征騎易水清流遶縣城隔院碪聲秋卓午古牆槐影月平明蕭蕭曉發投何處悵望龍山一日行夜宿欒城平沙開小邑數騎宿長亭映月收書帙聽更下枕屏秋城譙鼓暗古驛壁燈青望逺雲山外西風度井陘栢鄊道中楊栁荒亭道勞勞一放歌望山鄉路少歸馬夕陽多郊樹積黄葉城流横碧波數聲風笛晩揺落近闗河内丘驛壁見西華王信初御史黄岡王慎菴檢討唱和詩次韻十日郵亭過薊丘見君題壁憶同逰客忩前後吟紅葉驛路迢遥數緑疇河朔白雲飛漢水太行明月照南州各千萬里羈離逺玉院槐隂感去秋宋廣平祠次碑隂韻鳳閣衣冠古廟荒闗山秋晩更斜陽一時仙李原春色千古梅花自異香轉恨君臣空蔓草獨看隴墓下黄羊魯公遺蹟裵􅏆久新月泠泠映石牀祠有顔平原書碑戊戌春同長公兄偕計吏過武安有王生好俠喜客置酒旅亭壬寅長公捐舘舎而余西歸再見王生感舊有作二首馬跡桃花雙玊鞍河陽縣裏萬人看重來寂寂秋風晩一路荒山雁唳寒萬壑霜林一鳥鳴鄊心怯入故山程更憐野渡尋舟處依舊斜陽滿縣城潞州道路孤征際川原薄暮時天寒潞子國日澹衛公祠浩蕩英風徃蒼凉霸業移地形天下脊王土晉侯師河朔臨雄鎮燕雲俯近陲閒花留戍壘蔓草失旌麾鄊國繁心緒征途長鬢丝闕山去無極憑弔益凄其武鄊道中山天工用拙莽難猜畫手曽經斧劈來莫道荒寒少才思米家山子有灰堆盤陀河盤陀險路每含愁亂石清沙水北流送别天涯知客意多情隨我到并州分水嶺南水下循環舗北水入祁縣界分水嶺前水兩流南來北徃總悠悠南水細微北水大可憐來徃不同愁智伯祠洞渦水沒鑿臺悲寒日深山智伯祠千載人思國士感趙宫烟草亦離離野史亭柔翰功名一葉萍也將文字照丹青朱門萬户凄凉盡惟有元家野史亭太原夜夢故園晉北燕南滯此行栖栖遥夜故園情間闗千里成歸夢惜别城頭曉角聲赤橋太原縣西南晉水北渠上舊謂豫讓橋也赤橋北跨晉渠遥自古人稱豫譲橋流水自應知客恨故添風雨夜瀟瀟王生致酒百壺青鬢醉顔酡旅病如今一醆多空對故人桑落酒真敎無奈别離何并州剪刀霜淬風摶出冶豪雪花照地㨗吹毛鄊心如水知難斷嗟爾并州快剪刀獲鹿對月今夜鹿泉月閨中應再圎光留長塞外影斷故山前香霧含空色清暉映獨妍别來小兒女相憶在天邉太安驛夜擊柝夜沉沉空山離思侵馳驅千里道去住徃時心杖䇿黄塵晩趨庭白髮深草堂先業在何用買山金真定道中南北分岐處西來兩度行沙明滹沱水山濶鎮州城地界雄闗盡天臨野塞平古稱燕趙士忼慨一含情墨牡丹四首新緑蛾眉畵未勻𤨏忩日影淡如銀玉顔自抱臨妝恨不比昭陽鏡裏人玉貌黄金事不同鉛華誰肯借春風眼前未解真顔色嗤㸃何須用畫工舞衣連夜惜殘春只染天香肯染塵喚醒玉奴慵不起紫金醆酒未霑脣烟鎻西陵翠帳塵綺羅香散鄴臺春風流占斷陳王賦始信人間有洛神竹栽竹蕭蕭色髙齋凉暗侵連叢添徑曲空翠入簾深接葉青丝障低枝碧玉簪翻愁攪清夢時有籜龍吟睡起詠鸚鵡二首人世喧啾不要聽任他百舌費丁寜醉鄊已到無人處又被鸚哥喚得醒利嘴新紅褪緑衿能言終不離飛禽笑卿所訴真何事閒煞斜陽半樹隂書報楊生題後憐汝相思意題書逺寄將别來皆老大歸去益凄凉秋病眠山屋春逰罷野航鄊心紛紙尾零亂不成行記夢春風南浦栁條閒别久離魂黯自還夢斷桑乾嗚咽水車輪纔過磨兒山寄韓少室先生家在行山第一峯石泉雲裊出疏松黄河渺渺霜風起收拾漁竿放白龍病後得閒除是病病後轉愁生吠犬欺殘夢荒雞喚早行月痕移枕近風緒入簾輕數日衣裳嬾蒼凉盥濯清雲麓雨中來借琴牆角荒花寂寂垂閒庭苔徑子來遲尊前白髮難抛得匣裏瑶琴可贈誰瑟縮丝桐還自語蕭條風雨最相思暝烟簾閣人歸去又是秋鐙欲上時龔賢畵四首湘漢青春外岷峨落照邉江山入圖寫風景一凄然龔賢畵山水萬里尺寸間此水瞿唐水此山􅒖嶁山野曠鋪烟樹沙明立渚禽秋山平逺在夢向玉堂尋逺峯如欲無颿影何處泊秋山少人行楓葉寒自落題竇晼畵三首晼故推官河内公子摩詰遺詩畵意閒烟雲粉本有無間風流一變添文采小李將軍著色山春蚓秋蛇蠆尾鈎家雞野鶩豈同儔祇應落墨驚紈扇畵作桓家烏㹀牛與君蓬轉向天涯㡬度春時不在家近日冩生知客意王孫芳草隴頭花題朱小晉侍御卧牛莊記後二首水石毫端出開函空翠流東來多紫氣髙卧或青牛松雨生瑶草樵風埽石樓雲山異鄊縣蠟屐可從逰午橋遺蹟在𣺌𣺌憶湖園樹杪山河出霜餘松菊存峯晴姑射雪花暖卧牛村誰接令公美幽懐與寤言小雪夜孟冬風景正凄凄斷卉飛蓬霜滿畦短日作寒逢小雪流年催曉報黄雞珥貂碧落癡如夢縱酒清時醉似泥鐙火客忩過夜半家山好在月輪西新年湘北玊階過集風沙連上日烟景易黄昏新月初三夜春筵第一樽催詩燒短燭留客閉重門猶是椒盤㑹年光與細論幽人幽人客京洛不異在山林夜雨長春草東風啼曙禽烟輕寒食近花落故園深回首清川曲還憐此日心楊花楊花不寂寞衮衮逐芳塵揺落多情客顛狂薄命身晩風過别樹細雨送殘春㡬度河橋外相憐一愴神燕草燕草芳菲候闗山客望孤長風吹大漠古道入平蕪野樹殘紅映春沙淨緑鋪連緜向天末客思不能無荒圃斜陽荒圃古城西薺麥霜苖細緑齊百口凄凉賓客散何人還解韭萍虀舊琴感懐故舊何人唱渭城瑶琴重整十年情客忩寂歴殘鐙火獨聽悲風曉角聲友人見過鄊山我已訝歸遲何事逢君問路岐世態可堪官達日客懐先喜病輕時重過舊邸吟寒雪試倚西忩聽竹枝更話故交零落盡香殘鐙冷十年思鄰園髙臺陂池何莽蒼夾林窈窕通短牆櫻桃風落庭砌赤棗花日熏簾户香紫苔生暈蜨作陣白蜜滿脾蜂出房鄰園如此亦暫樂回首青山心欲狂宣武門外水亭用壁上王文安公韻古亭荒木緑隂初壁上飄零數字書萬里五湖悲昔夢十年三畝問吾廬重來水石情如舊自别園林興不疏城路草痕歸騎晩月明苔竹夜忩虚鄰園懐韓山鄰園亦暫到酒榼自相將檐鳥猜幽處庭蟬快晩凉竹深隂屢憩果熟落先嘗回首秋雲外山林興頗長春夜懐素心旅宿西亭夜不知池草生闗河南北雁鐙火短長檠春老他鄉客花開故國情樊川烟栁道風景近清明幽事雙扉長畫閉過客自周遮㨂日移新竹嗔人掃落花風簾通乳燕雨檻數歸鴉幽事春來徧今年不憶家枯樹城邉枯栁樹隔水映疎帘獨鶴蕭蕭過昏鴉箇箇添虚饒風露美尚假雪霜嚴憔悴東陽客江潭鬱滯淹秋月秋月當軒蚤風林破暝昏攪眠偏近枕留影不闗門桂闕明新露江潮帶舊痕夢中家萬里休遣照離魂秋日同容齋郊行有懐同舘諸子為客端居久嚴装似逺行譙門開落照畵角咽寒聲嵗月秋山色蹉跎旅鬢情少年皆老大衣馬不肥輕秋夜懐馮訥生助敎委巷追逰處寒齋獨宿中故園當落月鄊思入西風山雪長鑱白書鐙短檠紅十年羈旅客心事㡬人同秋日彈琴招楊山人玉河水落秋雲深髙城晩色空隂隂橋邉老樹行屢歎馬上夕陽時一吟出門催貰舎西酒來坐獨捶牀上琴夜永揮杯攻雅操霜露颯颯霑衣襟西譙門外臺上登眺斜日横門道西風客思豪古臺臨大漠秋色滿平臯樹㸃烟村小雲連粉堞髙野花迷戍壘寒水落城壕凉冷猶悲角羇孤且濁醪闕樓銜暮景廻馬興蕭騷懐七柿灘洞陽風落滿林霜萍蔗甘寒味許長解道黄柑三百顆不如紅柿熟千章孤雁蘆花寒影夢三更風雨沙邉夜自驚惆悵故人消息斷年年孤雁寄離情雪中晩歸李段邢三君子至時邢將赴永福令行逰遵北渚飛霰灑寒汀小苑堆銀榭西山㸃翠屏驟逢驅騎返宻作下簾聽速客三人集留歡二妙停段先歸碧凝扶檻竹紅濕映鐙櫺玊笛吹何處霜碪響客亭坐中風漠漠天外氣冥冥一嶺江門險千巖桂樹青蠻方花自異天柱雁還經惜别春明外相思倒玊缾雪夜懐吴玉随編修使閩北風吹嵗暮雪景閉門低忩樹夜離立城烏曉嬾啼路寒歸驛晩江逺泊颿迷無定春來雁音書未可題曉雪感舊瑶華逓忩影落葉亦娟娟折竹聞荒徑微鐘記徃年酒消銀燭䟦香冷博罏烟怊悵晨雞語寒宵獨不眠除夜憶樊川寄舎弟四首小杜香名别樊川莫浪看東風來日下春色到河干藍尾浮金醆青腰上玉盤如今直北望燕趙是長安余所居樊川在樊山之下欲自别於牧之之京兆樊川故徃徃寓意焉相思為客後猶似到家初親養甘辭禄君恩許讀書草堂新日月竹徑舊田廬一作牽裾别天涯又嵗除依約懐人處樓前石版橋别離傷嵗晩消息隔年朝臘逐桃符換寒随栢酒銷同心不同賞咫尺暮情遥嚴装趨隔日夜半向承明百嵗猶今夕殘年有二更衣香仙仗影珂響玉階聲春殿罏烟外低徊十載情奉懐工部侍郎楊公于役孝陵銀蠶金雁玉衣寒王氣千年此鬱盤舊日鼎湖曽灑泣同時侍從獨頻看杉松石隧聽蕭瑟風雨穹碑拜奠安應念先朝恩遇重蔵來弓劍涙汍瀾徐孟樞侍御過集徐自舘職入臺誰遣臺烏報曉遷玉堂清冷憶君賢自憐易過同官日可惜相逢汎愛前人散寒㕔判獨醉月明永夜不成眠繡衣咫尺金門路封事何時到日邉春日戲寄韓山車栖輪卧費淹留不是閒居是浪逰過雁星霜驚朔塞落花風雨夢西樓陽闗别恨歌三叠隴阪相思賦四愁笑煞鴟夷太狡獪春光占斷五湖舟逰仙曽似天台見玉真星娥含笑閲流塵神光倚徙三千界仙刼迢遥五百春河漢已非來處路雲霞猶是夢中身愁翻茅許天官籍誤判劉盧世上姻睡起偶書二首睡鄉功並醉鄉齊一枕春寒落月西殘酒未消清夢斷城烏偏向蚤時啼翻覆人情笑㡬廻天公寒暖不須猜宿雲未礙晨光好殘月依然上冷梅曉雨懐王十一貽上細雨入幽夢醒聞松際殘開忩歸雁過拂樹啼鶯䦨雲亂逺峯翠晴回初夏寒昨朝王儀部吟興接餘歡丁香插蘆聊擬竹移杏欲當梅容易丁香樹縱横小院栽雨中愁自結月下影還來春色漁陽晩繁英且細開合歡花二首子豈無知者枝開斂復斜青蓂空有莢朱草不生花暈碧籠輕靄裁紅散晩霞合歡名並美相伴在天涯春芳亦既歇艶質麗天中桃葉麤嫌俗楊花細讓紅巻舒應愛日開落最禁風長記嵇生語忘憂並著功晩春二絶句已遣清尊換玉貂晩風蓬鬢醉蕭蕭自従舊雨無人過贏得閒門閉寂寥風作狂濤一陣寒春衣添盡怯成單落花日暮飛何處不遣殘紅著地看髙陽公林亭宴集五首東閣従逰日西園許數過樓臺容地少雨露近天多樹帶長楊色池涵太液波公無輕獨樂萬井接謳歌雅志在丘壑亭臯鑿翠初書堂新栁映客徑小松疎渌水波忩動紅欄架石虚謝公墩好在正莫憶林廬歴歴好厓谷悠然在帝城情忘憐水石境絶想柴荆野雀銜恩重江鷗狎浪輕滄洲無限興賸欲訴平生嵗閏清和候鶯花夏未遲碧桃天上種紅杏海南枝歸第銅龍晩開樽玉漏移年年京洛㑹延賞衆芳時忝切龍門客追陪鵷鷺行齒随枚叟後坐近令公傍官燭春星爛宫壺玉露香酒酣紛起舞為夀樂千觴老樹老樹空牆裏春來著數花葉䝉垂草暗枝與蔓藤斜濯露髙難下飛雲近自遮婆娑想生意長此送年華流水牆下分流水潺湲有濁清栁濃斜照影蟬亂晩凉聲池沼終然小風波也自輕浮雲碧空盡冉冉共遐征春日冩懐呈宛平公十四韻絳帳重來日柴門病起身雲霄立雪夜嵗月掃門人弱冠謬通籍十年甘積薪散才矜匠石小草辱鴻鈞志切傳經久思惟枋國新公忠參宻勿調燮用深純環海烟烽靜三秋雨露均四門明舜目率土望堯仁簪紱登台輔文章致要津青春殊淡蕩黄閣正嶙峋永叔門生衆虞翻骨相屯穠花愁偃卧今雨對傷神翹首看勲業無心恥賤貧菰蘆樵侣在情至敢重陳午亭文編巻八
