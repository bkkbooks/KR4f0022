body:
  text: 午亭文編卷四大學士陳廷敬撰古體詩春遊摩訶菴三首微雲如媌娥峰嶺立鱗次幽尋即郊野山逺已愜意落花委清晨疏雨溼宿翠繫馬柳隂斜尋僧殿廬閟松風吹冷院憩寂吾所嗜涉徑憐青蕪尋花悵細萼覽遊登故墟裴回感今昨荒庭步野鸛廢溪委石玃翏翏悲風鳴觀身轉靡託聲聞自狹劣即事動心魄娟娟西軒竹生此祇樹林疏磬度寒翠時聞天籟音頗覺衆緣盡泠然清客心落景下逺堞孤霞斂夕岑回鞭拂暝色歎彼歸巢禽施愚山見寄長歌和答䦨珊夜雨雞鳴號關山夢回心魂勞我所懷思渺天末凉風一起秋蕭條美人昔贈相逢篇吳綃三尺森瓊瑶今晨曉窗坐展玩我欲報之情鬱陶憶昔相逢客京輦城南華徑紛招要酒酣惆悵秋燈紅羡我鬢髮漆黑同即今倐忽别四載頭上已有霜枯蓬眼前諸子幾人在浮雲溝水馳西東萬事回頭淚沾臆人生朝露誰能必楚澤難招宋玉魂緱山不返王喬舄指荔裳西樵二子歌詞自絶塵聲華爛熳今何益男兒七尺良可哀生存華屋終黃埃儒術用世行已矣浮名寂寞何為哉不如放意遊八極掃除文字栖淵默塵根未斷幽憂來相思茫茫江南北述舊贈胡海若昔者在瑣闈下簾過春風給諫吾朋鄰接䣛視聽同寢食雜鉛槧文墨羅青紅尚書契祕解洞矚疏心胸兼旬秉華燭往往連晨鐘君壯我年少意氣陵雲鴻翻飛却垂翼頭腦非冬烘至今封事草烜赫動九重悠悠二十年别君如轉蓬吾壯行及衰君復何豪雄託志在忠雅䕫契可比蹤功成思歸來與子尋赤松題汪蛟門百尺梧桐閣圖别館秀雲木碧梧散層隂髙閣與之齊登兹靜客心映簾出修枝開窗面平林清暉滿瑶席含情託書琴美人獨晤言舉世難知音送杜翰讀還南宫二月急霰零微緑蔽春草飄搖離筵花嘉會苦不蚤生平嬰世網簮紱自紛繞至人貴樂行所憂為其道炳耀乾初爻觀玩可終老悵别盈酒觴贈言傾懷抱灝灝將安窮已大萬物小古之英雄士進退凛師保時來樹功名浮雲㸃蒼昊豆葉我家溪谷間隘狹砠田多細岑驅羸牛如蟻緣嵯峨髙秋八九月豆葉紛交加婦子散丘野採擷窮烟蘿盛之維筐莒湘之匪鹹鹺菹之老瓦盆濯之清流河潔比金薤露美如瓊山禾條枚感時節調飢發吟哦贈于子龍秀才天地大晝夜終古旦暮間渺然思洪荒忽已幾萬年子夜及晝辰五時去翩翩堯舜適在已文明麗中天仲尼丁我會日午今少偏炯炯青春逺凄凄草木繁天工窮藻繢聖道芟榛菅未過而戍來人物皆磨鐫堯夫有此語紫陽著之篇且娛圖書側聊想羲文前一息而萬古不隨運世遷于生蚤契道謂豫云之然治家一首喻家僮治家良獨難僮僕恣面欺文誡悵徒設鞭撻憐屢施我乏克已功訓化乖所宜每玩家人爻嗃嗃無嘻嘻終然悔厲集喜怒生妍媸我愛未果是我憎未果非渺然八口多紛於將六師㫖哉古昔云人固不易知何况天下廣利巧爭芒絲謡諑工噎媢忠信經嶮巇結髮已白首那用相乖違感此諭汝曹愴惻垂涕洟祝氏園同王幼華給諫汪蛟門舍人作斜日秋城隅丘冡如履綦念我為娛遊懷古心翻悲花荒奉誠園草積平泉池食客一朝散朱門生棘茨昔者場牧地髙樓浮雲齊飛除通窈窕曲榭迂攀躋夜凉增脂燭柔指彈哀絲回溪激清風音響何淒迷椎牛擊肥豕行爵正逶迤東方日欲出霜落凋華滋不見幽居客貧賤甘如飴為汪鈍菴作聖路久充塞百家羣背馳弱齡謬志道中與夫子期斯文映朝著每見慰渴飢髙詞嫓墳典渺論窮黃羲往牒徒紛紜蹤緒幸可追迢迢數千載此理不復疑傾膝接誦說辟咡將焉師摻袪詎忍别抽簮去若遺江湖逾千里日月垂十朞聖皇重儒雅詔使舉所知是時忝從臣玉榻侍右螭下直金明門羸馬驅何遲呼燭夜草奏晨謁前致詞為言此人賢邈焉超班資至尊鑒朴鄙耿耿勤睿思每䝉再四問願見心則夷堯峰卧未起敦迫煩有司君抱移疾志我懷將母悲寒暄語未竟驚喜翻涕洟倉皇聞閔凶號天失我慈青門灑血泣此恨無津涯隴阡得書札報我還山時盛名不易居精理寧淺窺行身凛尺寸涉俗虞磷緇大賢民所仰永言福履綏贈日者學道無定力忽忽悲其生願得如雲翮振奮乘風行我辰命在乙酉金來伏藏譬彼松柏姿徑寸遭殘戕園林植弱木所喜鄰春陽萌芽雖蟠屈節幹森微茫虛乏棟梁用懼為斤斧傷間尋日者語聊寄樗散情謂如月在天雲卷三霄晴微纎不受汚皎皎金水清我何落世網婚宦相牽縈耽野向瓢笠識分遺簮纓輕肥恥蔡澤揮手辭唐生春日遣懷人生誰百年一愁一回老愁斷還復來人老不再好青春能幾時落花已堪掃夜窗盈觴酒暫輟憂心搗寄語金閨人山中長瑶草送吳孟舉還語溪雪晴夜䦨鐙花長西園祖席飛華觴風笛數聲回塞雁驪歌同聽是他鄉燕山城頭落月白罷酒登樓念遙昔江上桃花春水生孤舟惆悵南歸客贈施硯山侍御北斗挂席銀漢橫秋晴炯炯明長庚遙思避馬棲烏地錦燭華堂觴緩行丈夫五十如少壯努力清時致卿相瓌瑋大衡東序懸威稜喬木干霄上憶昔回翔郎署辰傾朝才調更無倫奏賦明光傳制草批答淋漓御墨新柱史東臺分鈇鉞霜驄遙度關山月坐挹南薰解鬱陶行經隴水聞嗚咽回首流光十五秋我初通籍從公遊只今老大看如此公也聲華罕與儔天子宵衣臨玉榻對仗朝回趨入閣霖雨吹噓遍野烟風雲指顧生閶闔珥筆儒勳上景鐘猶龍異世繼仙蹤身有葛洪丹竈術名成王掾黑頭公棲遲金馬看銅狄十五年間事歷歷殿門執手繡衣人猶是當時好顔色送孫古喤赴南靖當時策士蓬萊宫孫郎射策實第一紅綾分賜上三頭榜墨中更臚唱日故事科名領石渠校書初入承明廬不然翺翔郎署含香趨折腰手版胡為乎朅來詞賦遊鴻都留滯山公啓事書未老馮唐顔色在豈應騎省鬢毛疏萬事反覆浮雲徂人生意氣無時無一朝懷綬閩天去驪駒踏春草色暮十載親闈奉檄歸版輿門外芳菲路落日蛟龍江水深煙濤鼓楫鳴素琴縣道荔香雲錦爛訟庭花合海風隂青衫皂蓋行春地急牒繁詞滿巾笥虛左名王玳瑁牀征南幕府樓船騎足令島嶼坐銷兵炎荒盡處無熢燧天隅民社仗書生漢家功勳重邊吏君不見長安貴人簮華纓撫時坐論空深情朝擁文書夕鞍馬羡爾騰驤萬里行出守行送程使君之桂林使君去嵗當于役道出并州不十日明月關山塞上樓長歌為報長相憶使君今年出守行翩然五馬西南征一别青門無近逺况爾迢迢萬里情吁嗟往事重回首舍人供奉金門久校書我在日華東槖筆君隨丞相後紫薇典故問西㕔鸞紙詞頭歸大手窈窕清禁步逶迤欲出往往呼曹偶長安水樓三月時畫簾柳影青交枝御溝殘紅引吟興草橋暮雨同襟期自從輟直承明殿畫省回翔阻歡宴飄零海內賔朋稀經旬不覩故人面雖不覩故人面跨馬城南走相見火雲突兀山崎嶔五嶺炎熱愁人心君今朝辭燕嶠日夢魂夕到湘灕潯君不見劉蕡上書翻見抑同時數輩無顔色李廣難封數果竒延之出守情於邑丈夫身為二千石通侯爵印唾手得行矣風塵須努力獨有别離心日夜隨君去蒼茫百粵烟巒深相思江上相思處若過橫江見李卿李令永福為道新知不如故書張滄溪畫花鳥山北山南春十里兩岸桃花夾溪水畫圖相向春風開山草山花紛未已水漫漫兮山􅐑􅐑張侯邀我題畫尾問侯胡為獨閉門巖檻冥冥花氣昏水禽陸禽各相命千樹萬樹春風翻君不見張侯昔日官滄溪村村花柳流鶯啼秋錦山前紅溼處至今猶憶海棠溪照鏡多照湖州鏡容華能幾時霜風吹暮雪短鬢怯成絲此夜關山月空懸萬里思萬泉寺二首野峰青巉巉濤瀧或相似北遊慕江湖睨眴久非是塵沙激箭鏃聒聒困人耳眼明柳村樹草徑披烟水落鴈隨緑波放鴨逐紅蕊輕濤不容楫濺沫才濡軌空陂自擊撞枯荷鬱填委渺然想滄洲駕帆涉涯涘寺門落花時決決流泉注我昔遊南村小丘栁夾路馬箠揚回風帽簷岸斜樹豁然登土城垝垣栗晚暮濁醪蕩羇情殘陽窘野步禁鑰下急符昏鴉屢相赴及兹頗放浪悲樂亦更互且復逺吏舍無妨日歌呼為王黃麋給事題戴蒼五君圖黃門逸氣空雲烟翰林風度豪且妍舟次眼中兩人吾所賢餘子意態皆翩翩摩挲久視心茫然羣游憶昔城南園禹生畫我黃門間蚤衰影入秋毫顛我為生誦蘇公篇潞州别駕電目懸浩然吟詩肩聳山飢寒富貴雲在天仿佛圖畫空流傳人生是幻繭自纒童牙華髮俱可憐不見戴蒼寫真年黃門顔色得似前和子瞻飲酒四首市朝遞相欺幽獨娛吾真自非飲者流百感危其身蕭然杯觴進宛爾顔頰新指口但此物掉頭謝時人我生命在天舉杯屬雲漢疇能卻老病聊用緩憂患幻影悉破除風霜一銷散夜長忽復醒愁來每投間少寐甘獨眠枯腸輟夜茗膠膠晨雞鳴䀹䀹鰥魚醒今來紅塵中頗涉黑甜境所幸肺病蘇一杯還酩酊梅蕊忽在眼蕉葉時沾唇自識瓮頭味不數梨花春英英林開府此事功莫鄰空傳梅麓翁白首為波神林開府家有瓮頭春酒世傳河督朱公為河神夢松歌寄素心前年百鶴阡種松宿山家去年客京洛兩見寒梅華松小隔丘隴人老長天涯我生一飄蓬翻如繫匏瓜夜夢過石閭明滅隨隂霞山僧色冥默問訊松如何旅魂知嵗寒鬱鬱霜中柯流風響深谷疏影吹交加龍雛無卑勢蒼然鬱爪牙對面天馬山髙樹聲相摩歸來關塞黑林木猶紛拿殘鐙記往路别淚落滹沱得句如春草為此夢松歌十二月二十六日湘北貽上幼華蛟門見過用東坡饋嵗别嵗守嵗韻三首為客心久孤踽踽孰豫佐冠蓋富烟海取友譬權貨錦衾混裋褐物豈在細大以兹寡歡遊窮年掩關卧至竟二三子邀賔必在座東風回龍杓西日遁蟻磨别時已屢多嵗䦨詎重過相對各衰鬢陳迹留賡和歡多嵗易速愁多嵗易遲我今既不樂嵗往焉用追載賡别嵗吟與子俱天涯城南菊花候水亭楊栁時江東有歸客蓴美鱸魚肥謂苕文人生聚與散念此能不悲舊嵗及舊人去去長若辭嵗去還復來人老終就衰嵗宴方羣蟄吾道如龍蛇天運有節宣存神以自遮但可勤飲酒苦志將如何空堂久蕭瑟今夕同笑譁巾車既投轄櫪馬且置撾生涯須爛醉暮景亦太斜座中汪舍人少年未蹉跎豈惟爭一嵗一日猶可誇蛟門長豫一嵗蛟門見和復次前韻三首邈矣燧人氏實始命四佐譬彼構廣厦程材市其貨匠伯引繩墨杗桷中細大蕭蕭櫟社木輪囷空偃卧誰能為犧尊青黃光照座同生天宇內如蟻共在磨來風一披拂沃若青陽過請君聆此歌意卑非寡和鶀雁綪繳疾羅鸗鼓􅖬遲黃鵠遊萬里一舉何能追井䵷笑東海鰌䱔安津涯長蛟在泥滓雲雨貴及時丈夫自齟齬奚能事甘肥一臠食海鳥顧視增憂悲盳洋見渚崖潎潎將焉辭願為逍遙遊無使翎羽衰駟不及吾舌遂為添足蛇茹之則逆已吐之誰可遮不知汪夫子背面謂我何六街漸鐙火兒鼓已競譁且為犀首飲不學漁陽撾君看如眉月清影又復斜良辰難合并一笑無蹉跎吟詩自喁噞軒輊謝衆誇人日雪宿左掖用坡公聚星堂韻春氣涉七蓂弄葉魯陽戈回六瓣雪花神作意爭日時青帝行空渺愁絶掖梧弱枝不勝寒苑松老幹渾欲折斷續銅龍漏有無離披鳷鵲光明滅細草應知兔跡深錦鞲乍見鷹翎掣坐憶屏窗隔翠微生憐綾被消紅纈已堪羇夢溼如雲賴有清言霏似屑閉簾覔睡何隂森呼童試問還飄瞥千秋出守杳流風十韻强哦供笑說雖無玉月梨李梅用意宜如金㸃鐡夕垣與南溟容齊夕垣鳥啁啾棲樹求朋行而我悵交友相逢如面墻曹署豁野性二妙同疏狂名理摉險語幽賞娛中腸東除簾户閉曉暮接一牀自吟各有以妍媚非時妝刻燭驚童奴不知老鬢蒼蛾眉弄新影所惜在景光同南溟湘北春宿左掖聞貽上將至用坡公喜劉景文至韻迎之李生晝眠驚相呼謂言數子不滿隅歷下髯王久不見只今如髯天下無俄而起舞忽離立問言不答歌夫夫故知斯人有真賞何論醉倒蛾眉扶同時聚集者三子張公九尺美鬢鬚為人風義好文藻亦云此理良非迂蒼龍奮蟄烟景媚萬象品物皆昭蘇星光下燭耀衆采誰能謡諑驚彼姝我顧二子發長嘯碧山差樂寧負吾髯兮與爾俱白首扁舟可載終江湖放歌再用坡公韻明月在窗誰與呼數枝風竹鳴墻隅先生宴坐百不思更鼓未起人聲無三旬九食天所病霍然中夜歌可夫絲竹不解作陶寫藥餌頗賴相撐扶銅鏡憔悴已上面更堪揀摘霜髭鬚敝屋青山何太晚殘經白首正坐迂得句淺淡取押韻哦詩漫浪非和蘇朝餐暮卧聊爾耳雖百年活豈復殊先王道在古聖逺茫茫天壤乃有吾明月與汝生為徒隨風一棹遊江湖雙鐙檠雙檠便且光雖雙同一足量之尺不盈夜夜棲雙燭雙燭照殘書開卷愁已續揩摩老眼困一字屢詰曲念昔年少時六籍髙閣束時文侮聖言謣語中流毒背人探古冊未齔若嗜欲羣童守師說每見遭誚辱及今半面識炎冷豈同俗閒退轉益親雙檠對相朂單檠不努力坐待華顔促寄語少俊生檠燭寸如玉無為墻角棄此義韓公告書于章雲所藏惲慶仿王摩詰晴川覽勝圖丹青亦小藝粉墨留終古華纓走黃埃過眼誰復數藍田老畫師生綃在何許歷歷晴川花翳翳淨初吐正恐隨春風飄零作紅雨祀夜壇門呈張南溟侍郎凍髭呵復解滴衣如溼雨殘夜月逾明天寒翳更吐風枝鳴幽禽藉草命徒侶是夜冬節長坐久數更鼓引氣溫丹田聊以救疲苦老面新多紋尉冷手數舉我本田家夫日出事畎畝故嘗把鉏犁所願畢雞黍請看兩鬢絲量力守環堵虎坊南别墅健菴招同西溟竹垞燕集掩關過春風吟謳害寢食朋遊豈不佳舊故頗遁匿類别微尚殊懶性况逼側夫君磊落人二子不雕飾折簡呼相從髙樓展顔色檻牖俯逺林尋尺納衆域野桃斂纈紅壇樹積鐡黑杳窱初來徑欲記自閔默廊回惜行深石危訝步仄羣巒像犖嶨交檐解掎踣飲酣屏惆悵語歡露挺特外俗誓早捐幽清幸兩得懲忿除咿嚘為樂爭晷刻虛亭改斜影昏鳥接歸翼夜魄棲空窗醉歌寫胸臆同健菴竹垞登黑窰厰高處宴集吾曹文字飲同遊無擇行虎坊南尋春龍潭北探勝北臺風搖搖所貴豁野興空濶不礙目四天垂欲竟峰堆衆嵐昏水漾一波淨日下松壇隂深碧鬱交映俯仰乃自適飛躍各相命夫君獨棲棲曷不師尼聖刪述志千秋反魯樂則正吾歌或可夫安能獨無懵亦有木强韓窄韻長詩稱嗚乎敢望公窘曲押競病豐臺看芍藥東方射窗一寸白殘夢猶為看花惜玉街清酒隔夜沽提壺喚起驚僮客豐臺花盡芍藥新狂香浩態愁殺人黃金買醉不快意與君空負頭上巾次韻宋稚恭兼寄孫止瀾磊落同嵗生吾愛孫射州聖道雖浩邈志士耽林丘朝寄詎不任避榮追前修五年三請急歸必與豫謀斯文在草澤才俊勤羅搜宋生清門子偉盼俯匹儔矯矯有父風弓箕傳吳歐髙情慕篠簣塵鞅辭由求洪河方奔決誰挽滔滔流結駟誠漫浪枕石亦繆悠時潛或樂行試上金閨遊問知射州信神往不得休皇天老眼明日月雙瞳眸胡不照幽清痼疾紛相繆牀第困此人恐為衆士羞取友必豪賢可與學孔周宋生父子間逸氣橫霜秋淮水出桐柏近為禾稻憂忍飢誦古書吐氣卻軟柔芒刃終不頓目久無全牛生觀上國光我欲棲汀洲逝將逺悔吝寧獨嫌傴僂閒為秧馬歌或與漁者謳因風寄故人此意誰為優故人昔喜酒為我傾一甌回頭謝世上不知蘭與蕕送稚恭兼寄尊甫射陵先生鳳鳥千仞翔遺音渺八極麟角世亦稀見之渾未識宋生名父子清流展物色淮水行舒舒乃出桐柏側金莖露髙潔朱絲絃正直壯筆戲海鴻野鶩豈兹得欲作綵衣歸不願龍巾拭先生山嶽姿亦復弄毫墨寄我空中書千秋石不泐臨風景豪賢絮語不能默送張南溟侍郎還京口離堂起蕭瑟絲管淒微風夫子秉遐尚髙揖辭羣公結歡二十載往往連孤踪餞酒不能飲渌波盈樽中揮手且勿道會合安所窮潞河雲水清倒影秋花重殘月挂海樹芳蘭靡汀叢江樓繫烟艇晴日天冲融隴岡盤龍目作鎮金焦雄采秀玉蕊亭鐡瓮森芙蓉長笑青雲人别久巖户空他時或相訪騎鹿茅山東送徐健菴尚書歸吳門青春帝座傍紫垣明一宿尚書森寒芒璇衡相左右公真天人姿神寄邈巗岫九重念别深三接動連晝造膝語不聞宫壺每添漏寶牀扶龍鱗華茵暖鳳咮賜書墨猶溼罏烟裊歸袖南窗驚儕輩東華問門候聖朝禮賢臣歷古不一覯公其愛玉體名在金甌覆聞道晚嵗得聞道懶不復吟詩今兹理藥餌因病多閒時呻吟秋蟬聲斷續春繭絲知希則我貴綺麗安足為古昔賢逹士陶白良可師以我觀二子猶未掀藩籬不免文字習恐為聖者嗤今之雕蟲人聞此必反訾而我欲無言溟濛順希夷新年新年塵事靜歌笑亦已䦨喈喈午雞聲空簾風搴翻人生渺滄海一波幻影間得此且為樂不慕天上仙海波本無意隨彼春風還仙者多畏忌竦息蓬萊班花開青綺窗酒半生朱顔看花酌美酒與子娛新年新年送别曉駕午在門離堂語難久君歸愴朱顔我留傷白首微霰欲成花輕煙未著柳長恨送别心不在春風後燈夕醉歌示廖樊兩生東風作寒波泛酒出遊不如杯在手六街塵土吾所憐萬事沉冥輸笑口眼前物態輕鴻毛閉門明月春天髙燈火如山坐如塊醉歌亦復尋二豪西樓烟窗寂如此有酒盈樽呼不起玉京仙人騎鶴還午朝碧落暮三山謂言汝曹酒謫仙即今不飲空百年行廬贈張上舍琇瞻敦復尚書猶子也行廬周微垣索鈴連禁管張公江海姿魚帶必雙綰匿牀非浩然伴直得小阮森如玉樹質會是竹林選釣車吾方營刑柄詎當攬謁謝上東門經過華陽館瞥然見公子耳目頓清逺野花紅始然園果緑何纂山鳥嚶其鳴林風泠逾善欲别上馬遲垂鞭不覺緩醉眠對月放歌落日已逺烟雲殘三兩星宿森芒寒頃之月出庭南端醉卧短檐天地寬咫尺不疑星漢逺放眼那覺關山難玉京金闕隔何許狂吟驚絶難攀緣黃帝乘龍所踏路微茫陡絶一髮懸葛許之徒可詫異白晝直上擕飛仙沈想此事心如顛使我竟夕不得終歡顔洗盞更酌酒蕩滌萬古愁寂莫此形骸昔人無良謀堯舜之名如浮漚秋風蔓草縈荒丘歌終渺渺增繁憂錢宫聲松屋圖歌春風射策明光殿玉勒踏花共遊宴風塵澒洞嵗序移十年不見錢郎面江路漫漫江水深擕畫逺涉時悲吟東華軟紅沒鞍馬秋城寒山勞寸心歸來細視松十尋長風謖謖吹衣巾蒼濤飛翻白日出窈窕為我開深林青山空濛落瀑布石痕􅒎丫水洄沍流入萬里之長江遊龍行天挾煙霧錢郎錢郎何為鬱鬱久居此舊隱如斯不歸去君不見昨日東園花夭桃穠李空霜露天寒嵗暮百卉凋惟有青松尚如故古來材大非偶然坎壈豈受時人憐京東贈張玉田兼寄張廣寧京東至陪京郡縣連亭障文武吏士中所見或冗長千里得二張每念不能忘玉田楚才士風操鬱清壯夕陽城西亭接語領微尚使署開早花窗月映帷帳客路役夢魂憶子頗神王晨别燕山側黃雲迷背向回飇遵塞垣驚濤鳴瓮盎行行欒江濱秀色稍奔放十日見大海長城亦殊狀關門野雞鳴方軌狹而妨豁逹忽無際天開眇空曠相顧徒侣單邊心增惻愴竄墟想人民戰壘恥將相軍壕委白骨蔓草甘所葬經過狐兔蹤豺虎步蹇亢半月抵醫閭縣令非漫浪廣寧昔重地亂後色凋喪祀事亦孔明經營到纎纊萋萋木葉山陵土豈無恙並馬行東路鴨江引春望窮塞得鄉彥精意矧神諒平生足跡窄兹遊已云暢寤言懷二子浩歌雜欣悵角山贈程淄川昔我出關東登望關門樓羣山連波濤騰涌天龍遊長城為鱗鬛角山為舌喉尾蟠荒陬外首注大海頭髙亭冠山巔步櫩俯滄洲程生傑雄人翺翔夫舊邱蓬萊與方丈眼底自拍浮縹眇三神山脫屣萬户侯奚為客京輦遊戲驅羸騶關樓留我詩君歸試一謳喜雨久旱氣始潤五月生新凉霧宿林景碧雨過斜照黃未知黍豆色已覺花藥香京城百萬家糧艘仰四方小人習獄市朝寧憂農桑昨者下詔書切責在官常委職操文墨慷慨中倣徨髙雲閉赤日太白晝遁藏今當見開霽青空絶纎芒理數相感召天心為低昻乃知帝好生此身逢時康晚眺贈吳玉隨編修時移居東鄰橫絶城頭山放眼不到地蒼然百萬峰杳杳落檐際雲樹無兩色天嶺但一氣連綿亘明霞嵒谷積空翠城中端居人户牖分逺勢荒庭稀遊從長夏寡人事山色時時來短牆得羅致喜我素心友巷南新移至雖未晨夕俱客情覺中遂焉知君看山非我看山意即事憶山園隂雲滿中閨曉露泫金井種花三徑荒落葉萬山靜玉徽流凄響錦禽弄孤影歸來早閉關水樹歡朝景聞雁懷張公孚陽景翳飄風孤雁行且吟不見過庭影空聞天外音之子渺江渚悠悠春水深新裁一書札逺寄南飛禽月下懷樊葦村門掩春院月無人與我共娟娟照庭樹花落影遙送回飇懸砌隂含煙嵌窗縫清泠閒七絲思君聊一弄午亭文編卷四
