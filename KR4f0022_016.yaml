body:
  text: 午亭文編卷十六大學士陳廷敬撰今體詩服除七日拜户部之命十二月二日次三家店題家書後一紙書成寄未將五更寒淚濕衣裳麒麟冢在松杉冷零落雲邊斷雁行孝章公幹相次淪亡趙店見豫朋題壁詩用韻雲樹東來客夢西草堂深掩緑蘿迷三年才盡銷魂路羡汝詩多到處題真定蚤發留别梁比部行盡關山落照邊鎮州平野逺連天星霜千里路才半燈火五更人不眠送臘流澌帶殘月迎春官栁入新煙况逢東閣郎君舊客館風光此最便固鎮遇荀少却别野店斜暉慘客顔我行君宿送君還别離亦復尋常事無那相逢逆旅間定興重送荀少嵗晏關河煙景新東風前路待歸人灞陵官栁遙相送直到家山接蚤春宿琉璃河白草黃沙淡落暉朔風吹老塞鴻稀琉璃河水年年緑猶是鴛鴦幾對飛見月半月辭家見月圓更過半月又新年來時池上松間影曽照髙樓夜未眠初到京師寄素心六針與可荀少拼當臨岐十日裝曽經一日幾回腸登山屐好藏僧舍漉酒巾間疊客箱分遣池魚防涸水差排籠鶴借支糧别來數事皆無恙惟有春鴻惜斷行蚤春西便門即目别久西郊路三年復此行城長歸鳥蚤山逺落霞平燕麥春泥坼桃花凍蕊生髙梁橋外水猶似去時清正月十四夜宿城北僧舍枕畔天涯閉户中車輪轣轆馬嘶空牆花影動雙林月山磬煙消上院風為客行藏如候鳥在家蹤迹亦飄蓬放燈時節吹燈坐贏得僧窗夜火紅題量如上人山房紅石橋西路青春向夕曛蚤花幽處發清磬定時聞野曠門侵月山遙樹宿雲安心隨地好况此息塵氛元夜懷午園燒殘香篆夜何其簾月凄清濁酒巵燈火舊遊初别後笙歌旅宿獨眠時鎖門池館應通客繞屋鶯花可付誰慿寄北山猿與鶴相思更不用文移元夕憶山園鶴竹廊燈影曲池明正是遊人到處行試向春山聽夜唳數聲應有别離情十六夜晚晴臺望香山碧雲諸山寺燈火山寺數十里春燈三五攢髙臺一以見逸興生雲端别去寄遐想來遊增昔歡千峰與萬嶺日日幾回看春夜懷午亭新居衡茅才縛促行裝客館重開舊草堂白首逢春花共語青山有夢睡為鄉萬人似海聲還靜午夜如年漏更長月落離魂猶未逺依微步屧水東廊酌酒與六針却送歸客館風光過眼新出門衣馬便生塵無憀還自開詩卷省事誰能謝酒人一日須謀千日醉六分已減二分春君歸芳草池南路勤看園花莫厭頻送荀少返舍宿火殘紅曉焰新寒廳相向語蕭晨千門風雨雞鳴早二月雲山客去頻栁色漸深南浦道桃花應及故園春我來長憶逢君處逆旅斜陽淚滿巾城南張氏園春明煙景麯塵遮常記名園野水涯嵗月漸垂朱户栁光隂間映粉牆花流鶯舊至曽相識旅燕新來是别家惟有酒簾壚畔月東風依約玉鈎斜懷荀少折栁來時路歸鴻别後聲孤燈眠客舍暮雨閉春城野店宿何處居人同此情更堪故山道明日是清明舊居遣興半日清間半日喧三重茒屋是煙村去隨秋燕辭空壘來見春花放舊痕白墮杯乾書在枕紅塵客斷雪填門東風自解關山路寄語莓蕪到故園見同年潘岸谷比部訊屠給諌芝巖細栁新蒲緑映空曲江花有幾枝紅皇家一榜四百士白首相知六七公孫公承恩榜今在京師者七人而已海上故人如夢裏薊門落月滿樓中逢君舊憶銅龍事左掖清隂入院桐對酒栽花對酒栽花白髮翁衰顔得映酒花紅一時年少殘心事來向花邊酒盞中遣興書蔚州先生詩後敢將白髮惱殘春酒暈朱顔也似真笑向公卿為長物倦逢花鳥是間身米鹽私簿從奴僕錢榖官書信吏人挑盡青燈翻舊卷蔚州詩句不言貧遊城南三絶句籬花野水連村盡逺空栁枝蘸碧漾溪風落花鋪徑青春去小住籬邊一樹紅小丘一笑花邊白首回妖紅慢緑定相猜黃塵萬井春街晚爛醉城南土骨堆見燕秋風吹别舊烏衣我去重來待汝歸不分人家雙燕子等間來傍野亭飛禹鴻臚江墅梓花圖二首枝上煙嵐襯落霞山村回首惜年華茒亭一樹春光晚爭似生綃十丈花婀娜凌霄勢未雄芙蓉雖好不相同畫師用意曽難識多在霜根雪幹中夜行書懷在家心不樂適逺身如遺月黑鳥相喚燈明人不知野煙縈栁宿溪霧捲花遲獨往念愈寂欣欣亦自私四月二日召赴暢春園賜食瑞景軒泛舟於苑中恭紀二首鳯掖風微漏點沉雀羅門掩一春心三年重續金閨夢半夜驚傳玉殿音覆餗易憂筋力緩當筵惟感嵗時深名花繞坐搔霜鬢何限天香上盍簪銀漢蓬池水接連太清宫殿渺雲煙不因侍帝來天上幾見隨槎到日邊寶笈圖書編舜厯金甌歌紀頌堯年祇應盡却浮塵念檢點仙官未了緣是日席布牡丹闌下臣坐後一本盛開恭紀一首羣玉瑶臺嵗月賒豈應春老惜年華過淮曽未知盧橘廷敬南未至河淮入洛今容看魏花眼霧微消窺緑暗緑牡丹最盛時獨趨至花下鬢絲輕揚拂紅斜上陽亭北承恩宴身似登真不憶家午夢自掩柴關懶是真天憐散木寄間身故教一枕花邊夢點醒槐安睡裏人崇效寺看棗花書雪塢詩後古城遺壘路橫斜薝蔔林中有故家會見海榴紅似火要看仙棗大如瓜蕊生野桂偏含實香斂幽蘭未放花一詠湯休竒絶句慿將狂語寫槎牙前日城南獨遊遇袁杜少翰林今日復遇之棗林寺門外戲簡以詩二首前日煙條拂岸巾今朝芳草坐成茵獨遊相值不相訪始信君家是可人一笑車輪碾麯塵相逢不語莫相嗔五陵衣馬三春後能解間行有兩人杜少見和前詩疊韻奉答罏畔青簾似舊斜玉街走馬記誰家思君别恨綿煙草得句風人報木瓜相贈祗應多勸酒頻行不是耐看花吾生萬事皆聊爾寵辱何須置齒牙疊前韻和雪塢春明歸路日西斜潦倒重來似出家上院早過依夏剎故丘臨别憶秋瓜往還北陸三回雁榮落東園幾處花再到雙林瞻頂相半天風雨散簷牙崇效寺瓜字韻詩已三疊韻酬雪塢杜少杜少復以詩來再疊前韻奉和無賴城南韋曲斜妖桃冶杏自家家間從月下標宜李留取亭前署饐瓜欲解金龜來換酒正思靈鵲去銜花紫微郎省文章地衰散何堪竪頰牙來詩有中原獨坐最髙牙之句故有此答晚晴臺看山有江南之思春來風景憶江南無限煙波已自諳眼底秦淮頻入夢晚山如水緑如藍邯鄲道上絶句追録貽羡門少宰炊熟黃粱已是遲海山歸路幾人知却憐朝市紛紛客怕説盧生出夢時次韻孫仲禮重午西堂會飲見贈二首紅塵門巷也蕭然心逺方知地自偏時序總拋青鬢外天涯相聚緑樽前滄桑過眼曽前度書劍隨身可判年一卷離騷數杯酒多君苦憶汨羅賢當時官號領司農耆舊髙門棨戟重兄弟盛名齊賈鳯郎君崛起繼荀龍雲山蕭瑟思前度風雨漂搖愧逺從忝竊清塵還贈處詩情冷淡酒懷濃仲禮先人玉陽湖廣巡撫世父栱陽户部倉場尚書端午氣寒有節物之感節物堪驚旅鬢侵今年塵土映華簪綵絲漫與纒衰臂昌歜偏能泥苦心階下草芽青坼甲牆頭杏子緑藏隂生衣未著添涼冷疊雪含風在笥深戲次仲禮與豫朋端午酬和韻浮世功名轉寂寥魯連蹈海為無聊趨塵似葆頭慚面忍事如囊腹愧腰詩壘重摩三舍退愁城新破獨身跳翛然自入羲皇夢不與靈均賦大招秋夜待曉熏籠煙暖碧霏微紅蠟燒殘玉漏稀連日五更風露重八蠶輕絮蚤時衣張西園先生有知已之言殁而余念之不忘見其令孫澤長於京師别後却寄遺老流風迥絶塵西園文酒十年頻公為東野忘年友僕比文通是恨人喜見孫枝頭角長愁看馬鬛嵗時新隻雞惟記回車約宿草春風又濕巾久雨茒屋漂搖裏風雷勢轉嚴林鶯過揀樹巢燕語窺簷愁卷蕉心長憐生草意纎蕭森老藤簟收取待曦炎春日釀酒夏乃大熟小飲輒醉名曰清明酒志時也春酒濃香隔舍聞風簷開盞已微曛日長方丈中庭地卧看青天萬變雲故篋中見亡友米紫來製墨松煤寒翠結輕塵舊法新傳易水真老注蟲魚成底事非人磨墨墨磨人種栁種栁樓前拂檻時春愁秋雨兩三枝天涯一種消魂樹不必人間有别離夜雨苔幽徑暗娟娟簷外流螢照濕煙行過後庭新月上半忩花影送人眠霞不盡殘陽意留情與斷紅嶺橫一窈窕山疊逺玲瓏拂樹依微靄當樓倩晚風更看芳夜月相映海雲東七月三日野宿二首晚景橫門外關山此路分蟬聲咽疏雨馬首帶殘雲籬拆秋花重溪香暮草熏城鐘夜方寂野宿幾回聞初月挂西城新秋夜色清白楊風似雨素髮暗還明山鬼欺殘夢樵人責舊盟覺時忘枕席貪聽石泉聲中秋同諸子集城南張氏園三首羇栖憐積雨池館得新晴暗水入何處歸雲行有聲幽花依晚徑髙栁向秋城同有濠梁興因知谷口情渚蒲秋更短寒色滿魚梁過雨苔妨屐回風竹礙廊禽言多晚霽蝶粉退新涼時序何遷謝吾生正渺茫題額丹青在孤亭映夕曛地連滄海月樹宿女牆雲罷酒因風急裁詩許夜分歸時泰壇路已有玉笙聞張氏園與樾阡孝廉感舊古城幽徑寫間愁裙屐依然似勝流雨過斷雲連水榭日斜疏樹隱山樓五湖别後三年月四序饒他一半秋眼底光隂罏畔酒幾人時節與同遊蚤起送王生君擢還太原霜風伺我出布被且相溫窗月白復暗壁燈明暫昏流塵空客館落木滿關門歸去情猶爾天涯安可論夢樊溪煙雲枕席未分擕五點更號三度雞不是當關呼不起迷花倚石在樊溪登樓望西山懷阮亭雲樹西來又已秋太行盡處是南州連山萬疊空回首落木千門一倚樓笛裏栁梅渾欲動鏡中霜雪浩難收玉珂接近朝天客日日金門半日留至日陪祀同王阮亭靈祐宫蚤起懷彭羡門顛倒衣裳夜杳冥暗忩微火似秋螢迢遙曉漏聲猶在斷續寒衾夢未醒鳥宿多時翻落月馬行幾點傍殘星相逢鸞鶴朝真去回首紅塵眼共青乙亥除夕同樾阡孝廉虞針郎君程三蒼崕孔大雲岫竇大在兹舍弟與可兒子豫朋壯履猶子觀顒復剛守嵗雪晴風緊嵗云徂櫪馬林鴉興不孤人靜千門空爆火天回午夜一屠蘇貧休送鬼驚吾老悶可藏􅍐與客娛已賣癡呆看利市盡拈錢付酒家壚除夜次樾阡韻二首莫歎天涯行路難年年書劍報平安文章鎖院三錢筆京雒春風十里鞍白髮相逢人似舊青松不忘嵗常寒坐中竹柏盈盈酒黃色天庭取次看煙煤兩版不曽除老屋東頭是敝廬蝸舍氷霜今夜少兔園燈火十年餘才名閲世誰如子肝膽逢人為起豫更有膝前文度美即看軒蓋擁門閭丙子元日立春次廖虞針上舍韻晴光淑氣兩無涯元朔王春感嵗華上日相隨青帝駕新年一到玉皇家所居近玉皇觀天真省事知憐老客有登歌敢拜嘉共道五辛風味好堆盤紅縷間椒花東坡元日立春詩省事東風厭兩回春夜寒甚與樾阡飲酒戲作二首甚矣吾衰及此時鶯花相避意差池書空咄咄非殷浩自喜沾沾過魏其紅蠟似消春後凍青陽不染鬢邊絲無多酌我聊相勸泛溢東風在一巵碧落風多颭酒旗金波新漾影娥池杓將寅指知春蚤參欲昏中問夜其厭事朝來似犀首亡何日飲學爰絲與君細忖人間世判斷間愁付濁巵疊虞針元日立春韻頌椒剪綵亦生涯春日新年送物華北極朝元還卧閣東村迎氣記山家辛盤青韭來河朔小宴黃柑擘永嘉應見泰階多勝事和風先報曲江花次韻薑西溟孝廉見贈生日詩二首名髙萬丈焰生光自忖才如襪線長四海君才多武庫六星天意一文昌幾逢李蔡虛東閣每訝彭宣到後堂為報鎖廳春日近梅花三候發巖廊名在金鑾學士坡三條紅燭照春多君以史職試春官晉音亦自知師曠楚璞今當識卞和老去東華同載筆時來南陌羡鳴珂相思勿憚寒廳宿愁月凄風奈樂何人日絶炊戲簡樾阡絶炊人日有風情辟榖年來道欲成杯渌乾停傳坐酒突煙冷稱膠牙餳蛙蛇幾度為家口雞犬連朝過夏正笑煞青春慳一飽朱門空鎖五侯鯖樾阡不和人日詩送酒一壺以促之春來飢火共相燒何事清齋坐寂寥九食三旬應漫浪元正人日並蕭條蓴羹誰可加鹽䜴菜把空煩送柏椒淡淡茶湯薄薄酒讓他粱肉過今朝蚤春簡羡門少宰彈鋏相從少壯遊班荆斜日玉山秋春風幾度過燕市明月依然在薊樓八代文章官吏部漢朝經術爵通候與君小别朝元會每誦新詩斷舊愁元日公誦新詩示子題翁康飴為敦復尚書畫龍眠山林圖二首寥落樊川杜牧之秦城煙樹逺參差如何得似舒州老管領雲山弔伯時畫手詩人逺擅場龍眠巖壑輞川莊依然居士風流在猶見丹青顧長康為雪塢禪人題董文敏書二首規橅北海姿還在跌宕吳興致亦豪屋漏斷痕叉折股何人解是郭兵曹草亭神采映當時玉匣金奩贋豈知多少書中殷鐵石到門試問永禪師過海棠院花未開作二首縹眇紅粧態未完曉鬟初整緑雲寒墨花尹白風流甚只恐輸他黑牡丹白髮逢春惱别離東皇作意遣花遲即無著雨胭脂色不到殘紅淡粉時喜晤張肅昭侍御南臺回首共簪纓忝竊銅街避路行對仗蚤知明主意回天因識直臣名歸來肝膽輸流輩别後鬚眉見老成今夜府中人似昔曉烏啼徹舊離情盤山拙菴禪人索詩二首青溝依約白毫光眇眇禪栖在上方師向中盤中處住東西南北不思量舊遊題句記吾曽欲學初禪愧老能一卷紅樓青嶂客不嫌人喚作吟僧懷盤山答拙菴布榖響春城春山寄逺情紅泉連雨曉白鳥破煙明塔影飄西塞峰雲下北平松門曽杖䇿從此想無生禹鴻臚為宫定菴通政畫其生平所歷為圖題得四首觀海市十二樓邉列五城羣仙出沒向空明蓬萊清淺麻姑老孤島斜陽萬里情登岱日觀題詩海色回人言太白是仙才朱顔長與青童笑玉女流霞蚤啖來雪中獵洪山使君千騎獵圍長雪夜風流在武昌為報襄陽蓍舊語呼鷹臺上笑劉郎春宴黃鶴樓黃鶴磯前緑草生遙連漢水鴨頭平蒲桃醱醅春酒熟應似春江春水清衡素虞針試國子皆第一玉膾金虀憶故鄉機雲入洛有輝光併將海日江春句寫入燕公政事堂午亭文編卷十六
