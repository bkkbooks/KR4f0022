body:
  text: 午亭文編巻二十三大學士陳廷敬撰雜著家氏鉉翁原夏正辨春秋自左氏言周正歴戰國秦及漢諸儒以專經名家至魏晉隋唐五代之季千七八百年並無異義焉中間惟榖梁解烝祭曰烝冬祭春興之志不時也似以春為建寅之月亦未顯言之陸淳氏祖述啖趙氏始徃徃習攻左氏務與為異然亦未有夏正之説也逮宋儒始有三代改正朔不改時月之説於是劉敞氏胡安國氏陳傳良氏諸人競為新意顓信已見不顧聖經而夏正之説紛然至不可窮詰矣家氏鉉翁為原夏正張皇其辭後之附㑹者若程端學氏俞皐氏衆矣然亦時相牴牾不能自守其説大抵家氏為尤辨有害經意今摉採諸家説與左氏同者而裁以已意與辨之家氏曰寅夘辰為春寅為嵗首此百王不易之正也虞夏而上春首寅嵗首寅天時王正兩得其正自商人以建丑為嵗首周人復以建子為嵗首而百王之正與二代之嵗首始判為二夫子行夏之時欲正與時皆以寅為首革二代之嵗首而從百王不易之正此夫子平日之志故筆之於春秋曰元年春又曰王正月春之下著正以見天時在是王正在是垂萬世不刋之法也又曰周雖建子為嵗首不過發號施令自此而始而所以揆時授功者夏時夏正也彼謂以建子首十一月者左氏之誤也彼謂變易四時以子丑寅為春夘辰已為夏午未申為秋酉戌亥為冬者孔安國鄭康成之大誤也嵗首者特以發號施令而正月則以紀年授時嵗首可改而正月不可改也愚按嵗首者嵗之首一月也孔子謂行夏之時不謂行夏之嵗首春夏秋冬謂之時若商周止以丑子月為嵗首而不以為春是本不改時也既不改時是時仍夏之時也孔子又何必曰行夏之時乎若不過以嵗首發號施令而已春夏秋冬十二月次一無改易則是所闗於政治得失之數天時人事後先緩急之宜尤非其最要者而孔子必曰行夏之時不太鄭重矣乎周禮正月之吉始和布治於邦國都鄙乃縣治象之法於象魏使萬民觀治象挾日而歛之如家氏之説則此正月是夏之正月既以其時布治於邦國都鄙矣而所謂嵗首發號施令自此而始者其又所發者何號所施者何令乎號令之大者無過於治象之法今既以夏正月布之於邦國都鄙矣則是嵗首更無號令之發施冺然都無所事而周人姑為此無用之虚名而已無用之虛名周人何所取焉孔子何必欲正焉周禮小宰正嵗率治官之屬而觀治象之法鄭康成注云正嵗謂夏之正月得四時之正以出教令盖周建子之月既布治於邦國都鄙而於建寅之正嵗小宰乃帥治官之屬觀治象之法是正月者周正月正嵗者夏正月也家氏豈知此義乎又按張氏洽云此所謂春乃建子月冬至陽氣萌生在三統為天統盖天統以氣為主故月之建子即以為春而丑寅之氣皆天之所以生劉歆云三統者天施地化人事之紀天施周正建子也地化商正建丑也人事之紀夏正建寅之謂也聖人雖欲行夏之時而春秋因史作經方尊周以一天下豈遽改其正朔哉又按曹魏明帝景初元年有司言魏得地統宜以建丑之月為正三月定歴改年為孟夏四月改太和歴曰景初歴其春夏秋冬孟仲季月雖與正嵗不同至於郊祀迎氣礿祠烝嘗巡狩蒐田分至啓閉班宣時令中氣早晩敬授民事皆以正嵗斗建為歴數之序齊王芳復用夏正以建寅之月為正始元年正月以建丑月為後十月於此益知魏承漢後改時改月漢有定制傳之自古魏人知之最明故踵而行之初不以為異也後人以史記漢冬十月為不改時月之證若漢初不改時月魏有司何縁得請以建丑之月為正而魏之君臣頗皆涉學慕古又何縁定歴改年以三月為孟夏四月乎家氏不徵信於古而以耳食之説逞其臆見可謂愚而自用者矣家氏曰書伊訓元祀十有二月乙丑伊尹奉嗣王祗見厥祖太甲中篇三祀十有二月朔伊尹奉嗣王歸於亳此十二月乃商家之嵗首而但謂之十二月以見商家雖以建丑為嵗首未嘗改十二月為正月也按趙氏汸云漢書律歴志據三統厯商十二月乙丑朔旦冬至即書伊訓篇太甲元年十有二月乙丑伊尹祀於先王以冬至越茀行事其所引書辭有序皆與偽孔書伊訓篇語意不合且言日不言朔又不言即位則事在即位後矣凡新君即位必先朝廟見祖而後正君臣之禮今即位後未踰月復祠於先王以嗣王見祖此何禮也暨三祀十有二月朔奉嗣王歸于亳是日宜見祖而不見又何也所謂古文尚書者掇拾附會不合於經盖如此説者乃欲案之以證殷周不改月可乎又言後九十五嵗十二月甲申朔旦冬至無餘分春秋歴周文王四十二年十二月丁丑朔旦冬至後八嵗為武王伐紂克殷之嵗二月己丑晦大寒閏月庚寅朔三月二日庚申驚蟄周公攝政五年正月丁巳朔旦冬至禮記孟獻子亦曰正月日至七月日至其説皆與傳合夫冬至在商之十二月在周之正月大寒在周之二月驚蟄在三月夏至在七月而太初歴其在立冬小雪則曰於夏為十月商為十一月周為十二月唐人大衍歴追算春秋冬至亦皆在正月孰謂殷周不改月乎陳寵曰陽氣始萌有蘭射干芸茘之應天以為正周以為春陽氣上通雉雊雞乳地以為正殷以為春陽氣已至天地已交萬物皆正蟄蟲始振人以為正夏以為春盖天施於子地化於丑人生於寅三陽雖有微著三正皆可言春此亦歴家相承之説所謂夏數得天以其最適四時之中爾孰謂建子非春乎家氏曰臨卦之彖辭曰元亨利貞至於八月有凶指觀而言也臨二陽四隂之卦直十二月觀四隂二陽之卦直八月盖自今年十二月指明年八月而言當二陽之浸長豫憂四隂之將盛以臨觀相為反對云爾是時商人以丑為嵗首而文王之彖惟從夏正此商家月次不易之明證也按張氏以寧云本義之説以八月為自復卦一陽之月至遯卦二隂之月隂長陽遯之時又謂此為建酉之八月為觀亦臨之反對兩從其説而不決前説從何氏周正也後説從褚氏夏正也復之彖曰七日來復是自夏正五月一隂長數至夏正十一月一陽來復日屬陽故陽稱七日扶之欲其亟長也於七月詩一之日二之日三之日四之日即此義也今臨之彖曰八月有凶是自夏正十二月二陽長數至夏正七月二隂長月屬隂故隂稱八月抑之欲其難長也盖復彖自復數起為七日矣則臨卦當自臨數起不當又自復數起當自夏十二月數起不當自夏十一月數起若自臨卦夏十二月數起則自臨至遯為夏之六月僅得七月不可言八月有凶若自臨卦夏十二月數起則自臨至觀為夏正之八月又九閲月不可言八月有凶今自夏十二月數起至夏正之建申七月恰是八月於時為商正之八月也於卦為否三隂長而陽消故其彖曰否之匪人不利君子貞天地不交萬物不通其凶甚矣非若遯猶有厲而觀絶無凶也而况否之彖曰小人道長君子道消而臨於八月有凶之傳曰消不久也正指否卦而言至為明白今若以為遯是文王而用周正也以為觀是文王而用夏正也文王作爻辭時為商西伯為商之臣用商之正復何疑乎若為商之臣而用周正是僣號稱王而改商正朔大不可也為商之臣而用夏正是不奉時王正朔而用異代正朔亦不可也孔氏從漢諸儒之説是矣近時儒者陸山李氏舜臣亦有謂文王演易時猶為西伯安有未代商已用周正此固不攻而自破是矣而又謂臨於月為丑乃商人之正文王逆知盛衰消長之數寄之於易謂今雖盛大臨人之勢後且有終凶必然之理為萬世戒其意微矣愚恐聖人正大寛厚之心不如是也且宋代諸儒極辨文王未嘗稱王而猶為此論故愚極辨文王奉殷正朔以服事殷之為至徳者焉家氏曰周書泰誓一月戊午師渡孟津武成一月旁死魄一月者建寅之正月也春大會於孟津者夏時孟春建寅之月也不言正月而言一月者先儒謂商人建丑為嵗首故避正之名而謂之一月理或然也孔氏乃以一月為建子之月其意以為三代改正朔必改月數改月數必以其正為四時之首夫豈知改正朔者不過更其嵗首春夏秋冬可得而變易乎十二月次可得而紊乎按漢書律厯志云師初發以殷十一月戊子日在析木箕五度月在房五度後三日得周正月辛夘朔合辰在斗前一度斗柄也故傳曰辰在斗柄明日壬辰晨星始見癸已武王始發戊午度於孟津孟津去周九百里師行三十里故三十一日而度明日己未冬至晨星與婺女伏歴建星及牽牛至於婺女天黿之首盖志謂戊子者夏正亥十月之戊子而明言殷十一月後三日辛夘朔者夏正之子十一月商正之十二月而明言周正月戊子至戊午三十一日明日己未冬至周正月之二十九日夏正之十一月也冬至以十一月周以冬至子月為正月又何疑乎又按律厯志引周書武成篇云惟一月壬辰旁死霸孟康曰月二日以徃月生魄死故言死魄魄月質也師古曰霸古魄字同若翌日癸巳武王乃朝步自周于征伐紂序曰一月戊午師度于孟津至庚申二月朔日也四日癸亥至牧壄夜陳甲子昧爽而合矣故外傳曰王以二月癸亥夜陳武成篇云粤若來三月既死霸五日甲子咸劉商王紂是嵗也閏數餘十八正大寒中在周二月己丑晦明日閏月庚寅朔三月二日庚申驚蟄四月己丑朔死霸死霸朔也生霸望也是月甲辰望乙巳旁之故武成篇云惟四月既旁生霸越六月庚戌武王燎于周廟翌日辛亥祀于天位粤五月乙卯乃以庶國祀馘於周廟志所引書顔師古以為今文尚書而孔頴達謂偽書然其日月與今泰誓武成同而皆以一月為周之正月家氏未之詳考而直以謂夏時孟春建寅之月其謬甚矣張氏以寧辨此最詳而又引書所言與周正合者甚衆如金縢秋大熟未穫天大雷電以風禾則盡偃云云嵗則大熟謂豳風夏正云八月其穫則此云秋者周正七月也八月雷收聲雷電以風為七月也後言嵗則大熟指十月也何以知其為十月豳風七月之詩曰十月納禾稼黍稷重穋禾麻菽麥朱子集傳以為自田而納於場者無所不備則禾稼總五榖而言也五榖皆􅌻為有年故書之曰嵗則大熟猶春秋並書麥禾也禾該五榖而言也五榖咸不熟為饑嵗故書之曰冬大無麥禾盖周以十一月為嵗首十月為嵗終㑹計嵗事皆於十月以是知其為十月也此篇春秋不書月以七月於夏周皆秋無俟乎書月春秋書冬不書月以十月於夏商皆冬亦無俟乎書月也然則此篇之秋大􅌻亦周時也召誥惟二月既望越六日乙未王朝步自周則至于豐惟太保先周公相宅越若來三月惟丙午朏越三日戊申太保朝至于洛卜宅厥既得卜則經營越三日庚戌太保乃以庶殷攻位于洛汭越五日甲寅位成若翼日乙卯云云越三日丁巳云云越七日甲子云云謂此言周之三月為農時是夏之正月也則二月既望為夏之十二月也與小明詩二月初吉同也二月不繫之時者二月於周非春也洛誥曰惟三月哉生魄周公初基作新大邑於東國洛舊脱簡在康誥先儒定為洛誥文今從之予惟乙卯朝至于洛師戊辰王在新邑烝祭嵗文王騂牛一武王騂牛一王命周公後作冊逸誥在十有二月謂律厯志是嵗十二月戊辰晦周公以反政故洛誥篇曰戊辰王在新邑烝祭嵗命作冊惟周公誕保文武受命惟七年周十二月夏十月也周以十一月改正月為嵗首故曰烝祭嵗孔説是也冬祭曰烝此月烝祭者趙匡曰四時之祭皆夏時也篇首惟三月夏之正月也不繫之時多士篇惟三月周公初于新邑洛多方篇惟五月丁亥王來自奄至于宗周謂二篇皆周月也多方五月不繫之夏者五月於周非夏也顧命惟四月哉生魄王不懌甲子云云越翼日乙丑云云丁夘命作冊度越七日癸酉云云謂金縢書時不言月召誥洛誥多士多方顧命書月日不書時盖周以子月為正於夏正有兩月之不同夏正自前代行於民間已久而正月正嵗又自有參差之不齊故於時月日之書皆不相繫以一臣民之耳目視聽使之不惑此周一代書法也厥後魯公費誓甲戌我惟征徐戎甲戌我惟築猶周之書法見魯用周正朔也畢命惟十有二年六月庚午月越三日壬申王朝步自宗周至于豐以成周之衆命畢公保釐東郊謂漢律厯志言康王十二年六月戊辰朔三日庚午故畢命豐刑曰惟十有二年六月戊辰朔三日庚午朏王命作䇿豐刑孟康注曰逸書篇名漢儒未曽見今畢命也今畢命篇首年月日皆備與周史官書法見於伏生口受者異非特文章體製氣象之不同此所以為孔壁後出之書也以上並因張氏原文凡此皆家氏所未能及故備録焉至所謂春秋冬夏不可得而易十二月次不可得而紊誠有是理矣然使春秋冬夏果不易十二月次果不紊則夫子亦無為貴行夏之時矣按黄氏澤云商周本是錯改時錯改月但學者不肯為商周認錯若肯為商周認錯則經㫖自然明白矣家氏曰詩豳風七月流火九月授衣者夏時也小雅北伐四月維夏六月徂暑等詩與周頌臣工維莫之春者皆夏時也臣工之詩乃諸侯助祭及莫春遣之歸國告戒之辭也曰維莫之春亦又何求如何新畬於皇來牟將受厥明言莫春則當治耕作之事牟麥將熟可以受上帝之明賜夫牟麥將熟則建辰之月夏正之季春也而鄭氏箋詩乃指周之暮春為夏之孟夏則四時為之易位其舛豈不甚乎按豳風之詩周公陳后稷先公風化之所由也后稷虞夏之際封於邰及公劉能復修后稷之業遷於豳今作詩追述前烈而記以先代之時月豈得取以為周因夏時之證乎况詩所云一之日觱發二之日栗烈三之日于耜四之日舉趾則又明言周正矣一之日毛氏所謂十之餘盖十又一月建子之月周之正月也二之日建丑之月周之二月也三之日建寅之月周之三月也四之日建夘之月周之四月也若謂周不改月數何得有此一二三四月之名乎既以建子為一月而又有二三四月之名則不得仍以子為十一月丑為十二月寅為正月夘為二月矣此乃事理之顯然無足深辨者而家氏不察何與北伐之詩六月栖栖戎車既飭按張氏以寧云周六月夏四月也盛暑非玁狁入冦時也四月之詩四月維夏六月徂暑秋日淒凄百卉具腓冬日烈烈飄風發發按張氏以寧云周之四月夏二月也春秋王正月朱子以為周改正月為春則此二月為夏矣周之六月夏四月也徂暑者言自此而徃以至於盛暑也詩曰我徂惟求定曰我徂東山曰自我徂矣三嵗食貧曰我征徂西書曰攸徂之民室家相慶皆自此徃彼之辭今若以徂暑為暑徃則豳風夏正之七月大火始西流而暑猶未退不可以為夏六月而暑已徃也以為暑自此而徃則夏六月為季夏非暑自此而徃於盛也進退兩無所當故知此詩周月也朱子集傳曰凄凄凉風也卉草腓病也禮記月令曰孟秋凉風至天地始肅漢書律厯志曰隂氣夷當傷之物夷則位於申在七月則秋日淒淒百卉具腓指夏七月也孟子曰秋陽以暴之集注曰秋日燥烈也月令仲秋之月盲風至注盲風疾風也朱子集傳亦曰發發疾貌則冬日烈烈飄風發發指夏八月也然則此詩之秋冬亦周時也臣工之詩嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鏄奄觀銍艾按張氏以寧云蔡氏書傳引此以為牟麥將􅌻其為季春可知今考之於全篇則其曰如何新畬命我衆人庤乃錢鎛即七月之詩曰三之日于耜四之日舉趾周官遂大夫正嵗簡稼器謂耒耜鎡基之屬修稼政謂修封疆相丘陵原隰皆孟春之事嗟嗟保介即月令孟春之月天子祈榖於上帝載耒耜措之於保介之御間帥三公九卿諸侯大夫躬耕帝耤之事也若待建辰之三月始治新畬始庤錢鏄不亦晩乎非夏之季春明矣若但以來牟將受厥明為三月則詩曰將受厥明不曰將熟夫麥種於今之八月長於三春月至四月而始登五月而盡刈周都闗右地尤髙寒而將之云者未為而預言未至而預期之辭詩人之言緩而不迫似難以一句盖全篇而定其為夏之三月也朱子以此篇為戒農官之詩引月令吕覽皆為藉田而言竊因是説以為此詩乃孟春祈榖上帝躬耕藉田而戒農官也麥為五榖之中續食之最重者孟春之時三陽動麥已生長是以祈榖之辭先言將受來牟之明賜繼之以迄用康年而終之以奄觀銍艾祈之明神欲五榖之皆􅌻故並言之猶春秋書麥禾於冬以該五榖之義也若以來牟將熟為春三月則冬十月非麥熟之時不得言無麥矣盖春秋並書麥禾於終而著五榖之大無此詩並言來牟銍艾於始而期五榖之大有然則將受厥明乃期之之辭非即時賦物之比不可以文害辭也而此詩為周季春夏之孟春也明矣愚謂張氏之説當矣然詩人之辭引物連類不同記事如豳風之詩兼用夏月周月而又或引楚辭攝提貞於孟陬悲哉秋之為氣以證夏正者亦何足辨哉家氏曰周官冬日至祀圜丘夏日至祀方澤季春出火季秋納火仲夏斬隂木仲冬斬陽木皆指夏時而言也凌人掌冰正嵗十二月令斬冰傳者云夏正十二月今之季冬也若以為周正十二月今之孟冬水始凍冰未及堅冰可藏乎内宰仲春詔内外命婦始蠶夏仲春也若以為周之仲春今十二月而可蠶乎天官正月始和布治於邦國都鄙者亦夏正正月也而傳乃以為周正建子月此一時而從周從夏之不同其實正月布治者亦夏正月也又如禮記月令一篇純用夏正者也按冬日至祀圜丘夏日至祀方澤及出火納火諸事皆用夏正者周禮有正月正嵗若此類皆所謂正嵗者也禮記月令皆用夏正亦周禮正嵗之義是以朱子有云據周禮有正嵗正月則周實是元改作春正月盖此正可以證周正之實不可舉以為夏正之騐也家氏曰雜記載孟獻子之言曰正月日至可以有事於帝七月日至可以有事於祖此一節乃漢儒記禮者傳聞之誤古有冬日至夏日至者未聞有春日至秋日至者也今指周正建子為春為正是春而日至也其可乎又指周正建午為秋為七月是秋而日至也其可乎二至既舛二分亦隨之而舛必將以夏正十二月半為春分六月半為秋分隂陽可得中乎寒暑可得平乎按家氏此論則是自攻其説矣獻子言正月日至不言十一月日至言七月日至不言五月日至家氏明知其説之非是而雜記之言不易叛也故移其咎於漢儒記禮者適足以彰其陋而已矣至於分至啓閉則周禮正嵗之説禮記月令之文可以得其義也而豈慮其或舛乎按趙氏汸云傳於僖公五年春記正月辛亥朔日南至昭十七年夏六月記太史曰在此月也日過分而未至當夏四月是謂孟夏又記梓慎曰火出於夏為三月於商為四月於周為五月皆以周人改時改月春夏秋冬之序則循周正分至啓閉之候則仍夏時趙氏之説得其義矣家氏曰汲冡書周月解時解訓等篇四時中節大率與月令相似且其言曰夏數得天百王所同亦越我周作正以垂三統至於敬授人時巡狩烝享猶自夏焉又有嘗麥解曰成王四年孟夏初謁宗廟乃嘗麥於太祖若以夘月為孟夏安有麥可嘗乎按汲冡書雖不可為據依然明言周家作正以垂三統而家氏則以為周不改時月明言敬授人時巡狩烝享猶自夏時而家氏則凡若此類輙據以為夏正之證何其説之自相矛盾耶至成王即位四年初謁宗廟事不見於經傳嘗麥之解不足深論也家氏曰又如魯論曽點舍瑟一章所謂暮春者亦可指為夏正之正月乎今之正月寒意猶凛既非春服可成之候其浴其風皆不當在此時則此暮春非夏時而何按此乃一時問對之語記者筆之於書當時文章論議民俗話言風謡傳播猶多因夏正如今人稱官爵州郡猶承用古時名目者然未可執是以為確證也家氏曰孟子十一月徒杠成十二月輿梁成云者本言修治橋梁必在冬深水涸之時徒杠十一月可成澗水先涸也輿梁必十二月乃成河水後涸至是時乃可施工云耳傳者引夏令為證則非本㫖按朱子集注曰周十一月夏九月也周十二月夏十月也夏令曰十月成梁而家氏强為之辭其悖甚矣家氏曰河南程先生謂春秋假天時立義有夏時冠周月之説胡文定祖述其説一以夏時周月為㫁時夏時則寅夘辰為春月周月則子為嵗首時自時月自月不相為謀夫子春王正月之意果若是乎嘗竊觀程子之意似謂夫子以夏時冠周月以見行夏時之意但春秋有年之下書時而紀事者如隠二年春公㑹戎于潛之類自舊已然盖史失其月僅著其時而春秋因之耳聖人之意正謂周家以建子為嵗首降而至於衰世王正不修歴紀廢壊民聽惶惑有以冬為春以春為夏者如絳縣之年虢童之謡百姓於二代之正莫知所從故修春秋行夏時以正之今以為夫子冠以夏時猶存正月豈不然與按趙氏汸云何氏哀十四年傳注曰河陽冬言狩獲麟春言狩者盖據魯變周之春以為冬去周之正而行夏之時以行夏之時説春秋葢昉於此然何氏固以建子為周之春但疑周不當狩而妄為之辭至程子門人劉質夫則曰周正月非春也假天時以立義爾則遂疑建子不當言春此胡氏夏時冠周月之説所從出也家氏亦知夏時冠月之非而特以其言出於程子之門不敢直斥之而欲為之委曲回䕶其説益支離而難通矣家氏曰自左傳一失以春王正月為周王正月孔鄭再失以周正説詩傳書杜元凱三失撰為長厯以從左傳之譌而厯法有未易知者故依違而不敢議而不知厯務遷就以求其合改易閏餘求合周正卒不得合毎為之遁辭曰此經誤也此厯誤也按漢書律厯志援据三統歴春秋歴殷歴而其言冬至也在周正月丁巳朔旦漢書豈皆遷就以求合者乎今謂杜氏撰長厯以求附㑹左氏若三統歴春秋歴殷歴亦漢人偽造以附會漢書者乎唐人大衍歴春秋冬至亦在正月豈唐人亦附㑹長厯者乎至又訾長厯置閏不合古術家氏亦未嘗知歴者則亦臆説而已矣家氏曰左氏自不能固守周正之説每雜引周夏正以揆一時之事而杜氏曲為説以通之隠三年左傳云四月鄭祭足帥師取温之麥秋又取成周之禾夏之言麥秋之言禾其為夏時固宜而杜氏乃以此四月為周之四月以此秋為周之夏按杜氏謂芟踐之或曰因圉牧用耳理當然也家氏曰晉伐虢圍上陽問之卜偃曰吾其濟乎對曰童謡云云其九月十月之交乎冬十二月丙子朔晉滅虢左傳以周正紀事卜偃以夏正釋童謡從左傳乎從卜偃乎卜偃生於當時世典晉卜若周家以建子為正月卜偃何為以十二月為夏正之十月乎按卜偃之語亦言天者以夏正之義也何足辨歟家氏曰絳縣老人云臣生之嵗正月甲子朔四百四十五甲子矣師曠士文伯以嵗考之定為七十三嵗老人盖生於魯文公十一年夏正建寅之正月朔是襄公二十九年夏正十二月為二萬六千六百六十日為嵗七十三藉令老人隠者誤舉夏正師曠士文伯博極精詣不當與之俱誤周家以建子為正而二子以夏正計老人始生之嵗必無是也按張氏以寧云當是年夏正正月之癸未今傳書在三月則周之三月夏之正月也又云人習見夏時之久與人話言不舉夏正以明之則無以見是月之為周正也家氏曰莊二十五年六月辛未朔日有食之鼔用牲于社左傳云惟正陽之月慝未作日有食之用幣伐鼓則以是月非正陽之月不當用正陽之禮故經以是為譏爾夫既非正陽之月則是月乃夏正之六月奚疑杜元凱求以通周正之説乃曰以長厯推此六月朔乃七月朔置閏失所以致月錯此借厯法之不可知者以為遁辭非經意亦非左傳所以立例之本意按長厯以為置閏失所此或當然若謂此借厯法之不可知者以為遁辭夫厯法家氏所不知而世之知之者多矣杜氏豈敢以此欺天下後世之人哉家氏曰又如城築興作之事左氏一以周正為㫁宣八年十月城平陽傳曰書時也夫以水昬正為興作之候者傳例也以周正而言此十月乃夏正之八月時北方七星何由昬正而左氏乃以城平陽為得時而書則十月乃夏正而非周正亦明矣按城平陽書時者經實不書月左傳必當有考耳今以䝉上十月之文而責之非矣家氏曰請即經之正文而槩論之冬而烝禮之常也春秋常事不書桓八年正月書烝五月又書烝再書之以譏烝之不以時榖梁子似亦知聖人行夏時之説其言曰烝冬事也而春興之夏又興之春秋所以譏胡文定又引周官大司馬仲冬田而烝者以證正月為建子月其可哉周禮仲冬固是夏時十一月十一月而田維其時矣十一月而烝亦其時矣而春秋之正月乃夏時之正月正月而書烝謂其過時而書豈得反以周禮仲冬之田而證春秋正月之烝必指春秋正月為周正建子月謂春秋以一嵗再烝而書不以不時而書若然則春秋夏五月一書烝以譏不時可也正月之烝既得其時又何以書為哉按桓八年正月己夘烝陸氏淳云公羊曰譏亟也啖子曰此書之以彰下文爾非譏也榖梁曰烝冬事也春興之志不時也趙子曰正月之烝不失時也經為五月又烝故書此以明一嵗再烝若不書即似春有故不烝夏乃烝耳啖説是也孫氏覺云春秋之正月夏時之十一月也十一月烝之時也得時而祭又書之者為夏五月烝張本也不書正月之烝無以見又烝之失故先書之以示其數程子云冬烝非過也書之以見五月又烝為非禮之甚也又曰正月烝矣而非時復書者必以前烝為不備也黷亂甚矣黄氏仲炎云烝用建亥之月故傳曰閉蟄而烝今烝用建子不及時矣不及時則為怠正月己夘烝是也亟舉則為黷夏五月丁丑烝是也趙氏汸曰周雖以建子為正至於祭祀則用夏時本月愚謂胡氏傳言榖梁以為烝冬事也春興之志不時也是以閉蟄而烝為是與周制異矣春秋非以不時志也為再烝見黷書也胡氏此論最明又合諸説觀之家氏之非自見矣家氏曰桓十四年辛未御廪災乙亥嘗八月而嘗時也常事不書此所以書為御廪災甫三日而嘗所以譏爾御廪者粢盛之所藏今而告災不知戒懼且不易粢盛而嘗春秋是以譏公榖二傳皆同而孫泰山胡文定乃謂此八月乃周正之八月周正之八月乃夏正之六月六月而嘗不時所以書失春秋繼災書嘗示警之意矣夫烝之不時者以為時嘗之時者以為不時不過以證夏時冠月周正紀事之説而非夫子平日行夏時志也按譏不時非獨孫氏胡氏説也孫氏覺云春秋之八月夏時之六月而嘗不時也御廪災而嘗不時且不敬也葉氏夢得云嘗秋事建未之月嘗失時也張氏洽云祭祀用夏時此八月乃夏之六月未當時祭何為汲汲然以四日之間遽舉嘗祭乎趙氏鵬飛云六月稼未登場安得新而嘗之以陳為新非所謂嘗也故書之著不時而紊先典也觀此知家氏謂此八月為夏正之八月者非矣家氏曰且以春秋所書寒暑災變而言於夏時大槩可通其不可通者小有疑而未定焉耳隠九年三月癸酉大雨震電庚辰大雨雪記異也震電非異震電而雪所以為異按公羊云記異也何異爾不時也何氏云三月夏之正月雨當冰雪雜下雷當聞於地中其雉雊電未可見而大雨震電此陽氣大失其節范氏曰劉向謂雷未可以出電未可以見雷電既以出見則雪不當復降皆失節也孫氏復云周之三月夏之正月也未當大雨震電既大雨震電又不當大雨雪甚哉八月之間天變若此也孫氏覺云周之三月夏之正月陽氣尚微雷未當出電未當見既已雷電則雪不當降大者非常之辭春秋常事不書大惟非常則加大以别之程子云隂陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其説不達其理故所言多妄三月大雨震電不時災也大雨雪非常為大亦災也葉氏夢得云大雨震電不書此何以書不時也建寅之月未雨雨水而大雨雷未發聲而震電又云大雨雪不書此何以書不時也建寅之月也趙氏鵬飛云陽極而大震電隂極而大雨雪大雨必於夏大雪必於冬隂陽之運然也今於正月而兼冬夏之電雪天變甚矣黄氏仲炎云周之三月夏之正月也陽氣未力而震電若盛陽之月雷雨既動而雨雪若凝隂之時况大而非常則隂陽之錯繆甚矣汪氏克寛云或謂春秋用夏正故建辰之月雨雪為異茍實建辰之月則震電未必書矣愚謂家氏以為震電非異謂夏正三月也震電而雪所以為異謂三月無雪也且家氏不聞三月雪乎陋可知矣家氏曰僖十年冬大雨雪書冬不書月且加以大字記是冬寒氣大盛屢雪之為災耳若以此冬為八月九月是時秋氣始肅餘暑未艾安有連三月之雨雪乎按葉氏夢得云大雨雪不志此何以志建酉建戌建亥之月書不時也趙氏鵬飛云周之冬夏之秋非大雪之時而大雪常寒之謂也洪範曰聽之不聰是謂不謀厥罰常寒則大雪非茍記異所以責時君不能建皇極也黄氏仲炎云雨雪常也惟大而為害故書獨桓八年雨雪不言大者周之十月今之八月非雨雪之時故以異書也俞氏臯云春秋之冬今之秋八月九月冬十月也此亦紀其非常故書家氏謂秋氣始肅餘暑未艾豈十月而猶可謂餘暑未艾乎亦不思之甚矣家氏曰僖三十三年十二月隕霜不殺草李梅實嚴霜不殺草氣燠也若謂此十二月為建亥月則夏時之十月草不盡殺猶或有之春秋何以遽書為災乎竊詳經文十二月乙巳公薨之下書隕霜不殺草李梅實此於嵗終併書一冬之異非專為此月書也杜氏以其長厯而推謂此十二月乃周之十一月今九月也指此為舊史記録之誤春秋因之九月之霜不能殺草猶未足為異春秋何以動色而書之曰隕霜不殺草李梅實乎此夏正之冬何疑按孔氏頴達云隕霜不殺草李梅實此在十二月下杜以長厯挍之乙巳是十一月十二日謂經十二月為誤遂以此經四事皆為十一月夏之九月霜不應重重又不能殺草所以為災也何氏云周之十二月夏之十月也易中孚記曰隂假陽威之應也早霣霜而不殺萬物至當霣霜之時根生之物復榮不死斯陽假與隂威隂威列索故陽自霣霜而反不能殺也孫氏覺云春秋之十二月夏時之十月也十月隕霜而草不死李梅實皆異之大者也春秋之法為災而及於死民物者則書為異而反常者則書十月之霜草當殺而不殺十月之李梅不當實而反實天地隂陽之義非常可怪者也趙氏鵬飛云詩曰九月肅霜况十月乎宜霜威之動而無草不黄也今隕霜不殺草異之大者霜不殺草猶姦宄之不誅暴亂之不戢天之垂戒顯矣黄氏仲炎云經書隕霜二一曰隕霜不殺草一曰隕霜殺菽盖周之十二月夏之十月也霜當殺草而不殺草異也周之十月夏之八月也未當隕霜而殺菽亦異也夫杜氏以十二月為今之九月家氏疑之矣其以為十月者則諸家之説也十月隕霜不殺草李梅實豈得不為異乎以杜氏之未可從而盡黜諸家之説家氏之説可為篤論與家氏曰書無冰而皆在春以冰政不舉而書耳詩七月二之日鑿冰沖沖謂十二月取冰三之日納于凌隂謂正月藏冰四之日其早獻羔祭韭謂二月開冰周禮藏冰開冰與之略同春秋於桓十四年春正月成元年春二月襄二十八年春三月書無冰皆為冰政不舉書以譏之耳按桓十四年春正月無冰何氏云周之正月夏之十一月法當堅冰無冰者温也此夫人淫佚隂而陽行之所致榖梁云無冰時燠也范氏云皆君不明去就政治紓緩之所致五行傳曰視之不明是謂不哲厥咎舒厥罰常燠孫氏覺云春秋之春夏時之冬也冬而無冰則為陽氣不閟而隂氣不凝也張氏洽云常燠也二之日鑿冰沖沖乃周正建丑之月固隂沍寒之時而不冰隂不能成物之災趙氏鵬飛云周之正月夏之十一月凌人斬冰而藏之時而無冰焉則無以備暑矣非徒無以備暑而獻羔開冰何以薦寢廟外内饔何以供氷鑑賓客何以供膳羞夏無以頒秋無以刷其為闕禮大矣洪範庶徴曰豫恒燠若君政逸豫則恒燠應之春秋之君勤於政者固無有也則無冰乃恒燠之應與俞氏皐云此亦見是周月紀事若夏正月則東風解凍宜無冰也汪氏克寛云此年正月書無冰成元年二月書無冰襄二十八年書春無冰則知因陽盛氣燠而隨時以紀之茍以發冰而知無冰則當常以二月而不在正月矣若曰或藏冰無冰而書無或發冰無冰而書無抑何紀事之錯亂乎趙氏汸云無冰不月終時無冰則志之周之春夏之冬也成元年春二月無冰杜氏云周二月今之十二月而無冰書冬温孔氏云襄二十八年春無冰彼春無冰則是竟無冰此亦應竟春無冰而書在二月下者以盛寒之月書之也何氏云周二月建丑之月夏之十二月也此月既是常寒之月於寒之中又如加甚常年過此無冰終無冰矣孫氏復云周之二月夏之十二月無冰冬温也書曰僣常暘若無冰常暘之應也襄二十有八年春無冰榖梁云時燠也胡氏安國云今仲冬之月燠而無冰則政治縱弛不明之所致也俞氏皐云冬温也李氏㢘云此條注杜氏明以建子為春矣諸家之説無冰彰彰如此而家氏但以冰政不舉四字了之夫冰政何以不舉乎所不舉者何政乎家氏卒不能置一辭也其陋甚矣夫家氏亦知詩有一之日二之日使周不改月縁何有此名目乎家氏曰書螽有在夏秋者為其賊苗而書有在冬者則以陽氣不斂蟄出為災耳哀十二年冬書螽十三年冬又書螽皆記異也窮冬沍寒閉蟄已久而螟蝗生焉其為異大矣左傳乃託夫子答季孫之語歸過於司厯之失閏春秋為記異而書豈為厯乎按哀十有二年冬十有二月螽杜氏云周十二月今十月是嵗應置閏而失不置雖書十二月實今之九月司厯誤一月九月之初尚温故得有螽何氏云周十二月夏之十月不當見故為異孫氏復云周之十二月夏之十月也為異之甚蘇氏轍云周之十二月夏之十月不當有螽盖失閏也故季孫問於仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也趙氏鵬飛云春秋書螽者十有八皆在夏秋之交固以為災矣然未若哀公之世書螽者二皆在於閉蟄之後閉蟄之後榖既登場螽固不能為害然其異亦甚矣禮仲秋行夏令則蟄蟲不藏孟冬行夏令則方冬不寒蟄蟲復出此則常燠之證也燠而蟄振猶有然也燠而螽生是謂災異兩興也聖人可不志之哉黄氏震云蝗蝻在地冬雪乃深入今冬燠而有螽將蔓延為來嵗之災矣十有三年十有二月螽杜氏云前年季孫雖聞仲尼之言而不正厯失閏至此年故復十二月螽實十一月何氏云周十一月夏九月日在房心房心天子明堂布政之庭於此旦見與日爭明者諸侯伐主治典法滅絶之象是後周室遂微諸侯相兼為秦所滅燔書道絶張氏洽引許氏云螽每在十二月傳以為司厯之過此歴不時不革之敝與愚嘗謂蝗蝻之生雖今之冬亦有之杜氏謂歴之失閏盖本夫子答季孫之言而逆推之以知厯之果失也亦非避冬無螽生之理而託閏以文左氏之非也家氏於此過求之以證其夏正之説至謂春秋豈為歴乎云云者文義並難通矣家氏曰莊七年秋大水無麥苗傳者謂周七月為夏五月故以無麥苗為災非也中原之地種麥最早故月令仲秋勸種麥令曰無或失時是嵗以大水之故種麥失時故曰無麥苗非謂已􅌻之麥而言也莊二十八年冬大無麥禾謂嵗終計公私所儲蓄而言不然麥􅌻在夏禾􅌻在秋何以書無麥禾於此際乎此春秋所書寒暑災變合於夏時者也外是亦有一二之疑皆可以義例而通要以不害於大體之合按莊七年秋大水無麥苗公羊傳云無苗則曷為先言無麥而後言無苗一災不書待無麥然後書無苗何以書記災也杜氏云今五月周之秋平地出水漂殺􅌻麥及五稼之苗孔氏云直言無麥苗似是麥之苗而知麥苗别者公羊傳曰曷為先言無麥而後言無苗待無麥然後書無苗如彼傳文知麥苗别也且此秋今之五月麥已􅌻矣不得方云麥之無苗故知􅌻麥及五稼之苗皆為水漂殺也孫氏復云水不潤下麥與禾黍之苗同時而死故曰無麥苗劉氏敞云曷為先言麥而後言苗麥苗同時麥成而先敗也孫氏覺云春秋之秋夏時之夏麥已大成而禾苗方盛大水之災而麥也苗也皆無也災之甚者故書之二十八年麥苗之無經書之曰大大者非常之辭麥苗之無以水災而無也災之所不及者猶有存焉不得曰大無也麥禾之無書之於一嵗之卒嵗凶而至於冬一國之内舉無收也盖大無焉不得但曰無也故無麥苗志之於秋見水災也大無麥禾志之於冬見嵗凶也春秋一字聖人必盡心無茍然者蘇氏轍云是時麥􅌻五稼苗而未秀皆為水所害也葉氏夢得云秋夏之建午建未建申之月也麥成而稻苗大水則皆敗矣故曰無凡稻苗而後秀秀而後實趙氏鵬飛云周之秋夏之五月五月麥將實而大水焉為水所厭而不實故先書大水繼書無麥苗以見災五月麥未登場不可舉其實故曰麥苗説者以麥苗為二物麥且未艾安得徒有苗此盖疑五月之際麥將實不可曰苗也不知未登場圃安得舉其實二十八年冬書大無麥禾則穀既登場圃矣故明舉其實此則麥未實為水所盡耳何疑云莊二十有八年冬大無麥禾杜氏云書於冬者五穀畢入計食不足而後書也家氏之説實本杜氏而與莊七年無麥苗並書欲以援證夏時其義亦不倫矣家氏所言春秋寒暑災變自以為合於夏時而又謂外是亦有一二之疑可以義例而通夫家氏之所不疑者學者之所疑而取信於先儒者也一二之疑者乃學者之無可疑而家氏之所終不能解者也宜乎以其披猖悠謬之言誣聖經而惑後世也吾不能不與之辨午亭文編巻二十三
