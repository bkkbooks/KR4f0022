body:
  text: 午亭文編卷十八大學士陳廷敬撰今體詩聖德萬夀詩十二首泰符運啓帝圖昌還識流虹繞電祥鳳歷紀元天並永龍飛當午日初長仙桃結子春三月御柳垂條歲萬行正是艷陽逢聖節紅雲髙捧玉罏香日暖花朝紫禁林風回青鎖漏沉沉萬幾宵旰三天事四海升平五夜心雨露恩流金闕外桑麻春長玉階隂億年齊上無疆祝總為憂勤􅜼載深聖質天齊凝寶命神霄地逈照人寰山河環拱罘罳上日月髙臨藻火間八表歡聲歌帝則萬年春色駐龍顔黃圖開拓要荒外柔逺何須閉玉關講席經函列御筵淵源盡闡魯庭傳文成偉論髙謨典詩就新篇達性天載詠光華同舜旦深明歷象定堯年仰觀俯察鳶魚妙道契羲皇一畫前丹地金鋪淑景新綺疏明淨對花茵九重清晏心無事萬卷詩書筆有神璀璨宸章懸斗極龍鸞聖藻麗星辰六文八法流傳盛光被誰能比一人龍文五色護瑶箋拜賜恩華自日邉開處春風彌宇宙捧來瑞氣出山川香含月樹枝枝秀朗照驪珠顆顆圓琬琰恭橅垂寶榻惟南同夀永留傳神威征伐久旋師灌燧銷烽正此時一自三回臨朔漠遂令萬祀靖邉陲玉鞭晝舉靈泉出金甲宵明御寢遲北斗天南回望處於今中外盡雍熙節儉皇家邁昔王聖心原為恤農桑止須制用供天府直使流膏遍下方疊見金錢蠲百萬還思玉粒自倉箱陽和到處人歡樂春日春隨日正長耕織新詩出上䦨情殷稼穡詠艱難恩添瀛海波瀾濶人到中天嵗月寬繡壤風輕飛玉燕瑶池水暖浴青鸞吳綃並寫來王㑹若木流沙總奠安黼座慈雲下碧空普天人在太和中祥刑德與唐虞並育物心將造化同丹鳳九重銜赦草金雞一夕報春風遐荒盡是康衢地處處謳歌達帝聰荷鋤倚杖野農情每聽音車為省耕瑞日早迎仙蹕上彩雲時傍翠旗生華封人進三多祝嵩嶺神傳萬歲聲江北江南長望幸五年今得見巡行虞廷威鳳喜來儀麟趾文祥福履綏曠代光榮逾鎬飲萬年祝頌叶豳詩春雲瑞雪迎三正甘雨和風順四時仰荷栽培同寸草恩深湛露近彤墀皇子練鵲桂花畫扇纓鳥多歡帶鳥仁秋林練鵲氣含春相隨阿閣丹霄地彩鳳時時欲近人一度秋風一度開仙姿信是不几才天香何事盈懷袖為是時常月殿來題杜子樊川雲水怡情圖朱坡緑水故依然小杜香名到處傳我欲逺尋無字劫當時枉自號樊川余所居一名樊川亦曽因以為别字恭和御製為考試歎應制聖謨重亷介雅化已新更豈獨司文吏能容黷貨聲人才關國是教養本皇情上體公明訓無私便有名寄僧定空喚作定空空定否有名爭得似無名空元自定何須定只是空從定後生過法華寺懷三明長老法華名最美此義暢宗風實相人猶在宗門事不空栁條春自緑花蕊曉逾紅咫尺雙林地雲山處處通久不見旵公連有噩夢詩以問之金盆月落屋梁邉麈尾多時破壁懸厭寱也曾施梵咒夢魂從不離初禪正思柏子三生樹無那桃花二月天萬事匆匆頭白盡幾回安穩曉窗眠重過萬佛寺竹院還誰在山門重可尋日斜清梵放風定落花深欲解無師智難忘有行心真空能幾許却費萬黃金夜宿野亭晤桐城相公話舊有作野宿林亭意惘然風光依約似當年相過步屧將殘夜怕說江湖未泊船杏子生仁留燕乳栁花著眼對人眠槐根不比松風夢莫遣春隂過八磚法華寺書壁塵網重重暗劫灰一時心目頓能開曾知夙世因緣事看取蓮華妙法來畫眉緑樹隂多映畫簾雕籠食宿好相兼勸君莫倚能言語人在春窗正黑甜題初祖折蘆圖廓然無聖語天然面壁還須到九年老我白頭聞道晚息機應在十年前題大士像救苦尋聲是大悲有情覺盡佛因遲浮生衆苦多難達應是從聞入定時題文殊像稽首堂堂七佛師定中女子出來遲如何七尺鬚眉客一世曾無一定時賜連瓶折枝牡丹四首癸未三月草六日八方風雨長靈芽朵朵紅雲散綵霞天意未曾私一物上陽花勝洛陽花樂天三度見花開曾惜花開老暗催草載藝香香案吏白頭驚捧賜花回鞓紅魏紫總天香蘭佩還宜薜荔裳歸去輕紗籠暖日潛溪緋襯御袍黃潛溪緋亦牡丹名也種賜花有淡緑微黃一玉版檀心故晚開膽瓶渾送倚雲栽更教分與甘泉水全戴深枝雨露來野亭作二首琉璃為地自然平何處金繩界道行岸草林花髙下態渚蒲水荇短長情莊生齊物焉知物老氏無名却有名苦為折腰辭手版誰言寵辱不須驚雲樹連天見北平幽人自此樂郊行已無緑鬢渾閒事只為青山亦有情老馬為駒還識路野花結子不知名歸來睡覺斜陽晚抖擻黃塵莽自驚曉行二首曉行青山中白露方未晞此景豈不佳荆棘牽人衣荆棘雖離離出險殊不惡回看幽蘭花無人自開落浴罷戲題二首不垢復不淨寶珠何由生盈盈浴盤水清斯濯吾纓豈因學道力陡覺生清凉灑然無熱惱身有旃檀香四月三日出城送客因以自喻戴笠乘車有舊盟相逢相送草年情踏殘草色路長在折斷栁條人未行旅興不隨春日盡野心還傍夏雲生玉瓶沽酒旗亭醉古寺斜陽卧似酲四月十一日夢中吳四默巖語金丹事因口占贈吳覺而記之桑葉桃花幾度春海山歸路渺難真憑君細囑長生訣火宅何須久住身題王方若龍竿集客散茶香鶯語頻閒披秋卷惜餘春腐儒衰晚思同調為想風流第一人獨酌郊樹下懷韓山穿花踏月有誰忙為送東風倒一觴緑草成茵榆莢小紅英掃地栁條長古祠賽雨人皆醉平壠眠雲麥半黃惆悵田園西日外年年春色老漁陽過法華寺不果題野亭壁喚起窗前幽鳥飛冶逰心事未全違三生影事輸閒客四觀華嚴落鈍機山雨曉晴開紫翠野花春盡接芳菲倦尋古寺湖邉路垂栁隂隂信馬歸獨酌二首三杯四杯濁酒一句兩句閒詩樹上落花結子竹間新筍成枝落日去如過客清風來似故人竹葉滿浮緑釀梨花勤買青春閣中紀恩詩內署恩深歲月長白麻宣出意傍徨名銜人愧文淵字衰晚身驚政事堂門館無私因主聖絲綸有喜為時康閣前五刻趨宫漏常見宵衣侍未央五月九日賜御書金畫扇御製麥秋盈野志喜詩恭紀四首宫扇親題御藻雄麥光雲淨曉浮空黃琉璃遍清凉境盡是披香殿上風桑緑柔枝輦道傍麥岐兩兩古漁陽五絃彈出中聲裏散作薰風滿帝鄉蓂階蒲萐長堯厨自有天文麗寶符底事恩光滿懷袖驚看一字一驪珠九華寶扇五雲端殿閣微凉暑未殘縱使感恩秋篋裏氷心還映玉壺寒恭和御製麥秋盈野志喜詩元韻應制清和時節見豐年麥壠盈祥氣候全並是兩岐兼九穗不論南陌與東阡三秋民樂同豳雅五色天文上御箋常記占星看礎潤夜深行遍玉階甎五月十二日賜觀御製南巡詩卷恭紀二十韻鳳紀天長久龍飛日正中萬年三月歷九叙兩河功典禮虞巡重江山禹甸雄帝歌垂睿想民俗入王風翕闢乾坤大爐錘造化同詞源方浩瀚元氣益冲融丹笈回雲篆滄溟散彩虹璧連還縹眇珠綴自玲瓏香影瑶編動鉛分寶字工鶯花供御藻雨雪志年豐玉律飄陽管金聲韻嶧桐衢謡歡故老巷舞走兒童恩與留題遍榮逾錫命崇道因神理貴物感至和通謨烈超千古文章達四聰祥烟盈卷帙瑞色滿書筒雅頌恢皇統英華發聖衷石渠春㶑灧藜火曉曈曨髙厚思隆遇迂踈愧匪躬併將揚拜意稽首祝蒼穹史局得韓山書却寄行屋千峯萬嶺分西來蒼翠入斜曛幾場春夢翻殘史一片閒心寄野雲見說故人方縱酒傳來新句最能文寒窗燈火平生語除却君知世不聞答元朗松風草閣晚晴寒不道炎蒸暑未殘呼酒敢嫌新吏舍門鄰酒罏愛詩長憶舊郎官人傳代北馮唐問書畏江東子布看惠我瑶華滿奩篋依然畫省握香蘭六針來自武昌朝來乾鵲噪庭除池草春生慰索居車馬到門千里外光隂彈指五年餘曾於簿領知為政只見山川勝讀書說著江湖人已老扁舟來往子能如聞聲山墜馬傷手戲贈朱書腕後術誰工在手鈎文惜仲弓解道風流羊叔子也應騎馬至三公六針將别余方有校勘文字之役相對匆匆悵然再叠前韻湖海元龍氣已除寂寥誰伴子雲居松風夢破驚窗曙藜火燒殘似歲餘多事不成臨别酒無聊郤望逺來書流光努力君年富冉冉雙髭我不如恭和聖製裕親王挽詩二章謹依陽青元韻天德敦同氣巍巍雲漢章流芳傳睿藻樂善惜賢王桐葉飄踈翠棠花落晚香情深親灑翰雨泣迸成行內殿思前事皇心記幼齡步趨同問寢講誦舊傳經視藥調金已移鑾隔絳屏親賢加典禮編簡萬年青冬日雜詩十首金絲牆屋久荒凉過魯曾知漢道昌惆悵黃龍歸不得少牢祠裏祀舒王宋史璧月瓊花事事休胭脂痕斷井欄秋三百年中四十帝青山如舊枕江流金陵陡泉泉出洞渦水驛印如今最謬訛不比成臯爭㸃畫十州鐡鑄作同戈同戈驛本洞渦同戈訛也南食何當寄老叨越舲楚舫與吳艚天寒雨雪炊烟冷誰是燕人左伯桃午食非關偏聽與佯聾黃落經時問朔風近得楞嚴觀葉意耳門圓照十方空耳病忽瘳出網銀刀曉市門歸來午食已黃昏魚飱豈是貧家物咬斷新虀舊菜根家人餉以銀魚却之九十六劫如俳諧學他玳瑁嶺南齊辟支一食真難施敢訝吾無一日佳近清齊百日三千沙界了無蹤影事前塵破幾重我本無生元不滅當時何苦護紗籠罨畫廊前兩樹梅看花人自故鄉來未開紅蕊開時白道是先生手自栽深紅淺白蓼芽新欲試春盤待曉春坐斷五辛三種菜年來轉覺庾郎貧晝睡謝客日斜窗影半寒筠却有踈梅欲放春掩卷已沾名句味攤牀未了睡眠因選圖枕畔華胥夢罷酒樽前見在身為謝九衢車馬客黑甜何苦換紅塵范彪西索題車駕西巡寵遇詩二首舜狩仍千里堯文已六經山林垂顧問雲鶴想儀形灑翰超飛白留題照汗青歸來屬車上猶指少微星大隱非丘壑斯人應客星行藏殊捧􅊾勳業為傳經有道人師表中郎世典型銜來丹鳯字雲氣護山庭甲申正月十五日上命撤所御宴賜臣廷敬諭臣子壯履恭傳恩㫖頒送到臣恭紀四首吾君儉德到傳柑一宴年光四十三上自御極元夜蓋康賜宴廷臣者一熙二十二年也今日全家沾賜渥不同歸遺與分甘蕭蕭華髮入青春惶恐君恩說老臣最是九衢燈火夜驚傳天使便寧親藜火銀花接禁庭天邊玉㫖下青冥紫微垣裏親傳與敢道臣家有聚星溫飽當年未敢論虀鹽相伴久承恩寒庖那識金盤味指㸃先嘗玉箸痕久不得舍弟素心書聞去冬已歸自武安今忽復春且深矣惘然有作關河霜雪賦歸與又值風光二月初竟日不成春夢句隔年空憶雁行書閒門栁色開荒徑流水桃花到舊廬應識在家貧亦好信音迢遞渺愁豫青鳥不敢求桃核開花今幾春那無青鳥使相慰白頭人西日瑶池逺東風紫竹新普陀炎海路萬古不揚塵賦得心清聞妙香南華近在贊公房一水曺溪接混茫曲徑行隨花氣逺畫簾相對篆烟長曼陀雨遍諸天㑹薝蔔春深選佛場解道音聞清淨地色空空色本無香野亭望西山有懷擔囊蠟屐鎮相從便欲登臨策短笻野徑春歸三宿樹石門雲散午時鐘金盆接語青山晚玉斧尋真翠壑重彈指十年禪榻畔道人行腳恐無蹤經筵紀事四首時三月二日也牙籖一卷幾回開近日新綸忝竊陪好與詞林傳故事白頭丹地講書來經筵自昔屢拜內閣新命仍兼命臣進講及巠筵講官尚書水部無雙譽宫尹承華絶異才贏得頭銜渾似舊押班春殿許徘徊是日華亭尚書海寧宫詹進講石渠虎觀列經帷同異諸儒奏對時題目分明經睿斷聖人書是聖人知進講足食足兵節時亮天工節皆上所親定蘭珍别賜常餐外榆火新溫上已前衰老䝉恩憐一飯歌衢正好在堯天是日撤臣且命膳人謂臣御饌賜在講席進時重爇與食比於康衢之野人云聖恩至矣而臣衰老將宿野亭遲京江沁州二公子夜文書午漏聲先驅駑馬出重城花邉風蝶閒來往栁外沙鷗解送迎緑水紅橋春似舊青山黃閣事相并邯鄲一枕華胥夢不覺晨鐘報五更與李公凱兼呈徐果亭蒲栁先秋露葉零碧天落落見晨星與君同甲髭偏白相對無言眼自青淮海至今歸大海午亭元是一長亭樽前張丈殷兄在强欲相呼一笑聽公凱長豫三月果亭亦長豫數嵗閣中與曹蓼懷學士未報深恩敢乞身一年相對已前塵窮通總惜朱顔老館閣常逢緑鬢新舊事幾回蓮燭夜君家並有竹林人栁吟花醉輸閒客日日銅扉共曉春昔與學士世父顧菴先生同在翰林旅宿懷梅莊旅宿天無際平沙樹接低夜深還過雁野曠少鳴雞風雨人何處雲山夢不迷一條春草路直到太行西和趙秋谷觀海詩二首求詩入海氣崢嶸却卷波瀾見老成香土踏殘才思盡當時我亦一狂生晨朝騎鶴暮行雲洞府仙官太有情只恐未忘人我相海山畢竟讓無生野亭懷內直諸公周廬野館共裴􅏆網户疏窗面面開過眼春隨飛絮去遨頭人及落花來隔林好鳥如相喚出岫閒雲亦未回清晝玉泉添漏水此中三昧即銀臺半飽居士詩有序喬公子德輿來京師久客逆旅豫勸之歸喬云吾無以自活豫曰子幸有先人之田廬在吾居於此嘗記陸魯望語忍飢誦書率嘗半飽此亦處貧之一法公子便以語侵豫天下豈有餓死宰相耶豫笑而不答門人竊呼豫半飽居士于生方曼性嗜酒聞豫之告客者因止酒不飲恐傷其意作半飽居士勸酒詩大庖珍食也曾經晏進藜羮户早扃我自長貧甘半飽君因皆醉怪偏醒豈堪白粥妝金谷恰有青銅挂玉瓶燕市黃公罏正好酒帘門外即旗亭甲中七夕二首想多情少一身輕想多情少出楞嚴經我願無生恨有生此夕果然牛女㑹生天也恐是多情不見牽牛織女星銀河水長色冥冥憑君奏乞通明殿灑作人間細雨零書豫朋僰南集七年燕北别卅卷僰南詩小吏才難盡髙天命不疑謝家真客子杜老好男兒却笑陶彭澤賢愚較菊籬題孫湘南片石集五字文章萬古情吳江隴首舊知名嵩峯華嶽黃河水如子雄才是兩京瀘水春生大渡河塞山飛起逺嵯峨書生自有封侯相留得征蠻塞上歌拈朱子句恭擬應制詩賦得霽月光風更别傳五星東井事依然洄溯濓溪接後先一自圖書尋有緒頓令風月浩無邊勳華在昔三千載閩洛于今五百年學統此時符帝統斯文端是聖人傳衰老太平好時節衰老意多違身世何飄泊人天有是非法華經不依止人天而住孤鴻還自去乳燕各分飛物理真難問吾生安所歸青藤館稍葺落成有懷藝夫城裏一山家籬踈晚噪鴉水含林際月苔隱石間花人與青藤老門留白版斜故人猶記否燈火十年賒真箇似童兒埋盆作小池雖無沙鳥過已有樹禽知素髮垂新領紅桃長舊枝恐君相憶處不是昔游時送徐果亭還崑山戀闕丹心皓首時掉頭無那故山期洞庭蝦菜催回櫂阿閣鸞凰返舊枝黃紙箱邉同啓事紫薇花下對吟詩饒君獨占江湖勝蒲雨菰烟惱夢思答王生故人之子王并州問我新詩紀舊逰浪跡仙人多愛酒青蓮曾贈董糟丘北墅和壁間韻麥寒經雨緑葉老受霜紅客舍青門裏離居又客中霜鐘叠韻霜鐘來不近披拂曙燈紅多少繁華夢銷沉向此中再叠前韻二首庭樹雞鳴早平沙夜火紅不須爭起舞吾已老窠中踈鬢霜同白衰顔酒暫紅心灰兼耳冷猶在客塵中檢放翁詩二首青山黃閣眼迷離文字叢殘晚歲時拂面冷風霜滿鬢何因檢到放翁詩殘年飽飯細吟詩一笑生涯老自知不識鱸魚蓴菜好多因連展與黎祁放翁自注淮人謂麥餌為連展蜀人呼豆腐為黎祁御書春帖子恭紀神書日賁通明殿春帖先題供奉班人喜王正逢聖藻兒驚天筆憶龍顔臣子豫朋將之耀州任門前豈敢懸雙璧楹際真同被兩間捧向茅堂常北面年年椒頌祝南山賜砥石硯恭紀王氣留京奕葉隆五丁遺石自鴻濛削成寶硯天開闢製出文思帝化工玉几依光加洗濯清班分賜並磨礲承恩真比丘山重歲歲三呼萬歲嵩賜貂裘恭紀金貂濫㸃侍朝元輕暖還教被異恩就日未知仙珮重因風偏覺御香溫親承綸語量長短諭㫖云此裘朕所親服汝軀體較小可覔良工略為裁製務令稱身儘著餘年付子孫忝竊一門兼再錫微才敢向鳯池論臣子壯履並䝉恩賜賜人參恭紀賜觀植本幾人存五葉三丫記細論戊午臣廷敬同臣英臣士正臣士竒臣杜訥䝉參禎本恩賜觀人筋力已衰逢大藥生成難報是皇恩未隨芝草和金七先映椒花上玉樽除夕並食物賜上尊甚衆曾說紫團聞父老新傳盛事到山村舊傳上黨有紫團參今不可復得賜玻璃器大小十四恭紀春冰未泮玉敲堅賜出玻璃世罕傳虛白貯來皆萬象清微擕得自三天如逰佛國琉璃界不費公家帑藏錢諭旨云此皆出工人贏餘非用錢糧所製故以賜卿等歸路彩雲先滿舍盆瓶處處日華圓御書大福字恭紀維皇錫福遍蒸民天藻親題到老臣今歲預知明歲喜萬家先占一家春仰瞻紅日長如晝若比驪珠大似輪億載光華歌復旦溥將夀域轉洪鈞臣詩叠䝉聖恩奬賞每聆天語感激之下涕淚零落纍日愧悚恭紀以詩衰鈍何堪感至尊頻䝉激賞是殊恩拋殘綺語文焉用老罷丹心事可論一飯不忘如杜甫平生無憾勝虞翻傳閒多恐遺青史留取新詩示子孫六日祈榖前一日雪同雲近接朵雲邉歆饗深知睿意䖍未轉條風先獻歲十一日立春猶行臘雪兆豐年金甌卜歷過千閏是歲閏月玉琯吹花到八埏扈帝仙官多鶴駕騎來銀闕羽毛鮮覔輿從不得偶作跳浪羣兒自簸顛如山兩足步難前路長欺我太無力回首沙堤亦枉然正月十三夜同與可語梅莊山居之勝雲裏山家咫尺間踏青未了試燈還百年吾是今春老一歲人能幾日閒亦有王城深似海誰知身患重如山老子云吾之有患為吾有身梅莊北畔桃坡路前後東風總一般午亭文編卷十八
