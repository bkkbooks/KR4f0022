body:
  text: 午亭文編卷十五大學士陳廷敬撰今體詩巢燕再逾年復至風掃巢痕在今年燕子回語多如有訴别久莫相猜芳徑春泥落雕梁夜户開翻驚此時節去嵗不曽來追和南溟韻四首寒罏瀹酒夜霜濃醉别西垣夢裏逢一院梧桐秋影散併將風落入飄蓬薊樓明月照相思曽是金樽宴别時萬里碧空消息斷天風吹墮玉霄詩金閨楊栁落疏林香散羅衣怨藁砧未老蛾眉恩總在幾回憐取白頭吟眉犂騰踏過羊腸力盡金鞭去渺茫近見紫鸞書一紙人間路比海天長再到冬官署中與劉雨峰東閣南枝放早梅何郎水部有詩才書生自笑曽前度小睡槐根噩夢回松泉寺晚宿松泉寒夕照黃葉墜疏村石徑秋花弱風廊佛火昏川長雲宿渚野曠月臨門鐘磬此俱寂霜林夜鳥翻送金會公歸蘄春朝發新津海月斜潞河雲水極天涯飄殘暮笛江城栁照遍離樽上苑花紅燭三條知已淚秋瓜五色故侯家頻年萬事悲歌外至竟騷人楚調賒九日晚晴臺登髙臺為登髙面落霞薊門山色晚晴賒關河風度長城雁節序霜回小院花南陌咫天如杜曲東籬終古是陶家衰遲醉舞秋鐙下顛倒茱茰插鬢斜杜遇徐司冦以合歡花葉為酒示余以方釀成飲而陶然賦謝黃落庭隅樹封題葉半新花應知夏五花開以五月采葉及花未開酒已作逡巡采勝修羅法香逾麯米春嘉名愁頓失况復飲吾醇飲合歡酒疊前韻簡杜司冦青裳風泛溢紅頰暈鮮新見少常深酌無多祗一巡西家非醉酒非醉酒林開府家醖也東閣太和春真定酒名太和春梁相國嘗召飲玉盞空勞勸香醪未比醇于役潞河見月初上光矗河水兒子壯履曰此黃金棟也賦以志興月滿冰輪霜氣寒東來倒影海雲端小兒解識黃金棟供奉曽呼白玉盤尺五天連河漢水大千沙傍鷺鷗湍多情野宿臨流處自向篷忩照夜闌送張僉事之海南三首五羊城邊竹馬過琵琶洲上估人歌使君不飲貪泉水沈絲休挂珊瑚柯黃葉初飛黃木灣鷓鴣聲送早時寒鐵岡驛前書一紙秋風篋裏為開看持節梅花嶺外時趙陀臺草鬱離離西風又度昌華苑秋色年年長荔支髙梁橋二首日斜秋水急城盡野橋連靈沼通河漢公田引澗瀍塹花隨唼鴨風栁出鳴蟬山閣清暉裏依稀近玉泉車箱渠上水迢遞繞郊畿渡逺分青靄山長歷翠微落花穿內去斜鳥帶波飛無限潺湲意年年送夕暉王湜菴挽詩孤風晚節不磷緇矯矯曽為世羽儀豈信己辰年至後遽驚庚子日斜時琴殘最抱人亡恨車過空留腹痛悲舊德未忘天意在烏衣門第屬佳兒直廬懷公幹計偕載道春草相思入夢無龍池栁色映新蕪玉墀金馬摩挲老悵望吾家白額駒張敦復尚書屬書齋額仙人好樓居元龍百尺意橫秋湖海平生已白頭青鳥近傳天上信果然人在玉華樓和敦復悼馬詩二首憔悴金坡蹀躞行三鬃剪出欲平明青絲送老橫門道不盡黃雲萬里情驚雷驟雨識危途電火光中躍的盧不為錦障泥暫惜報恩珍重在斯須危溪夜雨馬却立待電光以度闈中花朝前一日阮亭司馬談江南煙景之勝二首栁隂湖水緑平漪欲傍漁洋下釣絲記取花朝明日是幾畨風信對牀時布襪青鞋向若耶踏殘香土肯移家夜來客夢遊天姥開落碧桃無數花題燕居課兒圖示壯履黃紙凋殘舊帽箱一編猶映紫羅囊繩牀穿膝知吾老書案量身覺汝長自讓輕肥非蔡澤不憂文史續中郎紛紛箋注如煙海回首尼山數仞牆冬官署中南亭敦復所葺兹豫再至實承乏公後而敦復權領翰林夏至之夕齋居有懷乾坤蕩漾兩浮萍嵗月樊籠意渺冥再到冬曹新燕壘百年喬木舊槐庭吟成白雪人難和夢續黃粱客半醒惆悵玉堂明月夜柯亭劉井幾回經六月九日睡起偶書長夏炎熇閉閣時水曺官冷也相宜盆池萍響魚貪食梁壘泥乾燕哺兒煆火未能同士季扇塵何惜避元規北忩一枕羲皇夢睡裏蘧蘧欲共誰量移西曹與可以曹屬引避歸里送别北隴應騰笑西曹欲别情驪駒歌已就春草句難成老眼青山迫回腸濁酒酲到家及秋社欵欵話歸耕西原與友人二首過雨殘霞一閃明夕陽林影路回縈勸君莫向城中去且聽黃鸝三兩聲暝宿煙村生逺情野亭客夢幾回驚松窗常有瀟瀟響不辨松聲是雨聲露湑閣即目元龍湖海意闌珊百尺髙樓抵閉關斜日香臺低碧樹暮雲粉堞近青山愁添酒盞真無那獨對花枝底要間卻笑書空殷處士浮名長戀在人間新齋十首前度人還在三間屋又成劫塵容小住丹藥覔長生赤斧分曹日洪崖抗手情别來應未久且緩玉霄行牙籖新未觸壚酒舊能賒戲蝶輕團陳分蜂晚斂衙粉牆低過竹籬徑窄妨花莫道幽居小樓頭十萬家卜築平生意髙樓獨上情扶欄新種栁隔葉蚤聞鶯坐久雲還岫歸遲月滿城稍愁風露夜玉漏太分明髙處三霄近秋來四望低月從遼海上雲向薊樓齊估客滄洲酒園丁上谷梨當筵聊一粲身世忘羈栖草堂兼水石不似在城中栁影魚遊樹花梢蝶戲空野煙濃趁雨林暑薄隨風旦夕簾櫳寂幽懷誰與同門掩山全見窗回路半分簾花新雨動階草夕陽熏隂借西鄰樹涼生北渚雲素紈今夜郤林月照紛紛鈎簾殘日落移坐逺風斜徑曲供行藥籬疏可映花無題詩得句有酒客忘家最是登臨處秋山爛晚霞千古髙人意風流屬畫師煙雲為供養粉墨自淋漓蹈海黃金賤登真白晝遲公生有仙骨名已重當時齋中藏一峰道人畫祕寶黃公迹兼珍亦世無雲根留米癖樹本見倪迂靈物如相待斯人可與徒摩挲憐手眼歡賞在須臾既以黃公畫為袐寶而元章硯雲林畫皆齋中所藏間庭何寂歷疏雨過廉纎銀浦倒流峽玉繩低挂簷劍風出匣冷琴露著花霑自忝金閨籍年來仕隱兼晚行西山道中一出譙門野興濃回看樓闕暮雲重西風吹送髙梁水晚影飄殘卧佛鐘十里清蟬聲斷續獨驅羸馬意從容眼明漸覺西山好潦倒塵埃萬事慵閏七夕閏餘風景故依然秋未平分月再弦不為黃楊逢厄嵗那知紅粉惜流年世無巧厯推今夕天上仙人應獨眠寄謝悠悠路傍客炎涼誰後復誰先送宋稚恭還鹽城兼寄孫籜菴名場文宴是離亭一曲回腸事滿膺水鳥聲多喧夜雨壁蟲吟蚤時寒鐙秋來頻送將歸客老罷真如退院僧心與清淮流共逺幾回長嘯憶孫登自嘲戲為俳體二首呈敦復三復金銘與白圭敢云桃李下成蹊郗昻一日三回誤阮籍頻年到處迷伏櫪老非千里驥當關愁奈五時雞無因一問南華叟秋水篇中物未齊窗前草長未教除零落秋花伴索居蝶夢欲成人昵枕雀羅長在客回車悶翻干寶搜神記快寫羲之誓墓書惟有龍眠老居士昨朝儤直一相於六友齋遲廖樾阡郤寄惜别庭蕪長悲秋木葉新西窗涼夜月曽照十年人夕鳥棲相命寒魚聚自親遲君常卻掃一為拂流塵贈于千英于嘗受學汪鈍翁騕裊春遊宛洛花銀鞍行處帽簷斜才名潘陸知誰敵族望盧劉是舊家意氣雲山臨北顧世情塵土踏東華傳經往事還怊悵曽向深堂隔絳紗中秋六友齋玩月同徐子文咱元彥陳叔毅吳震一方鳬宗錢亮工廖樾阡林文淵于千英舍弟與可兒子豫朋限星稀二字二首月出吾家冷似氷肯來相看宿寒廳明翻烏鵲枝邊見影傍關山笛裏聽太白豈應陪皓魄咸池今已時繁星瓊樓玉宇歸無處顛倒西風濁酒瓶剝啄何人到落暉間階月上為開扉坐無北里連錢騎客有江東大布衣未比金吾三夜禁也應玉漏一時稀銜歡獨倚秋河晚惆悵霜輪速似飛梁相國蒼巖挽詩兩朝耆舊冠公卿星坼三台暗玉衡館閣風流傾後輩海山位業悟前生感深津邸清尊淚腸斷山陽暮笛聲回首雲霄歸去路已將箕尾署銘旌劉處士鼇石餉蜜漬荔枝塵斷華清晚浴時春風靈液幾人知褰裳自恐妨羅縠出水誰曽見玉肌味美江鰩連霧雨香添盧橘灑淋漓海南嶺北提擕處憑仗詩情訴别離齋宿秋官署中不寐作舊事新愁歎此身一回不寐一傷神打頭落葉生驚汝覆手翻雲儘讓人明滅曙鐙殘焰在籠銅更鼓五聲頻布衾縮項寒如水笑比鰥魚竟是真讀漢書二首酒半驪駒鼓吹聲阿誰結襪向王生兒童項領公然就何况常遭跨下行自表門徒為李膺故人相遇避孫𢎞可憐赫赫張京兆曽似將軍過灞陵齋宿古廟題壁三間草屋半枯槐壞壁難禁風雪堆除卻秋官涼冷客門前騶唱不曽來河內竇生有江南之遊寄訊南遊濟水北遊燕説著江湖意杳然與住太行峰上下一生長似北流泉和張尚書芙蓉島新題十韻松堤草鋪緑裙腰水繫青羅帶何似蒼松鱗十萬森羽斾芙蓉岸灼灼拒霜花風前顔色久蕭森蘇公堤應悔樹桃栁青槐陌紫陌紅塵路常時共往來迷花倚石處猶見舊宫槐蓮溪木蓮欲作花水蓮半著子將花比人面兩兩皆相似杏圃塞北山杏多江梅藏花塢江南野梅多文杏栽於圃桂叢昔我山中室其名亦桂叢幽香在何許到處逐秋蓬余山中室亦額以桂叢楓亭楓亭名轉佳丹林交葉露借問金閨人何年此中住蘭臯東臯被香蘭不異在空谷風吹無人時芳意抱幽獨竹垞紗帽煙梢罥山衣露篠霑萬竿須截去風月可平添薇館紫薇百日花溫室萬年樹君坐黃昏時試咏白公句寄思母菴孔道士噩夢宵來記未真任他翻覆訴庚申愁多命薄吾還厭莫訝彭尸去住因白雲亭散後呈鄭山公侍郎背牘山如積歸時每夕曛茶瓜當暑並眠食向宵分影散絺衣月涼生竹簟雲客愁連短夢心緒仗夫君冬夜懷李奉倩侍郎待蚤星稀落歸遲月半傾老嗔兒問事貧遣僕歸耕簾動霜涼入書收燭暈生公私兼未了相憶一含情有以剪綵花見遺者戲題二首誰知羅綺巧相裁也有遊蜂戲蝶來羯鼓無聲羌笛冷笑看梅栁一時開綺窗惆悵問江梅何事寒香鬱未開不是青春花信晚風光愁向剪刀催贈日者李生紛紛車馬在簾前也為君平送百錢忝竊韓蘇同命主不須更算小行年答劉鼇石多情詹尹拂龜占羅雀間門樂事添施就朱顔惟白墮挽回霜鬢有青粘落梅驚坐香侵硯晴雪流忩玉挂簷更有舊書消永日醉眠詩句答劉兼與可談蜀中花木之盛詠懷兼寄素心六針荀少公幹棧閣蠶叢草樹侵雲山萬里足登臨海棠城郭香真好桂子衙齋月自深五畝田園何處就十年栽種可成隂牛車下澤安吾老花栁前村共討尋壬申元日即事呈史館諸公天回圭景測銅渾碧落年華上曉暾左個蚤傳新嵗令夕垣還趂晚朝恩爆餘竹火翻青簡頌就椒花泛緑尊十載御錢虛拜賜春筵餅餌愧盤飱向雲澤直史館有每更五日直已是十年留之句以史事之難也為廣其意東風逐驌驦蚤出鬭雞坊簡竹青連舍書籖緑映牀落花春水細垂栁夾城長荏苒更番直猶勝陛楯郎蚤春因錢越江宫洗寄楊玉符編修直草詞頭日未間懷人亦在簿書間星霜萬里音難寄雨雪髙城雁又還往事夢魂鈴索地春光楊栁玉門關邊沙爭遣蛾眉老五葉靈根解駐顔青藤館書睡懷錢亮工午雞猶在枕不似蚤時忙花影交殘夢茶煙引細香春多行藥徑人在著書房汗竹紛難就青藤蔓許長清明前二日集黑龍潭濟南張秀才􅩈來會家傍城南杜曲天春遊常在燕鶯前霜教點鬢渾無賴風為吹花太放顛四海賓朋千里到百年煙景一生憐糟牀未快淋漓興野水添杯更接連春夕懷李漁村翰讀半銜山日送春隂歸鳥棲迷不擇林帶月雁髙城影盡吞花魚避樹痕深流光差可供遊戲物理何須問陸沉五嶽能消幾兩屐圖經點就與登臨漁村方志五嶽挽太原故人王德新碧玉晉祠水白雲汾上秋故人今不見擕酒昔同遊漂泊醉鄉老沉冥仙者流天津橋畔望長憶董糟丘城南張氏園置酒招向雲澤廖樾阡于千英同遊命豫朋同作三首宛洛花邊騎新豐市外塵池臺三畝並竹樹兩家鄰從客迷花徑教兒近酒人暮鴉終古在撩亂女牆春舊是笙歌地投壺喚客遊欹桃臨澗道垂栁拂譙樓落日昭王館春風易水流年年芳草路祗為判花愁張園絶勝處一半比鄰間苔引春樓堞籬分舊竹關牆花歸鳥亂池栁夕陽間不識廬山意多因在此山春日西原憩常氏園懷玉泉昔遊卯酒倒春瓶野風吹不醒籬花殘雨淡澗栁古煙青是往西隄路空眠北里亭金銀二泉氣相對晝沉冥疊前韻邀張敦復尚書勵近公通政遊西隄愁處花迎笑眠時鳥喚醒泉流銀浦白山入繚牆青瑶草三霄路香茅四照亭欲邀湖畔去弄月泛空冥石閭夜眺南溪甲戌八月大祥後詩鐘磬消沉古廟幽僧徒曾此結綢繆漂流溝水三年淚重疊雲山兩鬢秋檢點詩篇聲斷續料量身世意遲留柴門倚杖寒花外月上東村幾尺樓山窗二首山窗曙易蚤雞鳴方未已夜來寒松聲偏入幽人耳月上松間屋水流山半泉夜雲行雨歸曉風為颯然髙渭師翰讀夫人挽詩十德聲名舊南安內範良故家開幕府夫子侍明光淑婉追陶母幽間溯季薑瑶環榮翟茀繡轂觸鳴璫北闕方承寵西風忽斷腸三秋搖落候千古别離場人去悲彤管鐙昏暗錦堂湘魂何處弔蜀魄正堪傷燕市清霜白金門夕照黃楚遊歸訃晚潘鬢苦吟長露冷銘旌重香消寶鴨涼夜臺由此隔松柏鬱青蒼八月十四夜石閭見月感成萬里空寒碧嶂間松門留影不須關三年涕淚沾襟血一夜悲歌點鬢斑明滅村燈沁河水依微野燒析城山鞭絲玉漏銅街路長記鐘魚此處間十五夜宿陟屺樓見微月髙峰逺上氣溟濛峰上髙樓四望通雲樹千重低幔外河山兩戒曲欄中桂華寂歷看如霧霜髮飄蕭映向空玉兔金蟾知得否幾人腸斷倚西風十六夜樓中見月太行欲落勢還留迥絶清輝萬象浮千里斷山回北隴今宵明月在髙樓飄零舊憶將歸日惆悵翻成獨客愁才是平分秋又老金波渺渺去悠悠孫仲禮過午園貽詩見贈賦答四首為圃三畦屋幾椽客來誰與共忘年深枝鳥動山池月寒草螢流野岸煙豈是橫林髙卧處偶然清閟小堂偏多君舊隱西峰下只在溪雲杳靄邊堂顔清閟來詩以雲林相况故有橫林二句才名公子舊烏衣蚤嵗青山已息機歷落漁樵間故壘風流臺閣付斜暉河東三篋書還在華表千年鶴自歸文采清門堪託契秋來時為掃柴扉仲禮世家子有文名楚塞吳天去渺漫太行歸處暮雲端自言雞肋功名薄不覺羊腸道路難縱酒淋漓溪水緑著書荏苒井梧寒前村五里山邊霧豹隱何妨拂帽看君有南遊詩紫髯風貌舊儀形懶漫嵇生眼自青樊口野花爭似洛朱坡清渭不流涇煙雲已被勾留住巖壑從教取次經車載不須愁健步馬陵秋望氣冥冥君美髯不良於步答孫仲禮次韻韓宫魏寢久蒼茫虎嘯何人識子房緑水紅欄棲隱處青山黃葉讀書堂幾回君去常懸榻連日詩來少報章欲訪清溪便乘興嶺雲無數隔殘陽山池泛舟四首罨畫回廊兩岸秋緑潭紅樹影悠悠江湖風水行難渡爭似橋邊一葉舟鞍馬平生塞上行水村花底打船聲回思遼海灤江日一曲煙波萬里情南垞渺渺北迢迢畫舫紅燈未寂寥不到江南人已老流泉也似晚時潮橋下清池池上樓下樓和月上孤舟短篷小纜才如許載得人間萬斛愁雨中如九仙臺題野館壁冒雨看山是一竒青泥白石馬行遲迢遙不負山靈約黃葉村前渡水時登九仙臺臺在沁河中央與金焦絶相似夢裏金焦寺波明兩岸空江河凡幾曲形迹偶然同水府蟠根險山靈接勢雄長川流浩浩俯仰意何窮九疑臺石樓曉起曉看白雲近暮宿翠微深斜月數峰影髙樓孤客心河流無日夜山色幾登臨應有仙靈在凌空不可尋石樓夜雨二首四山昏黑一燈明寒雨連河客夢驚萬古洪濤終夜響欲從此處悟前生不辨溪聲是雨聲捲簾窗外雨三更山靈信宿知人意故欲留人一日行棲龍潭斷峰臨巨壑開闢意何雄石口排雲黑潭心浴日紅人傳是海眼天遣作龍宫萬象蒼茫裏風雷起澗中歸路復雨豈為登臨歎落暉秋雲三日濕秋衣今年作意過重九雨裏遊山雨裏歸九日山齋獨居晚步池上作暝色下簷際栖禽喧樹間采花誰泛酒臨水一看山不擬登髙去空嗟為客還猶憐望鄉處溪月上柴關池閣池閣俯花隂幽居每重尋秋髙寒水急山近夕陽深庭樹留霜果簷巢長渚禽寥寥誰共語樵唱在前林龍樹掌張氏北樓望底柱山不辭歷井與捫參望盡三峰路轉侵華嶽斜通西皓逺青蘿已映北樓深百年過眼浮生夢萬事看山未了心蚤是雞鳴懷往路要令巖壑快幽尋舊迹西峰華嶽觀東峰青蘿宫遊底柱山入天井谷衛北山逺來餉食兼簡𠂻明府靈壑青峰入望頻鞭絲烏帽映嶙峋尋山我愧謝康樂好客人稱鄭子真空谷乍逢如逆旅斜陽立語見交親因君慿寄神明宰玉洞丹砂不厭貧王屋山後十方院二首紺碧千峰萬仞遙靈風飄眇近三霄玉玲瓏處紅塵斷也恐仙人太寂寥三山碧海夢魂勞欲往從之心鬱陶天上豈真足官府故來人世寄牢騷桑林午食二首底柱山前亂石村十家今有一家存千巖萬壑人蹤在正是皇朝賜復恩石田漠漠草菲菲破屋炊煙四散飛行到前村還悵望五年不見一歸人王屋北峰二首北峰畫難如娟妙方未已不肯在人間迢迢度秋水峰色竒如此天公有意無舉頭向明月為我問清都鐵盆嶂三首空青削山峰金沙裹山麓山頭明月行山腰白雲宿探竒乃大驚嘆絶但狂呌山僧渾慣見對豫發微笑風洞聞風歸雲窩見雲去乃知風與雲生自無人處析城道中望樊山松雲縹眇倚髙空無數煙巒逺望通􅔄柱三山皆拱北太行千里盡回東登臨早識隨刋意開闢深知造化功家向翠微多處在芙蓉九點落當中樊山一名芙芙九蕊山午亭文編卷十五
