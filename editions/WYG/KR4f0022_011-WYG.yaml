body:
  text: 午亭文編巻十一大學士陳廷敬撰今體詩秋夜入直待漏東闕下有懐青岳翰長肇餘玉階兩學士年光流盡宫前水㡬度寒聲雜玉珂漆簡數行吾自媿氷銜三字意如何鼔笳中夜黄雲合風雨深秋白髪多最是周廬趨直地侍班輪日不同過輓王考功子底宋觀察玊叔素旐齊城北朱旛蜀道東蕭條萬里外淪没一年中世路憐諸子交情盡二公招魂傷宋玉死孝憫王戎賦鵩才猶壯哀麟筆遂終玉棺天上落瑶瑟寢堂空暮雨懸鄰杵秋雲冷殯宫夜臺歸有伴泉路恨何窮前後銓衡地凄涼詔獄同范滂真蹇諤裴楷自清通藻鏡南曹月琅璫北寺風宦途紛轗軻襟抱得沖融顛躓非天意生全荷聖聰荔裳西樵前後官吏部下詔獄追随思夙昔狂醉笑兒童名列班揚盛文兼沈鮑工妍媸慙刻畫瑕垢屬磨礱章句功名薄生涯負販雄霜摧漢畤柏風折嶧陽桐嵗月魚吞餌乾坤鳥觸籠漂摇驚汎梗慘澹送飛蓬腸斷山陽笛悲迷朔塞鴻池塘春草緑謂阮亭艾石丘隴野棠紅腹巳真成痛心還暗欲忡九原人在否灑淚向荒叢九日内直恭紀禁鑰霜鐘度掖門佳辰入侍亦新恩夾城紅葉飄深樹别殿黄花進内園晝刻詞曺金簡祕曉風天上玉音温承平時節慚文翰戎馬何能報至尊次韻曹頌嘉和田綸霞九日同謝方山飲黒龍潭晩逰刺梅園看松詩四首髙秋征馬㡬時回節序邉書日又催鴻雁也従烽燧少菊花應傍戰塲開雄都紫塞頻傳檄霸業黄金舊築臺且斂登臨詞賦手故園逺望當歸來冉冉飛雲萬壑低鄉心迢逓夕陽西闗山木葉歸來晩兄弟茱萸挿處齊秋水平橋初擁席寒花繞屋自成畦樊川舊日登髙地濁酒淋浪醉似泥滿目青山赤羽馳天寒沙磧野營移城髙白帝霜砧斷秋盡黄陵畵角吹㡬處漁樵逢戍壘千村征調見旌旗多君苦憶昇平事貰酒悲歌寂寞時城南咫尺吾難到潭水園松兩絶塵歴盡滄桑含貝闕燒殘劫火老龍鱗正思叔起呼垂釣欲擬興公答比鄰退食舎人無事否好娱風日趂閒身菊遲有作去嵗采花香汎酒今年對酒菊遲回歡凄蚤判心顔改風雨將䦨節序催似向髙秋堅壁壘故教嫩蕋近尊罍上林霜後稀㳺幸應遣寒英細細開追悼王西樵吏部兼懐阮亭海内誰知己相思大小王風來闗塞逺月落夢魂長多病寛腰帶流年積鬢霜鴒原悲宿草重與淚霑裳魏環溪少司農為李晉陽索題栁林二首何處登臨望𣺌冥栁花飛後栁烟青灞橋官樹連鄉樹子舎輿亭接栁亭司農奉母太夫人所居曰輿亭韋公舊蒔庭前栁郎省他時對斂容惆悵栁林秋色裏西風落葉滿居庸和貽上嘉陵驛見懐客裏音書寂寞遲西風過雁苦參差窮交别後三年淚好事傳來八子詩杜曲寒花秋送逺嘉陵古驛夜相思銷魂橋外殘陽樹衰栁天涯憶汝時風夜程子至天風響不輟吹汝到空堂夜動霜林白寒摇落月黄鼓鐘連嵗晩碪杵入宵長話盡蒼茫裏因君思故鄉上官松石畵雲樹蒼蒼隔寺樓亂山飛瀑屋西頭花時恐有漁舟入肯使桃紅出磵流懐吴薗次揚州十年僦屋西街住山色東忩共短籬隔坐秋燈聞夜語蚤朝官馬並晨嘶江寒北雁春前少人去鄰花雪後遲𣺌𣺌蕪城烟水濶薊樓明月憶君時雪夜口號黄沙漠漠雁聲微鼔角縁邊送夕暉大帳金川江月暗前軍鐡鎻陣雲飛塵昏壁壘長横槊氣冷闗山未授衣最憶苦寒諸將士好乘雪夜破重圍冬日冩懐同郭快菴太史李容齋侍讀袁杜少上舎作朋舊栖遲旅興寛西堂霽雪對慿䦨九邊馬槊霜雲動大將龍堆曉月殘裘馬黄金燕客老闗城横吹楚江寒久憐詞賦朱顔减尚倚狂豪議築壇弔富川令劉江屏殉節詩諱欽鄰儀徵籍廬陵人順治辛丑進士死粤西亂贈光禄少卿荒城落日陣雲閒烈士如生碧血殷太尉威靈髙戰伐杲卿風節壯河山孤忠誓死收羣盗數語臨危動百蠻感泣至尊當殿詔科名終不媿朝班瓶梅八首紙窗竹屋奈銷魂相對孤花自掩門解愛寒鐙上疏影不愁明月照黄昏嶺外烽清驛騎來閣門傳火㨗書開殘年卧隠寒檐日索共梅花笑㡬回官閣谿橋記别離山村風雪夜相思不因蕊細枝斜處愁絶天涯嵗暮時博得身閒萬事輕曉鴉啼後夢難成朗吟對汝北忩下冷艶寒香非世情人生婚宦多憂累顦顇紅塵悔舊時却笑孤山林處士棄家還作有情癡禁鐘催曉别花行凍壓寒雲雪滿城駐馬風前聞玉笛故園腸斷落梅聲舊時一本數金直翠幙香綃逗蚤春寂寞朱門半上鎻樓前愁絶賣花人羅浮蕭瑟𣺌雲烟庾嶺荒寒劇可憐萬里邊愁惱清夢五更風雪夜忩前嵗除容齋席上送緯雲還宜興兼寄其年隔夜春帆被急裝一尊嵗酒作離觴江山易老東西别風雨難分上下床入洛機雲羈客恨㳺秦枚馬著書狂買田陽羡時將晩寄語樵漁笠澤傍除夕二首顛倒天吴繡兩頭花鈿拆盡笑淹留團圞醉舞春燈下病婦飢兒也未愁玉箸金盤御榻髙昇平節物夢魂勞王師蚤報收邉郡更典朝衣貰濁醪元日祠祭免朝賀恭紀東來王氣滿春城馳道風雲接兩京天意車書同奉朔帝憐兵革罷朝正罏香影裏千旗動燎火光中萬馬行總為蒼生禋祀切漢家五畤是虚名孝陵忌辰呈楊侍郎楊新自來陵上宫車思徃日瞻拜哭春風廿載兵戈後先朝夢寐中翠華臨想像玉殿在虚空白首儒官老當時供奉同春夜齋宿院中有懐同學諸子南内春雲接禁闈御溝流水送斜暉風前白燕寒無影月下青槐大㡬圍侍従先朝同昔夢弟兄廿載各分飛齋宫此夜聽新漏藜火燒殘閉舊扉春月圓月他時好春來夜自明九霄金鑰夜萬里玉闗情宛轉懸雙闕迢遥過列營刀環空有夢流影照霑纓晉國晉國强天下秦闗限域中兵車千乘合血氣萬方同紫塞連天險黄河劃地雄虎狼休縦逸父老願従戎午日同北山豐臺看芍藥二首韋曲春時嘗爛漫藥䦨午日重裵􅏆己憐菡蓞參差出更遣榴花寂寞開兩度看花也滯留重來風景不勝愁飄零十載尊前客惟有黄門記昔逰問王給事病昨夜眠多少思君落月時髙齋聞雁蚤秋圃見花遲省掖稀囊草安危有鬢丝連朝同寂寞吾病亦搘離奉送宛平田公之奉天二首千里嚴裝塞下過雕鞍落日出闗河蚤聞星漏趨蘭省歸約銀青送玉珂遼海長城邉郡逺南陽帝里近親多趙張方略清威重况是銷兵在政和形勝雄都百戰塵留臺風紀節旄新中朝應切安危計内史須煩社稷臣風雨諸陵秋色逺雲山三輔夢魂親綸書計日看徴召回首鋒車塞草春送熊縣丞之錢塘疎栁凉蟬潞水流驪駒朝發暮扁舟江山萬里多新壘風月西湖是舊逰客路音塵戎馬外故人愁病别離秋不須隠吏誇梅福投筆君須學虎頭寄上何公江寧江左風流間代興相門森㦸夢觚稜錦袍逸韻花前著團扇仁風袖裏承倚檻雲山連北塞飛觴烽火過西陵丈夫五十身強健縮手菰蘆恐未能送趙玉藻編修典試東粤炎天欲盡路㝠㝠庾嶺梅花古驛亭馬援柱邉銅鼓暗尉佗城下燧烟青百蠻文字珠光合諸將弓刀海氣腥傳語有苖干羽盛垂衣天子日談經立秋日子顧繹堂貽上湘北㓜華過集二首生死傷心後悲歌把臂初西樵荔裳相繼淪亡皇天留數子秋日集吾廬風雨孤亭窄苔花晩徑疎不慚供給薄離别較何如舊雨如今雨新秋勝徃秋生涯堪一笑杯酒失窮愁吹角江雲斷啼猿蜀道幽飄零今暖眼酩酊且相留移居懐林澹亭鬱鬱久居此天涯又卜鄰秋花今别汝社燕並辭人岑寂長愁地漂摇獨去身偶因違咫尺轉益念交親七月廿七日移居宣武門東街二首衆峯晴自出為此卜幽棲巻幔秋風入鈎簾落日低纔容旋馬地巳得種花畦望眼雲山外愁時只向西九逵倚徙遍四海問吾廬垂盡將歸槖飄零舊著書殘生闗藥餌萬事託樵漁鴻爪東西意天涯任所如望西山列嶂横天壁連雲並女牆晩風落空翠疎雨濕斜陽巗壑鄉心亂闗河别路長白雲如葢處冉冉近髙堂送李仲如之奉天治中仲如相國子相公門第映重暉佐治留都願豈違沛郡纔為湯沐邑鎬京元是帝王畿六軍錦水新移陣萬壘松山舊合圍剏守四朝疆圉重應須奏最報綸扉和湘北再送仲如玉笛闗山逺送行欃槍影落罷東征霜髙元菟秋深戍月上黄龍塞外城木葉砧聲催别思玉堂詩句悵離情公餘詞賦知無敵欲使才名重兩京送史子修編修歸省十載詞臣省覲歸直廬初罷講筵違牙籖綈几辭天上綵袖罏香出禁闈嵗月暫虚南史筆兵戈猶見老萊衣承歡縱説天顔喜宵旰於今未霽威容齋招同子顧繹堂貽上讌集四首苔竹參差長軒忩杳窱通故教迷出入不自解西東夏果侵階落秋花遶屋紅盆池緑蘋末翻浪五湖風數過歡娱地蹉跎鬢有丝風塵憐縦酒壁壘見殘棋鴻雁又將至明河今未遲坐來新月上流影照蛾眉檻古衆木秀亭深初月妍流螢破暝色宿鳥投寒烟髙齋見水石對酒懐山川自此發秋興松廬方𣺌然風雨日蕭蕭初晴夜色饒銀鞍歸路險白馬向秋驕漏逺疎城堞燈明聚市橋天涯朋舊少不惜徃還遥妙光閣次湘北韻尚書㳺屐經行處夕照殘花寂寞紅舊館己孤簾幕月六時猶響珮環風英雄兒女前塵在香火因縁願力空徃事不堪回白首酒壚相就問黄公夢玉随江湖𣺌𣺌見難期怪爾經年入夢遲别後頭須白㡬許可憐飛動似當時聞笛一片長安秋月明誰吹玉笛夜多情闗山萬里無消息腸斷風前入破聲八月十四夜月南鴻北燕久差池明月天涯處處随風露已霑新鬢髪闗山猶照舊旌旗步檐曳履閒行數簾閣吹鐙獨卧遲遥憶故山凉冷候桂花連夜影離披十五夜不見月秋隂漠漠夜蕭騷如水天河漲素濤三帀繞枝烏宿蚤數聲吹角雁飛髙遥連候火光偏照不動浮雲勢自牢我欲乘風上萬里手排閶闔一呼號十六夜雨過容齋時移居比鄰下馬堂前雨細傾衝泥步屧惜逢迎寒催落木秋碪動夜近髙樓玉漏清隔屋檐花添客思短檠燈火足交情卜鄰我願同晨夕投老終當學耦耕重陽前一日同貽上湘北放生池作紅葉黄花古寺東荷衣行亂渚禽中多生解取伊蒲味半偈難忘綺語工秋色鳬鷖寒漠漠夕陽烟水晩濛濛佛燈夜上星河冷便欲安禪就逺公同湘北送貽上東歸青丝絡酒玉壺香未到分攜意已傷客路蕭條偏入夢離魂老大易沾裳即教對面翻成别却費來書細作行月落燈殘思後夜斷鴻寒影最蒼茫顔澹園編修修來儀部為兩尊人求詩顔復聖裔泰山如礪帶如河儒者勛名代不磨輅冕蚤分新棨㦸簞瓢猶是舊絃歌校書東觀青藜杖下直南宫白玉珂對舞華筵秋夕永燭花横月酒廽波湘北宅宴集懐貽上東歸二首氷雪寒沙路歸遲曉月明竹絲含别恨鐘鼓亂離情被酒猶燕市聞歌是渭城此時茅店裏噭噭野鷄鳴過亭急寒雁月影下紛紛古寺鐘聲落虚忩木葉聞天涯潞河水客夢鵲湖雲行止知無定蒼茫獨憶君冬日即事連坊雞未唱疲馬夜行遲漏點催金鑰珂聲動玉墀朝班存近侍官職在文辭正喜勤封事君王召對時生日梅花書閣晩婆娑短景流年自勘磨拘束正教如杜老龍鍾猶未似東坡文章小技聊為耳嵗月浮生欲奈何千里過庭風雪夜天涯燈火伴吟哦日至陪祀宿天壇院髙居上帝列星環人向天門生羽翰漏盡金鐙渾未暝霜深瑶草不知寒雲霞夜近通明殿劍佩春回太乙壇一昔九霄隔塵夢却疑下界路漫漫三原房慎菴以季弟發公遺行屬為詩人物闗中房季子弟兄名重鄭當時獨憐春草西堂句不愧荒阡有道碑結髪文章輕萬户傷心書巻付佳兒青衫黄壤連枝恨淚葉翻風宰樹悲寄汪大長洲王十一新城五十韻故舊皆何在羇逰己自孤天涯今寂寞嵗晩一踟蹰歴下周旋久江東物色殊别離吾欲老消息近全無雲樹何寥濶風塵正鬱紆珊瑚終拂海蓴菜己歸吴魚鳥無嫌避山林脫覬覦乾坤雙睥睨頫仰自昭蘇憶昔芝如蕙偏嗟亮與瑜名聲陵沈鮑交契到蕭朱秋實繁堪