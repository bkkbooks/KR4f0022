𣺌江漢日驚湍萬𣲖朝宗意登樓細細看出山海闗二首大漠孤城海氣生闗門漏盡野雞鳴邉鴻欲度低殘月曉角翻為出塞聲角山闗下角聲殘口外桃林栁色寒客路長城今日盡平沙萬里更漫漫出闗有懐府寮諸公春衣灑酒别長安二月貂裘出塞寒青草不生烽戍地黄沙己漲海雲端鶯花禁苑邉城隔雨雪闗山客路殘殿上羣公應宴賞東華歸馬簇金鞍出闗門百里宿沙河站闗南滄海浮天盡漠北連峯拔地青一片山河圍鄣塞㡬家烟火接邉庭遼歌調苦風還斷蘆酒愁多夜易醒卻喜皇威臨絶域鎮東門户不須扃山海闗東門曰鎮東雨宿沙石所野隂連暮色萬里接邉空古蹟黄昏雨沙塲慘淡風客行烟火外春盡道途中茅店雞栖早驅車越大東寒食日錦州道中冷節闗山外邉沙暗玉鞍海天常欲雨春路自多寒三月草未緑長安花己殘隂風吹錦水落日正漫漫次錦州世祖龍興日旌旗向此行風雲随尺土旄鉞壯孤城萬嵗還思沛先朝久厭兵山靈盤重鎮應悉使臣情清明日抵十三山下五代史胡嶠北行記十三山去幽燕二千里鴨江春水鴨頭平木葉風髙葉未生客路不知行近逺十三山下過清明廣寧齋居使院遥望北鎮十二韻碣石三韓外扶桑萬國東幽營分地險青冀接天崇華葢垂垂秀芙蓉片片工六重紛揜抱定位屹當中平冕疑羣帝桓圭儼上公生成思擘畫巧絶歎鴻濛望秩存虞典随刋省禹功晩霞舒疊浪斜照貫晴虹滄海縈襟帶恒山配闕宫神光終古在嶽祀至今同芝檢傳王命瑶函啟薄躬齋心塵􅅽外始儗躡蒼穹北鎮祭告禮成紀述二首崔巍坐鎮朔方孤北嶽東來勢欲無襟帶江湘參赤帝神靈烟雨鎻雄都祠壇有路通天表禪草當年問地圖親見五雲籠輦道三聲萬嵗尚傳呼法駕東廵海上迴旌旗萬乘拂天來自經玉趾披階草遂發金錢作殿材風入沛宫曽起舞雲深芒碭一徘徊小臣奉使名山日擁節還如忝後陪閭陽驛留别廣寧令張雲麓更盡陽闗酒一杯故人三日共裵􅏆桃花洞口尋春入木葉山頭並騎來地是先皇湯沐邑君非百里簿書才邉沙逺使歸心切卻為臨岐首重回入闗見春草去時春草白來時春草青塞上草生晩客行還未停覺華島昔聞滄海東南外今見丹梯咫尺間孤島拍浮萬里水夕陽縹緲三神山蜃樓雲霧連空幻貝闕蛟龍礙徃還最訝根蟠無厚地忘情不覺在人寰大陵河夜風雷隂風何漠漠流水自凄凄近海奔雷壯臨邉苦霧低空城鬼火出廢壘戍烏啼野店寒更斷無眠聽曙雞杏山千里三春使節回遼陽不見一花開杏山小店雙桃樹細蕊稀枝亂後栽急水河急水河深水急流歸人三月滯邉州石尤風解留行客惆悵車輪與馬頭歡喜嶺有慢水河歡喜嶺前慢水流歸人歡喜去人愁歸來也是天涯客家在千山萬水頭歸路秦城唐壘逺經過回首蒼凉秖浩歌塞外連山何處盡海邉隂雨一春多野無烽燧如烟火村有蓬蒿似薜蘿稍喜闗門歸路近穠花深栁未蹉跎入闗出塞今為入塞行東來萬里盡長城平沙古堠孤烟色落日危樓暮角聲逺近青山如故國淺深春草是王程紅塵荏苒征人老不見關門紫氣生闗樓壁壘髙樓壯旌旗古鎮尊塞風春不斷邉日晝長昏悲角闗雲動孤城海氣翻徃來慿弔意辭賦欲銷魂闗門館舎後樓晩登一片青山勢壓城晩風樓上海濤聲滄溟萬里堪乘興無那鄉心日夜生澂海樓觀海雲起碧空盡潮來紫浪翻有天浮晝夜無地著乾坤日月還髙下蛟龍自吐吞乘桴知聖意浩蕩與誰論榆闗驛見桃花東行霜草白成堆栁塞桃林待我來誰道榆闗春色晩花開時節使車廽姜女祠誰築長城萬里長至今片石對蒼茫輼輬風起鮑魚亂得似空祠一瓣香姜女墳秦皇抔土今安在六國君卿劇可憐何似望夫山上石不随海水變桑田入闗雜題二首今年馬上過春風闗西花栁村村同栁葉可憐濃淡緑桃花解愛淺深紅山遶盧峰水遶城栁烟漠漠弄春晴銷魂橋上重回首短葉長條太有情夷齊廟清聖祠堂滄海邉首陽徃事尚依然崢嶸泰伯興周日寂寞成湯放桀年萬世君臣今論定古來兄弟㡬人傳只將一勺灤江水捋取山薇薦豆籩同永平唐太守灤州吴守灤河放舟晩登偏凉汀二首灤江極浦移舟逺桼水交流放櫂寛隔渚濛濛空翠合連波淼淼夕陽殘漁村門巷桃花映佛寺樓臺石筍攢晩泊謝公棲隠處欲攜襆被宿層巒黄洛城西歴翠微金泉亭北頫斜暉落花低檻時霑酒細雨深林不濕衣丹頂霞明雛鶴小銀鱗水長􅠧魚肥也従仙吏銷憂到歸夢江湖憶釣磯使還次通州感成蹤跡飄蓬不可尋落花芳草暮愁侵何堪客路來歸日翻似離亭送别心宫闕長安紅日近闗河親舍白雲深他時卧隠柴荆裏記取東㳺塞上吟次韻益都相公重陽前一日萬栁堂讌集二首曉随丞相鳳池頭晩接花茵想勝㳺萬里㨗書頻送喜一時佳節倍銷憂松風有夢懐温樹魚水多情羡野鷗不盡謝公絲竹興邉機尊爼在前籌勝蹟王孫萬栁賖相公清興𣺌雲霞元廉希憲萬栁堂在京城南趙文敏諸公常讌集其中今公名其堂曰萬栁以此也黄塵漠漠雙蓬鬢艶蕊凄凄舊菊花見說登臨猶昨日笑憐嵗月屬官家何時蠟屐陪歡讌也比參軍落帽紗益都一日朝㑹出此二詩謂故相國徐立齋曰終當譲此公送曺頌嘉還江隂峨眉仙子建安流㳺戲蓬萊殿上頭兩制絲綸新史筆五湖烟水舊扁舟鱸魚解愛江東美代馬長懸冀北愁霑灑一杯文字酒離魂去住結綢繆陳將軍忠愍輓詞雄盼秦闗指蜀江將軍才氣世無雙身經百戰曾輕敵功葢諸侯早受降夜雪移營嚴號令天寒伏甲近麾幢竟須遺恨安危䇿涇水含悲急隴瀧白髪白髪長頭鬢含情今奈何榮枯堪一笑身世付髙歌夜雨雁聲斷秋燈人語多殘花掩深户吾欲保天和寫懐日月速如此歡娱得未曾滑稽吾豈敢禮樂力難勝舊事青春隔流年白髪増文章聊自戲送老漸無慿夜出閣門口號宫樹栖鵶啼滿林晩風人閉閣門深黄昏騎馬秋河上只有清波映客心閱武西苑紀事六首繚牆北靣苑門開曽侍先皇羽獵來武帳前頭親校射當今聖主是雄才點筆螭頭嵗月長玉階龍尾步廻翔新教扈蹕參天老賜坐從容近御牀舞劍鳴弓决射侯姓名爭在上三頭重瞳香案親題與司馬前將御札收萬方送喜聖躬勞試武連朝備六弢不似唐家選文士狀頭先進鬱輪袍龍武新軍舊羽林技穿楊葉中飛禽更教射與諸人看一箭君王用意深飲馬龍池駐栁營山河萬里接昆明樓船水戰今都罷巳見弓刀定太平午亭文編巻十一
