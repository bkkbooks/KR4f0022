body:
  text: 午亭文編巻三十四大學士陳廷敬撰史評後漢書三國志光武世祖起金革創痛之餘以昆陽一旅芟平羣盗克復舊物可謂賢已今觀其本紀所載戰陣攻伐之績多而惇大温吉之意少雖制度禮文間復興舉而所以感人動衆者亦寥寥無聞焉此其器量規為上不得比隆髙帝下不能追蹤孝文然而成中興之業者亦適㑹其時之可為遭逢獨易耳使其運際承平可以為守成之令主雖幸而因勢奏功終不得謂開創之雄才也明帝章帝漢之明章可謂仁君矣哉盖人主治理之美載在詔令使後之人感發興起於千百載之下况當時被徳而謳歌親際隆平之盛者乎明帝在位十八年詔恩屢下徳意感人雖孝文之盛無以加焉而或者猶病其察察何也章帝天性仁明政事寛厚詔命温文悱惻節以禮樂凡所宣建達於化原數布赦恩與民更始二帝略同焉嘗竊謂堯舜之盛眚災肆赦當此時論獄理民度無不當其罪而中於法者肆赦猶且不廢焉後之論獄理民者果皆如堯舜之世矣則肆赦猶不可廢也而或者述韓非刻薄之意吴漢臨死之言諸葛氏之治亂國曰無數赦則是求出乎堯舜之上矣豈堯舜之治獄理民猶不足以法而韓非吴漢之言諸葛氏之行事反出堯舜之上乎若潜夫之述赦雖自為一家言君子以為非古者刑期無刑之義矣吾是以自孝文以来於明章之政獨有取焉世稱文景而略明章過矣西漢后妾漢自吕氏流風霍王多故外家之􅍔蔓衍西京而武元以来弛棄禮防縱恣色欲盖其家法繆乖釁生帷闥人道之正女徳之賢無可述者降及東漢中葉在位夭殂統系數斷女主乗權貪立童㓜患起閨門亂成姻黨致使姦臣得志國以淪亡然則宫壼之教聘納之方所闗豈細故哉漢法嘗以八月算人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女年十三以上二十以下姿色端麗合法相者載還後宫其為法何其媮也傳云冶容誨滛戕生伐性絶統喪邦非此之由與以光武之明嘗曰仕宦當作執金吾取妻當得隂麗華其後廢郭立隂貽謀已薄矣明帝仁賢作配明徳斯實后嬪之表儀百禩之芳規也然明帝享祚不永夀三十三耳章帝以下后徳陵替鮮有可稱章帝年四十八和帝年二十七殤帝年二嵗安帝年三十二順帝年三十冲帝年三嵗質帝遇弑年九嵗桓帝年三十六靈帝年三十四獻帝年五十四按東漢諸帝年嵗之促如此其絶於襁褓阨於賊殺無論已餘豈非湛溺於宴私情欲之中以夭絶其天年者哉獻帝播辱於權姦幽囚放廢生於憂患故年稍加長焉嗚呼艶色之於人甚矣哉可畏也夫劉伯升以余觀伯升志意過光武逺矣諸將立更始伯升倉卒建論以為若赤眉有所立則内自樹敵若赤眉所立賢相率而徃從之無所立破莽降赤眉然後舉尊號未晩此公天下之心也獨奈何輕身扵危亂之中不能自㧞哉然英雄之成敗非盡由人事焉昔項羽致髙祖於鴻門范増舉玦示羽賴張良項伯髙祖得間道脫歸更始大㑹諸將申屠建亦獻玦而樊宏以為言當是時更始雖忌伯升兄弟威名非有急於鴻門之事也且更始弱劣豈能遂殺伯升者及劉稷怒更始以謂本起兵圖大事者伯升兄弟也今更始何為者耶後以稷為抗威將軍稷不肯拜更始乃收稷誅之而李軼朱鮪因勸更始并執伯升夫項羽王髙祖闗中漢王忿焉蕭何勸髙祖曰王闗中之惡孰與死乎今劉稷以一朝之忿禍及伯升既無張良項伯蕭何之助而稷之愚又適以速伯升之死豈伯升之咎哉可為歎恨者也来歙甚矣来歙之智也歙從更始入闗數言事不用則以病去後從光武數使隗囂徃来㳺說西州人士皆重歙盖其信義亦有足稱者焉及伐蜀蜀刺客刺歙未殊歙馳召盖延屬以後事自書表進投筆抽刃而絶又何其赫赫烈丈夫也伯升知更始之不可事乃從而不去遂及於難其智不及歙與亦㑹有天數與不然光武何能儼然履帝位而不疚也鄧禹馮異鄧禹馮異之徒非皆有子房韓信之才也徒以遭㑹事㡬書名竹帛流慶子孫豈非其幸哉使其不遇時與褒衣博帯鉛槧之夫何以殊焉褒衣博帯鉛槧之夫如禹異之徒而不遇時者可勝數㢤然其識時命循禮度不以功伐罹禍尤則比之昔時興謀造端之人事成而身就灰滅者誠不得並日談已盖漢之初興非有王侯將相權藉可慿之勢奮甽畞賤微與羣雄角才力並肩而起無君臣上下綱紀之節上以是疑其下下以是疑其上猜釁横生誅醢迭用豈盡其人事之不臧亦時㑹所激而然也至於傳歴西帝分義明判戴白垂髪老穉之民亦皆知王命不可力覬大位不可闇奸故一時附風雲攀鱗翼而来者功成事集俛首降心以鑒前車之轍而為之君者方且信緯䜟䝉舊業安之不疑無所戒忌是以君臣得保終始然則時㑹之當然所繋詎非要㢤世謂光武全功臣踰於髙帝而諸人能一節勝於韓彭者皆未審察其本末所由廢興之故也雖然待功臣當以光武為法功臣自待當以禹異諸人為法上下相疑而能免於亂亡者鮮矣第五倫耿恭屯金蒲城圍急食盡煮鎧弩食其筋革士卒死亡略盡闗寵上書求救第五倫以為不宜救賴鮑昱之議其後救至恭得歸國吏士發疏勒時二十六人耳逹玉門者十三人其艱危如此昔李陵提孤軍轉戰數千里深入敵中正坐無救以降貽羞漢家今恭即無二節以孤城當數萬之衆垂死不救議者之心是何心哉使人於危難之地急而棄之後將何以使人此鮑昱所為廷爭也假如不幸而有李陵之事其為國辱莫大焉第五倫之議以之為恭則不仁以之為國則不忠不仁不忠私孰甚於此者而猶以不受千里馬心不能忘及一夜十起之事詭言以荅或者之問而自命為無私亦可恥矣王梁孫咸史言髙帝斬蛇老嫗曰人殺吾子吾子白帝子化為蛇當道今者赤帝子斬之嫗言已忽不見人告髙祖髙祖心獨喜自負諸從者日益畏之此陳勝魚腹帛書篝火狐鳴之故智也豈真有是事哉故光武之興専事符䜟符䜟之事比於斬蛇魚帛狐鳴其飾詐也姦而為害也深尤恠妄不可信及以之定天下命官用人輒舉是以為徴据其陋益甚矣光武既即位選大司空而赤伏符曰王梁主衛作元武梁從平河北拜野王令帝遂以野王衛之所徙元武水神之名司空水土之官於是擢拜梁為大司空封武彊侯及以䜟文用平狄將軍孫咸為大司馬而衆皆不服改用吴漢是䜟文之謬有不得行於其羣下者矣考其時以妖誕之說謀為盗賊者不可殫數􅃰郡太守張豐以道士言豐當為天子用五綵囊裹石繫豐肘云石中有玉璽豐信之遂反既執當斬猶曰肘石有玉璽椎破之豐乃知被詐仰天歎曰當死無恨又真定王劉揚造作䜟記云赤九之後癭揚為主揚病癭欲以惑其衆與緜曼賊交通後耿純收斬之凡用怪妄之言幸而興者為髙祖光武不幸而喪戮為張豐劉揚至天下略定用以命官若梁咸之徒者尤可笑矣卓茂史載卓茂二事録之使覽者勸焉其一初為丞相府吏有人認其馬茂問曰子亡馬㡬何時對曰月餘日矣茂有馬數年心知其謬解與之他日馬主别得亡馬乃詣府送嚮所解馬叩頭謝之其一為宻令人有言部亭長受其米肉遺者茂避左右問之曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰徃遺之耳茂曰遺之而受何故言耶人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之茂曰凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親况吏與民乎吏顧不當乗威力强請求耳凡人之生羣居雜處故有經紀禮義以相交接汝獨不欲修之寜能髙飛逺走不在人間耶亭長素善吏嵗時遺之禮也人曰苟如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨以律治汝汝何所措其手足乎一門之内小者可論大者可殺也且歸念之於是人納其訓吏懐其恩盖茂所為大抵類此其名蹟留天壤人至今稱之而史獨舉此二事豈人所甚難行者哉病不為耳其效至於能使蝗獨不入宻縣界蝗於蟲豸為􅆟凶頑無知識之物而茂以是化之信及豚魚良然哉及光武初即位先訪求茂方之比干商容之賢封褒徳侯茂薨車駕素服親臨夫茂非有殊能顯功而世祖重之如此或曰茂當王莽居攝以病免歸不仕更始政亂又以年老乞骸骨歸世祖之重之者以此然本傳載茂與同縣孔休陳留蔡勲安衆劉宣楚國龔勝上黨鮑宣六人同志不仕王莽時建武初劉宣獨存世祖以宣襲封安衆侯其所褒寵不能及茂觀當時所以重茂與茂之所以見重於當時者人苟欲自立其所嚮慕取法可以為勸矣魯恭魯恭事蹟多於卓茂官至司徒較顯矣然其為中牟令専以徳化為理不任刑罰郡國螟傷稼犬牙縁界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親徃廉之恭随行阡陌俱坐桑下有雉過止其傍傍有童兒親曰何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以来者欲察君之政迹耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府具以狀白安是嵗嘉禾生恭便坐庭中安因上書言状其行事大抵與卓茂相類初恭在中牟亭長從人借牛而不肯還之牛主訟於恭恭召亭長勅令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾吏涕泣共留之亭長乃慙還牛詣獄受罪恭貰不問然則恭之所為豈嘗以功名為念者哉化人而人不化至欲解印綬去此非飾智驚愚葢出於中心之誠使人果不能化則竟棄官職如鴻毛耳而其所志専務本天之所以與人之理全而歸之於民視後世矯揉拂戾取必於氣力勢權失天之所以生養斯人之意者其相去豈特千里之逺哉是以古今語循良之治者動稱卓魯不虚也鄭康成鄭康成少為鄉嗇夫不樂為吏逰學十餘年歸鄉里家貧客耕東莱黨事起被禁錮隠修經業杜門不出靈帝末黨禁解大將軍何進辟之州郡以進權戚不敢違意遂迫脅康成不得已詣之進為設几杖禮待甚優康成不受朝服以幅巾見一宿逃去將軍袁隗表為侍中以父喪不行黄巾冦青部避地徐州徐州牧陶謙接以師友之禮袁紹總兵冀州舉茂才表為左中郎将皆不就公車徴為大司農給安車所過長吏送迎康成乃以病自乞還家袁紹與曺操相拒於官渡令其子譚遣使逼康成随軍不得已載病到元城疾篤不進其年六月卒盖康成始終出處之大節如此或謂紹之致康成使康成疾不篤必從紹康成出處未可定也然康成不應何進之辟其不從紹明矣嘗見漢以来儒者如康成之卓然行修終始不渝非揚雄劉向之徒所得並論况其博研經籍殫精聖道雖仲舒之賢猶當避其淹洽焉又豈馬融何休諸人所能髣髴者哉范升范升論左氏不當立曰左氏不祖孔子而出於丘明師徒相傳又無其人且非先帝所存無因得立其說支離乖戾無足深論善乎陳元之議也曰升等所言皆斷截小文媟黷微辭以年數小差掇為巨謬遺脫纎微指為大尤抉瑕摘釁掩其𢎞羙所謂小辯破言小言破道者也其言最正矣獨是升之論以為先帝不以左氏為經故不置博士後主宜所因襲則其悖理􅊣道之尤甚者也而元猶未敢訟言之昔武帝好公羊詔太子受公羊不得受榖梁宣帝在民間聞衛太子好榖梁及即位榖梁與公羊並存元所徴引是已然升所指先帝即謂武宣也武帝雖為五經置博士葢汲黯所謂内多欲而外施仁義非真能好經者也宣帝任刑名法術去六籍之道逺矣其所立果皆可以為百世法乎升以是為說其猥劣佞鄙更可恥矣且當時公榖之存亦以其傳經耳非遂以為經也而曰不以左氏為經明以公榖為經耳升之論何其謬妄與及升為出妻所告坐繋得出還鄉里而元之論稍稍得行乃左氏立而後廢吾竊謂後之與左氏為仇讐者謂之淺末非淺末也正苦其難讀耳不學耳食之人焉可與多談哉班固余讀班固漢書誠有如范史所論不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不厭至矣哉良史之才也乃觀其自所論著則又甚謬不然何哉史稱其所上兩都賦咸稱洛邑制度之美以折西賔滛佚之論者大率皆媚道讇辭褒今抑昔以苟一時之榮利而不務存大體者也且夫人之大患莫甚乎有狹前規薄祖宗之意固之所論其辭纍纍然不踰於此至有曰自孝武所不能征孝宣所不能臣則斥言其祖宗之不及後人雖以家人閭里韋布之賤微其子孫亦不敢有屑越其前人之意况帝王之尊聞是說而不以為乖僣者其於天理民彛亦已冺然熄矣乃若寳鼎白雉亦何以異於天馬白麟神爵五鳳之恠詭而繋之以詩欲以陵夸徃昔嗚呼陋矣宋均宋均常以為吏能𢎞厚雖貪汙放縱猶無所􅊣至於苛察之人身或廉法而巧黠刻削毒加百姓災􅊣流亡所由而作及在尚書恒欲叩頭爭之以時方嚴切故遂不敢陳明帝聞其言而追悲之余始讀之未嘗不歎明帝之能有悔心而竊怪均之說有所未盡善也然考均之始末𢎞毅任重多長者之行化流人物不尚名法雖卓魯之賢無踰焉然後知其言之可貴而所以矯末流之失為有功也當其為九江太守也郡多虎暴數為民􅊣嘗募設檻穽而猶多傷􅊣均到下記屬縣曰虎豹在山黿鼉在水江淮之有猛獸猶北土之有雞豚也今為民􅊣咎在殘吏而勞勤張捕非憂恤之本其務退姦貪思進忠善可一去檻穽除削課制其後虎相與東游渡江又山陽楚沛多蝗其飛至九江界者輒東西散去此與卓魯之治效何殊哉猛虎蹈檻穽而不避罷張捕輙逸去至於蝗非有掩羅驅逐之勞能使自不犯境此可見凶頑無知之物猶能以徳化之况於人為物靈而謂法制禁令可以革其心而從吾意之所為曷不觀虎與蝗之避散而得其所以然之故乎事有即其小而可以見大者均之於虎與蝗是已宜乎帝之追思其言而吾謂其言之可貴者亦以此也爰延桓帝游上林苑從容問延曰朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則化中常侍黄門豫政則亂是以知陛下可與為善可與為非帝曰昔朱雲廷折欄檻今侍中面稱朕違敬聞闕矣是延可謂盡言帝可謂受諌矣夫人莫不欲自掩其所短之實而亦有時不加意於不情之名若暴其所短而適得其實與之以名而適㑹其情是謂抉隠摘微動中其忌鮮有不深疾恨之而加以顯戮被以隠禍者若言其所短而不當其實假之以名而違其情猶可曰是與我不相似也不相似則於言之者可以拒而不受以謂無可受之實也無可受之實而因以貸其人則於其人既無疾恨之不解而我遂成大度之名今言桓帝可與為善可與為非謂為中主是暴其所短而適得其實與之以名而適㑹其情者也帝能不疾恨之而比以朱雲之析檻可不謂能受諫哉若周昌比髙帝為桀紂所謂無可受之實而因以成大度之名者也至於謂桓靈之世不聞此言者亦未考延之所論者矣馬融馬融本外戚豪家為梁冀私人李固之死章草成於融手朱祐謂融曰李公即誅卿何面目見天下之人壯哉祐之言與然使融畏名義慚清流寜肯黨附凶姦排􅊣正士悍然冥行以䧟於惡雖聞讜言豈足動其愧悔之良心哉以延篤盧植之賢不幸而為執經問業之髙第弟子亦斯文之阨㑹矣卓哉趙岐雖娶融兄女常鄙融之為人不與相見可謂入汙泥而不染其操者也竇武竇武母初産武而并產一蛇送之林中後母卒及葬未􅉎有大蛇自榛草而出徑至喪所以頭擊柩涕血皆流俯仰蛣屈若哀泣之容有頃而去時人知為竇氏之祥葢物理之不可解者自古喪身亡家豈皆有如蛇之祥者耶而蛇之能為怪異如此君子不語恠史既載其事吾將闕其疑焉曹操自古簒竊之臣非其始遂有逆節闇奸之萌也曹孟徳以驍雄之姿其不得志亦將伏櫪老死豈真有與人爭天下之心哉初操妹夫㶏彊侯宋竒被誅坐從免官後復徴拜議郎及黄巾賊起拜騎都尉討潁川遷濟南相國久之徴還以為東郡太守輒稱疾不就職辭歸鄉里當是時漢既失政權倖専朝操多怨家苟以自免禍全身家妻子為念亦豈真能髙尚其事者耶至金城之亂徴為典軍校尉董卓廢立表為驍騎校尉又輒逃歸是非能不立惡人之朝者以卓必敗且禍及已也然亦豈有天下之志者㢤卓既弑逆操遂散家財合義兵於是始有抵隙乗間之心矣袁紹之起操頗斬削羣盗迎天子於長安還都許而僣竊之勢成矣初操將討張繡於宛也入覲天子用舊制交㦸义頸而前及敗而還遂自此不復朝見而操之簒竊之勢既成又迫以不得不然之勢雖欲自已得乎操下令自叙其生平辭多姦飾然其實亦有不得自揜者其曰欲孤便爾委棄所典兵衆以還執事歸就武平侯國實不可也誠恐已離兵為人所禍然則操之始念不過欲全腰領保妻孥長子孫而已㑹其時之可乗亦未敢遂以有天下為心也至於其勢已成不得自止遂為自昔已来姦權竊國之雄而莽卓之倫不得並焉嗚呼不有桓靈之君彼安能至此哉又世嘗謂魏武貴通達而賤節行以為時方用才随其所急史稱官方授材各因其器者謂此也故嘗下令謂若必廉士而後可用則齊桓其何以覇世又謂有行之士未必能進取進取之士未必能有行葢操之所為無廉無行矣故喜其同於已者耳其所謂通逹者正所謂同惡相濟也曹丕昔孫盛謂丕處莫重之哀設饗宴之樂居貽厥之始堕王化之基顯納二女忘其至恤按丕身行簒逆綱常淪喪忘天性之愛墜至痛之心跡其所為無可言者而盛之著論徴援漢文之事謂其變易古制魏王既追漢制替其大禮嗟乎丕豈得追漢文之制者哉按丕生於中平四年建安十五年為司徒趙温所辟十六年為五官中郎将二十二年立為魏太子操死嗣位為丞相魏王夫丕之生固士人之家也今一旦盗竊神器逐其君而死其父以為遂可以儼然用天子之禮凡一切苟簡恣肆叛於先王之制以成後世邪騖悖驁之習者輙靦顏喪心公然行之而不辭此其尤可恨者也晉武帝曰朕本諸生家傳禮未久何至一旦便易此情於所天使丕而有知得不愧於斯言乎孫權建安二十四年操晉爵魏王四年矣然漢朝臣未有以簒立之事顯言於衆者孫權越在江介上書稱臣稱說天命操乃以書示外曰是兒欲踞吾著鑪火上耶操雖飾言然權之可恥操且惡之自是桓階夏侯惇之徒相繼勸進權實始之也呉蜀相存譬猶唇齒不必智者而知之權既上書以討荆州自效明年權破斬雲長傳其首權其豚犬也哉荀彧荀彧事操操比之子房觀其言議籌畫有足多者操定天下之功彧誠有與助焉史言董昭等謂操宜進爵國公九錫備物以諮彧彧謂本興義兵以匡王國君子愛人以徳不宜如此操由是惡之㑹征孫權表請彧勞軍於譙操軍至濡須彧疾留夀春以憂薨魏氏春秋曰操饋彧食發之乃空器也於是飲藥而卒是操殺彧明甚史諱言之然曰以憂薨是終不能諱也彧事操久操之姦逆所謂司馬昭之心路人所知者也曽謂彧之智而昧於此乎九錫之對葢天理之萌有不得自欺其心者亦兾幸操於我厚我雖沮其議而操且行之使世謂我固不與其事也盖將以逃其責而盗其名文奸飾智之所為耳孰知操恨之至於殺其身哉沮其議而至殺其身彧智不及此也彧烏得謂智乎雖然子房勸漢髙不立六國後而彧能以沮九錫而見殺人之所處有幸不幸而天下後世之是非亦卒以决於所處之有幸不幸者士君子擇人而事可不致慎與管寜每見魏時人推薦㓜安書及其時以璽書相勸迫者未嘗不為㓜安危之何危乎爾懼其或有以奪其髙節使天下後世不得見賢人志士不幸而處濁世避亂朝者之坊表矩矱也最後見陶丘一孟觀輩所稱道甚盛其時具安車蒲輪束帛加璧以聘而寜已以正終年八十四矣吾覽史至此夫然後始快然於心真所謂賢人志士可以為天下後世之坊表矩矱者矣若田疇邴原之徒尚有愧焉况其餘哉然其同時避亂遼東者則有若王烈彥方亦有㓜安之風焉卒年七十八鉅鹿張臶子明潁川胡昭孔明並能不辱其身臶年一百五嵗昭年八十九四子者皆以道樂身義不受辱故得盡其天年若世之反是以苟活者雖生百年猶蟪蛄之春秋蜉之旦暮耳况利欲熏其心垢穢加其外不死於斧鑕刀鋸而戕伐於天刑者衆矣烏足道哉烏足道哉漢昭烈皇帝建安二十五年魏曹丕簒位漢統既絶海内無君先主以漢室之胄繼統嗣位正名號於天下何嫌何疑而陽泉侯劉豹等稱引洛書甄曜度寳號命録運期孝經鉤命決録諸䜟緯不經之言謾誣訓典欺惑衆庶以為受命之符而太傅許靖軍師將軍諸葛亮等亦稱述符瑞徴引圖䜟以黄龍見武陽玉璽出漢水傅㑹經義文其誕妄紛紛勸進輙舉是以為名夫劉豹許靖之徒不足深責孔明儒者亦惑其說使人君正始之初䙝越漫易同於兒戲若將但以欺其巴蜀僻逺之人者是以君子譏其乖立國之逺謨而不可以示至公大居正也又昭烈遺詔𠡠後主有云勿以惡小而為之勿以善小而不為此雖典誥之言何以加諸又曰可讀漢書禮記諸子及六韜商公書益人意智聞丞相為寫申韓管子六韜一通已畢未送道亡云云竊謂為所以貽謀厥後之未善也六經而外諸子之書庸有可觀者若商君韓非之徒之書重刑法而滅仁義三代以来學術不明人心溺於利欲事功混於襍覇至莽操之世天理滅絶人心喪亡不知忠孝禮義為何物其所謂事功皆利欲而已矣是故以嚴刑峻法劫持天下鄙棄仁義崇尚詐偽於商公韓非之書不患其不相謀也今復導之以於法所不得見之書君子於此不能無議焉以昭烈之仁賢孔明之豪雋猶不能自抜於戰國亡秦餘殃烈禍之中他何所復望哉是以假荆州而不還曲既在已失東呉唇齒之助乗劉璋之闇弱奪人之有絶天下嚮義之心二世而亡非天道與又昭烈託孤於諸葛亮曰若嗣子可輔輔之如其不才君可自取孫盛論之曰量君之才否而二三其節何以摧服強鄰囊括四海備之命亮亂孰甚焉世或有謂備欲固委付之人且以一蜀人之志若所寄忠賢則不須若斯之誨如其非人不宜啓簒逆之塗古之顧命必貽話言詭偽之辭非託孤之謂按盛此論可謂不知昭烈亦不知孔明者也嘗觀古者堯舜之與賢以公天下為心而昭烈之量子以安國家為念雖其所志不同不可謂昭烈之心非出於至誠也夫昭烈之於孔明其君臣相遇即三代之隆亦鮮可匹是以成王之賢猶致疑於公旦也惟湯之於伊尹伊尹之於太甲昭烈之君臣可以同類而觀焉昭烈之任諸葛其智不愧成湯諸葛之不負昭烈其忠可比伊尹伊尹放太甲而天下不以為嫌諸葛亮其人也非昭烈不能為此言非孔明亦不足以當之君臣之際豈有所謂詭偽者哉如盛之論可謂不得古人之用心者矣午亭文編巻三十四
