body:
  text: 午亭文編巻四十二大學士陳廷敬撰傳封中憲大夫希聲吳公傳吳公諱道黙字希聲沁州人大父諱某躬耕讀書隴上有學問行義父諱某孝友忠信能化其鄉人葢吳氏世世有隠徳云公生而質直重厚不喜遊媐稍長謹繩墨蹈規矩老師宿儒歎以為不及與其昆季以文學相切劘家貧不能致師聖賢精理皆苦志玩索心自得之里中從而請業者數十百人勸誘訓戒各因其材使有所成就諸子皆自教以學為世賢人公初補博士弟子員數應省試不合於有司退而益以明道授徒為己任其後以子琠貴累封至中憲大夫通政使司右通政公自少至老以孝悌仁義修其身以教其家與鄉葢鄉之知有師自公始也昔余過銅鞮夜見公於逆旅鬚睂軒偉布衣敝冠與余語意徃徃合旦日徃謁謝見所居陋巷蓬門隠約寒素意泊如也葢公之操義風槩如此子三人琠都察院左副都御史為朝廷名臣葢所謂世之賢人也琪􅀈皆有名膠庠中公之殁琠屬廷敬為公傳賛曰余過銅鞮時問吳公家在徐村村有唐徐勣廟故名考勣家曹州離狐客衛南不聞其在銅鞮也或曰勣守并數出雲中戰有功徳在民民祠之其東有文中子祠以通嘗讀書於此沁人之慕義不忘如此哉若公者非所謂古之鄉先生殁而可祭於社者與况修其身以教家及鄉鄉之有師自公始則尸祝而俎豆公者雖比於英公文中子不為失倫矣張太公傳張太公鉁字宇竒别字見虛先世陽城人元末遷沁水之竇莊竇莊者在榼山下沁水環焉以所居人得名然張氏由明以來為士林華族實冠冀南他族姓鮮可為比父五典累官太子太保兵部尚書宮保公子六人曰銓以巡按御史死遼事諡忠烈墓道祠廟肅若神明曰鉿舉人曰鋡進士曰錜舉人曰􅀈貢士時方重科目自鉿以下皆矯厲自奮而太公宮保公第三子俯躬下氣恂恂束飾嘗曰古之君子讀書遂志豈以為遇不遇哉再舉於有司輒不利以子道湜官翰林編修封太公如其官於是宮保公之子六人皆通貴益大顯其家當宮保公時太公為博士弟子員文名蔚起時方有兄弟競爽之目宮保公曰吾家故貧自吾為吏産益落汝曹守文墨皆不治家人生事家人食指多又疊罹寇殣吾憂之可以寄百口者察無若鉁賢太公聞之曰吾知遵吾父命而已游太學歸管轄家事内外纎悉罔不如宮保公意宮保公色喜曰我固知鉁賢鉁果克吾家仲早世遺孤子殤宮保公既命忠烈公子道濟為之後依其婦劉時道濟已長成人太公懼無以慰寡嫂心提其幼子道湜於襁褓中屬劉且十五年不幸太公長子卒劉遣道湜歸曰兒無母我太公不得已命之曰兒無背劉道湜始終事劉如母太公之命也初宮保公謝賓客時忠烈公已仗節殉難鉿年十六錜􅀈生才五六嵗三人者太公異母弟也太公推食飲解衣服以養以教垂三十年皆有所樹立有聞於時於是太公謂吾事乃今畢矣其誠孝友弟出乎天性若此明末舉賢良方正科有司屬意太公太公聞之即日騎蹇驢遯去下太行渡河涉江隠跡武林湖山之間後既以子貴益退損如常人籜冠布袍過市門一人負重力不勝睥睨太公謂丈人助我一臂力太公急呼旁舍人助之力旁舍人曰此張太公也負者懼謝罪太公笑而遣之始余至太公家甔盎蕭然瓦器脱粟時余方少然已知太公修身閑家心敬慕其為人其後又三十年太公白首魁艾巋然長徳夀考燕喜夫婦偕老即其家罕有能並者鄉里稱張太公長者能操行仁義而天之報施善人不爽也陳子曰嘗覽觀史遷以來所傳記畸人軼事多竒怪絶特可喜之行世亦樂稱之葢庸徳者衆人之所去也以余所覩張太公行事何其謹厚純檏退讓君子與席藉榮寵何難取富貴以就功名顧蕭然自外獨行其志非有徳者孰能之其賢矣哉廖氏傳嘗覩建文朝遺事未嘗不掩巻欷歔至成祖殺方孝孺連引九族則又不禁瞋目竪髮恚恨其所為今三百年一時忠臣烈士事多湮滅無傳余在史局摉羅散失苟幸得之則喜以悲而况得見其子孫苗裔耶廖永忠巢縣人楚國公永安弟有功太祖時封徳慶侯子權嗣封孫銘鏞受學孝孺孝孺被禍禁勿得收其屍銘鏞兄弟獨徃慟哭收葬之成祖怒戍之金山余既載其事後見廖生鳳徵文竒其人請與居二年矣不知其巢縣子孫也生之言曰金山距松江百里瀕海子孫世襲指揮千户明之末年鳳徴之祖某知天下将亂金山軍民並處且有變移家之松江清兵南伐衛堅守不下積屍與城堞等兵乃躍上城伯祖某於城樓上手格數人與其長子某皆自刎死次子某亟歸遣散其家人自焚親屬二十餘口還刎父屍傍以死鳳徴之祖以郡居弗及於難搆屋申浦之南教子孫以農賈為業國初徴領旗軍子弟為運漕干總戒勿徃今雲間廖無二姓皆巢縣裔也今吾乃知生烈士之子孫而益歎慕其先有當稱述者或以節死或以見幾去其致命遂志者為忠義臣潔身逺害以教其子孫可謂賢人君子矣吾獨惜其名字皆失而不可求也故為記其略如此旭白韓君傳韓氏其先魏王琦家在相州宋亂相州數被兵國子祭酒曰永實始遷洪洞當其時洪洞之韓累數世不仕然皆屈首受詩書尤精黄岐之學能以業其家所活人大多功葢與古之良相者侔洪洞之人曰真韓王裔孫也前明成化中以進士起家累官户部尚書曰文有直聲最後抗章暴劉瑾罪武宗驚泣為不食瑾矯㫖奪尚書官下詔獄瑾誅復尚書嘉靖初數薦不起進太子太保賜誥褒美卒贈太傅諡忠定忠定公子士聰髙唐知州士竒刑部主事皆以瑾故奪官於是韓氏始大顯名於時矣君諱光曉字旭白髙唐公五世孫祖汝松家齎用素饒不省計喜施至靡財單幣洪洞人謂韓氏世有其徳父承寵濟南同知敦樸謹愿能繼父志不屑以財自雄然時以其留餘稍稍用鹽筴才足給食指遂移其家津門在濟南既不樂仕宦解其官歸曰吾韓氏世有徳於洪洞吾其可逺先人之墓廬且洪洞人愛我吾必歸歸次曲陽無疾而卒君時獨從哀號路側過者酸鼻既歸葬㑹京東兵君母亢留張灣及於難君卒遭變執喪行古制雖士大夫習禮者莫能過焉濟南公二子君其季與伯氏異母君母亢安人初亢氏善富髙貲亢之來歸也豐其奩金累數萬濟南公曰季亢之自出也金必歸季後君皆以金歸伯氏里中賈豎素怨伯氏訟伯氏欺其孤君曰我固以讓吾兄由是訟者大屈君事兄如嚴父待兄之子如已子人髙其行化漸於鄉焉君嘗為博士弟子員嶄嶄立名譽妒嫮者妎其能将遺書督學使者使黜君然其人陽與君相交驩傭奴數數來奴誤謂遺君者遂以書抵君君視書嘸然語奴非遺我也奴持書去後君竟用是黜君終不語家人以故妒者後覺之大慚恚曰吾傷長者無面目自活其意度行事多此類封文林郎娶亢氏封孺人子象起主事象起初為福山令有異政陳子曰今人為其父母傳者直以為誌表之餘事耳豈真能知文字之可貴哉夫人不皆有竒徳卓行故傳者尤徃徃難之象起之求傳其親獨異焉曰誌以納諸幽表以掲其外然而不皆可行世致逺也於傳乎是重敢以煩公余見今户部尚書福山王公嘗數稱福山之政有異王韓婚也故語韓事有足徵及退而考其家世竒徳卓行果皆可傳也是以叙著於篇嗚呼韓君之賢知文字之可貴如此而大司農謂韓君曰今之名能文而可為子先人傳者陳子也夫王公擇人而使為文則福山之為政其得於鄉邑賢大夫也有由然矣三烈婦傳裴氏陽城龍莊里民張琦妻琦賈人常游河南北間客死禹州裴聞而號泣曰天乎夫死無子我義不再辱我昔嘗笑人何至令人笑我耶絶食五日不死其兄來祭琦裴止之曰姑待我而家人防視愈益嚴强之食復食於是守者稍懈遲明視之自經死矣及含斂貌如生莊靚猶未聞琦死信時夫以婦人稱説大義凜凜有古烈士風其亦可以愧世之為丈夫偷生苟免者矣時康熈己未嵗正月也其後陽城以夫死自經從葬者復有二人其一在陽城之化源里曰李氏李氏者石基永妻基永家貧好學至不能繼脯糜而誦讀不輟遭時喜賄年二十七不得列邑庠鬱鬱以死有二女一男男才二嵗基永死之明日男亦死基永以貧故五日始克棺斂李取基永手鈔秦漢文唐詩各數巻内棺中是夕櫛沐自經棺傍張任妻王氏陽城白巷里人曽大父參政公徴俊死崇禎時流賊難者也大父父皆儒生任大父中丞公父民部君兩家俱髙門王年十六歸任才數月任為學官弟子員數日病卒王絶飲食居樓中矢必死家人環守之明日紿其家人趣使下取食有小女奴在傍陽怒之女奴驚趨出遂自經死衣桁間經以夫故腰組項下經痕處受以白縑數寸許衣上下縫紉牢固不可易未死前一日嫁時衣履巾帨諸飾用物從王氏來及夫家者各别置不亂室中羅列悉就完整不以倉卒改常度其從容暇豫如此死時年十有七康熈庚申八月朔也陳子曰自吾居里中二年三見烈婦事近世鮮鄉閭之教烈婦之事謂非出於性生者耶始張琦妻裴余嘗語邑令以聞於大吏請表之已而格不行余嘗觀古烈女雖猶未至於三婦人所為者皆得史傳著之以勸天下後世如三人者使聞於朝而旌異之以助風化其不亦偉哉張太恭人傳張太恭人者徳州人通詩春秋傳及羣書嫁為田大夫妻大夫順治中以進士知麗水有能名卒於官恭人取庭中牘籍勾稽驗覆召管庫謹視賦徭所入曰代者至則必以是淹吾行吾貧不能賂庶謹備之後代者至果以為言恭人牒太守請自臨詧太守王君來坐縣堂上恭人身自立堂下見太守顧家僮持籍以進太守按籍閲所入出無一舛漏者代者屈恭人得以大夫櫬行當此時恭人提其孤歸數困於强豪孤雯予友也為予言曰雯母師也一室之内十年之間午夜篝燈紡績聲讀書聲哭聲三者而已予聞之泣泫然不自止其後雯需先後成進士雯填撫三吳移撫黔需在翰林霡亦以文行選入太學皆恭人所自教年七十七凡四進封以卒恭人能文章工詩詩成輒焚棄謂其孤無非無儀惟酒食是議詩之教也孤弗敢强然猶傳其茹荼吟三十首咏歌於士人世之自以為能詩者莫能及也文多後悉取其藁燔之今著其存者一篇葢恭人年七十時里黨為恭人夀恭人以戒其孤之辭辭曰示雯輩女昨來言里中先進學校鄉曲諸君子父老謀欲醵錢寘酒筵合諸名家文詞張屏幛如前嵗夀蕭太夫人事将以夀吾者此親串盛心洽比雅事吾烏能無感然自度有甚不可者今得詳為女曹言之按禮婦人無夫者稱未亡人凡吉凶交際之事不與亦不為主名故春秋書紀履緰來逆女公羊傳曰紀有母何以不稱母母不通也何休學云婦人無外事所以逺别也後世禮意失始有登堂拜母之事戰國時嚴仲子自觴聶政母前且進百金為夀葢任俠好交之流有所求而然耳豈禮意當如是耶吾自女父之殁於官攜扶小弱千里歸櫬含艱履戚三十年餘闔户辟績以禮自守幸女曹皆得成立養我餘年然此中長有隠痛每嵗時伏臘兒女滿前牽衣嬉笑輒怦怦心動念女父之不及見故或中坐歎息或輟箸掩淚今一旦賓客填門羊酒塞路為未亡人稱慶未亡人尚可以言慶乎三十年吉凶交際之事不與知而今日更强我為主名其可謂之禮乎處我以非禮不足為我慶而適足増我悲耳且我何可以蕭太夫人比也蕭太夫人年躋八十於古謂之中夀蕭封君即世不過十餘年為白首夫婦女父之亡吾年未四十今更三十一年亦僅古之中夀耳何可以蕭太夫人比且其子侍讀君居里已十七年徳望髙善行被於鄉黨鄉黨徳其子而慶及其母宜也女曹中外薄宦偶歸里閭無善及人而亦偃然受鄉先生里父老之捧觴拜跽其又何以為情頃者米價翔湧邑井蕭然親故素多貧乏若復合錢市籑為未亡人進一日之甘未亡人更辠戾是愳矣女曹官於朝宜曉大體其詳思禮意以安老人之心為我先事而婉辭之惟勿忽也其遇事引經傳以合乎大道類如此此皆其可為傳者也贊曰初廷敬嘗私怪雯在京師時獨乆從余游日以其所為詩若文來廷敬居西街雯亦徒西街居既乃知恭人之教命然也昔敬姜見文伯之友降堦卻行奉劍正履召而數之以其所與游皆􅆺事已者文伯謝而擇友引袵攘捲親饋事之甚至君子謂文伯之母備於教化予於友無能為益然亦自信非􅆺事人者是以恭人樂得為其子友與若子輿氏見俎豆揖讓之事而悦之母曰此真可以居吾子予不敢援是以為比也恭人之賢豈遂逺於孟母也哉午亭文編巻四十二
