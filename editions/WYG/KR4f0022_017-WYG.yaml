body:
  text: 午亭文編巻十七大學士陳廷敬撰今體詩舊有樊川圖不知者毎以杜曲相儗近以午亭山村自别石谷為予畫之虞山粉本富陽翁老去仙人隔閬風前世畫師今在眼依稀黄石是黄公答王石谷且屬其作午亭烟舫小景蓬萊下直寫平泉江練横牕思渺然近有午亭烟舫景煩君寫入舊樊川午亭山莊圖詩五首有序酈道元水經注沁水逕午壁亭而南友人朱竹垞謂予何不取以名其園比同在内直輒好語山水園林之勝於是玉峰尚書為作午亭記當此時予未嘗有園也已而家居闢山村股濂泉之水鑿池其中横橋小舟咫尺具烟波之勢以實竹垞之命名果有午園矣盖予所居樊川終累牧之城南下杜之稱思有以别之且吾居近午壁亭沁水之涯也爰即樊川故居又名曰午亭山村午亭之間山髙水清林廬池舫幽居之跡則王君石谷為予畫焉使玉峰而在當為更作一記他日請竹垞為予記之夫五畝一區而為名之多如此甚矣夫吾之溺於其名也午壁亭名載水經秦時流水漢時亭何人更與桑欽注一畝園中水木清午亭人在翠㣲間林際清暉自徃還砥柱析城至王屋天教看盡好雲山吳淞烟雨石湖春不到江南老竟真山水連天溪艇窄也能作意向詩人西湖杭潁别圖經吳楚湖山兩洞庭獨訝樊川同小杜朱坡不比漢家亭朱坡見杜岐公傳丹青老手荆闗筆重寫天隨舊釣船晩喚午亭還識否世人曽擬杜樊川司農署中題壁署尾文書鎮一堆五花臨判日遲迴田園正憶叢殘句黄紙蠲租白紙催末句見范石湖田園雜詩題梅桐巖真二首畫裏江城疊嶂髙北樓逸興重蕭騷梅花山下雙羊路秋老梧桐有鳯毛太白仙人謝朓才都官風雅一時迴吟成倚樹栖烏過驄馬連朝對仗來松風蒲葉榴花五月天歸來一枕北忩眠誰知無價松風夢不向人間費一錢題張吉如南汀詩後並呈敦復宗伯卣臣翰林浮山髙望歴山城風馬雲車帝遣迎湖水清波舊時月春來七十二峰明吉如父諱秉文山東布政使崇禎己夘守濟南死扵圍中贈太常卿二夫人投明湖以殉皆贈一品夫人珮環聲裏水潺湲芳草羅裠隠杜鵑一首新詩萬行淚不須苦廢蓼莪篇吉如生母與嫂方夫人合墓太傅風髙未老時尚書隖畔有清暉香名已播雞林逺不羡他家野鶩飛王風南雅氣雄哉騷賦張華小謝才怪底西堂新句好也應曽夢惠連來七夕宿城北人家亭子戯詠織女銀浦臨波濺繡裳明霞猶似嫁時妝畫眉月姊教新嫵掠鬢風姨送晩香天上雙星兒女態人間一日别離腸鳯梭閒却機絲冷烏鵲頭童嵗嵗忙贈銅川都憲飲香摛藻擅西京南國訇傳茹蘗聲霜簡新迴烏府重玉壺猶映漢江清節旄裴相歸朝蚤治行吳公進秩榮臺柏髙秋森獨坐還於淡菊見交情丁丑六月十一日奉命題路路清廉畫扇殿閣㣲凉日民巖顧念時畫圖皆善誘簪紱有良規飲露心元潔含香氣未移年年鳯池畔聖澤本無私自五月廿二日直苑中敦復尚書有詩次其韻得十首長日東華拂軟塵眼明流水照游鱗蒼顔白髪吾曹老冠者輸他五六人同直六人斧扆丹青接後亭綘霄樓閣在滄溟六龍南幸歸來日畫取江山上玉屏半夜傳呼向玉津賞花徃事隔前春紅雲終日籠丹地回首凌霄記不真舊日春遊共徃回東風依約野棠開黄塵影事看清海曽到龍王廟裏來四捲朱簾照碧淙松風五月在羲忩眼前萬物各相命鵁鶄駕鵞時一雙梧桐疎雨早秋時一夜新凉幾鬢絲野草花邊溪栁路等閒常過水仙祠聴徹西洋五刻鐘晩霞明鏡寫天容池西不種新楊栁留取青山三兩峰秋花錦石路迢遥銀漢無聲瀉玉霄日暮水晶簾下坐不知何處御香飄草藁孫郎墨氣清横斜㸃筆石欄晴天人秀出華亭老萬嵗傳來燕喜聲此首専贈樹峯以繼華亭天語褒奨書法可翰苑文章媿大家枋榆影裏日西斜歸來牢記支機石曽附天邊博望槎題鄒喆畫鄒金陵人畫裏江城夕照間烏衣人去野花閒六朝松石今無恙便欲移家向蔣山苑中次敦復韻寳牀食罷鳯團清絶勝仙人白石鐺除却進書簾下語神霄肅穆不聞聲苑中次韻孫樹峰司成十首鐵騎長征瀚海隂歸來水殿倚㣲吟吾君文武超千古方略流傳自禁林青田舞鶴字芳林聲在雲霄不可尋日日朝天平步到自憐凡鳥是仙禽北牕午夢日初長一枕松風自在凉寄語陶公莫歸去心閒此地是羲皇行近通明玉案邊迴看下界𣺌雲烟怪來諸想随緣盡身在清都兜率天情多想少渺難裁身到烟霄盡處迴為問三山髙幾許瀛洲行過是蓬萊十丈開花玉井蓮退之新句鬭芳妍他時編入歸田錄分與樵歌牧笛傳連朝風雨液池平天意分明為洗兵細札十行心萬疊誰言容易見時清夜珠明月巧難移况是江花上筆遲奏進九霄天一笑栁隂小立不多時狼居胥是禁園山池沼黄河水一灣萬里九邊勞聖主苑花開日不曽還神龍矯矯在天門紫霧彤池斗宿翻茒屋近來多氣象箧中常有御書存七月二十日傳㫖網魚賜侍直諸臣是日竟不得魚恭紀一霎蘭橈小院門傳呼中使玉音温金鱗網得須宣賜未賜恩深已賜恩書樹峰司成扇紫髯端欲貎凌烟八翼雄風已到天自笑一生寒骨相曉忩難起夜難眠蚤秋苑中入直曉行原上村不覺秋已至遥遥入清暉忽見山際寺上元夜懐廖芸夫曽解金龜換紫貂中山千日醉醇醪春城漏轉催銀箭上苑花遲待彩毫歌斷落梅江樹逺坐深明月薊樓髙西忩舊事傳燈火此夕懐人客思勞題畫扇應制四首當時破敵著戌衣隴樹連雲塞草肥記得兩年沙磧裏池花開日未曾歸清池洗墨玉階隈繞硯香烟翠欲堆散作夏雲常五色九天膏雨一時迴香案前頭積翠鋪稻畦麥壠似枌榆兩岐九穗尋常見應補豳風七月圖圖書插架殿東頭天碧新晴萬象幽茗盌雍容勤夜講山前落月上簾鈎題李公凱學士松隂讀書圖二首牙籖三萬軸長懸秘閣書曾借㡬編正是松根勤暗誦連朝花底索鈴傳藜火頻年汗竹青槐隂人在第三㕔慿君一問華陽老多少松風夢未醒午睡起答蓮士問疾一枕邯鄲夢半成依然茒店午雞聲簿書已逐紅塵老藥裹能禁白髪生幾畨野花開更落頻來山鳥語多情天涯門外悤悤意未了禪須動裏行答拙菴禪人漠漠何曽慧眼開神州東望意遲迴桃花未老松枝長留取盤桓落草來初春簡雪隖十丈黄塵落日懸三條陌盡寺門前已無朝士飛騰意曽結髙僧寂寞緣白首詩情歸半偈紅樓人面入新年欲尋舊約雙林去多在鶯花二月天送宋堅齋給諫葯洲太史扈從南巡二首青鎻金門侍從同翠華春發建章宫焚餘疏草鑾坡上賦就梅花輦路中行監幾回隨渭北亡書三篋記河東鳯池並接絲綸美親捧流觴聖藻雄雲霄扈蹕出流沙晝錦歸來侍帝車紫袋雙垂龍尾近黄金並絡馬頭斜九河天上春船水二月江邊御道花太史周南不留滯嗟余衰鬢客京華查聲山太史花谿垂釣寫真王石谷補圖二首日影罘罳晝漏頻銀臺三昧惜餘春漁竿不比絲綸筆漫儗江村水垞人詞館於今屬盛名風流破墨付王生近來新得南唐紙送與能書石曼卿張慕亭林坐小照二首昔同事御史臺横榻風生對仗頻絳騶千步逐行塵年來借問藏書處清簡留名得㡬人數行書奏九霄邊漏斷烏啼夜未眠敢道霜威誇獨坐張公論事已回天居士心情問老龐饒他陸海與潘江閒來試檢丹青看風貎阮何同一雙自了平生半偈緣逢人脱帽有華顛不應鳯閣鸞臺客也學天龍一指禪春夜觀劇蓮士有詩戲和其意從他假面奏伊凉休羡登筵舞䄂長六代歌風吳季子元家詞曲蔡中郎古今過眼看遥夜神鬼臨頭坐廣場多少榮枯誰料得與君且醉手中觴重過㠯公祠四首枕上三生事已深夢中猶未忍抽簮仙源只在人間世不向桃花洞裏尋黄鶴千年更復還朝來紫氣滿燕闗眼中人去無消息誰識三山在世間金合刀圭照夜開丹砂元不救凡胎劉郎一病秋風冷曽噉蟠桃四顆來回首清都客夢違玉霄鸞鶴幾時歸如雲六翮今飄墜不借天風不敢飛曉起簡雪隖城鵶起辭樹久客無晨眠池閣漾寒月竹房籠曉烟雲山催短景簪紱入殘年懶慢吾今甚無心去問禪酬贈于子龍秀才多君長劍倚崆峒况事仙人白兔公王屋天壇青嶂裏河陽古寨碧流中詠從洛下書生好詩是山西老將雄欲共飛車三萬里赤松同訪趁西風送張毅文翰林歸淮上因懐孫籜菴學士黄葉西風落御溝楚天烟水一扁舟雲隨鴻雁蕭蕭去月映清淮渺渺流桐柏山中人獨徃芙蓉江上夢三秋更誰得似蘇門子長嘯為君遣四愁城西晩行望西山二絶句燕市何人共酒杯出門祗為看山來黄塵未㫁殘陽暗空走城西漫浪迴西山隠隠夜悠悠烟鎖西峰萬叠愁無限客心遮不得空隨明月上譙樓石西崑參戎請老賦寄並懐其兄子約廣文西凉州簿舊書生猿臂飛騰在北平射雁風髙臨玉塞盤鵰雲起望神京將軍名已髙三箭都尉階還列九卿老我燈窗人共逺青山依約别時情雪中下直同阮亭儼齋賦贈星霜待曉上金坡暮雪盈階退直過色映瑣窗明玉几光鋪仙沼落銀河六花風散披香蚤九陌春迴却月多漫道調髙還寡和萬人争唱郢中歌南至㣲雪齋居懐同直敦復近公陽琯初回綵線㣲層隂連夜滿皇畿梅含綺閣花先放栁暗龍池絮已飛省署漏隨銀燭換烟霄人向玉階歸相思為報瑶臺客明日占雲在禁闈朔日冬至南郊呈田綸霞李木菴兩司農雪後晴暉滿帝京齋宫午夜近通明陽回鳯朔周元日律應龍杓舜玉衡五服菁茅連海外九華燈火與雲平欲因寳鼎推神筴荔子香芝嵗嵗生齋所贈木菴晝簾終日紫烟縈齋閣香爐對晩晴雲散玉繩低古署雪融珠斗出髙城八能律琯飛灰映萬巻書籖插架明見説綸扉多勝事一門三葉嗣元成木菴家及里中故有三相至日寄懐日者朱生丹岩有江南之遊至日陽生亦快哉青春殘臘巧相催山梅欲放紅闌曉㟁栁将舒綠浪迴客有唐生長信命人非賈傅莫論才五湖三畝揚雄宅曾問成都大隠來送劉宗一檢討出守揚州宗一秦中名家兄弟並在翰林詞賦相如重漢京侍臣擁傳出承明雲霄晝散鳴珂直淮海風迴露冕行春草西堂天上句梅花東閣隴頭情六龍近日時巡處二月柔桑乳雉鳴晩登慈仁寺閣懐阮亭司冦鳯城傑閣絳霄邊龍象髙居俯逝川雪擁晴沙三市月春生芳草五陵烟雙林退院鐘魚寂終古燕山嶂塞懸詞賦仲宣人並在暮愁銷盡近諸天得竹垞書卻寄青鏡流光旅鬢疎慙君問訊近何如門前燕市黄壚酒袖裏江雲白雁書豈有勲名懸竹帛已知人物在樵漁㶚陵栁色年年綠送盡離人伴索居生日示壯履霜落天髙色蔚藍縱憐風月與誰談人非毛玠清難似自比嵇生嬾不堪徃徃長筵餘碩果年年春酒醉黄柑金根粗識扶犁去不用牙籖萬軸函題王瑁湖宫詹下直傳經圖二首鳯毛池上有輝光他日歸來笏滿牀堪笑杜陵文選學但教莫帶紫羅嚢芸香講席幾重深五桂居然玉樹林聞道一經親授與未須同異較劉歆寄答曹冲谷昔予出闗過其家今二十餘年矣行盡燕山塞上村海天烟霧氣常昏邊花客醉遼西郡闗月人過薊北門一别隴梅遲驛使幾回春草憶王孫君家舊比灤江水萬事風塵未敢論露湑閣懐亭湖蓮士髙閣懐逺岫山牕盡日開雖無佳客至時有白雲來簾捲海月上鏡拂江鴻回何當共吟眺暝色獨徘徊蚤春虎坊南墅憶舊逰懐徐尚書寄朱檢討杜曲園林一水濱舊逰風景十年頻江山不負羊裘客城郭誰知鶴背人草色淡烟龍紫陌栁條輕雨洗紅塵劉郎前度看花在却為愁多賦早春憶盧龍舊逰有懐倫子受使君猿肩虎石事悠悠為客青春欲白頭碣石東風生大海薊門明月照髙樓邊闗路繞車輪去花栁村深步屧㳺今日使君行部處雲山三晉控神州春日㸃翰堂即事促吳元朗為題午亭山村圗丘壑何曽似逺林曲欄深榭幾沉吟野桃破曉紅仍淺霜竹經寒綠故深二月風光真漫浪三春樓閣倦登臨午亭題句如相贈好在谿山畵裏尋清明後三日郊行贈韓慕廬少宰春郊浩渺似天涯走馬追尋一笑譁冷節却纔過射栁紅塵不是為看花荆州風月同今夕江左文章屬大家紙尾陪書聊自忖鬢絲蕭索墨痕斜有感題舊草後寥落浮生與世違叢殘文字校斜暉家臨紫陌三條路人閉紅塵兩版扉命定豈須尋季主説難猶自笑韓非篋中焚草縁何事忍負雲山舊釣磯城南張氏園讌集藤杖芒鞋踏淺沙行穿犖确路横斜綠楊纔放初晴色紅杏猶禁半坼花坐久雲深迷野鶴酒闌風起亂昏鴉山公酩酊歸來晩不省兒童拍手譁昔與孫仲禮有鶴圃唱酬詩因隨正姪寄訊罨畫溪廊賦竹枝圃中仙鶴别多時龍兒編寫新成巻題作劉紅唱和詩春日新堂簡西鄰給孤寺主西鄰喬木綠隂斜也有春生倦客家半掩雙扉來燕子新開小徑放桃花香林佛舎明殘照粉蝶山樓挂晩霞近日逃禪逢酒渴扣門思喫趙州茶春日簡張夀平進士張善岐黄之學未解參苓細與論杏林人語自春温已知楚越分肝膽尚有鶯花役夢魂二頃豈須謀負郭百錢聊可共開樽城南舊是笙歌地藥裹閒時肯閉門上元前夕宿法華寺春日有間酬三明長老索詩之意青山落日正逶迤况是春燈欲試時佛火長明投寺宿氷山蹔撞看兒嬉檐捎烟樹東風蚤院閉霜鐘曙色遲一諾湯休微笑意桃花栁絮又參差城南讌歸贈夀平羈旅平生意相逢薊北門不知黄金館但見素山原歸路野花落到家棲鳥喧所思燕趙士懐古尚堪論訪戴家圃留題我愛戴顒宅春風一徑斜城中得流水幽處見桃花古石滋青蘚髙亭映晩霞王孫隨意住芳草不離家與張澤長與子共丘壑園林方未還谷口沁河水門前王屋山柴荆夾澗對桑柘交枝閒别後東臯月清光照掩闗送隨正姪落第歸花落鶯啼送子還春光翻自惜衰顔蛾眉已老人何忌蝸角無争我欲閒芳草離心千里路夕陽孤影萬重山回思華髪蕭蕭者雖在紅塵却閉闗隨正赴澧州江漢何曽到雲山亦自便花明新月夜栁暎碧雲天家習燕人語予賡楚客篇風帆渺何許相憶洞庭船題恒齋采菊圖二首椒風宫閣日初長榻到蘭亭第㡬行珍重畵師秋菊意百花開後晩花香瑣院垂簾隔晝隂墨花秋巻共沉吟年光人澹還如菊猶是飡英飲露心三月八日晩出西郊宿法華寺落霞如綺草如茵漠漠晴川烟景新栁陌不隨今夜月桃花争見一年春到門雙樹松隂長下榻三迴客夢頻清梵未殘雞唱曉又驅羸馬遂流塵雨宿苑外人家月照深林風葉鳴曽疑夜雨弄秋晴燈前風雨瀟瀟夜却似長楊樹裏聲悼姜西溟牛耳雞壇孰主盟燈檠風雨暮年情都将阮籍窮途淚為送劉伶荷鍤行黄土文章圜草綠白頭科第榜花明瓦全玉碎皆由命敢向詞塲薄友生晦菴論詩儒林道學費調停雅頌分明在六經記得考亭詩法好先從陶栁入門庭伊川論道家九流先列道家名修養長年事可成萬古眼前天地在更於何處得無生烟玉堂倩向雲澤畫壁三間草屋槿籬寛晏坐深知行路難細蕊孤花連暮雨清隂幽竹過春寒杜門謝客幸無謗入世逢塲甘少懽謾待向平尋五岳卧遊須與畫圖看王石谷寫午亭圖恕先放誕虎頭癡自古髙人是畫師不用朱門新様好茅菴畫我看山時冬日齋中草木竹時世粧成様樣新揚州紅藥可憐春日斜脩竹檀欒晩誰念天寒翠䄂人梨東南竹箭㡬人栽江舶年年秋色回上谷紫梨霜後好黄柑丹橘一時來𤓰蔓荒寒繞屋朔風吹一種青門在路岐欲識故丘離别意秋𤓰人憶及𤓰時梅飲氷餐雪在人間獨向東風一破顔不是百花無伴侣孤花只合在孤山杏紅杏東欄雪壓枝晴曛籠靄已迷離對花莫被多情惱看到成隂結子時鐵梗海棠狼籍妖紅照眼明誰知霜雪鬭春晴問君鐵枿花開早多少丹砂㸃得成棗質如橄㰖味甘良露灑風披合得嘗不必荔枝煩蔡譜教人舉酒酹唐羌送田生之易水督亢千年畫未殘烟雲粉本任君看青山逺送荆卿去不待蕭蕭易水寒夜行贈蓮士紅塵已逐綠驄行夜静街長漏㸃清風動牆花過比舎月斜堤栁向西城沙村宿雁迎人起茅店殘燈閃路明金馬門前閒大隠不來同聴野雞聲送阮亭大司冦予假歸二首燕山㣲雨過晴色擁朱輪畫省留堂印青門待吏人王程千里近祖道十年頻欲訪龎公去看予孰主賓以修墓請予假三月酌酒栁條下清風生綠波天涯芳草在客路夕陽多花為将離贈鶯成緩别歌慇勤惜分手遲暮意如何贈術士可惜長沙傅空尋日者遊干支渾閒事天地莫深愁閉肆客過市跳壺人在樓若無今古恨猿臂亦封侯郊行贈太倉崑山兩少宰野色髙梁接曙霞玉鞭人指彩虹斜紅泉雨過分流水綠栁隂多掃落花馬上雲山空夕照樽前風月屬誰家慿君更憶江南樂畫舫春逰泊晩沙署中齋居用吳元朗扇上韻送黄自先守澂江兼寄孔東塘三君皆舊同寮宷芳洲杜若笑當時賴有蘇卿是副知不習簿書來吏舎回憐風雅在曹司扇因吳猛留仙訣人為荀公作小師倘過魯城聊寄語絃歌休唱巻中詩署中語西田之勝疊韻畫裏江城對赤霞西田春望海天斜賜湖雲擁平泉石舊邸香深玉樹花氷署相逢卿月夜午橋重問令公家槐隂故事金坡路門㦸頻年長院沙晩晴臺憶舊遊寄朱竹垞髙臺孤迥獨遊頻誰道天涯若比鄰紅樹風來春色老青山雨後夕陽新閉門陌上三條路倚檻樽前十丈塵寂寂蓬蒿蔣生徑羊求歸去見何人送吳天章自天津歸蒲東二首春芳今欲歇别思轉悠哉狗監人難遇蛾眉老易猜青山三晉逺秋色九河迴千里臨岐意能無酒一杯歸到中條隠髙居長薜蘿清秋臨華岳落日見黄河人物雄才老雲山間氣多玉谿終古在相並得金鵞金鵞天章齋名戲題杜上舎著色蘭二首幽蘭空谷自天真細寫黄金綠玉勻豈是丹青工作意學他紅粉向時人綺蘭髙絶楚騷工剰有幽芳入畫中聞道集賢多綵筆能無風雅續蕭嵩再叠韻酬果亭少宰見和郊行之作竒麗澄江散綺霞自驚西日晩山斜閒雲欲傍滄浪水野草還連鄠杜花白首多時同禁省青春㡬處到山家綠深桑柘紅橋近且聴流鶯藉淺沙夏日對酒簡顓菴少宰兼懐㓜芬松風五月盡塵沙清晝抛殘又日斜世上若無千日酒簾前空負一闌花習池酩酊非山簡江左風流是謝家却笑後堂君未到更無人隔絳帷紗㣲雨有懐顓菴果亭相對忽不樂相思轉未慵髙齋過㣲雨暝色來疎鐘酒易金龜換人難玉塵逢同君寂黙意吾道適何從五月廿七日宿郊館贈主人二首暝宿投郊館行行到水涯晩風官道栁夕照野牆花村近喧歸鳥川長散落霞濁醪吾自有聊與飯胡麻來時槐市外徃路半斜暉馬過嘶芳草人行戀翠㣲山童疑久客田叟解志機君看茅檐燕將雛傍夕飛出郭出郭有新意幽情惬薜蘿綠楊聴似雨碧草望如波牛笛吟風㫁鶯梭織翠多閒雲兼慢水相伴一髙歌對酒西山下望裂帛湖有懐廖芸夫徃年同遊香山碧雲語江山之勝兼寄雲間二子楊玉符董閬石二首馬箠獵平蕪烟波似有無朗吟山鬼笑爛醉野人扶萬事依雙槳三生狎五湖煩君待漁艇未肯老樵夫夕鳥下汀洲殘虹掛寺樓逺烟赴山翠晴雨接波流昔别驚蓬鬢今來憶釣舟人間詩意盡入海可同求讀顧亭林先生日知錄是潘次耕刻于閩中者却贈遺文編舊錄製述繼吾徒詩樂吳公子風騷楚大夫閒情窮海嶠清論滿江湖萬里山川路離情似昔無答孫蔗菴回看㶚陵栁青鬢已皤然江海三千里星霜四十年曽知新句好將與萬人傳化鶴人還在書來鴻雁邊晩晴臺懐繆虞良俯仰皆陳迹登臨是舊逰髙臺不頻上明月易深愁琪樹秋應長銀河曉自流因風問江雁㡬日過長洲王顓菴少宰屬王石谷為余畫午涯烟舫圖且贈以詩綠畫春山閣綠畫少宰西田閣名紅欄秋水橋移将三徑裏未覺五湖遥漢壁波殘浪午壁漢亭名午涯所緣起吳淞剪半綃圖南鵬萬里蜩鸒想扶摇憶舊寄繆虞良舊日同遊處西窗暗網塵阮家麄飯久萊子綵衣新昔送之官客今思解組人共知捧檄意失喜為慈親疊両少宰見和韻二首余夙有江南之思二公皆呉人故托興乃爾平生湖海意飛動不曾慵千里吳洲月長江建業鐘烟波定相訪鸞鶴偶然逢正想雲亭字先須載酒從藻鑑今焉用文書祗自慵無言温室樹毎過夕陽鐘汗漫期何處淹留惜易逢舊遊東郭子又得二年從用荘子一年而野二年而從葢與太倉公又同事二年矣酬周鐵門贈詩即送之之官紅雲曉近海綠烟春滿畿送君宰赤縣栁絮飄行衣燕市酒罏滿漁陽桑葉稀幽蘭在脩坂及爾同芳菲夏夜過潛齋示壯履閉門來月砌散帙坐風簷鳥宿新移樹螢流夜捲簾辭多䝉向秀夢欲謝江淹文史成漂泊潛夫畢竟潛題庭前合歡花懐杜遇徐徃年曾贈花葉釀酒綠細分朝靄紅輕暈早霞本無蠲忿意况有合歡花舒巻時常定隂晴亦未差美人曾折贈零落惜年華題朱悔人京華藁榮華寂寞在斯須一巻新詩酒滿壺君看昭王舊臺館至今秋草不曾無午睡起為人書道徳經二首歸去青牛更莫論怪他紫氣在闗門五千言費三錢筆盡冩何曾有一言夘酒昬昬問谷神午牕風竹影移頻不須更借邯鄲枕已是華山睡裏人重陽前一日招悔人卓崖元朗亮工家子文秋社纔遊未隔旬籬邊風物又催人有涯早識吾生老多事還憐野菊新天外孤鴻偏過眼鏡中雙鬢已傷神明朝欲赴登髙約摒擋樽前放浪身常道士山房水石清供水石清秋浄法筵人間自有一山川雖然雲樹參差影看盡空明四界天圓通院有贈縹緲紅樓原上村西來飛錫駐前軒橋迴流水供侵案木落清風為掃門按劍恐因驚白璧繫珠今已照黄昬百年耆宿三生舊初地新從萬事論冬日早卧示與可踏盡秋街落葉霜歸來枕肘卧斜陽燈花早已看重結香篆㣲銷耐許長節後菊黄多晩景年殘髪白赴流光睡餘翻覆連牀被又是槐根夢一塲寄懐王大宗伯昊廬金陵五首後湖真並鏡湖論一曲烟波是異恩試看東山相對出城南元有謝公墩玉樹庭前春又歸過江門第世應稀到時芳草橋邊路正及烏衣燕子飛離騷讀罷意何如楚客頻年賦卜居千里長江建業水東流兼得武昌魚結綺臨春事已休輕烟淡粉對荒丘慿君收入人天偈樓子因緣在上頭摩詰流傳秀句香冶城風景輞川荘江山畵裏移家住秋色依然華子岡午亭文編巻十七
