body:
  text: 午亭文編巻十二大學士陳廷敬撰今體詩元日直閣中髙陽公示和寳坻相公嵗除詩次韻三首今朝暮景已飛騰拘束翻憐事事能短日暄凄紛屢異中年哀樂故相仍愁傾柏酒看兒女獨對椒盤憶友朋一昔曉鐘霜鬢滿夢廻風雪灑寒燈日華側近含元路夜半常随丞相來爛熳星辰天闕上青熒燈火閣門開山川禹服平成蹟雅頌姬公制作才卻為念時添諷詠流光荏苒竊趨陪星霜殘夜入春隂節物升平可重尋玉几雲霄三殿迥鑾輿閣道九門深蚤聞伐叛勞師旅屢罷朝正廑帝心坐聽索鈴歸舍晩一杯嵗酒向誰斟送董蒼水歸華亭兼寄董閬石諸乾一時蒼水将逰閩粤九峰問訊近何如數子飄零十載餘萬事黄金輸負販㡬人白首老樵漁君今海上求仙藥我欲山中葺敝廬何限塞鴻凄斷處江流西上憶雙魚送綸霞歸省送歸郎署栖遲日嗟爾承明著作才𣺌𣺌秋河霜葉下蕭蕭寒路朔鴻廻黄塵官廨題詩壁衰草城隅置酒臺遥羡潘輿還御日毛生捧檄喜重來連日入直鈴索聲髙漏點長直廬長在殿西廊内中數日多宣召寂寞槐隂閉玉堂禁中春雨西峯殿閣倚嵯峨雨過青山晩翠多不識玉泉流近逺影娥池水夜增波懐西山舊逰簡阮亭容齋磴道盤空山四圍暮投林杪翠霑衣幽禽大壑柴扉晩疎磬孤峯夕照微杖底登臨秋水落坐中風雨塞鴻稀夢魂谷口巾車路猶記蒼茫倒載歸題北山給事真青𤨏通丹地朱顔老玉墀畵圖看十載風貎憶當時魚鳥忘機久山林託興竒獨慙碌碌者顦顇向經帷送北山還茌平諌坡郎省㡬人存拔擢深知國士恩暫别雲霄龍尾道回看風雨鳳巢痕冰銜三字慚吾友封事連章感至尊五岳未須誇屐齒恐君逸興太飛翻次韻葉訒菴見酬拙書春帖子之作我亦漁樵憶孟諸相随簮筆玉階除敢云逸少無臣法祗覺中郎有異書祕殿敷言長獨對御牀承㫖更誰如椒花欲頌慙虚劣諫果封題意未疎和訒菴憶故山疊前韻見簡傳柑時節見桃諸已老誰能感嵗除節物一尊殘夜酒年華㡬巻舊時書心憐去日都無處夢醒浮生可自如最是鄉園離别意青山遲暮信音疎元日再叠前韻酬訒菴欲向東風弔望諸黄金館在玉階除頻年綈几參經席輪日牙籖侍御書師友半生夫子共文章當代㡬人如春來崇政朝朝㑹名迹相親應未疎訒菴立春日再疊前韻次答險韻從兹盇去諸懸河㵼水想難除偶然節物供題句終古齋名有讀書訒菴齋額讀書紅蓼緑蒿生尚細宫花幡勝剪能如巳過春酒黄柑㑹與數交㳺晤合疎和訒菴立春日口號三長句兼懐阮亭長鬚更遣致詩頻忘卻新年十日春萬井烟花連閉户六街燈火隔流塵稍憐將老親書巻深覺多愁譲酒廵極目川途滿氷雪苑梅官栁暫留人相思元夜歡㳺日劉董汪王興未賖公㦷玉虬苕文西樵貽上客舎鐙前催羯鼓水樓春盡賦楊花存亡㡬處無音耗少壯于今有鬢華却憶馮唐郎署在閒門深閉苦思家舊好新知日自非一臺二妙詎相違時論貽上宜在禁林寒空鴛鷺春風並燎火魚龍曉勢飛羽檄刺閨時漸少文章報國事全稀獵夫漁老吾終去未許君才遂拂衣上元夜早起顚倒衣裳月迥明逰人一夜蹋歌聲五更玉笛風蕭瑟曾向闗山萬里行照鏡方鏡青銅鑄得成朱顔曾照㡬回明亞枝花蕊春風裏點鬢繁霜不世情逢故人客中借問是同鄉欲說還鄉己斷腸舊日相随徒侣盡無人解道易霑裳召見懋勤殿應制有序戊午正月二十二日召臣廷敬同户部郎中臣士正且命各以近詩進見於懋勤殿温語良久至誦賜石榴子詩風霜歴後含苞實只有丹心老不迷䝉恩褒美命至南書房撤御膳以賜内侍賫二題命賦詩夜漏下乃退萬巻圖書滿御前賡歌時聽玉音宣韶華絳闕連深殿春色彤闈接禁筵己見文章昭代盛向來雨露上林偏吾君一德同堯舜長媿䕫龍際㑹年賜膳恭賦久泛流霞是露盤每嘗仙膳勝調蘭鳯池日暖恩波厚内殿猶分玉箸餐寄李厚菴學士閩中二首炎風朔雪盡皇輿孝子忠臣世不如青史數行滇海事丹心千古蠟丸書每思慷慨堪流涕實有聲華到索居近直邇英常被問己知吾道未全疎南粤何人憤請纓樓船幕府羽書驚終憐蕭引空安坐未許深源有盛名生死臣心惟勠力艱難天意為銷兵卻悲離亂晨昏事回首當時捧檄情孝昭皇后梓宫遷厝鞏華城恭賦輓詞二首五年兩度哭長秋禁掖懐賢慟未休曽見帷車隨鳯翣忽驚縞素結龍輈梨花寒雨深宫淚椒寢春風野殿愁舊日上陵同警蹕幔城蕭瑟翠華留曽同宵旰儆慈心午夜無勞更脫簪環珮未歸陵路逺風雲己䕶繚牆深閟宫象物春如昨玉殿容衣晩自臨巻耳葛覃遺蹟在侍臣沾灑一悲吟鞏華城北十里漢㓂子翼唐劉去華故里野宿寒沙夜火明沉沉擊柝響孤城支離半枕荒雞夢寂寞千秋萬嵗名諫議祠堂邉草没雍奴丘隴朔雲平漢文分地居庸外遺廟何人問顧成入直南書房紀事給札朝朝赴蚤暉玉階花落曉鶯飛也知天上塵凡隔未信仙官職事稀繚繞文書堆硯墨聮翩詩句滿宫闈紅牆咫尺人間路魚鑰銅壺下漏歸賜五臺山新貢天花恭紀有序閏三月臣廷敬同翰林院侍讀臣士正直南書房葢是時臣謬掌翰林篆前後同内直諸臣率常寓直是日䝉賜手詔朕召卿等編緝適五臺山新貢天花鮮馨罕有可稱佳味特賜卿等使知名山風土也臣恭紀珍蔬逺貢自瑶岑翰墨親題賜禁林三殿恩頒天上蚤九重封送御前深含風玉蒂香仍動暎日金莖露未沉退食和羮添味美鹽梅還欲效餘箴賜櫻桃清曉朱櫻進内園每従丹禁飫頻繁雲霞百子池頭色風露三霄殿上恩賜觀人參植本應制三椏玉蕊三珠樹五葉銅池五色雲不是乍従天上見多應空向世間聞賜御書恭紀二首有序二十八日賜掌院學士臣廷敬侍讀學士臣方藹侍讀臣士正御書臣得龍飛鳳舞大字唐人王涯早春宫詞又石刻清慎勤格物大字二幅行盡金坡近玉清牙籖綈几影縱横瑶箋露濕宸章潤寳墨香含御氣清霞起雲蒸同日麗珠聮璧綴自天成萬㡬宵旰逢時暇惟有書奩適聖情天􅇨真題龍鳳署玉堂今刻御書碑日星文曜施丹地雲漢乾光照赤墀親見驪珠初迸落捧來鸞紙正淋漓流輝館閣傳青簡忝竊儒臣際㑹竒龍飛鳯舞四字請刻石翰林署中今恭置敬一亭世祖章皇帝御書正大光明四字上御製題跋勒石賜觀於内殿進詩一首曾侍先皇近玉除龍鸞重捧九霄書兩朝寳翰輝天府奕葉奎文映禁廬典冊星雲光絢爛勛華日月氣扶輿還思開國規模逺金匱藏編在石渠恭和御製喜雨詩乍拂觚稜滿禁城宫花含色栁烟輕風雲萬象供天藻雨露三農見聖情孝昭皇后輓詞四首正位名初定彌留淚己揮内朝臨日少宫仗列來稀半載新龍節三春舊玉衣凄風掖門道慘慘動幢旂禮自中闈進恩還禁籞長鏡奩留偃月圖史在披香玉燕空蕭瑟金蠶竟𣺌茫惟餘憂國念流慟徧遐方問寢重闈日宫輿早並來烟花連複道嵗月在蓬萊春咽銅龍漏香銷寳露杯含情思婦順灑淚閣門廻京室任姜盛徽音禁苑知軒星沉彩曜花月掩容儀典册光千古哀榮並一時青編與彤管紀美在風詩上御神武門觀西洋進貢獅子皇威逺被海西偏靈産欣觀自九天王㑹地圖過禹服帝疆方物集堯年條支入貢龍沙外烏弋随朝鳳闕前従此上林添獸簿定知不賞嗇夫賢蚤赴内直同貽上楊栁紅牆映碧波月明騎馬共婆娑不知玉漏添如許秋水潺湲一夜多八月十八日上御懋勤殿召臣廷敬賜之坐命賦經筵進講詩臣倉猝賦就退而謹録其句頻年槖筆侍延英御札分題見睿情白玉螭頭䦨畔立青花龍尾道邉行談經荏苒文焉用論藝逡廵句未成又是深恩逢造膝儒臣何以荅殊榮恭和御製賜輔國将軍俄啟詩有序二十一日同侍讀學士臣方藹臣英侍讀臣士正中書舎人臣士竒奉㫖賦沛上雲飛起大風射生猿臂挽强弓日邉蚤識龍孫貴天際新傳鳳􅇨雄九日入直同訒菴敦復澹人近公限登字髙字二首禁苑秋來爽氣澄寒花時節伴茵慿曉風閣道傳銀箭夜色銅扉帶玉繩臨渭新詩工最擅集賢别㑹寵難勝龍沙鳳嶺休還憶閶闔三霄日共登授簡従㳺盡譽髦年華荏苒在詞曺九秋最覺清都近四海無如此地髙戎馬禁中思李牧文章輦路羡枚臯嵗時空負君恩重遮莫黄花笑鬢毛聞湖南㨗音恭和聖製鐃吹騰歡幕上來弓懸江月劍花開天家蚤就麒麟閣直待將軍汗馬來賜觀御製詩并序嵗戊午秋九月上奉太皇太后幸温泉以時享太廟還宫行在凡十七日御製古今詩二十一章十月朔日召臣廷敬賜觀臣職叨簮筆學愧面牆久依帷幄之傍親覩文章之盛瞻雲就日靡罄髙深測海闚天徒滋謭陋今讀聖製彌厪繹思譬諸黄鐘天球自洋洋而竦聽穆乎璿霄碧漢仍蕩蕩而難名昔聞劉勰云睿哲之心懸於日月益信揚雄謂聖人之言炳於丹青况逢盛世賡歌非若唐宗之試宫體自顧庸姿牽率惟慕永叔之記賜書葢以聖哲之君其臣莫及遂令制作之善振古為昭謹拜手而颺言爰齋心而獻頌恭賦五言二十四韻進呈睿覽不勝欣惕交并之至聖母歡清暇天王奉豫逰龍光扶翠輦鳳􅇨麗皇州廵省經過處篇章次第留霜鐘深殿曉丹葉禁門秋繡轂環千騎金鞍従列侯山川為别苑笳鼓在行騶九塞連軍戍三河抱縣樓帷宫朝警蹕星漏夜移籌縹緲中盤寺登臨最上頭古臺傳舞劍重嶺應鳴虯碣石邉雲合盧龍海氣浮望陵松柏逺薦寢鼎湖幽風雨開旄鉞乾坤正冕旒羽林嚴伏謁仙仗迥含愁寒路廽芝葢温湯駐采斿陽和長不減功化邈難儔紅檻氍毹帳黄簾玳瑁鈎濕花漂砌近香草映波流玉甃連阿閣瑶池到十洲起居陪大駕符瑞出靈湫萬夀慈寧膳清躬饗廟羞徃來見誠孝製述必殊尤毫翰乾文煥詩思溟渤搜虚懐䝉􅃂問忭舞答神庥賜文雉恭紀四首旌門尾扇羽林兵竟為斟羮校獵行回輦九天先奏進親調玉膳慰慈情射聲一矢疊霜空萬嵗齊呼羽仗中陳寳祠前休悵望官家己並得雌雄三靣親驅祝網歸錦禽宣賜有光輝饔人未擬鸞刀割曽近君王玉轡飛尚方筆札大官餐珍賜時頒出上䦨繡臆花鋪金絡馬分明誇向路人看鞏華城陪祀孝昭皇后梓宫即事恭紀二十四韻宿雨郊原外雞鳴夜𣺌漫早行分夢短徃路入吟寛肅肅白楊晩依依青栁殘微雲舒綺縠晨漢沒波湍禾黍西風落茅茨曉露漙野花邀翠幰蔓草簇銀鞍徑闢蒼烟斷忩虚緑樹攅旌旗思警蹕軒砌想鳴鑾萬乘經過地兹逰爛熳看入門詢􅇨翰再拜肅衣冠日月乾光曜蛟螭御氣蟠彩毫題别墅金牓賜臺官灌莽天香接瓊瑶寳篆刋未來真繾綣欲去尚盤桓清河胡御史山莊有御書在焉落日山逾靜清流水自寒飛梁疏澒洞複嶂疊㠝岏行殿何蕭瑟孤城此鬱盤神光春杳杳環珮暮珊珊鳳翣椒風隔龍樓桂月團内人思未已陛楯淚交彈砧杵凄宫掖梧桐黯井榦嵗時臨幄次燈火駐河干回首芳華歇仙逰節序䦨鵷鴻續來徃歸馬獨蹣跚陟屺樓詩二十首并序陟屺樓在百鶴阡西余居樓中踰再朞矣乃始為詩凡詩之作為吾毋也因以陟屺名篇家樹蕭晨響正悲祥琴欲奏已凄其白沙霜凍霑衣蚤黄葉風翻度隴遲臨老泉臺多骨肉十年存歿自分離㡬回夢見容顔在猶是髙堂逺别時兩年丙舎此棲遲弔影空山夕照時野草春添新復土隧松涕損舊霑枝折殘屐齒悲毛義隠去緜封愧介推悔向風塵耽禄仕苦身勠力鬢成絲四尺新封馬鬛低重泉沈痛杳含悽香燈蚤上隂風起烟火全稀苦霧迷大野蒼凉人獨徃亂山昏黒虎時啼墓田方畝春泥外老學躬耕自把犂白日荒荒冷舊扉髙原哀輓露何晞人無周勃吹簫送客有陶家化鶴飛百鶴集冡上嵗月再朞真過隙笙歌十日盡霑衣泉門自掩千重恨雲散空堂黯不歸闗塞飄摇起戰塵倚閭長罷事酸辛還憐槁項憂時日已誤青袍奉母人杖節更誰能報主絶裾空自忍辭親棧雲隴月愁如許嗚咽寒宵一愴神敢道肩輿上殿行軟紅塵土最傷情十年趨走春前恨兩字音書望裏驚長樂鼓鐘疑夢寐直廬燈火憶平生小人有母今安在曾遺君王舊賜羮祕殿深嚴晝漏閒御書房在碧虚間遥思中禁従容地别有東頭供奉班風雨三春辭鳳侣雲霄萬里夢龍顔只今月落烏啼夜羞㸃蛾眉両鬢斑紀也内直告謁空懐未上書較殘朱墨玉編餘時預修實太宗文皇帝録聖朝孝治恩元重臣子私情願已疎烏鳥舊棲宫樹晩鵷鸞長别禁林虚衣冠原廟勤時享法従曾陪濫石渠罷直乾清刻漏傳詞臣奏事閣門前㡬回中使䝉宣問曾道天顔賜閔憐紀葉學士方藹張庶子英奏臣丁憂事講席乍温違玉几書籖初冷輟瑶編夢魂兩載趨丹地白首青燈一惘然當年文獻僅猶存特為儒臣命討論慰問本朝無故事便蕃千載自新恩賜茶雪乳分供御漬酒金漿出上尊天使一時増感動傳宣帝語是春温詔閣臣察前明實録慰問例具聞遣内閣學士屯泰翰林掌院事學士喇沙里賫賜乳茶挏酒四器盖慰問之典實始於臣云随例榮光亦至恩絲綸特㫖出臨軒微勞似髪叨三錫厚澤如天到九原部議以臣母用詹事封例無䘏典䘏上憫臣侍従微勞用學士品級賜石闕龍鸞迴藻翰冢碑星斗爛荒垣却思灑淚春明路囘首孤臣已斷魂麻衣扶杖薊城西痛哭荒郊落日低野宿寒沙惟過雁蚤行茅店不聞雞朋簪有夢知離散鄰杵無聲助慘悽相别銷魂橋上栁夜烏猶為昔時啼西園東閣想儀型堊室霜天望壁星紗幔秋殘悲舊業機絲夜冷泣遺經綸扉大手摩霄赤藜火新編照汗青師友謬恩霑不細蓼莪廢罷淚還零髙陽館師表先淑人墓葉訒菴學士為立傳一别相思在禁林光華碑版未銷沉臨文已踐升堂約葢石空憐負土心三歎似因聞寳瑟長悲真欲廢祥琴苕文嘗辯祥琴為非禮吞聲憶取燈忩語獨向殘經細討尋汪苕文編修為先淑人銘舊逰名徳是人師相我號天伏地時萬事臨危千古恨此生難報寸心知中朝司馬應安好湖海元龍久退衰自守殘書甘薄澹他年無愧故山期指魏環溪先生殘臘東風斗柄移灞橋三度栁條垂生芻致逺思徐穉截髪留賓有范逵逰子頻年諳物態孤蹤四海問心知天涯門外多春草長守田廬記嵗時村鐙宰木影縦横獨宿髙原萬感生碧嶂夜猿啼有怨黄沙石虎卧無情春歸老屋家如寄月堕荒丘路不明屈指禫除將欲近纔思去住淚交傾急雨凄風意若何天寒嵗晩在山阿人生兄弟真難再我老妻孥苦患多徃事庭闈誰訴語向來身世足悲歌那堪抔土荒凉處躡磴攀林祗自過萬壑青山一病身霜風摇落自傷神嶺鐘夜度不知處壠月秋來故照人詩卷市朝堪斷續音書京雒付沈淪只應料理餘生事體受歸全是報親黄卷中閨映白頭班家孟母並朋儔珮環東觀蔵書閣纓履西原陟屺樓縹緲雲山千叠恨迷離草土百年愁吟成霑灑梅花候苦憶天香學冥搜予九嵗作牡丹詩母見而異之百鶴新阡十景詩并序洞陽旋馬洞陽洞天踞勢北維昻首而東天馬行空跨騰欲下接嶺連峰逶迤入障志稱岳神山者盖嘗標靈著異云天馬騰驤東欲來洞陽弭節尚裵􅏆二條氣色排空至萬里風雷掣電開瑶圃回看平似掌黄河立飲小如杯銅鬐玉鬛青霄外長伴麒麟卧石苔卧笏回龍岳神之南開屏列障儼若拱向稍西則山巒横出形肖卧笏阡實落脉還顧洞陽雲垂烟接山帀谿環故曰回龍也曾聞萬笏朝天矗今見神龍踠地長己挾風霆身變化故驚鱗爪勢回翔従雲漠漠噓重壤行雨濛濛潤八荒蚤握驪珠堪照耀斗間五色映琳琅品字珠屏阡後三山形立如品字中之一峯昇眺遐濶勢盡千里而北望洞陽測以圭景不失杪忽正阡之主山也台星入座夜珠明品字屏風類削成似擁鵷鸞朝帝去卻排閶闔侍天行芙蓉九蕊雲中色環珮三階月下聲爭道神工開闢巧羣峰羅列抱層城書臺繡几阡之前曰書臺山層岡秀出中曲兩垂如月偃弓眠其上則竒松異花被於崖谷丹碧綺錯如畵宛若繡几也丹地深嚴嵗屢移天寒月落影蛾池雲霄經席承恩日霜露書臺憶母時銅尺牙籖新玉案青燈黄巻舊機絲白頭贏得如綸寵若斧封成萬古悲榼山疊翠榼山在洞陽山之右新阡之左秀障干霄壁峙霞舉離立天外如拱如揖老松古栢飾巖蔽壑實巨觀也蒼松中倚玉䦨千天外樓髙翠欲團地界河山為左輔峯廻屏障自千盤扶桑弄影青空濶太華連雲碧落寛似有綵虹平接席旌幢前導後乗鸞沁水環流山海經云謁戾之山沁水出焉兹入乾歴兌抱阡左沙繞幢東出繚如縈帶翼岸夾山如為新阡特設也繚河縈帶鎻遥峯雲起霞明色正濃九曲分流還抱嶂百川終古自朝宗波濤日月虞淵壯風雨蛟龍貝闕重欲攬鳳皇池上水丹霄長映紫泥封萬松聳峙阡之地統名樊山尊嚴秀拔衆山之長蒼松萬數䕃峯隠谷相傳神人所種植其大者以圍計之數十也四圍峰色故依然萬壑松濤勢接連天巧不煩神禹跡仙人似種漢皇年枝盤蒼昊青鸞度葢倚丹霞彩鳳鶱為謝山靈留勝蹟只應此處問牛眠百鶴來翔封山之日白鶴百餘自西徂東至阡之中翺翔欲下久之乃去開壙之日鶴又復來阡之名由此稱焉臨水登山秋氣清仙禽遥集若為情青田養就雲初白華表來時月正明北戒闗河行處逺南條烟水接天平摩崕駐嶺回翔地百鶴新阡送美名慈泉乳水山巔去地千仞岧岧孤上其陽有泉其巨若輪其深盈尺甘泉温洌居人賴之以給晨昏掲其名曰慈泉志母恩也神臯乳水接崐崙天與慈泉見母恩丙舎桑麻深雨露山家飲啄長兒孫銀河倒影流霞動玉甃含暉浴日温最訝興雲蒸霧力長將時雨徧郊原神樹天香阡之西古東嶽廟廟兩階各牡丹一本黄蛇守其下人莫敢攀折枝榦輪囷四䕃廟中花開輙數千頭也古廟空山占物華石䦨雙本牡丹花染香靣靣臨芳樹堆錦枝枝貫月槎寳艶雲霞舒日景神靈烟雨䕶天葩玉房金蕊紛如此瑶草仙源路未賖山行二首旅舘寒燈信宿眠客心去住杳如年夢回春月春花夜依舊啼烏泣墓田客路栖栖老更驚山人只作看山行冶桃狂栁紛無賴白髪春風也自生陟屺樓别詩二首松際昏鐘出翠微淹留山鳥莫催歸西樓明月闗河路春雁南來又北飛壠上東風春草青春明感舊惜飄零縣橋官栁銷魂處愁見長條拂短亭别守冡人萬樹青松萬簇花居人惟有兩三家因君更灑思親淚泣向寒雲隴日斜次韻補和李容齋少司農送别二首回首流年逐景光白雲慘澹日昏黄驟辭蓬閣如前世重渡桑乾是故鄉草澤夢魂稀語笑雲霄契濶在班行傷心趨走金明路春月三回直北望瓊瑶開篋客心驚團扇三年故舊情草色含悲連大野栁條惜别向春明朝廷開濟須公等閭左耕徭託此生為報石壕村吏少司農憂國早知名得苕文請急還長洲書卻寄六首頭白何時見汗青禁門深籍鎻寒㕔應知别笥多蔵藁歸向名山作一經挏酒團茶自上方御錢餅餌賜新嘗江東大有思歸客千里蓴羹味許長白首何縁問故新驪駒聲斷堠傍塵青門楊栁春如舊相送城門更㡬人萬壑千巖老一村太行枝隴敢言尊吴山楚水堪乗興更向堯峯與細論乞守何曾得越州還鄊終賜曲湖逰洞庭雲樹三江水一棹歸來合得休出處年來肯異君西忩苦語記離分已違白首江湖約留取青山日暮雲晝卧百鶴阡古廟中夢愚山苕文聞道長洲請急回宛陵侍帝在蓬萊江湖闗塞三千里何得聮翩入夢來村舎贈别焦僉事禁門清漏徃時同一宿孤村邂逅中雙隻堠邉芳草暗短長亭畔夕陽紅軒車已浹崇朝雨繡斧行開萬里風幕府如今並才俊柴扉安隠藉羣公星軺驛送人之官中州留客雞鳴夜色悽使君匹馬萬峯西太行枝隴浮空盡砥柱烟巒接近低别路雲山勞悵望對牀風雨惜分攜河淇亦有萊公竹相映潘生花滿谿樊川雜詩三首山翠微茫積翠分野花細草入斜曛獨行惆悵縁何事目斷南谿日暮雲欲别樊川欲㫁魂輕雲細雨濕苔㾗最憐緑樹通幽幌月送花隂不閉門細蕊孤花太有情春風作意送人行誰言南浦傷心地草色年年不更生與豫朋徃石閭白石清沙古澗深川長秋氣逺相侵徃來蹤跡看流水去住羇栖羡野禽伴老癡兒諳旅宿懶行疲馬戀谿隂三年㫁續殘詩巻新句含悲自一吟午睡醒得苕文書清風一枕北窓眠門外音書剥啄傳欲覺軟紅塵夢㫁夕陽千里草連天聞砧二首蹉跎春晩向秋清為别南谿緩北行欲理征衣無意緒忽聽砧杵動離聲野舘清砧不可聞更堪獨立近斜曛何人解識徘徊意惟有松間石上雲石閭道院二首空山小住又經旬草屋孤村無四鄰咫尺夕陽連暮雨三义古路少行人牛闌嶺上收常蚤虎跡泥中見又新寂寞不嫌樵牧者來時一别一傷神急雨清宵古廟中長松小院下秋風時疑石澗翻驚瀑頓覺巗泉接灌筒逺夢闗山雙鬢白鄰雞籬落一燈紅到家却作無家客襆被衝泥類轉蓬與石閭禪人二首曾題舊句巳朦朧古壁蝸涎伴網蟲此處無人解文字不須重著碧紗籠雨笠烟蓑風露餐獵師仙客久盤桓夜忩芋熟松明火出處無心問懶殘午亭文編巻十二
