body:
  text: 午亭文編巻十大學士陳廷敬撰今體詩城西亭送沈繹堂翰林歸華亭泖峯文采世無倫翰墨風流奕葉存謂學士度大理粲兄弟客裏蚤花随步屧愁邉積雪照離尊舊逰已少仍揮袂徃事臨岐易斷魂出守昔曽還近侍柴門豈合老江邨西譙門書懐出郭烟雲照眼新輭紅回首隔流塵一年好景逢春色萬事今生譲古人老治文書成底事倦㳺花鳥恐傷神低回百計輸行樂歴落嶔﨑寄此身移居移居頻作客八口寄天涯樹帶西家月籬遮北里花行藏一燕壘身世兩蜂衙便是雞窠老遷流見物華棄宅蚤棄西街宅栖栖不定居邯鄲留一枕秘監失殘書酒醆空随汝花枝最記渠平生多病意卜築未情疎别舊居花樹一宿天涯樹下情塵根未斷笑平生穠花細蘂尋常事可奈雙株手種成閒適閒適吾堪老園林興不違㳺魚爭晚景哺燕接低飛書展檐風亂花捎徑雨微輕隂漏明月凉色在絺衣送王玉銘大司馬致政歸滇南二首周歴曺堂解印年青山黄髪羡歸田雲霄自致勛名貴軍國曽都將相權拜手瑶階頻獻頌勅書天翰為裁篇蒼生尚憶商巖雨廿載昇平啟細旃樓船戈甲久銷沉滇海風清罷羽林勲業舊存三殿詔去留今見兩朝心東山花月仍無恙北極風雲轉自深聞道舊恩思夙昔莫言容易謝華簮寄題嚴氏􅄝退菴不識江南路菰城何處邉數椽方丈屋萬里五湖天苕霅雙鳴槳烟波一畵船富春山好在髙並客星懸午日小集帝京逢午日㡬度逺柴扉當暑思宫扇趨朝感賜衣少眠歡坐減多病宦情微却望行山道晴雲只自飛書韋蘇州集後韋公昔為郡計年九十餘不似陶彭澤解組折腰初夜行庭樹雞一鳴起行如適逺映堦月色微葉落知深淺睡起二首夢醒不覺暝渺渺殘陽下入簾秋色來幽懐正瀟灑晨理頭上髪又已數莖白不須感秋風含情自脈脈旅夜懐張子美子文草際候蟲語花邉螢火流闗山長旅夜風雨近新秋落葉下庭樹寒瓜生故丘樊溪嗚咽水惜别在南樓氷雪氷雪遲來使闗河阻客居風鴉過院晩木葉下亭虛薄醒銷憂酒竒驚引睡書天涯身漸老局束欲何如觀物蕭條觀物意又廹嵗寒心旅燕飛難定哀蟬響易沉晩霞猶閃閃列宿已森森流影看殘月迢遥墮逺林冬夜懐樊川故居愁銷寒夜酒睡引舊時書畵角三更外荒雞一枕餘身名厭潦倒物理悶乘除野艇花源水柴門栗里居只須長吏好便覺宦情疏冬日暄茅屋春晴御版輿樵風下籬落松月照村墟猿鶴多情者經時應念予髙同年入覲贈别功名徃事記題輿佐郡風流十載餘幕下鶯花春色換天涯兄弟宦情疏烟雲料理詩逾好簿領従容政自如時覲歸來開棨㦸畵梁塵滿舊懸魚贈張螺浮給事西垣重歴㡬朝昏萬事波瀾過眼翻伏閣何人驚白簡臨朝有勅報黄門雲霄鐘鼎推時望魚水功名是異恩正覩䕫龍簮笏盛莫因花鳥戀江邨春夜和王信初侍御兼懐鄒謙受檢討雲霄有路已飛翻寂寞官曺獨閉門客舎鶯花連上已寺樓鐘鼓送黄昏春衣暮冷添新火濁酒人稀命舊尊蒲栁年年江上緑白頭零落㡬人存劉果齋僉憲提學浙江索贈别詩青霄藜火映含香為許傳經下栢梁畵省仙郎閒劍履絳紗才子典文章春風桃李花圍坐烟雨江山色滿堂好為蔵書探禹穴清時竹箭美琳瑯移居懐玉随玉騧蕭然蓬轉迹似已接蘅臯巷曲寺鐘近夜深鄰語髙缾罍生計小書劍客情豪為報素心友移居欲和陶移居别舊居花樹隔巷星河别館開客亭臨去重徘回青苔濁酒行吟地惟有楊花日暮來城南見山桃花黄塵風裏帽簷斜桑柘稀疎栁半遮千葉不須銷恨種小桃已放破愁花曉雞短日寒雞半夜聲漏長偏攪旅人情羽毛今為風霜苦怪爾春來失曉鳴送張東山少司㓂致政歸里二首一辭劇職顔逾渥三領西曺事自竒張三拜刑侍朝下清卿休沐日天涯親舊别離時官貧蚤割香山宅身健長耽謝傅碁回首緇塵京洛客如公賢達㡬人知舎南舎北連春色竹樹交枝花滿坡輦下居非村落近天邉見比故鄊多尊開法酒賓朋共坐擁寒燈嘯詠過欲解朝衣随杖屨耦耕生計老東阿王方伯寓亭送姜鐡夫還㑹稽二首惜别論文地離亭是勝逰紅箋傳郢曲畵壁冩秦謳落葉催歸棹征鴻過倚樓逺江秋色盡渺渺送行舟髙閣樹聲滿夕陽相對閒霜風送歸客摇落動離顔華髪三秋别滄波一艇還只今無賀老相憶在稽山宋玉叔招同曺子顧沈繹堂施尚白王子底貽上集王方樸寓亭同賦五首洛下􅂄英社濟南名士亭風流人未老文字飲常醒篋静張琴露窗明冷劍星新詩翻樂府傳唱與秦青疎雨青燈暗微風白葛凉地非金谷麗人是竹林狂車騎閒韋曲星辰隠建章君王重詞賦或恐動煇光花裏銀鞍馬尊前錦帶鉤園林過晩夏荷芰入清秋他日江湖外應思鄠杜逰歡娱兼别緒為我緩行舟尚白將歸宣城行雲暮不息主人終宴吟詞華傾一代風雨集同心已踐銀青約能為清白箴重開雙畵㦸掩映舊藤隂玉叔昔為吏部郎絶域尋源使孤槎鑿空人誰為蕉葉様酌此梨花春醉觸支機石歸迷渡漢津拍浮銀浦裏肯與渇羌鄰以銀槎行酒是元人朱碧山所製秋日懐翊聖秋老闗河色黯然壯心摇落望雲烟楚山悔别三千里燕市悲歌十五年老去青萍藏匣裏愁來白髪醉花前鷓鴣啼斷瀟湘夢回首清江落照邉夜聞促織一昔新凉草際侵攪眠促織夢難尋舊知巧鬬逢塲戲老覺哀音動客心多露庭除秋欲晩閒花院落夜初深啼時斷續身微細白髪青鐙伴苦吟物態秋風䇿䇿獵菰蒲炎冷尋常物態殊畢竟埽門羞魏勃豈須岐路泣楊朱殘書自擁心情定徃事追思夢幻無只似青山舊樵侣不知人世㡬榮枯秋夜忽忽生涯事事妨寒沙曉蹋暮塵黄鐙花半結人將睡罏火初温夜蚤凉清漏㸃中秋欲盡荒雞聲裏夢還長緑蕉紅蓼晨窓影無那朝來盥櫛忙遣興千嵗愁多祗百年琴書僻性未應捐吟詩漸解論中晩酌酒真忘辨聖賢掩映秋燈疏竹外招邀清影夜窗前不須苦學安心法倒枕瞢騰一覺眠秋夕忩際碧紗影流雲月半黄闗山連暮靄枕簟得新凉畵扇收殘暑緗奩開暗香西樓風露冷歸夢向秋長天寧寺㳺二首蘭若譙門外新霜古木清寒山連霽色白日落鐘聲亭午塔鈴語邉風沙雁鳴西亭坐蕭瑟蚤忘市朝情杖䇿緇塵晩西林祗獨過門前雙樹在樓外夕陽多百戰猶碑碣千秋自薜蘿暮鐘催客思歸馬欲如何喜湘北至同直實録館國史重徴李鄴侯相逢追憶昔年逰花邉左掖同騎馬雪裏東華共倚樓嵗月孝陵書一巻烟波江上夢三秋何時副就蕉園稾玊勅牙籖次第收冬曉入舘同容齋夜色深忩曙未通鐘聲杳杳去悤悤鄉心曉挂西樓月木葉長吹北户風坊逺闕門三里外官寒心事十年中冬來碧瓦清霜重㡬見東華蚤日紅孝章至旋别㡬回風雪嵗峥嶸已改容顔識舊聲父老尺書歸計定髙堂華髪旅魂驚池塘昔夢三生恨追悼長公燈火寒齋此夜情歸卧東軒窗下月梅花疎影正從横立春日漫興吾今三十五年過衮衮流光奈爾何人夀古稀忽已半嵗華春到㡬分多疎梅寂歴霑杯酒畵鼔轟騰隠嘯歌旅夜張燈悲節序㡬回莫惜醉顔酡簡叟同宿城北僧舎花發南枝雁北飛漸看亭畔栁成圍三生佛火前塵在一宿僧忩旅夢稀笳鼓夜殘風瑟縮枕衾春冷月依微故人燕市悲歌客投老英雄已息機韓編修請假完昏九重殿外七香車銀漢雙星路未賖束髪昏姻逢晝錦催粧勅㫖出官家蓮燈燄吐同心結玉佩光添繫臂紗歸去不言温室樹芙蓉開作合歡花申鳬盟五十得子節愍流風奕葉垂名家人比鄭當時果生瀛海遲仙子種是麒麟帶好兒戈印堆牀連祖笏椒蘭盈寢並孫枝胎仙叠舞歌塵合伯氏吹壎仲氏箎蚤行雨過廉纎漏點頻火銷香冷睡初匀當闗月出呼殘夢倚枕雞號送晩春楊栁漸逢官緑暗杏花何處野紅新蚤行只似婆娑意解作禁愁耐事人寄安陽張明府參首鄴都形勝頫中州紫氣臨闗日夜浮勾漏不須尋葛令圮橋今已約留侯雲深銅雀歌鐘地花滿河陽毒冒樓蚤聽玉珂金鑰曉掖垣封草殿東頭贈韓中丞魏公家世足名流開府還朝正黒頭使相節旄歸上國尚書劍履勝通侯貂蟬西第閒清讌丝竹東山領盛㳺豈是書生輕萬户何人不願識荆州立秋日簡翊聖招逰水闗三首秋城過雨響潺潺一道飛泉㵼水闗此去便随銀漢轉御溝流到自人間洗妝樓北挂殘霞蕭后城南過晩鴉秋色自霑今日酒夕陽猶照古時花水鶴低回鷗眼明夏雲飛盡翠微生西風落日菱歌起今夜逢君不出城程翼蒼為姊徐孺人索賢節詩喜過程門問道初看君宅相更何如連枝自解娱庭樹生子兼能讀父書舊事嬋娟歌女嬃念年髙士記南徐只今人近烏衣巷香滿秦淮照緑蕖夜坐有感天河欲落暑風清客醉揮杯感未平萬事飄摇随薄宦十年潦倒愧浮名自憐少壯愁中老誰解鄉闗去後情芳草東山臨别路那因重起為蒼生送申随叔檢討還廣平兼寄鳬盟同官同病不同歸久治文書戀北扉一别殿廬秋色晩重看直草舊㳺稀懐人邸舎心長在送客雲山興欲飛寄語荆園老居士緇塵正悔上吾衣題李太公真兼呈令嗣正孟編修丹青人物想風流令子聲華在鳳樓天際䕫龍依膝下日邉綸綍到林丘採芝遺老尊商皓衣紫山人羡鄴侯最是臨風看玉樹金泥科第上三頭秋日懐貽上湘北蕭蕭落葉滿秋城不寐西堂聽曙更寥落詩書増士氣凄凉昏宦盡平生寒衝匹馬風沙亂霜咽啼烏曉月明寄語年來素心友清時焉敢學逃名晩秋懐張西園先生淅淅西風吹客衣曉行凉雨夕陽歸胷中自遣齊朝市世路何縁絓是非居士有情翻近道丈人與世本忘機藕花落盡蘆花老望斷秋河白鷺磯起居注日講賜貂裘羔衣各一襲二首銅龍曙色接彤幃槖筆螭頭候北扉玉漏早催當直夜清霜曉點侍臣衣忽聞天語春温至曾賜宫貂故事稀最是小儒尤忝竊皇情珍重及寒微曾陪貂珥金璫貴載詠羔羊豹飾榮綃帕籠牀趨玊陛香烟滿褏直乾清便教累葉傳君賜何止終身荷聖情蚤罷西征諸將士尚方服御到書生賜石榴子恭紀時侍宴外藩郡王仙禁雲深簇仗低午朝簾下報班齊侍臣蚤列名王右使者曾過大夏西安石種栽紅豆䓻火珠光迸赤玻瓈風霜歴後含苞實只有丹心老不迷經筵紀事八首展書綈几曉風清銅尺横斜壓未成天子直将經義熟玉音開巻已分明縹帶紅籖鈿軸齊御書房在殿廊西五經同異諸儒别一一重瞳自品題玉几丹霄晝漏長講章纔罷即封章芙蓉别殿秋將晩稀見君王幸栢梁閤門鑰入進書來紅蠟光中對御開知是至尊勤夜讀三更燕寢月徘徊第二螭頭點筆時起居親切近臣知年來神藻光青簡日歴長編御製詩一步天門生羽翰凌霄宫闕路漫漫玊清禁府尊嚴地只恐人間報稱難内裏常餐自尚方雲漿雪椀别教嘗調羮真勝修莖露賜食何須七寳牀蛾眉供奉别東頭銅鴨香深跋燭留下直玉階天漢上金明門外月如鈎直廬贈韓主事每逢同日侍鑾坡宫草罏烟嵗月過年老潘生華髪滿坐深荀令晩香多才名我自慚金馬風度君偏稱玉珂清晝總長渾不厭夕陽催别思如何梅花二絶句燕市新花巧接栽青春紅火一時催慿君莫笑大庾嶺南枝落盡北枝開㡬度寒梅臘又殘愁心一日對花寛稀枝小蕊纔輕放留取新年細細看送少師衛公致政還曲沃二首十年三度謝簮纓帷幄功髙退始輕天下公真清第一兩朝今不愧平生賜還别有銀青約請老仍為晝錦行去日臨軒思舊德遭逢魚水動皇情閣道雲山仗外峯朝回請急未從容再來父老看司馬此去乾坤有卧龍夢繞細旃聞夜雨春回長樂逺疏鐘知公未穏江湖興民隠還須達九重次韻程使君留别即送之官粤西兼寄開府馬公十首馬公雄鎮相逢前十載離别是中年羈旅交㳺老鶯花嵗月遷飛騰知意度文酒破拘牽一詠觚稜句蕭條已共憐萬里之官路還家到海村琴書随畵舫詞賦在金門桂樹臨江迥梅花過嶺繁灞橋衰栁色折贈欲銷魂地角東西粤行行過舊栖孤篷江笛咽斜日嶺猿啼野宿桄榔暗山行荔子低褰帷畵圖裏按部到蠻溪憶直承明裏宫鶯竟日聞苑花看並騎隄草惜離羣畵省香罏氣江城粉堞雲詞名兼試吏此事不如君地接三江險堂開八桂深闗山如憶逺詩句費孤尋卧閣梅花放車輪蕙草侵班春多暇日海月照彈琴近日嘉陵驛郵筒逺寄詩謂阮亭使蜀懐使君及予詩西川風雨夜南海别離時生理何心緒天涯有鬢丝桂江如可飲先遣故人知落日伏波廟行人拜路隅靈旗精爽見銅柱鬼神扶勛業看如此登臨意與俱詠懐多古蹟縹緲憶蒼梧烽烟千嶂靜道路百蠻通朱邸今開鎮丹書舊戰功江山兵火後耕鑿戍旗中人近嫖姚幕聽笳憶塞鴻建牙開幕府吹角瘴雲間一别蓬萊殿相思供奉班湘灕江上水烟雨海南山喜及昇平㑹恩波徧百蠻世領中丞節榮分禁苑臣江風清蜑戸海月照鮫人鐃吹騰歡逺轅門送喜頻可堪晉父老囘首事酸辛馬以晉撫改粤西送杜編修還南宫爇稾蕉園徹院鈴夜深藜火散槐㕔青門草色春堪惜落日驪歌酒易醒此别鶯花閒北署十年車馬駐南亭我留君去真無補名玷諸儒愧一經七月二十一日賜宴瀛臺迎薰亭恭紀二十韻右掖南薫水殿凉宸逰此日命瑶觴宜春小苑通平樂太液神池接建章金鎻北連馳道合銀河西遶禁垣長依稀晝漏傳鳷鵲宛轉霓旌下鳳凰暎曉紅蕖難辨影廻風碧落只聞香已同葵葉傾朝日不與春花競艷芳山襍夏雲峯四起林含時雨樹千行仙槎迥拂滄溟外錦石曽支日月傍雁沼芙蓉開别館龍樓花萼召諸王公卿渥澤來丹陛侍從恩深直玉堂宵旰至今勞聖主拜颺從此見明良移將彩仗趨長樂不待蕭韶出上陽翠渚張筵雲幕濕雕盤列俎繡綃黄天杯泛露承仙掌寳鼎調蘭飫尚方無盡皇情同海岳一時勝賞在林塘蓬萊嵗月春何限魚水君臣興未央㑹見大酺歡父老已看燕樂徧巖廊詩成宴鎬如周后曲奏横汾陋漢皇御􅇨昭回騰紫極詞曺翰墨侍明光清時不獻長楊賦譜入謳歌國步康是日詔賜西苑泛舟恭紀二十韻宫府修和日君臣悦豫年昇平盛文物睿賞洽林泉北禁仙流祕西清複道懸曉雲迎步輦瑞日下晴川罷戰昆明後留歡太液前駕來祥鳯轉杯向濯龍傳午景凝芝葢天河入御筵花明緹騎色香接玉罏烟鳴珮升蘭榜華簪扣畵船鹿萍欣有頌魚藻樂難宣空靄浮瑶島明霞遶翠旃闕樓隂漠漠夏木淨娟娟碧水黄簾外紅臺錦纜邉蹕停仙仗久岸敞幔城延舞詠班行右光榮侍従偏滄波真浩蕩天語許流連畵鼓催行漏斜暉度晩蟬和膏沾醉飽報荅乏微涓覆載垂慈溥生成錫祉駢恩深慚薄技長奏栢梁篇乾清門侍宴賜蘋果恭紀龍牀日扇午隂團第一螭頭飫大官坐有爼筵霑異數賜將苞品列常餐上林種後收名果内讌秋來薦玊盤翠纈丹霞滿瓊液不須更食蔗漿寒宴廓爾沁諸國貢使侍直賜蒲桃有頃賜西瓜恭紀珠顆甘瓤出内園靣䝉寵錫聖容温初筵訝許長霑馥一日驚逢再拜恩玉指翠分親摘蔕金盤紅重御嘗痕尋常香案前頭坐飽飫天庖渥澤蕃送素存歸覲二首暫解西清直南旋凉漸侵㳺非司馬倦興似季鷹深山寺繙書處江魚視饌心君親恩並重相送一沉吟載筆編摩日微才也許參誰能辭賛一君自史長三金匱書纔上秋風櫂忽南他時如念及橅寄米家菴武闈貳益都相國次韻詔貳公孤拜命驚鷹揚盛典屬儒生簪裾許接元寮席綸綍時宣黼扆情簾閣風雲新夜永鎻㕔鐙火㡬回明由來臺閣掄才地元化應須在鑒衡奉次益都相國武闈韻太平玉帛萬方同校武常勤廟算中已見彎弓開似月頓令磨楯運成風檐前落葉疎鐘度樓上清霜畵角雄夜半火城傳視草奎堂遥映燭花紅講筵賜紫貂文綺白金恭賦三首去嵗含毫侍玊墀錦裘天上拜恩時衣冠曙色交龍衮鵷鷺春温集鳯池禁殿久依簮筆地直廬重詠賜貂詩微勞一髪何曽効輕暖頻年媿聖慈紫纈青綾出尚方恩深奏謝閤門傍機丝巧度金梭月刀尺頻霑錦綺香袖拂螭頭罏氣暖歩隨龍尾珮聲長許身衮職無能補空睹宫衣滿篋箱榮光賜予報重重内裏分金勅禦冬赤縣尚鐫初進字瑶函纔啟御前封記恩未忍輸泉布索米從教罄釜鍾不羡長卿工賣賦腐儒執簡慶遭逢賜貂蟒朝衣一襲恩頒未了趁鵷行又見輝煌下建章内製蚤鋪新樣錦賜衣久染舊罏香雲浮繡蟒明初日風動盤貂㸃細霜拜舞玉階春色裏五紋先祝綵丝長待梅園桃巷栁豈湏論梅信經年探野村老怯谿橋妨滑路慵慿簾幕伴閒門忩虚細朶従疎影硯凍斜枝認舊痕索共寒香成一笑愛他風雪近黄昏嵗暮雜感二首雲山萬里一雕鞍急羽應須起謝安嶺海梅花旌節逺江城金鼔戍樓寒苦吟獨客身將老小酌幽襟醉後寛旅興易傷西望眼數峯深翠路漫漫紫極青霄悵逺天桂陽險絶羽書懸題詩萬馬中宵動草檄孤城百道連直北風雲慿障塞征南笳鼓在樓船将軍前部何時到霧散龍沙夜月圓癸丑除夜漸老天涯此夜中兵戈闗塞意何窮梅花影冩春醅緑爆竹聲連蠟穂紅夢繞庭闈雙素髪身慚弟妹一飄蓬强吟守嵗還循例愁絶寒宵畵角終人曰都市有賣牡丹花者郭快菴太史同賦人日晴雲媚蚤陽玉䦨干外競新妝啼鶯舞燕紛何處霧朶霜叢卻未妨翠幔曉低憐瘦影紅樓夜冷惜天香仙郎已進清平調與和髙吟興正長春懐玉醆金珂撥鳳槽城頭星爛曉雞號樹烏三匝棲難定櫪馬無聲意自豪羇旅生涯過夢境年華勛業老詞曺寂寥瓦屋繩床夜絶勝丁男轉戰勞步虚詞二首寳髻珠圎現㡬時珮環聲裏步虚詞露香夜夜朝真語心事分明欲訴誰金縷歌殘舞柘枝闗山連夜雨如丝夢回紅版橋邉路一種桃花似舊時送施匪莪歸泗州用歸來二字韻二首零落賓朋又送歸風烟重惜舊逰違還鄊襆被官曺冷間道兵戈野店稀客久鶯花迷故壘春寒雨雪在征衣泗濱得比桃源否到日殘紅歴亂飛故人今已賦歸來白首行藏拂袖廻淮汴雙流中擊楫江山百戰舊登臺詩成磊落従教在酒罷襟懐得好開只有交情垂老意不堪霑灑到離杯朝日侍直恭紀春色平分淑氣迎龍樓鐘鼓報新晴早随大駕千門出只後乘輿一馬行夾岸烟花臨御道朱壇柴燎達皇情禮成載筆還趨直共仰蓬萊日正明侍従朝日還侍宴江西提督趙國祚河南提督王永譽太原總兵郭拱宸賜紫梨有頃賜石榴子羽林前隊屬車塵纔解雕鞍藉錦茵玉殿割鮮親將帥金盤頒果重儒臣香多盧橘來江驛色勝珊瑚貢越人旰食只今憂戰伐分甘侍従㡬回頻送洪暉吉還甬東藉甚才名子自賢酒杯詩巻劇流連倦㳺金馬如殘夢對䇿銅龍記徃年寒食鶯花千里道春風鰕菜五湖船耦耕我失歸田約此别何能不惘然夢逰南樓歌别久南樓已十秋長風吹夢下西州秖疑身躡青天影真見黄河明月流送韓起蘇三首春明門外來時路愁見青青栁色多欲唱驪歌人斷酒直教無奈别離何容膝寒齋小幔垂紙忩風雨上鐙遲房櫳别後春蕭瑟想見孤吟獨坐時東風楊栁河橋月冷節闗山野店花送客還鄉仍是客十廻禁火在天涯四月十三日昧爽夢屠芝巖給諫言頃孝感熊公誦子詩因為余復誦之覺而忘後二句續成之步屧中林逢數子雕䦨傑閣倚晴暉長河直轉三千里庭樹常留五百圍老氣諸曺猶勁敵雄心杯酒未忘機夢回古壁曽題句風雨冥濛隔翠微容園呈大司馬宛平公北斗尚書第西園翰墨情闢堂延揖客開閣引諸生臺榭千峯出山河四塞平天虚含象緯地逺劃隂晴日月髙雙闕風雲抱古城五陵多王氣萬馬雜邊聲談笑淮淝敵鞭驅驃騎營指揮驚宿將帷幄異孤卿羽檄書交至軍機酒數行中樞方授律儒術亦論兵鶯語喧金鼓花飛點斾旌隋珠未銜報還欲請長纓詠懐贈田兼三京兆痛飲狂歌老鄭􅐚諸公衮衮日朝天㡬人報國文章在吾黨匡時奏草傳西掖深花春漏轉南臺列栢夕烏還平生最愛張京兆儒雅能如廣漢賢七月六日立秋懐王北山給事清時要地重黄門封事詞林共討論詞林編纂六曺章奏秋色邉烽還照耀西風畵角又黄昏雙星河漢隔鐘漏一葉梧桐飛掖垣記得延英去年事宣豪江硯正承恩去嵗試臺省北山試第一叠前韻酬北山給事見和立秋日詩給事余同年去嵗同武闈清時將略重期門好武能文可細論鎻院科名雙鬢髪垂簾風雨十晨昏縹囊久㸃還詞苑彩筆誰兼似諫垣玉勒宫花思徃事曲江宴後叠承恩徃昔徃昔歡㳺翰墨塲五陵衣馬恣清狂闗情白髪參差短回首青山寂寞長十載雙親書數紙寒燈獨宿淚千行兵塵未解年將老欲說歸田已闇傷輓毛錦來吏部蕭蕭鄰杵動凄其寂寂房櫳素幔垂春日客亭分手後夕陽老淚過門時椒漿餘閣招魂晩兵火孤兒上道遲百口重圍傳警急三秋旅櫬網蟲丝秋日草橋見壁詩感舊有作荏苒京華亦轉蓬芳菲零落舊青叢逺山疏樹璁瓏碧流水殘荷寂寞紅霜重草橋秋色晩嵗寒花徑昔㳺空右安門外西州路酹酒荒原向晚風重㳺祖氏園十五年前白鼻騧青丝金絡酒重賖長思别後凄凉地再見秋來爛熳花世事五侯新第宅桑田㡬度舊人家將軍坐歗風烟外帳底歌鐘閲嵗華秋夜待漏書懐寄蕭韓坡侍讀九門清漏隔銀河午夜微風競玉珂不寐秋蟲偏自語長愁旅雁又相過音書戎馬來人少烽火江山戰地多生養兩朝恩未報苦操柔翰思如何城南憶舊㳺簡楊侍郎及茂才郎君輭紅走馬夾城傍下直深林坐夕陽山色谿光猶在眼松風花影最難忘詞塲賓客思公子寺閣登臨憶侍郎待漏朝來趨左闕南宫秋點夜深長魏環谿先生邀集可亭以寓直不赴却簡講堂髙倚故山青翹首風雲聚可亭兩召天書光日月三遷公望重朝廷苦心開濟君前疏大手文章座右銘今夜清暉動星宿蕭條藜火媿横經秋日見雁同湘北作北風吹雁急南飛邉馬長征去未歸矰繳髙秋辭大野闗河落日過重圍斷行飄泊孤洲逺獨宿烟塵舊處非江海蒼涼沙塞晚尊前為爾一霑衣午亭文編巻十
