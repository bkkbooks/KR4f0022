body:
  text: 午亭文編巻三十五大學士陳廷敬撰序御製文集擬後序蓋聞天行垂象則雲漢昭回地徳含章則山川經紀此河洛呈其精藴苞符闡其祕奥也聖人參兩儀而則二曜該物序而察民彜演為圖疇以教萬世則人文化成之道懋焉是知覺世牖民開物成務必賴亶聰首出躬文徳以表建扵上而昭宣於修辭立訓英華發於和順篤實著為輝光然後三物以惇四術以備户佩詩書之澤人㳺儒雅之林而一時之生其際者即山陬海澨靡不涵濡盛化以近天子之光則豈非上聖之宏規太平之駿烈也哉欽惟皇上遜志典學勵精勤政徳業之隆治功之盛赫赫巍巍不可殫悉自莅阼迄今齋莊祗肅對越天祖孝敬兩宫勤勞天下興起教化修明制度文經武緯禮序樂和寛沖以體羣下之情惠懐以普黎庶之徳銷金革而四海永清垂衣裳而八荒在宥至若天時之盈虛地利之險易邦用之豐約兵師之因革民風之情偽吏治之貪廉莫不悉歸睿照潜納皇衷故凡施為建立見於詔號命令之中出話吐辭之際所謂二帝三王之言語行事而典謨訓誥之文也若聖􅍨天葩形諸篇翰時而咨儆有位元首股肱之歌也時而諷諭民俗蕩平正直之訓也時而切指物類户牖杖履之銘也時而流覽景光阜財解愠之奏也蓋惟皇上狥齊性成緝熈時敏質本生知而猶好學聖由天縱而又多能以故蓄諸中而彰諸外者抒寫化工渾涵元氣鎔裁古今陶鑄萬彚炳煌焜燿至於此極臣叨塵法從乆侍經帷每聆玉音推解經傳奥㫖發前聖未發之微言傳古人不傳之深意下及諸史百家罔不旁通曲暢而深宫清燕未嘗一時輟書冊不觀臣固知聖謨洋洋並六藝而昭天壌者洵有原本也雖義藴髙深同體沖漠神明於意言之表非臣庶所能仰窺萬一而即而求之引伸而紬繹之則仰觀俯察之機時行物生之妙可以想見端倪沐浴鼓舞於不自已矣然而至徳謙光富有若虛久藏緗袠近因廷臣敦請再三始命彚次編為四十巻將見流布寰區昭垂典則咸得瞻日月之末光挹河海之餘潤彬彬乎有所感發興起以永成夫道一風同之治猗與盛哉癸丑武㑹試録後序嵗癸丑九月天下貢材武士於京中樞臣請舉㑹試奉命㧞騎歩射及格者七千有竒上曰爾廷敬其副卿馮溥徃衡其文前此未有以詞臣副執政大臣典㑹試者盖異數也臣謭劣聞命戰栗黽勉祗役既取數如額録當獻臣得綴言未簡臣惟國家取士文武殊科然革前代武學師太公之陋學統於儒師統於孔子文不兼騎射武顧兼䇿論何也此非難武士也誠重之也夫武而不文其人任卒伍而不足任偏禆任偏禆而不足任大將者也兵家者言毋逾孫呉吕李司馬尉繚諸書今武士合而治之闈中發䇿則漢唐宋諸名將已然之迹與夫天下塞障耕屯保伍諸事旁及莫遺又明示以七書之外之書無不當肆力矣士苟雅能明習得其要領發為文辭具有倫貫異日干城貔虎之選取諸此不已裕哉且夫麤獷桀驁者武士之習也一變其習使人不得以赳桓目之而庶㡬於古之雅歌投壺羽扇綸巾者非沐浴書冊漸靡師儒不為功若此者非皆論䇿宜重之明驗乎蓋自古承平既乆勢漸輕武不惟文士輕武武亦自厭其武馴至盡􅈥武備而不可振今重武兼重文正所以常重武而不至於輕也草莽鄙生妄謂先之騎射武士所事也重之也至於論䇿則已略允若兹當其罄控縱送無不及格盡收之奚不可而乃决去留於操觚不亦可以已乎臣於棘闈中從臣溥後慎簡諸士所作登其可者兾或可仰佐得人以無辜任使至意復著其説喻天下繼起諸士使皆知國家文武無畸重决拾之暇即咿唔而不敢有略文之心昔周之盛也左之而文無不宜右之而武無不有方其奉璋峩峩髦士攸宜皆卿大夫之材及其淠彼涇舟烝徒檝之皆將帥之選臣知自今以始人材蔚起克文克武雖成周之盛無多讓矣辛未㑹試録序洪惟我皇上聖神文武勤儉寛仁道隆化洽徳厚恩滂是以府修事和績熙功叙典章文物粲然光昭煌煌乎駕三古邁百王洵聖作之崇閎帝載之顯懿也嵗在重光協洽當試士於南宫禮臣請典厥事者上命臣玉書臣廷敬偕臣光地臣士正以徃臣廷敬聞命惶恐自惟駑材下質忝竊遭逢迂疎暗僿無所建明涓埃莫報感悚徒深伏覩我皇上天縱至聖好古敏求經史百家兼綜並貫手撰御集盈溢縹緗聖詣精微天章炳蔚朗乎如日月之垂照淵乎如江海之迴瀾自載籍所稱未嘗有也至若評較古今文字睿鑒超然片言論定㢠出羣臣之上蓋得乎學者至矣臣從諸臣後固所日仰髙深而弗能颺贊者也我皇上功徳文章之盛巍煥若此如臣之愚備員尸素衡文鉅務曷克勉稱聖心曩壬戍之役既奉詔使今復荷兹任敢不益矢精白毋負初心臣伏思易書詩之言矣易曰觀乎人文以化成天下書曰萬邦黎獻共惟帝臣惟帝時舉詩曰藹藹王多吉士自古帝王宰化出政誕造鴻休悉本賢材之盛弼成襄賛之隆也明甚今者聖主雅化作人振興文運敦勵士風美意良規甚悉甚備而睿文􅍨翰勒金石而光簡冊者昭垂於太學之庭鄒魯之邦白鹿鵞湖之祠崇重表章靡所弗至林廟之豆籩載薦闕里之修葺維新廣頖宫之搜羅設八旗之科目人材輩出仕進途寛蓋聖天子在上而名山大川之鍾秀詩書禮樂之甄陶伏處而謳歌悠悠於寛閒寂莫之鄉欲効一得出一長以佐王事而䇿勲名其懐抱有素固願司衡者善擇識之使不矢公慎以集事將何以上醻皇命下不媿於多士乎矧天地神明臨之在上質之在旁早夜乾惕兢兢以自持者殆食無寧晷而寐不安席也臣甫入闈遂與同事諸臣誓告司盟冀答主知於萬一風簾月案披閲維嚴大抵士習不同文體各别摛􅍨掞華英采外絢者才之勝也抱樸含章情文内藴者養既具也若夫才以學歛養與識優探六藝之祕微芟羣言之浮蔓沈浸醲郁光輝發越而凖以先民之矩矱可為繼起之津梁前古後今不可多見兹值盛化之漸摩休風之光被亦庻㡬乎其遇之他如蹈空襲虛支離其辭説者皆擯而弗敢以録蓋仰體我皇上崇實學黜虛聲之至意焉夫一朝之取舍即吏治之攸闗民事之所係若所録之不當又且以負天下矣臣又謂多士自昔文行一致蓋道徳文章出於一而言語事功不得岐而視之也多士於嚴更漏刻之餘殫思竭慮聚寒窗之攻苦以進於校士者皆所以闡明聖賢之緒言備國家異時之實用豈其出身事主而忘之多士自今以徃其益居敬窮理推誠致行盟心於幽獨立身於家邦宣力於猷為竭忠於君父求副聖天子敷奏明試之盛心則今日者無負簡命之諄諄無愧於多士之濟濟且無慙於天下之大矣多士勉焉臣方與多士共勉焉癸未㑹試録序欽惟我皇上統天建極治定功成於今四十有二年嵗在癸未春二月當大比天下士禮臣請典試事者臣自陳昏瞀既列狀上奏上弗允命臣廷敬偕臣賜履臣涵臣汝霖典厥事臣廷敬聞命仿偟震悚移日伏念臣備官銓曹侍直内殿恐滋隕越常懐氷兢兹當校士之重寄敢弛夙夜之初心且多士來自草澤山陬海涯皆知聖人在上道濟羣生文明之化光昭下土夫既人思淬礪俗嚮陶甄臣又何敢不益自鞭䇿以上思答夫聖恩下不愧於多士乎今鎻闈畢事録文以獻例得颺言篇端臣不敢為枝言蕪辭謹識其大者仰冀省覽焉蓋臣今奉命而論者文也夫文以載道道命於天傳於人知天之所以命知人之所以傳夫然後道尊而學正學正而文興則今日道統之傳文運繫焉此其大者也臣謹識焉惟天隂隲下民篤生聖人作之君作之師自伏羲神農黄帝堯舜禹湯文武皆以聖人之徳居君師之位以行其政教道統之傳常在上而不在下也若有其徳而無其位則不得君師之位以行其政教之實故自孔子以來道統之傳常在於下揆之天降生民之意豈適如此哉且夫天道貞觀無徃不復故知今日者道統之傳果在上而不在下矣在下者傳之師儒僅寄於語言文字而在上者則見諸行事之實我皇上以聖徳而居天位天下大治生民乂安故知道統之傳果在上而不在下也昔孟子謂五百年必有王者興歴叙其傳亦大率以五百年為斷以今考之在上者莫不皆然而在下者則或不盡然也然而其始之自上以及下其後之由下以歸上者亦莫不皆然也孟子謂由堯舜至於湯五百有餘嵗若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之所謂在上者莫不皆然也又謂由文王至於孔子五百有餘嵗若太公望散宜生則見而知之若孔子則聞而知之此所謂始之自上以及下者莫不皆然也又謂由孔子而來至於今百有餘嵗自是以降或千有餘嵗或百餘嵗或不必百餘嵗若周子若二程子若朱子此所謂在下者或不盡然也若是者何也天之鄭重夫在上者之傳故以五百年為斷其不必五百年者蓋僅寄之語言文字以衍斯道於絶續之交特在下者之事耳惟是師儒之統轉而屬之帝王則五百年之期斷然其不爽者將復合焉此所謂後之由下以歸於上者莫不皆然也蓋自周子二程子朱子而來至於今五百年矣我皇上論世知人崇朱子之學頌其詩讀其書存諸徳行見於文章舉而措諸天下之民使堯舜禹湯文武之道常在上而不在下故道統之傳由下以歸於上者此正其時也此乃天之所以降生下民之意也臣嘗伏而思之天下之士涵濡於雅化鼔舞於皇風者亦已乆矣而聖人之道傳之在我皇上者天下之人將皆知之而其所以朝斯夕斯實用其力者天下之人或未能窺其詳也臣日侍内廷因得臚舉焉皇上總攬八紘日有萬㡬舉凡立綱陳紀制治綏猷諸大政事發於聖衷行於天下者既莫不與古先聖王之道異世而同符矣而勤思至道博極羣書燕閒之頃耽情六籍慈誨青宫訓督皇子詩書講誦殿陛之地儼若鄒魯之鄉作為文章巍巍乎與典誥同風至於帖括之文百家之藝盡在聖明之鑒豈非道統所歸實有本未兼該源流共貫者與今日者親得聖人而為君師雖不敢與於大道之傳而亦幸在見知之列將見由文王以來濟濟之多士藹藹之吉人復生於王國以上佐夀考作人之雅化而時雍風動萬邦黎獻共惟帝臣馴至於矢謨賡歌亮采惠廸之風以㡬乎唐虞郅治之盛則道之在上而下被其政教者將永永焉傳之千萬嵗而無窮又豈五百年之可以數計者哉謹以告多士者為黼扆獻焉御定全唐詩後序大庭軒轅遐哉􅊬矣唐虞之稱詩也帝舜則曰勅天之命惟時惟㡬而申以喜起之義曰百工熈哉以勉其臣大禹則曰九功惟叙九叙惟歌而申以董戒之義曰勸之以九歌俾勿壊以訓其民是詩之所以訓勉其臣民而通於政教者見於虞夏之書可考而知也周之興也武王既定天下廵狩述職陳列國之詩以行其慶讓孔頴逹述廵狩之禮引王制曰命太史陳詩以觀民風是二南之詩得於廵狩此周初政教之羙所由傳也宣平以還正變迭奏邶鄘而下失得互陳微獨當時采風知列國之政教而考古論世者亦可以得其升降汚隆之故焉漢魏去古未逺六朝以來餘波綺靡洎夫有唐太宗起而振之本國風雅頌之遺有古歌今律諸體上倡其鴻製下衍其清音彬彬盛哉以及中晩之際與周詩正變約略相倣故觀全唐之詩愈有以知政教之所闗為尤重焉我皇上接唐虞之統闡文武之傳躬致昇平協和萬國士詠於室農謳於田蒸蒸然有詩書禮樂之風而九重深念時省兆民黄髪歌衢垂髫擊壤何其盛與蓋天下涵濡於聖澤之中者於今久矣惟我皇上以道徳之純粹發為事功以性情之中和孚於民物舉凡彰施於政令詔誥之間皆原本六經度越前史而下之觀感而化詠歌蹈舞於不自知者則有近乎詩教之興傳曰王者之風必本聖人之化夫惟功徳之隆有以致此也至若御製詩文經緯天地陶鑄萬彚炳炳琅琅留玉几而祕金函者猶未盡登琬琰昭布域中而徃徃蒐羅編緝百家有用之書足以佐邦政裨世教者亟令剞劂以訓勉臣民煥乎文教之美莫與京矣㑹翰林侍讀徐倬進全唐詩録皇上覽而嘉焉遷倬禮部侍郎以風厲天下命以大府之金校刋於其家既親製宸章冠之簡首復命臣等為後序臣廷敬自以爝火螢光在日月之下屏營累息經渉嵗時伏念我皇上功徳之巍巍既如彼文教之煌煌又如此此即大舜之勅時㡬熈百工大禹之勸九歌俾勿壊之至意也即詩教之所感孚遂可因全唐之詩録遡成周之二南而永嫓美於中天之盛也矣刻朱子増損吕氏鄉約序周禮比閭族黨州鄉有相保相受相𦵏相救相賙相賓之義各立其長教令以行之下士為比長中士為閭胥上士為族師下大夫為黨正中大夫為州長命卿為鄉大夫比五家耳遞累而至於鄉盖萬有二千五百家焉比閭族黨州鄉為地六而鄉最大比長閭胥族師黨正州長鄉大夫為長六而鄉大夫最尊又司徒所領鄉老二鄉則公一人鄭氏曰三公與王論道中參六官之事外與六卿之教其要為民是以屬之鄉焉蓋鄉者民之聚也故後世言民之聚者必曰某鄉某鄉云然古之鄉比於後世之郡邑今所謂鄉不過古之比閭族黨而已㡬於州者亦尠矣考比閭族黨州鄉之制比長各掌其比之治五家相受相和親有罪竒衺則相及閭胥各掌其閭之徴令凡春秋之祭祀役政䘮紀之數聚衆庶既比則讀法書其敬敏任恤者族師各掌其族之戒令政事月吉則屬民而讀邦法書其孝弟睦婣有學者黨正各掌其黨之政令教治孟月則屬民而讀邦法祭祀則以禮屬民州長各掌其州之教治政令正月之吉各屬其州之民而讀法考其徳行道藝糾其過惡而勸戒之三年大比則大考州里以賛鄉大夫廢興鄉大夫三年大比考其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之獻賢能之書於王王再拜受之登之天府此謂使民興賢出使長之使民興能入使治之嗚呼先王之制何其善哉鄉老鄉大夫下近於民而上逹於天子故其時之政即其教其時之吏即其師下至比閭族黨州莫不皆然此所謂善也今之鄉不得齒於古之州獨不可以齒於比閭族黨乎亦猶有同於古之比長閭胥族師黨正其吏其師者乎亦何恠夫其政無其法其教無其道也今之學官猶秦漢以來之博士官文學掾耳政與教殊途吏與師異趣矣然而能舉其教與師之職者十百而不一見也政與吏之不古若又何足恠焉此賢人君子之所以大懼而思有以補其法之所不及也余覽朱子増損吕氏鄉約有先王政教之遺意惜吾不得見鄉老鄉大夫興賢興能之盛矣而姑與比閭族黨之人樂而服習焉非敢自以謂能之也聊竊附於賢人君子之所大懼云爾經義考序朱竹垞先生歸隠小長蘆中以緝學著書自娛逺屏聲迹獨千里寓書於余曰彜尊所輯經義考三百巻今已就九經之外旁及緯候唐宋以來碑版傳説摉采頗多公其恵踐前諾畀以序言廷敬發書喟然曰經義之存佚聖道之因以顯晦而君子之所尤宜盡心者也凡經之存佚不於其書於其人且於其時有佚而若存者有存而若佚者秦燒書坑儒經佚矣漢興於殘烟斷燼之餘掇拾其什一二其時専門名家引經制事雖守殘抱闕彬彬乎有近古之風焉其後以經選士設科射䇿乃有通義之目經義之存莫盛於此夫其初所謂經者易書詩禮春秋而已是以石渠之論稱制臨决者曰五經同異孝章修甘露故事亦曰論五經於白虎觀唐貞觀中乃分列九經而唐之經義不勝於漢若是乎佚者若存而存者若佚也夫經以致用致用之實莫大乎教人取士之法則由唐宋以來其得失之故可覩矣唐初沿隋舊置六科其後科目雖繁大要以明經進士為重明經試經義進士試䇿詩賦雜文亦貼經故尤以是科為重後雖稍浮濫終唐之世卒未有以易之也宋初制先䇿次論次賦及詩次帖經墨義後所重者詩賦論三題熈寧元祐之間詩賦經義罷復錯互而王安石吕惠卿創始之經義迄於今流毒無窮焉詩賦雖詞章之學而精其業非通經學古者則不克以為今之經義名雖正而實則乖蓋王氏之經學行而經亡滋甚矣安石曰本欲變學究為秀才不謂變秀才為學究也嗚呼豈知並學究而失之乎今古經具在而學術如此則經之存佚皆不可得而問矣今竹垞所著經義考至於三百卷之多其或存或佚詳載於編余以為經竹垞之考定存者固森然其畢具而佚者亦絶其穿鑿附㑹之端則經義之存又莫有盛於此時者矣微竹垞博學深思其孰克為之聖天子典學右文石渠白虎集議方殷諸儒必將以竹垞為大師而正經學以淑人才有厚望焉余序竹垞經義之書而及唐宋以來所以教人取士之法蓋深有慨於聖道顯晦之故而重有幸於今兹也合刻吕氏二編序康熈三十年夏六月予承乏刑官之長見諸犯法者士與吏多有不幸出於無心而凡民之愚皆其所自取然其始或皆以微故罹於刑辟至有以三銅錢殺人而抵者雖其氣質之惡亦坐未嘗深知人不可殺之故寧貿貿焉即於死而莫能悟也是豈非其人之獨不幸與今國家修明法度中外凛然士大夫㡬㡬有懐刑之風而鄙野之甿觸禁未止夫聖天子之加意教化至矣而民不悟意有司者文法宻深罕所譬曉無以發其天良使漸漬染濡馴至於刑措之盛與予觀寧陵吕新吾先生増述其先公漁隐閑翁小兒語及所自為宗約歌自閭閻童稚閨閣婦人牧夫估人野諺巷語約以精理諧為音聲是固無宻深之艱而有譬曉之易者也夫殺人者抵民未有不知乃猶貿貿焉犯而莫之顧者非其不知人不可殺而人之所以不可殺之故凡民之知之者或鮮矣此二編者雖非獨為此而作然童而聞之熟於口耳而悦於心人之所以不可殺之故將深知其意長焉老焉謹而避之民之犯於刑者亦鮮矣則以是仰佐聖明教化之指豈謂無補哉初汶上岳鎮九峰秀刻此二編以教其家人鎮九去京師久刻本不可多得予謂無以廣其流播也乃取是二編合而刻之予不敢隐鎮九之羙者亦竊附於君子與人為善之義云爾是年七月朔日澤州陳廷敬書日下舊聞序周禮大司徒掌邦教而其所亟者乃在以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原陘之名物而其所重尤在以土㑹之法辨五地之物生然後以十二教治五物焉夫以掌邦教之官而其亟且重者顧乃在於山林川澤丘陵墳衍原陘之名物惟五地之物生既辨而後乃以施教焉則五地之物生所繫之亟且重可知也而其六官之篇必先曰惟王建國辨方正位體國經野設官分職以為民極若是乎先王建邦設都凡以順天道察地理宜壤土之所生以求盡夫人物之性而施吾教焉亦豈猶後世憑險阻域封疆角强力於天下如秦漢以來所謂攻守異勢婁敬告漢髙帝以力取不可以徳守諸為説之陋者哉古者建國其始見於書曰陶唐有此冀方榖梁謂冀者天下之中州自唐虞夏殷皆都焉虞夏之時分天下為九州冀州地最廣河東河北皆在其域中舜分冀為幽并營幽與并皆冀地也由此言之則今之帝京正當冀之封域葢唐虞夏殷之所都而天子之常居也梁襄言燕都地處雄要北倚山嶮南壓區夏若坐堂隍俯視庭宇雖王者建邦不務險阻之憑封疆之域而燕之形勝自古都㑹之雄卒莫有過焉者其至盛矣哉易大傳曰聖人南面而聽天下嚮明而治惟燕當之矣詩云天命多辟設都於禹之績又云商邑翼翼四方之極言封畿寰宇之表儀也其山林川澤丘陵墳衍原陘之名物既不可以不辨而又將以為教所由施其繫之亟且重如此也則夫廣覽博觀精識而詳説之仰稽天道俯察地理及壤土之所生人物之所宜推原先王建邦設都之意布諸册書使因物而施教者於是乎有取焉詎不偉與朱君竹垞彊力嗜學著星土世紀一卷形勝一巻宫室七巻城市九巻郊坰六巻京畿十一巻僑治附焉邉障二巻户版風俗物産一巻雜綴一巻終以石鼓考三巻統名其書曰日下舊聞而采輯羣書至千二百餘種之多可謂廣覽博觀精識而詳説之者矣以余觀其意不顓務言險阻封疆之勝始之星土世紀而終之以石鼓之文大抵與秦漢以來儒者形勢之論以及奉春君之陋説殆什伯不侔矣擇而取焉吾望夫因物以施教者朱子論定文鈔序衆言淆亂折諸聖去聖日逺邪説害正不有其人排斥而决擇之以衷諸孔子則天下倀倀焉如瞽者之無相暝行之無燭不及於顛踣陷溺無所底也當戰國時去孔子猶未逺而楊墨告子之徒各倡異説塞仁義之途孟子辭而闢之廓如也洎秦以來㳺士縱横捭闔傾動世主其人皆詐謀詭論欲茍一時之得不復顧萬世之害舉先王所以成教化而美風俗者毁裂滅絶其害甚於燔書浸滛既久中於人心由是百家紛出奮其私知敢有顯然非聖之書矣兩漢雖表章六經而微言既湮其流至於曲學阿世迨其後生心害政以致禍亂相尋歴晉唐洎五季之時彌甚矣中間二三賢喆之士如韓歐諸君子出而力爭之聖人之道賴以綿綿延延不墜於地然亦莫有能集諸子之言而滙歸於一是者也故即濂洛之賢其言亦僅􅊬焉孤存於世逮及南宋紫陽奮興於千載之下正百家而集大成迨於今世之學者知道之有歸而學之有統謂非朱子之功將誰屬哉昔蘓子瞻論楊墨之害等於洪水降及後世曲學之患甚於異端昌黎推尊孟子以為功不在禹下然則朱子之為功亦不在孟子下矣孔子曰不知言無以知人孟子願學孔子者也曰我知言夫言之淆亂難知也久矣由孟子辨之而天下後世始因以知之今去孟子之時千有餘嵗羣言之紛綸莫可紀極朱子從而别白是正焉而天下之言理者始歸於一是朱子之知言繼孟子而興起者也其言散見於羣書及具本集中者石門呉子青壇距户十年餘潜心蒐輯薈萃成編名曰朱子論定文鈔昔人謂仲尼駕説者朱子駕孔子之説者也今復駕朱子之説可謂金口而木舌者矣聖天子典學重道紹接洙泗詖衺新異之説不得至於黼扆之前知言獨至矣是書也上佐乙夜之觀益廣文明之化又豈僅為學士大夫誦説服習之書而已也哉然學士大夫果皆能誦説而服習之以求至乎成教化而美風俗則簡冊之所傳即政教之所布也知言之功不其偉與青壇以書問序於余余是以樂為之序四書字畫約序四書之書髫髪誦習白首茫然能得其意者鮮矣顧其立言文從字順非有聱牙詰曲棘㗋薄吻之音世之學者動稱古文竒字過矣其為書數萬言約而取之凡二千三百二十五字耳而天地古今洪纎髙下事物之理修已治人之道不出此二千三百二十五字之中而罔不備焉雖古之善立言者無以過之若是則聖賢之所貴古文竒字云乎哉古文竒字亦有加於四子之書之所言者哉傳曰修辭立其誠又曰吉人之辭寡盖立誠則辭自寡四子之書辭之寡者也而古文竒字不與焉後世立言者將何所取法與陽城王君端木約取其字參伍研極能審知其㸃畫之所以然孟子所謂博學而詳説之此非其一端與間嘗謂小學之為功於經書甚鉅如陸徳明釋文顔師古刋繆正俗張參五經文字元度九經字様賈昌朝羣經音辨毛居正六經正誤皆是也四子之書約其字而詳説之則自王君始王君且老尚為諸生為此以詔後學亦小學之功也而余則進以立言之説者以世所當治之書更無急於四子而其為字如此其少其為用之大舉天下所當治之書莫之能或急於此則是立言之道不在彼而在此可知也王君好學深思亦喜古文竒字故為是説以告之傳經堂集序吾修勝國史至所謂靖難時忠臣義士蓋攬其軼事而悲之夫以燕之雄及其一時攀鱗附翼之人皆已灰沉煙滅散漫於蟲魚牘簡之中况其姦回邪佞茍富貴而賊忠良此人皆澤已斬矣僅而存者亦黤黮而無聞也而忠臣義士世皆知重其苖裔吾嘗訪而求之問其家牒之所蔵弆長老之所傳聞茍遇其人樂與之游焉前年得一人華亭廖子樾阡今年得一人仁和卓子次厚兩人者之先余既採其行事編之史傳於廖氏又别為小傳以記其家世之賢兩人既世為通家又相好也而樾阡從吾㳺且久於是次厚屬樾阡别求余文序其所謂傳經堂集者蓋卓氏自忠正公而後聞人輩出而入齋蓮旬蕊淵三先生尤以文章經術為世所宗蕊淵之子火傳賢而有文建祠祀三先生櫝而蔵其遺書於廟嵗時奉以出以教其子孫於是傳經堂之名所由著也而海内文章之士慕其流風咏歌頌說其遺烈火傳編為大集而次厚繼其先人之志收羅益多三先生之賢凡名能為文章者亦既揚扢而紀載之矣而吾獨悲忠臣義士事人國家不幸而遭變故仗節死義雖其芳名盛美足以傳之於無窮然求其後世子孫有能念爾祖而勿替厥休者亦寥寥其難焉今吾於廖氏既有遇也又得卓子及聞其先世之流風遺烈而頌説之以竊附於海内文章之士亦可謂幸已然吾聞金川門失守時忠正之子孫變易姓名乃得出避於塘西而廖氏竄流之金山其後子孫稍得從申浦之南其艱危如此今卓氏雖盛矣亦尚其敬念之哉洎水齋文鈔序陽城之西壤境相接僅三四十里許在行山溪谷之間由明以來以科第顯立名當世者其多至踰晉以南數郡縣陽城蓋天下人材所自出也今未易殫數其尤為天下所知者有若楊公繼宗原公傑王公國光孫公居相張公銓或以清節或以事功或以直敢言或以忠死事此五君者皆天下所知者也準以洙泗之四科則班班乎徳行政事言語之選焉疎菴有文而略拱陽長於論事蓋文學之難雖賢者不能兼而有之矣幸而有之而其人苟不亟亟於表暴好名以求自異雖同時之人知相推許而知者半不知者亦半迨其後聲塵湮滅而無聞此才人志士之所以椎心飲恨於斯文也吾於藐山張公有慨焉向所謂文學之科公其人也始吾所居三四十里溪谷之間有常評事倫及吾祖副使容山公公諱天祐皆最能詩而莫為之繼藐山先生奮然獨興於數世之後其所與交逰者類皆名流如竟陵鍾伯敬亦當世之文人固已知推許之矣里中則楊黄門沁湄以其學與先生相周旋先生曰吾之畏友也其時白公東谷最晩出先生亟稱之自是先生之文益昌而里中名卿碩人能文之士彬彬稱盛焉則先生推挽之功也昔子夏教授於西河言㳺崛起於東呉流風遺韻振往古而導來今孰謂先生之功為可誣也哉以公立朝之風㮣晩節之昭明不媿於向所稱數公徳行政事言語者而斷以謂文學舉其盛也兵劫之餘篇章散落張公伯珩搜録其遺文伯珩令子茂生鋟版行世而先生裔孫太僕君泰文式光前緒徴序於予予因慨夫吾祖容山公之有文也容山公詩吾童稚時及見其鈔本後略省記悉索敝簏中不可得問之鄉曲無有知者則遂將湮滅而無傳矣寧不可痛恨哉吾是以歎太僕君之賢能不殁其先人也同里寓人陳廷敬書願學齋文集序黄忍菴先生自定其所為願學齋文集一百十巻以其目録視余屬為序曰吾求於世可序吾文者得四人焉子其一也又曰始吾為學因文以見道子之求道也勤故可以叙吾文余愧其言然卒不得辭而亦將以文與道離合異同之故質之忍菴而亦因以求道於文焉易書詩禮春秋皆非有意於文也自孔子殁後之能言之士其傳於世者大扺皆有意於為文而其能不離異於聖人之道者斯為至矣由孟子以來去聖人益逺道益不明其傳於世而號為能言之士如司馬遷班固劉向揚雄之徒其所為文雖皆不離異乎聖人之道而語其至不能無大醇而小疵也近代有八家之目其説始於茅氏鹿門而傳其書於天下後世此數子者果天下後世之所未易㡬及者也而以言乎聖人之道此數子者其馬班劉揚之流亞與嘗讀晦菴朱子之文矣蓋顓以明聖人之道於危微絶續之闗而其言語之妙又有兼數子之長者然而不在數子之列鹿門之意將以謂數子者特以其文焉而已耳非果謂其果不離異乎聖人之道也若是乎文與道離而不合異而不同而忍菴曰吾以文見道又以為余之求道勤而可語於斯文也豈無其故哉朱子自韓歐陽以下皆有譏焉而獨稱南豐先生之文故朱子之文出於南豐今忍菴集曰願學者不知其謂誰何而以吾觀忍菴之文則皆仲晦子固之文也由是以求至乎聖人之道則忍菴之所見必將超然有得於此矣所謂因文以見道者其謂是與忍菴將歸與其徒講道於江湖之上以求進其所未至而如余者既無所自見於世將齟齬以終老忍菴亦何取於余言哉使强為言亦朱子所謂已試不驗之説者其果何所取哉忍菴嚮所云四人者余問之孝感熊先生其一也熊先生講學為文忍菴試質之其以余言為何如耶午亭文編巻三十五
