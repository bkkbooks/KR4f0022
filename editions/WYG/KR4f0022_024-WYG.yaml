body:
  text: 午亭文編巻二十四大學士陳廷敬撰襍著困學緒言如干則有叙韓退之謂古之學者必有師又曰世無孔子不當在弟子之列自孔子以來世無孔子矣既不當在弟子之列而學者又不可無師則是雖不必孔子焉可也孔子之言曰三人行必有我師焉予生也其地則唐虞夏之故都而近聖人之居者也由漢唐及宋明名世代興賢人君子未易悉數其有能明孔子之道如龍門河汾涑水三數公者尤彰彰顯著焉河津薛子起而振理學之傳繼河汾之業庶幾乎可進於孔子者也予童稚之年即知嚮慕今老矣言行之尤悔叢生動與時違心焉乖忤殆所謂困而不學者與竊不度其愚陋倣中説讀書録之義記數則以寄其志之所存非敢以為學也然曰困學緒言者猶將引而伸之以畢其志焉惜乎其老也微塵六合一息千古正謂微塵一息具有元亨利貞之理率性為道道不可離即此已見性善矣如使性而惡也有善有惡也則亦何為須㬰不離此性而惡者及有善而又有所謂惡者哉故觀乎此而紛紛之説其為謬妄益信矣太極圖括盡天地人物之理然其所以接聖道之統開理學之傳者所貴學者以此理實體於心耳若不實體於心則天地萬物亦何與於吾事乎故曰君子修之吉修者修此而已無極而太極所謂神無方而易無體也無方無體無極也神也易也太極也無極而太極與性善之㫖同功賢哉周子弗可及已克已復禮禮言復本有也禮即性也夫曰禮其善可知烏有所謂惡哉故絶天下之惡而成天下之善者性善兩字之功也性善兩字體貼在心上大有功效善乎二程子之遺書也吾誦之得吾心焉由是以求孔子之道不逺矣富與貴不以其道得之有害于仁所以不處貧與賤不以其道得之無害于仁所以不去處不以其道得之之富貴去不以其道得之之貧賤是去仁也君子去仁何以謂之君子所以然者君子無終食之間違仁何有於富貴貧賤哉故造次必於是顛沛必於是貪生怖死恒人常情人能盡其道而死者鮮矣故委心任化達人之情盡性至命聖人之學揚子雲謂通天地而不通人曰伎程子曰豈有通天地而不通人如止云通天文地理雖不能之何害為儒然則儒之所貴可知矣豈天文地理之謂哉世之惟務從事於此者諒矣誠無不動實理如此亦有不然者時之為也故泰之時為君子易為小人難而否之時為小人易為君子難敬則可至於誠誠則無有不敬寂然不動感而遂通寂感非有二也寂之時無感不足以為天下之大本感之時無寂不足以為天下之達道人心中有一物則滯於物而不能物物知志於道而不能一者有物焉以二之也然真能志於道者尚不知道之為道而又何有於物哉吾學亦屢變矣其始學詩當其學詩而見天下之學無以加於詩矣其繼學文當其學文而見天下之學無以加於文矣其繼學道及其學道而見天下之學無以加於道矣安定不擾求仁之方薛子讀書錄言其心之所得以備不思而遺忘非如今之言道者竊道之似以成其説也信非誠也而惟誠為能信愛非仁也而惟仁為能愛身即誠也誠即身也故曰萬物皆備於我矣反身而誠樂莫大焉至誠而動者其常不動者其變要之不動猶是誠未至也二禮必求聖人之意學貴立志孔子十有五而志於學今去孔子志學之年幾何年矣能不惕然懼耶程子曰便儇佼厲之人去道逺而吾知其免夫與其言而不行寧行而不言為學不得厭動喜静酬酢萬變正以驗吾功力之淺深程子曰孜孜而為善者當其接物之際也未與物接則敬而已自敬而動所謂善也此内外交養之道也羣居最奪人志學者言貌必恭謹如以謔浪笑傲為能便辟儇巧為才亦甚失其本心矣日入其中幾何而不與之俱化哉朝聞道夕死可矣聞道則可死不聞道直是死不得也故不聞道而生罔之生也不聞道而死桎梏死者也克已復禮閑邪存誠不過得其本心而已王荆公與明道論新法公子雱囚首跣足擕婦人冠以出箕踞大言梟韓琦富弼之首則新法行矣出邵氏聞見録雱雖愚疑其無此事是以君子惡下流也王介甫言乾之九三知九五之位可至而至之程子曰使人臣毎懐此心大亂之道也安石解經如此悖謬其敗人國事宜哉理氣猶形影不相離惟有形而後有影未有有形而無影者也然無形則無影矣凡事之難當盡其道處之不得有已有已則自私自私則用智愈覺其難矣故凡未盡其道者皆有已者也凡事最忌急迫急迫皆有已之見存也凡事入手皆須忍耐稍緩則其理自著應之庶幾少錯矣易言而受責其為益多矣思而改之可也逆而報之大不可也小人者賢者恨之聖人憐之是聖與賢之别也盗胎奪䕃之説雖不可謂其必無要非吾道之所貴也忘與助長其失則均正所謂中庸不可能也觀天則知人矣觀天之理則知人之心矣聖人學天學聖人者學天而已矣天動也人亦動也天無言人有言言以天而不以人由天之動也喜怒在事物而不在吾心喜怒其事物者誠也喜怒其心者妄也喜怒其事物者君子喜怒其心者小人古者養老之理有扶有杖有鯁噎之祝盖其誠意周至如此老者安之聖人之志也大夫七十致其事亦是此意窒慾莫要於思人心不能無思讀義理之書所以善其思而養其心也若陷溺於詞章之學其思既亂其心甚危有志於道者可勿戒諸完養思慮涵泳義理真積力久自然有得發而為言辭自當中理而無鄙倍之虞所謂有徳者必有言也若學未至而汲汲於為文正如小兒學語雖道得一兩句亦不得通貫暁暢也心勿忘即必有事勿助長即勿正曰必有事則此段尤重今且須知必有事是何物事然後勿正心勿忘勿助長有下手用功處是以學問思辨居其四篤行居其一則豈獨行之為難哉此道正如人之於飲食得之則生弗得則死其事最平常其理最切要今人只作一件竒特髙逺事看了莫肯尋向上去偶見學者從事於此即自恥其不能指目為立異可歎也凡心之所思四肢百骸之所職視聽言動之所以然皆天也非人之所能為也知其為天非人之所能為者則何可不敬以守之愛之䕶之珍之惜之以無失其正耶明道程子曰視聽思慮動作皆天也人但於其中要識得真與妄爾心之於道猶腹之於飲食飲食之至於腹不假安排布置而自能疏貫流通道之體於心亦豈待造作矯揉而後能神明變化耶古人讀書直是要將聖賢説話實體於身心如尹彦明見伊川後半年方得大學西銘看其鄭重如此今童䝉初學讀書未有不取大學熟爛誦習者其後果能行得一言一字否父師之所以教子弟之所以習為作文辭取科名之具而已盖以是為固然而莫之能知古人為學之意也書雖讀而道益不明不行矣謂之未嘗讀書可矣子弟輕俊古人之所憂而今人之所喜可以觀世矣毋意必固我天心也聖人之心與天心合一惟孔子絶此四者顔子三月不違餘子日月而至學豈易言哉西銘天地之塞吾其體天地之帥吾其性自子思孟子以來無人見及此惟程子云天人本無間㫁語義約而能盡此皆學者切要入徳功夫極其至雖聖人莫能外焉西銘天地之塞塞字尤難下與孟子塞乎天地之間塞字别孟子言直養之氣横渠言天地之氣故此塞字尤是竒妙學者明得此一字其於入徳之功亦思過半矣鳶飛戾天魚躍于淵言其上下察也西銘從此義得來横渠謂范㢲之曰吾輩不及古人病源何在㢲之請問先生曰此非難悟設此語者盖欲學者存意之不忘庶㳺心浸熟有一日脱然如大寐之得醒耳横渠此語正接引學者苦心且如吾人今日亦各有病源知之亦各明了直是無好方藥治療好方藥亦不難得只畏苦口不肯喫却所謂吾末如之何也巳矣者是也或言道學不可不行而可不講曰是也然雖講之庸何傷講之所以求為君子不為小人也若心慕君子之名而身冒小人之行不媿於己必愧於人愧夫人之以小人目之也既媿小人之名將慕君子之實矣愧於人必愧於已其致一也若都不知愧又何須講且猶講之必至於愧媿其不為君子則必不至於為小人矣使天下羣然愧為小人慕為君子此道學之所以行也氣一也而有直養之氣有助長之氣與天地相似所謂直養也毫髪不與天地相似則助長而巳矣故西銘天地之塞吾其體此義最當􅌻玩直養便自得助長則索然非徒索然所謂盡心力而為之後必有災者也食指動則嘗異味吾嘗騐之矣可見飲啄皆前定况其大者乎盖人之吉凶禍福徃徃動乎四體雖事物之至微亦莫不有其感召之理是以君子日兢兢於修避之道也上天之載無聲無臭至矣惟風雷有聲然雷在天風行地則是在天者止有雷一物有聲而巳隂陽摶擊其為聲也有時而然其餘則黙然都無聲臭之可言矣人能静觀此理久而不息便與天地同體人見天之為静而不見天之為動也日月動者也人知天之為動而不知天之為静也無聲無臭静者也一草木之理皆可體㑹於吾身况天地之大乎人生於天地而不能與天地相似是自絶其所生也作聖之功莫如睿求睿之道莫如思程子説經平易盡理而止學者沉潜反復自能義味融洽有悦心之益今人雖鈎深索逺牽引附合於聖人之經毫髮無補盖程子解經是以心之所得者筆之於書故與聖人之心若合符節今人直是生硬强解先巳失其本心更何能使人讀之而自得其心乎程子解經筆筆有生意且如文章雖非學者切𦂳事亦有有生意者韓退之之文是也其餘作者則不能及矣吾於程子之解經亦不敢不云爾也向來病痛只是言語不慎以言乎存養難矣可勿戒諸言語當快意時截然而止勇之端也明道曰聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去下學而上達也此是徹上徹下工夫伊川曰心要在腔子裏又曰人心常要活此即必有事焉而勿正心勿忘勿助長之義多言多悔而凶吝隨之至於吉一而己徃徃生於不得己而有言故凡可已而不已皆多言也是以君子常貴簡默子在川上曰逝者如斯夫與鳶飛戾天魚躍于淵同是一義學者於慎獨求之當自得矣學者變化氣質最難固是要讀書養氣也須更歴事務且如孟子云人之易其言也無責耳矣可見不易其言者須從有責後始知悔改所謂徵於色發於聲而後喻也羣居見人擾擾已心能不動此處正驗學力未能至此切須加勉强之功一日之間於言語應接不失其道而中心浩然有所得者學之騐也舍已從人惟無我者能之有我起於自私伊川曰人有身便有自私之理宜其與道難一聖人之心本無喜怒也聖人之於事物非無喜怒也可喜可怒在事物故心無喜怒也伊川曰一月之中十日為舉業餘日足可為學又曰科舉之事不患妨功惟患奪志朱子曰科舉亦不害為學但今人把心不定所以為害才以得失為心理會文字意思都别了又曰科舉特一事耳自家工夫到後那邊自輕由二先生之言觀之科舉與為學截然二事今人直以科舉為學豈不大錯役役於富貴利欲者盖惟此之為樂而不復知有義理之可樂也誠知有義理之可樂而實從事焉則必有朝聞夕死之意有不暇於富貴利欲者矣彼役役於富貴利欲之中而忽焉以死者恥孰甚焉無聲無臭兩個無字緊對父子有親君臣有義夫婦有别長幼有序朋友有信五個有字非二無無以為天下之大本非五有無以為天下之達道心易動者理不明也亦氣不足也故窮理至焉養氣次焉天以仁愛為心其生斯人也非故欲其煩苦艱難也葢必有易簡可樂之道焉人則不能而自陷於煩苦艱難之域乃厚誣天曰天實為之其亦大悖矣乎韓非任法其言悖理害道者多矣至有曰嚴刑重罰者民之所惡也而國之所以治也哀憐百姓輕刑罰者民之所喜而國之所以危也又曰仁義恵愛不足用嚴刑重罰可以治國尤悖妄之甚君子之言動以天而不以人小人之言動以人而不以天以天者順而祥以人者逆而禍順而祥易簡之道也逆而禍險艱之為也棄易簡而樂險艱豈人情哉亦弗思之甚而已矣讀書有欲速之心便已生病更讀甚書也朱子言看書先須刷洗浄那心有味哉又致其潔清而不輕自用其説可通乎讀書之法焦贛易林言吉凶與聖經絶相悖葢術數之學謬妄乖離之尤可鄙者沙隨程氏偶有騐乃神竒其書以為與左氏傳載鳯皇于飛和鳴鏘鏘漢書所載大横庚庚予為天王之語相類今考其言多俚諺如程氏所稱亦未之能及也明道作縣凡坐處皆書視民如傷四字嘗曰顥常愧此四字此即萬物一體之意學者當常存此心不特居官臨民宜然明道曰凡立言欲涵蓄意思不使知徳者厭無徳者惑所謂修辭立其誠也人以料事為明其闇塞可知矣南豐曽氏思政堂記有曰得於巳故謂之徳正巳而治人故謂之政朱子註為政以徳正與此合好辯固不得已然學者須有近理著巳工夫若一向闢緇黄斥異學雖其論議明快俊爽而不問其實踐力行自得乎巳者何在則亦徒託之空言而已矣人見其空言也並其説之可信者而亦有疑焉此其於吾道不惟無益而反滋害也孔子生七十三年耳做得千萬年事業知妨賢病國之罪大則知薦賢為國之功鉅矣氣質未變雖説得天花亂墜只是利口是以曽子告孟敬子以動容貌為第一件事立言以明道而顓務責人終是涵養處少其害於心者已大矣又何能感動得人也先儒語録如文清讀書録之類多是言其心中所得故其自叙云以備不思而遺忘盖其為已之學絶不見責人處也其氣象自能動人所以有功於世當戰國時闢楊墨亦不止孟子觀孟子言今之與楊墨辯者如追放豚云云則可見矣然而後世獨知有孟子者不惟以其闢楊墨以其有所以為孟子者在也其諸與楊墨辯者以其専務闢之而不知所以自治所謂能言而不能行不可以欺天下後世之人者也是亦楊墨之徒而己烏足道哉傳稱魯有父子訟者孔子同狴執之三月不别其父請止孔子赦之季孫不悦曰司冦欺予曩告予曰國家必先以孝今戮一不孝以教民孝不亦可乎而又赦何哉冉有以告孔子喟然歎曰嗚呼上失其道而殺其下非禮也夾谷之會齊有司請奏宫中之樂俳優侏儒戲於前孔子趨進歴階而登不進一等曰匹夫而熒惑諸侯者罪當誅請命有司加刑焉於是斬侏儒手足異處齊侯懼有慙色愚謂侏儒雖賤一民物也不教而誅雖不孝者聖人猶且不忍况侏儒有所受之彼無知者何罪焉故斬侏儒之事愚嘗疑其無也或曰方是時齊有司請奏四方之樂萊人以兵鼓譟而至將以刼公孔子以公退曰士兵之兩公合好而以兵亂之非齊君所以命諸侯也於是齊侯心怍麾而避之齊將刼公斬一侏儒以懼齊而全公奚不可也雖然士兵之正也兩君合好而斬其俳優恐不足服齊之心而實以速公之刼聖人不為是險道也殺一不辜得天下且弗為又况險道乎故侏儒之事葢傳之者過也聖人仁至義盡其行事之傳於萬世者務得其實是尤學者之所宜盡心焉爾孟僖子將死語其大夫必屬説與何忌於夫子使事之而學禮焉其後孟懿子南宫敬叔師事孔子嗚呼僖子之賢視列國君臣逺矣考其時魯昭公七年孔子年十有七嵗子雖嘗自言我非生知信而好古然而天縱至聖學為人師自少之時巳然不得以年嵗限也後之鄙生小儒已學未成遑遑於樹立壇坫號召生徒輒以師道自居者亦聖人之罪人矣大徳敦化小徳川流予嘗以此釋一以貫之文清巳有此言君子以身言小人以舌言故欲知其人觀其行而己言未可信也問周子云見其大則心泰心泰則無不足無不足則富貴貧賤處之一也處之一則能化而齊不知如何能見其大曰且須理㑹古聖賢言語行事如理會得孔子疏食曲肱樂在其中顔子陋巷簞瓢不改其樂此見得一分則心泰一分見得十分則心泰十分既有所見須守之勿失漸次擴充到純熟處則化而齊也狥欲最苦循理最樂捨樂就苦是誠何心有諸巳而後求諸人無諸己而後非諸人毎體認此理立言無和平感人之意即明快俊爽於巳徳所損己不少筆之於書亦然君子以身言所謂闇然而日章也小人以舌言所謂的然而日亡也懲忿窒慾是大闗鍵薛敬軒曰顔子終日不違如愚喋喋多言而能存者寡矣曹月川曰顔子之學求至乎聖人之道今人記誦文辭豈可與顔子同日而語二子之言既可信不誣學者宜知所決擇矣顔子曰舜何人也子何人也有為者亦若是孟子曰乃所願則學孔子也夫子所謂志學亦是如此故學者莫大乎立志先儒謂孔顔自有其樂不因疏食曲肱簞瓢陋巷而後樂此論最是的當愚以謂大聖賢處富貴貧賤一以視之若常人處富貴而淫處貧賤而憂者固不足道矣然常見膏粱華寢之人所憂有甚於蓬茅藜藿之士是則疏食飲水陋巷簞瓢固亦自有樂在爾顔子以能問於不能以多問於寡直是大舜好問好察之心傳言身通六藝者七十二人而孔子皆不謂之好學好學獨稱顔子然則六藝不足以盡學而學自有其重且要者捨其重且要而沾沾焉從事於其末者謂之不學可也吾夫子見人之一善而忘其百非是天地之量曽子敝衣耕於野魯公聞之而致邑焉曽子固辭不受曽子曰吾聞受人施者常畏人與人者常驕人縱君不我驕也吾豈能勿畏乎吾與其富而畏人不若貧而無屈按曽子此言即孔子疏食飲水顔子簞瓢陋巷之意齊欲聘曽子為卿曽子不就曰吾父母老食人之禄則憂人之事吾不忍逺親而為人役凡為人子者不可不思此言曽子曰狎甚則相簡莊甚則不親是以君子之狎足以交懽其莊足以成禮是與人之法晏子一狐裘三十年可想其風操曽子居衛緼袍無裘三日不舉火十年不製衣正冠而纓絶捉衿而肘見納履而踵決曳蹝而歌商頌聲滿天地若出金石其後齊聘以相楚迎以令尹晉迎以上卿曽子皆辭不就是處貧賤去富貴之法也曽子易簀只是求心所安曽子曰吾何求哉吾得正而斃焉斯巳矣可見聖賢生平只是求箇正而巳矣啓手啓足之時曽子亦自謂今而後吾知免夫及乎簀之未易則曽子之意猶以為未得乎正也可見聖賢生平自少至老自始至終無時不以寡過為事所謂一息尚存此志不容少懈易簀一事想見生平全副力量子思有言不取於人謂之富不辱於人謂之貴今之富貴反是子思緼袍無裏二旬而九食田子方遺之狐白裘子思辭曰伋聞之妄與不若棄物於溝壑伋雖貧不忍以身為溝壑聖賢辭與之義如此天命謂性上天之載兩天字首尾呼應程子所謂中庸首言一理末復合為一理此也程子言聖賢千言萬語只是欲人將已放之心約之使反復入身來自能尋向上去朱子言收斂此心不容一物乃是用功此本體功夫合一之至論文清謂孟子言知言即孔子所謂知者不惑其言養氣即孔子所謂勇者不懼愚謂孟子之不動心即孔子所謂仁者不憂孔子不尤公伯寮孟子不尤臧倉伊川不尤邢恕其意皆同周子太極其本主於静而喫緊處全在修吉悖凶君子修之吉小人悖之凶君子而不吉者有矣未有小人而不凶者也横渠曰物之初生氣日至而滋息物之既盈氣日反而逰散物既盈而㳺散理之自然無可疑者况敢從而戕伐之乎天命之謂性率性之謂道修道之謂教是統論此理辨明性道教三個字使天下萬世人不為異端所惑以致走差了路頭此三句子思一生大本領聖學大源頭故首掲以示人自道也者不可須㬰離也至君子慎其獨也是指點人下手做工夫處既有此段工夫所以養成喜怒哀樂未發之中發而中節之和中也者天下之大本便是天命之謂性和也者天下之達道便是率性之謂道致中和天地位焉萬物育焉便是修道之謂教首尾相應脉絡分明學者默識而從事焉盡性達天之學具於是矣曹月川曰周子所謂無極而太極者盖謂無形象無聲氣無方所極謂至極理之别名也太者大無以加之謂天地間凡有形象聲氣方所者皆不甚大惟理則無形象之可見無聲氣之可聞無方所之可指而實充塞天地貫徹古今大孰加焉解無極而太極可謂言近指逺周子曰聖可學乎曰可曰有要乎曰有請問焉曰一為要一者無欲也無欲則静虛動直静虛則明明則通動直則公公則溥明通公溥其庶矣乎此數言括盡太極圖之妙朱子所謂學者能深翫而力行之則有以知無極之真兩儀四象本皆不外乎此心者是也明道先生薦賢數十人而以横渠伊川為首不以父表弟與弟之嫌所謂内舉不避親也處富貴貧賤則不憚竭心力以趨避之至於死生之際則委之曰有命焉葢不盡其道而死者衆矣豈富貴貧賤獨無命而可以人力營之死生則不盡其道而可以委之於命乎故能盡處富貴貧賤之道斯能盡生死之道矣伊川初以通直郎充崇政殿説書以孔文仲詆毁差管勾西京國子監丁大中公憂服除直祕閣判西京國子監再辭董逸言怨望輕躁改授管勾崇福宫以疾辭哲宗親政申祕閣西監之命再辭不就紹聖間以黨論放歸田里尋送涪州編管徽宗即位移峽州以赦復宣徳郎任便居住還洛復通直郎權判西京國子監尋追所復官依舊致仕己而言者論其本以姦黨論薦得官雖嘗明正罪討而叙復過優今復著書非毁朝政於是追毁出身以來文字其所著書令監司覺察後復宣義郎致仕而終伊川生平出處進退如此彼孔文仲董逸之徒無足論矣而當其時小人道長君子道消宋之為宋竟何如也後世可以鑒矣伊川云吾四十以前讀誦五十以前研究其義六十以後反覆紬繹然後著書著書不得己也今人纔學執筆為文便思著述其書之不足信者無論矣果有可信者亦未必其躬行心得發而為言者也天下後世之人不可欺則亦終歸於不足信而已矣至於不足信而害吾道也滋甚盖將並其當信者而疑之甚矣多言之害道也伊川言心即理也晦菴謂與横渠言心統性情此二句顛撲不破愚按伊川横渠皆是指道心而言横渠言天體物而不遺猶仁體事而無不在愚謂此即神無方而易無體也程子拈出敬之一字示人即中庸戒慎恐懼四字也戒慎乎其所不覩恐懼乎其所不聞此二句括盡古今聖學大源頭入徳之門體道之極功悉在是矣敬即戒慎恐懼而戒慎恐懼四字更痛切戒慎恐懼此孔顔之所以樂也程子謂鳶飛魚躍是子思喫緊為人處葢有戒慎恐懼工夫故有鳶飛魚躍境界是戒慎恐懼正子思喫緊下工夫處也千古聖學相傳正脉㫁不外是程子謂静中有物始得葢有物謂敬也敬即戒慎恐懼所謂必有事也戒慎恐懼則自然勿正勿忘勿助若静中無物則是全無事也而正忘助之病不勝其紛紛矣此異學之空虛不可語於吾儒中正之道禪家受病正坐此以之處静且不可况動乎故合動静而交致其功㫁非戒慎恐懼不可戒慎恐懼只是率性戒慎其所不覩恐懼其所不聞即非禮勿視聽言動也率性有樂天知命意在戒慎恐懼所以樂天知命也薛敬軒以復性為宗復性二字亦是統論話頭未若子思言率性較真切敬軒能率性者故修巳教人以復性為説世多論白沙我大物小物有盡而我無盡至無而動至近而神致虛所以立本謂為禪學夫白沙之禪學初不自諱也其詩曰無奈華胥留不得起憑香几讀楞嚴天涯放逐渾間事消得金剛一巻經葢其不自諱如此初何嘗似王陽明支吾閃爍欲葢而彌彰耶然陽明猶知釋子之所謂道必不容於吾儒之道故文其説而隂用其實若白沙者則並不知釋之不可容於儒故其沾沾自喜者正在此也無所為而為大人之學也美哉言乎與必有事焉而勿正之意同伊川涪州之行答門人云族子至愚不足較故人情厚不敢疑常誦斯言省却多少怨尤此所謂無入而不自得也行莫善於思然戒在三思過莫貴於悔亦何堪數悔故曰再思曰不貳過隂陽五行非太極無以為化生之本道家之説只是在隂陽五行上用功所以愈勞愈逺周子創無極而太極之論直是使人窮隂陽五行之根柢學者誠於此而盡心焉所謂易簡而天下之理得也凡人役志於榮利紛華一旦小失意則戚然如不欲生葢其生平患得患失至此而益不能以自持所謂不仁者不可以處約樂也若夫有道之士不處非義之富貴不去非道之貧賤其自處有素所謂富貴不能淫貧賤不能移也焉徃而不浩浩哉處常人得意時無得意之為故能處英雄失意時無失意之態富貴貧賤視之如一讀書養氣不得分為二事天積氣地積塊就其已成者而言也氣塊既成之後若不積則不能恒久故曰維天之命於穆不己又曰天地之道貞觀者也列子之言有巧而不傷理竒而能正者賢者有取焉其言曰飛衛學射於甘蠅而過其術紀昌者又學射於飛衛飛衛教之不瞬歸而偃卧其妻之機下目承牽梃二年雖錐末倒眥而不瞬也飛衛曰未也視小如大視微如著而後可昌懸虱於牖望之旬日之間浸大三年如車輪焉乃射之貫虱之心而懸不絶昌既盡衛之術乃謀殺衛交射中路矢鋒相觸而墜於地飛衛之矢先窮昌遺一矢既發飛衛以棘刺之端扞之而無差焉紫陽知其寓言也曰用心専一不知有他要當如此所見方精莊子亦云用志不分乃疑於神夫曲伎異端之學其精専有如此者而吾儒之學反文具視之欲其有所至也不亦難乎黄文獻公跋程敬叔進學工程有言易曰君子進徳修業欲及時也記誦辭章云乎哉記誦辭章末矣後生小子猶有廢而弗事者觀公此論則後生小子記誦辭章固亦不可廢也今未嘗不以徳業相勉其進修者果何如耶而所謂記誦辭章又果能用其力否耶夫學以孔子為歸孔子之徳業窮天地亘古今一人而已而猶曰好古敏求修辭立誠若後生小子借口進修一槩束書不觀則是詩書不必刪定韋編不必三絶矣盖詩書之刪定韋編之三絶正所謂進徳修業也後生小子尚勉之哉予老矣何足以知此午亭文編巻二十四
