body:
  text: 午亭文編巻四十八大學士陳廷敬撰題跋襍文御書千字文跋臣惟書稱堯文思舜文明禹文命昔者史臣將紀一代之至徳至道大經大法必先首稱曰文文綦重矣而伏羲龍書神農穂書黄帝雲書爰自三皇已崇書道書綦重矣我皇上𢎞帝王之治統闡神聖之心傳天文覃敷御書昭賁紹隆皇古濟美唐虞盛哉弗可及已臣嘗見萬㡬餘間手不釋書煒煌聖製昱曜斯文良由天縦生知加以時敏典學故盛徳日新大業丕顯如斯其至也若夫親御翰墨旬月所書數踰萬幅祕府之蔵充函屬棟時䝉賜賚臣工鴻寶流傳光被天壤矣至御書千文真行草書已有數種各極其妙頃頒示臨米芾千文仙毫結字奎藻聫篇如日月星辰之麗於天而髙莫能窮焉如嶽鎮海瀆之奠於地而厚莫可極焉臣等前所謂體勢則經天緯地風采則出聖入神也璧合珠連龍翔鳯舉八文六義應手従心運闔闢之樞機用文章之矩矱髙掩東晉直躪襄陽臣等前所謂無美不臻靡法不備也神完氣足㡬動天隨儼然太乙下觀自有百靈潛衞臣等前所謂千言長幅立刻揮成自始至終無一懈筆也遂以是卜聖祚之遐昌慶嵩齡於億萬凡此賡颺之實洵為遭遇之隆臣等前請橅勒瓊珉恭綴跋語荷䝉俯允敢布愚忱臣廷敬不勝瞻仰榮幸之至御書後跋臣伏覩我皇上聖神御極勤政典學文治光昭聲教遐訖粤稽往古載籍所稱若斯之盛者其在唐虞之際乎尚書稱堯欽明文思安安允恭克讓稱舜濬哲文明温恭允塞曰明曰文紀其盛徳之彰著者也曰欽曰恭紀其盛徳之積於内而立其本者也故凡推而行之大經大法舉而措之一事一物㒺不由是我皇上紹執中之統闡精一之傳見於政治而發為文章者洵已恢二帝之鴻綱冠百王而首出矣至若燕閒之頃親書冊灑翰墨凝神穆清天行日晶下飾萬物規橅往昔獨運宸衷則依然聖學之心傳也昔人謂書者心畫柳公權告唐宗曰心正則筆正而程子有言作字須敬即此是學自昔賢臣大儒莫不以書道為心法所關故其大要亦惟以敬為本是則敬者政學之本原萬事之根柢也臣在内直一日見手勅示諸臣曰人非敬則百事無成雖百工技藝之末非敬亦無以自立況立身行已之大乎大哉聖言此堯之欽明允恭舜之温恭允塞也自堯之命舜曰允執厥中執中者敬也舜之命禹益以三言而申堯之説曰人心惟危道心惟㣲惟精惟一允執厥中精一者敬也厥後成湯懋昭大徳建中于民以義制事以禮制心皆敬也而仲虺之告湯曰慎厥終惟其始欽崇天道永保天命慎也欽也皆敬也周公之稱文王曰於緝熙敬止武王之告康叔曰惟文王之敬忌又曰敬勝怠者吉則是二帝三王無不以敬為相傳之心法者彰彰其如是也今日者光天之下至於海隅聖文聖書靡弗照被萬邦黎獻悚息仰觀僉曰聖人在上煥乎文章抑知有所原本而然與臣謹奉恩賜聖書恭摹勒石因推言主敬之義紀於簡末葢臣所曽見於黼扆之前者用以傳示子孫垂之永久臣不任榮幸之至起居注冊後跋伏覩皇上仁愛生民勤勞庶政彌歴年嵗㒺有間怠至誠感孚天人協應以故頃年以來驅除􅍔亂奠乂烝黎所向奏功今年十月逆渠授首滇南大定封疆萬里灌燧銷烽措天下於袵席之安數職貢於車書之㑹盡天所覆悉享悉臣武功燀赫超踰往古此雖決策廟堂信威域外將士恪秉成命集此大勲而揆其所以制勝之由實皆本於皇上憂勤惕厲仁民愛物之一心故受捷之日有戚容而無喜色羣工請上尊號至於再四而謙讓彌堅至徳益廣珥筆之臣執簡備書與有光曜至若莅阼迄今嚴郊祀事兩宫謹天戒急賑恤慎刑獄以惜民命重文學以興士風優禮儒賢好問好察嵗所冊記無虛日曠時皆班班可考匪有文飾而臣獨謂征伐之功由於仁民勤政之所致者蓋惟仁者無敵於天下書曰皇天無親惟徳是輔民心無常惟恵之懐其在唐虞君臣相戒曰兢兢業業一日二日萬㡬夫保治戡亂其道同也孰謂武功耆定非仁民勤政所由致哉繼自今皇上益思上天所以輔徳之意荅下民所以懐恵之心念一日二日萬㡬之不可以不慎而加之以兢兢使美實光輝日新嵗益書之典冊垂休無窮至於萬世永為法則其不亦偉與書呉太伯世家後吾適東海上過孤竹之墟拜伯夷叔齊祠下留數日低回不能去及讀呉太伯世家覩其事有合焉太伯之奔荆蠻荆蠻義之従而歸之千餘家孔子謂其民無得而稱何哉蓋嘗稱堯曰民無能名其稱太伯也殆等於堯矣他日又謂齊景公民無徳而稱伯夷叔齊民到於今稱之蓋崔杼弑莊公而景公為其所立景公之得國以崔杼之弑其兄夷齊之窮餓以兄弟之交相讓且稱者稱其徳也太伯讓同夷齊而曰民無得而稱焉此堯之之所以為大太伯之徳所以為至也自太伯以來十九世至王夀夢夀夢有子四人諸樊餘祭餘昩季札季札賢夀夢欲立之季札讓不可立諸樊諸樊既除喪讓位季札季札引子臧之義固謝呉人固欲立之季札棄其室而耕諸樊卒傳餘祭必欲以次致國季札自諸樊至餘祭餘昧皆兄終弟及餘昧之卒皆欲授季札季札於是逃去嗚呼太伯之賢比於伯夷季子之節可謂不媿太伯矣豈僅如史遷所稱閎覽博物君子云乎哉且吾聞勾呉之俗好義而有文其亦慕其遺風而興起者乎吾恨不能一至其處弔延陵之往蹟如過孤竹之遺墟而徒愴然興懐也書李斯阿二世行督責書後吾觀先秦文其背理害道者滋多大惡李斯督責書斯誠妄人以申韓為聖人以刑罰為王道以堯舜為桎梏以仁義為邪説夫醯雞跛鼈曽何足與較天地之廣江海之大哉斯不足惡吾惡其文以夫世之好之者易也不然鄭聲之與雅樂釐然絶異矣苟有耳者能辨之聖人特著之以謂所惡者在此獨何故耶吾固惡其文之足好也書河東先生集後王介甫論八司馬皆天下竒材也為叔文所誘至今士大夫欲為君子者皆羞道而喜攻之然此八人者既困矣無所用於世往往能自强列於後世而所謂欲為君子者吾多見其初而已要其終能毋與世俯仰以自别於小人者少耳介甫以子厚與七人者槩稱之而曰君子攻之夫君子好攻人吾不知其何如而或者輒曰此叔文之黨攻其人不復察其言介甫謂其卒為小人之歸也吾滋懼焉竊嘗謂柳子之文自子長已來罕見其匹故韓子以為似司馬子長雄深健雅崔蔡不足多也考同時與子厚得罪者劉夢得雄於文亦不得與子厚為比況其餘人乎然則槩之於七人之中不惟不知言亦並不知人矣自昔敘子厚之文者類能言其文而未有能白其人者也惟嚴氏有翼序柳文引范文正公之言而為之説曰叔文工言治道順宗在東宫頗信重之及踐阼方欲有所施為然與文珍韋臯等相忤内外䜛譖交口詆誣一時在朝例遭竄逐而八司馬之號紛然出矣作史者不復審訂其是非以一時成敗論人故黨人之名不可湔洗子厚亦可謂大不幸矣尚賴本朝文正范公之推明之也曰劉禹錫柳宗元吕温坐王叔文黨貶廢不用覽數君子之述作禮意精宻涉道非淺如叔文狂甚義必不交叔文以藝進東宫人望素輕然傳稱知書好論理道為太子所信順宗即位遂見用引禹錫等決事禁中及議罷中人兵權牾俱文珍輩又絶韋臯私請欲斬之劉闢其意非忠乎臯銜之㑹順宗病篤臯揣太子意請監國而誅叔文憲宗納臯之謀而行内禪故當朝左右謂之黨人者豈復見雪唐書蕪駮因其成敗而書之無所裁正孟子曰盡信書不如無書吾聞夫子襃貶不以一毫而廢人之業也文正公之論人可謂明且恕矣觀嚴氏此言可謂知柳子者矣余是以備録焉不復别作裁製庶以取信於天下後世葢以文正之賢天下萬世之所謂君子者也反是者専務成人之惡茫然昧於知識無怪乎並其文之可以經緯天地驅馳日月役使萬類亘古今而不可磨滅者一言以蔽之曰此黨人也嗚呼甚矣哉且夫叔文愚賤妄作器小易盈非實有雄姦㫁割之才不幸而居可為之地即使其務自抑損求合乎中當時朝列之衆好議論少成事充位嗜進之徒其亦誰肯直之而況叔文之愚賤妄作者乎居下流而天下之惡歸焉此所謂不可解免者也君子哉文正公之仁恕忠厚也原其心而寛其誅夫文正豈不知叔文之無可解免也哉其意若曰吾欲白數君子之枉不得不薄叔文之誅君子哉文正公也方叔文用事時自知其不為士大夫所容也亟欲進天下之所謂君子者以正其名而善其用不可謂非一得之見也而為君子者超然逺引自遁於聲利之外豈不甚善而無如其遭逢之不偶持守之不堅至於如斯也惜哉此河東先生之大為不幸也雖然使叔文之惡實甚凡有識者皆知避去況柳子之賢乎哉惟其猶知招致天下之英流庶㡬有濟國家之政理是以柳子不辭而赴之耳當是時趨炎熱競苟得者今皆不為天下後世之所指名其人皆叔文之所擯斥而弗録者也而柳子獨䝉不白之譏此吾之所以痛恨於叔文也昔者佛肸召子欲往子見南子聖人之往行具在曽謂柳子之賢而昧於聖人之道耶叔文雖妄作必不至叛如佛肸其愚賤亦未得比南子佛肸南子聖人猶且見焉欲往焉況柳子之學聖人之道者耶吾願後之君子觀其言察其人庶乎柳子之賢可得而知矣子曰君子不以人廢言若柳子者人固可廢耶柳子之政具在方冊使其得志於時為天下猶為一州也而固可少乎哉觀栁子之言雖古之善言為天下者亦無以過之宜乎栁州之政之足以令人思之而不置也夫古之人所以不可得而輕毁者其言在其人猶在也其行存其人不亡也子厚在時與其部將魏忠飲酒於驛亭酒間謂曰明年吾將死死而為神後三年為廟祀我長慶三年降於州之後堂其夕夢歐陽翼而告曰館我於羅池其月丙辰廟成大祭過客李儀醉酒慢侮堂上扶出廟門即死韓子羅池之碑豈其誣與由是以來柳有水旱疾疫之災公私祈禱應如響荅至宋元祐三百年矣栁民乞加封爵或廟額勅賜靈文之廟崇寧三年封文恵侯告詞有言生而昭爽後且不亡然則柳子之至今在而不亡者尤可信也使夫人之死而果無所知與君子猶且不敢慢易之而況柳子之昭昭然至今存而不亡者哉故夫世之尚論古人者以介甫之言為戒以文正公為師推是意以通之天下古今之人平其心而無易其言於忠恕之道思過半矣因誦栁先生之文而並列昔人之所以白其人者以俟後之君子推明其義焉朱文恪誥命書後右明故相國諡文恪朱公為太子太保禮部尚書兼文淵閣大學士誥命二道其曽孫今翰林先生竹垞以示余余方總史事既即史官所為公傳徵文考信采摭遺闕於横見側出之中加簡括焉事釐然具矣誠見公所為功甚大而其所自挾持為獨正也公翼儲副定國本厥功大矣而吾所為公功在審人家國極重難返之勢獨立不懼而隂以捄天下之弊此其為功大而可傳也當公之時黨朋不解閹禍滋興士大夫角風尚獵名譽以虛聲攖小人之怒雖罹􅫚敗而不悟顧沾沾自喜吾真東林真黨魁矣彼小人者不樂君子有是名而直使之無救於其禍敗必盡快其意而後止由是君子日亡國勢日去夫苟以取一日之名至於亡人家國而不恤吾於東林之君子有餘恫焉公當時議囂喧正邪襍糅獨中立不倚出乎流俗之表不變容改度終始一節使向者東林之君子盡皆如公彼小人者亦不得横被之以禍敗君子不亡則國之存亡不可知也不幸而功不就然其大者又詎可冺沒而無傳哉故曰其所挾持者獨正也公固以清亷聞於世其子孫往往仕宦而能貧獨以文學傳其家吾友竹垞尤顯名天下是皇勿替公侯必復於吾竹垞終有望焉此巻留余所且踰年一旦竹垞來告别也含毫黯然題其後以歸之書塗母夀詩後束君顯侯塗之自出也以其舅氏觀察君言屬其同年官詞館者徵詩於朝為塗母王太淑人夀既得詩使者復以觀察君之請請余題其後余既已序太淑人詩書瑀琚之教節義潔固之行而勉觀察君移孝為忠稱古風詩之義以告之矣余嘉束君之意而美卿大夫之善頌善禱也則仍與之稱詩以為夀焉南陔白華束氏之所補正也南陔之詩曰眷戀庭闈心不遑安馨爾夕膳潔爾晨餐白華之詩曰堂堂處子無營無欲鮮侔晨葩莫之點辱説詩者曰南陔孝子相戒以養而白華言孝子之潔白也束氏可謂善言孝者矣或曰孔子言孝始於事親中於事君終於立身子輿氏論事親以養志為大束氏南陔之詩所謂養口體者也白華之詩狹而未廣記之言孝曰居處莊也事君忠也莅官敬也朋友信也戰陣勇也束氏之言未盡其義故曰狹而不廣也余曰不然史稱廣微博學多聞性沈退不慕榮利為王戎張華輩所辟用歴仕尚書郎趙王倫為相請為記室廣微以疾辭歸所稱不仕王侯髙尚其事廣微之謂也有合於白華潔身之義矣故其南陔之作深以養隆敬薄為戒而以朂増爾䖍以介丕祉終其義焉孟子言誦詩讀書貴論其世今朝廷清明武功赫濯士君子奉其潔白之身出而公忠莅官則庶㡬養志之大者不可謂非束氏之所願焉而弗獲者也束君讀書慕古能神明其意而不媿其先世故余以此意告之使告觀察君跋錢公浩川遺墨諱桓字握之又字浩川巡撫南贑今士風敝矣友朋道衰甚者視親戚為仇讐其有閔世疾俗之士深懲於此而潔清自好將以别嫌疑絶黨私不苟交遊介然特立於時而譏謗悔尤之及卒不得免焉宜其士風之日即於敝也葢其人既不能和光同塵見喜於當世不幸而見辱則相與非笑之或曰是其人之有以自取也然則欲求世風之不日即於敝其可得哉雖然閔世疾俗之士殆獧者之流未得乎聖人所謂中行之指也仲長統有言事君不為君所知忠未至也與人友不為人所信義未至也獧者可進於忠義而猶未得為忠義之至者耳烏可以自足乎哉吾觀太倉錢公浩川所與諸親故書牘意其人得乎孔子所謂中行之指者與不然何其温厚坦易有君子長者之風溢乎行墨文字之間如此也孔子又嘗謂文王有四臣以免虎口丘有四友以禦侮聖人不絶交友而乃有云上古之世老死不相往來何其過也故觀於公而閔世疾俗息交絶遊之士可以廢然返矣公之兩孫同時官於朝為省臺従與游得觀公遺蹟公之身行官治見於州乘者甚悉及余讀之而後有以知公之偶然之筆札能使人愛慕而寶惜之久而可貴者厥有由也是以有感而識之記王大令保母志大令保母志崑山大司寇健菴徐公以三百金購得其墓磚始搨視世俗本所刻大令真行迥别矩矱嚴整風采秀勁余初見之真定梁公家愛慕之不能釋諸懐既又従公借觀累日公請歸省墓將行矣余嘗多借公蔵書今搜檢前後所借書及此卷將内之公而於此有疑焉卷後跋者十三人以姓氏跋者十五人以詩跋者十八人自退堂僧了洪者至髙文虎七人皆𨽻書書皆出一手趙文敏一跋以草書再跋以真書真書則尤絶不類文敏此顯然可疑者也而姜夔堯章跋獨詳可取以為信焉跋言嘉泰壬戌六月六日錢清王畿得保母志并小硯於稽山樵人夔親見之志以甎刻甎四垂其三為錢文皆隠起已㫁為四歸王氏又㫁為五凡十行末行􅆙二字不可知第六行􅆙十二字猶可考曰中冬既望塟㑹稽山隂之黄閍硯背刻晉獻之字上近右復有永和字乃劃成甚淺瘦永字亡其磔和字亡其口硯石絶類靈璧又似鳯咮甚細而宜墨㣲窪其中今銘字􅆙者俱與跋合又言與蘭亭同者二十四字之三年在各二文能老趣興嵗丑日終以曲水於悲夫後者與右軍他帖同者十八字行秀王懃書善七十三二月六無小肎貞而而其嘗見於大令雜帖者三字獻獻寧而見於蘭亭敘右軍帖者大令帖中亦多有之此刻大都百五字其可以他帖驗者凡四十五字餘六十字如保歸柔恭屬解釋交漓墓志等字尤精妙絶倫或謂此字多似蘭亭疑後人集蘭亭字為之此又不然大令字與蘭亭同者何止保母志而已試以官帖第九卷中行書帖較之相過一帖同者十八字思戀一帖同者九字十二月二十七日一帖同者十一字靜息一帖同者四字發呉興一帖同者八字其他三兩字同者不可勝紀右軍大令既是父子不應疑其書蹟之同凡夔所説皆是也又言或謂東坡金蟬墓銘云百世之後陵谷易位知其為蘇子之保母尚勿毁也此末章似之為可疑葢東坡意其理之或然大令知其數之必然作者之言自應相邇則似疑東坡未見大令此志而偶然以合者然考大令集保母志其文具在凡為文古人不嫌祖述坡公既於書無所不見豈獨不見大令此集乎夔輒疑其偶然以合者葢既未見大令集而妄意古人陋矣蘭亭之敘承用劉越石荅盧諶詩敘然後知耼周之為虚誕嗣宗之為妄作豈亦右軍未見越石之文其合也亦出於偶然者耶故吾於保母帖㫁其為大令真蹟無疑而所可疑者乃反在諸人之跋耳公博學多識而蔵弆古人法書珍祕㡬與梁公相埒峙公如疑吾言當取别梁公試以問之跋項孔彰畫唐人畫粉本正用墨筆宋元以來有水墨畫實唐畫粉本耳顧遂謂為正畫詎非難工者與近代能為此者益多吾獨愛徐文長唐子畏有蕭然出塵之姿今觀項君此畫有徐唐遺意文衡山殆不如也然吾聞項氏多收古名畫故其所得如此事不師古以自矜可鄙者多矣獨畫然耶梓潼隂隲文跋道蔵有言飛鸞度世余嘗竊歎上帝仁慈隠惻加恵下民如此其極至也昔南正重司天以屬神北正黎司地以屬民葢自是神人不雜矣然世之言神者或以謂芒芴𣺌㝠而不可知不可知則亦不可信於是乎悖神而馳非理義而動以日趨於災害亡絶不測之禍非夫人之知有神而愍然不畏也其禍本於以神為不可知故不信不信故悖神而為無理無義以至於災害亡絶不測而莫之救也於是上帝惻然閔憐令神之聰明正直而慈愛多行徳善能化導一切者啟之以飛鸞度世之事以助成無言之化而顯其神以示人至是而神可知矣可知故信信故不敢悖而馳為無理義以自取災害亡絶不測之禍而且為善得福如影形聲響焉若梓潼此文是已梓潼之文葢出於飛鸞是上帝之心也可不敬諸可不敬諸二錢説余今年四月以吏部左侍郎管右侍郎事督理京省錢法既至寶泉局則偕其同官給事中監察御史監督郎官而謂之曰此天下錢之所由出也吾自矢不受一錢願與諸公同之指白日以為誓居數月監督従廢銅中得古錢數枚余選其一文曰半兩葢秦錢也監督曰人言古錢佩之身吉請公佩之余許諾又數月余遷左都御史一日御史臺有公事不得至局局人以鑄錢請余視緡解錢散脱亂布於席視畢局人去席上隠其一錢又月餘晨起理寶泉事心有觸曰吾誓不受一錢前後取其錢二其何以自明立命呼寶泉吏喻之意而還之吏歎息持以去是日康熙二十三年嵗在甲子十有一月二十七日也書其事以自警名曰二錢説云一錢説昔予為二錢説葢取寳泉之二錢而還之為説以自警者也乃今又為一錢説云一錢者何始余毎出見貧而丐者人與之一錢或日見數人焉或日不見一人焉夫一錢至微也人與一錢至少也且或一人焉無之其為此又至易也世之人莫有肯為而余為之不衰者葢天下貧者多矣若貧而丐者則少於天下之人而天下之人至於不可勝窮假令天下之人皆日見貧而丐者人與之一錢則於天下無窮之人無所大損而貧者得錢亦將至於不可勝窮則是天下之人不復有貧且丐者其為益豈不甚大矣哉或曰可以與可以無與與傷恵今子自謂不取二錢而顧沾沾焉一錢之與得無可以已與余應之曰非其義也非其道也一介不以取諸人二錢之謂也如其義也如其道也雖千駟萬鍾與人可也況一介乎一錢之謂也且夫疲癃殘疾無告之人聖人之所憫憐也昔者子貢以博施濟衆為仁孔子謂必也聖人能之而乃専以已欲立立人已欲達達人為仁夫孔子豈以博施濟衆謂非仁者之事哉謂其難能故曰聖也今吾一錢之與不可謂博人與一錢不可謂衆而至使天下無甚貧之人亦庶㡬所謂欲立欲達者非與吾與子勉為仁是亦聖人之徒也所謂一介不與人者寧謂是耶客曰善繼自今請日行子一錢之説惜分隂説余今年閒居無事得遂其靜坐讀書之願入夏執熱不出庭户所居街四通多朝市往來門前過客習知吾懶慢不好客客亦無所求於我以故累旬月無一至吾室者然吾半日靜坐半日讀書或終夕不寐漏鼓分明東方已白常覺日夜之短而不足以供吾靜坐讀書之樂也而僮客飽食嬉游呿呿吁吁謂日之長謂夜之短羣然一辭彼誠知晏息倘佯之為樂而恨夜之短而不知吾靜坐讀書之樂而並不覺日之長也雖然蘇子瞻云無事此靜坐一日似兩日若活七十年便是百四十吾靜坐不覺日之長而子瞻所見乃與吾異且子瞻又非不讀書者何以有是説耶葢子瞻求靜坐而不可得者耳非真能靜坐也陶士行有言當惜分隂大司寇徐公健菴取以榜其所居之室吾問公何以惜隂公曰讀書夫公之蔵書之多甲於天下子瞻所蓄書不知多少顧其顛沛於道途又徙居無常處度其至多不能以當公而公讀書之多則雖子瞻有不能及也夫以子瞻之讀書而不知靜坐之日易覺其短則似能讀書而不知靜坐之樂者吾懼公之意或有同於子瞻之所見者故為是説以贈焉説巖字説客有問曰賢者名可斥言之耶陳子曰不可有説乎曰有春秋紀季公子友仲孫湫皆字之而不名字之以為襃則必名之以為貶矣故凡書名者皆貶之若是乎賢者之名之可貴也烏敢斥言之耶斥言之不可矣可取以為人之名若字耶曰不可堯夫祖禹吾嘗病之矣或者以為諡也曰然則子之字以説巖者不若易以傅巖之為得也曰惡是何言與予非敢有取於是也夫浩然之亭陽城之驛昔人猶諱而易之若是乎賢者之名之不可斥言也而謂帝賚良弼版築之巖竟竊以自號焉雖愚且妄或不至若是之甚乎且不敢居其名而引其姓庸愈乎夫吾之生近聖人之居陶唐氏之遺風而蒲坂安邑壤相錯也古今賢聖之人可慕愛者多矣獨有取於是乎哉士苟不自立而浮慕乎古人雖誦其詩書假其言貌偊行矩步以自號鳴於世而考其行有庸人市儈所不為者是直無救於愚且妄而已矣況竊取其名若姓引以就不肖之身而謂有其可貴者哉然則子曷以字曰志所居也始吾家樊川之上其南澗之東有巖焉升巖而望月之始出也命之曰月巖已而為堂於巖北仰觀峯嶺下瞰林壑以居以游窮晝極夜至如初日上而雲飛夕烟斂而霞舉顥氣寫心流泉舒目飄忽萬變而悠然獨得吾之可説者存焉故又曰説巖夫時習而説所説者學也於聖人無所不説所説者言也今吾學焉而不能習又不得親見聖人而聆其言姑寄其意於巖居川觀與田叟牧兒生長嬉遊於此樂之終身而不厭是則吾之所説也若子之言遼乎異哉不倫且甚矣子固有子之所説者而非吾之所謂説也道不同不相為謀客謝而退因書其語為説巖字説廷翰字説廷翰或有字之曰瀛洲瀛洲者海中神山也自唐以來翰林清祕深嚴之地輒舉是以相擬而今之翰林署中有瀛洲亭是其義也或者以謂翰者字之宜莫如是予竊觀世之軼羣之士流光揚聲躋顯垂榮連蹤疊趾出入承明以比古所謂登瀛之客亦拔其類而大其朋矣而予之狂惛亦厠其間恐畏惴栗如弗勝焉伏覩跳踉潛耳嚄唶卷舌鉗辭重足屏跡道徳日去悔吝日集愁憂之來天地為窄悵逐逐於泥沙盍栖栖於泉石良有辱於斯名殆無補於是職翰乎雖賢得無優於所能而詘於所不及乎其在詩曰之屏之翰葢翰者幹也易不云乎貞者事之幹於是翰乃字公幹云觀於牆非幹無以為立方觀於車非輪輻非軸車無以行觀於幹而體用之道蔵焉幹可不勉乎哉陳存字説陳氏子名存禮子生三月父命之名存遺孤子也父不及名而宗人名之存藐然一身無伯叔昆弟奉其寡母以居家貧無所依慬而存者其身耳以存之緒不絶如綫使其身慬而存焉不亦既幸矣乎雖然夫人未有心亡而身存者假令有之亦孔子所謂幸免已耳傳曰操則存舍則亡存其操之哉操之斯存之矣操之操之以至長存易傳所謂成性存存也故字之曰又存蔡霑雨字説蔡子霑雨問字於余曰將有以自省焉嘗誦詩信南山之篇既霑既足生我百穀而孟子言五穀者種之美者也遂字之以美穀吾方耕於樊川之陽荷鍤扶犂従田夫野老之後聴布穀之催春樂鳴鳩之喚雨芸而歌杖而息其於穀也目其生長親其穫斂於是𤓰菹酒食饗我尸賔以繼詩人之所詠歌而嘉歎者且與子乎同之子如自省則盍思夫美穀之義而三致意焉傳曰苟為不熟不如荑稗可不儆懼與飼虎文維年月日以特羊飼虎為文告之曰吾聞之聖人雲従龍風従虎淮南子言虎嘯而谷風生傳言虎與龍並稱而嘯則風生説與傳同則是虎者靈有知之物也吾又聞虎山獸之君夫靈有知之物以長百獸宜其非凡為獸者之比可以理説之明矣吾為先淑人卜宅兆得洞陽山之南樊山之隂土人曰其下虎穴虎出沒其間余曰虎靈有知之物必且逺去其後虎伏不出居數月虎夜纍纍行余乃謂虎夫母没蔵之荒野虎何忍蹤跡犯冢上以震驚吾母之䰟魄乎虎敢侮予必殺虎乃已夜虎見告今之人有敢侮子者矣彼人也猶尚然於虎何責焉余應之曰是豺狼也虎為百獸君豈得效豺狼耶虎去夢覺曰虎靈有知如此則盍閉閣思過於是齋心具特羊飼之土人讙然爭笑以為迂而一老父言曰其横逆猶是也於禽獸何難焉余曰虎靈有知非凡為獸者比也今與虎約自飼汝之三日汝當攜女婦子徙女窟穴不使再見女蹤跡女猶不悛是豺狼之行矣吾誅豺狼如殺狐兔虎得毋後悔午亭文編卷四十八
